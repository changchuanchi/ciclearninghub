<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博仁大学中文国际学院 本科英语毕业考试题库</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
    background: #f0f4f8;
    color: #1a202c;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 24px;
    color: #2d3748;
  }
  .tab-bar {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 10px 28px;
    border: none;
    border-radius: 30px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    background: #e2e8f0;
    color: #4a5568;
  }
  .tab-btn.active {
    background: #4f46e5;
    color: #fff;
    box-shadow: 0 4px 14px rgba(79,70,229,0.35);
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    padding: 28px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ─── 題目列表 ─── */
  .list-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .list-controls input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .list-controls input[type="text"]:focus { border-color: #4f46e5; }
  .list-stats { font-size: 0.88rem; color: #718096; }

  .q-item {
    border: 1.5px solid #e8ecf0;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .q-item:hover { border-color: #c3b9f9; }
  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .q-num {
    background: #4f46e5;
    color: #fff;
    border-radius: 8px;
    padding: 2px 9px;
    font-size: 0.8rem;
    font-weight: 700;
    white-space: nowrap;
    margin-top: 2px;
  }
  .q-en {
    font-size: 0.97rem;
    line-height: 1.6;
    color: #2d3748;
    font-weight: 500;
  }
  .q-answer {
    color: #4f46e5;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .q-zh {
    font-size: 0.87rem;
    color: #718096;
    line-height: 1.5;
    margin: 6px 0 6px 0;
    padding-left: 2px;
  }
  .q-idiom {
    font-size: 0.83rem;
    color: #92400e;
    background: #fffbeb;
    border-left: 3px solid #f59e0b;
    border-radius: 0 6px 6px 0;
    padding: 6px 10px;
    margin-top: 6px;
    line-height: 1.5;
  }

  /* ─── 隨機練習 ─── */
  .quiz-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .quiz-progress {
    font-size: 0.95rem;
    color: #718096;
  }
  .progress-bar-wrap {
    height: 6px;
    background: #e2e8f0;
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #4f46e5, #818cf8);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .score-badge {
    background: #f0fdf4;
    border: 1.5px solid #bbf7d0;
    color: #166534;
    border-radius: 20px;
    padding: 4px 16px;
    font-size: 0.9rem;
    font-weight: 600;
  }
  .quiz-q-num {
    font-size: 0.82rem;
    color: #a0aec0;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .quiz-q-en {
    font-size: 1.05rem;
    line-height: 1.7;
    color: #1a202c;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .quiz-q-zh {
    font-size: 0.88rem;
    color: #718096;
    line-height: 1.5;
    margin-bottom: 20px;
  }
  .quiz-opts {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }
  .quiz-opt-btn {
    text-align: left;
    padding: 13px 18px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: #fff;
    font-size: 0.97rem;
    color: #2d3748;
    cursor: pointer;
    transition: all 0.18s;
    line-height: 1.5;
  }
  .quiz-opt-btn:hover:not(:disabled) {
    border-color: #818cf8;
    background: #f5f3ff;
  }
  .quiz-opt-btn.selected-correct {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #166534;
    font-weight: 600;
  }
  .quiz-opt-btn.selected-wrong {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }
  .quiz-opt-btn.reveal-correct {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #166534;
    font-weight: 600;
  }
  .quiz-opt-btn:disabled { cursor: default; }
  .opt-letter {
    display: inline-block;
    width: 26px;
    height: 26px;
    line-height: 26px;
    text-align: center;
    border-radius: 6px;
    background: #f1f5f9;
    font-weight: 700;
    font-size: 0.85rem;
    margin-right: 10px;
    vertical-align: middle;
  }
  .quiz-feedback {
    min-height: 32px;
    font-size: 0.95rem;
    margin-bottom: 16px;
    padding: 10px 16px;
    border-radius: 10px;
    display: none;
  }
  .quiz-feedback.correct { display: block; background: #f0fdf4; color: #166534; }
  .quiz-feedback.wrong { display: block; background: #fef2f2; color: #991b1b; }
  .quiz-btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-primary {
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 26px;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #4338ca; }
  .btn-primary:active { transform: scale(0.97); }
  .btn-outline {
    background: #fff;
    color: #4f46e5;
    border: 2px solid #4f46e5;
    border-radius: 10px;
    padding: 9px 22px;
    font-size: 0.97rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-outline:hover { background: #f5f3ff; }

  /* Summary */
  .summary-box {
    text-align: center;
    padding: 30px 20px;
  }
  .summary-score {
    font-size: 4rem;
    font-weight: 800;
    color: #4f46e5;
    line-height: 1;
  }
  .summary-total { font-size: 1rem; color: #718096; margin-bottom: 20px; }
  .summary-msg { font-size: 1.15rem; margin-bottom: 28px; color: #2d3748; }

  .hidden { display: none !important; }

  @media (max-width: 560px) {
    body { padding: 10px; }
    h1 { font-size: 1.1rem; margin-bottom: 16px; }
    h1 span { font-size: 0.85rem; }
    .card { padding: 14px; border-radius: 12px; }
    .tab-bar { gap: 6px; }
    .tab-btn { padding: 10px 0; flex: 1; text-align: center; font-size: 0.9rem; }
    .list-controls input[type="text"] { min-width: 0; font-size: 1rem; }
    .q-en { font-size: 0.93rem; }
    .q-zh { font-size: 0.84rem; }
    .q-idiom { font-size: 0.8rem; }
    .quiz-q-en { font-size: 0.97rem; }
    .quiz-opt-btn { font-size: 0.93rem; padding: 12px 14px; }
    .quiz-btn-row { flex-direction: column; }
    .btn-primary, .btn-outline { width: 100%; text-align: center; padding: 13px; }
    .summary-score { font-size: 3rem; }
  }
</style>
</head>

const questions = [
  {id:1,en:"You can't talk until the _____ come home. I won't accept that scheme.",zh:"你就算说到天荒地老，我也不接受那个方案。",A:"dogs",B:"cows",C:"cats",D:"hens",ans:"B"},
  {id:2,en:"It is the policy of the company to _____ all interviews for new recruits with a member of the trade union present.",zh:"公司的政策是在工会成员在场的情况下主持所有新员工的面试。",A:"control",B:"conduct",C:"convene",D:"confirm",ans:"B"},
  {id:3,en:"The boss was appointed in the hope that she would be able to _____ results.",zh:"之所以任命这位老板，是希望她能够拿出成果。",A:"find",B:"seek",C:"achieve",D:"manage",ans:"C"},
  {id:4,en:"As early as the 17th century, Sir William Petty, one of the _____ of modern economics, argued that a tax on the production and sale of commodities would eventually be shifted by producers to consumers, who would pay it in the form of higher prices.",zh:"早在17世纪，现代经济学的先驱者之一威廉·配第爵士就认为，商品生产和销售税最终会转嫁给消费者，以更高价格的形式支付。",A:"planners",B:"precursors",C:"predecessors",D:"progenitors",ans:"D"},
  {id:5,en:"The circular will contain _____ financial information to help investors.",zh:"该通告将包含关键财务信息以帮助投资者。",A:"key",B:"obvious",C:"intelligent",D:"noted",ans:"A"},
  {id:6,en:"You must increase the sale of this commodity by trying to interest a different age range and by _____ into their society.",zh:"你必须通过吸引不同年龄段的人并渗透进入他们的社会来增加这种商品的销售。",A:"dripping",B:"floating",C:"tapping",D:"sailing",ans:"C"},
  {id:7,en:"So many of these animals have been shot over the years that they are now classed as _____ species.",zh:"这些年来，如此多的这类动物被射杀，它们现在被列为濒危物种。",A:"dangerous",B:"endangered",C:"unwanted",D:"limited",ans:"B"},
  {id:8,en:"The hourly _____ for all part time clerical assistants has gone up by 40% since 2000.",zh:"所有兼职文书助理的时薪自2000年以来已上涨40%。",A:"wage",B:"validity",C:"recompense",D:"value",ans:"A"},
  {id:9,en:"There is no question that the most important _____ in that company is its youthful enthusiasm.",zh:"毫无疑问，该公司最重要的资源是其充满活力的青春热情。",A:"resort",B:"resorted",C:"resource",D:"resorting",ans:"C"},
  {id:10,en:"I can see by the expression on your face _____.",zh:"我从你脸上的表情可以看出，你其实并不喜欢这个想法。",A:"you don't really like the thought",B:"you don't really like the concept",C:"you don't really like the idea",D:"you don't really like the belief",ans:"C"},
  {id:11,en:"A university education is of course important but it is essential that all employees undergo a period of intensive _____.",zh:"大学教育当然重要，但所有员工必须接受一段时间的强化培训。",A:"preparation",B:"concentration",C:"training",D:"learning",ans:"C"},
  {id:12,en:"Obviously a computer can take all the hard work out of _____ a large mass of data.",zh:"显然，计算机可以省去处理大量数据的繁重工作。",A:"proceeding",B:"procedure",C:"processing",D:"processes",ans:"C"},
  {id:13,en:"Markets and marketing concepts will change radically, driven by those companies who successfully _____ the challenge.",zh:"市场和营销概念将发生根本性变化，由那些成功应对挑战的公司所驱动。",A:"forge through",B:"rise to",C:"set up",D:"take in",ans:"B"},
  {id:14,en:"The representative of the financial consultants assured her that the policy of the firm was that of complete _____.",zh:"财务顾问的代表向她保证，公司奉行完全承诺负责的政策。",A:"destiny",B:"devotion",C:"commitment",D:"attention",ans:"C"},
  {id:15,en:"Each month when you receive your pay, the employer _____ a certain amount to pay towards your pension.",zh:"每个月当你收到薪水时，雇主会预扣一定金额用于支付你的养老金。",A:"withholds",B:"withstands",C:"withdraws",D:"without",ans:"A"},
  {id:16,en:"On the _____ of her ten years' service she immediately qualified for the extended annual leave of six weeks.",zh:"根据她十年服务的基础，她立即获得了六周的扩大年假资格。",A:"base",B:"basis",C:"ground",D:"foundation",ans:"B"},
  {id:17,en:"In order to cut down the expenses of compiling and sending out the invoices, you need to employ an _____ administrator.",zh:"为了削减编制和发送发票的费用，你需要雇用一位高效的行政人员。",A:"officious",B:"effecting",C:"efficient",D:"affected",ans:"C"},
  {id:18,en:"I must object and make it clear that I am totally _____ any measures that suggest changes to the original scheme.",zh:"我必须提出异议，明确表示我完全反对任何建议修改原方案的措施。",A:"up",B:"without",C:"against",D:"off",ans:"C"},
  {id:19,en:"What would you say to a member of your staff who always _____ his work in late?",zh:"你会对一个总是迟迟才上交工作的员工说什么？",A:"delivered",B:"handed",C:"produced",D:"completed",ans:"B"},
  {id:20,en:"Another benefit, the stock ownership plan, permits the employee to buy _____ of the company's stock at subsidized prices.",zh:"另一项福利——股票所有权计划——允许员工以补贴价格购买公司的股票。",A:"sections",B:"segments",C:"shares",D:"slices",ans:"C"},
  {id:21,en:"Don't give up whatever you do. I'm sure you'll _____ it in the end.",zh:"不管怎样都不要放弃。我确信你最终会成功的。",A:"acquire",B:"get",C:"put",D:"make",ans:"D"},
  {id:22,en:"Generous benefits can contribute up to 35 or 40 percent to the _____ compensation for a job.",zh:"优厚的福利最多可贡献工作整体薪酬的35%至40%。",A:"overage",B:"overall",C:"overpaid",D:"overseen",ans:"B"},
  {id:23,en:"The Members have not been representatives of specific political or governmental _____, and they have all pursued the same objective, to draft the most appropriate contract rules for Europe.",zh:"这些成员并非特定政治或政府利益集团的代表，他们都追求同一目标——为欧洲起草最合适的合同规则。",A:"interests",B:"liaisons",C:"platforms",D:"wings",ans:"A"},
  {id:24,en:"Accountants cannot express the opinion that financial statements are \"in conformity with generally accepted accounting principles\" if such information includes any _____ from these principles.",zh:"如果财务报表包含任何与这些原则的偏离，会计师就无法表达财务报表符合公认会计准则的意见。",A:"departures",B:"duplications",C:"projections",D:"quotations",ans:"A"},
  {id:25,en:"When someone calls you, your cell phone receiver _____ radio waves sent out by the base station.",zh:"当有人给你打电话时，你的手机接收器侦测基站发出的无线电波。",A:"collects",B:"detects",C:"elects",D:"selects",ans:"B"},
  {id:26,en:"A contract has been created when both the buyer and the seller have agreed that there will be some kind of _____.",zh:"当买卖双方都同意将存在某种对价时，合同即告成立。",A:"consideration",B:"service",C:"application",D:"business",ans:"A"},
  {id:27,en:"The manager asked her assistant to _____ all incoming calls while she was in the board meeting.",zh:"经理要求助手在她参加董事会会议期间筛选所有来电。",A:"receive",B:"screen",C:"answer",D:"transfer",ans:"B"},
  {id:28,en:"Before they could borrow a large sum of money to buy the house, they had to make sure they had enough money to be able to make a _____ payment.",zh:"在他们能借到大笔钱买房之前，必须确保有足够的钱支付首付款。",A:"down",B:"through",C:"low",D:"base",ans:"A"},
  {id:29,en:"I should explain that we would naturally _____ any previous holiday arrangements you have made.",zh:"我应该说明，我们自然会尊重您之前安排好的任何假期计划。",A:"believe",B:"show",C:"decide",D:"honour",ans:"D"},
  {id:30,en:"Don't worry I'm sure it's only _____ and that he'll soon recover before the next performance.",zh:"别担心，我确定这只是暂时的，他在下次演出前会很快恢复的。",A:"temperate",B:"temporary",C:"contemporary",D:"temporarily",ans:"B"},
  {id:31,en:"However, she warns that it also carries many _____ and even dangers in the office environment.",zh:"然而，她警告说，这在办公室环境中也存在许多陷阱甚至危险。",A:"deadfalls",B:"freefalls",C:"pitfalls",D:"pratfalls",ans:"C"},
  {id:32,en:"The fundamental opportunity offered by the Internet is for suppliers to gain direct access to consumers without the attendant costs associated with the maintenance of physical distribution channels -- people, bricks and _____.",zh:"互联网提供的根本机遇是供应商能够直接接触消费者，无需承担维护实体分销渠道——人员、砖块和灰泥——所带来的相关成本。",A:"bats",B:"concrete",C:"mortar",D:"sticks",ans:"C"},
  {id:33,en:"Let me just _____ what we have agreed in the agenda so far if nobody minds me going over it all again.",zh:"如果没有人介意我再过一遍，让我就我们在议程上商定的内容做个总结。",A:"restore",B:"retake",C:"recap",D:"redo",ans:"C"},
  {id:34,en:"At the first series of interviews the question was whether to appoint a newcomer or _____ a current employee.",zh:"在第一轮面试中，问题是是否任命新人或晋升现有员工。",A:"project",B:"promote",C:"proffer",D:"protect",ans:"B"},
  {id:35,en:"Good accounting systems allow users to run informal reports such as _____ accounts receivable or to keep track of inventory.",zh:"良好的会计系统允许用户运行非正式报告，如账龄应收账款分析或跟踪库存。",A:"aged",B:"listed",C:"timed",D:"unpaid",ans:"A"},
  {id:36,en:"Thank you for all you've done from the _____ of my heart.",zh:"从我内心最深处感谢您所做的一切。",A:"base",B:"foundation",C:"end",D:"bottom",ans:"D"},
  {id:37,en:"The financial director recommended that the board _____ the proposed merger before making a final decision.",zh:"财务主管建议董事会在做出最终决定前评估拟议的合并。",A:"approve",B:"dismiss",C:"evaluate",D:"announce",ans:"C"},
  {id:38,en:"The report is _____ to show better than expected results.",zh:"该报告很可能显示好于预期的结果。",A:"necessary",B:"possibly",C:"clearly",D:"likely",ans:"D"},
  {id:39,en:"To be perfectly honest with you I think that this is the best test I've ever taken in my entire _____.",zh:"说实话，我认为这是我一生中参加过的最好的考试。",A:"life",B:"days",C:"duration",D:"stay",ans:"A"},
  {id:40,en:"All employees are kindly requested to _____ from smoking in the presence of customers.",zh:"恳请所有员工在客户面前避免吸烟。",A:"stop",B:"restrain",C:"refrain",D:"restrict",ans:"C"},
  {id:41,en:"An outdoor advertisement _____ in Rome offers property for rent, and one found painted on a wall in Pompeii calls the attention of travelers to a tavern.",zh:"在罗马出土的户外广告提供出租物业，在庞贝城墙上发现的一幅画提醒旅行者注意一家酒馆。",A:"excavated",B:"exhumed",C:"extracted",D:"extricated",ans:"A"},
  {id:42,en:"It is the responsibility of every employee to _____ to the company's code of conduct at all times.",zh:"每位员工有责任在任何时候都遵守公司的行为准则。",A:"object",B:"adhere",C:"relate",D:"respond",ans:"B"},
  {id:43,en:"I really see no point in continuing this argument because we have no _____ ground.",zh:"我真的看不出继续这场争论有什么意义，因为我们没有共同立场。",A:"basic",B:"own",C:"common",D:"similar",ans:"C"},
  {id:44,en:"Turnover remained constant through the _____ year.",zh:"整个财政年度营业额保持不变。",A:"annual",B:"fiscal",C:"physical",D:"revenue",ans:"B"},
  {id:45,en:"I really wouldn't joke about it because these people are deadly serious and _____ business.",zh:"我真的不应该开玩笑，因为这些人态度极为严肃，是真正来谈正事的。",A:"signify",B:"mean",C:"require",D:"need",ans:"B"},
  {id:46,en:"Thank you so much for helping me. I really _____ it.",zh:"非常感谢你帮助我。我真的很感激。",A:"accept",B:"agree",C:"appreciate",D:"deserve",ans:"C"},
  {id:47,en:"Whenever I go to the old part of a city, I like to _____ all the shops selling antiques.",zh:"每当我去城市的老城区，我都喜欢逛遍所有出售古董的商店。",A:"examine",B:"search",C:"check",D:"explore",ans:"D"},
  {id:48,en:"Prices can vary from customized multimillion dollar systems to _____ software that costs less than $100.",zh:"价格从定制的数百万美元系统到价格不到100美元的预打包软件不等。",A:"prefabricated",B:"preinstalled",C:"prepackaged",D:"prepared",ans:"C"},
  {id:49,en:"They're quite _____ in their policy of not giving refunds without a receipt in this store.",zh:"这家店在没有收据的情况下不退款的政策相当严格。",A:"severe",B:"strong",C:"strict",D:"hard",ans:"C"},
  {id:50,en:"Joan Lloyd, of Joan Lloyd & Associates, writes that email is a medium of communication _____ for sheer convenience.",zh:"Joan Lloyd写道，电子邮件是一种为了纯粹方便而无与伦比的通信媒介。",A:"uncompared",B:"undivided",C:"unequal",D:"unparalleled",ans:"D"},
  {id:51,en:"It has been _____ by a government agency that the percentage of under 25 year olds owing large sums to companies is on the increase.",zh:"一个政府机构披露，25岁以下欠大公司大笔债务的人数正在增加。",A:"distinguished",B:"deciphered",C:"dissolved",D:"disclosed",ans:"D"},
  {id:52,en:"We got a very good _____ when we bought that three piece suite for half its usual price.",zh:"我们以平时一半的价格买到了那套三件套沙发，真是个划算的交易。",A:"deal",B:"dealing",C:"dealer",D:"dealt",ans:"A"},
  {id:53,en:"_____ wholesale and semi-wholesale markets are located within or near major cities (usually with populations exceeding 0.5 million).",zh:"集散批发和半批发市场位于主要城市内或附近（通常人口超过50万）。",A:"Seasonal",B:"Subsidized",C:"Temporary",D:"Terminal",ans:"D"},
  {id:54,en:"Her parents are very strict and frequently _____ down the law about the way she behaves.",zh:"她的父母非常严格，经常制定关于她行为方式的规矩。",A:"lie",B:"lies",C:"lay",D:"lays",ans:"C"},
  {id:55,en:"To tell you the truth I shouldn't be _____ up here on top of this large statue of Field Marshal Smith.",zh:"老实说，我不应该栖坐在菲尔德元帅史密斯的大雕像顶部。",A:"caught",B:"catching",C:"cornered",D:"perched",ans:"D"},
  {id:56,en:"Tell us something about your _____ in the engineering industry?",zh:"请告诉我们一些关于您在工程行业的背景经历？",A:"foreground",B:"background",C:"knowledge",D:"history",ans:"B"},
  {id:57,en:"Designing and building electronic circuits to solve _____ problems is the mandate of electronics engineering.",zh:"设计和制造电子电路以解决实际问题是电子工程的使命。",A:"parallel",B:"practical",C:"partial",D:"production",ans:"B"},
  {id:58,en:"Well _____! This is a very good piece of work.",zh:"做得好！这是一项非常好的工作。",A:"made",B:"done",C:"finished",D:"taken",ans:"B"},
  {id:59,en:"They really need to keep a check on the stationery supplies as they've run _____ A4 paper once again.",zh:"他们真的需要检查一下文具供应，因为他们又用完了A4纸。",A:"in to",B:"up for",C:"out of",D:"up to",ans:"C"},
  {id:60,en:"While the top corporate tax rate was cut, deductions for capital expenditures were severely _____, and as a result the effective tax rate for many corporations rose.",zh:"虽然最高企业税率被削减，但资本支出的扣除被大幅削减，因此许多企业的实际税率上升了。",A:"amended",B:"curtailed",C:"examined",D:"extended",ans:"B"},
  {id:61,en:"Nothing in the world will ever make me change my _____ on that subject.",zh:"世界上没有任何事情能让我改变想法。",A:"thought",B:"mind",C:"idea",D:"heart",ans:"B"},
  {id:62,en:"An error in _____ is committed when the financial statements include an item that should not be included.",zh:"当财务报表包含不应包含的项目时，会犯有效性错误。",A:"accuracy",B:"auditing",C:"completeness",D:"validity",ans:"D"},
  {id:63,en:"Delivering a negative message is difficult, even when it is spoken face-to-face, _____ is almost guaranteed when it's received by email.",zh:"传递负面信息是困难的，即使是面对面说，当通过电子邮件接收时，防御性反应几乎是必然的。",A:"decisiveness",B:"defensiveness",C:"derisiveness",D:"discursiveness",ans:"B"},
  {id:64,en:"The great advantage of having an external zip drive is that you can use it as an extra means of _____.",zh:"拥有外置zip驱动器的最大优势是可以将其用作额外的存储手段。",A:"hoarding",B:"keeping",C:"holding",D:"storage",ans:"D"},
  {id:65,en:"There are now only ten minutes remaining for you to make your _____ and go to the checkout.",zh:"你还有十分钟时间完成购物并前往收银台。",A:"purchases",B:"buying",C:"sales",D:"selling",ans:"A"},
  {id:66,en:"You've clearly got _____ and it's obvious that you'll get to the top.",zh:"你显然很有才华，很明显你会爬到顶端。",A:"control",B:"power",C:"talent",D:"strength",ans:"C"},
  {id:67,en:"However, mid- and small-cap stock returns tend to be more _____ than the returns of large-cap stocks.",zh:"然而，中小盘股的回报往往比大盘股的回报更具波动性。",A:"vaporous",B:"volatile",C:"voluminous",D:"voracious",ans:"B"},
  {id:68,en:"The competition between Microsoft and Oracle isn't only about business software. Both companies are _____ to be platform companies.",zh:"微软和甲骨文之间的竞争不仅仅是关于商业软件。两家公司都在努力成为平台公司。",A:"starving",B:"straining",C:"stretching",D:"striving",ans:"D"},
  {id:69,en:"No effort has been made to write to me and keep me _____ to date.",zh:"没有人努力给我写信让我保持信息及时更新。",A:"on",B:"up",C:"in",D:"over",ans:"B"},
  {id:70,en:"That's really not my concern at all and I'm certainly not _____ the business of telling others what to do.",zh:"那根本不是我关心的事，我当然不从事指导别人该做什么的行业。",A:"in",B:"out",C:"of",D:"by",ans:"A"},
  {id:71,en:"What on earth are you talking about? I can't make head or _____ of it.",zh:"你到底在说什么？我完全摸不着头绪。",A:"tail",B:"end",C:"finish",D:"part",ans:"A"},
  {id:72,en:"It's useful when you go to an auction if you're ready with cash in _____.",zh:"去拍卖会时，如果你随时准备好手边的现金会很有用。",A:"pocket",B:"purse",C:"case",D:"hand",ans:"D"},
  {id:73,en:"I have great _____ for them at this time because I have had a similar experience.",zh:"我非常同情他们此时的处境，因为我有过类似的经历。",A:"sincerity",B:"sympathy",C:"sorrow",D:"sadness",ans:"B"},
  {id:74,en:"If you cannot get a job and remain _____ for a long period, you can claim some money from the state.",zh:"如果你找不到工作，长期处于失业状态，你可以向国家申请一些钱。",A:"unengaged",B:"unattached",C:"unemployed",D:"unused",ans:"C"},
  {id:75,en:"I'm afraid to tell you that your standard of work has fallen well below what we think is _____.",zh:"我很遗憾地告诉你，你的工作水平已远低于我们认为可以接受的标准。",A:"considerable",B:"believable",C:"acceptable",D:"available",ans:"C"},
  {id:76,en:"The impact of consumer behavior on society is also of relevance. For example, aggressive marketing of high fat foods may have serious _____ for the national health.",zh:"消费者行为对社会的影响也很重要。例如，高脂肪食品的激进营销可能对国民健康产生严重后果。",A:"affectations",B:"aftereffects",C:"repercussions",D:"retributions",ans:"C"},
  {id:77,en:"Winning the support of internal _____ can be as important as reaching key external audiences, and will be vital to the success of your communication programme.",zh:"赢得内部利益相关者的支持可能与接触关键外部受众同样重要，对于您的传播计划的成功至关重要。",A:"jobholders",B:"placeholders",C:"stakeholders",D:"stockholders",ans:"C"},
  {id:78,en:"A _____ approach to new ideas is to be welcomed but you do need a strong element of imagination as well.",zh:"欢迎对新想法采取逻辑性的态度，但你也需要强烈的想象力。",A:"physical",B:"fundamental",C:"judgmental",D:"logical",ans:"D"},
  {id:79,en:"In my opinion no one in their right mind would ever go and pay to see a play _____ that.",zh:"在我看来，没有任何头脑正常的人会花钱去看像那样的戏剧。",A:"as",B:"same",C:"more",D:"like",ans:"D"},
  {id:80,en:"You might as well admit it! You haven't a _____ to stand on.",zh:"你还是承认吧！你根本没有任何站得住脚的依据。",A:"foot",B:"arm",C:"hand",D:"leg",ans:"D"},
  {id:81,en:"I think that the main _____ for all this emotion is probably the way you have reacted to the play.",zh:"我认为所有这些情绪的主要原因可能是你对这部戏的反应方式。",A:"ratio",B:"reason",C:"ration",D:"rate",ans:"B"},
  {id:82,en:"A bond is a loan by an investor to the government or a company, which generally promises to pay a specified rate of interest and to repay a certain amount, the _____ value of the bond, at maturity.",zh:"债券是投资者向政府或公司提供的贷款，通常承诺支付特定利率，并在到期时偿还一定金额，即债券的面值。",A:"base",B:"face",C:"initial",D:"official",ans:"B"},
  {id:83,en:"Focus first on the largest costs, since they should have the greatest _____ for reduction.",zh:"首先关注最大的成本，因为它们应该有最大的削减潜力。",A:"potency",B:"potential",C:"prediction",D:"projection",ans:"B"},
  {id:84,en:"The bank will simply not let you _____ any money unless you can prove that you have been in regular employment for at least three years.",zh:"除非你能证明你已经有至少三年的稳定工作，否则银行根本不会让你借款。",A:"lend",B:"loan",C:"borrow",D:"remove",ans:"C"},
  {id:85,en:"You could tell by the _____ he refused to smile that he didn't like the story.",zh:"从他拒绝微笑的方式可以看出他不喜欢这个故事。",A:"method",B:"plan",C:"way",D:"path",ans:"C"},
  {id:86,en:"When accounting values for assets _____ from their underlying market values, some managements take uneconomic actions to protect accounting performance measures.",zh:"当资产的会计价值与其基础市场价值偏离时，一些管理层会采取不经济的行动来保护会计绩效指标。",A:"detract",B:"distract",C:"diverge",D:"divide",ans:"C"},
  {id:87,en:"One of the most popular questions asked of interviewees is to explain their strengths and _____.",zh:"面试中最常见的问题之一是解释你的优势和弱点。",A:"weaknesses",B:"varieties",C:"virtues",D:"variables",ans:"A"},
  {id:88,en:"Thirty years ago this kind of informality would not have been _____.",zh:"三十年前，这种非正式性是不会被容忍的。",A:"withheld",B:"endured",C:"suffered",D:"tolerated",ans:"D"},
  {id:89,en:"The arrangement they have is that all the money that has to be paid in tax out of their earnings comes from their _____ account.",zh:"他们的安排是，他们收入中需要缴税的所有钱都来自他们的联名账户。",A:"joined",B:"conjoined",C:"joined up",D:"joint",ans:"D"},
  {id:90,en:"Since 1993 or if you like within the last _____, there have been many products that have failed because of poor marketing.",zh:"自1993年以来，或者说在过去十年内，有许多产品因营销不善而失败。",A:"period",B:"decade",C:"scale",D:"time",ans:"B"},
  {id:91,en:"Do you want to _____ as a candidate in the local elections?",zh:"你想在地方选举中参选吗？",A:"stand",B:"sit",C:"go",D:"try",ans:"A"},
  {id:92,en:"Sorry the subject is now _____.",zh:"对不起，这个话题现在已经结束了。",A:"closed",B:"locked",C:"done",D:"completed",ans:"A"},
  {id:93,en:"At certain times of the year your shares will _____ a good profit but you must also be prepared for them to go down in value.",zh:"在一年中的某些时候，你的股票会产生可观的利润，但你也必须准备好它们可能贬值。",A:"yield",B:"take up",C:"increase",D:"throw up",ans:"A"},
  {id:94,en:"Cell phones are hand-_____ devices. They are also called wireless or mobile phones.",zh:"手机是手持设备，也被称为无线或移动电话。",A:"carried",B:"crafted",C:"held",D:"made",ans:"C"},
  {id:95,en:"At the end of her first year it was _____ to everyone that as the new boss she had been totally accepted.",zh:"在她第一年结束时，对所有人来说都显而易见，作为新老板，她已经完全被接受了。",A:"obvious",B:"granted",C:"taken",D:"thought",ans:"A"},
  {id:96,en:"They went _____ business shortly after their children had left home and got married.",zh:"他们在孩子离家结婚后不久就进入了自己的生意领域。",A:"out",B:"in",C:"into",D:"on",ans:"C"},
  {id:97,en:"When you take out a loan, you have to pay interest on the amount you _____.",zh:"当你贷款时，你必须支付你所欠金额的利息。",A:"own",B:"lend",C:"owe",D:"take",ans:"C"},
  {id:98,en:"Can you help please because I've lost my way and _____ to get to the shops before closing time?",zh:"请你帮帮我，我迷路了，需要在关门前到达商店。",A:"need",B:"require",C:"request",D:"must",ans:"A"},
  {id:99,en:"He was very keen that we kept in touch and for that reason he handed me his business _____.",zh:"他非常希望我们保持联系，因此他递给了我他的名片。",A:"ticket",B:"paper",C:"card",D:"notice",ans:"C"},
  {id:100,en:"That policeman is getting out his _____ and walking near the statue I'm sitting on.",zh:"那位警察正在拿出他的笔记本，并走近我坐的雕像。",A:"notebook",B:"exercise book",C:"storybook",D:"copybook",ans:"A"}
];

// ── 工具函數 ──
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function highlightBlank(text) {
  return text.replace(/_____/g, '<span class="q-blank">_____</span>');
}

function fillAnswer(text, answer) {
  return text.replace(/_____/, `<span class="q-answer">${answer}</span>`);
}

// ── TAB ──
function showTab(tab) {
  document.getElementById('tab-list').classList.toggle('hidden', tab !== 'list');
  document.getElementById('tab-quiz').classList.toggle('hidden', tab !== 'quiz');
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'list') || (i === 1 && tab === 'quiz'));
  });
  if (tab === 'quiz' && quizState.questions.length === 0) startQuiz();
}

// ── 英文需整句畫底線的慣用語（answer word 以外的完整片語）──
const enPhrases = {
  1: "until the cows come home",
  3: "achieve results",
};

// ── 題目列表 ──
function buildList(data) {
  const container = document.getElementById('qList');
  container.innerHTML = data.map((q, idx) => {
    let fullEn;
    if (enPhrases[q.id]) {
      const filled = q.en.replace(/_____/, q[q.ans]);
      fullEn = filled.replace(enPhrases[q.id], `<span class="q-answer">${enPhrases[q.id]}</span>`);
    } else {
      fullEn = fillAnswer(q.en, q[q.ans]);
    }
    const idiomHtml = idioms[q.id]
      ? `<div class="q-idiom">${idioms[q.id]}</div>`
      : '';
    return `
      <div class="q-item">
        <div class="q-header">
          <span class="q-num">#${idx + 1}</span>
          <span class="q-en">${fullEn}</span>
        </div>
        <div class="q-zh">📖 ${zhKeys[q.id] ? q.zh.replace(zhKeys[q.id], '<span class="q-answer">' + zhKeys[q.id] + '</span>') : q.zh}</div>
        ${idiomHtml}
      </div>`;
  }).join('');
  document.getElementById('listStats').textContent = `共 ${data.length} 题`;
}

function filterList() {
  const kw = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = kw ? questions.filter(q =>
    q.en.toLowerCase().includes(kw) || q.zh.includes(kw) ||
    q.A.toLowerCase().includes(kw) || q.B.toLowerCase().includes(kw) ||
    q.C.toLowerCase().includes(kw) || q.D.toLowerCase().includes(kw)
  ) : shuffleArray(questions);
  buildList(filtered);
}

buildList(shuffleArray(questions));

// ── 隨機練習 ──
const QUIZ_SIZE = 10;
const quizState = { questions: [], current: 0, score: 0, answered: false };

function startQuiz() {
  quizState.questions = shuffleArray(questions).slice(0, QUIZ_SIZE);
  quizState.current = 0;
  quizState.score = 0;
  quizState.answered = false;
  document.getElementById('quizSummary').classList.add('hidden');
  document.getElementById('quizMain').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = quizState.questions[quizState.current];
  const idx = quizState.current;
  const total = QUIZ_SIZE;
  quizState.answered = false;

  document.getElementById('quizProgress').textContent = `第 ${idx+1} 题 / 共 ${total} 题`;
  document.getElementById('scoreBadge').textContent = `得分 ${quizState.score} / ${idx}`;
  document.getElementById('progressBar').style.width = `${(idx/total)*100}%`;
  document.getElementById('quizQNum').textContent = `题号 #${q.id}`;
  document.getElementById('quizQEn').innerHTML = highlightBlank(q.en);
  document.getElementById('quizFeedback').className = 'quiz-feedback';
  document.getElementById('quizFeedback').textContent = '';
  document.getElementById('btnNext').classList.add('hidden');

  // 隨機排序選項
  const opts = shuffleArray(['A','B','C','D']);
  const optsContainer = document.getElementById('quizOpts');
  optsContainer.innerHTML = opts.map((l, i) => {
    const letters = ['A','B','C','D'];
    return `<button class="quiz-opt-btn" onclick="selectAnswer('${l}', this)" data-val="${l}">
      <span class="opt-letter">${letters[i]}</span>${q[l]}
    </button>`;
  }).join('');
}

function selectAnswer(val, btn) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.questions[quizState.current];
  const allBtns = document.querySelectorAll('.quiz-opt-btn');
  allBtns.forEach(b => b.disabled = true);

  const fb = document.getElementById('quizFeedback');
  if (val === q.ans) {
    btn.classList.add('selected-correct');
    quizState.score++;
    fb.className = 'quiz-feedback correct';
    fb.textContent = '✅ 正确！';
  } else {
    btn.classList.add('selected-wrong');
    fb.className = 'quiz-feedback wrong';
    fb.textContent = `❌ 错误！正确答案是：${q.ans}. ${q[q.ans]}`;
    allBtns.forEach(b => {
      if (b.dataset.val === q.ans) b.classList.add('reveal-correct');
    });
  }
  document.getElementById('scoreBadge').textContent = `得分 ${quizState.score} / ${quizState.current+1}`;
  document.getElementById('btnNext').classList.remove('hidden');
}

function nextQuestion() {
  quizState.current++;
  if (quizState.current >= QUIZ_SIZE) {
    showSummary();
  } else {
    renderQuestion();
  }
}

function showSummary() {
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('quizProgress').textContent = `完成！`;
  document.getElementById('scoreBadge').textContent = `得分 ${quizState.score} / ${QUIZ_SIZE}`;
  document.getElementById('quizMain').classList.add('hidden');
  document.getElementById('quizSummary').classList.remove('hidden');
  document.getElementById('sumScore').textContent = quizState.score;
  document.getElementById('sumTotal').textContent = `/ ${QUIZ_SIZE} 题正确`;
  const pct = quizState.score / QUIZ_SIZE;
  let msg = '';
  if (pct === 1) msg = '🏆 满分！太厉害了！';
  else if (pct >= 0.8) msg = '🎉 优秀！继续保持！';
  else if (pct >= 0.6) msg = '👍 不错！还可以再加把劲！';
  else msg = '💪 继续努力，多练习！';
  document.getElementById('sumMsg').textContent = msg;
}

function restartQuiz() {
  startQuiz();
}
