<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CIC 学习资源汇整</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── TOP ACCENT LINE ── */
    .top-bar { height: 3px; background: #e05550; }

    /* ── HERO ── */
    .hero {
      background: #ffffff;
      border-bottom: 1px solid #e8e8e6;
      padding: 44px 48px 36px;
    }
    .hero-content { max-width: 1400px; margin: 0 auto; }

    .hero-eyebrow {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #e05550;
      margin-bottom: 10px;
    }
    .hero-title {
      font-size: clamp(1.5rem, 3.5vw, 2.3rem);
      font-weight: 700;
      line-height: 1.2;
      color: #111;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    .hero-sub {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 28px;
      letter-spacing: 0.04em;
    }
    .hero-controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .search-wrap { position: relative; flex: 1; max-width: 320px; min-width: 180px; }
    .search-wrap svg {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: #ccc; pointer-events: none;
    }
    #searchInput {
      width: 100%; padding: 9px 12px 9px 34px;
      border: 1px solid #e0e0de; border-radius: 3px;
      font-size: 0.85rem; background: #fafaf9; color: #1a1a1a; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    #searchInput::placeholder { color: #bbb; }
    #searchInput:focus { border-color: #e05550; background: #fff; }

    #refreshBtn {
      padding: 9px 16px; background: #fff; color: #666;
      border: 1px solid #e0e0de; border-radius: 3px; font-size: 0.85rem;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    #refreshBtn:hover { border-color: #e05550; color: #e05550; }
    #refreshBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #lastUpdate { font-size: 0.72rem; color: #bbb; align-self: center; letter-spacing: 0.03em; }

    /* ── STICKY FILTER ── */
    .sticky-strip {
      position: sticky; top: 0; z-index: 20;
      background: #fff; border-bottom: 1px solid #e8e8e6;
    }
    #filterBar {
      padding: 10px 48px; display: flex; gap: 6px;
      flex-wrap: wrap; align-items: center;
      max-width: 1400px; margin: 0 auto;
    }
    .filter-label { font-size: 0.7rem; color: #bbb; font-weight: 500; letter-spacing: 0.1em; margin-right: 4px; }
    .filter-btn {
      padding: 4px 13px; border-radius: 2px; border: 1px solid #e0e0de;
      background: transparent; font-size: 0.73rem; cursor: pointer;
      font-weight: 500; color: #666; letter-spacing: 0.04em; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #e05550; color: #e05550; }
    .filter-btn.active { background: #e05550; border-color: #e05550; color: #fff; }

    /* ── COUNT / MAIN ── */
    #countLabel {
      font-size: 0.72rem; color: #bbb;
      padding: 20px 48px 10px; max-width: 1400px; margin: 0 auto; letter-spacing: 0.03em;
    }
    main { padding: 0 48px 64px; max-width: 1400px; margin: 0 auto; }

    /* ── GRID ── */
    #cardGrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    /* ── CARD (Square with cover image) ── */
    .card {
      background: #fff;
      border: 1px solid #e8e8e6;
      border-radius: 6px;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: var(--accent, #ccc);
      box-shadow: 0 8px 28px rgba(0,0,0,0.09);
      transform: translateY(-3px);
    }

    /* cover image area — top 56% */
    .card-cover {
      flex: 0 0 56%;
      overflow: hidden;
      position: relative;
      background: var(--cover-bg, #f0f0ee);
    }
    .card-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, opacity 0.3s;
      opacity: 0;
    }
    .card-cover img.loaded { opacity: 1; }
    .card:hover .card-cover img { transform: scale(1.04); }

    /* colored overlay strip at top of cover */
    .card-cover::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent, #e0e0de);
    }

    /* info area — bottom 44% */
    .card-info {
      flex: 1;
      padding: 11px 14px 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 7px;
    }
    .card-num {
      font-size: 0.6rem;
      font-weight: 600;
      color: #d0d0ce;
      letter-spacing: 0.05em;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .card-badges { display: flex; flex-wrap: nowrap; overflow: hidden; gap: 3px; justify-content: flex-end; }
    .category-badge {
      font-size: 0.57rem; font-weight: 700;
      padding: 2px 7px; border-radius: 2px;
      white-space: nowrap; letter-spacing: 0.04em;
    }

    .card-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: #111;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 0.71rem;
      color: #aaa;
      line-height: 1.4;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: auto;
      padding-top: 6px;
    }
    .card-arrow {
      font-size: 0.82rem; color: #d0d0ce;
      transition: color 0.15s, transform 0.15s;
    }
    .card:hover .card-arrow { color: var(--accent, #e05550); transform: translateX(3px); }

    /* ── EMPTY ── */
    .empty-msg {
      text-align: center; padding: 80px 20px;
      color: #bbb; font-size: 0.88rem; line-height: 2.2;
      grid-column: 1 / -1;
    }

    /* ── SPINNER ── */
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #e0e0de; border-top-color: #e05550;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ADMIN BUTTON ── */
    #adminBtn {
      padding: 9px 14px; background: #fff; color: #bbb;
      border: 1px solid #e0e0de; border-radius: 3px; font-size: 0.85rem;
      cursor: pointer; display: flex; align-items: center; gap: 5px;
      transition: border-color 0.2s, color 0.2s; white-space: nowrap;
    }
    #adminBtn:hover { border-color: #e05550; color: #e05550; }
    #adminBtn.active { background: #e05550; border-color: #e05550; color: #fff; }

    /* ── MODAL OVERLAY ── */
    #pwOverlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.45); align-items: center; justify-content: center;
    }
    #pwOverlay.show { display: flex; }
    #pwBox {
      background: #fff; border-radius: 6px; padding: 32px 28px 24px;
      width: 300px; box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }
    #pwBox h3 { font-size: 0.9rem; font-weight: 700; color: #111; margin-bottom: 6px; }
    #pwBox p  { font-size: 0.75rem; color: #aaa; margin-bottom: 18px; }
    #pwInput {
      width: 100%; padding: 9px 12px; border: 1px solid #e0e0de; border-radius: 3px;
      font-size: 0.88rem; outline: none; margin-bottom: 10px;
      transition: border-color 0.2s;
    }
    #pwInput:focus { border-color: #e05550; }
    #pwError { font-size: 0.73rem; color: #e05550; min-height: 16px; margin-bottom: 14px; }
    .pw-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .pw-btns button {
      padding: 7px 18px; border-radius: 3px; font-size: 0.82rem;
      cursor: pointer; border: 1px solid #e0e0de;
    }
    #pwCancel { background: #fff; color: #666; }
    #pwConfirm { background: #e05550; color: #fff; border-color: #e05550; }
    #pwConfirm:hover { background: #c9413c; }

    @media (max-width: 640px) {
      .hero { padding: 28px 20px 24px; }
      #filterBar, main, #countLabel { padding-left: 20px; padding-right: 20px; }
      #cardGrid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .card-cover { flex: 0 0 46%; }
      .card-info { padding: 7px 10px 8px; }
      .card-top { margin-bottom: 3px; }
      .card-badges { flex-wrap: nowrap; overflow: hidden; }
      .card-desc { display: none; }
    }
  </style>
</head>
<body>

<div class="top-bar"></div>

<div class="hero">
  <div class="hero-content">
    <p class="hero-eyebrow">Learning Resources</p>
    <h1 class="hero-title">学习资源汇整</h1>
    <p class="hero-sub">一站式学习资源导航，持续更新中</p>
    <div class="hero-controls">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="searchInput" type="search" placeholder="搜索名称或描述…" />
      </div>
      <button id="refreshBtn" onclick="loadData()">
        <span id="btnIcon">↺</span> 刷新
      </button>
      <button id="adminBtn" onclick="onAdminClick()" title="管理員模式">🔒 管理員</button>
      <span id="lastUpdate">加载中…</span>
    </div>
  </div>
</div>

<div class="sticky-strip">
  <div id="filterBar">
    <span class="filter-label">标签</span>
    <button class="filter-btn active" data-cat="全部">全部</button>
  </div>
</div>

<div id="countLabel"></div>

<main>
  <div id="cardGrid"></div>
</main>

<!-- 密碼彈窗 -->
<div id="pwOverlay">
  <div id="pwBox">
    <h3>管理員登入</h3>
    <p>輸入密碼以顯示全部項目（含隱藏）</p>
    <input id="pwInput" type="password" placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')pwConfirm()" />
    <div id="pwError"></div>
    <div class="pw-btns">
      <button id="pwCancel" onclick="pwClose()">取消</button>
      <button id="pwConfirm" onclick="pwConfirm()">確認</button>
    </div>
  </div>
</div>

<script>
  const SHEET_ID = '1ityXjFllm-pZKc_UQa3_pFhN-3EmWqBmYkbURECVTZc';

  // 5 英文學習主題圖片（Unsplash 免費授權）
  const COVERS = [
    'https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1456513080510-7bf3a84b82f8?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1497633762265-9d179a990aa6?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1516979187457-637abb4f9353?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1503676260728-1c00da094a0b?w=400&q=75&auto=format&fit=crop',
    'https://images.unsplash.com/photo-1491841573634-28140fc7ced7?w=400&q=75&auto=format&fit=crop',
  ];

  const PALETTE = [
    { accent: '#e05550', bg: '#fef0ef', color: '#9b1f1f' },
    { accent: '#4a7fa5', bg: '#e8f3fa', color: '#1e4d6b' },
    { accent: '#5b9e78', bg: '#eaf5ee', color: '#1f5c36' },
    { accent: '#c47c2e', bg: '#fdf0dc', color: '#7a4a0a' },
    { accent: '#7b60a8', bg: '#f2edf8', color: '#4a2870' },
    { accent: '#c45068', bg: '#fdeef2', color: '#7a1e35' },
    { accent: '#3d8b8b', bg: '#e5f5f5', color: '#1a5555' },
    { accent: '#a06030', bg: '#f8ece0', color: '#5c3010' },
  ];

  let allData = [];
  let activeCategory = '全部';
  let tagColorMap = {};
  let adminMode = false;
  const ADMIN_PW = 'dpucicba';

  function getItemTags(d) {
    return Object.keys(d).filter(k => k.startsWith('標籤') || k.startsWith('标签'))
      .sort().map(k => d[k]).filter(Boolean);
  }

  function render() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const grid  = document.getElementById('cardGrid');
    grid.innerHTML = '';

    const filtered = allData.filter(d => {
      const matchTag = activeCategory === '全部' || getItemTags(d).includes(activeCategory);
      const matchQ   = !query ||
        (d.名稱 || '').toLowerCase().includes(query) ||
        (d.描述 || '').toLowerCase().includes(query);
      const matchShow = adminMode || d.顯示 !== 'FALSE';
      return matchTag && matchShow && matchQ;
    });

    document.getElementById('countLabel').textContent =
      filtered.length ? `共显示 ${filtered.length} 条` : '';

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-msg">找不到匹配的项目</div>';
      return;
    }

    filtered.forEach((d, i) => {
      const hasUrl = d.URL && d.URL.startsWith('http');
      const tags   = getItemTags(d);
      const palette = tags.length ? (tagColorMap[tags[0]] || PALETTE[0]) : PALETTE[i % PALETTE.length];
      const coverSrc = COVERS[i % COVERS.length];

      const tagBadges = tags.map(t => {
        const c = tagColorMap[t] || { bg: '#f0f0ee', color: '#666' };
        return `<span class="category-badge" style="background:${c.bg};color:${c.color}">${esc(t)}</span>`;
      }).join('');

      const card = document.createElement(hasUrl ? 'a' : 'div');
      card.className = 'card';
      card.style.setProperty('--accent', palette.accent);
      card.style.setProperty('--cover-bg', palette.bg);
      if (hasUrl) {
        card.href   = d.URL;
        card.target = '_blank';
        card.rel    = 'noopener noreferrer';
      }

      const num = String(i + 1).padStart(2, '0');
      card.innerHTML = `
        <div class="card-cover">
          <img src="${coverSrc}" loading="lazy" alt="" onload="this.classList.add('loaded')">
        </div>
        <div class="card-info">
          <div class="card-top">
            <span class="card-num">${num}</span>
            <div class="card-badges">${tagBadges}</div>
          </div>
          <div class="card-name">${esc(d.名稱)}</div>
          ${d.描述 ? `<div class="card-desc">${esc(d.描述)}</div>` : ''}
          <div class="card-footer">
            <span class="card-arrow">${hasUrl ? '→' : ''}</span>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildFilters(data) {
    const tagSet = new Set();
    data.forEach(d => getItemTags(d).forEach(t => tagSet.add(t)));
    const tags = [...tagSet];
    tagColorMap = {};
    tags.forEach((tag, i) => { tagColorMap[tag] = PALETTE[i % PALETTE.length]; });

    const bar = document.getElementById('filterBar');
    bar.querySelectorAll('[data-cat]:not([data-cat="全部"])').forEach(el => el.remove());
    const allBtn = bar.querySelector('[data-cat="全部"]');

    tags.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.cat = tag;
      btn.textContent = tag;
      allBtn.insertAdjacentElement('afterend', btn);
    });

    bar.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });
  }

  let _loadTimer = null;

  function onLoadError(msg) {
    document.getElementById('cardGrid').innerHTML =
      `<div class="empty-msg">无法加载数据：${msg}</div>`;
    document.getElementById('lastUpdate').textContent = '加载失败';
    const btn = document.getElementById('refreshBtn');
    if (btn) btn.disabled = false;
    const ic = document.getElementById('btnIcon');
    if (ic) ic.outerHTML = '<span id="btnIcon">↺</span>';
  }

  window.google = window.google || {};
  window.google.visualization = window.google.visualization || {};
  window.google.visualization.Query = window.google.visualization.Query || {};
  window.google.visualization.Query.setResponse = function(data) {
    if (_loadTimer) clearTimeout(_loadTimer);
    const btn = document.getElementById('refreshBtn');
    try {
      if (data.status !== 'ok')
        throw new Error(data.errors?.[0]?.detailed_message || '表格返回错误');

      const cols = data.table.cols.map(c => c.label);
      allData = data.table.rows.map(row => {
        const obj = {};
        cols.forEach((h, i) => {
          const cell = row.c[i];
          if (!cell || cell.v === null || cell.v === undefined) obj[h] = '';
          else if (typeof cell.v === 'boolean') obj[h] = cell.v ? 'TRUE' : 'FALSE';
          else obj[h] = String(cell.v);
        });
        return obj;
      });

      buildFilters(allData);
      render();
      document.getElementById('lastUpdate').textContent =
        `共 ${allData.length} 条 · ${new Date().toLocaleTimeString('zh-CN')} 更新`;
    } catch (e) {
      onLoadError(e.message);
    } finally {
      if (btn) btn.disabled = false;
      const ic = document.getElementById('btnIcon');
      if (ic) ic.outerHTML = '<span id="btnIcon">↺</span>';
    }
  };

  function loadData() {
    const btn  = document.getElementById('refreshBtn');
    const icon = document.getElementById('btnIcon');
    btn.disabled = true;
    icon.outerHTML = '<span id="btnIcon" class="spinner"></span>';

    const old = document.getElementById('__sheetsScript');
    if (old) old.remove();
    if (_loadTimer) clearTimeout(_loadTimer);
    _loadTimer = setTimeout(() => onLoadError('请求超时，请确认网络连接'), 10000);

    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&t=${Date.now()}`;
    const script = document.createElement('script');
    script.id  = '__sheetsScript';
    script.src = url;
    script.onerror = () => {
      clearTimeout(_loadTimer);
      onLoadError('无法连接 Google Sheets，请确认表格已设为公开');
    };
    document.head.appendChild(script);
  }

  function onAdminClick() {
    if (adminMode) {
      adminMode = false;
      const btn = document.getElementById('adminBtn');
      btn.classList.remove('active');
      btn.textContent = '🔒 管理員';
      render();
    } else {
      document.getElementById('pwInput').value = '';
      document.getElementById('pwError').textContent = '';
      document.getElementById('pwOverlay').classList.add('show');
      setTimeout(() => document.getElementById('pwInput').focus(), 50);
    }
  }

  function pwConfirm() {
    const val = document.getElementById('pwInput').value;
    if (val === ADMIN_PW) {
      adminMode = true;
      const btn = document.getElementById('adminBtn');
      btn.classList.add('active');
      btn.textContent = '🔓 管理員';
      pwClose();
      render();
    } else {
      document.getElementById('pwError').textContent = '密碼錯誤，請再試一次';
      document.getElementById('pwInput').select();
    }
  }

  function pwClose() {
    document.getElementById('pwOverlay').classList.remove('show');
  }

  document.getElementById('pwOverlay').addEventListener('click', function(e) {
    if (e.target === this) pwClose();
  });

  document.getElementById('searchInput').addEventListener('input', render);
  loadData();
</script>
</body>
</html>
