<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1220">
<title>正确介系词搭配 · 学习卡片</title>
<style>
  :root{
    --bg:#0f1220; --bg2:#161b2e; --card:#1c2238; --card2:#222a45;
    --ink:#e8ecf6; --muted:#9aa6c7; --line:#2c3556;
    --acc:#6ea8fe; --acc2:#8b7bff; --good:#3ecf8e; --bad:#ff6b81;
    --n:#6ea8fe; --adj:#f0b35b; --v:#3ecf8e;
    --radius:16px; --safe:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;
    font-family:"Noto Sans SC","PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(900px 500px at 50% -10%,#1b2440 0,transparent 60%),var(--bg);
    color:var(--ink); line-height:1.55; font-size:16px;
  }

  /* ---------- header (mobile-first) ---------- */
  header.top{
    position:sticky; top:0; z-index:20;
    background:rgba(15,18,32,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:calc(10px + env(safe-area-inset-top,0px)) 14px 10px;
  }
  h1{margin:0; font-size:18px; letter-spacing:.3px}
  .sub{color:var(--muted); font-size:12px; margin-top:2px}
  .controls{margin-top:10px; display:flex; flex-direction:column; gap:8px}
  .search{
    display:flex; align-items:center; gap:8px;
    background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:10px 12px;
  }
  .search input{
    flex:1; background:transparent; border:0; color:var(--ink); font-size:16px; outline:none;
  }
  .tabrow{display:flex; align-items:center; gap:8px}
  .tabs{
    display:flex; gap:8px; overflow-x:auto; flex:1;
    scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:2px;
  }
  .tabs::-webkit-scrollbar{display:none}
  .tab{
    cursor:pointer; user-select:none; white-space:nowrap;
    padding:9px 15px; border-radius:999px;
    background:var(--bg2); border:1px solid var(--line); color:var(--muted); font-size:14px;
  }
  .tab.active{color:#fff; border-color:var(--acc); background:linear-gradient(135deg,var(--acc),var(--acc2))}
  .count{color:var(--muted); font-size:12px; white-space:nowrap}

  /* ---------- grid: single column on phones ---------- */
  .grid{
    margin:14px auto calc(60px + var(--safe)); padding:0 14px;
    display:grid; gap:12px; grid-template-columns:1fr; max-width:1180px;
  }
  .card{
    background:linear-gradient(180deg,var(--card),var(--card2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:15px 15px 13px; position:relative;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s;
  }
  .card:active{transform:scale(.99)}
  .card .pos{
    position:absolute; top:13px; right:13px; font-size:11px; font-weight:700;
    padding:3px 9px; border-radius:999px; letter-spacing:.4px;
  }
  .pos.n{background:rgba(110,168,254,.18); color:var(--n)}
  .pos.adj{background:rgba(240,179,91,.18); color:var(--adj)}
  .pos.v{background:rgba(62,207,142,.18); color:var(--v)}
  .term{font-size:19px; font-weight:700; padding-right:58px}
  .term .prep{color:var(--acc)}
  .rest{color:var(--muted); font-weight:400; font-size:14px}
  .kk{color:var(--acc2); font-size:14px; margin-top:2px}
  .cn{margin-top:7px; font-size:15px}
  .sa{display:flex; gap:8px; flex-wrap:wrap; margin-top:9px; font-size:12px}
  .chip{padding:3px 9px; border-radius:8px; border:1px solid var(--line); background:var(--bg2)}
  .chip.syn b{color:var(--good)} .chip.ant b{color:var(--bad)}
  .ex{margin-top:10px; padding-top:9px; border-top:1px dashed var(--line); font-size:14px}
  .ex .hl{color:#fff; background:rgba(110,168,254,.22); padding:0 4px; border-radius:5px}
  .tr{color:var(--muted); font-size:13px; margin-top:3px}

  /* quiz launcher */
  .quizcard{
    grid-column:1/-1; cursor:pointer; text-align:center;
    background:linear-gradient(135deg,#2a2160,#1b3a63);
    border:1px solid #3a466e; padding:20px;
  }
  .quizcard:active{transform:scale(.99)}
  .quizcard h2{margin:2px 0 3px; font-size:19px}
  .quizcard p{margin:0; color:#cdd6f4; font-size:13px}
  .quizcard .big{font-size:30px}

  /* ---------- modal: bottom sheet on phones ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(6,8,16,.72); backdrop-filter:blur(4px);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .overlay.show{display:flex; animation:fade .15s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{
    width:100%; max-width:560px;
    background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line); border-radius:22px 22px 0 0;
    padding:18px 18px calc(18px + var(--safe));
    box-shadow:0 -20px 60px rgba(0,0,0,.5); animation:slideup .2s ease;
    max-height:92vh; overflow-y:auto;
  }
  @keyframes slideup{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .grab{width:38px; height:4px; border-radius:99px; background:var(--line); margin:0 auto 12px}
  .qhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px}
  .score{font-size:13px; color:var(--muted)}
  .close{cursor:pointer; color:var(--muted); font-size:26px; line-height:1; border:0; background:none; padding:0 4px}
  .qtype{font-size:12px; color:var(--acc); letter-spacing:.5px}
  .qtext{font-size:22px; font-weight:700; margin:8px 0 4px; line-height:1.35}
  .qhint{color:var(--muted); font-size:14px; margin-bottom:14px}
  .opts{display:grid; gap:10px}
  .opt{
    cursor:pointer; text-align:left; padding:14px; border-radius:12px; font-size:17px;
    background:var(--card2); border:1px solid var(--line); color:var(--ink); transition:.12s;
  }
  .opt:active{transform:scale(.99)}
  .opt.correct{background:rgba(62,207,142,.18); border-color:var(--good); color:#bff5dc}
  .opt.wrong{background:rgba(255,107,129,.16); border-color:var(--bad); color:#ffd3da}
  .opt:disabled{cursor:default}
  .feedback{margin-top:13px; font-size:14px; min-height:18px}
  .feedback .ok{color:var(--good)} .feedback .no{color:var(--bad)}
  .feedback .meta{color:var(--muted); display:block; margin-top:4px}
  .nextbtn{
    margin-top:14px; width:100%; padding:14px; border-radius:12px; cursor:pointer;
    background:linear-gradient(135deg,var(--acc),var(--acc2)); color:#fff; border:0;
    font-size:16px; font-weight:700;
  }
  .nextbtn:disabled{opacity:.4; cursor:default}
  footer{color:var(--muted); text-align:center; font-size:12px; padding:0 18px calc(34px + var(--safe))}

  /* ---------- larger screens: progressive enhancement ---------- */
  @media (min-width:560px){
    h1{font-size:20px}
    .controls{flex-direction:row; flex-wrap:wrap; align-items:center}
    .search{flex:1 1 260px}
    .tabrow{flex:1 1 100%; order:3}
    .grid{grid-template-columns:repeat(2,1fr); gap:14px; padding:0 18px}
    .card:hover{transform:translateY(-3px); box-shadow:0 10px 30px rgba(0,0,0,.35); border-color:#3a466e}
    .overlay{align-items:center; padding:18px}
    .modal{border-radius:20px; animation:none}
    .grab{display:none}
  }
  @media (min-width:960px){
    .grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>
<header class="top">
  <h1>正确介系词搭配 · 学习卡片</h1>
  <div class="sub">名词 / 形容词 / 动词，共 <span id="total"></span> 条搭配</div>

    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
    <button class="nextbtn" id="next" disabled>下一题 →</button>
  </div>
</div>

"stem": "recover ____", "ans": ["from"]}, {"cat": "v", "catName": "动词", "core": "repent of", "rest": "(folly)", "pos": "v.", "kk": "[rɪˋpɛnt]", "cn": "后悔、悔悟", "syn": "regret, rue", "ant": "—", "ex": "He <span class=\"hl\">repented of</span> his sins.", "tr": "他为自己的罪过忏悔。", "stem": "repent ____", "ans": ["of"]}, {"cat": "v", "catName": "动词", "core": "smile at", "rest": "(a person's threats)", "pos": "v.", "kk": "[smaɪl]", "cn": "对…一笑置之、嘲笑", "syn": "deride, scoff at", "ant": "fear, heed", "ex": "She <span class=\"hl\">smiled at</span> his threats.", "tr": "她对他的威胁一笑置之。", "stem": "smile ____", "ans": ["at"]}, {"cat": "v", "catName": "动词", "core": "smile on", "rest": "(a person)", "pos": "v.", "kk": "[smaɪl]", "cn": "眷顾、惠及", "syn": "favour, bless", "ant": "frown on", "ex": "Fortune <span class=\"hl\">smiled on</span> him.", "tr": "命运眷顾了他。", "stem": "smile ____", "ans": ["on"]}, {"cat": "v", "catName": "动词", "core": "stand on", "rest": "(one's dignity)", "pos": "v.", "kk": "[stænd]", "cn": "坚持、讲究", "syn": "insist on, assert", "ant": "waive, forgo", "ex": "He <span class=\"hl\">stands on</span> his rights.", "tr": "他坚持自己的权利。", "stem": "stand ____", "ans": ["on"]}, {"cat": "v", "catName": "动词", "core": "struggle against", "rest": "(difficulties)", "pos": "v.", "kk": "[ˋstrʌgl̩]", "cn": "与…抗争", "syn": "fight, contend", "ant": "yield, surrender", "ex": "They <span class=\"hl\">struggled against</span> poverty.", "tr": "他们与贫困抗争。", "stem": "struggle ____", "ans": ["against"]}, {"cat": "v", "catName": "动词", "core": "submit to", "rest": "(authority)", "pos": "v.", "kk": "[səbˋmɪt]", "cn": "服从、屈服于", "syn": "yield, surrender", "ant": "resist, defy", "ex": "He <span class=\"hl\">submitted to</span> their will.", "tr": "他屈从于他们的意愿。", "stem": "submit ____", "ans": ["to"]}, {"cat": "v", "catName": "动词", "core": "urge (a fact) on", "rest": "(one's attention)", "pos": "v.", "kk": "[ɝdʒ]", "cn": "力促…注意", "syn": "press, impress on", "ant": "—", "ex": "He <span class=\"hl\">urged</span> the point <span class=\"hl\">on</span> us.", "tr": "他力促我们重视这一点。", "stem": "urge (a fact) ____", "ans": ["on"]}, {"cat": "v", "catName": "动词", "core": "wink at", "rest": "(one's fault)", "pos": "v.", "kk": "[wɪŋk]", "cn": "对…睁一只眼闭一只眼", "syn": "overlook, condone", "ant": "punish, censure", "ex": "The teacher <span class=\"hl\">winked at</span> his lateness.", "tr": "老师对他的迟到视而不见。", "stem": "wink ____", "ans": ["at"]}, {"cat": "v", "catName": "动词", "core": "yearn for", "rest": "(affection)", "pos": "v.", "kk": "[jɝn]", "cn": "渴望、思念", "syn": "long for, crave", "ant": "shun, dread", "ex": "She <span class=\"hl\">yearned for</span> her home.", "tr": "她思念家乡。", "stem": "yearn ____", "ans": ["for"]}, {"cat": "v", "catName": "动词", "core": "yield to", "rest": "(a request)", "pos": "v.", "kk": "[jild]", "cn": "屈服、让步于", "syn": "give in, succumb", "ant": "resist, withstand", "ex": "He <span class=\"hl\">yielded to</span> temptation.", "tr": "他屈服于诱惑。", "stem": "yield ____", "ans": ["to"]}];
const PREPS = ["about", "after", "against", "at", "by", "for", "from", "in", "into", "of", "on", "over", "to", "toward", "towards", "under", "upon", "with"];
const POSCLS = {'n.':'n','adj.':'adj','adj.(分)':'adj','v.':'v'};
document.getElementById('total').textContent = DATA.length;

function highlightPrep(core){
  return core.replace(/\b(of|to|for|with|on|at|into|in|against|over|from|towards?|upon|after|by|about|under)\b(?!\w)/g,
    '<span class="prep">$1</span>');
}
function posClass(p){ return POSCLS[p] || 'n'; }

function cardHTML(d, idx){
  const sa=[];
  if(d.syn && d.syn!=='—') sa.push(`<span class="chip syn"><b>同</b> ${d.syn}</span>`);
  if(d.ant && d.ant!=='—') sa.push(`<span class="chip ant"><b>反</b> ${d.ant}</span>`);
  return `<div class="card" data-cat="${d.cat}" data-i="${idx}">
    <span class="pos ${posClass(d.pos)}">${d.pos}</span>
    <div class="term">${highlightPrep(d.core)} <span class="rest">${d.rest||''}</span></div>
    <div class="kk">${d.kk}</div>
    <div class="cn">${d.cn}</div>
    <div class="sa">${sa.join('')}</div>
    <div class="ex">${d.ex}</div>
    <div class="tr">${d.tr}</div>
  </div>`;
}

const grid=document.getElementById('grid');
const QUIZCARD=`<div class="quizcard" id="quizcard">
    <div class="big">🎯</div><h2>随机练习</h2>
    <p>点此开始！系统会从 ${DATA.length} 条搭配随机出题（填介系词 / 配对词义）</p>
  </div>`;

let curCat='all', curQ='';
function render(){
  const q=curQ.trim().toLowerCase();
  const items=DATA.map((d,i)=>({d,i}))
    .filter(({d})=>curCat==='all'||d.cat===curCat)
    .filter(({d})=>!q||(d.core+d.rest+d.cn+d.syn+d.ant+d.ex+d.tr).toLowerCase().includes(q));
  grid.innerHTML=QUIZCARD+items.map(({d,i})=>cardHTML(d,i)).join('');
  document.getElementById('count').textContent=items.length+' 条';
  document.getElementById('quizcard').onclick=startQuiz;
}
document.getElementById('q').addEventListener('input',e=>{curQ=e.target.value;render();});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelector('.tab.active').classList.remove('active');
  t.classList.add('active'); curCat=t.dataset.cat; render();
});

const overlay=document.getElementById('overlay');
let qn=0, correct=0, answered=false;
const withPrep=DATA.filter(d=>d.ans&&d.ans.length);

function sample(arr,n,exclude){
  const pool=arr.filter(x=>!exclude.includes(x)); const r=[];
  while(r.length<n&&pool.length){r.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);}
  return r;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){qn=0;correct=0;overlay.classList.add('show');document.body.style.overflow='hidden';nextQ();}
function closeQuiz(){overlay.classList.remove('show');document.body.style.overflow='';}
document.getElementById('closeq').onclick=closeQuiz;
overlay.addEventListener('click',e=>{if(e.target===overlay)closeQuiz();});
document.getElementById('next').onclick=nextQ;

function nextQ(){
  answered=false; qn++;
  document.getElementById('feedback').innerHTML='';
  document.getElementById('next').disabled=true;
  (Math.random()<0.6?qPrep:qMeaning)();
  document.getElementById('score').textContent=`第 ${qn} 题　答对 ${correct} / ${qn-1}`;
}
function renderOpts(opts,isCorrect,after){
  const box=document.getElementById('opts'); box.innerHTML='';
  shuffle(opts).forEach(o=>{
    const b=document.createElement('button'); b.className='opt'; b.textContent=o;
    b.onclick=()=>{
      if(answered)return; answered=true;
      const ok=isCorrect(o);
      document.querySelectorAll('.opt').forEach(x=>{x.disabled=true;
        if(isCorrect(x.textContent))x.classList.add('correct');});
      if(!ok)b.classList.add('wrong');
      if(ok)correct++;
      document.getElementById('score').textContent=`第 ${qn} 题　答对 ${correct} / ${qn}`;
      after(ok); document.getElementById('next').disabled=false;
    };
    box.appendChild(b);
  });
}
function qPrep(){
  const d=withPrep[Math.floor(Math.random()*withPrep.length)];
  document.getElementById('qtype').textContent='填入正确介系词';
  document.getElementById('qtext').innerHTML=d.stem.replace('____','<span style="color:var(--acc)">＿＿</span>')
    +` <span class="rest">${d.rest||''}</span>`;
  document.getElementById('qhint').textContent=`${d.cn}　${d.kk}`;
  const ansLower=d.ans.map(a=>a.toLowerCase());
  const opts=[d.ans[0],...sample(PREPS,3,ansLower)];
  renderOpts(opts,o=>ansLower.includes(o.toLowerCase()),ok=>{
    const fb=document.getElementById('feedback'); const all=d.ans.join(' / ');
    fb.innerHTML=(ok?'<span class="ok">✓ 答对！</span>':`<span class="no">✗ 正确答案：${all}</span>`)
      +`<span class="meta">${d.core} ${d.rest||''} — ${d.cn}</span>`
      +`<span class="meta">${d.ex.replace(/<[^>]+>/g,'')}（${d.tr}）</span>`;
  });
}
function qMeaning(){
  const d=DATA[Math.floor(Math.random()*DATA.length)];
  document.getElementById('qtype').textContent='选出对应的搭配';
  document.getElementById('qtext').textContent=d.cn;
  document.getElementById('qhint').innerHTML=`${d.kk}　提示：${d.ex.replace(/<[^>]+>/g,'').replace(new RegExp(d.core,'i'),'＿＿＿')}`;
  const correctLabel=`${d.core} ${d.rest||''}`.trim();
  const distract=sample(DATA.filter(x=>x.cat===d.cat&&x.core!==d.core),3,[])
    .map(x=>`${x.core} ${x.rest||''}`.trim());
  renderOpts([correctLabel,...distract],o=>o===correctLabel,ok=>{
    const fb=document.getElementById('feedback');
    fb.innerHTML=(ok?'<span class="ok">✓ 答对！</span>':`<span class="no">✗ 正确答案：${correctLabel}</span>`)
      +`<span class="meta">${d.ex.replace(/<[^>]+>/g,'')}（${d.tr}）</span>`;
  });
}
render();
</script>
