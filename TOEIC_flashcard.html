<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TOEIC 单词闪卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0;--card:#FFF;--text:#1A1A1A;--muted:#6B6B6B;--hint:#ABABAB;
  --border:#E5E2DB;--accent:#2C5F8A;--accent-lt:#EBF2F8;
  --ok:#2E7D52;--ok-bg:#EAF4EE;--ng:#B53B3B;--ng-bg:#FAECEC;
  --ca:#2E6B1F;--ca-bg:#EBF5E6;--cb:#1A4E7A;--cb-bg:#E6EFF8;--cc:#7A3010;--cc-bg:#F5EAE4;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:1.5rem 1rem}
.app{max-width:700px;margin:0 auto}

.top-header{text-align:center;margin-bottom:1.5rem}
.top-header h1{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:3px}
.top-header p{font-size:12px;color:var(--hint)}

.tabs{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card);margin-bottom:1.5rem}
.tab-btn{flex:1;padding:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:hover:not(.active){background:var(--accent-lt);color:var(--accent)}

/* progress bar only, no label */
.progress-wrap{margin-bottom:1.1rem}
.progress-bar{width:100%;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}

/* nav — prev / next only, no counter */
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.nav-btn{padding:8px 18px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:default}
.shuffle-btn{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.shuffle-btn:hover{border-color:var(--accent);color:var(--accent)}

/* card */
.scene{width:100%;height:330px;perspective:1200px;cursor:pointer;margin-bottom:.75rem}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--border);background:var(--card)}
.front{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;gap:.4rem}
.cefr-pill{font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;margin-bottom:.4rem}
.ca{background:var(--ca-bg);color:var(--ca)}
.cb{background:var(--cb-bg);color:var(--cb)}
.cc{background:var(--cc-bg);color:var(--cc)}
.word-main{font-family:'DM Serif Display',serif;font-size:44px;line-height:1.1;text-align:center}
.phonetic{font-family:'DM Mono',monospace;font-size:14px;color:var(--muted)}
.pos-pill{font-size:11px;color:var(--hint);border:1px solid var(--border);padding:2px 10px;border-radius:99px}
.speak-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--muted);cursor:pointer;margin-top:.6rem;transition:all .15s}
.speak-btn:hover{border-color:var(--accent);color:var(--accent)}
.flip-hint{font-size:11px;color:var(--hint);margin-top:.3rem}
.back{transform:rotateY(180deg);padding:1.4rem 1.75rem;overflow-y:auto}
.back-top{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.back-word{font-family:'DM Serif Display',serif;font-size:20px}
.back-ph{font-family:'DM Mono',monospace;font-size:11px;color:var(--hint)}
.zh-main{font-size:22px;font-weight:300;margin:8px 0 12px}
.divider{width:100%;height:1px;background:var(--border);margin:6px 0}
.lbl{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--hint);margin-bottom:4px;margin-top:8px}
.ex-en{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:3px}
.ex-zh{font-size:12px;color:var(--hint);line-height:1.65}
.tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.tag{font-size:11px;padding:2px 9px;border-radius:99px}
.syn{background:var(--ok-bg);color:var(--ok)}
.ant{background:var(--ng-bg);color:var(--ng)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* quiz */
.quiz-wrap{display:flex;flex-direction:column;align-items:center}
.q-progress-wrap{width:100%;margin-bottom:1.25rem}
.q-progress-bar{width:100%;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.q-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s}
.q-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem 2rem 1.75rem;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.q-label{font-size:11px;color:var(--hint);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:.75rem}
.q-word{font-family:'DM Serif Display',serif;font-size:38px;line-height:1.1;margin-bottom:.3rem}
.q-phonetic{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.q-opt{padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);cursor:pointer;text-align:center;transition:all .15s;line-height:1.4}
.q-opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.q-opt.correct{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);font-weight:500}
.q-opt.wrong{background:var(--ng-bg);border-color:var(--ng);color:var(--ng);font-weight:500}
.q-opt:disabled{cursor:default}
.q-feedback{margin-top:1.25rem;padding:12px 14px;border-radius:10px;font-size:13px;line-height:1.6;display:none}
.q-feedback.show{display:block}
.q-feedback.ok{background:var(--ok-bg);color:var(--ok)}
.q-feedback.ng{background:var(--ng-bg);color:var(--ng)}
.q-next-btn{margin-top:1.25rem;width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;display:none}
.q-next-btn.show{display:block}
.q-next-btn:hover{opacity:.85}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.5rem 2rem;margin-bottom:1.25rem;text-align:center}
.score-num{font-family:'DM Serif Display',serif;font-size:64px;color:var(--accent);line-height:1}
.score-sub{font-size:14px;color:var(--muted);margin-top:.5rem}
.result-list{display:flex;flex-direction:column;gap:5px;margin-bottom:1.25rem}
.ri{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border-radius:9px;font-size:13px;text-align:left}
.ri.ok{background:var(--ok-bg)}.ri.ng{background:var(--ng-bg)}
.ri-icon{flex-shrink:0;margin-top:1px}
.ri-word{font-weight:500;margin-bottom:1px}
.ri-detail{font-size:12px;color:var(--muted)}
.retry-btn{padding:11px 32px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.retry-btn:hover{opacity:.85}
</style>
</head>
<body>
<div class="app">
  <div class="top-header">
    <h1>TOEIC 单词闪卡</h1>
    <p>张全吉汇整</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('fc')">📇 闪卡</button>
    <button class="tab-btn" onclick="switchTab('quiz')">✏️ 随机测验</button>
  </div>

  <!-- FLASHCARD -->
  <div id="tab-fc">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">← 上一张</button>
      <button class="shuffle-btn" onclick="reshuffle()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        重新洗牌
      </button>
      <button class="nav-btn" id="nextBtn" onclick="navigate(1)">下一张 →</button>
    </div>
    <div class="scene" onclick="flipCard()">
      <div class="card-inner" id="cardInner">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--hint);margin-top:.5rem">点击卡片翻面查看答案</div>
  </div>

  <!-- QUIZ -->
  <div id="tab-quiz" style="display:none">
    <div class="quiz-wrap">
      <div class="q-progress-wrap">
        <div class="q-progress-bar"><div class="q-progress-fill" id="qProg"></div></div>
      </div>
      <div class="q-card" id="qCard"></div>
    </div>
  </div>
</div>

"phonetic": "/tight/", "pos": "n./v.", "cefr": "B1", "syn": ["strict", "limited"], "ant": ["loose", "flexible"]}, {"word": "tour", "zh": "旅游", "enEx": "The manager gave the investors a tour of the production plant.", "zhEx": "经理带领投资者参观了生产工厂。", "phonetic": "/tour/", "pos": "n./v.", "cefr": "A2", "syn": ["visit", "journey"], "ant": ["stay", "remain"]}, {"word": "traffic", "zh": "交通", "enEx": "Heavy traffic delayed the delivery of the goods by two hours.", "zhEx": "交通拥堵导致货物交付延迟了两个小时。", "phonetic": "/traffic/", "pos": "adj.", "cefr": "B2", "syn": ["congestion", "trade flow"], "ant": ["empty road", "clear"]}, {"word": "transfer", "zh": "转移", "enEx": "She requested a transfer to the London branch of the company.", "zhEx": "她申请调往公司伦敦分公司。", "phonetic": "/transfer/", "pos": "n./v.", "cefr": "B2", "syn": ["move", "relocate"], "ant": ["keep", "remain"]}, {"word": "tray", "zh": "托盘", "enEx": "Please place the used coffee cups on the tray in the kitchen.", "zhEx": "请将用过的咖啡杯放在厨房的托盘上。", "phonetic": "/tray/", "pos": "n./v.", "cefr": "A2", "syn": ["platter", "holder"], "ant": ["loose items", "unorganized"]}, {"word": "triangle", "zh": "三角形", "enEx": "The logo features three small triangles representing our core values.", "zhEx": "该标志由三个小三角形组成，代表我们的核心价值观。", "phonetic": "/triangle/", "pos": "n./v.", "cefr": "B2", "syn": ["three-sided shape", "trio"], "ant": ["circle", "single"]}, {"word": "trust", "zh": "相信", "enEx": "Building trust with your business partners is crucial for success.", "zhEx": "与商业伙伴建立信任对成功至关重要。", "phonetic": "/trust/", "pos": "n./v.", "cefr": "B1", "syn": ["confidence", "rely on"], "ant": ["distrust", "doubt"]}, {"word": "turnover", "zh": "周转", "enEx": "The company is struggling with a high employee turnover rate.", "zhEx": "该公司正面临员工高流动率的困境。", "phonetic": "/turnover/", "pos": "n./v.", "cefr": "B2", "syn": ["revenue", "staff change"], "ant": ["retention", "loss"]}, {"word": "unbiased", "zh": "公正的", "enEx": "The committee will provide an unbiased evaluation of the proposals.", "zhEx": "委员会将对各项提案进行公正的评估。", "phonetic": "/unbiased/", "pos": "n./v.", "cefr": "B2", "syn": ["impartial", "fair"], "ant": ["biased", "partial"]}, {"word": "underestimate", "zh": "低估", "enEx": "We should not underestimate the strength of our competitors.", "zhEx": "我们不应低估竞争对手的实力。", "phonetic": "/underestimate/", "pos": "v.", "cefr": "C1", "syn": ["undervalue", "misjudge"], "ant": ["overestimate", "recognize"]}, {"word": "understatement", "zh": "轻描淡写", "enEx": "To say the project was a failure is an understatement; it was a disaster.", "zhEx": "说这个项目失败都算是轻描淡写了；简直是一场灾难。", "phonetic": "/understatement/", "pos": "n.", "cefr": "C1", "syn": ["minimization", "downplay"], "ant": ["exaggeration", "overstatement"]}, {"word": "upcoming", "zh": "即将到来的", "enEx": "Please prepare the marketing materials for the upcoming trade show.", "zhEx": "请准备即将参加的贸易展览会的宣传材料。", "phonetic": "/upcoming/", "pos": "n./v.", "cefr": "B2", "syn": ["forthcoming", "approaching"], "ant": ["past", "previous"]}, {"word": "update", "zh": "更新", "enEx": "The IT team will update the system software tonight at midnight.", "zhEx": "IT团队将于今晚午夜更新系统软件。", "phonetic": "/update/", "pos": "v.", "cefr": "B1", "syn": ["revise", "upgrade"], "ant": ["ignore", "outdated"]}, {"word": "upgrade", "zh": "升级", "enEx": "We need to upgrade our server to handle the increased web traffic.", "zhEx": "我们需要升级服务器以应对不断增长的网络流量。", "phonetic": "/upgrade/", "pos": "n./v.", "cefr": "B2", "syn": ["improve", "enhance"], "ant": ["downgrade", "reduce"]}, {"word": "urban", "zh": "城市的", "enEx": "Urban development has led to an increase in office rental prices.", "zhEx": "城市发展导致办公楼租金上涨。", "phonetic": "/urban/", "pos": "n./v.", "cefr": "B1", "syn": ["city-based", "metropolitan"], "ant": ["rural", "countryside"]}, {"word": "vaccinate", "zh": "接种疫苗", "enEx": "Many international travelers choose to vaccinate against local diseases.", "zhEx": "许多国际旅行者选择接种疫苗以预防当地疾病。", "phonetic": "/vaccinate/", "pos": "v.", "cefr": "B2", "syn": ["immunize", "protect"], "ant": ["expose", "leave unprotected"]}, {"word": "vacillate", "zh": "动摇", "enEx": "Investors tend to vacillate when the market is unstable.", "zhEx": "市场不稳定时，投资者往往会摇摆不定。", "phonetic": "/vacillate/", "pos": "v.", "cefr": "B2", "syn": ["waver", "hesitate"], "ant": ["decide", "commit"]}, {"word": "various", "zh": "各种各样的", "enEx": "We offer various payment methods to make shopping easier for you.", "zhEx": "我们提供多种支付方式，让您的购物更加便捷。", "phonetic": "/various/", "pos": "adj.", "cefr": "B2", "syn": ["diverse", "multiple"], "ant": ["uniform", "single"]}, {"word": "violation", "zh": "违反", "enEx": "Any violation of the safety rules will result in a heavy fine.", "zhEx": "任何违反安全规则的行为都将受到重罚。", "phonetic": "/violation/", "pos": "n.", "cefr": "B2", "syn": ["breach", "infringement"], "ant": ["compliance", "adherence"]}, {"word": "virtual", "zh": "虚拟的", "enEx": "The team held a virtual meeting to discuss the project status.", "zhEx": "团队召开了一次线上会议，讨论项目进展情况。", "phonetic": "/virtual/", "pos": "n./v.", "cefr": "B2", "syn": ["online", "digital"], "ant": ["physical", "in-person"]}, {"word": "visible", "zh": "可见的", "enEx": "There has been a visible improvement in the quality of our products.", "zhEx": "我们的产品质量有了明显的提升。", "phonetic": "/visible/", "pos": "adj.", "cefr": "B2", "syn": ["apparent", "clear"], "ant": ["hidden", "invisible"]}, {"word": "visit", "zh": "访问", "enEx": "The CEO is scheduled to visit our regional office next week.", "zhEx": "首席执行官计划下周访问我们地区办事处。", "phonetic": "/visit/", "pos": "n./v.", "cefr": "B1", "syn": ["attend", "go to"], "ant": ["avoid", "skip"]}, {"word": "weapon", "zh": "武器", "enEx": "Knowledge is a powerful weapon in competitive business negotiations.", "zhEx": "在竞争激烈的商业谈判中，知识是一项强大的武器。", "phonetic": "/weapon/", "pos": "n./v.", "cefr": "B1", "syn": ["tool of force", "arm"], "ant": ["peace", "defense"]}, {"word": "will", "zh": "将要", "enEx": "The company will announce the annual bonus next Friday.", "zhEx": "公司将于下周五公布年度奖金方案。", "phonetic": "/will/", "pos": "n./v.", "cefr": "A2", "syn": ["determination", "testament"], "ant": ["reluctance", "indecision"]}, {"word": "wire", "zh": "金属丝", "enEx": "Please hide the computer wires under the desk for safety.", "zhEx": "为了安全起见，请将电脑线缆隐藏在桌子下面。", "phonetic": "/wire/", "pos": "n./v.", "cefr": "A2", "syn": ["cable", "transmit"], "ant": ["wireless", "disconnect"]}, {"word": "zip", "zh": "拉链", "enEx": "Make sure the ZIP on your laptop bag is fully closed.", "zhEx": "请确保笔记本电脑包的拉链已完全拉上。", "phonetic": "/zip/", "pos": "n./v.", "cefr": "A2", "syn": ["fasten", "speed"], "ant": ["unzip", "slow down"]}];
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let deck=shuffle(ALL),cur=0,flipped=false;
function cefrCls(c){return c[0]==='A'?'ca':c[0]==='B'?'cb':'cc';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderCard(){
  const w=deck[cur];
  flipped=false;
  document.getElementById('cardInner').classList.remove('flipped');
  document.getElementById('front').innerHTML=`
    <span class="cefr-pill ${cefrCls(w.cefr)}">CEFR ${w.cefr}</span>
    <div class="word-main">${esc(w.word)}</div>
    <div class="phonetic">${esc(w.phonetic)}</div>
    <div class="pos-pill">${esc(w.pos)}</div>
    <button class="speak-btn" onclick="event.stopPropagation();speak('${w.word}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      发音
    </button>
    <div class="flip-hint">点击翻面</div>`;
  document.getElementById('back').innerHTML=`
    <div class="back-top">
      <span class="back-word">${esc(w.word)}</span>
      <span class="cefr-pill ${cefrCls(w.cefr)}" style="margin:0;font-size:10px">${w.cefr}</span>
      <button class="speak-btn" style="padding:2px 9px;margin:0;font-size:11px" onclick="speak('${w.word}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
    </div>
    <div class="back-ph">${esc(w.phonetic)} · ${esc(w.pos)}</div>
    <div class="zh-main">${esc(w.zh)}</div>
    <div class="divider"></div>
    <div class="lbl">例句</div>
    <div class="ex-en">${esc(w.enEx)}</div>
    <div class="ex-zh">${esc(w.zhEx)}</div>
    <div class="divider"></div>
    <div class="two-col">
      <div><div class="lbl">同义词</div><div class="tag-row">${w.syn.map(s=>`<span class="tag syn">${esc(s)}</span>`).join('')}</div></div>
      <div><div class="lbl">反义词</div><div class="tag-row">${w.ant.map(a=>`<span class="tag ant">${esc(a)}</span>`).join('')}</div></div>
    </div>`;
  document.getElementById('prog').style.width=((cur+1)/deck.length*100).toFixed(1)+'%';
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===deck.length-1;
}

function flipCard(){flipped=!flipped;document.getElementById('cardInner').classList.toggle('flipped',flipped);}
function navigate(d){const n=cur+d;if(n<0||n>=deck.length)return;cur=n;renderCard();}
function speak(word){const u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.85;window.speechSynthesis.speak(u);}
function reshuffle(){deck=shuffle(ALL);cur=0;renderCard();}

const Q_TOTAL=10;
let qDeck=[],qIdx=0,qScore=0,qAnswered=false,qLog=[];

function startQuiz(){
  qDeck=shuffle(ALL).slice(0,Q_TOTAL);
  qIdx=0;qScore=0;qLog=[];
  renderQuestion();
}

function renderQuestion(){
  if(qIdx>=Q_TOTAL){renderResult();return;}
  const q=qDeck[qIdx];
  const wrong=shuffle(ALL.filter(w=>w.word!==q.word)).slice(0,3);
  const opts=shuffle([q,...wrong]);
  qAnswered=false;
  document.getElementById('qProg').style.width=(qIdx/Q_TOTAL*100).toFixed(0)+'%';
  document.getElementById('qCard').innerHTML=`
    <div class="q-label">第 ${qIdx+1} 题 · 共 ${Q_TOTAL} 题</div>
    <div class="q-word">${esc(q.word)}</div>
    <div class="q-phonetic">${esc(q.phonetic)} · ${esc(q.pos)}</div>
    <div class="q-options" id="qOpts">
      ${opts.map(o=>`<button class="q-opt" onclick="pickAnswer('${esc(o.zh)}','${esc(q.zh)}')">${esc(o.zh)}</button>`).join('')}
    </div>
    <div class="q-feedback" id="qFeedback"></div>
    <button class="q-next-btn" id="qNextBtn" onclick="nextQuestion()">${qIdx+1<Q_TOTAL?'下一题 →':'查看结果'}</button>`;
}

function pickAnswer(chosen,correct){
  if(qAnswered)return;
  qAnswered=true;
  const isOk=chosen===correct;
  if(isOk)qScore++;
  qLog.push({q:qDeck[qIdx],chosen,correct,ok:isOk});
  document.querySelectorAll('.q-opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b.textContent===chosen&&!isOk)b.classList.add('wrong');
  });
  const fb=document.getElementById('qFeedback');
  fb.className='q-feedback show '+(isOk?'ok':'ng');
  fb.textContent=isOk?'✓ 正确！':'✗ 正确答案是：'+correct;
  document.getElementById('qNextBtn').classList.add('show');
}

function nextQuestion(){qIdx++;renderQuestion();}

function renderResult(){
  document.getElementById('qProg').style.width='100%';
  const pct=Math.round(qScore/Q_TOTAL*100);
  const msg=qScore>=9?'完美！':qScore>=8?'优秀！':qScore>=6?'继续加油！':'再多练习一下 💪';
  const items=qLog.map(l=>`
    <div class="ri ${l.ok?'ok':'ng'}">
      <div class="ri-icon">${l.ok?'✓':'✗'}</div>
      <div><div class="ri-word">${esc(l.q.word)} — ${esc(l.correct)}</div>
      ${!l.ok?`<div class="ri-detail">你的答案：${esc(l.chosen)}</div>`:''}
      </div></div>`).join('');
  document.getElementById('qCard').innerHTML=`
    <div class="score-card">
      <div class="score-num">${qScore}<span style="font-size:28px;color:var(--muted)">/${Q_TOTAL}</span></div>
      <div class="score-sub">正确率 ${pct}% · ${msg}</div>
    </div>
    <div class="result-list">${items}</div>
    <div style="text-align:center"><button class="retry-btn" onclick="startQuiz()">再测一次</button></div>`;
}

function switchTab(t){
  document.getElementById('tab-fc').style.display=t==='fc'?'block':'none';
  document.getElementById('tab-quiz').style.display=t==='quiz'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&t==='fc')||(i===1&&t==='quiz')));
  if(t==='quiz'&&qDeck.length===0)startQuiz();
}

renderCard();
</script>
</body>
</html>
