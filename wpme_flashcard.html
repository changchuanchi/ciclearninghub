ing clever and creative", "chinese": "機智；獨創性；聰明才智", "example": "The students demonstrated remarkable ingenuity in solving the engineering challenge with limited materials.", "example_zh": "學生們在使用有限材料解決工程挑戰時展現出了非凡的創造力。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "naive", "ipa": "naɪˈiv", "pos": "adj.", "definition": "lacking experience or sophistication; innocent and trusting", "chinese": "天真的；幼稚的；缺乏世故的", "example": "It was naive of her to trust a stranger with her personal information over the phone.", "example_zh": "她在電話中信任陌生人並提供個人資訊，這實在是太天真了。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "naivete", "ipa": "naɪˈivte", "pos": "n.", "definition": "the quality of being naive; inexperience", "chinese": "天真；幼稚；缺乏經驗", "example": "His naivete about office politics made him vulnerable to manipulation by senior colleagues.", "example_zh": "他對辦公室政治的天真使他容易被資深同事所操控。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credulous", "ipa": "ˈkrɛdʒələs", "pos": "adj.", "definition": "too ready to believe things; gullible", "chinese": "輕信的；易受騙的", "example": "The credulous investor lost his savings after believing every promise the fraudster made.", "example_zh": "這位輕信他人的投資者在相信了騙子的每一個承諾後，損失了他所有的積蓄。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credulity", "ipa": "krɪˈdjuləti", "pos": "n.", "definition": "the tendency to be too ready to believe", "chinese": "輕信；易受騙的傾向", "example": "Con artists rely on the credulity of their victims to carry out their schemes.", "example_zh": "騙子依靠受害者的輕信來實施他們的詭計。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredulous", "ipa": "ɪnˈkrɛdʒələs", "pos": "adj.", "definition": "unwilling or unable to believe something", "chinese": "不相信的；懷疑的；難以置信的", "example": "She was incredulous when she heard that she had won the lottery on her first attempt.", "example_zh": "當她聽說她第一次嘗試就中了彩票時，她難以置信。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredulity", "ipa": "ˌɪnkrɪˈdjuləti", "pos": "n.", "definition": "the state of being unwilling or unable to believe", "chinese": "不相信；懷疑；難以置信", "example": "The audience greeted the magician's final trick with stunned incredulity.", "example_zh": "觀眾以目瞪口呆的難以置信迎接了魔術師的最後一個把戲。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "gullible", "ipa": "ˈgʌləbəl", "pos": "adj.", "definition": "easily deceived or tricked", "chinese": "容易受騙的；易上當的", "example": "The gullible tourist paid triple the price for a cheap souvenir after being told it was rare.", "example_zh": "這位容易上當的遊客在被告知某件廉價紀念品是稀有品後，花了三倍的價錢購買了它。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "gullibility", "ipa": "ˌgʌləˈbɪləti", "pos": "n.", "definition": "the tendency to be easily deceived", "chinese": "易受騙的傾向；輕信", "example": "His gullibility made him a frequent target for online scams and phone fraud.", "example_zh": "他容易受騙的個性使他頻繁成為網路詐騙和電話詐騙的目標。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credible", "ipa": "ˈkrɛdəbəl", "pos": "adj.", "definition": "able to be believed; convincing", "chinese": "可信的；可靠的；有說服力的", "example": "The witness gave a credible account of the events that matched the physical evidence.", "example_zh": "目擊者對事件給出了與物證相符的可信陳述。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credibility", "ipa": "ˌkrɛdəˈbɪləti", "pos": "n.", "definition": "the quality of being trusted and believed", "chinese": "可信度；信譽；可靠性", "example": "The politician's credibility suffered after he was caught contradicting his earlier statements.", "example_zh": "這位政治人物在被發現與自己早先的聲明相矛盾後，公信力大受損害。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredible", "ipa": "ɪnˈkrɛdəbəl", "pos": "adj.", "definition": "impossible or very difficult to believe", "chinese": "難以置信的；不可思議的", "example": "The rescue team made an incredible effort, working through the night to save the trapped miners.", "example_zh": "救援隊付出了令人難以置信的努力，通宵達旦地工作以拯救被困的礦工。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredibility", "ipa": "ɪnˌkrɛdəˈbɪləti", "pos": "n.", "definition": "the quality of being impossible to believe", "chinese": "難以置信；不可信性", "example": "The incredibility of his alibi made the detective even more suspicious of his involvement.", "example_zh": "他不在場證明的難以置信使偵探對他的涉案更加懷疑。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credo", "ipa": "ˈkrɛdo", "pos": "n.", "definition": "a personal statement of beliefs or aims", "chinese": "信條；信念宣言；個人準則", "example": "Her professional credo was simple: always treat clients with honesty and respect.", "example_zh": "她的職業信條很簡單：始終以誠實和尊重對待客戶。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "creed", "ipa": "krid", "pos": "n.", "definition": "a system of beliefs, especially religious ones", "chinese": "信條；教義；信仰體系", "example": "The organization welcomes members of every race, background, and creed.", "example_zh": "該組織歡迎每個種族、背景和信仰的成員。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credence", "ipa": "ˈkridns", "pos": "n.", "definition": "belief in or acceptance of something as true", "chinese": "相信；信用；（對某事的）採信", "example": "The new evidence lent credence to the theory that had previously been dismissed by scientists.", "example_zh": "新的證據使此前被科學家否定的理論獲得了可信度。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credentials", "ipa": "krɪˈdɛnʃəlz", "pos": "n.", "definition": "documents proving a person's identity, qualifications, or authority", "chinese": "資格證書；憑證；證明文件", "example": "The applicant presented impressive academic credentials along with three glowing references.", "example_zh": "申請者出示了令人印象深刻的學術資歷，以及三封熱情洋溢的推薦信。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "disingenuous", "ipa": "ˌdɪsɪnˈdʒɛnjuəs", "pos": "adj.", "definition": "not candid or sincere; crafty while appearing frank", "chinese": "不坦誠的；表面坦率實則狡猾的；虛偽的", "example": "It was disingenuous of him to pretend he had no idea what the argument was about.", "example_zh": "他假裝不知道爭論是關於什麼的，這是虛偽的行為。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "disingenuousness", "ipa": "ˌdɪsɪnˈdʒɛnjuəsnəs", "pos": "n.", "definition": "the quality of being disingenuous", "chinese": "不坦誠；虛偽；口是心非", "example": "The committee saw through his disingenuousness and rejected his seemingly conciliatory proposal.", "example_zh": "委員會看穿了他的虛偽，拒絕了他看似和解的提案。"}], "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)": [{"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicacious", "ipa": "ˌpɜrspɪˈkeʃəs", "pos": "adj.", "definition": "having a ready insight; shrewd and keen-minded", "chinese": "敏銳的；有洞察力的；精明的", "example": "A perspicacious reader will notice the subtle clues the author plants in the opening chapter.", "example_zh": "敏銳的讀者會注意到作者在開篇所埋下的細微線索。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicacity", "ipa": "ˌpɜrspɪˈkæsəti", "pos": "n.", "definition": "the quality of having a ready insight into things", "chinese": "洞察力；敏銳；精明", "example": "The judge was renowned for her perspicacity in cutting through complex legal arguments to reach the truth.", "example_zh": "這位法官以其在複雜法律論點中洞察真相的敏銳洞察力而聞名。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acumen", "ipa": "əˈkjumən", "pos": "n.", "definition": "the ability to make good judgments; keenness of mind", "chinese": "敏銳；精明；判斷力", "example": "Her business acumen allowed her to identify profitable opportunities that others overlooked.", "example_zh": "她的商業敏銳度使她能夠發現其他人所忽視的盈利機會。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acute", "ipa": "əˈkjut", "pos": "adj.", "definition": "sharp; having or showing a perceptive mind", "chinese": "敏銳的；急性的；尖銳的", "example": "Her acute sense of hearing allowed her to detect the faintest sounds in a quiet room.", "example_zh": "她敏銳的聽覺使她能夠在安靜的房間裡察覺到最微弱的聲音。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acuity", "ipa": "əˈkjuəti", "pos": "n.", "definition": "sharpness of perception, especially of the mind", "chinese": "敏銳；清晰度；（感官或思維的）尖銳", "example": "The surgeon's visual acuity was essential for performing delicate operations under a microscope.", "example_zh": "外科醫師的視覺敏銳度對於在顯微鏡下進行精細手術至關重要。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acupuncture", "ipa": "ˈækjuˌpʌŋktʃər", "pos": "n.", "definition": "the insertion of needles into the body for medical purposes", "chinese": "針灸", "example": "She tried acupuncture to relieve her chronic back pain after conventional treatments failed.", "example_zh": "在傳統治療方法無效後，她嘗試了針灸來緩解她的慢性背痛。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "punctuate", "ipa": "ˈpʌŋktʃuˌet", "pos": "v.", "definition": "to interrupt or add punctuation marks; to occur at intervals", "chinese": "加標點符號；不時打斷；點綴", "example": "His speech was punctuated by long, dramatic pauses that kept the audience in suspense.", "example_zh": "他的演講不時被長時間的戲劇性停頓所打斷，使觀眾保持懸念。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "punctilious", "ipa": "pʌŋkˈtɪliəs", "pos": "adj.", "definition": "showing great attention to proper procedure or formalities", "chinese": "拘謹的；注重禮節的；一絲不苟的", "example": "The punctilious butler ensured every detail of the formal dinner was executed to perfection.", "example_zh": "這位注重禮節的管家確保正式晚宴的每個細節都被完美執行。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "puncture", "ipa": "ˈpʌŋktʃər", "pos": "v/n", "definition": "to make a hole in; a small hole made by a sharp point", "chinese": "刺穿；穿刺；小孔；刺破", "example": "A nail on the road punctured his tire, forcing him to pull over and call for help.", "example_zh": "路上的一根釘子刺穿了他的輪胎，迫使他靠邊停車並呼叫求援。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "pungent", "ipa": "ˈpʌndʒənt", "pos": "adj.", "definition": "having a sharp, strong smell or taste; sharply piercing", "chinese": "辛辣的；刺鼻的；尖銳的", "example": "The pungent smell of garlic filled the kitchen as soon as she began to cook.", "example_zh": "她一開始烹飪，廚房裡就充滿了大蒜的刺鼻氣味。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "pungence / pungency", "ipa": "ˈpʌndʒənsi", "pos": "n.", "definition": "the quality of being pungent", "chinese": "辛辣；刺鼻；尖銳", "example": "The pungency of the aged cheese made it an acquired taste for most people.", "example_zh": "這種陳年乳酪的辛辣刺激味道使大多數人需要時間才能習慣。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicuous", "ipa": "pərˈspɪkjuəs", "pos": "adj.", "definition": "clearly expressed and easy to understand", "chinese": "清晰易懂的；表達明確的", "example": "The teacher's perspicuous explanation of the formula helped even the weakest students understand it.", "example_zh": "老師對公式清晰易懂的解釋幫助了即使是最薄弱的學生也能理解它。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicuity", "ipa": "ˌpɜrspɪˈkjuəti", "pos": "n.", "definition": "the quality of being clearly expressed", "chinese": "清晰；明確；易懂性", "example": "The legal contract was praised for its perspicuity — there was no ambiguous language anywhere.", "example_zh": "這份法律合同因其清晰性而受到稱讚——其中沒有任何含糊不清的語言。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "spectacle", "ipa": "ˈspɛktəkəl", "pos": "n.", "definition": "a visually striking performance or display", "chinese": "奇觀；壯觀的景象；場面", "example": "The fireworks display over the harbor was a breathtaking spectacle that drew thousands of spectators.", "example_zh": "港口上空的煙火表演是一個令人嘆為觀止的奇觀，吸引了數千名觀眾。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "spectator", "ipa": "ˈspɛkˌtetər", "pos": "n.", "definition": "a person who watches an event or show", "chinese": "觀眾；旁觀者", "example": "Thousands of spectators lined the streets to watch the annual parade.", "example_zh": "數千名觀眾沿街排列，觀看年度遊行。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "inspect", "ipa": "ɪnˈspɛkt", "pos": "v.", "definition": "to look carefully at or into; to examine", "chinese": "檢查；視察；仔細查看", "example": "The health inspector arrived to inspect the restaurant's kitchen for hygiene compliance.", "example_zh": "衛生督察員到達餐廳，檢查廚房是否符合衛生規定。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "retrospect", "ipa": "ˈrɛtrəˌspɛkt", "pos": "n.", "definition": "a survey or review of past events", "chinese": "回顧；追憶往事", "example": "In retrospect, she realized that taking that job had been the best decision of her life.", "example_zh": "回顧往事，她意識到接受那份工作是她一生中最好的決定。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "prospect", "ipa": "ˈprɑspɛkt", "pos": "n.", "definition": "the likelihood of something happening; a forward look", "chinese": "前景；展望；可能性", "example": "The prospect of a promotion motivated her to work harder than ever before.", "example_zh": "晉升的前景激勵著她比以往任何時候都更加努力工作。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "prospective", "ipa": "prəˈspɛktɪv", "pos": "adj.", "definition": "expected or likely in the future", "chinese": "未來的；預期的；有望的", "example": "The company invited prospective employees to an open house to learn about available positions.", "example_zh": "公司邀請有意向的求職者參加開放日，以了解現有職位。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspective", "ipa": "ˌɪntrəˈspɛktɪv", "pos": "adj.", "definition": "examining one's own thoughts and feelings", "chinese": "內省的；自我反思的", "example": "After the breakup, she became more introspective and started journaling to process her emotions.", "example_zh": "分手後，她變得更加內省，開始寫日記來處理自己的情緒。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspect", "ipa": "ˌɪntrəˈspɛkt", "pos": "v.", "definition": "to examine one's own mental and emotional processes", "chinese": "內省；自我反省", "example": "He took time to introspect before responding to the criticism, wanting to understand his own motivations.", "example_zh": "他在回應批評之前花時間進行自我反省，想要了解自己的動機。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspection", "ipa": "ˌɪntrəˈspɛkʃən", "pos": "n.", "definition": "the examination of one's own mental and emotional processes", "chinese": "內省；自我反思；自我審視", "example": "Therapy encouraged deep introspection that helped him understand the root causes of his anxiety.", "example_zh": "心理治療鼓勵深刻的自我反思，幫助他了解焦慮症的根本原因。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "circumspect", "ipa": "ˈsɜrkəmˌspɛkt", "pos": "adj.", "definition": "wary and unwilling to take risks; careful and cautious", "chinese": "謹慎的；小心翼翼的；考慮周到的", "example": "A good diplomat must be circumspect in every statement to avoid causing unintended offense.", "example_zh": "一位優秀的外交官在每一個聲明中都必須謹慎，以避免造成意外冒犯。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "circumspection", "ipa": "ˌsɜrkəmˈspɛkʃən", "pos": "n.", "definition": "the quality of being careful to consider all circumstances", "chinese": "謹慎；小心；周全考慮", "example": "The investment required considerable circumspection given the volatile market conditions.", "example_zh": "鑑於市場的動盪狀況，這項投資需要相當大的謹慎。"}, {"session": "Sessi r deliberating for only two hours.", "example_zh": "陪審團在審議僅兩小時後便達成了一致裁決。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "unanimity", "ipa": "ˌjunəˈnɪməti", "pos": "n.", "definition": "complete agreement among all people involved", "chinese": "全體一致；一致同意；共識", "example": "The board achieved unanimity on the new policy only after several rounds of negotiation.", "example_zh": "董事會在經過幾輪談判後才就新政策達成全體一致。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "equanimity", "ipa": "ˌikwəˈnɪməti", "pos": "n.", "definition": "mental calmness; composure in difficult situations", "chinese": "鎮定；平靜；泰然自若", "example": "She faced the devastating diagnosis with remarkable equanimity, comforting those around her.", "example_zh": "她以非凡的鎮定面對那個毀滅性的診斷結果，安慰著身邊的人。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "animus", "ipa": "ˈænɪməs", "pos": "n.", "definition": "hostility or ill feeling toward someone", "chinese": "敵意；惡意；憤恨", "example": "There was obvious animus between the two former partners that made collaboration impossible.", "example_zh": "這兩位前合夥人之間明顯的敵意使得合作成為不可能。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "animosity", "ipa": "ˌænɪˈmɑsəti", "pos": "n.", "definition": "strong hostility; active hatred or ill will", "chinese": "憎惡；強烈的敵意；仇恨", "example": "Despite years of rivalry, there was surprisingly little personal animosity between the two competitors.", "example_zh": "儘管多年競爭，兩位競爭對手之間個人的憎恨卻出人意料地少。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "versatility", "ipa": "ˌvɜrsəˈtɪləti", "pos": "n.", "definition": "the ability to adapt to many different functions or activities", "chinese": "多才多藝；用途廣泛；適應性強", "example": "The versatility of the young athlete impressed coaches from chinese":"喧鬧的；難以控制的","ipa":"əbˈstrɛpərəs"}]},{"root":"pecus","source":"拉丁","meaning":"cattle（牛、家畜）","examples":[{"word":"impecunious","chinese":"貧窮的；身無分文的","ipa":"ˌɪmpɪˈkjuniəs"},{"word":"pecuniary","chinese":"金錢的；財務的","ipa":"pɪˈkjuniˌɛrɪ"}]},{"root":"cheval","source":"法文","meaning":"horse（馬）","examples":[{"word":"chivalrous","chinese":"俠義的；有騎士風度的","ipa":"ˈʃɪvəlrəs"},{"word":"chivalry","chinese":"騎士精神；俠義","ipa":"ˈʃɪvəlrɪ"}]},{"root":"caballus / caval-","source":"拉丁","meaning":"inferior horse（劣馬）","examples":[{"word":"cavalcade","chinese":"騎馬隊伍；車隊遊行","ipa":"ˈkævəlˌkeɪd"},{"word":"cavalier","chinese":"騎士；傲慢隨意的","ipa":"ˌkævəˈlɪr"},{"word":"cavalry","chinese":"騎兵；騎兵部隊","ipa":"ˈkævəlrɪ"}]},{"root":"~ine","source":"拉丁/英","meaning":"like, similar to（...般的）","examples":[{"word":"leonine","chinese":"獅子般的","ipa":"ˈliəˌnaɪn"},{"word":"canine","chinese":"狗的","ipa":"ˈkeɪˌnaɪn"},{"word":"feline","chinese":"貓的","ipa":"ˈfiˌlaɪn"},{"word":"bovine","chinese":"牛的；遲鈍的","ipa":"ˈboʊˌvaɪn"},{"word":"equine","chinese":"馬的","ipa":"ˈiːkwaɪn"},{"word":"piscine","chinese":"魚的","ipa":"ˈpɪsaɪn"}]},{"root":"bibo","source":"拉丁","meaning":"to drink（喝）","examples":[{"word":"bibulous","chinese":"嗜酒的；善飲的","ipa":"ˈbɪbjʊləs"},{"word":"imbibe","chinese":"飲用；吸收（知識）","ipa":"ɪmˈbaɪb"},{"word":"bib","chinese":"圍兜","ipa":"bɪb"}]},{"root":"cado / cid-","source":"拉丁","meaning":"to fall（落下）","examples":[{"word":"cadaver","chinese":"屍體","ipa":"kəˈdævər"},{"word":"cadaverous","chinese":"死屍般的；蒼白消瘦的","ipa":"kəˈdævərəs"},{"word":"decadent","chinese":"頹廢的；衰落的","ipa":"ˈdɛkədənt"},{"word":"cadence","chinese":"韻律；節奏；終止式","ipa":"ˈkeɪdəns"},{"word":"occidental","chinese":"西方的；歐美的","ipa":"ˌɒksɪˈdɛntəl"}]},{"root":"de-","source":"拉丁","meaning":"down, away from（向下、離開）","examples":[{"word":"decadent","chinese":"頹廢的","ipa":"ˈdɛkədənt"},{"word":"decapitate","chinese":"斬首","ipa":"dɪˈkæpɪˌteɪt"},{"word":"devitalize","chinese":"削弱活力","ipa":"diˈvaɪtlˌaɪz"}]},{"root":"doleo","source":"拉丁","meaning":"to suffer, grieve（受苦、悲痛）","examples":[{"word":"dolorous","chinese":"悲傷的；哀痛的","ipa":"ˈdɒlərəs"},{"word":"dolor","chinese":"悲痛；哀傷","ipa":"ˈdoʊlər"},{"word":"doleful","chinese":"憂鬱的；哀傷的","ipa":"ˈdoʊlfʊl"},{"word":"condole","chinese":"弔唁；表示哀悼","ipa":"kənˈdoʊl"}]},{"root":"noceo","source":"拉丁","meaning":"to injure（傷害）","examples":[{"word":"innocuous","chinese":"無害的；無毒的","ipa":"ɪˈnɒkjuəs"},{"word":"noxious","chinese":"有害的；有毒的","ipa":"ˈnɒkʃəs"},{"word":"innocent","chinese":"無辜的；清白的","ipa":"ˈɪnəsənt"}]},{"root":"pejor","source":"拉丁","meaning":"worse（更差）","examples":[{"word":"pejorative","chinese":"貶義的；帶有輕蔑意味的","ipa":"pɪˈdʒɔrətɪv"}]}]};

const sessionKeys = Object.keys(DATA);
const rootSectionKeys = Object.keys(ROOT_DATA);
let currentSession = null, cards = [], idx = 0;
let mode = 'vocab';
let isRootMode = false;
let touchStartX = 0, touchStartY = 0;

// Touch swipe (left/right to navigate, not flip)
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  if (!document.getElementById('card-screen').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx < 0 ? nextCard() : prevCard();
  }
}, {passive:true});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchMode(m) {
  mode = m;
  document.getElementById('tab-vocab').classList.toggle('active', m === 'vocab');
  document.getElementById('tab-root').classList.toggle('active', m === 'root');
  document.getElementById('vocab-home').style.display = m === 'vocab' ? '' : 'none';
  document.getElementById('root-home').style.display = m === 'root' ? '' : 'none';
}

function buildHome() {
  // Vocab sessions
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessionKeys.forEach(key => {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.innerHTML =
      '<span class="session-item-name">' + key + '</span>' +
      '<span class="session-item-count">' + DATA[key].length + ' 字</span>' +
      '<span class="session-item-arrow">›</span>';
    div.onclick = () => startSession(key);
    list.appendChild(div);
  });
  // Root sections
  const rlist = document.getElementById('root-session-list');
  rlist.innerHTML = '';
  rootSectionKeys.forEach(key => {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.innerHTML =
      '<span class="session-item-name">' + key + '</span>' +
      '<span class="session-item-count">' + ROOT_DATA[key].length + ' 字根</span>' +
      '<span class="session-item-arrow">›</span>';
    div.onclick = () => startRootSession(key);
    rlist.appendChild(div);
  });
}

function goHome() { showScreen('home'); }

function startRandom() { startSession(sessionKeys[Math.floor(Math.random() * sessionKeys.length)]); }
function startRootRandom() { startRootSession(rootSectionKeys[Math.floor(Math.random() * rootSectionKeys.length)]); }
function replaySession() {
  if (isRootMode) startRootSession(currentSession);
  else startSession(currentSession);
}
function doneAgain() {
  if (isRootMode) startRootRandom();
  else startRandom();
}

function startSession(key) {
  isRootMode = false;
  currentSession = key;
  cards = DATA[key].slice();
  idx = 0;
  document.getElementById('session-title').textContent = key;
  renderCard();
  showScreen('card-screen');
  document.getElementById('card-area').scrollTop = 0;
}

function startRootSession(key) {
  isRootMode = true;
  currentSession = key;
  cards = ROOT_DATA[key].slice();
  idx = 0;
  document.getElementById('session-title').textContent = key;
  renderCard();
  showScreen('card-screen');
  document.getElementById('card-area').scrollTop = 0;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard() {
  if (isRootMode) {
    renderRootCard(cards[idx]);
  } else {
    renderVocabCard(cards[idx]);
  }
  const pct = ((idx+1)/cards.length*100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (idx+1) + ' / ' + cards.length;
  document.getElementById('btn-prev').disabled = idx === 0;
  const isLast = idx === cards.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '完成 ✓' : '下一張 ›';
  document.getElementById('card-area').scrollTop = 0;
}

function renderVocabCard(c) {
  const ipaText = c.ipa ? esc(c.ipa) : '';
  document.getElementById('card-content').innerHTML =
    '<div class="c-pos">' + esc(c.pos) + '</div>' +
    '<div class="c-word">' + esc(c.word) + '</div>' +
    '<div class="c-ipa">' +
      (ipaText ? ipaText : '') +
      '<button class="btn-speak" id="btn-speak" onclick="speak()">🔊</button>' +
    '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-def">' + esc(c.definition) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-zh">' + esc(c.chinese) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-label">EXAMPLE</div>' +
    '<div class="c-example">' + esc(c.example) + '</div>' +
    '<div class="c-example-zh">' + esc(c.example_zh) + '</div>';
}

function renderRootCard(c) {
  let examplesHtml = '<div class="c-root-examples">';
  (c.examples || []).forEach(ex => {
    const ipaHtml = ex.ipa ? '<span class="c-root-ipa">' + esc(ex.ipa) + '</span>' : '';
    const wordSafe = ex.word.replace(/'/g, "\\'");
    examplesHtml +=
      '<div class="c-root-ex">' +
        '<div class="c-root-ex-left">' +
          '<span class="c-root-word">' + esc(ex.word) + '</span>' +
          '<div class="c-root-ipa-row">' +
            ipaHtml +
            '<button class="btn-speak-sm" onclick="speakWord(event,\'' + wordSafe + '\')">🔊</button>' +
          '</div>' +
        '</div>' +
        '<span class="c-root-zh">' + esc(ex.chinese) + '</span>' +
      '</div>';
  });
  examplesHtml += '</div>';

  document.getElementById('card-content').innerHTML =
    '<div class="c-pos" style="color:var(--gold)">字根</div>' +
    '<div class="c-word">' + esc(c.root) + '</div>' +
    '<div class="c-root-meta">' + esc(c.source) + ' · ' + esc(c.meaning) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-label" style="color:var(--gold)">EXAMPLES</div>' +
    examplesHtml;
}

function speak() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const c = cards[idx];
  if (!c || !c.word) return;
  const word = c.word.replace(/\s*\(.*?\)/g, '').trim();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  const btn = document.getElementById('btn-speak');
  if (btn) btn.classList.add('speaking');
  utter.onend = utter.onerror = () => { if (btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(utter);
}

function nextCard() {
  if (idx < cards.length - 1) {
    idx++;
    renderCard();
  } else {
    document.getElementById('done-sub').textContent =
      '「' + currentSession + '」· ' + cards.length + ' 個' + (isRootMode ? '字根' : '單字');
    document.getElementById('done-again-btn').textContent =
      isRootMode ? '再來一個字根組' : '再來一個 Session';
    showScreen('done-screen');
  }
}

function prevCard() {
  if (idx > 0) { idx--; renderCard(); }
}

buildHome();

function speakWord(e, word) {
  e.stopPropagation();
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
</script>
</body>
</html>
