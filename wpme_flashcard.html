ood (vivo / vita root family)", "word": "antivivisectionist", "ipa": "ˌæntiˌvɪvɪˈsɛkʃənɪst", "pos": "n.", "definition": "one who opposes vivisection", "chinese": "反对活体解剖者", "example": "The antivivisectionist presented compelling ethical arguments against using animals in laboratory experiments.", "example_zh": "这位反对活体解剖者提出了令人信服的伦理论点，反对在实验室实验中使用动物。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "viviparous", "ipa": "vɪˈvɪpərəs", "pos": "adj.", "definition": "producing live offspring rather than eggs", "chinese": "胎生的；产活幼崽的", "example": "Most mammals are viviparous, giving birth to live young instead of laying eggs.", "example_zh": "大多数哺乳动物是胎生的，直接生出幼崽而不是产卵。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "oviparous", "ipa": "oˈvɪpərəs", "pos": "adj.", "definition": "producing eggs that hatch outside the body", "chinese": "卵生的；产卵的", "example": "Birds and most reptiles are oviparous animals that lay eggs to reproduce.", "example_zh": "鸟类和大多数爬行动物是卵生动物，通过产卵来繁殖。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "oval", "ipa": "ˈovəl", "pos": "adj.", "definition": "egg-shaped", "chinese": "椭圆形的；卵形的", "example": "The architect designed the meeting room with an oval table to encourage equal participation.", "example_zh": "建筑师设计了一个配有椭圆形桌子的会议室，以鼓励平等参与。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovoid", "ipa": "ˈovoɪd", "pos": "adj.", "definition": "having the shape of an egg", "chinese": "卵形的；蛋形的", "example": "The sculptor created an ovoid marble piece that seemed to change shape depending on the angle of view.", "example_zh": "雕塑家创作了一件卵形大理石作品，看起来会随观看角度的不同而改变形状。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovary", "ipa": "ˈovəri", "pos": "n.", "definition": "the female reproductive organ that produces eggs", "chinese": "卵巢", "example": "The surgeon removed the cyst from her ovary using minimally invasive laparoscopic techniques.", "example_zh": "外科医师使用微创腹腔镜技术切除了她卵巢上的囊肿。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovarian", "ipa": "oˈvɛriən", "pos": "adj.", "definition": "of or relating to the ovary", "chinese": "卵巢的", "example": "She was screened for ovarian cancer after her mother was diagnosed with the disease.", "example_zh": "在她母亲被诊断出患有卵巢癌后，她接受了卵巢癌筛查。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovulate", "ipa": "ˈɑvjəˌlet", "pos": "v.", "definition": "to release an egg from the ovary", "chinese": "排卵", "example": "Women typically ovulate once per menstrual cycle, releasing one egg that may be fertilized.", "example_zh": "女性通常在每个月经周期排卵一次，释放一个可能受精的卵子。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovulation", "ipa": "ˌɑvjəˈleʃən", "pos": "n.", "definition": "the process of releasing an egg from the ovary", "chinese": "排卵（过程）", "example": "Tracking ovulation is a common method used by couples trying to conceive.", "example_zh": "追踪排卵期是尝试怀孕的夫妻常用的一种方法。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vital", "ipa": "ˈvaɪtl", "pos": "adj.", "definition": "essential to life; of utmost importance", "chinese": "生死攸关的；至关重要的；充满活力的", "example": "Clean water is vital to the survival of every community, especially in times of drought.", "example_zh": "清洁的水对每个社区的生存都至关重要，尤其是在干旱时期。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vitality", "ipa": "vaɪˈtæləti", "pos": "n.", "definition": "the state of being strong and active; energy", "chinese": "活力；生命力；精力", "example": "Despite being in her eighties, she radiated a vitality that inspired everyone around her.", "example_zh": "尽管已年过八旬，她仍散发出一种鼓舞周围所有人的活力。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vitalize", "ipa": "ˈvaɪtlˌaɪz", "pos": "v.", "definition": "to give life or energy to", "chinese": "赋予活力；使充满生机", "example": "The new management team was brought in to vitalize the struggling company.", "example_zh": "新的管理团队被引入以使这家陷入困境的公司重新充满活力。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "revitalize", "ipa": "riˈvaɪtlˌaɪz", "pos": "v.", "definition": "to give new life or vigor to", "chinese": "使重新焕发活力；振兴", "example": "The government launched a program to revitalize the economy in rural areas.", "example_zh": "政府启动了一项计划，以振兴农村地区的经济。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "devitalize", "ipa": "diˈvaɪtlˌaɪz", "pos": "v.", "definition": "to rob of life or vitality", "chinese": "使失去活力；削弱生命力", "example": "Years of overwork had devitalized him to the point where he could barely get out of bed.", "example_zh": "多年的过度工作使他精力耗尽，几乎连起床都很困难。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vitamin", "ipa": "ˈvaɪtəmɪn", "pos": "n.", "definition": "any of various nutritional substances essential for health", "chinese": "维生素；维他命", "example": "A balanced diet should provide most of the vitamins your body needs without supplements.", "example_zh": "均衡的饮食应能在不需要补充剂的情况下提供身体所需的大多数维生素。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "joie de vivre", "ipa": "ˌʒwɑ də ˈvivrə", "pos": "phrase", "definition": "joy of living; an exuberant delight in being alive", "chinese": "生活的喜悦；对生命的热爱", "example": "Her joie de vivre was infectious — spending time with her always lifted everyone's spirits.", "example_zh": "她对生活的热爱极具感染力——与她共度时光总能振奋所有人的精神。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ennui", "ipa": "ɑnˈwi", "pos": "n.", "definition": "a feeling of boredom, discontent, or weariness", "chinese": "倦怠；无聊；厌倦感", "example": "After years of routine work, a deep ennui settled over him and he longed for change.", "example_zh": "在多年的例行工作之后，一种深深的倦怠感笼罩了他，他渴望改变。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "bon vivant", "ipa": "ˌbɑn vɪˈvɑnt", "pos": "n.", "definition": "a person who lives luxuriously and enjoys fine food and drink", "chinese": "享乐主义者；美食家；追求奢华生活者", "example": "As a true bon vivant, he knew the best restaurants in every city he visited.", "example_zh": "作为一个真正的享乐主义者，他知道他所到访的每个城市中最好的餐厅。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gourmand", "ipa": "ˈgʊrmɑnd", "pos": "n.", "definition": "a person who enjoys eating and often eats to excess", "chinese": "贪吃者；饕餮之徒；美食爱好者（常含过量之意）", "example": "The gourmand worked his way through the entire menu, declaring every dish a masterpiece.", "example_zh": "这位贪吃者把菜单上的每道菜都点遍了，宣称每道菜都是杰作。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gourmet", "ipa": "ˈgʊrmet", "pos": "n.", "definition": "a connoisseur of fine food and drink", "chinese": "美食鉴赏家；老饕", "example": "As a gourmet, she could identify the region and vintage of a wine from a single sip.", "example_zh": "作为一位美食鉴赏家，她只需一口就能辨别出葡萄酒的产区和年份。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gormandize", "ipa": "ˈgɔrməndˌaɪz", "pos": "v.", "definition": "to eat greedily and voraciously", "chinese": "狼吞虎咽；贪婪地大吃", "example": "The children gormandized the holiday feast, leaving the table full of empty plates.", "example_zh": "孩子们狼吞虎咽地吃完了节日大餐，桌上留下了一堆空盘子。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "glutton", "ipa": "ˈglʌtən", "pos": "n.", "definition": "a person who eats excessively; one with an insatiable appetite", "chinese": "贪食者；饕餮；贪得无厌的人", "example": "He was such a glutton that he always ordered two desserts and still went back for more.", "example_zh": "他是个如此贪食的人，总是点两份甜点，然后还要再去拿更多。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gluttonous", "ipa": "ˈglʌtənəs", "pos": "adj.", "definition": "given to eating and drinking to excess", "chinese": "贪食的；暴饮暴食的", "example": "His gluttonous habits at the buffet made his dining companions uncomfortable.", "example_zh": "他在自助餐上的贪食习惯让同桌的食客感到不舒服。"}], "Session 34: Ingenuousness, Belief, Skepticism": [{"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "indefatigability", "ipa": "ˌɪndɪˌfætɪgəˈbɪləti", "pos": "n.", "definition": "the quality of being incapable of fatigue", "chinese": "不知疲倦；孜孜不倦的特质", "example": "Her indefatigability in pursuing justice for her clients earned her a reputation as the city's best attorney.", "example_zh": "她在为委托人追求正义方面的孜孜不倦使她赢得了城市最佳律师的声誉。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "ingenuous", "ipa": "ɪnˈdʒɛnjuəs", "pos": "adj.", "definition": "frank, open, artless; not given to concealment", "chinese": "坦率的；天真的；纯朴的", "example": "His ingenuous questions during the meeting revealed how little he understood the business.", "example_zh": "他在会议上天真的提问揭示了他对这项业务的了解是多么有限。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "ingenuousness", "ipa": "ɪnˈdʒɛnjuəsnəs", "pos": "n.", "definition": "the quality of being frank, open, and artless", "chinese": "坦率；天真；纯朴", "example": "The child's ingenuousness was charming — she said exactly what she thought without any filter.", "example_zh": "这个孩子的天真无邪令人著迷——她毫无保留地直说出自己的想法。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "ingenious", "ipa": "ɪnˈdʒinjəs", "pos": "adj.", "definition": "clever, inventive, and resourceful", "chinese": "机智的；巧妙的；善于创造发明的", "example": "The engineer devised an ingenious solution to reduce water waste in the irrigation system.", "example_zh": "这位工程师设计出了一个巧妙的解决方案，以减少灌溉系统中的水资源浪费。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "ingenuity", "ipa": "ˌɪndʒəˈnjuəti", "pos": "n.", "definition": "the quality of being clever and creative", "chinese": "机智；独创性；聪明才智", "example": "The students demonstrated remarkable ingenuity in solving the engineering challenge with limited materials.", "example_zh": "学生们在使用有限材料解决工程挑战时展现出了非凡的创造力。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "naive", "ipa": "naɪˈiv", "pos": "adj.", "definition": "lacking experience or sophistication; innocent and trusting", "chinese": "天真的；幼稚的；缺乏世故的", "example": "It was naive of her to trust a stranger with her personal information over the phone.", "example_zh": "她在电话中信任陌生人并提供个人资讯，这实在是太天真了。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "naivete", "ipa": "naɪˈivte", "pos": "n.", "definition": "the quality of being naive; inexperience", "chinese": "天真；幼稚；缺乏经验", "example": "His naivete about office politics made him vulnerable to manipulation by senior colleagues.", "example_zh": "他对办公室政治的天真使他容易被资深同事所操控。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credulous", "ipa": "ˈkrɛdʒələs", "pos": "adj.", "definition": "too ready to believe things; gullible", "chinese": "轻信的；易受骗的", "example": "The credulous investor lost his savings after believing every promise the fraudster made.", "example_zh": "这位轻信他人的投资者在相信了骗子的每一个承诺后，损失了他所有的积蓄。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credulity", "ipa": "krɪˈdjuləti", "pos": "n.", "definition": "the tendency to be too ready to believe", "chinese": "轻信；易受骗的倾向", "example": "Con artists rely on the credulity of their victims to carry out their schemes.", "example_zh": "骗子依靠受害者的轻信来实施他们的诡计。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredulous", "ipa": "ɪnˈkrɛdʒələs", "pos": "adj.", "definition": "unwilling or unable to believe something", "chinese": "不相信的；怀疑的；难以置信的", "example": "She was incredulous when she heard that she had won the lottery on her first attempt.", "example_zh": "当她听说她第一次尝试就中了彩票时，她难以置信。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredulity", "ipa": "ˌɪnkrɪˈdjuləti", "pos": "n.", "definition": "the state of being unwilling or unable to believe", "chinese": "不相信；怀疑；难以置信", "example": "The audience greeted the magician's final trick with stunned incredulity.", "example_zh": "观众以目瞪口呆的难以置信迎接了魔术师的最后一个把戏。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "gullible", "ipa": "ˈgʌləbəl", "pos": "adj.", "definition": "easily deceived or tricked", "chinese": "容易受骗的；易上当的", "example": "The gullible tourist paid triple the price for a cheap souvenir after being told it was rare.", "example_zh": "这位容易上当的游客在被告知某件廉价纪念品是稀有品后，花了三倍的价钱购买了它。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "gullibility", "ipa": "ˌgʌləˈbɪləti", "pos": "n.", "definition": "the tendency to be easily deceived", "chinese": "易受骗的倾向；轻信", "example": "His gullibility made him a frequent target for online scams and phone fraud.", "example_zh": "他容易受骗的个性使他频繁成为网路诈骗和电话诈骗的目标。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credible", "ipa": "ˈkrɛdəbəl", "pos": "adj.", "definition": "able to be believed; convincing", "chinese": "可信的；可靠的；有说服力的", "example": "The witness gave a credible account of the events that matched the physical evidence.", "example_zh": "目击者对事件给出了与物证相符的可信陈述。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credibility", "ipa": "ˌkrɛdəˈbɪləti", "pos": "n.", "definition": "the quality of being trusted and believed", "chinese": "可信度；信誉；可靠性", "example": "The politician's credibility suffered after he was caught contradicting his earlier statements.", "example_zh": "这位政治人物在被发现与自己早先的声明相矛盾后，公信力大受损害。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredible", "ipa": "ɪnˈkrɛdəbəl", "pos": "adj.", "definition": "impossible or very difficult to believe", "chinese": "难以置信的；不可思议的", "example": "The rescue team made an incredible effort, working through the night to save the trapped miners.", "example_zh": "救援队付出了令人难以置信的努力，通宵达旦地工作以拯救被困的矿工。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "incredibility", "ipa": "ɪnˌkrɛdəˈbɪləti", "pos": "n.", "definition": "the quality of being impossible to believe", "chinese": "难以置信；不可信性", "example": "The incredibility of his alibi made the detective even more suspicious of his involvement.", "example_zh": "他不在场证明的难以置信使侦探对他的涉案更加怀疑。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credo", "ipa": "ˈkrɛdo", "pos": "n.", "definition": "a personal statement of beliefs or aims", "chinese": "信条；信念宣言；个人准则", "example": "Her professional credo was simple: always treat clients with honesty and respect.", "example_zh": "她的职业信条很简单：始终以诚实和尊重对待客户。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "creed", "ipa": "krid", "pos": "n.", "definition": "a system of beliefs, especially religious ones", "chinese": "信条；教义；信仰体系", "example": "The organization welcomes members of every race, background, and creed.", "example_zh": "该组织欢迎每个种族、背景和信仰的成员。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credence", "ipa": "ˈkridns", "pos": "n.", "definition": "belief in or acceptance of something as true", "chinese": "相信；信用；（对某事的）采信", "example": "The new evidence lent credence to the theory that had previously been dismissed by scientists.", "example_zh": "新的证据使此前被科学家否定的理论获得了可信度。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "credentials", "ipa": "krɪˈdɛnʃəlz", "pos": "n.", "definition": "documents proving a person's identity, qualifications, or authority", "chinese": "资格证书；凭证；证明文件", "example": "The applicant presented impressive academic credentials along with three glowing references.", "example_zh": "申请者出示了令人印象深刻的学术资历，以及三封热情洋溢的推荐信。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "disingenuous", "ipa": "ˌdɪsɪnˈdʒɛnjuəs", "pos": "adj.", "definition": "not candid or sincere; crafty while appearing frank", "chinese": "不坦诚的；表面坦率实则狡猾的；虚伪的", "example": "It was disingenuous of him to pretend he had no idea what the argument was about.", "example_zh": "他假装不知道争论是关于什么的，这是虚伪的行为。"}, {"session": "Session 34: Ingenuousness, Belief, Skepticism", "word": "disingenuousness", "ipa": "ˌdɪsɪnˈdʒɛnjuəsnəs", "pos": "n.", "definition": "the quality of being disingenuous", "chinese": "不坦诚；虚伪；口是心非", "example": "The committee saw through his disingenuousness and rejected his seemingly conciliatory proposal.", "example_zh": "委员会看穿了他的虚伪，拒绝了他看似和解的提案。"}], "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)": [{"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicacious", "ipa": "ˌpɜrspɪˈkeʃəs", "pos": "adj.", "definition": "having a ready insight; shrewd and keen-minded", "chinese": "敏锐的；有洞察力的；精明的", "example": "A perspicacious reader will notice the subtle clues the author plants in the opening chapter.", "example_zh": "敏锐的读者会注意到作者在开篇所埋下的细微线索。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicacity", "ipa": "ˌpɜrspɪˈkæsəti", "pos": "n.", "definition": "the quality of having a ready insight into things", "chinese": "洞察力；敏锐；精明", "example": "The judge was renowned for her perspicacity in cutting through complex legal arguments to reach the truth.", "example_zh": "这位法官以其在复杂法律论点中洞察真相的敏锐洞察力而闻名。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acumen", "ipa": "əˈkjumən", "pos": "n.", "definition": "the ability to make good judgments; keenness of mind", "chinese": "敏锐；精明；判断力", "example": "Her business acumen allowed her to identify profitable opportunities that others overlooked.", "example_zh": "她的商业敏锐度使她能够发现其他人所忽视的盈利机会。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acute", "ipa": "əˈkjut", "pos": "adj.", "definition": "sharp; having or showing a perceptive mind", "chinese": "敏锐的；急性的；尖锐的", "example": "Her acute sense of hearing allowed her to detect the faintest sounds in a quiet room.", "example_zh": "她敏锐的听觉使她能够在安静的房间里察觉到最微弱的声音。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acuity", "ipa": "əˈkjuəti", "pos": "n.", "definition": "sharpness of perception, especially of the mind", "chinese": "敏锐；清晰度；（感官或思维的）尖锐", "example": "The surgeon's visual acuity was essential for performing delicate operations under a microscope.", "example_zh": "外科医师的视觉敏锐度对于在显微镜下进行精细手术至关重要。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "acupuncture", "ipa": "ˈækjuˌpʌŋktʃər", "pos": "n.", "definition": "the insertion of needles into the body for medical purposes", "chinese": "针灸", "example": "She tried acupuncture to relieve her chronic back pain after conventional treatments failed.", "example_zh": "在传统治疗方法无效后，她尝试了针灸来缓解她的慢性背痛。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "punctuate", "ipa": "ˈpʌŋktʃuˌet", "pos": "v.", "definition": "to interrupt or add punctuation marks; to occur at intervals", "chinese": "加标点符号；不时打断；点缀", "example": "His speech was punctuated by long, dramatic pauses that kept the audience in suspense.", "example_zh": "他的演讲不时被长时间的戏剧性停顿所打断，使观众保持悬念。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "punctilious", "ipa": "pʌŋkˈtɪliəs", "pos": "adj.", "definition": "showing great attention to proper procedure or formalities", "chinese": "拘谨的；注重礼节的；一丝不苟的", "example": "The punctilious butler ensured every detail of the formal dinner was executed to perfection.", "example_zh": "这位注重礼节的管家确保正式晚宴的每个细节都被完美执行。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "puncture", "ipa": "ˈpʌŋktʃər", "pos": "v/n", "definition": "to make a hole in; a small hole made by a sharp point", "chinese": "刺穿；穿刺；小孔；刺破", "example": "A nail on the road punctured his tire, forcing him to pull over and call for help.", "example_zh": "路上的一根钉子刺穿了他的轮胎，迫使他靠边停车并呼叫求援。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "pungent", "ipa": "ˈpʌndʒənt", "pos": "adj.", "definition": "having a sharp, strong smell or taste; sharply piercing", "chinese": "辛辣的；刺鼻的；尖锐的", "example": "The pungent smell of garlic filled the kitchen as soon as she began to cook.", "example_zh": "她一开始烹饪，厨房里就充满了大蒜的刺鼻气味。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "pungence / pungency", "ipa": "ˈpʌndʒənsi", "pos": "n.", "definition": "the quality of being pungent", "chinese": "辛辣；刺鼻；尖锐", "example": "The pungency of the aged cheese made it an acquired taste for most people.", "example_zh": "这种陈年乳酪的辛辣刺激味道使大多数人需要时间才能习惯。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicuous", "ipa": "pərˈspɪkjuəs", "pos": "adj.", "definition": "clearly expressed and easy to understand", "chinese": "清晰易懂的；表达明确的", "example": "The teacher's perspicuous explanation of the formula helped even the weakest students understand it.", "example_zh": "老师对公式清晰易懂的解释帮助了即使是最薄弱的学生也能理解它。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "perspicuity", "ipa": "ˌpɜrspɪˈkjuəti", "pos": "n.", "definition": "the quality of being clearly expressed", "chinese": "清晰；明确；易懂性", "example": "The legal contract was praised for its perspicuity — there was no ambiguous language anywhere.", "example_zh": "这份法律合同因其清晰性而受到称赞——其中没有任何含糊不清的语言。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "spectacle", "ipa": "ˈspɛktəkəl", "pos": "n.", "definition": "a visually striking performance or display", "chinese": "奇观；壮观的景象；场面", "example": "The fireworks display over the harbor was a breathtaking spectacle that drew thousands of spectators.", "example_zh": "港口上空的烟火表演是一个令人叹为观止的奇观，吸引了数千名观众。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "spectator", "ipa": "ˈspɛkˌtetər", "pos": "n.", "definition": "a person who watches an event or show", "chinese": "观众；旁观者", "example": "Thousands of spectators lined the streets to watch the annual parade.", "example_zh": "数千名观众沿街排列，观看年度游行。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "inspect", "ipa": "ɪnˈspɛkt", "pos": "v.", "definition": "to look carefully at or into; to examine", "chinese": "检查；视察；仔细查看", "example": "The health inspector arrived to inspect the restaurant's kitchen for hygiene compliance.", "example_zh": "卫生督察员到达餐厅，检查厨房是否符合卫生规定。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "retrospect", "ipa": "ˈrɛtrəˌspɛkt", "pos": "n.", "definition": "a survey or review of past events", "chinese": "回顾；追忆往事", "example": "In retrospect, she realized that taking that job had been the best decision of her life.", "example_zh": "回顾往事，她意识到接受那份工作是她一生中最好的决定。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "prospect", "ipa": "ˈprɑspɛkt", "pos": "n.", "definition": "the likelihood of something happening; a forward look", "chinese": "前景；展望；可能性", "example": "The prospect of a promotion motivated her to work harder than ever before.", "example_zh": "晋升的前景激励著她比以往任何时候都更加努力工作。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "prospective", "ipa": "prəˈspɛktɪv", "pos": "adj.", "definition": "expected or likely in the future", "chinese": "未来的；预期的；有望的", "example": "The company invited prospective employees to an open house to learn about available positions.", "example_zh": "公司邀请有意向的求职者参加开放日，以了解现有职位。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspective", "ipa": "ˌɪntrəˈspɛktɪv", "pos": "adj.", "definition": "examining one's own thoughts and feelings", "chinese": "内省的；自我反思的", "example": "After the breakup, she became more introspective and started journaling to process her emotions.", "example_zh": "分手后，她变得更加内省，开始写日记来处理自己的情绪。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspect", "ipa": "ˌɪntrəˈspɛkt", "pos": "v.", "definition": "to examine one's own mental and emotional processes", "chinese": "内省；自我反省", "example": "He took time to introspect before responding to the criticism, wanting to understand his own motivations.", "example_zh": "他在回应批评之前花时间进行自我反省，想要了解自己的动机。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "introspection", "ipa": "ˌɪntrəˈspɛkʃən", "pos": "n.", "definition": "the examination of one's own mental and emotional processes", "chinese": "内省；自我反思；自我审视", "example": "Therapy encouraged deep introspection that helped him understand the root causes of his anxiety.", "example_zh": "心理治疗鼓励深刻的自我反思，帮助他了解焦虑症的根本原因。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "circumspect", "ipa": "ˈsɜrkəmˌspɛkt", "pos": "adj.", "definition": "wary and unwilling to take risks; careful and cautious", "chinese": "谨慎的；小心翼翼的；考虑周到的", "example": "A good diplomat must be circumspect in every statement to avoid causing unintended offense.", "example_zh": "一位优秀的外交官在每一个声明中都必须谨慎，以避免造成意外冒犯。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "circumspection", "ipa": "ˌsɜrkəmˈspɛkʃən", "pos": "n.", "definition": "the quality of being careful to consider all circumstances", "chinese": "谨慎；小心；周全考虑", "example": "The investment required considerable circumspection given the volatile market conditions.", "example_zh": "鉴于市场的动荡状况，这项投资需要相当大的谨慎。"}, {"session": "Session 35: Perspicacity, Sharpness, Looking (specto / acuo / punctus roots)", "word": "specious", "ipa": "ˈspiʃəs", "pos": "adj.", "definition": "seemingly reasonable or valid but actually wrong or misleading", "chinese": "似是而非的；外表好看却虚假的；貌似有理的", "example": "His specious argument sounded convincing at first, but it fell apart under careful scrutiny.", "example_zh": "他似是而非的论点起初听起来很有说服力，但在仔细审视下却站不住脚。"}], "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)": [{"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "magnanimity", "ipa": "ˌmægnəˈnɪməti", "pos": "n.", "definition": "the quality of being generous and forgiving", "chinese": "宽宏大量；高尚；大度", "example": "His magnanimity in forgiving his rival won him the admiration of the entire community.", "example_zh": "他宽宏大量地原谅了对手，赢得了整个社区的钦佩。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "pusillanimous", "ipa": "ˌpjusəˈlænəməs", "pos": "adj.", "definition": "showing a lack of courage or determination; contemptibly timid", "chinese": "懦弱的；胆小的；缺乏勇气的", "example": "The committee's pusillanimous response to the crisis disappointed citizens who expected bold action.", "example_zh": "委员会对危机懦弱的反应令期待大胆行动的市民感到失望。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "pusillanimity", "ipa": "ˌpjusɪˌlænəˈmɪti", "pos": "n.", "definition": "the quality of being pusillanimous", "chinese": "懦弱；胆怯；缺乏决断力", "example": "The general criticized the soldiers' pusillanimity and demanded they stand their ground.", "example_zh": "将军批评士兵们的懦弱行为，要求他们坚守阵地。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "unanimous", "ipa": "juˈnænəməs", "pos": "adj.", "definition": "(of two or more people) fully in agreement", "chinese": "全体一致的；一致同意的；无异议的", "example": "The jury reached a unanimous verdict after deliberating for only two hours.", "example_zh": "陪审团在审议仅两小时后便达成了一致裁决。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "unanimity", "ipa": "ˌjunəˈnɪməti", "pos": "n.", "definition": "complete agreement among all people involved", "chinese": "全体一致；一致同意；共识", "example": "The board achieved unanimity on the new policy only after several rounds of negotiation.", "example_zh": "董事会在经过几轮谈判后才就新政策达成全体一致。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "equanimity", "ipa": "ˌikwəˈnɪməti", "pos": "n.", "definition": "mental calmness; composure in difficult situations", "chinese": "镇定；平静；泰然自若", "example": "She faced the devastating diagnosis with remarkable equanimity, comforting those around her.", "example_zh": "她以非凡的镇定面对那个毁灭性的诊断结果，安慰著身边的人。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "animus", "ipa": "ˈænɪməs", "pos": "n.", "definition": "hostility or ill feeling toward someone", "chinese": "敌意；恶意；愤恨", "example": "There was obvious animus between the two former partners that made collaboration impossible.", "example_zh": "这两位前合伙人之间明显的敌意使得合作成为不可能。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "animosity", "ipa": "ˌænɪˈmɑsəti", "pos": "n.", "definition": "strong hostility; active hatred or ill will", "chinese": "憎恶；强烈的敌意；仇恨", "example": "Despite years of rivalry, there was surprisingly little personal animosity between the two competitors.", "example_zh": "尽管多年竞争，两位竞争对手之间个人的憎恨却出人意料地少。"}, {"session": "Session 36: Magnanimity, Versatility, Stoicism, City & Country (animus / urbs roots)", "word": "versatility", "ipa": "ˌvɜrsəˈtɪləti", "pos": "n.", "definition": "the ability to adapt to many different functions or activities", "chinese": "多才多艺；用途广泛；适应性强", "example": "The versatility of the young athlete impressed coaches from const sessionKeys = Object.keys(DATA);
const rootSectionKeys = Object.keys(ROOT_DATA);
let currentSession = null, cards = [], idx = 0;
let mode = 'vocab';
let isRootMode = false;
let touchStartX = 0, touchStartY = 0;

// Touch swipe (left/right to navigate, not flip)
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e => {
  if (!document.getElementById('card-screen').classList.contains('active')) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    dx < 0 ? nextCard() : prevCard();
  }
}, {passive:true});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function switchMode(m) {
  mode = m;
  document.getElementById('tab-vocab').classList.toggle('active', m === 'vocab');
  document.getElementById('tab-root').classList.toggle('active', m === 'root');
  document.getElementById('vocab-home').style.display = m === 'vocab' ? '' : 'none';
  document.getElementById('root-home').style.display = m === 'root' ? '' : 'none';
}

function buildHome() {
  // Vocab sessions
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  sessionKeys.forEach(key => {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.innerHTML =
      '<span class="session-item-name">' + key + '</span>' +
      '<span class="session-item-count">' + DATA[key].length + ' 词</span>' +
      '<span class="session-item-arrow">›</span>';
    div.onclick = () => startSession(key);
    list.appendChild(div);
  });
  // Root sections
  const rlist = document.getElementById('root-session-list');
  rlist.innerHTML = '';
  rootSectionKeys.forEach(key => {
    const div = document.createElement('div');
    div.className = 'session-item';
    div.innerHTML =
      '<span class="session-item-name">' + key + '</span>' +
      '<span class="session-item-count">' + ROOT_DATA[key].length + ' 字根</span>' +
      '<span class="session-item-arrow">›</span>';
    div.onclick = () => startRootSession(key);
    rlist.appendChild(div);
  });
}

function goHome() { showScreen('home'); }

function startRandom() { startSession(sessionKeys[Math.floor(Math.random() * sessionKeys.length)]); }
function startRootRandom() { startRootSession(rootSectionKeys[Math.floor(Math.random() * rootSectionKeys.length)]); }
function replaySession() {
  if (isRootMode) startRootSession(currentSession);
  else startSession(currentSession);
}
function doneAgain() {
  if (isRootMode) startRootRandom();
  else startRandom();
}

function startSession(key) {
  isRootMode = false;
  currentSession = key;
  cards = DATA[key].slice();
  idx = 0;
  document.getElementById('session-title').textContent = key;
  renderCard();
  showScreen('card-screen');
  document.getElementById('card-area').scrollTop = 0;
}

function startRootSession(key) {
  isRootMode = true;
  currentSession = key;
  cards = ROOT_DATA[key].slice();
  idx = 0;
  document.getElementById('session-title').textContent = key;
  renderCard();
  showScreen('card-screen');
  document.getElementById('card-area').scrollTop = 0;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderCard() {
  if (isRootMode) {
    renderRootCard(cards[idx]);
  } else {
    renderVocabCard(cards[idx]);
  }
  const pct = ((idx+1)/cards.length*100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (idx+1) + ' / ' + cards.length;
  document.getElementById('btn-prev').disabled = idx === 0;
  const isLast = idx === cards.length - 1;
  document.getElementById('btn-next').textContent = isLast ? '完成 ✓' : '下一张 ›';
  document.getElementById('card-area').scrollTop = 0;
}

function renderVocabCard(c) {
  const ipaText = c.ipa ? esc(c.ipa) : '';
  document.getElementById('card-content').innerHTML =
    '<div class="c-pos">' + esc(c.pos) + '</div>' +
    '<div class="c-word">' + esc(c.word) + '</div>' +
    '<div class="c-ipa">' +
      (ipaText ? ipaText : '') +
      '<button class="btn-speak" id="btn-speak" onclick="speak()">🔊</button>' +
    '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-def">' + esc(c.definition) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-zh">' + esc(c.chinese) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-label">EXAMPLE</div>' +
    '<div class="c-example">' + esc(c.example) + '</div>' +
    '<div class="c-example-zh">' + esc(c.example_zh) + '</div>';
}

function renderRootCard(c) {
  let examplesHtml = '<div class="c-root-examples">';
  (c.examples || []).forEach(ex => {
    const ipaHtml = ex.ipa ? '<span class="c-root-ipa">' + esc(ex.ipa) + '</span>' : '';
    const wordSafe = ex.word.replace(/'/g, "\\'");
    examplesHtml +=
      '<div class="c-root-ex">' +
        '<div class="c-root-ex-left">' +
          '<span class="c-root-word">' + esc(ex.word) + '</span>' +
          '<div class="c-root-ipa-row">' +
            ipaHtml +
            '<button class="btn-speak-sm" onclick="speakWord(event,\'' + wordSafe + '\')">🔊</button>' +
          '</div>' +
        '</div>' +
        '<span class="c-root-zh">' + esc(ex.chinese) + '</span>' +
      '</div>';
  });
  examplesHtml += '</div>';

  document.getElementById('card-content').innerHTML =
    '<div class="c-pos" style="color:var(--gold)">字根</div>' +
    '<div class="c-word">' + esc(c.root) + '</div>' +
    '<div class="c-root-meta">' + esc(c.source) + ' · ' + esc(c.meaning) + '</div>' +
    '<div class="c-line"></div>' +
    '<div class="c-label" style="color:var(--gold)">EXAMPLES</div>' +
    examplesHtml;
}

function speak() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const c = cards[idx];
  if (!c || !c.word) return;
  const word = c.word.replace(/\s*\(.*?\)/g, '').trim();
  const utter = new SpeechSynthesisUtterance(word);
  utter.lang = 'en-US';
  utter.rate = 0.85;
  const btn = document.getElementById('btn-speak');
  if (btn) btn.classList.add('speaking');
  utter.onend = utter.onerror = () => { if (btn) btn.classList.remove('speaking'); };
  window.speechSynthesis.speak(utter);
}

function nextCard() {
  if (idx < cards.length - 1) {
    idx++;
    renderCard();
  } else {
    document.getElementById('done-sub').textContent =
      '「' + currentSession + '」· ' + cards.length + ' 个' + (isRootMode ? '字根' : '单词');
    document.getElementById('done-again-btn').textContent =
      isRootMode ? '再来一个字根组' : '再来一个 Session';
    showScreen('done-screen');
  }
}

function prevCard() {
  if (idx > 0) { idx--; renderCard(); }
}

buildHome();

function speakWord(e, word) {
  e.stopPropagation();
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}
</script>
</body>
</html>
