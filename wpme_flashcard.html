<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Power Made Easy — Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #EDF0FE;
    --surface: #FFFFFF;
    --line: #CDD2EC;
    --text: #111827;
    --text-2: #575E7A;
    --text-3: #8F95AE;
    --accent: #1A1A1A;
    --blue: #4C65E8;
    --green: #1A9060;
    --gold: #9A6800;
    --border: #D4D9EF;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #app {
    background: var(--bg);
    background-image:
      linear-gradient(45deg,  rgba(76,101,232,0.18) 1.5px, transparent 1.5px),
      linear-gradient(-45deg, rgba(76,101,232,0.18) 1.5px, transparent 1.5px);
    background-size: 36px 36px;
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  @media (min-width: 680px) {
    body {
      background: #B4B8D4;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    #app {
      width: min(520px, calc(100vw - 64px));
      height: calc(100vh - 64px);
      border-radius: 28px;
      box-shadow: 0 20px 72px rgba(0,0,0,0.24);
    }
  }

  /* ── Persistent Site Header ── */
  .site-header {
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid rgba(76,101,232,0.14);
    flex-shrink: 0;
    background: rgba(237,240,254,0.65);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .site-title {
    font-size: 1.0rem; font-weight: 800; letter-spacing: 0.01em; color: var(--text);
  }
  .site-sub {
    font-size: 0.72rem; color: var(--text-3); margin-top: 2px; letter-spacing: 0.04em;
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* ── Home ── */
  #home { overflow: hidden; }
  .home-scroll { flex: 1; overflow-y: auto; padding: 0 20px 32px; }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: flex;
    border-bottom: 1.5px solid rgba(76,101,232,0.14);
    margin-bottom: 0;
    background: rgba(237,240,254,0.75);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .mode-tab {
    flex: 1;
    padding: 12px 0 10px;
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* ── Random Button ── */
  .btn-random {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #3D35C4 0%, #5A4FDB 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.97rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 18px;
    margin-bottom: 0;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-random:active { opacity: 0.8; }

  /* ── Session List ── */
  .session-list-wrap { margin-top: 6px; }
  .session-sep { height: 1px; background: var(--line); }
  .session-item {
    padding: 14px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .session-item:active { opacity: 0.6; }
  .session-item-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    line-height: 1.35;
  }
  .session-item-count {
    font-size: 0.78rem;
    color: var(--text-3);
    margin-left: 12px;
    white-space: nowrap;
  }
  .session-item-arrow {
    font-size: 0.85rem;
    color: var(--text-3);
    margin-left: 10px;
  }

  /* ── Card Screen ── */
  #card-screen { padding: 0; overflow: hidden; background: var(--bg); }

  .progress-bar-wrap { padding: 0; flex-shrink: 0; }
  .progress-bar { height: 2px; background: var(--line); }
  .progress-fill { height: 100%; background: var(--text); transition: width 0.3s ease; }

  .card-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .btn-back {
    background: none;
    border: none;
    color: var(--text-2);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .session-title {
    font-size: 0.78rem;
    color: var(--text-3);
    flex: 1;
    line-height: 1.3;
    text-align: right;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-3);
    white-space: nowrap;
    margin-left: 8px;
  }

  /* ── Card Area ── */
  .card-area { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
  .card-wrap { max-width: 480px; margin: 0 auto; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px 24px;
  }

  /* ── Vocab Card Content ── */
  .c-pos {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .c-word {
    font-size: clamp(2rem, 9vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .c-ipa {
    font-size: 0.85rem;
    color: var(--text-2);
    font-style: italic;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .c-line { height: 1px; background: var(--line); margin: 16px 0; }
  .c-def { font-size: 0.92rem; line-height: 1.65; color: var(--text); }
  .c-zh {
    font-size: 1.0rem;
    font-weight: 600;
    color: var(--green);
    line-height: 1.5;
  }
  .c-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .c-example {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text-2);
    margin-bottom: 10px;
  }
  .c-example-zh {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text-3);
  }
  .btn-speak {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-speak:active { border-color: var(--blue); color: var(--blue); }
  .btn-speak.speaking {
    border-color: var(--blue);
    color: var(--blue);
    animation: pulse 0.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Root Card Content ── */
  .c-root-meta {
    font-size: 0.88rem;
    color: var(--text-2);
    margin-top: 6px;
    margin-bottom: 0;
  }
  .c-root-examples {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .c-root-ex {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    gap: 8px;
  }
  .c-root-ex:last-child { border-bottom: none; }
  .c-root-ex-left { display: flex; flex-direction: column; gap: 3px; }
  .c-root-word { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .c-root-ipa-row { display: flex; align-items: center; gap: 6px; }
  .c-root-ipa { font-size: 0.74rem; color: var(--text-3); font-style: italic; }
  .btn-speak-sm { background: none; border: 1px solid var(--line); color: var(--text-3); border-radius: 20px; padding: 1px 8px; font-size: 0.7rem; cursor: pointer; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
  .c-root-zh { font-size: 0.85rem; color: var(--green); text-align: right; max-width: 50%; }

  /* ── Nav ── */
  .card-nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px 28px;
    flex-shrink: 0;
    border-top: 1px solid var(--line);
  }
  .nav-btn {
    flex: 1;
    padding: 13px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 10px;
    font-size: 0.92rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { opacity: 0.7; }
  .nav-btn.primary {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
    font-weight: 600;
  }
  .nav-btn:disabled { opacity: 0.25; pointer-events: none; }

  /* ── Done Screen ── */
  #done-screen {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    background: var(--bg);
  }
  .done-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .done-line { height: 1px; background: var(--line); width: 60px; margin: 0 auto 16px; }
  .done-sub {
    font-size: 0.9rem;
    color: var(--text-3);
    margin-bottom: 36px;
    line-height: 1.5;
  }
  .done-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }
  .done-btn {
    padding: 14px;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .done-btn.primary { background: var(--text); border: 1px solid var(--text); color: #fff; }
  .done-btn.secondary { background: none; border: 1px solid var(--border); color: var(--text-2); }
  .done-btn:active { opacity: 0.75; }
</style>
</head>
<body>
<div id="app">
<header class="site-header">
  <div class="site-title">Word Power Made Easy</div>
  <div class="site-sub">经典单词 · 张全吉汇整</div>
</header>

<div class="screen active" id="home">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-vocab" onclick="switchMode('vocab')">单词</button>
    <button class="mode-tab" id="tab-root" onclick="switchMode('root')">字根</button>
  </div>
  <div class="home-scroll">
    <div id="vocab-home">
      <button class="btn-random" onclick="startRandom()">🎲 随机一个 Session</button>
      <div class="session-list-wrap">
        <div class="session-sep"></div>
        <div id="session-list"></div>
      </div>
    </div>
    <div id="root-home" style="display:none;">
      <button class="btn-random" onclick="startRootRandom()">🎲 随机一个字根组</button>
      <div class="session-list-wrap">
        <div class="session-sep"></div>
        <div id="root-session-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="card-screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="card-topbar">
    <button class="btn-back" onclick="goHome()">← 返回</button>
    <div class="session-title" id="session-title"></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
  <div class="card-area" id="card-area">
    <div class="card-wrap">
      <div class="card" id="card-content"></div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevCard()">‹ 上一张</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextCard()">下一张 ›</button>
  </div>
</div>

<div class="screen" id="done-screen">
  <div class="done-title">完成</div>
  <div class="done-line"></div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-actions">
    <button class="done-btn primary" id="done-again-btn" onclick="doneAgain()">再来一个 Session</button>
    <button class="done-btn secondary" onclick="replaySession()">重播</button>
    <button class="done-btn secondary" onclick="goHome()">返回</button>
  </div>
</div>
</div>

<script>
const DATA = {"Session 1: Personality Types": [{"session": "Session 1: Personality Types", "word": "egoist", "ipa": "ˋigoist", "pos": "n.", "definition": "a person who puts their own interests first above all else", "chinese": "自我主义者；只顾自身利益的人", "example": "A true egoist rarely volunteers to help others unless there is something to gain personally.", "example_zh": "真正的自我主义者很少主动帮助他人，除非能从中获取个人利益。"}, {"session": "Session 1: Personality Types", "word": "egotist", "ipa": "ˋigətɪst", "pos": "n.", "definition": "a boastful, conceited person who constantly talks about themselves", "chinese": "自负者；自吹自擂的人", "example": "The egotist spent the entire dinner conversation talking about his own accomplishments without asking anyone else a single question.", "example_zh": "那个自负的人在整顿晚餐对话中，一直谈论自己的成就，却没有问过其他人任何一个问题。"}, {"session": "Session 1: Personality Types", "word": "altruist", "ipa": "ˋæltruɪst", "pos": "n.", "definition": "a person devoted to the welfare of others rather than themselves", "chinese": "利他主义者；无私奉献他人的人", "example": "The retired doctor was a genuine altruist who spent his later years volunteering in underserved communities.", "example_zh": "那位退休医生是个真正的利他主义者，晚年都在服务不足的社区做义工。"}, {"session": "Session 1: Personality Types", "word": "introvert", "ipa": "ˋɪntrəvɝt", "pos": "n.", "definition": "a person whose thoughts and interests are turned inward; prefers solitude", "chinese": "内向者；喜好独处、思想向内的人", "example": "As an introvert, she found large social gatherings exhausting and preferred quiet evenings with a good book.", "example_zh": "身为内向者，她觉得大型社交聚会令人疲惫，更喜欢安静地捧著好书度过夜晚。"}, {"session": "Session 1: Personality Types", "word": "extrovert", "ipa": "ˋɛkstrəvɝt", "pos": "n.", "definition": "a person whose thoughts and interests are turned outward; loves company", "chinese": "外向者；喜好社交、思想向外的人", "example": "The natural extrovert thrived at the networking event, effortlessly striking up conversations with strangers.", "example_zh": "那个天生的外向者在交流活动中如鱼得水，毫不费力地与陌生人攀谈。"}, {"session": "Session 1: Personality Types", "word": "ambivert", "ipa": "ˋæmbɪvɝt", "pos": "n.", "definition": "a person with both introverted and extroverted tendencies", "chinese": "兼向性格者；兼具内向与外向特质的人", "example": "As an ambivert, he enjoyed socializing at parties but also needed quiet time alone to recharge afterward.", "example_zh": "身为兼向性格者，他喜欢在派对上社交，但之后也需要独处的安静时光来恢复精力。"}, {"session": "Session 1: Personality Types", "word": "misanthrope", "ipa": "ˋmɪsənθrop", "pos": "n.", "definition": "a person who hates or distrusts humanity", "chinese": "厌世者；憎恨或不信任人类的人", "example": "After decades of disappointment, the old man had become a misanthrope who rarely left his house.", "example_zh": "在几十年的失望之后，那位老人变成了一个厌世者，几乎足不出户。"}, {"session": "Session 1: Personality Types", "word": "misogynist", "ipa": "mɪˋsɑdʒɪnɪst", "pos": "n.", "definition": "a person who hates women", "chinese": "厌女者；憎恨女性的人", "example": "His dismissive attitude toward his female colleagues revealed him to be a misogynist in the workplace.", "example_zh": "他对女性同事的轻蔑态度，揭露了他是职场中的厌女者。"}, {"session": "Session 1: Personality Types", "word": "misogamist", "ipa": "mɪˋsɑgəmɪst", "pos": "n.", "definition": "a person who hates or opposes marriage", "chinese": "厌婚者；憎恨或反对婚姻的人", "example": "A confirmed misogamist, he had turned down two proposals and showed no interest in ever settling down.", "example_zh": "他是个坚定的厌婚者，已拒绝了两次求婚，对安定下来毫无兴趣。"}, {"session": "Session 1: Personality Types", "word": "ascetic", "ipa": "əˋsɛtɪk", "pos": "n. / adj.", "definition": "a person who practices strict self-denial and austerity; of or relating to such a lifestyle", "chinese": "苦行者；禁欲主义的（人）", "example": "The monk lived an ascetic life, owning nothing more than a robe, a bowl, and a pair of sandals.", "example_zh": "那位僧侣过著苦行的生活，除了一件袍子、一个钵和一双凉鞋之外，别无所有。"}], "Session 2: Words from EGO and ALTER": [{"session": "Session 2: Words from EGO and ALTER", "word": "ego", "ipa": "ˋigo", "pos": "n.", "definition": "one's concept of oneself; the self", "chinese": "自我；自我意识", "example": "His fragile ego could not handle any criticism, no matter how constructive it was.", "example_zh": "他脆弱的自我无法承受任何批评，无论那批评多么具有建设性。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egocentric", "ipa": "ˌigoˋsɛntrɪk", "pos": "n. / adj.", "definition": "a person who considers themselves the center of the universe; extremely self-centered", "chinese": "自我中心者；极度以自我为中心的（人）", "example": "Her egocentric behavior made it impossible for her to empathize with anyone else's problems.", "example_zh": "她以自我为中心的行为，使她完全无法对他人的问题感同身受。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egomaniac", "ipa": "ˌigoˋmenɪæk", "pos": "n.", "definition": "a person whose desire for self-importance has become a morbid obsession", "chinese": "自我狂热者；病态地沉迷于自身重要性的人", "example": "The director was such an egomaniac that he put his own portrait in every office of the company.", "example_zh": "那位总监是个自我狂热者，把自己的肖像挂在公司每间办公室里。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egomaniacal", "ipa": "ˌigomə̩ˋnaɪəkəl", "pos": "adj.", "definition": "obsessively, morbidly wrapped up in oneself", "chinese": "病态自我中心的；极度自我迷恋的", "example": "His egomaniacal tendencies became obvious when he claimed sole credit for the entire team's work.", "example_zh": "当他声称整个团队的工作都是他一个人的功劳时，他那病态自我中心的倾向便显而易见了。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altruism", "ipa": "ˋæltruɪzəm", "pos": "n.", "definition": "the philosophy or practice of putting others' welfare above one's own", "chinese": "利他主义；无私奉献他人的哲学或行为", "example": "True altruism means helping others without any expectation of reward or recognition.", "example_zh": "真正的利他主义意味著帮助他人时不期待任何回报或认可。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altruistic", "ipa": "ˌæltruˋɪstɪk", "pos": "adj.", "definition": "selflessly concerned with the welfare of others", "chinese": "利他的；无私关怀他人的", "example": "Her altruistic decision to donate a kidney to a stranger moved everyone who heard the story.", "example_zh": "她无私地决定将肾脏捐给一个陌生人，所有听到这个故事的人都深受感动。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alternate", "ipa": "ˋɔltɚnɪt", "pos": "v. / adj. / n.", "definition": "to take turns; every other; a substitute person", "chinese": "轮流；交替的；替补者", "example": "The two coaches decided to alternate between offensive and defensive drills throughout the practice session.", "example_zh": "两位教练决定在整个练习期间轮流进行进攻和防守训练。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alternative", "ipa": "ɔlˋtɝnətɪv", "pos": "n.", "definition": "another possible choice", "chinese": "替代方案；另一种选择", "example": "If the highway is congested, taking the coastal road is a scenic alternative.", "example_zh": "如果高速公路壅塞，走海岸公路是一个风景优美的替代方案。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alteration", "ipa": "ˌɔltəˋreʃən", "pos": "n.", "definition": "a change; the act of making something different", "chinese": "改变；更动；修改", "example": "The tailor made a small alteration to the sleeve length so the jacket fit perfectly.", "example_zh": "裁缝师对袖长做了小幅修改，让这件西装外套合身得恰到好处。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alter", "ipa": "ˋɔltɚ", "pos": "v.", "definition": "to change", "chinese": "改变；更改", "example": "Moving to a new city can alter your perspective on life in unexpected ways.", "example_zh": "搬到一个新城市，可能以意想不到的方式改变你对生活的看法。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altercation", "ipa": "ˌɔltɚˋkeʃən", "pos": "n.", "definition": "a heated verbal dispute or argument", "chinese": "激烈争吵；口角", "example": "The brief altercation between the two neighbors over parking quickly drew a crowd of onlookers.", "example_zh": "两位邻居因停车问题发生的短暂激烈口角，很快吸引了一群旁观者。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alter ego", "ipa": "ˋɔltɚ ˋigo", "pos": "n.", "definition": "one's other self; a person so close they mirror you in temperament", "chinese": "另一个自我；性情上极其相似的至交", "example": "She described her closest friend as her alter ego — someone who finished her sentences and shared her every ambition.", "example_zh": "她把最好的朋友形容为自己的另一个自我——一个能替她说完句子、与她共享每一个抱负的人。"}], "Session 3: Words from VERTO, MISEIN, and Related Roots": [{"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "ambidextrous", "ipa": "ˌæmbɪˋdɛkstrəs", "pos": "adj.", "definition": "able to use both hands with equal skill", "chinese": "两手同样灵巧的；双手万能的", "example": "The ambidextrous pitcher could throw fastballs equally well with either arm, baffling opposing batters.", "example_zh": "那位双手同样灵巧的投手能用任何一只手臂投出同样好的快速球，令对方打者无所适从。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "ambidexterity", "ipa": "ˌæmbɪdɛkˋstɛrɪtɪ", "pos": "n.", "definition": "the ability to use both hands equally well", "chinese": "双手灵巧；两手都能灵活运用的能力", "example": "Her ambidexterity gave her a significant advantage in both surgery and musical performance.", "example_zh": "她双手灵巧的能力，使她在外科手术和音乐演奏上都具有显著的优势。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "dexterous", "ipa": "ˋdɛkstrəs", "pos": "adj.", "definition": "skillful, adroit", "chinese": "灵巧的；熟练的", "example": "The dexterous jeweler crafted intricate rings with remarkable precision and speed.", "example_zh": "那位灵巧的珠宝匠以惊人的精准度和速度打造出精致繁复的戒指。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "dexterity", "ipa": "dɛkˋstɛrɪtɪ", "pos": "n.", "definition": "skill, especially with the hands", "chinese": "灵巧；（尤指手部的）熟练技巧", "example": "Years of practice had given the pianist extraordinary dexterity in both hands.", "example_zh": "多年的练习赋予了那位钢琴家双手非凡的灵巧技术。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "sinister", "ipa": "ˋsɪnɪstɚ", "pos": "adj.", "definition": "threatening, evil, or dangerous", "chinese": "邪恶的；不祥的；危险的", "example": "There was something sinister about the way he smiled when he heard about his rival's misfortune.", "example_zh": "当他听闻对手遭逢不幸时所露出的那种笑容，令人感到有些邪恶。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gauche", "ipa": "goʃ", "pos": "adj.", "definition": "socially clumsy, tactless, awkward", "chinese": "不圆滑的；社交上笨拙失礼的", "example": "It was gauche of him to ask about her salary within minutes of meeting her at the reception.", "example_zh": "他在招待会上认识她几分钟后就询问她的薪资，实在是非常失礼。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gaucherie", "ipa": "ˋgoʃərɪ", "pos": "n.", "definition": "an awkward, tactless way of handling situations", "chinese": "社交笨拙；不得体的言行举止", "example": "His gaucherie at the formal dinner — eating with the wrong fork and speaking with his mouth full — embarrassed the entire table.", "example_zh": "他在正式晚宴上的失礼行为——用错叉子、满嘴食物说话——令同桌所有人都尴尬不已。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "adroit", "ipa": "əˋdrɔɪt", "pos": "adj.", "definition": "clever and skillful, especially mentally", "chinese": "机敏的；（尤指思维上）灵活熟练的", "example": "The adroit negotiator managed to reach a compromise that satisfied both parties within a single afternoon.", "example_zh": "那位机敏的谈判者在一个下午之内便达成了令双方都满意的妥协。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "adroitness", "ipa": "əˋdrɔɪtnɪs", "pos": "n.", "definition": "mental or physical cleverness and skill", "chinese": "机敏；（心智或体能上的）灵巧与技能", "example": "The chess champion's adroitness in spotting her opponent's weaknesses was what set her apart from the rest.", "example_zh": "那位西洋棋冠军善于发现对手弱点的机敏才是她与众不同之处。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "anthropology", "ipa": "ˌænθrəˋpɑlədʒɪ", "pos": "n.", "definition": "the study of the development of the human race", "chinese": "人类学；研究人类发展的学科", "example": "Her research in anthropology took her to remote villages in Papua New Guinea to document ancient rituals.", "example_zh": "她的人类学研究带她前往巴布亚纽几内亚的偏远村落，记录古老的仪式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "anthropologist", "ipa": "ˌænθrəˋpɑlədʒɪst", "pos": "n.", "definition": "a scholar who studies the development of the human race", "chinese": "人类学家；研究人类发展的学者", "example": "The anthropologist spent three years living with a remote tribe to understand their social customs firsthand.", "example_zh": "那位人类学家花了三年时间与一个偏远部落共同生活，以第一手了解他们的社会习俗。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "philanthropist", "ipa": "fɪˋlænθrəpɪst", "pos": "n.", "definition": "a person who loves mankind and donates to charitable causes", "chinese": "慈善家；热爱人类并捐助公益事业的人", "example": "The retired industrialist became a celebrated philanthropist, funding schools and hospitals across the region.", "example_zh": "那位退休实业家成为备受赞扬的慈善家，在整个地区资助学校和医院的建设。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "philanthropy", "ipa": "fɪˋlænθrəpɪ", "pos": "n.", "definition": "love of mankind; charitable giving", "chinese": "博爱；慈善；慈善捐助", "example": "Corporate philanthropy has funded numerous art programs that would otherwise have gone without support.", "example_zh": "企业的慈善捐助资助了许多若无此支持便无以为继的艺术计划。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gynecologist", "ipa": "ˌgaɪnɪˋkɑlədʒɪst", "pos": "n.", "definition": "a medical specialist who treats female disorders", "chinese": "妇科医师；治疗女性疾病的医疗专科医师", "example": "She scheduled her annual checkup with her gynecologist to ensure her reproductive health was in good order.", "example_zh": "她预约了妇科医师的年度检查，以确保自己的生殖健康状况良好。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gynecology", "ipa": "ˌgaɪnɪˋkɑlədʒɪ", "pos": "n.", "definition": "the medical science dealing with women's health", "chinese": "妇科学；研究女性健康的医学分科", "example": "Advances in gynecology over the past century have dramatically improved women's reproductive health outcomes.", "example_zh": "过去一个世纪妇科学的进步，大幅改善了女性生殖健康的成果。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "monogamy", "ipa": "məˋnɑgəmɪ", "pos": "n.", "definition": "the custom or practice of being married to only one person at a time", "chinese": "一夫一妻制；一次只与一人结婚的习俗或做法", "example": "Monogamy is the legally recognized form of marriage in most countries around the world.", "example_zh": "一夫一妻制是世界上大多数国家法律认可的婚姻形式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "bigamy", "ipa": "ˋbɪgəmɪ", "pos": "n.", "definition": "the unlawful act of contracting a second marriage while still legally married", "chinese": "重婚；在法律婚姻关系仍存在时再度结婚的违法行为", "example": "He was charged with bigamy after authorities discovered he had married a second woman without divorcing his first wife.", "example_zh": "当局发现他在未与第一任妻子离婚的情况下又与另一名女性结婚后，他被控重婚罪。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polygamy", "ipa": "pəˋlɪgəmɪ", "pos": "n.", "definition": "the custom of having many spouses; plural marriage", "chinese": "多配偶制；拥有多名配偶的习俗", "example": "Polygamy is practiced in certain cultures and is often tied to religious or traditional beliefs.", "example_zh": "多配偶制在某些文化中仍被奉行，通常与宗教或传统信仰有关。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polygyny", "ipa": "pəˋlɪdʒɪnɪ", "pos": "n.", "definition": "the custom of one man having many wives", "chinese": "一夫多妻制；一名男性拥有多名妻子的习俗", "example": "Polygyny was historically practiced in some societies as a way of forming political alliances between clans.", "example_zh": "一夫多妻制在历史上曾在某些社会中被奉行，作为在部族之间建立政治联盟的方式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polyandry", "ipa": "ˌpɑlɪˋændrɪ", "pos": "n.", "definition": "the custom of one woman having many husbands", "chinese": "一妻多夫制；一名女性拥有多名丈夫的习俗", "example": "Polyandry is rare globally but has been documented in certain Himalayan communities.", "example_zh": "一妻多夫制在全球范围内极为罕见，但在某些喜马拉雅山区社群中有记录可查。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misanthropy", "ipa": "mɪˋsænθrəpɪ", "pos": "n.", "definition": "hatred of mankind", "chinese": "厌世；对人类的憎恨", "example": "His misanthropy deepened after years of witnessing corruption and cruelty, and he eventually retreated from society entirely.", "example_zh": "在多年目睹腐败与残酷之后，他对人类的憎恨日益加深，最终完全远离了社会。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misogyny", "ipa": "mɪˋsɑdʒɪnɪ", "pos": "n.", "definition": "hatred of women", "chinese": "厌女；对女性的憎恨", "example": "The novel's protagonist confronts systemic misogyny in the workplace and refuses to be silenced.", "example_zh": "小说中的主人公面对职场中系统性的厌女现象，拒绝沉默以对。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misogamy", "ipa": "mɪˋsɑgəmɪ", "pos": "n.", "definition": "hatred of marriage", "chinese": "厌婚；对婚姻的憎恶", "example": "His misogamy, rooted in a painful divorce, made him reluctant to consider any long-term relationship.", "example_zh": "他的厌婚情绪源于一段痛苦的离婚经历，使他不愿考虑任何长期的感情关系。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "asceticism", "ipa": "əˋsɛtɪˌsɪzəm", "pos": "n.", "definition": "the philosophy and practice of self-denial and austerity", "chinese": "苦行主义；禁欲主义的哲学与实践", "example": "The philosopher advocated asceticism, arguing that freedom from desire was the path to true happiness.", "example_zh": "那位哲学家提倡苦行主义，主张从欲望中解脱才是通往真正幸福的道路。"}], "Session 4: Medical Specialists": [{"session": "Session 4: Medical Specialists", "word": "internist", "ipa": "ˋɪntɝnɪst", "pos": "n.", "definition": "a physician specializing in internal medicine and diagnosis", "chinese": "内科医师；专攻内科医学与诊断的医师", "example": "The internist ordered a series of blood tests to investigate the cause of the patient's chronic fatigue.", "example_zh": "内科医师开立了一系列血液检查，以调查病人长期疲劳的原因。"}, {"session": "Session 4: Medical Specialists", "word": "gynecologist", "ipa": "ˌgaɪnɪˋkɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in female reproductive and sexual disorders", "chinese": "妇科医师；专治女性生殖及性健康疾病的医师", "example": "The gynecologist recommended regular screenings to detect any early signs of cervical abnormalities.", "example_zh": "妇科医师建议定期进行筛查，以早期发现任何子宫颈异常的迹象。"}, {"session": "Session 4: Medical Specialists", "word": "obstetrician", "ipa": "ˌɑbstəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in pregnancy and delivery of babies", "chinese": "产科医师；专门负责孕期照护及接生的医师", "example": "The obstetrician monitored the mother's progress throughout the final trimester and delivered the twins safely.", "example_zh": "产科医师在整个最后孕期追踪母亲的状况，并安全地接生了这对双胞胎。"}, {"session": "Session 4: Medical Specialists", "word": "pediatrician", "ipa": "ˌpidɪəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in the treatment of infants and children", "chinese": "小儿科医师；专门诊治婴幼儿及儿童的医师", "example": "The pediatrician reassured the worried parents that the child's fever was common and would pass within a day or two.", "example_zh": "小儿科医师安慰了忧心忡忡的父母，说孩子的发烧是常见的，一两天内就会退烧。"}, {"session": "Session 4: Medical Specialists", "word": "dermatologist", "ipa": "ˌdɝməˋtɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in skin diseases", "chinese": "皮肤科医师；专门诊治皮肤疾病的医师", "example": "She visited the dermatologist to have an unusual mole examined before it could develop into anything serious.", "example_zh": "她去看皮肤科医师，请医师检查一颗不寻常的痣，以免发展成严重的问题。"}, {"session": "Session 4: Medical Specialists", "word": "ophthalmologist", "ipa": "ˌɑfθælˋmɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in disorders of the eye", "chinese": "眼科医师；专门诊治眼睛疾病的医师", "example": "The ophthalmologist diagnosed him with early-stage glaucoma and prescribed eye drops to control the pressure.", "example_zh": "眼科医师诊断出他患有早期青光眼，并开立眼药水来控制眼压。"}, {"session": "Session 4: Medical Specialists", "word": "orthopedist", "ipa": "ˌɔrθəˋpidɪst", "pos": "n.", "definition": "a physician specializing in bones, joints, and skeletal deformities", "chinese": "骨科医师；专门诊治骨骼、关节及骨骼畸形的医师", "example": "The orthopedist recommended physical therapy before considering surgery on the damaged knee joint.", "example_zh": "骨科医师建议在考虑对受损膝关节进行手术之前，先接受物理治疗。"}, {"session": "Session 4: Medical Specialists", "word": "cardiologist", "ipa": "ˌkɑrdɪˋɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in heart and circulatory diseases", "chinese": "心脏科医师；专门诊治心脏及循环系统疾病的医师", "example": "After the stress test, the cardiologist determined that his arteries showed early signs of blockage.", "example_zh": "在压力测试之后，心脏科医师判断他的动脉出现了早期阻塞的迹象。"}, {"session": "Session 4: Medical Specialists", "word": "neurologist", "ipa": "njʊˋrɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in the brain, spinal cord, and nervous system", "chinese": "神经科医师；专门诊治脑部、脊髓及神经系统的医师", "example": "The neurologist ordered an MRI scan to determine whether the patient's frequent migraines had a structural cause.", "example_zh": "神经科医师开立了核磁共振扫描，以确定病人频繁偏头痛是否有结构性原因。"}, {"session": "Session 4: Medical Specialists", "word": "psychiatrist", "ipa": "saɪˋkaɪətrɪst", "pos": "n.", "definition": "a physician specializing in mental and emotional disturbances", "chinese": "精神科医师；专门诊治心理及情绪疾患的医师", "example": "Her psychiatrist adjusted her medication after she reported that the side effects were affecting her daily routine.", "example_zh": "她的精神科医师在她反映副作用影响日常生活后，调整了她的用药。"}], "Session 5: Etymology of Medical Terms": [{"session": "Session 5: Etymology of Medical Terms", "word": "intern (interne)", "ipa": "ˋɪntɝn", "pos": "n.", "definition": "a medical graduate serving an apprenticeship inside a hospital", "chinese": "实习医师；在医院内服实习期的医学院毕业生", "example": "The intern worked grueling 36-hour shifts as part of her training in the emergency department.", "example_zh": "那位实习医师在急诊部门的培训中，要轮值折磨人的三十六小时班次。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "obstetrics", "ipa": "əbˋstɛtrɪks", "pos": "n.", "definition": "the medical specialty dealing with pregnancy and childbirth", "chinese": "产科学；处理妊娠与分娩的医学专科", "example": "She chose to specialize in obstetrics because she found the experience of bringing new life into the world deeply rewarding.", "example_zh": "她选择专攻产科学，因为她觉得将新生命带到世界上的这份体验令人深感充实。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pediatrics", "ipa": "ˌpidɪˋætrɪks", "pos": "n.", "definition": "the medical specialty dealing with the health of infants and children", "chinese": "小儿科学；处理婴幼儿及儿童健康的医学专科", "example": "Pediatrics requires not only medical expertise but also the patience to communicate with young patients and anxious parents.", "example_zh": "小儿科学不仅需要医学专业知识，还需要有耐心与幼小病患及焦虑的家长沟通。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pedagogy", "ipa": "ˋpɛdəˌgɑdʒɪ", "pos": "n.", "definition": "the principles and methods of teaching", "chinese": "教育学；教学法；教学的原则与方法", "example": "The teacher's innovative pedagogy, which used games and storytelling, kept students engaged and motivated throughout the year.", "example_zh": "那位老师运用游戏和说故事的创新教学法，使学生全年都保持专注与学习动力。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pedagogue", "ipa": "ˋpɛdəˌgɑg", "pos": "n.", "definition": "a narrow-minded, dogmatic, old-fashioned teacher (negative connotation)", "chinese": "迂腐的教师；思想守旧、教条主义的老师（带贬义）", "example": "The professor was widely regarded as a stiff pedagogue who recited the same lectures from yellowed notes year after year.", "example_zh": "那位教授被广泛视为一个古板的迂腐教师，年复一年地从发黄的讲稿中背诵同样的课文。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "demagogue", "ipa": "ˋdɛməˌgɑg", "pos": "n.", "definition": "a politician who stirs up the masses with wild oratory for personal gain", "chinese": "煽动家；以激情演说煽动群众谋取私利的政客", "example": "The demagogue exploited economic anxiety, whipping up resentment against immigrants to secure votes.", "example_zh": "那个煽动家利用民众的经济焦虑，激起对移民的愤恨以换取选票。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "demagoguery", "ipa": "ˋdɛməˌgɑgərɪ", "pos": "n.", "definition": "the practice of arousing public discontent for selfish political purposes", "chinese": "煽动政治；为一己私利而煽动公众不满的行为", "example": "Political commentators warned that the campaign had crossed the line from debate into outright demagoguery.", "example_zh": "政治评论员警告说，这场竞选活动已从辩论越界为赤裸裸的煽动政治。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "dermatology", "ipa": "ˌdɝməˋtɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with skin diseases", "chinese": "皮肤科学；处理皮肤疾病的医学专科", "example": "Dermatology has advanced considerably, with new treatments offering relief for conditions like psoriasis and eczema.", "example_zh": "皮肤科学已有长足进步，新的治疗方法为牛皮癣和湿疹等病症带来了缓解的希望。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "hypodermic", "ipa": "ˌhaɪpəˋdɝmɪk", "pos": "adj.", "definition": "penetrating under the skin", "chinese": "皮下的；穿入皮肤下层的", "example": "The nurse administered the vaccine via a hypodermic injection in the patient's upper arm.", "example_zh": "护士在病人的上臂进行皮下注射，施打了疫苗。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "epidermis", "ipa": "ˌɛpɪˋdɝmɪs", "pos": "n.", "definition": "the outermost layer of the skin", "chinese": "表皮；皮肤的最外层", "example": "A sunburn damages the epidermis and, in severe cases, can destroy the deeper layers of skin tissue.", "example_zh": "晒伤会损伤表皮，严重时甚至会破坏更深层的皮肤组织。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "taxidermist", "ipa": "ˋtæksɪˌdɝmɪst", "pos": "n.", "definition": "one who prepares, stuffs, and mounts the skins of animals", "chinese": "动物标本剥制师；负责处理、填充和装架动物皮毛的人", "example": "The natural history museum hired a skilled taxidermist to restore their aging collection of mounted animals.", "example_zh": "自然史博物馆聘请了一位技艺高超的标本剥制师，修复他们那批日渐老化的动物标本馆藏。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pachyderm", "ipa": "ˋpækɪˌdɝm", "pos": "n.", "definition": "an animal with unusually thick skin, such as an elephant", "chinese": "厚皮动物；皮肤异常厚实的动物，如大象", "example": "The elephant, a classic pachyderm, relies on its thick skin as protection against insects and the harsh sun.", "example_zh": "大象是典型的厚皮动物，牠依赖厚实的皮肤抵御虫虫叮咬和烈日曝晒。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "dermatitis", "ipa": "ˌdɝməˋtaɪtɪs", "pos": "n.", "definition": "inflammation, irritation, or infection of the skin", "chinese": "皮肤炎；皮肤的发炎、刺激或感染", "example": "She developed contact dermatitis after switching to a new brand of laundry detergent that contained harsh chemicals.", "example_zh": "她在改用一款含有刺激性化学物质的新品牌洗衣精后，出现了接触性皮肤炎。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "ophthalmology", "ipa": "ˌɑfθælˋmɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with eye disorders", "chinese": "眼科学；处理眼睛疾病的医学专科", "example": "Ophthalmology has benefited greatly from laser technology, making procedures like LASIK widely available.", "example_zh": "眼科学从雷射技术中受益匪浅，使LASIK等手术得以广泛普及。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "oculist", "ipa": "ˋɑkjʊlɪst", "pos": "n.", "definition": "an earlier term for an eye doctor (ophthalmologist)", "chinese": "眼科医师（旧称）；眼科医师的早期称谓", "example": "In the early twentieth century, patients would visit an oculist for eye examinations, a title that has since been replaced by ophthalmologist.", "example_zh": "在二十世纪初，病人会去看「oculist」进行眼科检查，这个称谓后来被「ophthalmologist」所取代。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "ocular", "ipa": "ˋɑkjʊlɚ", "pos": "adj.", "definition": "relating to the eye", "chinese": "眼睛的；与眼睛相关的", "example": "The patient reported several ocular symptoms, including blurred vision and increased sensitivity to light.", "example_zh": "病人反映了几项眼睛症状，包括视力模糊和对光线的敏感度增加。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "monocle", "ipa": "ˋmɑnɪkl", "pos": "n.", "definition": "a lens worn over one eye", "chinese": "单片眼镜；戴在单眼上的镜片", "example": "The Victorian gentleman peered at the letter through his monocle, raising an eyebrow at its contents.", "example_zh": "那位维多利亚时代的绅士透过他的单片眼镜审视那封信，对信中的内容扬起了一道眉毛。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "binoculars", "ipa": "bɪˋnɑkjʊlɚz", "pos": "n.", "definition": "field glasses that increase the range of vision for both eyes", "chinese": "双筒望远镜；增大双眼视野范围的野外望远镜", "example": "She raised her binoculars and spotted the rare bird perched at the top of a distant pine tree.", "example_zh": "她举起双筒望远镜，看见那只罕见的鸟栖息在远处一棵松树的顶端。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "inoculate", "ipa": "ɪˋnɑkjʊˌlet", "pos": "v.", "definition": "to introduce a serum through the skin to protect against disease", "chinese": "接种；将血清注入皮下以预防疾病", "example": "It is recommended that travelers inoculate themselves against typhoid and hepatitis A before visiting certain regions.", "example_zh": "建议旅行者在前往某些地区之前，接种伤寒和甲型肝炎疫苗。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optometrist", "ipa": "ɑpˋtɑmɪtrɪst", "pos": "n.", "definition": "a practitioner who measures vision and prescribes glasses (not a physician)", "chinese": "验光师；测量视力并开具眼镜处方的执业者（非医师）", "example": "The optometrist discovered that her near-sightedness had worsened significantly since her last visit two years ago.", "example_zh": "验光师发现，与两年前上次就诊相比，她的近视程度已明显加深。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optician", "ipa": "ɑpˋtɪʃən", "pos": "n.", "definition": "a practitioner who grinds lenses and fills eyeglass prescriptions", "chinese": "配镜师；研磨镜片并配制眼镜处方的执业者", "example": "She took the optometrist's prescription to the optician, who prepared her new glasses within the hour.", "example_zh": "她拿著验光师开的处方前往配镜师处，配镜师在一小时之内就为她准备好了新眼镜。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optometry", "ipa": "ɑpˋtɑmɪtrɪ", "pos": "n.", "definition": "the practice of measuring vision", "chinese": "验光学；测量视力的执业学科", "example": "After completing his degree in optometry, he opened a private practice in his hometown.", "example_zh": "取得验光学学位后，他在家乡开设了私人诊所。"}], "Session 6: More Medical Etymology": [{"session": "Session 6: More Medical Etymology", "word": "orthopedics", "ipa": "ˌɔrθəˋpidɪks", "pos": "n.", "definition": "the medical specialty dealing with deformities and diseases of bones and joints", "chinese": "骨科学；处理骨骼与关节畸形及疾病的医学专科", "example": "Orthopedics has been transformed by advances in minimally invasive surgery, allowing patients to recover far more quickly.", "example_zh": "骨科学因微创手术的进步而大为改观，使病人能更快速地康复。"}, {"session": "Session 6: More Medical Etymology", "word": "orthodontia", "ipa": "ˌɔrθəˋdɑnʃə", "pos": "n.", "definition": "the dental specialty of straightening teeth", "chinese": "矫正牙科学；将牙齿矫正排列整齐的牙科专科", "example": "Her orthodontia began at age twelve and concluded three years later when her braces were finally removed.", "example_zh": "她的牙齿矫正治疗在十二岁开始，三年后终于拆除牙套，治疗就此结束。"}, {"session": "Session 6: More Medical Etymology", "word": "orthodontist", "ipa": "ˌɔrθəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in straightening teeth", "chinese": "牙齿矫正专科医师；专门矫正牙齿排列的牙医", "example": "The orthodontist recommended clear aligners instead of traditional metal braces for a more discreet treatment.", "example_zh": "牙齿矫正专科医师建议使用透明牙套而非传统金属牙套，以达到更隐形的治疗效果。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiology", "ipa": "ˌkɑrdɪˋɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with the heart", "chinese": "心脏科学；处理心脏疾病的医学专科", "example": "Cardiology has made remarkable strides with the development of stents and minimally invasive heart procedures.", "example_zh": "心脏科学随著支架和微创心脏手术的发展，取得了显著的进步。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiac", "ipa": "ˋkɑrdɪæk", "pos": "adj.", "definition": "relating to the heart", "chinese": "心脏的；与心脏相关的", "example": "The paramedics worked quickly to stabilize the patient who had suffered a cardiac arrest on the street.", "example_zh": "急救人员迅速采取行动，稳定了在街上心脏骤停的病人的状况。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiogram", "ipa": "ˋkɑrdɪəˌgræm", "pos": "n.", "definition": "an electrically produced record of the heartbeat", "chinese": "心电图；以电子方式记录心跳的图形", "example": "The doctor studied the cardiogram carefully, noting the irregular spikes that indicated an abnormal rhythm.", "example_zh": "医师仔细研读了心电图，注意到显示心律异常的不规则波峰。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiograph", "ipa": "ˋkɑrdɪəˌgræf", "pos": "n.", "definition": "the instrument that produces a cardiogram", "chinese": "心电图仪；产生心电图的仪器", "example": "The cardiograph was attached to the patient's chest with adhesive electrodes to monitor his heart activity during surgery.", "example_zh": "心电图仪透过黏性电极贴附在病人胸口，在手术期间监测他的心脏活动。"}, {"session": "Session 6: More Medical Etymology", "word": "neurology", "ipa": "njʊˋrɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with the nervous system", "chinese": "神经科学；处理神经系统疾病的医学专科", "example": "Neurology encompasses a wide range of conditions, from migraines and epilepsy to Parkinson's disease and multiple sclerosis.", "example_zh": "神经科学涵盖广泛的疾病，从偏头痛和癫痫到帕金森氏症和多发性硬化症。"}, {"session": "Session 6: More Medical Etymology", "word": "neuralgia", "ipa": "njʊˋrældʒɪə", "pos": "n.", "definition": "acute pain along the nerves and their branches", "chinese": "神经痛；沿神经及其分支产生的剧烈疼痛", "example": "The trigeminal neuralgia caused him such intense facial pain that even a gentle touch on the cheek triggered a stabbing sensation.", "example_zh": "三叉神经痛使他的脸部疼痛剧烈，甚至轻轻触碰脸颊都会引发刺痛感。"}, {"session": "Session 6: More Medical Etymology", "word": "neuritis", "ipa": "njʊˋraɪtɪs", "pos": "n.", "definition": "inflammation of the nerves", "chinese": "神经炎；神经的发炎病症", "example": "The physician diagnosed her with peripheral neuritis after she reported numbness and tingling in both hands.", "example_zh": "在她反映双手麻木及刺痛后，医师诊断她患有周边神经炎。"}, {"session": "Session 6: More Medical Etymology", "word": "neurosis", "ipa": "njʊˋrosɪs", "pos": "n.", "definition": "an emotional disturbance characterized by excessive use of energy for unproductive purposes", "chinese": "神经症；以过度消耗精力于无益事物为特征的情绪障碍", "example": "His anxiety neurosis manifested in compulsive rituals that consumed hours of his day and left him exhausted.", "example_zh": "他的焦虑型神经症表现为强迫性的重复行为，每天耗费他数小时的时间，令他精疲力竭。"}, {"session": "Session 6: More Medical Etymology", "word": "neurotic", "ipa": "njʊˋrɑtɪk", "pos": "n. / adj.", "definition": "a person suffering from neurosis; relating to neurosis", "chinese": "神经症患者；患有神经症的（人）", "example": "She had always been somewhat neurotic about cleanliness, washing her hands far more than was necessary.", "example_zh": "她一向对清洁有些神经质，洗手的次数远远超过必要。"}, {"session": "Session 6: More Medical Etymology", "word": "psychosis", "ipa": "saɪˋkosɪs", "pos": "n.", "definition": "a severe mental disorder in which contact with reality is lost", "chinese": "精神病；丧失与现实接触的严重心理疾患", "example": "The patient was admitted to the psychiatric ward after experiencing a sudden psychosis that included vivid hallucinations.", "example_zh": "病人在出现包括生动幻觉在内的突发性精神病后，被收入精神科病房。"}, {"session": "Session 6: More Medical Etymology", "word": "psychotic", "ipa": "saɪˋkɑtɪk", "pos": "n. / adj.", "definition": "a person suffering from psychosis; relating to psychosis", "chinese": "精神病患者；精神病的（人）", "example": "During the psychotic episode, the patient was unable to distinguish between what was real and what was imagined.", "example_zh": "在精神病发作期间，病人无法区分现实与想像之间的界限。"}, {"session": "Session 6: More Medical Etymology", "word": "psychiatry", "ipa": "saɪˋkaɪətrɪ", "pos": "n.", "definition": "the medical specialty dealing with mental and emotional disturbances", "chinese": "精神科学；处理心理及情绪疾患的医学专科", "example": "The stigma surrounding psychiatry has decreased significantly as public awareness of mental health has grown.", "example_zh": "随著公众对心理健康认识的提升，围绕精神科学的污名化现象已大为减少。"}, {"session": "Session 6: More Medical Etymology", "word": "geriatrics", "ipa": "ˌdʒɛrɪˋætrɪks", "pos": "n.", "definition": "the medical specialty dealing with the health needs of the elderly", "chinese": "老年科学；处理老年人健康需求的医学专科", "example": "As the population ages, the demand for physicians trained in geriatrics continues to grow rapidly.", "example_zh": "随著人口老龄化，对受过老年科学训练的医师需求持续快速增长。"}, {"session": "Session 6: More Medical Etymology", "word": "geriatrician", "ipa": "ˌdʒɛrɪəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in the medical care of elderly patients", "chinese": "老年科医师；专门诊治老年病患的医师", "example": "The geriatrician coordinated care for the ninety-year-old patient, balancing multiple medications and chronic conditions.", "example_zh": "老年科医师为这位九十岁的病人统筹照护，在多种药物和慢性病之间取得平衡。"}], "Session 7: Various Practitioners": [{"session": "Session 7: Various Practitioners", "word": "psychologist", "ipa": "saɪˋkɑlədʒɪst", "pos": "n.", "definition": "a specialist who studies human behavior and mental processes", "chinese": "心理学家；研究人类行为与心理过程的专家", "example": "The school psychologist worked closely with teachers and parents to support students struggling with anxiety.", "example_zh": "学校心理学家与教师和家长密切合作，支持正在对抗焦虑的学生。"}, {"session": "Session 7: Various Practitioners", "word": "psychoanalyst", "ipa": "ˌsaɪkoˋænəlɪst", "pos": "n.", "definition": "a practitioner who uses Freudian techniques to probe the unconscious", "chinese": "精神分析师；运用佛洛伊德技术探索潜意识的执业者", "example": "The psychoanalyst encouraged her patient to describe his recurring dreams as a way of uncovering repressed memories.", "example_zh": "精神分析师鼓励病人描述反复出现的梦境，以此作为挖掘被压抑记忆的方式。"}, {"session": "Session 7: Various Practitioners", "word": "orthodontist", "ipa": "ˌɔrθəˋdɑntɪst", "pos": "n.", "definition": "a dentist who specializes in straightening teeth", "chinese": "牙齿矫正专科医师；专门矫正牙齿排列的牙医", "example": "The orthodontist told the teenager that she would need to wear braces for at least eighteen months to correct her bite.", "example_zh": "牙齿矫正专科医师告诉那位青少年，她需要佩戴牙套至少十八个月才能矫正咬合。"}, {"session": "Session 7: Various Practitioners", "word": "optometrist", "ipa": "ɑpˋtɑmɪtrɪst", "pos": "n.", "definition": "a practitioner who measures vision and prescribes glasses", "chinese": "验光师；测量视力并开具眼镜处方的执业者", "example": "The optometrist noticed that the child's vision had declined sharply and advised limiting screen time.", "example_zh": "验光师注意到那个孩子的视力急剧下降，建议减少萤幕使用时间。"}, {"session": "Session 7: Various Practitioners", "word": "optician", "ipa": "ɑpˋtɪʃən", "pos": "n.", "definition": "one who grinds lenses and sells optical goods", "chinese": "配镜师；研磨镜片并销售眼镜产品的人", "example": "The optician carefully fitted the new frames to ensure they sat comfortably on the bridge of her nose.", "example_zh": "配镜师仔细调整了新镜架，确保它舒适地架在她的鼻梁上。"}, {"session": "Session 7: Various Practitioners", "word": "osteopath", "ipa": "ˋɑstɪəˌpæθ", "pos": "n.", "definition": "a practitioner who uses massage, manipulation, and standard medical procedures to treat illness", "chinese": "整骨师；运用按摩、徒手操作及标准医疗程序治疗疾病的执业者", "example": "After weeks of lower back pain, she visited an osteopath who identified a misalignment in her lumbar spine.", "example_zh": "在腰背疼痛数周后，她去看了整骨师，医师发现她的腰椎存在错位问题。"}, {"session": "Session 7: Various Practitioners", "word": "chiropractor", "ipa": "ˋkaɪrəˌpræktɚ", "pos": "n.", "definition": "a practitioner who manipulates the articulations of the spine to relieve ailments", "chinese": "脊骨神经科医师；透过操作脊椎关节来缓解病痛的执业者", "example": "The chiropractor performed a spinal adjustment that provided immediate relief from his chronic neck stiffness.", "example_zh": "脊骨神经科医师进行了脊椎矫正，立即缓解了他长期的颈部僵硬。"}, {"session": "Session 7: Various Practitioners", "word": "podiatrist", "ipa": "poˋdaɪətrɪst", "pos": "n.", "definition": "a specialist in the care and treatment of minor foot ailments", "chinese": "足病医师；专门照护和治疗轻微足部疾病的专科医师", "example": "The marathon runner saw a podiatrist about the painful blisters and calluses that had developed after months of training.", "example_zh": "那位马拉松跑者因数月训练后出现疼痛的水泡和茧，前去看了足病医师。"}, {"session": "Session 7: Various Practitioners", "word": "graphologist", "ipa": "græˋfɑlədʒɪst", "pos": "n.", "definition": "one who analyzes handwriting to determine character or personality", "chinese": "笔迹学家；透过分析笔迹来判断性格或个性的人", "example": "The graphologist examined the letters and concluded that the writer showed traits of perfectionism and emotional sensitivity.", "example_zh": "笔迹学家检视了那些信件，得出结论认为笔者具有完美主义倾向和情感敏感的特质。"}, {"session": "Session 7: Various Practitioners", "word": "gerontologist", "ipa": "ˌdʒɛrənˋtɑlədʒɪst", "pos": "n.", "definition": "a social scientist who deals with the non-medical problems of the elderly", "chinese": "老年学家；处理老年人非医疗性问题的社会科学家", "example": "The gerontologist studied how retirement affected seniors' sense of purpose and social connection.", "example_zh": "那位老年学家研究退休如何影响老年人的使命感与社交连结。"}], "Session 8: Words Related to \"Psyche\"": [{"session": "Session 8: Words Related to \"Psyche\"", "word": "psychology", "ipa": "saɪˋkɑlədʒɪ", "pos": "n.", "definition": "the study of human behavior and mental processes", "chinese": "心理学；研究人类行为与心理过程的学科", "example": "Her undergraduate studies in psychology gave her valuable insight into the motivations behind human decision-making.", "example_zh": "她大学时期的心理学学习，使她对人类决策背后的动机有了宝贵的洞察。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychological", "ipa": "ˌsaɪkəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to the study of behavior and mental processes", "chinese": "心理学的；心理上的", "example": "The trauma had left deep psychological scars that required years of therapy to heal.", "example_zh": "那次创伤留下了深刻的心理创伤，需要多年的治疗才能愈合。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psyche", "ipa": "ˋsaɪkɪ", "pos": "n.", "definition": "the mind; one's inner or mental life", "chinese": "心灵；心智；内在精神生活", "example": "The novel probes the psyche of a war veteran struggling to reconcile his experiences with civilian life.", "example_zh": "这部小说深入探索一位试图将战场经历与平民生活调和的退伍军人的内心世界。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychic", "ipa": "ˋsaɪkɪk", "pos": "adj.", "definition": "pertaining to phenomena that cannot be explained in physical terms; extrasensory", "chinese": "超自然的；超感官的；无法以物理方式解释的现象", "example": "She claimed to have psychic abilities, insisting she could sense the emotional history of objects by touching them.", "example_zh": "她声称自己拥有超自然能力，坚持说她能透过触碰物品来感知其情感历史。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopathic", "ipa": "ˌsaɪkəˋpæθɪk", "pos": "adj.", "definition": "describing someone with a severe mental or emotional disorder", "chinese": "精神病态的；具有严重心理或情感障碍的", "example": "The forensic psychologist testified that the defendant displayed psychopathic tendencies, including a lack of remorse.", "example_zh": "法医心理学家作证说，被告表现出精神病态倾向，包括缺乏悔意。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopathy", "ipa": "saɪˋkɑpəθɪ", "pos": "n.", "definition": "a severe mental disorder characterized by antisocial behavior", "chinese": "精神病态；以反社会行为为特征的严重心理障碍", "example": "Researchers have identified certain neurological patterns that may be associated with the development of psychopathy.", "example_zh": "研究人员已发现某些可能与精神病态发展有关的神经学模式。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopath", "ipa": "ˋsaɪkəˌpæθ", "pos": "n.", "definition": "a person lacking an inner moral censor; often commits antisocial acts", "chinese": "精神病态者；缺乏内在道德约束、常犯反社会行为的人", "example": "The documentary examined the question of whether a psychopath can genuinely change with the right treatment.", "example_zh": "这部纪录片探讨了一个问题：精神病态者是否能透过适当的治疗真正改变。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "sociopath", "ipa": "ˋsoʃɪəˌpæθ", "pos": "n.", "definition": "a person with no social conscience; antisocial personality", "chinese": "反社会人格者；缺乏社会良知、具有反社会人格的人", "example": "A sociopath may appear charming on the surface but is fundamentally indifferent to the feelings and rights of others.", "example_zh": "反社会人格者表面上可能显得迷人，但本质上对他人的感受和权利漠然置之。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychosomatic", "ipa": "ˌsaɪkosəˋmætɪk", "pos": "adj.", "definition": "describing the powerful influence of the mind on bodily disease", "chinese": "心身症的；描述心理对身体疾病强大影响的", "example": "The doctor suggested that her recurring headaches might be psychosomatic, triggered by stress rather than any physical cause.", "example_zh": "医师建议，她反复出现的头痛可能是心身症，是由压力而非任何生理原因所引发的。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychoanalysis", "ipa": "ˌsaɪkoəˋnæləsɪs", "pos": "n.", "definition": "a method of psychological therapy using Freudian techniques", "chinese": "精神分析；运用佛洛伊德技术的心理治疗方法", "example": "Psychoanalysis involves exploring the unconscious mind through free association, dream interpretation, and discussion of past experiences.", "example_zh": "精神分析透过自由联想、梦的诠释及讨论过往经历，来探索潜意识的心灵世界。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychoanalytic", "ipa": "ˌsaɪkoˌænəˋlɪtɪk", "pos": "adj.", "definition": "pertaining to psychoanalysis", "chinese": "精神分析的；与精神分析相关的", "example": "The therapist used a psychoanalytic approach to help her client uncover the childhood experiences underlying her fear of abandonment.", "example_zh": "治疗师采用精神分析方法，帮助当事人发现其遗弃恐惧背后的童年经历。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychogenic", "ipa": "ˌsaɪkəˋdʒɛnɪk", "pos": "adj.", "definition": "originating in the mind or emotions", "chinese": "心因性的；起源于心理或情绪的", "example": "The physician concluded that the patient's paralysis was psychogenic, with no detectable neurological damage.", "example_zh": "医师得出结论，病人的瘫痪是心因性的，没有可检测出的神经系统损伤。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapy", "ipa": "ˌsaɪkoˋθɛrəpɪ", "pos": "n.", "definition": "general term for psychological treatment of emotional disorders", "chinese": "心理治疗；情绪疾患的心理治疗之统称", "example": "After the loss of her husband, she found psychotherapy invaluable in helping her process her grief and rebuild her life.", "example_zh": "在失去丈夫后，她发现心理治疗对她处理悲伤、重建生活非常有帮助。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapist", "ipa": "ˌsaɪkoˋθɛrəpɪst", "pos": "n.", "definition": "a practitioner who provides psychological treatment", "chinese": "心理治疗师；提供心理治疗的执业者", "example": "The psychotherapist helped the couple identify destructive communication patterns and develop healthier ways of resolving conflict.", "example_zh": "心理治疗师帮助这对夫妇找出破坏性的沟通模式，并培养更健康的解决冲突方式。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapeutic", "ipa": "ˌsaɪkoˌθɛrəˋpjutɪk", "pos": "adj.", "definition": "pertaining to the treatment of mental or emotional disorders", "chinese": "心理治疗的；与治疗心理或情绪疾患相关的", "example": "The hospital introduced new psychotherapeutic programs for veterans dealing with post-traumatic stress disorder.", "example_zh": "医院为患有创伤后压力症候群的退伍军人引入了新的心理治疗计划。"}], "Session 9: Dental Specialists and Related Words": [{"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontist", "ipa": "ˌpidəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in children's teeth", "chinese": "儿童牙科医师；专门诊治儿童牙齿的牙科医师", "example": "The pedodontist created a fun, colorful office environment to help young patients feel less anxious about dental visits.", "example_zh": "儿童牙科医师打造了充满活力、色彩缤纷的诊所环境，帮助小病患对看牙感到较不紧张。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontia", "ipa": "ˌpidəˋdɑnʃə", "pos": "n.", "definition": "the specialty of child dentistry", "chinese": "儿童牙科学；儿童牙科的专科领域", "example": "Pedodontia emphasizes preventive care, teaching children proper brushing habits from an early age.", "example_zh": "儿童牙科学强调预防性照护，从小教导孩童正确的刷牙习惯。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontic", "ipa": "ˌpidəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to child dentistry", "chinese": "儿童牙科的；与儿童牙科相关的", "example": "The clinic opened a new pedodontic wing staffed entirely by specialists trained to work with young patients.", "example_zh": "诊所新开设了一个儿童牙科专区，全部由受过训练、专门服务幼小病患的专科医师驻诊。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontist", "ipa": "ˌpɛrɪəˋdɑntɪst", "pos": "n.", "definition": "a gum specialist", "chinese": "牙周科医师；牙龈疾病的专科医师", "example": "The periodontist performed a deep cleaning procedure to remove the buildup of tartar below the gum line.", "example_zh": "牙周科医师进行了深层清洁手术，清除牙龈线以下积累的牙结石。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontia", "ipa": "ˌpɛrɪəˋdɑnʃə", "pos": "n.", "definition": "the specialty of treating gum diseases", "chinese": "牙周科学；治疗牙龈疾病的专科领域", "example": "Advances in periodontia have made it possible to treat severe gum disease with minimal invasiveness.", "example_zh": "牙周科学的进步使得以最小侵入性治疗严重牙龈疾病成为可能。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontic", "ipa": "ˌpɛrɪəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to gum treatment", "chinese": "牙周的；与牙龈治疗相关的", "example": "Her dentist referred her to a specialist for periodontic treatment after identifying early signs of gum recession.", "example_zh": "她的牙医在发现早期牙龈萎缩迹象后，将她转介给专科医师进行牙周治疗。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontist", "ipa": "ˌɛndəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in root-canal therapy and treatment of the tooth pulp", "chinese": "牙髓科医师；专门进行根管治疗和牙髓处置的牙科医师", "example": "When the infection reached the pulp of the tooth, her dentist referred her to an endodontist for a root canal.", "example_zh": "当感染蔓延至牙髓时，她的牙医将她转介给牙髓科医师进行根管治疗。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontia", "ipa": "ˌɛndəˋdɑnʃə", "pos": "n.", "definition": "the dental specialty involving the pulp and root canal", "chinese": "牙髓科学；涉及牙髓和根管的牙科专科", "example": "Endodontia focuses on saving teeth that might otherwise need to be extracted due to deep decay or infection.", "example_zh": "牙髓科学致力于保留那些因深度蛀牙或感染而否则需要拔除的牙齿。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontic", "ipa": "ˌɛndəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to root-canal treatment", "chinese": "根管治疗的；与根管治疗相关的", "example": "The endodontic procedure took less than an hour and relieved the severe toothache he had been suffering for days.", "example_zh": "根管治疗手术不到一小时便完成，缓解了他多日来忍受的剧烈牙痛。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontist", "ipa": "ˌɛksəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in tooth extraction", "chinese": "拔牙科医师；专门从事牙齿拔除的牙科医师", "example": "The oral surgeon, who also practiced as an exodontist, removed all four wisdom teeth under general anesthesia.", "example_zh": "那位同时担任拔牙科医师的口腔外科医师在全身麻醉下拔除了所有四颗智齿。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontia", "ipa": "ˌɛksəˋdɑnʃə", "pos": "n.", "definition": "the specialty of tooth extraction", "chinese": "拔牙科学；牙齿拔除的牙科专科领域", "example": "Exodontia is one of the oldest dental procedures, practiced for centuries before modern anesthetics were developed.", "example_zh": "拔牙科学是最古老的牙科手术之一，早在现代麻醉药发明之前就已实行了数百年。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontic", "ipa": "ˌɛksəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to tooth extraction", "chinese": "拔牙的；与牙齿拔除相关的", "example": "The student's oral surgery rotation covered several exodontic techniques for the removal of impacted teeth.", "example_zh": "那名学生的口腔外科轮训涵盖了数种拔除阻生齿的拔牙技术。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "thermometer", "ipa": "θɚˋmɑmɪtɚ", "pos": "n.", "definition": "an instrument that measures heat", "chinese": "温度计；测量温度的仪器", "example": "The nurse placed the thermometer under the child's tongue and confirmed he had a temperature of 38.5 degrees.", "example_zh": "护士将温度计放在孩子的舌头下，确认他的体温为38.5度。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "barometer", "ipa": "bəˋrɑmɪtɚ", "pos": "n.", "definition": "an instrument that measures atmospheric pressure", "chinese": "气压计；测量大气压力的仪器", "example": "The falling reading on the barometer warned the sailors that a storm was likely to arrive within hours.", "example_zh": "气压计上下降的读数警告水手们，暴风雨可能在数小时内到来。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "barometric", "ipa": "ˌbærəˋmɛtrɪk", "pos": "adj.", "definition": "pertaining to atmospheric pressure measurement", "chinese": "气压的；与大气压力测量相关的", "example": "Meteorologists noted a sharp drop in barometric pressure as the tropical storm approached the coast.", "example_zh": "气象学家在热带风暴逼近海岸时，注意到气压急剧下降。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "sphygmomanometer", "ipa": "ˌsfɪgmoməˋnɑmɪtɚ", "pos": "n.", "definition": "a device for measuring blood pressure", "chinese": "血压计；测量血压的装置", "example": "The nurse wrapped the cuff of the sphygmomanometer around the patient's arm and listened with a stethoscope.", "example_zh": "护士将血压计的袖带缠在病人的手臂上，并用听诊器聆听。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "osteopathy", "ipa": "ˌɑstɪˋɑpəθɪ", "pos": "n.", "definition": "the practice and theory of osteopathic medicine", "chinese": "整骨疗法；整骨医学的理论与实践", "example": "Osteopathy treats the body as an integrated whole, addressing structural and functional problems through manual techniques.", "example_zh": "整骨疗法将身体视为一个整体，透过徒手技术处理结构性和功能性问题。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "osteopathic", "ipa": "ˌɑstɪəˋpæθɪk", "pos": "adj.", "definition": "pertaining to osteopathic medicine", "chinese": "整骨医学的；与整骨疗法相关的", "example": "The osteopathic physician combined spinal manipulation with conventional medical treatment to address the patient's chronic pain.", "example_zh": "整骨医师结合脊椎矫正与传统医疗来处理病人的慢性疼痛。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podiatry", "ipa": "poˋdaɪətrɪ", "pos": "n.", "definition": "the treatment of foot ailments", "chinese": "足病学；治疗足部疾病的医疗专科", "example": "Podiatry has become increasingly important for diabetic patients, who are at higher risk of developing serious foot complications.", "example_zh": "足病学对糖尿病患者越来越重要，因为他们罹患严重足部并发症的风险较高。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podiatric", "ipa": "ˌpoˋdaɪætrɪk", "pos": "adj.", "definition": "pertaining to foot care", "chinese": "足部照护的；与足病学相关的", "example": "The athlete received regular podiatric care to manage the stress fractures and tendon injuries common in long-distance runners.", "example_zh": "那位运动员定期接受足部照护治疗，以处理长跑运动员常见的应力性骨折和肌腱损伤。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "octopus", "ipa": "ˋɑktəpəs", "pos": "n.", "definition": "an eight-armed sea creature", "chinese": "章鱼；有八条触手的海洋生物", "example": "The octopus squeezed its boneless body through a tiny gap in the aquarium tank to reach the crabs in the neighboring tank.", "example_zh": "章鱼把牠无骨的身体挤过水族箱隔板上的一个小缝隙，以抵达邻近水槽中的螃蟹。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "platypus", "ipa": "ˋplætɪpəs", "pos": "n.", "definition": "an egg-laying mammal with webbed feet and a duck's bill", "chinese": "鸭嘴兽；一种有蹼足和鸭嘴、能产卵的哺乳动物", "example": "The platypus is one of the few venomous mammals in the world, capable of delivering a painful sting with its hind spur.", "example_zh": "鸭嘴兽是世界上少数有毒的哺乳动物之一，能用后腿上的毒刺给予痛苦的刺伤。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podium", "ipa": "ˋpodiəm", "pos": "n.", "definition": "a speaker's platform", "chinese": "讲台；演讲者站立的台架", "example": "The award winner stepped up to the podium, took a deep breath, and began her acceptance speech.", "example_zh": "获奖者走上讲台，深吸一口气，开始了她的得奖感言。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "tripod", "ipa": "ˋtraɪpɑd", "pos": "n.", "definition": "a three-legged stand", "chinese": "三脚架；三脚支撑架", "example": "The photographer set up her tripod on the cliff edge to capture the long-exposure shot of the night sky.", "example_zh": "摄影师在悬崖边架起她的三脚架，拍摄夜空的长曝光照片。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropodist", "ipa": "kaɪˋrɑpədɪst", "pos": "n.", "definition": "an earlier title for podiatrist", "chinese": "足科医师（旧称）；足病医师的早期称谓", "example": "In older medical texts, the professional now called a podiatrist was commonly referred to as a chiropodist.", "example_zh": "在较早的医学文献中，现在称为足病医师的执业者通常被称为「chiropodist」。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropody", "ipa": "kaɪˋrɑpədɪ", "pos": "n.", "definition": "the treatment of minor ailments of the foot and hand", "chinese": "足手科（旧称）；治疗足部和手部轻微疾病的医疗实践", "example": "Chiropody, which once encompassed both hand and foot care, has largely been replaced in modern usage by the term podiatry.", "example_zh": "足手科曾涵盖足部和手部的照护，如今在现代用语中大多已被「足病学」一词所取代。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropractic", "ipa": "ˌkaɪrəˋpræktɪk", "pos": "n.", "definition": "the practice of treating illness by manipulating the spinal column", "chinese": "脊骨神经医学；透过操作脊椎柱治疗疾病的医疗实践", "example": "Many patients turn to chiropractic as an alternative to pain medication for managing back and neck discomfort.", "example_zh": "许多病患转向脊骨神经医学，以取代止痛药来处理背部和颈部不适。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirography", "ipa": "kaɪˋrɑgrəfɪ", "pos": "n.", "definition": "the art of handwriting; penmanship", "chinese": "书法；手写艺术；书写技艺", "example": "The monk devoted decades to perfecting his chirography, producing manuscripts of extraordinary beauty and precision.", "example_zh": "那位僧侣花了几十年时间磨练自己的书写艺术，创作出极具美感与精准度的手抄本。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirographer", "ipa": "kaɪˋrɑgrəfɚ", "pos": "n.", "definition": "an expert in handwriting or penmanship", "chinese": "书法专家；手写或书法的行家", "example": "The museum hired a chirographer to restore the faded ink of several centuries-old manuscripts in their collection.", "example_zh": "博物馆聘请了一位书法专家，修复馆藏中数份已褪色的百年手稿墨迹。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirographic", "ipa": "ˌkaɪrəˋgræfɪk", "pos": "adj.", "definition": "pertaining to handwriting", "chinese": "书写的；与手写或书法相关的", "example": "The researcher studied chirographic traditions across cultures to trace the spread of early writing systems.", "example_zh": "那位研究员研究各文化的书写传统，以追踪早期书写系统的传播。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromancy", "ipa": "ˋkaɪrəˌmænsɪ", "pos": "n.", "definition": "the practice of foretelling events by reading the palm", "chinese": "手相术；透过阅读手掌纹路预测未来事件的占卜术", "example": "At the medieval fair, a fortune-teller offered chiromancy readings, tracing the lines of visitors' palms with theatrical flair.", "example_zh": "在中世纪市集上，一位算命师以戏剧性的风格提供手相占卜服务，描摩著游客手掌上的纹路。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromancer", "ipa": "ˋkaɪrəˌmænsɚ", "pos": "n.", "definition": "one who practices palm reading", "chinese": "手相师；从事手相占卜的人", "example": "The chiromancer claimed she could reveal a person's fate, health, and love life simply by examining the lines of their hand.", "example_zh": "那位手相师声称，只需端详一个人手上的纹路，便能揭示其命运、健康和感情生活。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromantic", "ipa": "ˌkaɪrəˋmæntɪk", "pos": "adj.", "definition": "pertaining to palm reading", "chinese": "手相术的；与手相占卜相关的", "example": "The chiromantic tradition dates back thousands of years and has been practiced in cultures from India to ancient Greece.", "example_zh": "手相术的传统可追溯至数千年前，从印度到古希腊的各种文化中都有其实践踪迹。"}], "Session 10: Writing and Writers (graphein)": [{"session": "Session 10: Writing and Writers (graphein)", "word": "graphology", "ipa": "græˋfɑlədʒɪ", "pos": "n.", "definition": "the analysis of handwriting to determine character", "chinese": "笔迹学；透过分析笔迹判断性格的学科", "example": "Some companies once used graphology as part of their hiring process, though its scientific validity remains disputed.", "example_zh": "有些公司曾将笔迹学纳入招聘流程，但其科学有效性至今仍有争议。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "graphological", "ipa": "ˌgræfəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to handwriting analysis", "chinese": "笔迹学的；与笔迹分析相关的", "example": "The graphological report noted that the suspect's handwriting showed signs of impulsiveness and emotional instability.", "example_zh": "笔迹学报告指出，嫌疑人的笔迹显示出冲动和情绪不稳定的迹象。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligraphy", "ipa": "kəˋlɪgrəfɪ", "pos": "n.", "definition": "beautiful handwriting; penmanship as an artistic expression", "chinese": "书法；美丽的手写字；作为艺术表现的书写技艺", "example": "The wedding invitations were handwritten in calligraphy by a local artist, giving them an elegant, timeless quality.", "example_zh": "婚礼请帖由当地艺术家以书法亲手书写，赋予它们一种优雅而隽永的气质。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligrapher", "ipa": "kəˋlɪgrəfɚ", "pos": "n.", "definition": "an expert in artistic handwriting", "chinese": "书法家；精通艺术书写的专家", "example": "The calligrapher spent years studying under a master in Kyoto before opening her own studio in New York.", "example_zh": "那位书法家在京都师从一位大师学习多年，才在纽约开设了自己的工作室。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligraphic", "ipa": "ˌkælɪˋgræfɪk", "pos": "adj.", "definition": "pertaining to artistic handwriting", "chinese": "书法的；与艺术书写相关的", "example": "The ancient scroll bore calligraphic inscriptions of such beauty that scholars debated who among the great masters had written it.", "example_zh": "那卷古老的卷轴上有著极为优美的书法铭文，学者们争论著究竟是哪位大师挥毫写下的。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "callipygian", "ipa": "ˌkælɪˋpɪdʒɪən", "pos": "adj.", "definition": "having shapely or attractive buttocks", "chinese": "臀部曲线优美的；臀部形状迷人的", "example": "The term callipygian originates from a famous ancient Greek statue celebrated for the beauty of its form.", "example_zh": "「callipygian」这个词源于一座因形体之美而著名的古希腊雕像。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacography", "ipa": "kæˋkɑgrəfɪ", "pos": "n.", "definition": "ugly, bad, or illegible handwriting", "chinese": "劣书；丑陋、恶劣或难以辨认的笔迹", "example": "The professor's lecture notes were legendary for their cacography — students joked they needed a decoder ring to read them.", "example_zh": "那位教授的课堂笔记因其潦草的字迹而声名狼藉——学生们开玩笑说需要解码器才能看懂。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacographer", "ipa": "kæˋkɑgrəfɚ", "pos": "n.", "definition": "one who uses bad or illegible handwriting", "chinese": "劣书者；字迹拙劣或难以辨认的人", "example": "As a notorious cacographer, his letters always required a second reading before their meaning became clear.", "example_zh": "身为一个恶名昭彰的劣书者，他的信件总是需要读第二遍才能看懂其中的意思。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacographic", "ipa": "ˌkækəˋgræfɪk", "pos": "adj.", "definition": "pertaining to bad handwriting", "chinese": "字迹拙劣的；与恶劣书写相关的", "example": "The cacographic scrawl on the prescription nearly caused a medication error at the pharmacy.", "example_zh": "处方笺上那潦草的字迹差点在药房造成了用药错误。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "gerontology", "ipa": "ˌdʒɛrənˋtɑlədʒɪ", "pos": "n.", "definition": "the science of the social, economic, and other non-medical problems of old age", "chinese": "老年学；研究老龄化社会、经济及其他非医疗性问题的学科", "example": "The university's department of gerontology publishes research on retirement planning, elder loneliness, and aging policy.", "example_zh": "大学的老年学系发表了有关退休规划、老年孤独感及老龄化政策的研究。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "gerontological", "ipa": "ˌdʒɛrɑntəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to the study of aging problems", "chinese": "老年学的；与研究老龄化问题相关的", "example": "The conference brought together gerontological researchers from fifteen countries to discuss policies for aging populations.", "example_zh": "这次会议汇聚了来自十五个国家的老年学研究人员，共同讨论老龄化人口的相关政策。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senile", "ipa": "ˋsinl", "pos": "adj.", "definition": "showing signs of physical and mental deterioration from old age", "chinese": "老衰的；显示出因老龄化而产生身心退化迹象的", "example": "At ninety-four, he remained sharp and witty, showing none of the senile confusion his family had feared.", "example_zh": "在九十四岁时，他依然思维敏锐、幽默风趣，完全没有家人所担心的老衰性混乱。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senility", "ipa": "sɪˋnɪlɪtɪ", "pos": "n.", "definition": "mental and physical deterioration of old age", "chinese": "老衰；老年引起的身心退化", "example": "The family struggled to accept that their once-vibrant grandmother was showing increasing signs of senility.", "example_zh": "家人难以接受他们曾经充满活力的祖母正出现日益明显的老衰迹象。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senescent", "ipa": "sɪˋnɛsənt", "pos": "adj.", "definition": "aging; growing old", "chinese": "衰老中的；逐渐老去的", "example": "Scientists are studying the behavior of senescent cells to understand how they contribute to age-related diseases.", "example_zh": "科学家正在研究衰老细胞的行为，以了解它们如何导致与年龄相关的疾病。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senescence", "ipa": "sɪˋnɛsəns", "pos": "n.", "definition": "the process of growing old", "chinese": "老化过程；衰老的历程", "example": "Biologists study senescence at the cellular level to identify the mechanisms that drive the aging process.", "example_zh": "生物学家在细胞层次研究老化过程，以找出驱动衰老历程的机制。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senior", "ipa": "ˋsinjɚ", "pos": "adj.", "definition": "older", "chinese": "年长的；较年老的", "example": "The company offered a special discount to senior citizens over the age of sixty-five.", "example_zh": "这家公司为六十五岁以上的老年市民提供特别折扣。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senate", "ipa": "ˋsɛnɪt", "pos": "n.", "definition": "originally a council of older citizens", "chinese": "参议院；（源义）由年长市民组成的议会", "example": "The bill passed narrowly in the senate after weeks of fierce debate between the two parties.", "example_zh": "在两党数周激烈辩论之后，该法案在参议院以些微差距获得通过。"}], "Session 11: Scientists and Their Fields": [{"session": "Session s across hundreds of miles.", "example_zh": "这位动物学家追踪了非洲象横跨数百英里的迁徙路线。"}, {"session": "Session 11: Scientists and Their Fields", "word": "entomologist", "ipa": "ˌɛntəˈmɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies insects", "chinese": "昆虫学家", "example": "The entomologist collected dozens of beetle specimens from the forest floor to classify them.", "example_zh": "这位昆虫学家从森林地面收集了数十个甲虫标本，以便对其分类。"}, {"session": "Session 11: Scientists and Their Fields", "word": "philologist", "ipa": "fɪˈlɑlədʒɪst", "pos": "n.", "definition": "a linguistic scientist who studies the history and structure of language", "chinese": "语文学家", "example": "The philologist traced the evolution of the word \"salary\" back to the Latin word for salt.", "example_zh": "这位语文学家将「salary」一词的演变追溯到拉丁语中表示盐的词汇。"}, {"session": "Session 11: Scientists and Their Fields", "word": "semanticist", "ipa": "sɪˈmæntɪsɪst", "pos": "n.", "definition": "a scientist who studies the psychological effects of words", "chinese": "语义学家", "example": "The semanticist analyzed how the word \"freedom\" triggers different emotional responses in different cultures.", "example_zh": "这位语义学家分析了「自由」这个词在不同文化中如何引发不同的情绪反应。"}, {"session": "Session 11: Scientists and Their Fields", "word": "sociologist", "ipa": "ˌsosɪˈɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies the ways people live together in society", "chinese": "社会学家", "example": "The sociologist published a study on how social media has changed the way teenagers form friendships.", "example_zh": "这位社会学家发表了一项关于社群媒体如何改变青少年建立友谊方式的研究。"}], "Session 12: Sciences of the Universe and Life": [{"session": "Session 12: Sciences of the Universe and Life", "word": "anthropology", "ipa": "ˌænθrəˈpɑlədʒɪ", "pos": "n.", "definition": "the science of human development", "chinese": "人类学", "example": "Her studies in anthropology gave her a deep appreciation for the diversity of human cultures.", "example_zh": "她在人类学方面的学习让她对人类文化的多样性有了深刻的认识。"}, {"session": "Session 12: Scien
