"n.", "definition": "a good deed; an act of charity", "chinese": "善行；慈善行为；捐赠", "example": "His greatest benefaction was establishing a scholarship fund for underprivileged students.", "example_zh": "他最伟大的善行是为弱势学生设立奖学金基金。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficiary", "ipa": "ˌbenɪˈfɪʃəri", "pos": "n.", "definition": "the recipient of a gift, benefit, or charitable act", "chinese": "受益人；受惠者；获益者", "example": "She was listed as the primary beneficiary of her grandfather's estate.", "example_zh": "她被列为祖父遗产的主要受益人。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benevolent", "ipa": "bɪˈnevələnt", "pos": "adj.", "definition": "wishing well to others; charitable; kindly disposed", "chinese": "仁慈的；善心的；乐善好施的", "example": "The benevolent organization provided meals and shelter to hundreds of homeless families.", "example_zh": "那个仁慈的机构为数百个无家可归的家庭提供餐食和庇护所。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benevolence", "ipa": "bɪˈnevələns", "pos": "n.", "definition": "goodwill; disposition to do good", "chinese": "善意；慈善；仁爱", "example": "Acts of benevolence, however small, can have a profound impact on those in need.", "example_zh": "善意的行动，无论多么细小，都能对有需要的人产生深远的影响。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "bona fide", "ipa": "ˌboʊnə ˈfaɪdi", "pos": "adj./adv.", "definition": "in good faith; genuine; sincere; valid", "chinese": "真诚的；真正的；真实有效的；善意地", "example": "The auctioneer verified that the painting was a bona fide work by the master.", "example_zh": "拍卖师确认这幅画是大师的真迹。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "fidelity", "ipa": "fɪˈdelɪti", "pos": "n.", "definition": "faithfulness; loyalty", "chinese": "忠诚；忠实；信守（承诺）", "example": "He demonstrated his fidelity to the company by turning down a more lucrative offer elsewhere.", "example_zh": "他拒绝了其他地方更丰厚的职位，以此展示他对公司的忠诚。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "infidelity", "ipa": "ˌɪnfɪˈdelɪti", "pos": "n.", "definition": "unfaithfulness, especially in marriage", "chinese": "不忠；不贞；（尤指婚姻中的）外遇", "example": "The discovery of infidelity shattered the trust they had built over twenty years of marriage.", "example_zh": "外遇的揭露摧毁了他们二十年婚姻中建立的信任。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "infidel", "ipa": "ˈɪnfɪdəl", "pos": "n.", "definition": "one who does not hold the \"true\" faith; a non-believer", "chinese": "异教徒；不信者；不信仰（某特定宗教的人）", "example": "In medieval Europe, anyone who was not Christian was often labeled an infidel.", "example_zh": "在中世纪欧洲，任何非基督徒的人往往被标签为异教徒。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "dictatorial", "ipa": "ˌdɪktəˈtɔːriəl", "pos": "adj.", "definition": "domineering; giving orders in a manner permitting no refusal", "chinese": "独裁的；专横的；不容置疑的", "example": "His dictatorial management style alienated his staff and caused high turnover.", "example_zh": "他独裁式的管理风格疏远了员工，导致高离职率。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "volition", "ipa": "vəˈlɪʃən", "pos": "n.", "definition": "the act or power of willing; free will", "chinese": "意志力；自由意志；主动选择", "example": "She left the job of her own volition — no one pressured her to resign.", "example_zh": "她自愿离职——没有人施压要她辞职。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placation", "ipa": "pleɪˈkeɪʃən", "pos": "n.", "definition": "the act of pacifying; changing hostility to friendliness", "chinese": "安抚；平息；化解敌意的行动", "example": "The government's placation of the protesters with minor concessions failed to resolve the underlying tensions.", "example_zh": "政府以小小的让步安抚抗议者，未能解决根本的紧张局势。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placative", "ipa": "ˈpleɪkətɪv", "pos": "adj.", "definition": "tending or intended to pacify or soothe", "chinese": "有安抚作用的；旨在平息的", "example": "He offered a placative gesture, handing her a cup of tea before beginning the difficult conversation.", "example_zh": "他做出安抚的姿态，在展开艰难对话之前递给她一杯茶。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placatory", "ipa": "ˈpleɪkətɔːri", "pos": "adj.", "definition": "tending or intended to pacify or soothe", "chinese": "抚慰性的；试图平息的；和解的", "example": "The company issued a placatory statement after the backlash over its controversial advertisement.", "example_zh": "公司在其争议广告引发强烈反响后发表了安抚性声明。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placable", "ipa": "ˈpleɪkəbəl", "pos": "adj.", "definition": "able to be soothed or pacified", "chinese": "可安抚的；易于平息的；通情达理的", "example": "Unlike his hot-tempered brother, he was placable and quick to forgive.", "example_zh": "与他脾气暴躁的兄弟不同，他容易被安抚，也很快就能原谅别人。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "implacable", "ipa": "ɪmˈplækəbəl", "pos": "adj.", "definition": "unyielding; beyond soothing; relentlessly hostile", "chinese": "难以平息的；无法安抚的；冷酷无情的", "example": "The implacable rivalry between the two firms drove them both to the brink of financial ruin.", "example_zh": "两家公司之间无法平息的竞争将他们双双推向财务破产的边缘。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "implacability", "ipa": "ɪmˌplækəˈbɪlɪti", "pos": "n.", "definition": "the quality of being implacable", "chinese": "难以平息的特质；冷酷无情；无法妥协", "example": "The villain's implacability made any chance of negotiation impossible.", "example_zh": "那个反派的冷酷无情使任何谈判的可能都成为泡影。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placid", "ipa": "ˈplæsɪd", "pos": "adj.", "definition": "calm; easygoing; undisturbed", "chinese": "平静的；温和的；不易激动的", "example": "The placid lake reflected the mountains perfectly on a windless morning.", "example_zh": "平静的湖面在无风的早晨完美倒映著山脉。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placidity", "ipa": "pləˈsɪdɪti", "pos": "n.", "definition": "calmness; serenity", "chinese": "平静；安详；沉著", "example": "The placidity of the countryside was a welcome contrast to the chaos of city life.", "example_zh": "乡村的平静是城市生活混乱的令人欢迎的对比。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "complacent", "ipa": "kəmˈpleɪsənt", "pos": "adj.", "definition": "self-satisfied; smug; pleased with oneself", "chinese": "自满的；沾沾自喜的；得意洋洋的", "example": "After a string of successes, the team grew complacent and was caught off guard by their rivals.", "example_zh": "一连串的成功之后，这支团队变得自满，被对手打得措手不及。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "complacency", "ipa": "kəmˈpleɪsənsi", "pos": "n.", "definition": "self-satisfaction; smugness", "chinese": "自满；得意；沾沾自喜", "example": "The coach warned against complacency, reminding the players that every opponent deserved respect.", "example_zh": "教练警告不要自满，提醒球员每个对手都值得尊重。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "condonation", "ipa": "ˌkɒndəˈneɪʃən", "pos": "n.", "definition": "the act of overlooking or forgiving a transgression", "chinese": "默许；宽宥；对过失的暗中原谅", "example": "The board's condonation of the executive's misconduct sent the wrong message to all employees.", "example_zh": "董事会对主管不当行为的默许向所有员工传递了错误的信号。"}], "Session 24: Adjectives for Speech Habits": [{"session": "Session 24: Adjectives for Speech Habits", "word": "taciturn", "ipa": "ˈtæsɪtɜːrn", "pos": "adj.", "definition": "habitually silent; disinclined to conversation", "chinese": "沉默寡言的；不喜交谈的；惯于不说话的", "example": "The taciturn farmer answered questions in single syllables and rarely volunteered information.", "example_zh": "那个沉默寡言的农夫用单音节回答问题，很少主动提供信息。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "laconic", "ipa": "ləˈkɒnɪk", "pos": "adj.", "definition": "brief and to the point; using few words; pithy", "chinese": "简洁的；言简意赅的；惜字如金的", "example": "His laconic reply — \"No.\" — ended the debate immediately.", "example_zh": "他言简意赅的回答——「不。」——立刻终结了辩论。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "inarticulate", "ipa": "ˌɪnɑːrˈtɪkjʊlət", "pos": "adj.", "definition": "unable to express oneself clearly; sputtering; incoherent", "chinese": "口齿不清的；无法清楚表达的；语无伦次的", "example": "He was inarticulate with shock after hearing the unexpected news.", "example_zh": "听到意外的消息后，他惊讶得语无伦次。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "garrulous", "ipa": "ˈɡærʊləs", "pos": "adj.", "definition": "talking excessively and meaninglessly; chattering", "chinese": "唠叨的；话多的；说个不停的", "example": "The garrulous taxi driver told his passenger about every detail of his life during the ride.", "example_zh": "那个唠叨的计程车司机在行车途中向乘客讲述了他生活的每一个细节。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "banal", "ipa": "bəˈnɑːl", "pos": "adj.", "definition": "trite; hackneyed; lacking originality", "chinese": "陈腐的；缺乏新意的；平庸的", "example": "The film's plot was banal, relying on every cliché in the romantic comedy playbook.", "example_zh": "这部电影的情节陈腐，完全依赖爱情喜剧剧本中的每一个老套桥段。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "verbose", "ipa": "vɜːrˈboʊs", "pos": "adj.", "definition": "using more words than necessary; wordy", "chinese": "冗长的；啰嗦的；使用过多词语的", "example": "His verbose reports frustrated colleagues who preferred concise, actionable summaries.", "example_zh": "他冗长的报告令偏爱简洁、可操作摘要的同事感到沮丧。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "voluble", "ipa": "ˈvɒljʊbəl", "pos": "adj.", "definition": "speaking rapidly and fluently; glib", "chinese": "口若悬河的；说话流利的；滔滔不绝的", "example": "The voluble salesperson could effortlessly chat about any topic to keep the customer engaged.", "example_zh": "那个口若悬河的销售员能够毫不费力地谈论任何话题以保持顾客的兴趣。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "cogent", "ipa": "ˈkoʊdʒənt", "pos": "adj.", "definition": "forcefully convincing; logically compelling", "chinese": "有说服力的；论据充分的；令人信服的", "example": "Her cogent argument persuaded even the most skeptical members of the committee.", "example_zh": "她有说服力的论点说服了委员会中最怀疑的成员。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "loquacious", "ipa": "loʊˈkweɪʃəs", "pos": "adj.", "definition": "very talkative; fond of talking", "chinese": "话多的；喜欢说话的；健谈的", "example": "The loquacious child peppered her grandmother with questions from the moment she arrived.", "example_zh": "那个话多的孩子一到就不停地向祖母提问。"}], "Session 25: Related Words for Silence and Speech": [{"session": "Session 25: Related Words for Silence and Speech", "word": "taciturnity", "ipa": "ˌtæsɪˈtɜːrnɪti", "pos": "n.", "definition": "habitual disinclination to talk", "chinese": "沉默寡言的习性；不爱说话的倾向", "example": "His taciturnity at dinner parties often made guests mistake his shyness for arrogance.", "example_zh": "他在晚宴上的沉默寡言常常让客人误把他的害羞当作傲慢。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "tacit", "ipa": "ˈtæsɪt", "pos": "adj.", "definition": "unspoken; implied without being stated", "chinese": "心照不宣的；不言而喻的；默示的", "example": "There was a tacit agreement among the team members never to discuss the failed project publicly.", "example_zh": "团队成员之间有一个不言而喻的共识，那就是永远不公开讨论那个失败的项目。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "tacitness", "ipa": "ˈtæsɪtnəs", "pos": "n.", "definition": "the quality of being unspoken or implied", "chinese": "不言而喻的特质；心照不宣的性质", "example": "The tacitness of her approval was understood by everyone in the room.", "example_zh": "她默许的心照不宣被房间里的每个人都理解了。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "reticent", "ipa": "ˈretɪsənt", "pos": "adj.", "definition": "preferring to keep silent; reluctant to disclose feelings", "chinese": "沉默的；不愿透露感情的；矜持的", "example": "She was reticent about her past and rarely spoke of her childhood.", "example_zh": "她对自己的过去保持沉默，很少谈及童年。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "reticence", "ipa": "ˈretɪsəns", "pos": "n.", "definition": "reluctance to speak or disclose feelings", "chinese": "沉默寡言；不愿表露感情；矜持", "example": "His reticence during the interview made the hiring manager wonder if he truly wanted the job.", "example_zh": "他在面试中的沉默让招聘经理怀疑他是否真的想要这份工作。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "loquacity", "ipa": "loʊˈkwæsɪti", "pos": "n.", "definition": "talkativeness", "chinese": "话多；喜欢说话的倾向；健谈", "example": "Her loquacity was endearing at first but became exhausting after several hours.", "example_zh": "她的话多起初令人觉得可爱，但几个小时后就令人精疲力竭了。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquy", "ipa": "səˈlɪləkwi", "pos": "n.", "definition": "a speech to oneself; speaking one's thoughts aloud (esp. in a play)", "chinese": "独白；自言自语；（尤指戏剧中的）独白", "example": "Hamlet's soliloquy \"To be or not to be\" is one of the most famous passages in English literature.", "example_zh": "哈姆雷特的独白「生存还是毁灭」是英国文学中最著名的段落之一。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquist", "ipa": "səˈlɪləkwɪst", "pos": "n.", "definition": "one who delivers a soliloquy", "chinese": "独白者；自言自语的人", "example": "The actor, a skilled soliloquist, held the audience in rapt attention for the entire speech.", "example_zh": "那位演员是个出色的独白者，在整段独白期间让观众屏息凝神。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquize", "ipa": "səˈlɪləkwaɪz", "pos": "v.", "definition": "to deliver a soliloquy; to talk to oneself aloud", "chinese": "发表独白；大声自言自语", "example": "She often soliloquized while cooking, working through her problems out loud.", "example_zh": "她做饭时常常自言自语，大声梳理自己的问题。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquist", "ipa": "venˈtrɪləkwɪst", "pos": "n.", "definition": "one who can throw his voice", "chinese": "腹语术者；口技演员", "example": "The ventriloquist's act was so convincing that children in the audience truly believed the puppet was alive.", "example_zh": "那位腹语术者的表演如此逼真，以至于观众中的孩子们真的相信木偶是活的。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquism", "ipa": "venˈtrɪləkwɪzəm", "pos": "n.", "definition": "the art of throwing one's voice", "chinese": "腹语术；口技", "example": "Ventriloquism requires years of practice to perfect the art of speaking without moving your lips.", "example_zh": "腹语术需要多年练习才能掌握不动嘴唇说话的艺术。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquistic", "ipa": "venˌtrɪləˈkwɪstɪk", "pos": "adj.", "definition": "of or pertaining to ventriloquism", "chinese": "腹语术的；与口技相关的", "example": "His ventriloquistic skills were so refined that even professional entertainers were impressed.", "example_zh": "他的腹语术技艺如此精湛，连专业演艺人员也印象深刻。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "colloquial", "ipa": "kəˈloʊkwiəl", "pos": "adj.", "definition": "pertaining to informal, everyday conversational speech", "chinese": "口语的；日常会话的；非正式的", "example": "The essay lost marks because it was too colloquial for an academic submission.", "example_zh": "这篇文章因口语化程度太高，不适合学术提交而被扣分。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "colloquialism", "ipa": "kəˈloʊkwiəlɪzəm", "pos": "n.", "definition": "an informal expression used in everyday conversation", "chinese": "口语表达；俗语；日常会话用语", "example": "\"Gonna\" and \"wanna\" are colloquialisms that are inappropriate in formal writing.", "example_zh": "「Gonna」和「wanna」是口语表达，不适合用于正式写作中。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "circumlocution", "ipa": "ˌsɜːrkəmləˈkjuːʃən", "pos": "n.", "definition": "indirect, roundabout expression; talking around an idea", "chinese": "迂回的表达方式；绕圈子说话；拐弯抹角", "example": "Instead of just saying he was fired, he used circumlocution to describe \"an organizational restructuring that affected his position.\"", "example_zh": "他没有直接说自己被解雇，而是用拐弯抹角的说法描述「影响了他职位的组织重组」。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "circumlocutory", "ipa": "ˌsɜːrkəmˈlɒkjʊtəri", "pos": "adj.", "definition": "expressed in a roundabout or indirect manner", "chinese": "迂回的；拐弯抹角的；间接表达的", "example": "His circumlocutory explanations frustrated the judge, who demanded straight answers.", "example_zh": "他迂回的解释令法官感到沮丧，法官要求他直接回答。"}], "Session 26: Laconic, Eloquent, and Related Words": [{"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconicism", "ipa": "ləˈkɒnɪsɪzəm", "pos": "n.", "definition": "the quality of using few words; a pithy expression", "chinese": "言简意赅的风格；简洁表达", "example": "The general was admired for his laconicism: his battle orders were never more than one sentence.", "example_zh": "那位将军以其言简意赅的风格而受人钦佩：他的战斗命令从不超过一句话。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconicity", "ipa": "ˌlækəˈnɪsɪti", "pos": "n.", "definition": "the quality of being laconic", "chinese": "简洁；惜字如金的特质", "example": "The poet's laconicity was deceptive — each short line carried layers of meaning.", "example_zh": "那位诗人的简洁具有欺骗性——每一个短句都蕴含多层含义。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconism", "ipa": "ˈlækənɪzəm", "pos": "n.", "definition": "a concise, pithy expression or statement", "chinese": "简洁的表达；精炼的陈述", "example": "\"If.\" — the Spartan reply to Philip of Macedon's threat — is history's most celebrated laconism.", "example_zh": "「如果。」——斯巴达人对马其顿腓力威胁的回复——是历史上最著名的简言。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "cogency", "ipa": "ˈkoʊdʒənsi", "pos": "n.", "definition": "the quality of being logically compelling; force of reason", "chinese": "说服力；论据的充分性；逻辑的有力性", "example": "The cogency of her argument left the opposing counsel with little to refute.", "example_zh": "她论点的说服力使对方律师几乎无从反驳。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "eloquent", "ipa": "ˈeləkwənt", "pos": "adj.", "definition": "vividly expressive; forceful or persuasive in language", "chinese": "雄辩的；口才出众的；极具表达力的", "example": "Her eloquent speech moved the entire audience to tears.", "example_zh": "她雄辩的演说令整个观众席热泪盈眶。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "eloquence", "ipa": "ˈeləkwəns", "pos": "n.", "definition": "the quality of being eloquent", "chinese": "口才；雄辩；极具说服力的表达", "example": "Lincoln's eloquence at Gettysburg transformed a brief cemetery dedication into an immortal address.", "example_zh": "林肯在葛底斯堡的雄辩将一次简短的公墓献词变成了永恒的演说。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magniloquent", "ipa": "mæɡˈnɪləkwənt", "pos": "adj.", "definition": "using high-flown, grandiose, or pompous language", "chinese": "夸张的；浮夸的；用词矫饰的", "example": "His magniloquent speeches impressed gullible voters but bored those who preferred plain talk.", "example_zh": "他夸张浮夸的演说让轻信的选民印象深刻，却令偏好直白表达的人感到厌倦。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magniloquence", "ipa": "mæɡˈnɪləkwəns", "pos": "n.", "definition": "the use of lofty, flowery, or overelegant language", "chinese": "夸大的言辞；浮夸的语言；矫饰的表达", "example": "The professor's magniloquence was so extreme that students needed a dictionary to follow his lectures.", "example_zh": "那位教授的浮夸言辞如此夸张，学生们需要一本字典才能听懂他的课。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "grandiloquent", "ipa": "ɡrænˈdɪləkwənt", "pos": "adj.", "definition": "using grand, pompous, or elevated language", "chinese": "夸夸其谈的；使用宏大夸张语言的；虚张声势的", "example": "The grandiloquent title he gave himself — \"Supreme Commander of Global Affairs\" — impressed no one.", "example_zh": "他给自己起的夸夸其谈的头衔——「全球事务最高指挥官」——没有让任何人印象深刻。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "grandiloquence", "ipa": "ɡrænˈdɪləkwəns", "pos": "n.", "definition": "the quality of using grandiose language", "chinese": "夸大的言辞；使用宏大语言的风格", "example": "The critic noted that the novel suffered from grandiloquence — big words used where simple ones would do.", "example_zh": "评论家指出这部小说患有夸大言辞的毛病——在可以用简单词语的地方却使用了大词。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbosity", "ipa": "vɜːrˈbɒsɪti", "pos": "n.", "definition": "wordiness; the use of excess words", "chinese": "冗长；啰嗦；用词过多", "example": "The editor trimmed the article's verbosity, cutting it from three thousand words to eight hundred.", "example_zh": "编辑削减了文章的冗长，将其从三千字删减至八百字。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "volubility", "ipa": "ˌvɒljʊˈbɪlɪti", "pos": "n.", "definition": "fluency and ease in speech; rapidity of speech", "chinese": "口若悬河；说话流利；语速快捷", "example": "Her volubility in three languages made her an invaluable translator at the conference.", "example_zh": "她能用三种语言口若悬河地表达，使她成为会议上不可或缺的翻译员。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "garrulity", "ipa": "ɡəˈruːlɪti", "pos": "n.", "definition": "the quality of chattering aimlessly and ceaselessly", "chinese": "唠叨；喋喋不休；无谓的多话", "example": "His garrulity at work meetings meant that simple discussions always ran over time.", "example_zh": "他在工作会议上的唠叨意味著简单的讨论总是超时。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnanimous", "ipa": "mæɡˈnænɪməs", "pos": "adj.", "definition": "big-hearted; generous; forgiving; noble in motive", "chinese": "宽宏大量的；慷慨的；大度的；高尚的", "example": "The champion was magnanimous in victory, praising his opponent's courage and skill.", "example_zh": "那位冠军胜利时表现得宽宏大量，称赞对手的勇气和技巧。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnate", "ipa": "ˈmæɡneɪt", "pos": "n.", "definition": "a person of great power or influence; a big wheel", "chinese": "大亨；有影响力的人物；权贵", "example": "The oil magnate owned refineries on three continents and employed tens of thousands of people.", "example_zh": "那位石油大亨在三大洲拥有炼油厂，并雇用了数万名员工。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnify", "ipa": "ˈmæɡnɪfaɪ", "pos": "v.", "definition": "to make larger; to make seem larger", "chinese": "放大；使看起来更大；夸大", "example": "The microscope magnified the cell's structure enough to reveal its internal components.", "example_zh": "显微镜将细胞结构放大到足以显示其内部成分。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnitude", "ipa": "ˈmæɡnɪtjuːd", "pos": "n.", "definition": "great size or extent", "chinese": "重大；规模；量级", "example": "The magnitude of the disaster was only fully appreciated after aerial surveys were completed.", "example_zh": "只有在航空勘测完成后，灾难的规模才得到充分认识。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnum opus", "ipa": "ˌmæɡnəm ˈoʊpəs", "pos": "n.", "definition": "a person's greatest work or masterpiece", "chinese": "杰作；（某人的）最伟大作品", "example": "Many critics consider Beethoven's Ninth Symphony his magnum opus.", "example_zh": "许多评论家认为贝多芬的第九交响曲是他的杰作。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbatim", "ipa": "vɜːrˈbeɪtɪm", "pos": "adv./adj.", "definition": "word for word", "chinese": "逐字地；一字不差地", "example": "The witness repeated the conversation verbatim, recalling every word with precision.", "example_zh": "那位证人逐字重复了对话，精确地回忆起每一个字。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbal", "ipa": "ˈvɜːrbəl", "pos": "adj.", "definition": "pertaining to words; oral rather than written", "chinese": "口头的；言语的；与文字相关的", "example": "They made a verbal agreement, though both parties later wished they had signed a contract.", "example_zh": "他们达成了口头协议，尽管双方后来都希望自己当时签了合约。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbalize", "ipa": "ˈvɜːrbəlaɪz", "pos": "v.", "definition": "to put into words", "chinese": "用语言表达；将（感受或想法）说出来", "example": "The therapist encouraged her to verbalize her fears rather than suppress them.", "example_zh": "治疗师鼓励她将恐惧说出来，而不是压抑它们。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbiage", "ipa": "ˈvɜːrbiɪdʒ", "pos": "n.", "definition": "an excess of words; a style or manner of using words", "chinese": "冗词；过多的文字；用词风格", "example": "The legal contract was buried under so much verbiage that few clients actually read it in full.", "example_zh": "法律合约被如此大量的冗词所淹没，以至于很少有客户真正完整阅读它。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolve", "ipa": "rɪˈvɒlv", "pos": "v.", "definition": "to move in a circle; to keep turning round", "chinese": "旋转；绕转；反复思考", "example": "The Earth revolves around the Sun once every 365 days.", "example_zh": "地球每365天绕太阳公转一次。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolution", "ipa": "ˌrevəˈluːʃən", "pos": "n.", "definition": "one complete turn; a radical change; a political upheaval", "chinese": "一圈；（政治或社会的）革命；彻底变革", "example": "The French Revolution transformed the political landscape of Europe and inspired movements worldwide.", "example_zh": "法国大革命改变了欧洲的政治格局，并激励了世界各地的运动。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolutionary", "ipa": "ˌrevəˈluːʃənəri", "pos": "adj.", "definition": "causing or resulting from radical change", "chinese": "革命性的；引起根本变革的；具有革命意义的", "example": "The smartphone was a revolutionary invention that changed how people communicate, work, and live.", "example_zh": "智慧型手机是一项革命性的发明，改变了人们沟通、工作和生活的方式。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolve", "ipa": "ɪˈvɒlv", "pos": "v.", "definition": "to unfold or develop gradually", "chinese": "逐渐发展；演化；演变", "example": "Language evolves over time, adapting to the needs and experiences of its speakers.", "example_zh": "语言随著时间的推移而演化，适应说话者的需求和经历。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolution", "ipa": "ˌiːvəˈluːʃən", "pos": "n.", "definition": "gradual development or unfolding", "chinese": "演化；逐渐发展；进化", "example": "The evolution of computing from room-sized machines to handheld devices took less than fifty years.", "example_zh": "计算机从房间大小的机器演化到手持设备只用了不到五十年的时间。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolutionary", "ipa": "ˌiːvəˈluːʃənəri", "pos": "adj.", "definition": "resulting or developing gradually", "chinese": "演化的；逐渐发展的；进化论的", "example": "The changes to the software were evolutionary rather than revolutionary, improving existing features incrementally.", "example_zh": "该软体的变化是演化性的而非革命性的，以渐进方式改善现有功能。"}], "Session 27: Anatomy, Sleep, and Related Words": [{"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventral", "ipa": "ˈventrəl", "pos": "adj.", "definition": "referring to the front or belly side of an animal", "chinese": "腹面的；腹部的；前侧的", "example": "The ventral fin of the fish helps it maintain stability as it swims through the water.", "example_zh": "鱼的腹鳍有助于它在水中游泳时保持稳定。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventricle", "ipa": "ˈventrɪkəl", "pos": "n.", "definition": "a hollow organ or cavity, especially a chamber of the heart", "chinese": "心室；（心脏或大脑的）空腔", "example": "The left ventricle pumps oxygenated blood out through the aorta to the rest of the body.", "example_zh": "左心室将含氧血液通过主动脉泵送至全身其他部位。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventricular", "ipa": "venˈtrɪkjʊlər", "pos": "adj.", "definition": "pertaining to a ventricle; having a belly-like bulge", "chinese": "心室的；与心腔有关的；腹状突起的", "example": "The cardiologist detected an irregular ventricular rhythm and ordered further testing.", "example_zh": "心脏科医师检测到不规则的心室节律，并下令进行进一步测试。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "auricle", "ipa": "ˈɔːrɪkəl", "pos": "n.", "definition": "an upper chamber of the heart; the external ear", "chinese": "心房；耳廓；外耳", "example": "Blood from the veins flows into the right auricle before entering the lower chambers of the heart.", "example_zh": "静脉血流入右心房，然后才进入心脏的下腔。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "auricular", "ipa": "ɔːˈrɪkjʊlər", "pos": "adj.", "definition": "pertaining to the ear or to an auricle", "chinese": "耳的；心房的；与耳朵或心房有关的", "example": "The doctor used an auricular thermometer to take the child's temperature quickly.", "example_zh": "医生使用耳温枪快速为孩子量体温。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "avuncular", "ipa": "əˈvʌŋkjʊlər", "pos": "adj.", "definition": "like an uncle; kindly, protective, indulgent", "chinese": "像叔伯的；亲切慈爱的；如叔伯般呵护的", "example": "The retired professor had an avuncular manner that put students immediately at ease.", "example_zh": "那位退休教授有著像叔叔一样亲切的举止，让学生立刻感到轻松自在。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "dorsal", "ipa": "ˈdɔːrsəl", "pos": "adj.", "definition": "referring to the back or posterior side", "chinese": "背部的；背侧的；后侧的", "example": "The shark's dorsal fin cut through the water's surface, signaling its approach.", "example_zh": "鲨鱼的背鳍划破水面，预示著它的靠近。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "endorse", "ipa": "ɪnˈdɔːrs", "pos": "v.", "definition": "to sign on the back of; to approve of; to support", "chinese": "背书；认可；支持；签署（支票背面）", "example": "Several leading scientists endorsed the findings, lending them significant credibility.", "example_zh": "几位顶尖科学家认可了这些研究结果，为其增添了重大的可信度。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "endorsement", "ipa": "ɪnˈdɔːrsmənt", "pos": "n.", "definition": "the act of endorsing; approval; support", "chinese": "认可；背书；支持；代言", "example": "The celebrity's endorsement of the product caused sales to triple within a week.", "example_zh": "那位名人对该产品的代言使销售量在一周内增加了三倍。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "vociferate", "ipa": "voʊˈsɪfəreɪt", "pos": "v.", "definition": "to shout vehemently; to cry out loudly", "chinese": "大声呼喊；激烈叫嚷；放声高呼", "example": "The protesters vociferated their demands outside the parliament building.", "example_zh": "抗议者在议会大厦外大声呼喊他们的诉求。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "vociferation", "ipa": "voʊˌsɪfəˈreɪʃən", "pos": "n.", "definition": "a vehement outcry; loud shouting", "chinese": "大声呼喊；激烈叫嚷；喧嚷", "example": "The sudden vociferation from the crowd signaled that something unexpected had happened on the field.", "example_zh": "人群中突然爆发的喧嚷声表明球场上发生了意外情况。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somniferous", "ipa": "sɒmˈnɪfərəs", "pos": "adj.", "definition": "causing or inducing sleep", "chinese": "催眠的；使人昏昏欲睡的", "example": "The somniferous lecture had half the class nodding off within twenty minutes.", "example_zh": "那堂催眠式的讲课让半数同学在二十分钟内就昏昏欲睡。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomnia", "ipa": "ɪnˈsɒmniə", "pos": "n.", "definition": "inability to fall asleep", "chinese": "失眠症；无法入睡", "example": "Chronic insomnia left her exhausted and unable to concentrate during the day.", "example_zh": "长期失眠使她精疲力竭，白天无法集中注意力。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomniac", "ipa": "ɪnˈsɒmniæk", "pos": "n.", "definition": "a person who cannot sleep", "chinese": "失眠者；患有失眠症的人", "example": "As a confirmed insomniac, he had tried every remedy from herbal tea to white noise machines.", "example_zh": "作为一个确诊的失眠者，他尝试过从草本茶到白噪音机的各种疗法。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomnious", "ipa": "ɪnˈsɒmniəs", "pos": "adj.", "definition": "unable to fall asleep; wakeful", "chinese": "失眠的；无法入睡的；清醒的", "example": "She lay insomnious until dawn, her mind racing with unresolved worries.", "example_zh": "她躺著失眠直到黎明，脑中充斥著未解决的忧虑。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnolent", "ipa": "ˈsɒmnələnt", "pos": "adj.", "definition": "drowsy; sleepy", "chinese": "昏昏欲睡的；困倦的；令人想睡的", "example": "The warm afternoon sun made the students somnolent, and attention drifted from the lesson.", "example_zh": "温暖的午后阳光让学生昏昏欲睡，注意力从课程上涣散开来。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnolence", "ipa": "ˈsɒmnələns", "pos": "n.", "definition": "drowsiness; sleepiness", "chinese": "昏昏欲睡；困倦；嗜睡", "example": "The medication listed somnolence as a common side effect, warning users not to drive.", "example_zh": "该药物将嗜睡列为常见副作用，警告使用者不要驾车。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulism", "ipa": "sɒmˈnæmbjʊlɪzəm", "pos": "n.", "definition": "sleepwalking", "chinese": "梦游症；睡行症", "example": "His somnambulism became a safety concern after he was found outside in the middle of the night.", "example_zh": "他的梦游症在他被发现在深夜出现在户外后成为了安全隐患。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulist", "ipa": "sɒmˈnæmbjʊlɪst", "pos": "n.", "definition": "a sleepwalker", "chinese": "梦游者；梦游症患者", "example": "The somnambulist was found in the kitchen, preparing breakfast while still fast asleep.", "example_zh": "那个梦游者被发现在厨房里，在熟睡中准备早餐。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulistic", "ipa": "sɒmˌnæmbjʊˈlɪstɪk", "pos": "adj.", "definition": "pertaining to or characteristic of sleepwalking", "chinese": "梦游的；与梦游症有关的", "example": "The doctor described the patient's somnambulistic episodes as triggered by stress.", "example_zh": "医生描述该患者的梦游发作是由压力引发的。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ambulatory", "ipa": "ˈæmbjʊlətɔːri", "pos": "adj.", "definition": "able to walk; no longer bedridden", "chinese": "能行走的；非卧床的；移动式的", "example": "Within three days of surgery, the patient was ambulatory and taking short walks down the corridor.", "example_zh": "手术后三天内，患者已能行走，并在走廊上进行短距离步行。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulate", "ipa": "pəˈræmbjʊleɪt", "pos": "v.", "definition": "to stroll through or around", "chinese": "漫步于；在…四处走动；徘徊", "example": "On Sunday mornings he liked to perambulate the park and observe the variety of wildlife.", "example_zh": "在周日早晨，他喜欢在公园里漫步，观察各种各样的野生动物。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulator", "ipa": "pəˈræmbjʊleɪtər", "pos": "n.", "definition": "a baby carriage (British term); a pram", "chinese": "婴儿车（英式用语）；童车", "example": "The nanny pushed the perambulator along the tree-lined avenue as the baby slept peacefully.", "example_zh": "保姆推著婴儿车沿著林荫大道行走，婴儿安静地熟睡著。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulation", "ipa": "pəˌræmbjʊˈleɪʃən", "pos": "n.", "definition": "the act of strolling through", "chinese": "漫步；巡行；在某地区的走动", "example": "His daily perambulation of the neighborhood kept him fit and connected to the community.", "example_zh": "他每天在附近社区的漫步使他保持健康，并与社区保持联系。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "amble", "ipa": "ˈæmbəl", "pos": "v.", "definition": "to walk aimlessly at a slow pace", "chinese": "漫步；缓步闲逛；悠闲地走", "example": "They ambled along the beach at sunset, with no particular destination in mind.", "example_zh": "他们在日落时分沿著海滩漫步，心中没有特定的目的地。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "preamble", "ipa": "ˈpriːæmbəl", "pos": "n.", "definition": "an introduction; an introductory statement or event", "chinese": "序言；前言；开场白；序幕", "example": "The Constitution's preamble outlines the fundamental purposes and principles of the document.", "example_zh": "宪法的序言概述了文件的基本目的和原则。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "soporific", "ipa": "ˌsɒpəˈrɪfɪk", "pos": "adj./n.", "definition": "causing sleep; a sleeping pill or drug", "chinese": "催眠的；使人昏昏欲睡的；安眠药", "example": "The professor's soporific monotone had students reaching for their coffee cups within minutes.", "example_zh": "教授那催眠般的单调语调让学生们在几分钟内就伸手拿起了咖啡杯。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "articulate　[ɑːrˈtɪkjʊlət] /", "ipa": "ɑːrˈtɪkjʊleɪt", "pos": "adj./v.", "definition": "verbal; able to express oneself fluently; to express", "chinese": "表达清晰的；口齿清楚的；清楚地表达", "example": "She was an articulate spokesperson who could explain complex issues in plain language.", "example_zh": "她是一位表达清晰的发言人，能够用通俗的语言解释复杂的问题。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "banality", "ipa": "bəˈnælɪti", "pos": "n.", "definition": "lack of originality; trite, hackneyed quality", "chinese": "陈腐；平庸；缺乏新意", "example": "The novelist was criticized for the banality of his dialogue, which felt recycled from other stories.", "example_zh": "那位小说家因其对白的陈腐而受到批评，感觉像是从其他故事中回收利用的。"}], "Session 28: Words for Types of People": [{"session": "Session 28: Words for Types of People", "word": "martinet", "ipa": "ˌmɑːrtɪˈnet", "pos": "n.", "definition": "a strict disciplinarian who demands blind, unquestioning obedience", "chinese": "严格纪律主义者；要求盲目服从的人", "example": "The new principal was a martinet who enforced every rule with zero tolerance and no exceptions.", "example_zh": "那位新校长是个严格的纪律主义者，以零容忍的方式执行每一条规定，毫无例外。"}, {"session": "Session 28: Words for Types of People", "word": "sycophant", "ipa": "ˈsɪkəfənt", "pos": "n.", "definition": "a toady; one who flatters people of wealth or influence for personal gain", "chinese": "谄媚者；马屁精；为个人利益奉承权贵的人", "example": "The CEO was surrounded by sycophants who agreed with every decision, however poor.", "example_zh": "那位执行长被谄媚者包围，这些人对每一个决定都表示同意，无论好坏。"}, {"session": "Session 28: Words for Types of People", "word": "dilettante", "ipa": "ˌdɪlɪˈtænti", "pos": "n.", "definition": "one who dabbles superficially in the arts; an amateur", "chinese": "业余爱好者；浅尝艺术的人；半吊子", "example": "He was merely a dilettante who painted on weekends but never committed to serious study.", "example_zh": "他只是个业余爱好者，周末画画，但从未认真进行系统学习。"}, {"session": "Session 28: Words for Types of People", "word": "virago", "ipa": "vɪˈrɑːɡoʊ", "pos": "n.", "definition": "a loud-mouthed, shrewish, turbulent woman", "chinese": "泼妇；悍妇；大声叫骂的女人", "example": "The neighbors dreaded disputes with the virago next door, whose voice could be heard across the street.", "example_zh": "邻居们害怕与隔壁的泼妇发生争执，她的声音隔著街道都能听到。"}, {"session": "Session 28: Words for Types of People", "word": "chauvinist", "ipa": "ˈʃoʊvɪnɪst", "pos": "n.", "definition": "one who is exaggeratedly and aggressively devoted to his/her own group", "chinese": "沙文主义者；过度偏袒自身群体的人", "example": "The male chauvinist dismissed every suggestion from female colleagues as misguided.", "example_zh": "那个男性沙文主义者把女同事的每一个建议都斥为错误的。"}, {"session": "Session 28: Words for Types of People", "word": "monomaniac", "ipa": "ˌmɒnəˈmeɪniæk", "pos": "n.", "definition": "one with an obsessive fixation on one particular thing", "chinese": "偏执狂；对单一事物有强迫性执著的人", "example": "As a monomaniac about vintage watches, he spent every spare moment and most of his salary on his collection.", "example_zh": "作为一个对古董手表有强迫性执著的人，他把所有的空闲时间和大部分薪水都花在收藏上。"}, {"session": "Session 28: Words for Types of People", "word": "iconoclast", "ipa": "aɪˈkɒnəklæst", "pos": "n.", "definition": "one who sneers at cherished traditions and conventional beliefs", "chinese": "偶像破坏者；打破传统的人；反传统者", "example": "The iconoclast challenged every assumption the department held, infuriating traditionalists but inspiring younger colleagues.", "example_zh": "那个反传统者挑战了该部门持有的每一个假设，激怒了传统主义者，但鼓舞了年轻的同事。"}, {"session": "Session 28: Words for Types of People", "word": "atheist", "ipa": "ˈeɪθiɪst", "pos": "n.", "definition": "one who does not believe in God", "chinese": "无神论者；不相信神明存在的人", "example": "The atheist argued that morality is possible without religion, grounding ethics in reason and empathy instead.", "example_zh": "那位无神论者认为道德可以不依赖宗教，而是将伦理建立在理性和同理心之上。"}, {"session": "Session 28: Words for Types of People", "word": "lecher", "ipa": "ˈletʃər", "pos": "n.", "definition": "a sexually aggressive and promiscuous man", "chinese": "好色之徒；色狼；淫荡的男人", "example": "The woman complained that the lecher at her office had made several inappropriate remarks.", "example_zh": "那位女士投诉办公室里的色狼对她发表了几次不恰当的言论。"}, {"session": "Session 28: Words for Types of People", "word": "hypochondriac", "ipa": "ˌhaɪpəˈkɒndriæk", "pos": "n.", "definition": "one whose emotional disorder manifests as imaginary physical ailments", "chinese": "疑病症患者；疑心自己有病的人；无病呻吟者", "example": "The hypochondriac rushed to the emergency room at least once a month convinced of some new fatal disease.", "example_zh": "那个疑病症患者每个月至少去一次急诊室，确信自己得了某种新的致命疾病。"}], "Session 29: Etymological Words — Families, Names, and More": [{"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sycophancy", "ipa": "ˈsɪkəfənsi", "pos": "n.", "definition": "the behavior of a sycophant; toadying", "chinese": "谄媚；阿谀奉承的行为", "example": "The board's sycophancy toward the founder prevented any honest discussion of the company's failings.", "example_zh": "董事会对创始人的谄媚阻止了对公司失败的任何诚实讨论。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sycophantic", "ipa": "ˌsɪkəˈfæntɪk", "pos": "adj.", "definition": "characteristic of a sycophant; toadying", "chinese": "谄媚的；阿谀奉承的；马屁精式的", "example": "His sycophantic praise of every memo the director wrote bordered on parody.", "example_zh": "他对主任写的每一份备忘录都给予谄媚的赞扬，几乎到了滑稽的程度。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "diaphanous", "ipa": "daɪˈæfənəs", "pos": "adj.", "definition": "filmy; gauzy; sheer; nearly transparent", "chinese": "透明的；薄如蝉翼的；轻薄透明的", "example": "The bride wore a diaphanous veil that floated gently in the breeze.", "example_zh": "新娘戴著一条薄如蝉翼的面纱，在微风中轻轻飘动。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "dilettantism", "ipa": "ˌdɪlɪˈtæntɪzəm", "pos": "n.", "definition": "superficial dabbling in the arts", "chinese": "业余爱好主义；浅尝艺术的态度；半吊子作风", "example": "His dilettantism meant he had tried painting, poetry, and sculpture, but mastered none of them.", "example_zh": "他的业余爱好主义意味著他尝试过绘画、诗歌和雕塑，但没有精通其中任何一项。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "dilettantish", "ipa": "ˌdɪlɪˈtæntɪʃ", "pos": "adj.", "definition": "characteristic of a dilettante; superficial", "chinese": "业余的；浅尝辄止的；不够深入的", "example": "Her dilettantish approach to learning languages meant she spoke five poorly rather than one or two well.", "example_zh": "她对语言学习的业余态度意味著她五门语言都说得很差，而不是一两门说得很好。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "tyro", "ipa": "ˈtaɪroʊ", "pos": "n.", "definition": "an inexperienced beginner in a field", "chinese": "新手；初学者；缺乏经验的入门者", "example": "As a tyro in the kitchen, he followed every recipe to the letter and still managed to burn the toast.", "example_zh": "作为厨房新手，他按照食谱一字不差地操作，却还是把烤面包给烤焦了。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "virtuoso", "ipa": "ˌvɜːrtʃuˈoʊsoʊ", "pos": "n.", "definition": "one who has achieved consummate skill in an art, usually music", "chinese": "艺术大师；（尤指音乐方面的）技艺精湛者；演奏大师", "example": "The young pianist was hailed as a virtuoso after her debut performance left critics speechless.", "example_zh": "那位年轻钢琴家在首演后令评论家哑口无言，被誉为演奏大师。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "virtuosi", "ipa": "ˌvɜːrtʃuˈoʊsi", "pos": "n. (pl.)", "definition": "the Italian plural of virtuoso", "chinese": "艺术大师们（virtuoso 的义大利文复数）", "example": "The orchestra was composed entirely of virtuosi, each a master of their instrument.", "example_zh": "那支管弦乐团完全由大师级演奏家组成，每位都是其所用乐器的大师。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "termagant", "ipa": "ˈtɜːrməɡənt", "pos": "n.", "definition": "a loud-mouthed, quarrelsome, turbulent woman", "chinese": "泼妇；悍妇；爱吵架的女人", "example": "The playwright portrayed the landlady as a termagant who terrorized her tenants with constant complaints.", "example_zh": "剧作家将房东太太描绘成一个悍妇，用不断的抱怨使房客们胆战心惊。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "harridan", "ipa": "ˈhærɪdən", "pos": "n.", "definition": "a shrewish, scolding woman", "chinese": "泼妇；爱唠叨的女人；喜欢骂人的老妇", "example": "The old harridan next door scolded any child who dared to set foot on her lawn.", "example_zh": "隔壁那个爱唠叨的老妇人责骂任何胆敢踏上她草坪的孩子。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "chauvinism", "ipa": "ˈʃoʊvɪnɪzəm", "pos": "n.", "definition": "exaggerated and blatant devotion to one's own group", "chinese": "沙文主义；过激的偏袒自身群体", "example": "The company's culture of chauvinism prevented talented employees from underrepresented groups from advancing.", "example_zh": "公司的沙文主义文化阻止了代表性不足群体中的优秀员工晋升。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "chauvinistic", "ipa": "ˌʃoʊvɪˈnɪstɪk", "pos": "adj.", "definition": "characteristic of chauvinism", "chinese": "沙文主义的；偏狭地偏袒自身群体的", "example": "His chauvinistic attitude made any rational discussion about competing approaches impossible.", "example_zh": "他的沙文主义态度使任何关于竞争方法的理性讨论都变得不可能。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patrimony", "ipa": "ˈpætrɪmoʊni", "pos": "n.", "definition": "an inheritance from one's father", "chinese": "父系遗产；祖传财产；遗产", "example": "He squandered his entire patrimony on failed business ventures within five years of inheriting it.", "example_zh": "他在继承父系遗产的五年内，将其全部挥霍在失败的商业冒险上。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patrimonial", "ipa": "ˌpætrɪˈmoʊniəl", "pos": "adj.", "definition": "pertaining to patrimony", "chinese": "遗产的；祖传财产的；与父系遗产相关的", "example": "The patrimonial estate had been in the family for six generations before being sold.", "example_zh": "那座祖传庄园在家族中传承了六代才被出售。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patronymic", "ipa": "ˌpætrəˈnɪmɪk", "pos": "n.", "definition": "a name derived from the father's name", "chinese": "父名衍生的姓；以父名为基础的姓名", "example": "In many Scandinavian cultures, a patronymic like \"Johnson\" originally meant \"son of John.\"", "example_zh": "在许多斯堪地纳维亚文化中，像「Johnson」这样的父名姓氏最初意味著「约翰之子」。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "synonym", "ipa": "ˈsɪnənɪm", "pos": "n.", "definition": "a word of similar meaning to another", "chinese": "同义词；意义相近的词", "example": "\"Happy\" and \"joyful\" are synonyms, though they carry slightly different connotations.", "example_zh": "「Happy」和「joyful」是同义词，尽管它们带有略微不同的含义。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "synonymous", "ipa": "sɪˈnɒnɪməs", "pos": "adj.", "definition": "having the same or similar meaning", "chinese": "同义的；意义相近的；等同于", "example": "In that era, \"genius\" and \"hard work\" were considered synonymous with success.", "example_zh": "在那个年代，「天才」和「努力」被认为与成功同义。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "antonym", "ipa": "ˈæntənɪm", "pos": "n.", "definition": "a word of opposite meaning", "chinese": "反义词；意义相反的词", "example": "\"Hot\" and \"cold\" are antonyms; so are \"love\" and \"hate.\"", "example_zh": "「Hot」和「cold」是反义词；「love」和「hate」也是。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "antonymous", "ipa": "ænˈtɒnɪməs", "pos": "adj.", "definition": "having opposite meanings", "chinese": "反义的；意义相反的", "example": "The words \"ascend\" and \"descend\" are antonymous and refer to opposite directions of movement.", "example_zh": "「ascend」和「descend」这两个词是反义词，指的是相反方向的移动。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homonym", "ipa": "ˈhɒmənɪm", "pos": "n.", "definition": "a word that sounds the same as another but differs in spelling and meaning", "chinese": "同音异义字；发音相同但拼写和意义不同的词", "example": "\"Bark\" (dog sound) and \"bark\" (tree covering) are homonyms that share spelling but differ in meaning.", "example_zh": "「Bark」（狗叫声）和「bark」（树皮）是同音同形异义词，拼写相同但意义不同。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homonymous", "ipa": "həˈmɒnɪməs", "pos": "adj.", "definition": "having the same sound as another word", "chinese": "同音的；同音异义的", "example": "The homonymous words \"right\" and \"write\" confuse many language learners.", "example_zh": "同音异义词「right」和「write」让许多语言学习者感到困惑。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homophone", "ipa": "ˈhɒməfoʊn", "pos": "n.", "definition": "a word identical in sound to another but different in meaning/spelling", "chinese": "同音异形异义词；发音相同但拼写和意义不同的词", "example": "\"There,\" \"their,\" and \"they're\" are homophones that are commonly confused in writing.", "example_zh": "「There」、「their」和「they're」是同音异形异义词，在写作中常被混淆。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homophonous", "ipa": "həˈmɒfənəs", "pos": "adj.", "definition": "sounding the same as another word", "chinese": "同音的；发音相同的", "example": "\"Flower\" and \"flour\" are homophonous words that sound identical but have very different meanings.", "example_zh": "「Flower」和「flour」是同音词，听起来完全一样，但意思截然不同。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternity", "ipa": "pəˈtɜːrnɪti", "pos": "n.", "definition": "fatherhood", "chinese": "父亲身份；父性；父系关系", "example": "A DNA test was conducted to establish the paternity of the child.", "example_zh": "进行了DNA测试以确定孩子的父亲身份。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternal", "ipa": "pəˈtɜːrnəl", "pos": "adj.", "definition": "fatherly; of or pertaining to a father", "chinese": "父亲的；父系的；如父亲般的", "example": "His paternal grandmother emigrated from Italy in the early twentieth century.", "example_zh": "他的父系祖母在二十世纪初从义大利移民过来。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternalism", "ipa": "pəˈtɜːrnəlɪzəm", "pos": "n.", "definition": "the system of governing subordinates in a father-child relationship", "chinese": "家长主义；父权式管理；以父子关系治理下属的制度", "example": "Critics argued that the company's paternalism — providing housing, meals, and rules of conduct — stifled workers' independence.", "example_zh": "批评人士认为，该公司的家长主义——提供住房、餐食和行为守则——压制了工人的独立性。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternalistic", "ipa": "pəˌtɜːrnəˈlɪstɪk", "pos": "adj.", "definition": "characteristic of paternalism", "chinese": "家长主义的；父权式的；以父亲方式管理的", "example": "The government's paternalistic policies were well-intentioned but were resented by citizens who valued their autonomy.", "example_zh": "政府的家长主义政策出于好意，但受到重视自主性的公民的反感。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patriarch", "ipa": "ˈpeɪtriɑːrk", "pos": "n.", "definition": "a venerable old man in a ruling, fatherlike position", "chinese": "家长；族长；年高德劭的长者", "example": "The patriarch of the family gathered all his descendants at the farmhouse every Thanksgiving.", "example_zh": "家族的族长每年感恩节都把所有后代聚集在农舍里。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patriarchal", "ipa": "ˌpeɪtriˈɑːrkəl", "pos": "adj.", "definition": "characteristic of a patriarch or patriarchy", "chinese": "族长的；父权制的；以男性长辈为主导的", "example": "The patriarchal structure of the village meant that women had little say in community decisions.", "example_zh": "村庄的父权制结构意味著女性在社区决策中几乎没有话语权。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patriarchy", "ipa": "ˈpeɪtriɑːrki", "pos": "n.", "definition": "a social system ruled by patriarchs", "chinese": "父权制；由父系长辈统治的社会制度", "example": "Feminist scholars have written extensively on how patriarchy shapes cultural norms and expectations.", "example_zh": "女性主义学者广泛撰写了父权制如何塑造文化规范和期望的文章。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patricide", "ipa": "ˈpætrɪsaɪd", "pos": "n.", "definition": "the killing of one's father", "chinese": "弑父；杀害自己父亲的行为", "example": "The ancient tragedy centered on the theme of patricide and the guilt that consumed the perpetrator.", "example_zh": "那部古代悲剧以弑父为主题，以及折磨著犯罪者的罪恶感。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matricide", "ipa": "ˈmætrɪsaɪd", "pos": "n.", "definition": "the killing of one's mother", "chinese": "弑母；杀害自己母亲的行为", "example": "In Greek mythology, Orestes was driven mad by the Furies after committing matricide.", "example_zh": "在希腊神话中，俄瑞斯忒斯在弑母后被复仇女神逼得发疯。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarch", "ipa": "ˈmeɪtriɑːrk", "pos": "n.", "definition": "a woman in a ruling, motherlike position", "chinese": "女家长；女族长；德高望重的女性长辈", "example": "The matriarch of the family managed the estate and made all major financial decisions for three generations.", "example_zh": "家族的女族长管理著庄园，并为三代人做出所有重要的财务决策。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarchy", "ipa": "ˈmeɪtriɑːrki", "pos": "n.", "definition": "a social system ruled by matriarchs", "chinese": "母权制；由女性长辈统治的社会制度", "example": "Some anthropologists have identified societies organized around matriarchy, where lineage and inheritance pass through the mother.", "example_zh": "一些人类学家发现了以母权制为中心的社会，在这些社会中，血统和继承通过母亲传递。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarchal", "ipa": "ˌmeɪtriˈɑːrkəl", "pos": "adj.", "definition": "characteristic of a matriarch or matriarchy", "chinese": "女族长的；母权制的；以女性长辈为主导的", "example": "The matriarchal clan traced all ancestry through the female line.", "example_zh": "那个母系氏族通过女性血统追溯所有祖先。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "maternity", "ipa": "məˈtɜːrnɪti", "pos": "n.", "definition": "motherhood", "chinese": "母亲身份；母性；分娩相关（如产假）", "example": "She took three months of maternity leave after the birth of her first child.", "example_zh": "她在第一个孩子出生后请了三个月的产假。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "maternal", "ipa": "məˈtɜːrnəl", "pos": "adj.", "definition": "motherly; of or pertaining to a mother", "chinese": "母亲的；母性的；母系的", "example": "Her maternal instinct kicked in the moment she held the newborn in her arms.", "example_zh": "当她把新生儿抱在怀里的那一刻，她的母性本能就被激发出来了。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matron", "ipa": "ˈmeɪtrən", "pos": "n.", "definition": "an older, married woman", "chinese": "已婚妇女；（尤指有地位的）中年或年长女性", "example": "The hospital matron was a formidable woman who kept both patients and nurses in order.", "example_zh": "医院的女护士长是一位令人敬畏的女性，她把病人和护士都管理得井井有条。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matronly", "ipa": "ˈmeɪtrənli", "pos": "adj.", "definition": "characteristic of a matron", "chinese": "像成熟已婚妇女的；端庄稳重的", "example": "Her matronly composure gave the committee confidence that she could handle any crisis.", "example_zh": "她端庄稳重的气质让委员会相信她能应对任何危机。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "alma mater", "ipa": "ˌælmə ˈmeɪtər", "pos": "n.", "definition": "the school or college from which one has graduated", "chinese": "母校；培育自己的学校或大学", "example": "She donated generously to her alma mater, hoping to fund scholarships for future students.", "example_zh": "她慷慨地向母校捐款，希望为未来的学生提供奖学金资助。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matrimony", "ipa": "ˈmætrɪmoʊni", "pos": "n.", "definition": "marriage", "chinese": "婚姻；婚姻关系；结婚", "example": "They entered matrimony with great joy and the full support of both families.", "example_zh": "他们在双方家庭的全力支持下，满怀喜悦地步入婚姻。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matrimonial", "ipa": "ˌmætrɪˈmoʊniəl", "pos": "adj.", "definition": "pertaining to marriage", "chinese": "婚姻的；与结婚有关的", "example": "The couple consulted a lawyer to resolve their matrimonial property disputes.", "example_zh": "那对夫妇咨询了律师以解决他们的婚姻财产纠纷。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "suicide", "ipa": "ˈsuːɪsaɪd", "pos": "n.", "definition": "the act of killing oneself", "chinese": "自杀；自毁行为", "example": "Mental health experts emphasize the importance of early intervention to prevent suicide.", "example_zh": "心理健康专家强调早期干预对于预防自杀的重要性。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "suicidal", "ipa": "ˌsuːɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to or likely to cause suicide", "chinese": "自杀的；有自杀倾向的；等同自杀的（如：自杀式行为）", "example": "The therapist recognized suicidal ideation early and arranged immediate support for the patient.", "example_zh": "治疗师及早察觉到患者的自杀念头，并为其安排了即时支援。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "fratricide", "ipa": "ˈfrætrɪsaɪd", "pos": "n.", "definition": "the killing of one's brother", "chinese": "弑兄弟；杀害兄弟的行为", "example": "The biblical story of Cain and Abel is the most famous example of fratricide in literature.", "example_zh": "圣经中该隐与亚伯的故事是文学中最著名的弑兄弟案例。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "fratricidal", "ipa": "ˌfrætrɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to fratricide", "chinese": "弑兄弟的；兄弟相残的", "example": "The civil war was a fratricidal conflict that tore families apart and left the nation scarred for generations.", "example_zh": "那场内战是一场兄弟相残的冲突，拆散了家庭，给国家留下了几代人的创伤。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sororicide", "ipa": "səˈrɒrɪsaɪd", "pos": "n.", "definition": "the killing of one's sister", "chinese": "弑姐妹；杀害姐妹的行为", "example": "The detective novel's shocking twist revealed that the apparent accident was actually sororicide.", "example_zh": "那部侦探小说令人震惊的转折揭示了，表面上的意外实际上是蓄意的弑姐妹行为。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homicide", "ipa": "ˈhɒmɪsaɪd", "pos": "n.", "definition": "the killing of a human being", "chinese": "杀人；杀人行为；他杀", "example": "The detective was assigned to investigate the homicide that occurred in the downtown alley.", "example_zh": "那名侦探被指派调查发生在市中心小巷里的杀人案。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homicidal", "ipa": "ˌhɒmɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to homicide; likely to commit homicide", "chinese": "杀人的；有杀人倾向的；与谋杀相关的", "example": "The psychiatrist testified that the defendant showed homicidal tendencies long before the incident.", "example_zh": "那位精神科医师作证说，被告早在事件发生之前就表现出杀人倾向。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "regicide", "ipa": "ˈredʒɪsaɪd", "pos": "n.", "definition": "the killing of a king or ruling official", "chinese": "弑君；杀害国王的行为", "example": "The conspirators were executed for regicide after their plot to assassinate the king was discovered.", "example_zh": "那些阴谋家因其谋杀国王的阴谋被发现后，以弑君罪被处决。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "uxoricide", "ipa": "ʌkˈsɔːrɪsaɪd", "pos": "n.", "definition": "the killing of one's wife", "chinese": "弑妻；杀害自己妻子的行为", "example": "The trial for uxoricide drew widespread attention due to the prominent social standing of the accused.", "example_zh": "由于被告的社会地位显赫，这场弑妻审判引起了广泛关注。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "mariticide", "ipa": "məˈrɪtɪsaɪd", "pos": "n.", "definition": "the killing of one's husband", "chinese": "弑夫；杀害自己丈夫的行为", "example": "The case was classified as mariticide after evidence showed the wife had poisoned her husband over a period of months.", "example_zh": "在证据显示妻子在数月内毒害了丈夫后，此案被归类为弑夫罪。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "infanticide", "ipa": "ɪnˈfæntɪsaɪd", "pos": "n.", "definition": "the killing of a newborn child", "chinese": "杀婴；杀害新生儿的行为", "example": "Throughout history, infanticide has been practiced in some cultures during times of extreme poverty or famine.", "example_zh": "纵观历史，在某些文化中，极端贫困或饥荒时期曾有过杀婴的做法。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "genocide", "ipa": "ˈdʒenəsaɪd", "pos": "n.", "definition": "the killing of a whole race or nation", "chinese": "种族灭绝；屠杀整个民族或种族", "example": "The Holocaust was the most documented genocide of the twentieth century, claiming six million Jewish lives.", "example_zh": "犹太大屠杀是二十世纪记录最详尽的种族灭绝，夺走了六百万犹太人的生命。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "parricide", "ipa": "ˈpærɪsaɪd", "pos": "n.", "definition": "the killing of either or both parents", "chinese": "弑亲；杀害父母的行为", "example": "Ancient Roman law treated parricide as one of the most heinous crimes, punishable by being sewn into a sack and drowned.", "example_zh": "古罗马法律将弑亲视为最严重的罪行之一，刑罚是被缝入袋子投入水中溺毙。"}], "Session 30: Brothers, Sisters, Husbands, Wives, and Manias": [{"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternize", "ipa": "ˈfrætərˌnaɪz", "pos": "v.", "definition": "to associate in a brotherly manner; to socialize", "chinese": "以兄弟之情交往；亲善交流", "example": "Soldiers were warned not to fraternize with the enemy during the ceasefire.", "example_zh": "士兵们被警告在停火期间不得与敌方人员亲善往来。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternization", "ipa": "ˌfrætərnaɪˈzeʃən", "pos": "n.", "definition": "the act of fraternizing", "chinese": "亲善交流；兄弟般往来的行为", "example": "The company policy discouraged fraternization between managers and their direct reports.", "example_zh": "公司政策不鼓励管理者与其直属下属之间的私下往来。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternal", "ipa": "frəˈtɜrnl", "pos": "adj.", "definition": "brotherly; pertaining to brothers", "chinese": "兄弟般的；兄弟情谊的", "example": "The two colleagues shared a fraternal bond forged through years of working together.", "example_zh": "这两位同事因多年共事而建立了兄弟般的深厚情谊。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternity", "ipa": "frəˈtɜrnəti", "pos": "n.", "definition": "a men's organization; a group of people with common interests", "chinese": "兄弟会；（有共同利益的）团体", "example": "He joined a fraternity in his first year of college and made lifelong friends there.", "example_zh": "他在大学一年级加入了兄弟会，并在那里结交了一生的朋友。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "sorority", "ipa": "səˈrɔrəti", "pos": "n.", "definition": "a women's organization or social club", "chinese": "姐妹会；女生联谊会", "example": "She was elected president of her sorority after demonstrating strong leadership skills.", "example_zh": "她展现出强大的领导能力后，当选了姐妹会的会长。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxorious", "ipa": "ʌkˈsɔriəs", "pos": "adj.", "definition": "excessively doting on and submissive to one's wife", "chinese": "过分溺爱妻子的；惧内的", "example": "His friends teased him for being uxorious, since he never made any plans without consulting his wife first.", "example_zh": "他的朋友们取笑他太惧内，因为他从不在事先征询妻子意见的情况下做任何计划。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxoriousness", "ipa": "ʌkˈsɔriəsnəs", "pos": "n.", "definition": "the quality of being uxorious", "chinese": "过分溺爱妻子的特质；惧内", "example": "His uxoriousness was charming at first, but eventually his friends found it exhausting to witness.", "example_zh": "他惧内的样子起初显得很可爱，但最终朋友们都觉得看不下去了。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxorial", "ipa": "ʌkˈsɔriəl", "pos": "adj.", "definition": "pertaining to or befitting a wife", "chinese": "有关妻子的；适合妻子的", "example": "She fulfilled her uxorial duties with grace while also pursuing a successful career.", "example_zh": "她在优雅地履行妻子职责的同时，也追求著成功的事业。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "marital", "ipa": "ˈmærɪtl", "pos": "adj.", "definition": "pertaining to marriage or the marital relationship", "chinese": "婚姻的；夫妻的", "example": "The couple sought marital counseling to improve their communication.", "example_zh": "这对夫妻寻求婚姻咨询以改善他们的沟通方式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "extramarital", "ipa": "ˌɛkstrəˈmærɪtl", "pos": "adj.", "definition": "outside the marriage; adulterous", "chinese": "婚外的；外遇的", "example": "The novel explored the devastating consequences of an extramarital affair.", "example_zh": "这部小说探讨了婚外情所带来的毁灭性后果。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "premarital", "ipa": "priˈmærɪtl", "pos": "adj.", "definition": "occurring before marriage", "chinese": "婚前的", "example": "They completed premarital counseling before their wedding ceremony.", "example_zh": "他们在婚礼仪式前完成了婚前辅导课程。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regal", "ipa": "ˈrigəl", "pos": "adj.", "definition": "royal; kingly; magnificent; stately", "chinese": "帝王般的；庄严宏伟的", "example": "The queen entered the hall with a regal bearing that silenced the entire room.", "example_zh": "女王以帝王般的气度走进大厅，令整个房间顿时鸦雀无声。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regality", "ipa": "rɪˈgæləti", "pos": "n.", "definition": "the quality of being regal", "chinese": "帝王气度；庄严威仪", "example": "Her regality was evident in every gesture and the way she commanded attention without effort.", "example_zh": "她的帝王气度体现在每一个举止中，以及她毫不费力地吸引所有人注意的方式上。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regalia", "ipa": "rɪˈgeliə", "pos": "n. (pl.)", "definition": "the emblems, insignia, or dress of rank or office", "chinese": "王权象征物；官服；徽章", "example": "The king appeared in full regalia for the coronation ceremony.", "example_zh": "国王身著全套王室礼服出席了加冕典礼。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "monomania", "ipa": "ˌmɑnəˈmeniə", "pos": "n.", "definition": "an obsessive fixation on one particular area", "chinese": "偏执狂；对某一事物的病态执迷", "example": "His monomania for collecting rare stamps consumed every spare moment of his life.", "example_zh": "他对收集稀有邮票的病态执迷占据了他生活中每一个闲暇时刻。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "monomaniacal", "ipa": "ˌmɑnəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by monomania", "chinese": "偏执狂的；病态执迷的", "example": "Her monomaniacal pursuit of perfection made it impossible for her team to meet her standards.", "example_zh": "她对完美的病态追求使她的团队无法达到她的标准。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomania", "ipa": "ˌdɪpsəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to drink alcohol; alcoholism", "chinese": "饮酒狂；酗酒症", "example": "He struggled with dipsomania for years before finally seeking professional treatment.", "example_zh": "他与酗酒症抗争多年，最终才寻求专业治疗。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomaniac", "ipa": "ˌdɪpsəˈmeniæk", "pos": "n.", "definition": "one suffering from dipsomania", "chinese": "饮酒狂患者；嗜酒成性者", "example": "As a confirmed dipsomaniac, he could not resist alcohol even when he knew it was destroying his health.", "example_zh": "作为一个确诊的饮酒狂患者，即使知道酒精正在摧毁他的健康，他也无法抗拒。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomaniacal", "ipa": "ˌdɪpsəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by dipsomania", "chinese": "饮酒狂的；嗜酒成性的", "example": "His dipsomaniacal tendencies worsened whenever he was under extreme stress.", "example_zh": "每当他承受极大压力时，他嗜酒成性的倾向就会加剧。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomania", "ipa": "ˌklɛptəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to steal", "chinese": "盗窃狂；病态偷窃冲动", "example": "The psychologist explained that kleptomania is an impulse control disorder, not simple theft.", "example_zh": "心理学家解释说，盗窃狂是一种冲动控制障碍，而不是单纯的偷窃行为。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomaniac", "ipa": "ˌklɛptəˈmeniæk", "pos": "n.", "definition": "one suffering from kleptomania", "chinese": "盗窃狂患者", "example": "The store owner recognized the kleptomaniac and quietly called a counselor rather than the police.", "example_zh": "店主认出了这位盗窃狂患者，悄悄打电话给辅导员而不是警察。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomaniacal", "ipa": "ˌklɛptəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by kleptomania", "chinese": "盗窃狂的；有病态偷窃冲动的", "example": "His kleptomaniacal behavior was traced back to severe anxiety and a difficult childhood.", "example_zh": "他的盗窃狂行为被追溯至严重的焦虑症和艰难的童年经历。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromania", "ipa": "ˌpaɪrəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to set fires", "chinese": "纵火狂；病态纵火冲动", "example": "The arson investigator suspected that pyromania, rather than financial motive, drove the suspect.", "example_zh": "纵火调查员怀疑是纵火狂而非财务动机驱使了嫌疑人。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromaniac", "ipa": "ˌpaɪrəˈmeniæk", "pos": "n.", "definition": "one suffering from pyromania", "chinese": "纵火狂患者", "example": "The pyromaniac was ordered to undergo psychiatric evaluation after being arrested near the scene.", "example_zh": "纵火狂患者在现场附近被捕后，被命令接受精神病学评估。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromaniacal", "ipa": "ˌpaɪrəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by pyromania", "chinese": "纵火狂的；有病态纵火冲动的", "example": "Investigators discovered a pattern of pyromaniacal behavior going back several years.", "example_zh": "调查人员发现了一种可追溯至数年前的纵火狂行为模式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "incendiarism", "ipa": "ɪnˈsɛndɪəˌrɪzəm", "pos": "n.", "definition": "the malicious burning of another's property for revenge", "chinese": "恶意纵火；蓄意放火（出于报复）", "example": "The police charged him with incendiarism after evidence showed he had set fire to his neighbor's barn out of spite.", "example_zh": "警方在证据显示他出于恶意放火烧毁邻居谷仓后，以恶意纵火罪起诉了他。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "incendiary", "ipa": "ɪnˈsɛndɪˌɛri", "pos": "n./adj.", "definition": "one who sets fires maliciously; of or pertaining to malicious fire-setting", "chinese": "纵火犯；煽动性的；纵火的", "example": "The police identified the incendiary device used to start the warehouse fire.", "example_zh": "警方确认了用来引燃仓库火灾的燃烧装置。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "arson", "ipa": "ˈɑrsən", "pos": "n.", "definition": "the felony of setting fire to property for economic gain", "chinese": "纵火罪（以谋取经济利益）", "example": "The insurance investigator suspected arson when the fire destroyed the struggling business overnight.", "example_zh": "当那场火灾在一夜之间摧毁了那家陷入困境的企业时，保险调查员怀疑是蓄意纵火。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "arsonist", "ipa": "ˈɑrsənɪst", "pos": "n.", "definition": "one who commits arson", "chinese": "纵火犯", "example": "The arsonist was convicted after forensic evidence linked him to three separate fires.", "example_zh": "纵火犯在法证证据将他与三起独立火灾联系起来后被定罪。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomania", "ipa": "ˌmɛgələˈmeniə", "pos": "n.", "definition": "morbid delusions of grandeur, power, or importance", "chinese": "夸大狂；自大妄想症", "example": "His megalomania led him to believe he was destined to rule the entire country.", "example_zh": "他的自大妄想症使他相信自己命中注定要统治整个国家。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomaniac", "ipa": "ˌmɛgələˈmeniæk", "pos": "n.", "definition": "one suffering from megalomania", "chinese": "夸大狂患者；自大妄想症患者", "example": "The dictator was a megalomaniac who demanded that statues of himself be erected in every city.", "example_zh": "这位独裁者是个自大妄想症患者，他要求在每座城市都竖立他自己的雕像。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomaniacal", "ipa": "ˌmɛgələməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by megalomania", "chinese": "夸大狂的；自大妄想的", "example": "His megalomaniacal schemes to take over competing companies alarmed his board of directors.", "example_zh": "他妄图接管竞争对手公司的自大妄想计划令董事会深感震惊。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "nymphomania", "ipa": "ˌnɪmfəˈmeniə", "pos": "n.", "definition": "morbid, uncontrollable desire for sexual intercourse in a female", "chinese": "女性色情狂；女性性欲亢进症", "example": "Nymphomania is a clinical term referring to a compulsive and distressing pattern of sexual behavior in women.", "example_zh": "女性色情狂是一个临床术语，指女性强迫性且令人痛苦的性行为模式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "nymphomaniac", "ipa": "ˌnɪmfəˈmeniæk", "pos": "n.", "definition": "a woman suffering from nymphomania", "chinese": "女性色情狂患者", "example": "The term nymphomaniac has largely been replaced by more clinical and neutral diagnostic language in modern psychiatry.", "example_zh": "在现代精神病学中，女性色情狂患者这一术语已基本被更为临床和中性的诊断语言所取代。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "satyromania", "ipa": "ˌsætɪrəˈmeniə", "pos": "n.", "definition": "morbid, uncontrollable desire for sexual intercourse in a male", "chinese": "男性色情狂；男性性欲亢进症", "example": "Satyromania is the male counterpart of nymphomania, describing an excessive and compulsive sexual drive.", "example_zh": "男性色情狂是女性色情狂的对应词，描述一种过度且强迫性的性冲动。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "satyriasis", "ipa": "ˌsætɪˈraɪəsɪs", "pos": "n.", "definition": "another term for satyromania", "chinese": "男性色情狂（同义词）", "example": "The medical textbook listed satyriasis as a hypersexuality disorder affecting males.", "example_zh": "医学教科书将男性色情狂列为影响男性的性欲亢进障碍。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "claustrophobia", "ipa": "ˌklɔstrəˈfobiə", "pos": "n.", "definition": "morbid dread of enclosed spaces or cramped quarters", "chinese": "幽闭恐惧症", "example": "Her claustrophobia made it impossible for her to ride in elevators or take the subway.", "example_zh": "她的幽闭恐惧症使她无法乘坐电梯或搭地铁。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "claustrophobe", "ipa": "ˈklɔstrəˌfob", "pos": "n.", "definition": "one who suffers from claustrophobia", "chinese": "幽闭恐惧症患者", "example": "As a claustrophobe, he always requested a window seat and avoided small, windowless rooms.", "example_zh": "作为一名幽闭恐惧症患者，他总是要求靠窗座位，并避开狭小无窗的房间。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "claustrophobic", "ipa": "ˌklɔstrəˈfobɪk", "pos": "adj.", "definition": "characterized by or suffering from claustrophobia", "chinese": "幽闭恐惧症的；令人感到局促的", "example": "The tiny basement apartment felt unbearably claustrophobic after just a few minutes.", "example_zh": "那间狭小的地下室公寓只需几分钟就让人感到难以忍受的局促压迫。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "agoraphobia", "ipa": "ˌægərəˈfobiə", "pos": "n.", "definition": "morbid dread of open spaces", "chinese": "广场恐惧症；旷野恐惧症", "example": "Agoraphobia left her housebound for months, afraid to venture outside into open public spaces.", "example_zh": "广场恐惧症使她足不出户长达数月，害怕踏出家门进入开阔的公共场所。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "agoraphobe", "ipa": "ˈægərəˌfob", "pos": "n.", "definition": "one who suffers from agoraphobia", "chinese": "广场恐惧症患者", "example": "The agoraphobe relied on online grocery delivery because visiting crowded stores triggered severe anxiety.", "example_zh": "这位广场恐惧症患者依赖网路杂货配送服务，因为前往拥挤的商店会引发严重焦虑。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "agoraphobic", "ipa": "ˌægərəˈfobɪk", "pos": "adj.", "definition": "characterized by or suffering from agoraphobia", "chinese": "广场恐惧症的", "example": "His agoraphobic episodes became more frequent after a traumatic experience in a crowded marketplace.", "example_zh": "在一次拥挤市场的创伤经历后，他的广场恐惧症发作变得更加频繁。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "acrophobia", "ipa": "ˌækrəˈfobiə", "pos": "n.", "definition": "morbid dread of high places", "chinese": "惧高症", "example": "His acrophobia made it impossible for him to enjoy the view from the top of the skyscraper.", "example_zh": "他的惧高症使他无法欣赏从摩天大楼顶端俯瞰的景色。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "acrophobe", "ipa": "ˈækrəˌfob", "pos": "n.", "definition": "one who suffers from acrophobia", "chinese": "惧高症患者", "example": "As an acrophobe, she turned down the invitation to hike along the cliff-top trail.", "example_zh": "作为一名惧高症患者，她婉拒了沿悬崖顶端步道徒步的邀请。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "acrophobic", "ipa": "ˌækrəˈfobɪk", "pos": "adj.", "definition": "characterized by or suffering from acrophobia", "chinese": "惧高症的", "example": "The acrophobic tourist stayed on the ground while the rest of the group climbed the observation tower.", "example_zh": "这位有惧高症的游客留在地面上，而其他人则爬上了观景塔。"}], "Session 31: Iconoclasts, God, Sex, and Medical Words": [{"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "iconoclasm", "ipa": "aɪˈkɑnəˌklæzəm", "pos": "n.", "definition": "the act of attacking cherished beliefs or traditions", "chinese": "打破偶像崇拜；破除传统的行为", "example": "His iconoclasm in the art world shocked critics who had long upheld the classical tradition.", "example_zh": "他在艺术界破除传统的行为震惊了长期维护古典传统的评论家们。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "iconoclastic", "ipa": "aɪˌkɑnəˈklæstɪk", "pos": "adj.", "definition": "characterized by iconoclasm; scoffing at tradition", "chinese": "破除偶像崇拜的；反传统的", "example": "Her iconoclastic approach to teaching rejected textbooks in favor of hands-on experiments.", "example_zh": "她反传统的教学方式摒弃了教科书，转而支持动手实验。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "atheism", "ipa": "ˈeθiˌɪzəm", "pos": "n.", "definition": "the belief that there is no God", "chinese": "无神论", "example": "He embraced atheism after years of questioning the religious teachings of his childhood.", "example_zh": "在多年质疑童年时期所受的宗教教导后，他接受了无神论。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "atheistic", "ipa": "ˌeθiˈɪstɪk", "pos": "adj.", "definition": "pertaining to atheism", "chinese": "无神论的", "example": "The philosopher published an atheistic manifesto that sparked widespread debate.", "example_zh": "这位哲学家发表了一份无神论宣言，引发了广泛的辩论。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "agnostic", "ipa": "ægˈnɑstɪk", "pos": "n./adj.", "definition": "one who holds that God's existence is unknowable; pertaining to agnosticism", "chinese": "不可知论者；不可知论的", "example": "She described herself as an agnostic, believing that the existence of God can neither be proved nor disproved.", "example_zh": "她自称是个不可知论者，认为上帝的存在既无法被证明也无法被否定。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "agnosticism", "ipa": "ægˈnɑstɪˌsɪzəm", "pos": "n.", "definition": "the philosophy that God's existence is unknowable", "chinese": "不可知论", "example": "Agnosticism occupies a middle ground between religious faith and outright atheism.", "example_zh": "不可知论占据了宗教信仰与彻底无神论之间的中间地带。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "diagnosis", "ipa": "ˌdaɪəgˈnosɪs", "pos": "n.", "definition": "the determination of the nature of a disease or condition by examination", "chinese": "诊断；诊断结果", "example": "The doctor delivered the diagnosis after reviewing the patient's test results and symptoms.", "example_zh": "医生在审阅患者的检查结果和症状后，做出了诊断。"}, {"sessi
