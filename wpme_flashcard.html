 a \"saying good\"", "chinese": "祝福；祈禱；賜福", "example": "The priest offered a final benediction before the congregation departed.", "example_zh": "牧師在會眾離去前給予最後的祝福。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benedictory", "ipa": "ˌbenɪˈdɪktəri", "pos": "adj.", "definition": "of or relating to a blessing", "chinese": "祝福的；賜福的；關於祝禱的", "example": "The ceremony concluded with benedictory words from the elder.", "example_zh": "典禮以長者的祝福話語作結。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficent", "ipa": "bɪˈnefɪsənt", "pos": "adj.", "definition": "doing good; performing acts of kindness", "chinese": "行善的；做好事的；慈善的", "example": "The beneficent donor funded a new wing of the hospital at no cost to the public.", "example_zh": "那位行善的捐助者資助了醫院新翼的建設，費用由他自行承擔。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficence", "ipa": "bɪˈnefɪsəns", "pos": "n.", "definition": "the quality of doing good", "chinese": "行善；善行；慈善", "example": "Her beneficence toward the local shelter was recognized with a community award.", "example_zh": "她對當地收容所的慈善行為獲得了社區獎項的表彰。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefactor", "ipa": "ˈbenɪfæktər", "pos": "n.", "definition": "one who does good for another; a patron", "chinese": "恩人；捐助者；贊助人", "example": "An anonymous benefactor donated enough money to keep the arts center open for another decade.", "example_zh": "一位匿名恩人捐款足夠的金額，讓藝術中心再運營十年。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefactress", "ipa": "ˈbenɪfæktrɪs", "pos": "n.", "definition": "a female benefactor", "chinese": "女恩人；女性捐助者；女贊助人", "example": "The school's library was named after the benefactress who had funded its construction.", "example_zh": "學校圖書館以出資建設的女恩人命名。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefaction", "ipa": "ˌbenɪˈfækʃən", "pos": "n.", "definition": "a good deed; an act of charity", "chinese": "善行；慈善行為；捐贈", "example": "His greatest benefaction was establishing a scholarship fund for underprivileged students.", "example_zh": "他最偉大的善行是為弱勢學生設立獎學金基金。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficiary", "ipa": "ˌbenɪˈfɪʃəri", "pos": "n.", "definition": "the recipient of a gift, benefit, or charitable act", "chinese": "受益人；受惠者；獲益者", "example": "She was listed as the primary beneficiary of her grandfather's estate.", "example_zh": "她被列為祖父遺產的主要受益人。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benevolent", "ipa": "bɪˈnevələnt", "pos": "adj.", "definition": "wishing well to others; charitable; kindly disposed", "chinese": "仁慈的；善心的；樂善好施的", "example": "The benevolent organization provided meals and shelter to hundreds of homeless families.", "example_zh": "那個仁慈的機構為數百個無家可歸的家庭提供餐食和庇護所。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benevolence", "ipa": "bɪˈnevələns", "pos": "n.", "definition": "goodwill; disposition to do good", "chinese": "善意；慈善；仁愛", "example": "Acts of benevolence, however small, can have a profound impact on those in need.", "example_zh": "善意的行動，無論多麼細小，都能對有需要的人產生深遠的影響。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "bona fide", "ipa": "ˌboʊnə ˈfaɪdi", "pos": "adj./adv.", "definition": "in good faith; genuine; sincere; valid", "chinese": "真誠的；真正的；真實有效的；善意地", "example": "The auctioneer verified that the painting was a bona fide work by the master.", "example_zh": "拍賣師確認這幅畫是大師的真跡。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "fidelity", "ipa": "fɪˈdelɪti", "pos": "n.", "definition": "faithfulness; loyalty", "chinese": "忠誠；忠實；信守（承諾）", "example": "He demonstrated his fidelity to the company by turning down a more lucrative offer elsewhere.", "example_zh": "他拒絕了其他地方更豐厚的職位，以此展示他對公司的忠誠。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "infidelity", "ipa": "ˌɪnfɪˈdelɪti", "pos": "n.", "definition": "unfaithfulness, especially in marriage", "chinese": "不忠；不貞；（尤指婚姻中的）外遇", "example": "The discovery of infidelity shattered the trust they had built over twenty years of marriage.", "example_zh": "外遇的揭露摧毀了他們二十年婚姻中建立的信任。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "infidel", "ipa": "ˈɪnfɪdəl", "pos": "n.", "definition": "one who does not hold the \"true\" faith; a non-believer", "chinese": "異教徒；不信者；不信仰（某特定宗教的人）", "example": "In medieval Europe, anyone who was not Christian was often labeled an infidel.", "example_zh": "在中世紀歐洲，任何非基督徒的人往往被標籤為異教徒。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "dictatorial", "ipa": "ˌdɪktəˈtɔːriəl", "pos": "adj.", "definition": "domineering; giving orders in a manner permitting no refusal", "chinese": "獨裁的；專橫的；不容置疑的", "example": "His dictatorial management style alienated his staff and caused high turnover.", "example_zh": "他獨裁式的管理風格疏遠了員工，導致高離職率。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "volition", "ipa": "vəˈlɪʃən", "pos": "n.", "definition": "the act or power of willing; free will", "chinese": "意志力；自由意志；主動選擇", "example": "She left the job of her own volition — no one pressured her to resign.", "example_zh": "她自願離職——沒有人施壓要她辭職。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placation", "ipa": "pleɪˈkeɪʃən", "pos": "n.", "definition": "the act of pacifying; changing hostility to friendliness", "chinese": "安撫；平息；化解敵意的行動", "example": "The government's placation of the protesters with minor concessions failed to resolve the underlying tensions.", "example_zh": "政府以小小的讓步安撫抗議者，未能解決根本的緊張局勢。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placative", "ipa": "ˈpleɪkətɪv", "pos": "adj.", "definition": "tending or intended to pacify or soothe", "chinese": "有安撫作用的；旨在平息的", "example": "He offered a placative gesture, handing her a cup of tea before beginning the difficult conversation.", "example_zh": "他做出安撫的姿態，在展開艱難對話之前遞給她一杯茶。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placatory", "ipa": "ˈpleɪkətɔːri", "pos": "adj.", "definition": "tending or intended to pacify or soothe", "chinese": "撫慰性的；試圖平息的；和解的", "example": "The company issued a placatory statement after the backlash over its controversial advertisement.", "example_zh": "公司在其爭議廣告引發強烈反響後發表了安撫性聲明。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placable", "ipa": "ˈpleɪkəbəl", "pos": "adj.", "definition": "able to be soothed or pacified", "chinese": "可安撫的；易於平息的；通情達理的", "example": "Unlike his hot-tempered brother, he was placable and quick to forgive.", "example_zh": "與他脾氣暴躁的兄弟不同，他容易被安撫，也很快就能原諒別人。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "implacable", "ipa": "ɪmˈplækəbəl", "pos": "adj.", "definition": "unyielding; beyond soothing; relentlessly hostile", "chinese": "難以平息的；無法安撫的；冷酷無情的", "example": "The implacable rivalry between the two firms drove them both to the brink of financial ruin.", "example_zh": "兩家公司之間無法平息的競爭將他們雙雙推向財務破產的邊緣。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "implacability", "ipa": "ɪmˌplækəˈbɪlɪti", "pos": "n.", "definition": "the quality of being implacable", "chinese": "難以平息的特質；冷酷無情；無法妥協", "example": "The villain's implacability made any chance of negotiation impossible.", "example_zh": "那個反派的冷酷無情使任何談判的可能都成為泡影。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placid", "ipa": "ˈplæsɪd", "pos": "adj.", "definition": "calm; easygoing; undisturbed", "chinese": "平靜的；溫和的；不易激動的", "example": "The placid lake reflected the mountains perfectly on a windless morning.", "example_zh": "平靜的湖面在無風的早晨完美倒映著山脈。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "placidity", "ipa": "pləˈsɪdɪti", "pos": "n.", "definition": "calmness; serenity", "chinese": "平靜；安詳；沉著", "example": "The placidity of the countryside was a welcome contrast to the chaos of city life.", "example_zh": "鄉村的平靜是城市生活混亂的令人歡迎的對比。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "complacent", "ipa": "kəmˈpleɪsənt", "pos": "adj.", "definition": "self-satisfied; smug; pleased with oneself", "chinese": "自滿的；沾沾自喜的；得意洋洋的", "example": "After a string of successes, the team grew complacent and was caught off guard by their rivals.", "example_zh": "一連串的成功之後，這支團隊變得自滿，被對手打得措手不及。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "complacency", "ipa": "kəmˈpleɪsənsi", "pos": "n.", "definition": "self-satisfaction; smugness", "chinese": "自滿；得意；沾沾自喜", "example": "The coach warned against complacency, reminding the players that every opponent deserved respect.", "example_zh": "教練警告不要自滿，提醒球員每個對手都值得尊重。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "condonation", "ipa": "ˌkɒndəˈneɪʃən", "pos": "n.", "definition": "the act of overlooking or forgiving a transgression", "chinese": "默許；寬宥；對過失的暗中原諒", "example": "The board's condonation of the executive's misconduct sent the wrong message to all employees.", "example_zh": "董事會對主管不當行為的默許向所有員工傳遞了錯誤的信號。"}], "Session 24: Adjectives for Speech Habits": [{"session": "Session 24: Adjectives for Speech Habits", "word": "taciturn", "ipa": "ˈtæsɪtɜːrn", "pos": "adj.", "definition": "habitually silent; disinclined to conversation", "chinese": "沉默寡言的；不喜交談的；慣於不說話的", "example": "The taciturn farmer answered questions in single syllables and rarely volunteered information.", "example_zh": "那個沉默寡言的農夫用單音節回答問題，很少主動提供信息。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "laconic", "ipa": "ləˈkɒnɪk", "pos": "adj.", "definition": "brief and to the point; using few words; pithy", "chinese": "簡潔的；言簡意賅的；惜字如金的", "example": "His laconic reply — \"No.\" — ended the debate immediately.", "example_zh": "他言簡意賅的回答——「不。」——立刻終結了辯論。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "inarticulate", "ipa": "ˌɪnɑːrˈtɪkjʊlət", "pos": "adj.", "definition": "unable to express oneself clearly; sputtering; incoherent", "chinese": "口齒不清的；無法清楚表達的；語無倫次的", "example": "He was inarticulate with shock after hearing the unexpected news.", "example_zh": "聽到意外的消息後，他驚訝得語無倫次。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "garrulous", "ipa": "ˈɡærʊləs", "pos": "adj.", "definition": "talking excessively and meaninglessly; chattering", "chinese": "嘮叨的；話多的；說個不停的", "example": "The garrulous taxi driver told his passenger about every detail of his life during the ride.", "example_zh": "那個嘮叨的計程車司機在行車途中向乘客講述了他生活的每一個細節。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "banal", "ipa": "bəˈnɑːl", "pos": "adj.", "definition": "trite; hackneyed; lacking originality", "chinese": "陳腐的；缺乏新意的；平庸的", "example": "The film's plot was banal, relying on every cliché in the romantic comedy playbook.", "example_zh": "這部電影的情節陳腐，完全依賴愛情喜劇劇本中的每一個老套橋段。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "verbose", "ipa": "vɜːrˈboʊs", "pos": "adj.", "definition": "using more words than necessary; wordy", "chinese": "冗長的；囉嗦的；使用過多詞語的", "example": "His verbose reports frustrated colleagues who preferred concise, actionable summaries.", "example_zh": "他冗長的報告令偏愛簡潔、可操作摘要的同事感到沮喪。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "voluble", "ipa": "ˈvɒljʊbəl", "pos": "adj.", "definition": "speaking rapidly and fluently; glib", "chinese": "口若懸河的；說話流利的；滔滔不絕的", "example": "The voluble salesperson could effortlessly chat about any topic to keep the customer engaged.", "example_zh": "那個口若懸河的銷售員能夠毫不費力地談論任何話題以保持顧客的興趣。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "cogent", "ipa": "ˈkoʊdʒənt", "pos": "adj.", "definition": "forcefully convincing; logically compelling", "chinese": "有說服力的；論據充分的；令人信服的", "example": "Her cogent argument persuaded even the most skeptical members of the committee.", "example_zh": "她有說服力的論點說服了委員會中最懷疑的成員。"}, {"session": "Session 24: Adjectives for Speech Habits", "word": "loquacious", "ipa": "loʊˈkweɪʃəs", "pos": "adj.", "definition": "very talkative; fond of talking", "chinese": "話多的；喜歡說話的；健談的", "example": "The loquacious child peppered her grandmother with questions from the moment she arrived.", "example_zh": "那個話多的孩子一到就不停地向祖母提問。"}], "Session 25: Related Words for Silence and Speech": [{"session": "Session 25: Related Words for Silence and Speech", "word": "taciturnity", "ipa": "ˌtæsɪˈtɜːrnɪti", "pos": "n.", "definition": "habitual disinclination to talk", "chinese": "沉默寡言的習性；不愛說話的傾向", "example": "His taciturnity at dinner parties often made guests mistake his shyness for arrogance.", "example_zh": "他在晚宴上的沉默寡言常常讓客人誤把他的害羞當作傲慢。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "tacit", "ipa": "ˈtæsɪt", "pos": "adj.", "definition": "unspoken; implied without being stated", "chinese": "心照不宣的；不言而喻的；默示的", "example": "There was a tacit agreement among the team members never to discuss the failed project publicly.", "example_zh": "團隊成員之間有一個不言而喻的共識，那就是永遠不公開討論那個失敗的項目。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "tacitness", "ipa": "ˈtæsɪtnəs", "pos": "n.", "definition": "the quality of being unspoken or implied", "chinese": "不言而喻的特質；心照不宣的性質", "example": "The tacitness of her approval was understood by everyone in the room.", "example_zh": "她默許的心照不宣被房間裡的每個人都理解了。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "reticent", "ipa": "ˈretɪsənt", "pos": "adj.", "definition": "preferring to keep silent; reluctant to disclose feelings", "chinese": "沉默的；不願透露感情的；矜持的", "example": "She was reticent about her past and rarely spoke of her childhood.", "example_zh": "她對自己的過去保持沉默，很少談及童年。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "reticence", "ipa": "ˈretɪsəns", "pos": "n.", "definition": "reluctance to speak or disclose feelings", "chinese": "沉默寡言；不願表露感情；矜持", "example": "His reticence during the interview made the hiring manager wonder if he truly wanted the job.", "example_zh": "他在面試中的沉默讓招聘經理懷疑他是否真的想要這份工作。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "loquacity", "ipa": "loʊˈkwæsɪti", "pos": "n.", "definition": "talkativeness", "chinese": "話多；喜歡說話的傾向；健談", "example": "Her loquacity was endearing at first but became exhausting after several hours.", "example_zh": "她的話多起初令人覺得可愛，但幾個小時後就令人精疲力竭了。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquy", "ipa": "səˈlɪləkwi", "pos": "n.", "definition": "a speech to oneself; speaking one's thoughts aloud (esp. in a play)", "chinese": "獨白；自言自語；（尤指戲劇中的）獨白", "example": "Hamlet's soliloquy \"To be or not to be\" is one of the most famous passages in English literature.", "example_zh": "哈姆雷特的獨白「生存還是毀滅」是英國文學中最著名的段落之一。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquist", "ipa": "səˈlɪləkwɪst", "pos": "n.", "definition": "one who delivers a soliloquy", "chinese": "獨白者；自言自語的人", "example": "The actor, a skilled soliloquist, held the audience in rapt attention for the entire speech.", "example_zh": "那位演員是個出色的獨白者，在整段獨白期間讓觀眾屏息凝神。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "soliloquize", "ipa": "səˈlɪləkwaɪz", "pos": "v.", "definition": "to deliver a soliloquy; to talk to oneself aloud", "chinese": "發表獨白；大聲自言自語", "example": "She often soliloquized while cooking, working through her problems out loud.", "example_zh": "她做飯時常常自言自語，大聲梳理自己的問題。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquist", "ipa": "venˈtrɪləkwɪst", "pos": "n.", "definition": "one who can throw his voice", "chinese": "腹語術者；口技演員", "example": "The ventriloquist's act was so convincing that children in the audience truly believed the puppet was alive.", "example_zh": "那位腹語術者的表演如此逼真，以至於觀眾中的孩子們真的相信木偶是活的。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquism", "ipa": "venˈtrɪləkwɪzəm", "pos": "n.", "definition": "the art of throwing one's voice", "chinese": "腹語術；口技", "example": "Ventriloquism requires years of practice to perfect the art of speaking without moving your lips.", "example_zh": "腹語術需要多年練習才能掌握不動嘴唇說話的藝術。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "ventriloquistic", "ipa": "venˌtrɪləˈkwɪstɪk", "pos": "adj.", "definition": "of or pertaining to ventriloquism", "chinese": "腹語術的；與口技相關的", "example": "His ventriloquistic skills were so refined that even professional entertainers were impressed.", "example_zh": "他的腹語術技藝如此精湛，連專業演藝人員也印象深刻。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "colloquial", "ipa": "kəˈloʊkwiəl", "pos": "adj.", "definition": "pertaining to informal, everyday conversational speech", "chinese": "口語的；日常會話的；非正式的", "example": "The essay lost marks because it was too colloquial for an academic submission.", "example_zh": "這篇文章因口語化程度太高，不適合學術提交而被扣分。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "colloquialism", "ipa": "kəˈloʊkwiəlɪzəm", "pos": "n.", "definition": "an informal expression used in everyday conversation", "chinese": "口語表達；俗語；日常會話用語", "example": "\"Gonna\" and \"wanna\" are colloquialisms that are inappropriate in formal writing.", "example_zh": "「Gonna」和「wanna」是口語表達，不適合用於正式寫作中。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "circumlocution", "ipa": "ˌsɜːrkəmləˈkjuːʃən", "pos": "n.", "definition": "indirect, roundabout expression; talking around an idea", "chinese": "迂迴的表達方式；繞圈子說話；拐彎抹角", "example": "Instead of just saying he was fired, he used circumlocution to describe \"an organizational restructuring that affected his position.\"", "example_zh": "他沒有直接說自己被解雇，而是用拐彎抹角的說法描述「影響了他職位的組織重組」。"}, {"session": "Session 25: Related Words for Silence and Speech", "word": "circumlocutory", "ipa": "ˌsɜːrkəmˈlɒkjʊtəri", "pos": "adj.", "definition": "expressed in a roundabout or indirect manner", "chinese": "迂迴的；拐彎抹角的；間接表達的", "example": "His circumlocutory explanations frustrated the judge, who demanded straight answers.", "example_zh": "他迂迴的解釋令法官感到沮喪，法官要求他直接回答。"}], "Session 26: Laconic, Eloquent, and Related Words": [{"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconicism", "ipa": "ləˈkɒnɪsɪzəm", "pos": "n.", "definition": "the quality of using few words; a pithy expression", "chinese": "言簡意賅的風格；簡潔表達", "example": "The general was admired for his laconicism: his battle orders were never more than one sentence.", "example_zh": "那位將軍以其言簡意賅的風格而受人欽佩：他的戰鬥命令從不超過一句話。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconicity", "ipa": "ˌlækəˈnɪsɪti", "pos": "n.", "definition": "the quality of being laconic", "chinese": "簡潔；惜字如金的特質", "example": "The poet's laconicity was deceptive — each short line carried layers of meaning.", "example_zh": "那位詩人的簡潔具有欺騙性——每一個短句都蘊含多層含義。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "laconism", "ipa": "ˈlækənɪzəm", "pos": "n.", "definition": "a concise, pithy expression or statement", "chinese": "簡潔的表達；精煉的陳述", "example": "\"If.\" — the Spartan reply to Philip of Macedon's threat — is history's most celebrated laconism.", "example_zh": "「如果。」——斯巴達人對馬其頓腓力威脅的回覆——是歷史上最著名的簡言。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "cogency", "ipa": "ˈkoʊdʒənsi", "pos": "n.", "definition": "the quality of being logically compelling; force of reason", "chinese": "說服力；論據的充分性；邏輯的有力性", "example": "The cogency of her argument left the opposing counsel with little to refute.", "example_zh": "她論點的說服力使對方律師幾乎無從反駁。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "eloquent", "ipa": "ˈeləkwənt", "pos": "adj.", "definition": "vividly expressive; forceful or persuasive in language", "chinese": "雄辯的；口才出眾的；極具表達力的", "example": "Her eloquent speech moved the entire audience to tears.", "example_zh": "她雄辯的演說令整個觀眾席熱淚盈眶。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "eloquence", "ipa": "ˈeləkwəns", "pos": "n.", "definition": "the quality of being eloquent", "chinese": "口才；雄辯；極具說服力的表達", "example": "Lincoln's eloquence at Gettysburg transformed a brief cemetery dedication into an immortal address.", "example_zh": "林肯在葛底斯堡的雄辯將一次簡短的公墓獻詞變成了永恆的演說。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magniloquent", "ipa": "mæɡˈnɪləkwənt", "pos": "adj.", "definition": "using high-flown, grandiose, or pompous language", "chinese": "誇張的；浮誇的；用詞矯飾的", "example": "His magniloquent speeches impressed gullible voters but bored those who preferred plain talk.", "example_zh": "他誇張浮誇的演說讓輕信的選民印象深刻，卻令偏好直白表達的人感到厭倦。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magniloquence", "ipa": "mæɡˈnɪləkwəns", "pos": "n.", "definition": "the use of lofty, flowery, or overelegant language", "chinese": "誇大的言辭；浮誇的語言；矯飾的表達", "example": "The professor's magniloquence was so extreme that students needed a dictionary to follow his lectures.", "example_zh": "那位教授的浮誇言辭如此誇張，學生們需要一本字典才能聽懂他的課。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "grandiloquent", "ipa": "ɡrænˈdɪləkwənt", "pos": "adj.", "definition": "using grand, pompous, or elevated language", "chinese": "誇誇其談的；使用宏大誇張語言的；虛張聲勢的", "example": "The grandiloquent title he gave himself — \"Supreme Commander of Global Affairs\" — impressed no one.", "example_zh": "他給自己起的誇誇其談的頭銜——「全球事務最高指揮官」——沒有讓任何人印象深刻。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "grandiloquence", "ipa": "ɡrænˈdɪləkwəns", "pos": "n.", "definition": "the quality of using grandiose language", "chinese": "誇大的言辭；使用宏大語言的風格", "example": "The critic noted that the novel suffered from grandiloquence — big words used where simple ones would do.", "example_zh": "評論家指出這部小說患有誇大言辭的毛病——在可以用簡單詞語的地方卻使用了大詞。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbosity", "ipa": "vɜːrˈbɒsɪti", "pos": "n.", "definition": "wordiness; the use of excess words", "chinese": "冗長；囉嗦；用詞過多", "example": "The editor trimmed the article's verbosity, cutting it from three thousand words to eight hundred.", "example_zh": "編輯削減了文章的冗長，將其從三千字刪減至八百字。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "volubility", "ipa": "ˌvɒljʊˈbɪlɪti", "pos": "n.", "definition": "fluency and ease in speech; rapidity of speech", "chinese": "口若懸河；說話流利；語速快捷", "example": "Her volubility in three languages made her an invaluable translator at the conference.", "example_zh": "她能用三種語言口若懸河地表達，使她成為會議上不可或缺的翻譯員。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "garrulity", "ipa": "ɡəˈruːlɪti", "pos": "n.", "definition": "the quality of chattering aimlessly and ceaselessly", "chinese": "嘮叨；喋喋不休；無謂的多話", "example": "His garrulity at work meetings meant that simple discussions always ran over time.", "example_zh": "他在工作會議上的嘮叨意味著簡單的討論總是超時。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnanimous", "ipa": "mæɡˈnænɪməs", "pos": "adj.", "definition": "big-hearted; generous; forgiving; noble in motive", "chinese": "寬宏大量的；慷慨的；大度的；高尚的", "example": "The champion was magnanimous in victory, praising his opponent's courage and skill.", "example_zh": "那位冠軍勝利時表現得寬宏大量，稱讚對手的勇氣和技巧。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnate", "ipa": "ˈmæɡneɪt", "pos": "n.", "definition": "a person of great power or influence; a big wheel", "chinese": "大亨；有影響力的人物；權貴", "example": "The oil magnate owned refineries on three continents and employed tens of thousands of people.", "example_zh": "那位石油大亨在三大洲擁有煉油廠，並僱用了數萬名員工。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnify", "ipa": "ˈmæɡnɪfaɪ", "pos": "v.", "definition": "to make larger; to make seem larger", "chinese": "放大；使看起來更大；誇大", "example": "The microscope magnified the cell's structure enough to reveal its internal components.", "example_zh": "顯微鏡將細胞結構放大到足以顯示其內部成分。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnitude", "ipa": "ˈmæɡnɪtjuːd", "pos": "n.", "definition": "great size or extent", "chinese": "重大；規模；量級", "example": "The magnitude of the disaster was only fully appreciated after aerial surveys were completed.", "example_zh": "只有在航空勘測完成後，災難的規模才得到充分認識。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "magnum opus", "ipa": "ˌmæɡnəm ˈoʊpəs", "pos": "n.", "definition": "a person's greatest work or masterpiece", "chinese": "傑作；（某人的）最偉大作品", "example": "Many critics consider Beethoven's Ninth Symphony his magnum opus.", "example_zh": "許多評論家認為貝多芬的第九交響曲是他的傑作。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbatim", "ipa": "vɜːrˈbeɪtɪm", "pos": "adv./adj.", "definition": "word for word", "chinese": "逐字地；一字不差地", "example": "The witness repeated the conversation verbatim, recalling every word with precision.", "example_zh": "那位證人逐字重複了對話，精確地回憶起每一個字。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbal", "ipa": "ˈvɜːrbəl", "pos": "adj.", "definition": "pertaining to words; oral rather than written", "chinese": "口頭的；言語的；與文字相關的", "example": "They made a verbal agreement, though both parties later wished they had signed a contract.", "example_zh": "他們達成了口頭協議，儘管雙方後來都希望自己當時簽了合約。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbalize", "ipa": "ˈvɜːrbəlaɪz", "pos": "v.", "definition": "to put into words", "chinese": "用語言表達；將（感受或想法）說出來", "example": "The therapist encouraged her to verbalize her fears rather than suppress them.", "example_zh": "治療師鼓勵她將恐懼說出來，而不是壓抑它們。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "verbiage", "ipa": "ˈvɜːrbiɪdʒ", "pos": "n.", "definition": "an excess of words; a style or manner of using words", "chinese": "冗詞；過多的文字；用詞風格", "example": "The legal contract was buried under so much verbiage that few clients actually read it in full.", "example_zh": "法律合約被如此大量的冗詞所淹沒，以至於很少有客戶真正完整閱讀它。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolve", "ipa": "rɪˈvɒlv", "pos": "v.", "definition": "to move in a circle; to keep turning round", "chinese": "旋轉；繞轉；反覆思考", "example": "The Earth revolves around the Sun once every 365 days.", "example_zh": "地球每365天繞太陽公轉一次。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolution", "ipa": "ˌrevəˈluːʃən", "pos": "n.", "definition": "one complete turn; a radical change; a political upheaval", "chinese": "一圈；（政治或社會的）革命；徹底變革", "example": "The French Revolution transformed the political landscape of Europe and inspired movements worldwide.", "example_zh": "法國大革命改變了歐洲的政治格局，並激勵了世界各地的運動。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "revolutionary", "ipa": "ˌrevəˈluːʃənəri", "pos": "adj.", "definition": "causing or resulting from radical change", "chinese": "革命性的；引起根本變革的；具有革命意義的", "example": "The smartphone was a revolutionary invention that changed how people communicate, work, and live.", "example_zh": "智慧型手機是一項革命性的發明，改變了人們溝通、工作和生活的方式。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolve", "ipa": "ɪˈvɒlv", "pos": "v.", "definition": "to unfold or develop gradually", "chinese": "逐漸發展；演化；演變", "example": "Language evolves over time, adapting to the needs and experiences of its speakers.", "example_zh": "語言隨著時間的推移而演化，適應說話者的需求和經歷。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolution", "ipa": "ˌiːvəˈluːʃən", "pos": "n.", "definition": "gradual development or unfolding", "chinese": "演化；逐漸發展；進化", "example": "The evolution of computing from room-sized machines to handheld devices took less than fifty years.", "example_zh": "計算機從房間大小的機器演化到手持設備只用了不到五十年的時間。"}, {"session": "Session 26: Laconic, Eloquent, and Related Words", "word": "evolutionary", "ipa": "ˌiːvəˈluːʃənəri", "pos": "adj.", "definition": "resulting or developing gradually", "chinese": "演化的；逐漸發展的；進化論的", "example": "The changes to the software were evolutionary rather than revolutionary, improving existing features incrementally.", "example_zh": "該軟體的變化是演化性的而非革命性的，以漸進方式改善現有功能。"}], "Session 27: Anatomy, Sleep, and Related Words": [{"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventral", "ipa": "ˈventrəl", "pos": "adj.", "definition": "referring to the front or belly side of an animal", "chinese": "腹面的；腹部的；前側的", "example": "The ventral fin of the fish helps it maintain stability as it swims through the water.", "example_zh": "魚的腹鰭有助於它在水中游泳時保持穩定。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventricle", "ipa": "ˈventrɪkəl", "pos": "n.", "definition": "a hollow organ or cavity, especially a chamber of the heart", "chinese": "心室；（心臟或大腦的）空腔", "example": "The left ventricle pumps oxygenated blood out through the aorta to the rest of the body.", "example_zh": "左心室將含氧血液通過主動脈泵送至全身其他部位。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ventricular", "ipa": "venˈtrɪkjʊlər", "pos": "adj.", "definition": "pertaining to a ventricle; having a belly-like bulge", "chinese": "心室的；與心腔有關的；腹狀突起的", "example": "The cardiologist detected an irregular ventricular rhythm and ordered further testing.", "example_zh": "心臟科醫師檢測到不規則的心室節律，並下令進行進一步測試。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "auricle", "ipa": "ˈɔːrɪkəl", "pos": "n.", "definition": "an upper chamber of the heart; the external ear", "chinese": "心房；耳廓；外耳", "example": "Blood from the veins flows into the right auricle before entering the lower chambers of the heart.", "example_zh": "靜脈血流入右心房，然後才進入心臟的下腔。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "auricular", "ipa": "ɔːˈrɪkjʊlər", "pos": "adj.", "definition": "pertaining to the ear or to an auricle", "chinese": "耳的；心房的；與耳朵或心房有關的", "example": "The doctor used an auricular thermometer to take the child's temperature quickly.", "example_zh": "醫生使用耳溫槍快速為孩子量體溫。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "avuncular", "ipa": "əˈvʌŋkjʊlər", "pos": "adj.", "definition": "like an uncle; kindly, protective, indulgent", "chinese": "像叔伯的；親切慈愛的；如叔伯般呵護的", "example": "The retired professor had an avuncular manner that put students immediately at ease.", "example_zh": "那位退休教授有著像叔叔一樣親切的舉止，讓學生立刻感到輕鬆自在。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "dorsal", "ipa": "ˈdɔːrsəl", "pos": "adj.", "definition": "referring to the back or posterior side", "chinese": "背部的；背側的；後側的", "example": "The shark's dorsal fin cut through the water's surface, signaling its approach.", "example_zh": "鯊魚的背鰭劃破水面，預示著它的靠近。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "endorse", "ipa": "ɪnˈdɔːrs", "pos": "v.", "definition": "to sign on the back of; to approve of; to support", "chinese": "背書；認可；支持；簽署（支票背面）", "example": "Several leading scientists endorsed the findings, lending them significant credibility.", "example_zh": "幾位頂尖科學家認可了這些研究結果，為其增添了重大的可信度。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "endorsement", "ipa": "ɪnˈdɔːrsmənt", "pos": "n.", "definition": "the act of endorsing; approval; support", "chinese": "認可；背書；支持；代言", "example": "The celebrity's endorsement of the product caused sales to triple within a week.", "example_zh": "那位名人對該產品的代言使銷售量在一週內增加了三倍。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "vociferate", "ipa": "voʊˈsɪfəreɪt", "pos": "v.", "definition": "to shout vehemently; to cry out loudly", "chinese": "大聲呼喊；激烈叫嚷；放聲高呼", "example": "The protesters vociferated their demands outside the parliament building.", "example_zh": "抗議者在議會大廈外大聲呼喊他們的訴求。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "vociferation", "ipa": "voʊˌsɪfəˈreɪʃən", "pos": "n.", "definition": "a vehement outcry; loud shouting", "chinese": "大聲呼喊；激烈叫嚷；喧嚷", "example": "The sudden vociferation from the crowd signaled that something unexpected had happened on the field.", "example_zh": "人群中突然爆發的喧嚷聲表明球場上發生了意外情況。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somniferous", "ipa": "sɒmˈnɪfərəs", "pos": "adj.", "definition": "causing or inducing sleep", "chinese": "催眠的；使人昏昏欲睡的", "example": "The somniferous lecture had half the class nodding off within twenty minutes.", "example_zh": "那堂催眠式的講課讓半數同學在二十分鐘內就昏昏欲睡。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomnia", "ipa": "ɪnˈsɒmniə", "pos": "n.", "definition": "inability to fall asleep", "chinese": "失眠症；無法入睡", "example": "Chronic insomnia left her exhausted and unable to concentrate during the day.", "example_zh": "長期失眠使她精疲力竭，白天無法集中注意力。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomniac", "ipa": "ɪnˈsɒmniæk", "pos": "n.", "definition": "a person who cannot sleep", "chinese": "失眠者；患有失眠症的人", "example": "As a confirmed insomniac, he had tried every remedy from herbal tea to white noise machines.", "example_zh": "作為一個確診的失眠者，他嘗試過從草本茶到白噪音機的各種療法。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "insomnious", "ipa": "ɪnˈsɒmniəs", "pos": "adj.", "definition": "unable to fall asleep; wakeful", "chinese": "失眠的；無法入睡的；清醒的", "example": "She lay insomnious until dawn, her mind racing with unresolved worries.", "example_zh": "她躺著失眠直到黎明，腦中充斥著未解決的憂慮。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnolent", "ipa": "ˈsɒmnələnt", "pos": "adj.", "definition": "drowsy; sleepy", "chinese": "昏昏欲睡的；睏倦的；令人想睡的", "example": "The warm afternoon sun made the students somnolent, and attention drifted from the lesson.", "example_zh": "溫暖的午後陽光讓學生昏昏欲睡，注意力從課程上渙散開來。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnolence", "ipa": "ˈsɒmnələns", "pos": "n.", "definition": "drowsiness; sleepiness", "chinese": "昏昏欲睡；睏倦；嗜睡", "example": "The medication listed somnolence as a common side effect, warning users not to drive.", "example_zh": "該藥物將嗜睡列為常見副作用，警告使用者不要駕車。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulism", "ipa": "sɒmˈnæmbjʊlɪzəm", "pos": "n.", "definition": "sleepwalking", "chinese": "夢遊症；睡行症", "example": "His somnambulism became a safety concern after he was found outside in the middle of the night.", "example_zh": "他的夢遊症在他被發現在深夜出現在戶外後成為了安全隱患。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulist", "ipa": "sɒmˈnæmbjʊlɪst", "pos": "n.", "definition": "a sleepwalker", "chinese": "夢遊者；夢遊症患者", "example": "The somnambulist was found in the kitchen, preparing breakfast while still fast asleep.", "example_zh": "那個夢遊者被發現在廚房裡，在熟睡中準備早餐。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "somnambulistic", "ipa": "sɒmˌnæmbjʊˈlɪstɪk", "pos": "adj.", "definition": "pertaining to or characteristic of sleepwalking", "chinese": "夢遊的；與夢遊症有關的", "example": "The doctor described the patient's somnambulistic episodes as triggered by stress.", "example_zh": "醫生描述該患者的夢遊發作是由壓力引發的。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "ambulatory", "ipa": "ˈæmbjʊlətɔːri", "pos": "adj.", "definition": "able to walk; no longer bedridden", "chinese": "能行走的；非臥床的；移動式的", "example": "Within three days of surgery, the patient was ambulatory and taking short walks down the corridor.", "example_zh": "手術後三天內，患者已能行走，並在走廊上進行短距離步行。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulate", "ipa": "pəˈræmbjʊleɪt", "pos": "v.", "definition": "to stroll through or around", "chinese": "漫步於；在…四處走動；徘徊", "example": "On Sunday mornings he liked to perambulate the park and observe the variety of wildlife.", "example_zh": "在週日早晨，他喜歡在公園裡漫步，觀察各種各樣的野生動物。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulator", "ipa": "pəˈræmbjʊleɪtər", "pos": "n.", "definition": "a baby carriage (British term); a pram", "chinese": "嬰兒車（英式用語）；童車", "example": "The nanny pushed the perambulator along the tree-lined avenue as the baby slept peacefully.", "example_zh": "保姆推著嬰兒車沿著林蔭大道行走，嬰兒安靜地熟睡著。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "perambulation", "ipa": "pəˌræmbjʊˈleɪʃən", "pos": "n.", "definition": "the act of strolling through", "chinese": "漫步；巡行；在某地區的走動", "example": "His daily perambulation of the neighborhood kept him fit and connected to the community.", "example_zh": "他每天在附近社區的漫步使他保持健康，並與社區保持聯繫。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "amble", "ipa": "ˈæmbəl", "pos": "v.", "definition": "to walk aimlessly at a slow pace", "chinese": "漫步；緩步閒逛；悠閒地走", "example": "They ambled along the beach at sunset, with no particular destination in mind.", "example_zh": "他們在日落時分沿著海灘漫步，心中沒有特定的目的地。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "preamble", "ipa": "ˈpriːæmbəl", "pos": "n.", "definition": "an introduction; an introductory statement or event", "chinese": "序言；前言；開場白；序幕", "example": "The Constitution's preamble outlines the fundamental purposes and principles of the document.", "example_zh": "憲法的序言概述了文件的基本目的和原則。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "soporific", "ipa": "ˌsɒpəˈrɪfɪk", "pos": "adj./n.", "definition": "causing sleep; a sleeping pill or drug", "chinese": "催眠的；使人昏昏欲睡的；安眠藥", "example": "The professor's soporific monotone had students reaching for their coffee cups within minutes.", "example_zh": "教授那催眠般的單調語調讓學生們在幾分鐘內就伸手拿起了咖啡杯。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "articulate　[ɑːrˈtɪkjʊlət] /", "ipa": "ɑːrˈtɪkjʊleɪt", "pos": "adj./v.", "definition": "verbal; able to express oneself fluently; to express", "chinese": "表達清晰的；口齒清楚的；清楚地表達", "example": "She was an articulate spokesperson who could explain complex issues in plain language.", "example_zh": "她是一位表達清晰的發言人，能夠用通俗的語言解釋複雜的問題。"}, {"session": "Session 27: Anatomy, Sleep, and Related Words", "word": "banality", "ipa": "bəˈnælɪti", "pos": "n.", "definition": "lack of originality; trite, hackneyed quality", "chinese": "陳腐；平庸；缺乏新意", "example": "The novelist was criticized for the banality of his dialogue, which felt recycled from other stories.", "example_zh": "那位小說家因其對白的陳腐而受到批評，感覺像是從其他故事中回收利用的。"}], "Session 28: Words for Types of People": [{"session": "Session 28: Words for Types of People", "word": "martinet", "ipa": "ˌmɑːrtɪˈnet", "pos": "n.", "definition": "a strict disciplinarian who demands blind, unquestioning obedience", "chinese": "嚴格紀律主義者；要求盲目服從的人", "example": "The new principal was a martinet who enforced every rule with zero tolerance and no exceptions.", "example_zh": "那位新校長是個嚴格的紀律主義者，以零容忍的方式執行每一條規定，毫無例外。"}, {"session": "Session 28: Words for Types of People", "word": "sycophant", "ipa": "ˈsɪkəfənt", "pos": "n.", "definition": "a toady; one who flatters people of wealth or influence for personal gain", "chinese": "諂媚者；馬屁精；為個人利益奉承權貴的人", "example": "The CEO was surrounded by sycophants who agreed with every decision, however poor.", "example_zh": "那位執行長被諂媚者包圍，這些人對每一個決定都表示同意，無論好壞。"}, {"session": "Session 28: Words for Types of People", "word": "dilettante", "ipa": "ˌdɪlɪˈtænti", "pos": "n.", "definition": "one who dabbles superficially in the arts; an amateur", "chinese": "業餘愛好者；淺嘗藝術的人；半吊子", "example": "He was merely a dilettante who painted on weekends but never committed to serious study.", "example_zh": "他只是個業餘愛好者，週末畫畫，但從未認真進行系統學習。"}, {"session": "Session 28: Words for Types of People", "word": "virago", "ipa": "vɪˈrɑːɡoʊ", "pos": "n.", "definition": "a loud-mouthed, shrewish, turbulent woman", "chinese": "潑婦；悍婦；大聲叫罵的女人", "example": "The neighbors dreaded disputes with the virago next door, whose voice could be heard across the street.", "example_zh": "鄰居們害怕與隔壁的潑婦發生爭執，她的聲音隔著街道都能聽到。"}, {"session": "Session 28: Words for Types of People", "word": "chauvinist", "ipa": "ˈʃoʊvɪnɪst", "pos": "n.", "definition": "one who is exaggeratedly and aggressively devoted to his/her own group", "chinese": "沙文主義者；過度偏袒自身群體的人", "example": "The male chauvinist dismissed every suggestion from female colleagues as misguided.", "example_zh": "那個男性沙文主義者把女同事的每一個建議都斥為錯誤的。"}, {"session": "Session 28: Words for Types of People", "word": "monomaniac", "ipa": "ˌmɒnəˈmeɪniæk", "pos": "n.", "definition": "one with an obsessive fixation on one particular thing", "chinese": "偏執狂；對單一事物有強迫性執著的人", "example": "As a monomaniac about vintage watches, he spent every spare moment and most of his salary on his collection.", "example_zh": "作為一個對古董手錶有強迫性執著的人，他把所有的空閒時間和大部分薪水都花在收藏上。"}, {"session": "Session 28: Words for Types of People", "word": "iconoclast", "ipa": "aɪˈkɒnəklæst", "pos": "n.", "definition": "one who sneers at cherished traditions and conventional beliefs", "chinese": "偶像破壞者；打破傳統的人；反傳統者", "example": "The iconoclast challenged every assumption the department held, infuriating traditionalists but inspiring younger colleagues.", "example_zh": "那個反傳統者挑戰了該部門持有的每一個假設，激怒了傳統主義者，但鼓舞了年輕的同事。"}, {"session": "Session 28: Words for Types of People", "word": "atheist", "ipa": "ˈeɪθiɪst", "pos": "n.", "definition": "one who does not believe in God", "chinese": "無神論者；不相信神明存在的人", "example": "The atheist argued that morality is possible without religion, grounding ethics in reason and empathy instead.", "example_zh": "那位無神論者認為道德可以不依賴宗教，而是將倫理建立在理性和同理心之上。"}, {"session": "Session 28: Words for Types of People", "word": "lecher", "ipa": "ˈletʃər", "pos": "n.", "definition": "a sexually aggressive and promiscuous man", "chinese": "好色之徒；色狼；淫蕩的男人", "example": "The woman complained that the lecher at her office had made several inappropriate remarks.", "example_zh": "那位女士投訴辦公室裡的色狼對她發表了幾次不恰當的言論。"}, {"session": "Session 28: Words for Types of People", "word": "hypochondriac", "ipa": "ˌhaɪpəˈkɒndriæk", "pos": "n.", "definition": "one whose emotional disorder manifests as imaginary physical ailments", "chinese": "疑病症患者；疑心自己有病的人；無病呻吟者", "example": "The hypochondriac rushed to the emergency room at least once a month convinced of some new fatal disease.", "example_zh": "那個疑病症患者每個月至少去一次急診室，確信自己得了某種新的致命疾病。"}], "Session 29: Etymological Words — Families, Names, and More": [{"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sycophancy", "ipa": "ˈsɪkəfənsi", "pos": "n.", "definition": "the behavior of a sycophant; toadying", "chinese": "諂媚；阿諛奉承的行為", "example": "The board's sycophancy toward the founder prevented any honest discussion of the company's failings.", "example_zh": "董事會對創始人的諂媚阻止了對公司失敗的任何誠實討論。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sycophantic", "ipa": "ˌsɪkəˈfæntɪk", "pos": "adj.", "definition": "characteristic of a sycophant; toadying", "chinese": "諂媚的；阿諛奉承的；馬屁精式的", "example": "His sycophantic praise of every memo the director wrote bordered on parody.", "example_zh": "他對主任寫的每一份備忘錄都給予諂媚的讚揚，幾乎到了滑稽的程度。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "diaphanous", "ipa": "daɪˈæfənəs", "pos": "adj.", "definition": "filmy; gauzy; sheer; nearly transparent", "chinese": "透明的；薄如蟬翼的；輕薄透明的", "example": "The bride wore a diaphanous veil that floated gently in the breeze.", "example_zh": "新娘戴著一條薄如蟬翼的面紗，在微風中輕輕飄動。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "dilettantism", "ipa": "ˌdɪlɪˈtæntɪzəm", "pos": "n.", "definition": "superficial dabbling in the arts", "chinese": "業餘愛好主義；淺嘗藝術的態度；半吊子作風", "example": "His dilettantism meant he had tried painting, poetry, and sculpture, but mastered none of them.", "example_zh": "他的業餘愛好主義意味著他嘗試過繪畫、詩歌和雕塑，但沒有精通其中任何一項。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "dilettantish", "ipa": "ˌdɪlɪˈtæntɪʃ", "pos": "adj.", "definition": "characteristic of a dilettante; superficial", "chinese": "業餘的；淺嘗輒止的；不夠深入的", "example": "Her dilettantish approach to learning languages meant she spoke five poorly rather than one or two well.", "example_zh": "她對語言學習的業餘態度意味著她五門語言都說得很差，而不是一兩門說得很好。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "tyro", "ipa": "ˈtaɪroʊ", "pos": "n.", "definition": "an inexperienced beginner in a field", "chinese": "新手；初學者；缺乏經驗的入門者", "example": "As a tyro in the kitchen, he followed every recipe to the letter and still managed to burn the toast.", "example_zh": "作為廚房新手，他按照食譜一字不差地操作，卻還是把烤麵包給烤焦了。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "virtuoso", "ipa": "ˌvɜːrtʃuˈoʊsoʊ", "pos": "n.", "definition": "one who has achieved consummate skill in an art, usually music", "chinese": "藝術大師；（尤指音樂方面的）技藝精湛者；演奏大師", "example": "The young pianist was hailed as a virtuoso after her debut performance left critics speechless.", "example_zh": "那位年輕鋼琴家在首演後令評論家啞口無言，被譽為演奏大師。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "virtuosi", "ipa": "ˌvɜːrtʃuˈoʊsi", "pos": "n. (pl.)", "definition": "the Italian plural of virtuoso", "chinese": "藝術大師們（virtuoso 的義大利文複數）", "example": "The orchestra was composed entirely of virtuosi, each a master of their instrument.", "example_zh": "那支管弦樂團完全由大師級演奏家組成，每位都是其所用樂器的大師。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "termagant", "ipa": "ˈtɜːrməɡənt", "pos": "n.", "definition": "a loud-mouthed, quarrelsome, turbulent woman", "chinese": "潑婦；悍婦；愛吵架的女人", "example": "The playwright portrayed the landlady as a termagant who terrorized her tenants with constant complaints.", "example_zh": "劇作家將房東太太描繪成一個悍婦，用不斷的抱怨使房客們膽戰心驚。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "harridan", "ipa": "ˈhærɪdən", "pos": "n.", "definition": "a shrewish, scolding woman", "chinese": "潑婦；愛嘮叨的女人；喜歡罵人的老婦", "example": "The old harridan next door scolded any child who dared to set foot on her lawn.", "example_zh": "隔壁那個愛嘮叨的老婦人責罵任何膽敢踏上她草坪的孩子。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "chauvinism", "ipa": "ˈʃoʊvɪnɪzəm", "pos": "n.", "definition": "exaggerated and blatant devotion to one's own group", "chinese": "沙文主義；過激的偏袒自身群體", "example": "The company's culture of chauvinism prevented talented employees from underrepresented groups from advancing.", "example_zh": "公司的沙文主義文化阻止了代表性不足群體中的優秀員工晉升。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "chauvinistic", "ipa": "ˌʃoʊvɪˈnɪstɪk", "pos": "adj.", "definition": "characteristic of chauvinism", "chinese": "沙文主義的；偏狹地偏袒自身群體的", "example": "His chauvinistic attitude made any rational discussion about competing approaches impossible.", "example_zh": "他的沙文主義態度使任何關於競爭方法的理性討論都變得不可能。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patrimony", "ipa": "ˈpætrɪmoʊni", "pos": "n.", "definition": "an inheritance from one's father", "chinese": "父系遺產；祖傳財產；遺產", "example": "He squandered his entire patrimony on failed business ventures within five years of inheriting it.", "example_zh": "他在繼承父系遺產的五年內，將其全部揮霍在失敗的商業冒險上。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patrimonial", "ipa": "ˌpætrɪˈmoʊniəl", "pos": "adj.", "definition": "pertaining to patrimony", "chinese": "遺產的；祖傳財產的；與父系遺產相關的", "example": "The patrimonial estate had been in the family for six generations before being sold.", "example_zh": "那座祖傳莊園在家族中傳承了六代才被出售。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "patronymic", "ipa": "ˌpætrəˈnɪmɪk", "pos": "n.", "definition": "a name derived from the father's name", "chinese": "父名衍生的姓；以父名為基礎的姓名", "example": "In many Scandinavian cultures, a patronymic like \"Johnson\" originally meant \"son of John.\"", "example_zh": "在許多斯堪地納維亞文化中，像「Johnson」這樣的父名姓氏最初意味著「約翰之子」。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "synonym", "ipa": "ˈsɪnənɪm", "pos": "n.", "definition": "a word of similar meaning to another", "chinese": "同義詞；意義相近的詞", "example": "\"Happy\" and \"joyful\" are synonyms, though they carry slightly different connotations.", "example_zh": "「Happy」和「joyful」是同義詞，儘管它們帶有略微不同的含義。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "synonymous", "ipa": "sɪˈnɒnɪməs", "pos": "adj.", "definition": "having the same or similar meaning", "chinese": "同義的；意義相近的；等同於", "example": "In that era, \"genius\" and \"hard work\" were considered synonymous with success.", "example_zh": "在那個年代，「天才」和「努力」被認為與成功同義。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "antonym", "ipa": "ˈæntənɪm", "pos": "n.", "definition": "a word of opposite meaning", "chinese": "反義詞；意義相反的詞", "example": "\"Hot\" and \"cold\" are antonyms; so are \"love\" and \"hate.\"", "example_zh": "「Hot」和「cold」是反義詞；「love」和「hate」也是。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "antonymous", "ipa": "ænˈtɒnɪməs", "pos": "adj.", "definition": "having opposite meanings", "chinese": "反義的；意義相反的", "example": "The words \"ascend\" and \"descend\" are antonymous and refer to opposite directions of movement.", "example_zh": "「ascend」和「descend」這兩個詞是反義詞，指的是相反方向的移動。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homonym", "ipa": "ˈhɒmənɪm", "pos": "n.", "definition": "a word that sounds the same as another but differs in spelling and meaning", "chinese": "同音異義字；發音相同但拼寫和意義不同的詞", "example": "\"Bark\" (dog sound) and \"bark\" (tree covering) are homonyms that share spelling but differ in meaning.", "example_zh": "「Bark」（狗叫聲）和「bark」（樹皮）是同音同形異義詞，拼寫相同但意義不同。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homonymous", "ipa": "həˈmɒnɪməs", "pos": "adj.", "definition": "having the same sound as another word", "chinese": "同音的；同音異義的", "example": "The homonymous words \"right\" and \"write\" confuse many language learners.", "example_zh": "同音異義詞「right」和「write」讓許多語言學習者感到困惑。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homophone", "ipa": "ˈhɒməfoʊn", "pos": "n.", "definition": "a word identical in sound to another but different in meaning/spelling", "chinese": "同音異形異義詞；發音相同但拼寫和意義不同的詞", "example": "\"There,\" \"their,\" and \"they're\" are homophones that are commonly confused in writing.", "example_zh": "「There」、「their」和「they're」是同音異形異義詞，在寫作中常被混淆。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homophonous", "ipa": "həˈmɒfənəs", "pos": "adj.", "definition": "sounding the same as another word", "chinese": "同音的；發音相同的", "example": "\"Flower\" and \"flour\" are homophonous words that sound identical but have very different meanings.", "example_zh": "「Flower」和「flour」是同音詞，聽起來完全一樣，但意思截然不同。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternity", "ipa": "pəˈtɜːrnɪti", "pos": "n.", "definition": "fatherhood", "chinese": "父親身份；父性；父系關係", "example": "A DNA test was conducted to establish the paternity of the child.", "example_zh": "進行了DNA測試以確定孩子的父親身份。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternal", "ipa": "pəˈtɜːrnəl", "pos": "adj.", "definition": "fatherly; of or pertaining to a father", "chinese": "父親的；父系的；如父親般的", "example": "His paternal grandmother emigrated from Italy in the early twentieth century.", "example_zh": "他的父系祖母在二十世紀初從義大利移民過來。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "paternalism", "ipa": "pəˈtɜːrnəlɪzəm", "pos": "n.", "definition": "the system of governing subordinates in a father-child relationship", "chinese": "家長主義；父權式管理；以父子關係治理 on the theme of patricide and the guilt that consumed the perpetrator.", "example_zh": "那部古代悲劇以弒父為主題，以及折磨著犯罪者的罪惡感。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matricide", "ipa": "ˈmætrɪsaɪd", "pos": "n.", "definition": "the killing of one's mother", "chinese": "弒母；殺害自己母親的行為", "example": "In Greek mythology, Orestes was driven mad by the Furies after committing matricide.", "example_zh": "在希臘神話中，俄瑞斯忒斯在弒母後被復仇女神逼得發瘋。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarch", "ipa": "ˈmeɪtriɑːrk", "pos": "n.", "definition": "a woman in a ruling, motherlike position", "chinese": "女家長；女族長；德高望重的女性長輩", "example": "The matriarch of the family managed the estate and made all major financial decisions for three generations.", "example_zh": "家族的女族長管理著莊園，並為三代人做出所有重要的財務決策。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarchy", "ipa": "ˈmeɪtriɑːrki", "pos": "n.", "definition": "a social system ruled by matriarchs", "chinese": "母權制；由女性長輩統治的社會制度", "example": "Some anthropologists have identified societies organized around matriarchy, where lineage and inheritance pass through the mother.", "example_zh": "一些人類學家發現了以母權制為中心的社會，在這些社會中，血統和繼承通過母親傳遞。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matriarchal", "ipa": "ˌmeɪtriˈɑːrkəl", "pos": "adj.", "definition": "characteristic of a matriarch or matriarchy", "chinese": "女族長的；母權制的；以女性長輩為主導的", "example": "The matriarchal clan traced all ancestry through the female line.", "example_zh": "那個母系氏族通過女性血統追溯所有祖先。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "maternity", "ipa": "məˈtɜːrnɪti", "pos": "n.", "definition": "motherhood", "chinese": "母親身份；母性；分娩相關（如產假）", "example": "She took three months of maternity leave after the birth of her first child.", "example_zh": "她在第一個孩子出生後請了三個月的產假。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "maternal", "ipa": "məˈtɜːrnəl", "pos": "adj.", "definition": "motherly; of or pertaining to a mother", "chinese": "母親的；母性的；母系的", "example": "Her maternal instinct kicked in the moment she held the newborn in her arms.", "example_zh": "當她把新生兒抱在懷裡的那一刻，她的母性本能就被激發出來了。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matron", "ipa": "ˈmeɪtrən", "pos": "n.", "definition": "an older, married woman", "chinese": "已婚婦女；（尤指有地位的）中年或年長女性", "example": "The hospital matron was a formidable woman who kept both patients and nurses in order.", "example_zh": "醫院的女護士長是一位令人敬畏的女性，她把病人和護士都管理得井井有條。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matronly", "ipa": "ˈmeɪtrənli", "pos": "adj.", "definition": "characteristic of a matron", "chinese": "像成熟已婚婦女的；端莊穩重的", "example": "Her matronly composure gave the committee confidence that she could handle any crisis.", "example_zh": "她端莊穩重的氣質讓委員會相信她能應對任何危機。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "alma mater", "ipa": "ˌælmə ˈmeɪtər", "pos": "n.", "definition": "the school or college from which one has graduated", "chinese": "母校；培育自己的學校或大學", "example": "She donated generously to her alma mater, hoping to fund scholarships for future students.", "example_zh": "她慷慨地向母校捐款，希望為未來的學生提供獎學金資助。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matrimony", "ipa": "ˈmætrɪmoʊni", "pos": "n.", "definition": "marriage", "chinese": "婚姻；婚姻關係；結婚", "example": "They entered matrimony with great joy and the full support of both families.", "example_zh": "他們在雙方家庭的全力支持下，滿懷喜悅地步入婚姻。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "matrimonial", "ipa": "ˌmætrɪˈmoʊniəl", "pos": "adj.", "definition": "pertaining to marriage", "chinese": "婚姻的；與結婚有關的", "example": "The couple consulted a lawyer to resolve their matrimonial property disputes.", "example_zh": "那對夫婦諮詢了律師以解決他們的婚姻財產糾紛。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "suicide", "ipa": "ˈsuːɪsaɪd", "pos": "n.", "definition": "the act of killing oneself", "chinese": "自殺；自毀行為", "example": "Mental health experts emphasize the importance of early intervention to prevent suicide.", "example_zh": "心理健康專家強調早期干預對於預防自殺的重要性。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "suicidal", "ipa": "ˌsuːɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to or likely to cause suicide", "chinese": "自殺的；有自殺傾向的；等同自殺的（如：自殺式行為）", "example": "The therapist recognized suicidal ideation early and arranged immediate support for the patient.", "example_zh": "治療師及早察覺到患者的自殺念頭，並為其安排了即時支援。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "fratricide", "ipa": "ˈfrætrɪsaɪd", "pos": "n.", "definition": "the killing of one's brother", "chinese": "弒兄弟；殺害兄弟的行為", "example": "The biblical story of Cain and Abel is the most famous example of fratricide in literature.", "example_zh": "聖經中該隱與亞伯的故事是文學中最著名的弒兄弟案例。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "fratricidal", "ipa": "ˌfrætrɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to fratricide", "chinese": "弒兄弟的；兄弟相殘的", "example": "The civil war was a fratricidal conflict that tore families apart and left the nation scarred for generations.", "example_zh": "那場內戰是一場兄弟相殘的衝突，拆散了家庭，給國家留下了幾代人的創傷。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "sororicide", "ipa": "səˈrɒrɪsaɪd", "pos": "n.", "definition": "the killing of one's sister", "chinese": "弒姐妹；殺害姐妹的行為", "example": "The detective novel's shocking twist revealed that the apparent accident was actually sororicide.", "example_zh": "那部偵探小說令人震驚的轉折揭示了，表面上的意外實際上是蓄意的弒姐妹行為。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homicide", "ipa": "ˈhɒmɪsaɪd", "pos": "n.", "definition": "the killing of a human being", "chinese": "殺人；殺人行為；他殺", "example": "The detective was assigned to investigate the homicide that occurred in the downtown alley.", "example_zh": "那名偵探被指派調查發生在市中心小巷裡的殺人案。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "homicidal", "ipa": "ˌhɒmɪˈsaɪdəl", "pos": "adj.", "definition": "pertaining to homicide; likely to commit homicide", "chinese": "殺人的；有殺人傾向的；與謀殺相關的", "example": "The psychiatrist testified that the defendant showed homicidal tendencies long before the incident.", "example_zh": "那位精神科醫師作證說，被告早在事件發生之前就表現出殺人傾向。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "regicide", "ipa": "ˈredʒɪsaɪd", "pos": "n.", "definition": "the killing of a king or ruling official", "chinese": "弒君；殺害國王的行為", "example": "The conspirators were executed for regicide after their plot to assassinate the king was discovered.", "example_zh": "那些陰謀家因其謀殺國王的陰謀被發現後，以弒君罪被處決。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "uxoricide", "ipa": "ʌkˈsɔːrɪsaɪd", "pos": "n.", "definition": "the killing of one's wife", "chinese": "弒妻；殺害自己妻子的行為", "example": "The trial for uxoricide drew widespread attention due to the prominent social standing of the accused.", "example_zh": "由於被告的社會地位顯赫，這場弒妻審判引起了廣泛關注。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "mariticide", "ipa": "məˈrɪtɪsaɪd", "pos": "n.", "definition": "the killing of one's husband", "chinese": "弒夫；殺害自己丈夫的行為", "example": "The case was classified as mariticide after evidence showed the wife had poisoned her husband over a period of months.", "example_zh": "在證據顯示妻子在數月內毒害了丈夫後，此案被歸類為弒夫罪。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "infanticide", "ipa": "ɪnˈfæntɪsaɪd", "pos": "n.", "definition": "the killing of a newborn child", "chinese": "殺嬰；殺害新生兒的行為", "example": "Throughout history, infanticide has been practiced in some cultures during times of extreme poverty or famine.", "example_zh": "縱觀歷史，在某些文化中，極端貧困或饑荒時期曾有過殺嬰的做法。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "genocide", "ipa": "ˈdʒenəsaɪd", "pos": "n.", "definition": "the killing of a whole race or nation", "chinese": "種族滅絕；屠殺整個民族或種族", "example": "The Holocaust was the most documented genocide of the twentieth century, claiming six million Jewish lives.", "example_zh": "猶太大屠殺是二十世紀記錄最詳盡的種族滅絕，奪走了六百萬猶太人的生命。"}, {"session": "Session 29: Etymological Words — Families, Names, and More", "word": "parricide", "ipa": "ˈpærɪsaɪd", "pos": "n.", "definition": "the killing of either or both parents", "chinese": "弒親；殺害父母的行為", "example": "Ancient Roman law treated parricide as one of the most heinous crimes, punishable by being sewn into a sack and drowned.", "example_zh": "古羅馬法律將弒親視為最嚴重的罪行之一，刑罰是被縫入袋子投入水中溺斃。"}], "Session 30: Brothers, Sisters, Husbands, Wives, and Manias": [{"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternize", "ipa": "ˈfrætərˌnaɪz", "pos": "v.", "definition": "to associate in a brotherly manner; to socialize", "chinese": "以兄弟之情交往；親善交流", "example": "Soldiers were warned not to fraternize with the enemy during the ceasefire.", "example_zh": "士兵們被警告在停火期間不得與敵方人員親善往來。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternization", "ipa": "ˌfrætərnaɪˈzeʃən", "pos": "n.", "definition": "the act of fraternizing", "chinese": "親善交流；兄弟般往來的行為", "example": "The company policy discouraged fraternization between managers and their direct reports.", "example_zh": "公司政策不鼓勵管理者與其直屬下屬之間的私下往來。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternal", "ipa": "frəˈtɜrnl", "pos": "adj.", "definition": "brotherly; pertaining to brothers", "chinese": "兄弟般的；兄弟情誼的", "example": "The two colleagues shared a fraternal bond forged through years of working together.", "example_zh": "這兩位同事因多年共事而建立了兄弟般的深厚情誼。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "fraternity", "ipa": "frəˈtɜrnəti", "pos": "n.", "definition": "a men's organization; a group of people with common interests", "chinese": "兄弟會；（有共同利益的）團體", "example": "He joined a fraternity in his first year of college and made lifelong friends there.", "example_zh": "他在大學一年級加入了兄弟會，並在那裡結交了一生的朋友。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "sorority", "ipa": "səˈrɔrəti", "pos": "n.", "definition": "a women's organization or social club", "chinese": "姐妹會；女生聯誼會", "example": "She was elected president of her sorority after demonstrating strong leadership skills.", "example_zh": "她展現出強大的領導能力後，當選了姐妹會的會長。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxorious", "ipa": "ʌkˈsɔriəs", "pos": "adj.", "definition": "excessively doting on and submissive to one's wife", "chinese": "過分溺愛妻子的；懼內的", "example": "His friends teased him for being uxorious, since he never made any plans without consulting his wife first.", "example_zh": "他的朋友們取笑他太懼內，因為他從不在事先徵詢妻子意見的情況下做任何計劃。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxoriousness", "ipa": "ʌkˈsɔriəsnəs", "pos": "n.", "definition": "the quality of being uxorious", "chinese": "過分溺愛妻子的特質；懼內", "example": "His uxoriousness was charming at first, but eventually his friends found it exhausting to witness.", "example_zh": "他懼內的樣子起初顯得很可愛，但最終朋友們都覺得看不下去了。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "uxorial", "ipa": "ʌkˈsɔriəl", "pos": "adj.", "definition": "pertaining to or befitting a wife", "chinese": "有關妻子的；適合妻子的", "example": "She fulfilled her uxorial duties with grace while also pursuing a successful career.", "example_zh": "她在優雅地履行妻子職責的同時，也追求著成功的事業。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "marital", "ipa": "ˈmærɪtl", "pos": "adj.", "definition": "pertaining to marriage or the marital relationship", "chinese": "婚姻的；夫妻的", "example": "The couple sought marital counseling to improve their communication.", "example_zh": "這對夫妻尋求婚姻諮詢以改善他們的溝通方式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "extramarital", "ipa": "ˌɛkstrəˈmærɪtl", "pos": "adj.", "definition": "outside the marriage; adulterous", "chinese": "婚外的；外遇的", "example": "The novel explored the devastating consequences of an extramarital affair.", "example_zh": "這部小說探討了婚外情所帶來的毀滅性後果。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "premarital", "ipa": "priˈmærɪtl", "pos": "adj.", "definition": "occurring before marriage", "chinese": "婚前的", "example": "They completed premarital counseling before their wedding ceremony.", "example_zh": "他們在婚禮儀式前完成了婚前輔導課程。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regal", "ipa": "ˈrigəl", "pos": "adj.", "definition": "royal; kingly; magnificent; stately", "chinese": "帝王般的；莊嚴宏偉的", "example": "The queen entered the hall with a regal bearing that silenced the entire room.", "example_zh": "女王以帝王般的氣度走進大廳，令整個房間頓時鴉雀無聲。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regality", "ipa": "rɪˈgæləti", "pos": "n.", "definition": "the quality of being regal", "chinese": "帝王氣度；莊嚴威儀", "example": "Her regality was evident in every gesture and the way she commanded attention without effort.", "example_zh": "她的帝王氣度體現在每一個舉止中，以及她毫不費力地吸引所有人注意的方式上。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "regalia", "ipa": "rɪˈgeliə", "pos": "n. (pl.)", "definition": "the emblems, insignia, or dress of rank or office", "chinese": "王權象徵物；官服；徽章", "example": "The king appeared in full regalia for the coronation ceremony.", "example_zh": "國王身著全套王室禮服出席了加冕典禮。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "monomania", "ipa": "ˌmɑnəˈmeniə", "pos": "n.", "definition": "an obsessive fixation on one particular area", "chinese": "偏執狂；對某一事物的病態執迷", "example": "His monomania for collecting rare stamps consumed every spare moment of his life.", "example_zh": "他對收集稀有郵票的病態執迷佔據了他生活中每一個閒暇時刻。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "monomaniacal", "ipa": "ˌmɑnəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by monomania", "chinese": "偏執狂的；病態執迷的", "example": "Her monomaniacal pursuit of perfection made it impossible for her team to meet her standards.", "example_zh": "她對完美的病態追求使她的團隊無法達到她的標準。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomania", "ipa": "ˌdɪpsəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to drink alcohol; alcoholism", "chinese": "飲酒狂；酗酒症", "example": "He struggled with dipsomania for years before finally seeking professional treatment.", "example_zh": "他與酗酒症抗爭多年，最終才尋求專業治療。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomaniac", "ipa": "ˌdɪpsəˈmeniæk", "pos": "n.", "definition": "one suffering from dipsomania", "chinese": "飲酒狂患者；嗜酒成性者", "example": "As a confirmed dipsomaniac, he could not resist alcohol even when he knew it was destroying his health.", "example_zh": "作為一個確診的飲酒狂患者，即使知道酒精正在摧毀他的健康，他也無法抗拒。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "dipsomaniacal", "ipa": "ˌdɪpsəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by dipsomania", "chinese": "飲酒狂的；嗜酒成性的", "example": "His dipsomaniacal tendencies worsened whenever he was under extreme stress.", "example_zh": "每當他承受極大壓力時，他嗜酒成性的傾向就會加劇。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomania", "ipa": "ˌklɛptəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to steal", "chinese": "盜竊狂；病態偷竊衝動", "example": "The psychologist explained that kleptomania is an impulse control disorder, not simple theft.", "example_zh": "心理學家解釋說，盜竊狂是一種衝動控制障礙，而不是單純的偷竊行為。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomaniac", "ipa": "ˌklɛptəˈmeniæk", "pos": "n.", "definition": "one suffering from kleptomania", "chinese": "盜竊狂患者", "example": "The store owner recognized the kleptomaniac and quietly called a counselor rather than the police.", "example_zh": "店主認出了這位盜竊狂患者，悄悄打電話給輔導員而不是警察。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "kleptomaniacal", "ipa": "ˌklɛptəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by kleptomania", "chinese": "盜竊狂的；有病態偷竊衝動的", "example": "His kleptomaniacal behavior was traced back to severe anxiety and a difficult childhood.", "example_zh": "他的盜竊狂行為被追溯至嚴重的焦慮症和艱難的童年經歷。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromania", "ipa": "ˌpaɪrəˈmeniə", "pos": "n.", "definition": "a morbid compulsion to set fires", "chinese": "縱火狂；病態縱火衝動", "example": "The arson investigator suspected that pyromania, rather than financial motive, drove the suspect.", "example_zh": "縱火調查員懷疑是縱火狂而非財務動機驅使了嫌疑人。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromaniac", "ipa": "ˌpaɪrəˈmeniæk", "pos": "n.", "definition": "one suffering from pyromania", "chinese": "縱火狂患者", "example": "The pyromaniac was ordered to undergo psychiatric evaluation after being arrested near the scene.", "example_zh": "縱火狂患者在現場附近被捕後，被命令接受精神病學評估。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "pyromaniacal", "ipa": "ˌpaɪrəməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by pyromania", "chinese": "縱火狂的；有病態縱火衝動的", "example": "Investigators discovered a pattern of pyromaniacal behavior going back several years.", "example_zh": "調查人員發現了一種可追溯至數年前的縱火狂行為模式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "incendiarism", "ipa": "ɪnˈsɛndɪəˌrɪzəm", "pos": "n.", "definition": "the malicious burning of another's property for revenge", "chinese": "惡意縱火；蓄意放火（出於報復）", "example": "The police charged him with incendiarism after evidence showed he had set fire to his neighbor's barn out of spite.", "example_zh": "警方在證據顯示他出於惡意放火燒毀鄰居穀倉後，以惡意縱火罪起訴了他。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "incendiary", "ipa": "ɪnˈsɛndɪˌɛri", "pos": "n./adj.", "definition": "one who sets fires maliciously; of or pertaining to malicious fire-setting", "chinese": "縱火犯；煽動性的；縱火的", "example": "The police identified the incendiary device used to start the warehouse fire.", "example_zh": "警方確認了用來引燃倉庫火災的燃燒裝置。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "arson", "ipa": "ˈɑrsən", "pos": "n.", "definition": "the felony of setting fire to property for economic gain", "chinese": "縱火罪（以謀取經濟利益）", "example": "The insurance investigator suspected arson when the fire destroyed the struggling business overnight.", "example_zh": "當那場火災在一夜之間摧毀了那家陷入困境的企業時，保險調查員懷疑是蓄意縱火。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "arsonist", "ipa": "ˈɑrsənɪst", "pos": "n.", "definition": "one who commits arson", "chinese": "縱火犯", "example": "The arsonist was convicted after forensic evidence linked him to three separate fires.", "example_zh": "縱火犯在法證證據將他與三起獨立火災聯繫起來後被定罪。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomania", "ipa": "ˌmɛgələˈmeniə", "pos": "n.", "definition": "morbid delusions of grandeur, power, or importance", "chinese": "誇大狂；自大妄想症", "example": "His megalomania led him to believe he was destined to rule the entire country.", "example_zh": "他的自大妄想症使他相信自己命中注定要統治整個國家。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomaniac", "ipa": "ˌmɛgələˈmeniæk", "pos": "n.", "definition": "one suffering from megalomania", "chinese": "誇大狂患者；自大妄想症患者", "example": "The dictator was a megalomaniac who demanded that statues of himself be erected in every city.", "example_zh": "這位獨裁者是個自大妄想症患者，他要求在每座城市都豎立他自己的雕像。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "megalomaniacal", "ipa": "ˌmɛgələməˈnaɪəkəl", "pos": "adj.", "definition": "characterized by megalomania", "chinese": "誇大狂的；自大妄想的", "example": "His megalomaniacal schemes to take over competing companies alarmed his board of directors.", "example_zh": "他妄圖接管競爭對手公司的自大妄想計劃令董事會深感震驚。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "nymphomania", "ipa": "ˌnɪmfəˈmeniə", "pos": "n.", "definition": "morbid, uncontrollable desire for sexual intercourse in a female", "chinese": "女性色情狂；女性性慾亢進症", "example": "Nymphomania is a clinical term referring to a compulsive and distressing pattern of sexual behavior in women.", "example_zh": "女性色情狂是一個臨床術語，指女性強迫性且令人痛苦的性行為模式。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "nymphomaniac", "ipa": "ˌnɪmfəˈmeniæk", "pos": "n.", "definition": "a woman suffering from nymphomania", "chinese": "女性色情狂患者", "example": "The term nymphomaniac has largely been replaced by more clinical and neutral diagnostic language in modern psychiatry.", "example_zh": "在現代精神病學中，女性色情狂患者這一術語已基本被更為臨床和中性的診斷語言所取代。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "satyromania", "ipa": "ˌsætɪrəˈmeniə", "pos": "n.", "definition": "morbid, uncontrollable desire for sexual intercourse in a male", "chinese": "男性色情狂；男性性慾亢進症", "example": "Satyromania is the male counterpart of nymphomania, describing an excessive and compulsive sexual drive.", "example_zh": "男性色情狂是女性色情狂的對應詞，描述一種過度且強迫性的性衝動。"}, {"session": "Session 30: Brothers, Sisters, Husbands, Wives, and Manias", "word": "satyriasis", "ipa": "ˌsætɪˈraɪəsɪs", "pos": "n.", "definition": "another term for satyromania", "chinese": "男性色情狂（同義詞）", "example": "The medical textbook listed satyriasis as a hypersexuality disorder affecting m lopments from present conditions", "chinese": "預測；預言（根據現狀預判未來發展）", "example": "Economists were reluctant to prognosticate given the volatile state of the global markets.", "example_zh": "鑑於全球市場的動盪狀態，經濟學家們不願作出預測。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "prognostication", "ipa": "prɑgˌnɑstɪˈkeʃən", "pos": "n.", "definition": "the act of prognosticating", "chinese": "預測；預言", "example": "His prognostication about the election outcome proved remarkably accurate.", "example_zh": "他對選舉結果的預測被證明非常準確。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "monotheism", "ipa": "ˈmɑnəθiˌɪzəm", "pos": "n.", "definition": "belief in one God", "chinese": "一神論；一神教信仰", "example": "Christianity, Islam, and Judaism are all rooted in monotheism.", "example_zh": "基督教、伊斯蘭教和猶太教都根植於一神論。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "monotheist", "ipa": "ˈmɑnəθiɪst", "pos": "n.", "definition": "one who believes in one God", "chinese": "一神論者", "example": "As a monotheist, she found it difficult to understand polytheistic religions with their many deities.", "example_zh": "作為一名一神論者，她發現很難理解擁有眾多神祇的多神教宗教。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "monotheistic", "ipa": "ˌmɑnəθiˈɪstɪk", "pos": "adj.", "definition": "pertaining to monotheism", "chinese": "一神論的", "example": "The course compared monotheistic and polytheistic traditions from around the world.", "example_zh": "該課程比較了世界各地的一神論和多神論傳統。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "polytheism", "ipa": "ˈpɑliθiˌɪzəm", "pos": "n.", "definition": "belief in many gods", "chinese": "多神論；多神教信仰", "example": "Ancient Greek and Roman religions were characterized by polytheism, with gods for every domain of life.", "example_zh": "古希臘和古羅馬宗教以多神論為特徵，每個生活領域都有其對應的神祇。"}, {"session": "Session 31: Iconoclasts, God, Sex, and Medical Words", "word": "polytheist", "ipa": "ˈpɑliθiɪst", "pos": "n." ved the cyst from her ovary using minimally invasive laparoscopic techniques.", "example_zh": "外科醫師使用微創腹腔鏡技術切除了她卵巢上的囊腫。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovarian", "ipa": "oˈvɛriən", "pos": "adj.", "definition": "of or relating to the ovary", "chinese": "卵巢的", "example": "She was screened for ovarian cancer after her mother was diagnosed with the disease.", "example_zh": "在她母親被診斷出患有卵巢癌後，她接受了卵巢癌篩查。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovulate", "ipa": "ˈɑvjəˌlet", "pos": "v.", "definition": "to release an egg from the ovary", "chinese": "排卵", "example": "Women typically ovulate once per menstrual cycle, releasing one egg that may be fertilized.", "example_zh": "女性通常在每個月經周期排卵一次，釋放一個可能受精的卵子。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "ovulation", "ipa": "ˌɑvjəˈleʃən", "pos": "n.", "definition": "the process of releasing an egg from the ovary", "chinese": "排卵（過程）", "example": "Tracking ovulation is a common method used by couples trying to conceive.", "example_zh": "追蹤排卵期是嘗試懷孕的夫妻常用的一種方法。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vital", "ipa": "ˈvaɪtl", "pos": "adj.", "definition": "essential to life; of utmost importance", "chinese": "生死攸關的；至關重要的；充滿活力的", "example": "Clean water is vital to the survival of every community, especially in times of drought.", "example_zh": "清潔的水對每個社區的生存都至關重要，尤其是在乾旱時期。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vitality", "ipa": "vaɪˈtæləti", "pos": "n.", "definition": "the state of being strong and active; energy", "chinese": "活力；生命力；精力", "example": "Despite being in her eighties, she radiated a vitality that inspired everyone around her.", "example_zh": "儘管已年過八旬，她仍散發出一種鼓舞周圍所有人的活力。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "vitali er him and he longed for change.", "example_zh": "在多年的例行工作之後，一種深深的倦怠感籠罩了他，他渴望改變。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "bon vivant", "ipa": "ˌbɑn vɪˈvɑnt", "pos": "n.", "definition": "a person who lives luxuriously and enjoys fine food and drink", "chinese": "享樂主義者；美食家；追求奢華生活者", "example": "As a true bon vivant, he knew the best restaurants in every city he visited.", "example_zh": "作為一個真正的享樂主義者，他知道他所到訪的每個城市中最好的餐廳。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gourmand", "ipa": "ˈgʊrmɑnd", "pos": "n.", "definition": "a person who enjoys eating and often eats to excess", "chinese": "貪吃者；饕餮之徒；美食愛好者（常含過量之意）", "example": "The gourmand worked his way through the entire menu, declaring every dish a masterpiece.", "example_zh": "這位貪吃者把菜單上的每道菜都點遍了，宣稱每道菜都是傑作。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gourmet", "ipa": "ˈgʊrmet", "pos": "n.", "definition": "a connoisseur of fine food and drink", "chinese": "美食鑑賞家；老饕", "example": "As a gourmet, she could identify the region and vintage of a wine from a single sip.", "example_zh": "作為一位美食鑑賞家，她只需一口就能辨別出葡萄酒的產區和年份。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "gormandize", "ipa": "ˈgɔrməndˌaɪz", "pos": "v.", "definition": "to eat greedily and voraciously", "chinese": "狼吞虎嚥；貪婪地大吃", "example": "The children gormandized the holiday feast, leaving the table full of empty plates.", "example_zh": "孩子們狼吞虎嚥地吃完了節日大餐，桌上留下了一堆空盤子。"}, {"session": "Session 33: Origins: Life, Living, Food (vivo / vita root family)", "word": "glutton", "ipa": "ˈglʌtən", "pos": "n.", "definition": "a person who eats excessively; one with an insatiable appetite", "chinese": "貪食者；饕餮；貪得無厭的人", "example": "He was such a glutton that he always ordered two desserts and still went back for more.", "example_zh": "他是個如此貪食的人，總是點兩份甜點，然後還要再去拿更多。"}, {"session": "Session 33: Origins:
