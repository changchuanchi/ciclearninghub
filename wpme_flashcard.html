s across hundreds of miles.", "example_zh": "這位動物學家追蹤了非洲象橫跨數百英里的遷徙路線。"}, {"session": "Session 11: Scientists and Their Fields", "word": "entomologist", "ipa": "ˌɛntəˈmɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies insects", "chinese": "昆蟲學家", "example": "The entomologist collected dozens of beetle specimens from the forest floor to classify them.", "example_zh": "這位昆蟲學家從森林地面收集了數十個甲蟲標本，以便對其分類。"}, {"session": "Session 11: Scientists and Their Fields", "word": "philologist", "ipa": "fɪˈlɑlədʒɪst", "pos": "n.", "definition": "a linguistic scientist who studies the history and structure of language", "chinese": "語文學家", "example": "The philologist traced the evolution of the word \"salary\" back to the Latin word for salt.", "example_zh": "這位語文學家將「salary」一詞的演變追溯到拉丁語中表示鹽的詞彙。"}, {"session": "Session 11: Scientists and Their Fields", "word": "semanticist", "ipa": "sɪˈmæntɪsɪst", "pos": "n.", "definition": "a scientist who studies the psychological effects of words", "chinese": "語義學家", "example": "The semanticist analyzed how the word \"freedom\" triggers different emotional responses in different cultures.", "example_zh": "這位語義學家分析了「自由」這個詞在不同文化中如何引發不同的情緒反應。"}, {"session": "Session 11: Scientists and Their Fields", "word": "sociologist", "ipa": "ˌsosɪˈɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies the ways people live together in society", "chinese": "社會學家", "example": "The sociologist published a study on how social media has changed the way teenagers form friendships.", "example_zh": "這位社會學家發表了一項關於社群媒體如何改變青少年建立友誼方式的研究。"}], "Session 12: Sciences of the Universe and Life": [{"session": "Session 12: Sciences of the Universe and Life", "word": "anthropology", "ipa": "ˌænθrəˈpɑlədʒɪ", "pos": "n.", "definition": "the science of human development", "chinese": "人類學", "example": "Her studies in anthropology gave her a deep appreciation for the diversity of human cultures.", "example_zh": "她在人類學方面的學習讓她對人類文化的多樣性有了深刻的認識。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "anthropological", "ipa": "ˌænθrəpəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to anthropology", "chinese": "人類學的", "example": "The museum displayed an anthropological exhibit showing tools and artifacts from ancient civilizations.", "example_zh": "博物館展出了一個人類學展覽，展示了古代文明的工具和文物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronomy", "ipa": "əˈstrɑnəmɪ", "pos": "n.", "definition": "the science of heavenly bodies", "chinese": "天文學", "example": "Astronomy has revealed that the universe contains billions of galaxies, each with billions of stars.", "example_zh": "天文學已經揭示，宇宙中包含數十億個星系，每個星系又有數十億顆恆星。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronomical", "ipa": "ˌæstrəˈnɑmɪkl", "pos": "adj.", "definition": "pertaining to astronomy; enormously large", "chinese": "天文學的；龐大的", "example": "The cost of building a new space telescope has reached astronomical proportions, running into billions of dollars.", "example_zh": "建造新太空望遠鏡的費用已達到天文數字，高達數十億美元。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrology", "ipa": "əˈstrɑlədʒɪ", "pos": "n.", "definition": "the study of the influence of planets and stars on human events", "chinese": "占星術", "example": "She reads her horoscope every morning, putting great faith in astrology to guide her decisions.", "example_zh": "她每天早上閱讀自己的星座運勢，對占星術深信不疑，以此指導她的決定。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrological", "ipa": "ˌæstrəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to astrology", "chinese": "占星術的", "example": "The astrological chart she had prepared showed that Mercury was in retrograde that week.", "example_zh": "她所準備的占星圖顯示，那一週水星正在逆行。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrologer", "ipa": "əˈstrɑlədʒɚ", "pos": "n.", "definition": "one who practices astrology", "chinese": "占星師", "example": "The astrologer predicted that the couple would face challenges in communication during the coming year.", "example_zh": "這位占星師預測，這對夫婦在來年將面臨溝通上的挑戰。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronaut", "ipa": "ˈæstrəˌnɔt", "pos": "n.", "definition": "a person who travels in space among the stars", "chinese": "太空人；宇航員", "example": "The astronaut described the breathtaking view of Earth from the International Space Station.", "example_zh": "這位太空人描述了從國際太空站俯瞰地球的令人嘆為觀止的景象。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "cosmonaut", "ipa": "ˈkɑzməˌnɔt", "pos": "n.", "definition": "a Russian term for a space traveler", "chinese": "（俄羅斯）宇航員", "example": "The Russian cosmonaut broke the record for the longest continuous stay aboard a space station.", "example_zh": "這位俄羅斯宇航員打破了在太空站連續停留時間最長的紀錄。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "nautical", "ipa": "ˈnɔtɪkl", "pos": "adj.", "definition": "relating to sailors, ships, or navigation", "chinese": "航海的；船舶的", "example": "The old captain decorated his office with nautical charts, compasses, and model ships.", "example_zh": "那位老船長用航海圖、羅盤和船模裝飾了他的辦公室。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "aster", "ipa": "ˈæstɚ", "pos": "n.", "definition": "a star-shaped flower", "chinese": "紫菀（一種星形花朵）", "example": "The garden was filled with purple and white asters that bloomed brilliantly in the autumn sun.", "example_zh": "花園裡種滿了紫色和白色的紫菀，在秋日陽光下盛開得絢爛奪目。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "asterisk", "ipa": "ˈæstərɪsk", "pos": "n.", "definition": "a star-shaped symbol (*) used in printing", "chinese": "星號（*）", "example": "The teacher placed an asterisk next to the most important items on the exam study guide.", "example_zh": "老師在考試複習指引中最重要的項目旁邊加上了星號。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrophysics", "ipa": "ˌæstroˈfɪzɪks", "pos": "n.", "definition": "the branch of physics dealing with heavenly bodies", "chinese": "天體物理學", "example": "Astrophysics seeks to understand the physical properties of stars, galaxies, and black holes.", "example_zh": "天體物理學致力於理解恆星、星系和黑洞的物理性質。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "disaster", "ipa": "dɪˈzæstɚ", "pos": "n.", "definition": "a great misfortune or calamity", "chinese": "災難；大禍", "example": "The earthquake was a disaster that destroyed thousands of homes and left many people homeless.", "example_zh": "這場地震是一場災難，摧毀了數千戶家庭，使許多人無家可歸。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "disastrous", "ipa": "dɪˈzæstrəs", "pos": "adj.", "definition": "causing great harm or suffering", "chinese": "災難性的；造成重大損害的", "example": "The company's decision to ignore customer complaints had disastrous consequences for its reputation.", "example_zh": "該公司無視顧客投訴的決定對其聲譽造成了災難性的後果。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autonomy", "ipa": "ɔˈtɑnəmɪ", "pos": "n.", "definition": "self-government; independence", "chinese": "自治；自主", "example": "The remote region fought for years to gain autonomy from the central government.", "example_zh": "這個偏遠地區奮鬥多年，爭取從中央政府獲得自治權。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autonomous", "ipa": "ɔˈtɑnəməs", "pos": "adj.", "definition": "self-governing", "chinese": "自治的；自主的", "example": "The university department operates as an autonomous unit, setting its own curriculum and budget.", "example_zh": "這個大學系所作為一個自治單位運作，自行制定課程和預算。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "metronome", "ipa": "ˈmɛtrəˌnom", "pos": "n.", "definition": "a device that measures musical time", "chinese": "節拍器", "example": "The piano teacher set the metronome to a slow tempo so the beginner could practice at a steady pace.", "example_zh": "鋼琴老師將節拍器設定為慢速，讓初學者能以穩定的節奏練習。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geology", "ipa": "dʒɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of the physical composition of the earth", "chinese": "地質學", "example": "Geology explains why earthquakes occur more frequently along tectonic plate boundaries.", "example_zh": "地質學解釋了為何地震更頻繁地發生在構造板塊的邊界附近。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geological", "ipa": "ˌdʒɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to geology", "chinese": "地質學的；地質上的", "example": "The geological survey revealed that the land beneath the city was unstable and prone to subsidence.", "example_zh": "地質調查顯示，這座城市地下的土地不穩定，容易發生地層下陷。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometry", "ipa": "dʒɪˈɑmɪtrɪ", "pos": "n.", "definition": "the branch of mathematics dealing with measurement of figures", "chinese": "幾何學", "example": "In geometry class, students learned how to calculate the area and perimeter of various shapes.", "example_zh": "在幾何課上，學生們學習了如何計算各種圖形的面積和周長。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometric", "ipa": "ˌdʒɪəˈmɛtrɪk", "pos": "adj.", "definition": "pertaining to geometry", "chinese": "幾何的；幾何學的", "example": "The architect used clean geometric shapes — squares, triangles, and circles — in the building's design.", "example_zh": "建築師在建築設計中採用了簡潔的幾何形狀——正方形、三角形和圓形。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometrician", "ipa": "dʒɪˌɑmɪˈtrɪʃən", "pos": "n.", "definition": "a mathematician who specializes in geometry", "chinese": "幾何學家", "example": "As a skilled geometrician, she was able to solve complex problems involving three-dimensional shapes.", "example_zh": "作為一位技術精湛的幾何學家，她能夠解決涉及三維圖形的複雜問題。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geography", "ipa": "dʒɪˈɑɡrəfɪ", "pos": "n.", "definition": "the science of mapping the earth", "chinese": "地理學", "example": "A good understanding of geography helps explain why certain countries have greater agricultural potential than others.", "example_zh": "對地理學的充分理解有助於解釋為何某些國家比其他國家具有更大的農業潛力。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geographer", "ipa": "dʒɪˈɑɡrəfɚ", "pos": "n.", "definition": "a practitioner of geography", "chinese": "地理學家", "example": "The geographer created detailed maps of the Amazon basin, charting rivers and terrain few had explored.", "example_zh": "這位地理學家製作了亞馬遜盆地的詳細地圖，標繪出少有人探索的河流和地形。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geographic", "ipa": "ˌdʒɪəˈɡræfɪk", "pos": "adj.", "definition": "pertaining to geography", "chinese": "地理的；地理學的", "example": "The geographic isolation of the island allowed its wildlife to evolve in ways not seen anywhere else.", "example_zh": "這座島嶼的地理隔絕使其野生動植物以其他地方所見不到的方式演化。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biology", "ipa": "baɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of all living matter", "chinese": "生物學", "example": "Biology class covered topics ranging from the structure of cells to the ecosystems of tropical rainforests.", "example_zh": "生物學課涵蓋了從細胞結構到熱帶雨林生態系統等各種主題。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biological", "ipa": "ˌbaɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to biology", "chinese": "生物學的；生物的", "example": "Scientists are concerned about the biological impact of microplastics on marine organisms.", "example_zh": "科學家們擔憂微塑膠對海洋生物的生物學影響。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biography", "ipa": "baɪˈɑɡrəfɪ", "pos": "n.", "definition": "a written account of someone's life", "chinese": "傳記", "example": "She read an engaging biography of Marie Curie and was inspired by the scientist's determination.", "example_zh": "她讀了一本引人入勝的瑪麗·居禮傳記，並被這位科學家的堅定意志所激勵。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autobiography", "ipa": "ˌɔtəbaɪˈɑɡrəfɪ", "pos": "n.", "definition": "the story of one's own life written by oneself", "chinese": "自傳", "example": "The retired general wrote a candid autobiography recounting his experiences both on and off the battlefield.", "example_zh": "這位退休將軍寫了一部坦率的自傳，講述了他在戰場上和戰場下的經歷。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autobiographical", "ipa": "ˌɔtəˌbaɪəˈɡræfɪkl", "pos": "adj.", "definition": "pertaining to autobiography", "chinese": "自傳體的；自傳性的", "example": "The novel was largely autobiographical, drawing on events from the author's own troubled childhood.", "example_zh": "這部小說大部分具有自傳性質，取材於作者自身坎坷童年的經歷。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biopsy", "ipa": "ˈbaɪɑpsɪ", "pos": "n.", "definition": "a medical examination of living tissue, often to detect cancer", "chinese": "活體切片檢查；切片檢查", "example": "The doctor performed a biopsy on the suspicious mole to determine whether it was malignant.", "example_zh": "醫生對那顆可疑的痣進行了切片檢查，以確定它是否為惡性。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autopsy", "ipa": "ˈɔtɑpsɪ", "pos": "n.", "definition": "a medical examination of a corpse to determine the cause of death", "chinese": "屍體解剖；驗屍", "example": "The autopsy revealed that the victim had died from a previously undetected heart condition, not foul play.", "example_zh": "驗屍結果顯示，受害者死於之前未被發現的心臟病，而非謀殺。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "botany", "ipa": "ˈbɑtənɪ", "pos": "n.", "definition": "the science of plant life", "chinese": "植物學", "example": "Her knowledge of botany allowed her to identify every plant growing in the garden by its scientific name.", "example_zh": "她的植物學知識讓她能夠以學名辨識花園中生長的每一種植物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "botanical", "ipa": "bəˈtænɪkl", "pos": "adj.", "definition": "pertaining to botany", "chinese": "植物學的；植物的", "example": "The botanical garden housed over two thousand species of plants from five different continents.", "example_zh": "這座植物園收藏了來自五大洲的兩千多種植物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zoology", "ipa": "zoˈɑlədʒɪ", "pos": "n.", "definition": "the science of animal life", "chinese": "動物學", "example": "His passion for zoology led him to pursue a career studying the social behavior of primates.", "example_zh": "他對動物學的熱情促使他走上了研究靈長類動物社會行為的職業道路。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zoological", "ipa": "ˌzoəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to zoology", "chinese": "動物學的；動物園的", "example": "The zoological park was redesigned to give animals more natural habitats and reduce stress.", "example_zh": "這座動物園被重新設計，以提供動物更自然的棲息環境並減少壓力。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zodiac", "ipa": "ˈzodɪˌæk", "pos": "n.", "definition": "a diagram used in astrology showing the paths of sun, moon, and planets", "chinese": "黃道帶；十二宮圖", "example": "The ancient zodiac divides the sky into twelve sections, each associated with a constellation and a personality type.", "example_zh": "古老的黃道帶將天空分成十二個部分，每個部分與一個星座和一種性格類型相關聯。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zodiacal", "ipa": "zoˈdaɪəkl", "pos": "adj.", "definition": "pertaining to the zodiac", "chinese": "黃道帶的；黃道的", "example": "The zodiacal light, a faint glow along the ecliptic, can be seen on very clear nights far from city lights.", "example_zh": "黃道光是一種沿黃道的微弱光芒，在遠離城市燈光的晴朗夜晚可以看見。"}], "Session 13: More Sciences (Cutting and Related Words)": [{"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "entomology", "ipa": "ˌɛntəˈmɑlədʒɪ", "pos": "n.", "definition": "the branch of zoology dealing with insects", "chinese": "昆蟲學", "example": "Entomology has become increasingly important as scientists study how insect populations affect agriculture.", "example_zh": "隨著科學家研究昆蟲族群對農業的影響，昆蟲學變得越來越重要。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "entomological", "ipa": "ˌɛntəməˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to entomology", "chinese": "昆蟲學的", "example": "The entomological collection at the natural history museum contained thousands of pinned specimens from around the world.", "example_zh": "自然歷史博物館的昆蟲學收藏品包含了來自世界各地的數千個針插標本。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "eccentric", "ipa": "ɪkˈsɛntrɪk", "pos": "adj.", "definition": "deviating from the normal; unconventional; odd", "chinese": "古怪的；偏離常規的；不尋常的", "example": "The eccentric professor wore mismatched socks every day and kept a pet turtle on his desk.", "example_zh": "這位古怪的教授每天穿著不成對的襪子，並在桌上養了一隻寵物烏龜。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "eccentricity", "ipa": "ˌɛksɛnˈtrɪsɪtɪ", "pos": "n.", "definition": "the quality of being unconventional or odd", "chinese": "古怪；偏離常規的特質", "example": "Her eccentricity made her stand out at the office — she insisted on having all meetings while standing up.", "example_zh": "她的古怪使她在辦公室裡顯得格外突出——她堅持所有會議都要站著開。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "atom", "ipa": "ˈætəm", "pos": "n.", "definition": "the smallest particle of an element", "chinese": "原子", "example": "A single atom is so incredibly small that billions of them could fit on the head of a pin.", "example_zh": "單個原子小得難以置信，數十億個原子可以排列在一根大頭針的針頭上。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "atomic", "ipa": "əˈtɑmɪk", "pos": "adj.", "definition": "pertaining to atoms", "chinese": "原子的；原子能的", "example": "The development of atomic weapons forever changed the balance of military power in the world.", "example_zh": "原子武器的研發永遠改變了世界軍事力量的平衡。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "anatomy", "ipa": "əˈnætəmɪ", "pos": "n.", "definition": "the structure of a body; the cutting up of a body to study its structure", "chinese": "解剖學；（身體的）構造", "example": "Medical students spend many hours studying anatomy before they are allowed to perform surgery.", "example_zh": "醫學生在被允許進行手術之前，需要花費許多時間學習解剖學。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "anatomical", "ipa": "ˌænəˈtɑmɪkl", "pos": "adj.", "definition": "pertaining to anatomy", "chinese": "解剖學的；解剖上的", "example": "The anatomical diagram clearly labeled each bone and muscle in the human arm.", "example_zh": "解剖學圖表清楚地標示了人體手臂中的每一根骨骼和肌肉。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "tome", "ipa": "tom", "pos": "n.", "definition": "a large, heavy book", "chinese": "大部頭書；厚重的書籍", "example": "He pulled a dusty tome from the shelf and began reading the centuries-old philosophical text.", "example_zh": "他從書架上取下一本積滿灰塵的大部頭書，開始閱讀這部有幾百年歷史的哲學文本。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomy", "ipa": "daɪˈkɑtəmɪ", "pos": "n.", "definition": "a splitting in two", "chinese": "二分法；一分為二", "example": "There is a clear dichotomy in the team between those who prefer careful planning and those who favor quick action.", "example_zh": "團隊中有明顯的二分對立，一方傾向於謹慎規劃，另一方偏好迅速行動。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomous", "ipa": "daɪˈkɑtəməs", "pos": "adj.", "definition": "divided into two parts", "chinese": "二分的；分成兩部分的", "example": "The survey used a dichotomous scale, asking respondents simply to answer \"yes\" or \"no\" to each question.", "example_zh": "這項調查採用了二元量表，要求受訪者對每個問題簡單地回答「是」或「否」。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomize", "ipa": "daɪˈkɑtəˌmaɪz", "pos": "v.", "definition": "to split into two", "chinese": "使二分；將……一分為二", "example": "It is too simplistic to dichotomize human behavior into purely \"good\" or \"bad\" categories.", "example_zh": "將人類行為簡單地二分為純粹的「好」或「壞」兩類，未免過於簡化。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "epitome", "ipa": "ɪˈpɪtəmɪ", "pos": "n.", "definition": "a condensation or representative summary of the whole", "chinese": "典範；縮影；精華", "example": "With her grace, skill, and dedication, she was considered the epitome of a professional dancer.", "example_zh": "憑藉她的優雅、技巧和敬業精神，她被認為是職業舞者的典範。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "epitomize", "ipa": "ɪˈpɪtəˌmaɪz", "pos": "v.", "definition": "to be representative of or to summarize", "chinese": "成為……的典範；概括；體現", "example": "His generous actions epitomize the spirit of community service that this award was created to honor.", "example_zh": "他慷慨的行動體現了這個獎項所要表彰的社區服務精神。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philology", "ipa": "fɪˈlɑlədʒɪ", "pos": "n.", "definition": "the science of language; linguistics", "chinese": "語文學；歷史語言學", "example": "Through philology, scholars have reconstructed how ancient languages were spoken thousands of years ago.", "example_zh": "透過語文學，學者們已重建了數千年前古代語言的發音方式。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philological", "ipa": "ˌfɪləˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to philology", "chinese": "語文學的；歷史語言學的", "example": "Her philological research traced the Sanskrit origins of dozens of common English words.", "example_zh": "她的語文學研究追溯了數十個常用英語單詞的梵文起源。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "linguistics", "ipa": "lɪŋˈɡwɪstɪks", "pos": "n.", "definition": "the scientific study of language", "chinese": "語言學", "example": "Linguistics examines how languages are structured, how they change over time, and how people acquire them.", "example_zh": "語言學研究語言的結構方式、語言如何隨時間演變，以及人們如何習得語言。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropy", "ipa": "fɪˈlænθrəpɪ", "pos": "n.", "definition": "love of mankind; charitable activities", "chinese": "慈善；博愛；慈善活動", "example": "The billionaire dedicated his later years to philanthropy, donating billions to education and healthcare.", "example_zh": "這位億萬富翁將晚年投入慈善事業，向教育和醫療保健捐出了數十億美元。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropist", "ipa": "fɪˈlænθrəpɪst", "pos": "n.", "definition": "one who devotes oneself to charitable activities", "chinese": "慈善家；博愛主義者", "example": "The philanthropist funded the construction of twenty new schools in underprivileged communities across the country.", "example_zh": "這位慈善家資助在全國弱勢社區建造了二十所新學校。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropic", "ipa": "ˌfɪlænˈθrɑpɪk", "pos": "adj.", "definition": "pertaining to charitable activities", "chinese": "慈善的；博愛的", "example": "The company launched a philanthropic initiative to provide clean drinking water to rural villages in developing countries.", "example_zh": "該公司發起了一項慈善計畫，為發展中國家的農村村莊提供潔淨飲用水。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philander", "ipa": "fɪˈlændɚ", "pos": "v.", "definition": "to engage in casual romantic or sexual affairs", "chinese": "搞風流；與人調情；拈花惹草", "example": "His habit of philandering destroyed his marriage and damaged his reputation in the community.", "example_zh": "他拈花惹草的習慣摧毀了他的婚姻，也損害了他在社區中的聲譽。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanderer", "ipa": "fɪˈlændərɚ", "pos": "n.", "definition": "one who philanders", "chinese": "拈花惹草的人；好色之徒", "example": "He had a reputation as a philanderer, and few people trusted him to be faithful in a relationship.", "example_zh": "他以拈花惹草聞名，很少有人相信他在感情上能夠忠誠。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philosophy", "ipa": "fɪˈlɑsəfɪ", "pos": "n.", "definition": "the love of wisdom", "chinese": "哲學；人生哲學", "example": "His philosophy of life was simple: treat others with kindness and never stop seeking knowledge.", "example_zh": "他的人生哲學很簡單：善待他人，永不停止追求知識。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philter", "ipa": "ˈfɪltɚ", "pos": "n.", "definition": "a love potion", "chinese": "愛情魔藥；媚藥", "example": "In the folk tale, the witch brewed a philter and promised it would make anyone who drank it fall deeply in love.", "example_zh": "在民間故事中，女巫熬製了一種愛情魔藥，並承諾喝下它的人將會深深墜入愛河。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "aphrodisiac", "ipa": "ˌæfrəˈdɪzɪˌæk", "pos": "n./adj.", "definition": "something that arouses sexual desire", "chinese": "春藥；催情劑；催情的", "example": "Oysters have long been reputed to be an aphrodisiac, though scientific evidence for this claim is limited.", "example_zh": "牡蠣長期以來被認為是催情食物，儘管支持這一說法的科學證據有限。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "aphrodisiacal", "ipa": "ˌæfrədɪˈzaɪəkl", "pos": "adj.", "definition": "relating to sexual arousal", "chinese": "有催情作用的；春藥性質的", "example": "The vendor claimed his herbal blend had aphrodisiacal properties, but no medical authority endorsed his product.", "example_zh": "這位攤販聲稱他的草藥配方具有催情效果，但沒有任何醫療機構認可他的產品。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "bibliophile", "ipa": "ˈbɪblɪəˌfaɪl", "pos": "n.", "definition": "a lover and collector of books", "chinese": "愛書人；藏書家", "example": "As a devoted bibliophile, she had filled every room in her house with shelves overflowing with books.", "example_zh": "作為一位虔誠的愛書人，她將家中每個房間都擺滿了書架，書架上的書多到溢出來。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "Anglophile", "ipa": "ˈæŋɡloˌfaɪl", "pos": "n.", "definition": "one who admires British people and customs", "chinese": "親英者；崇英者", "example": "A true Anglophile, he drank tea every afternoon, collected British stamps, and followed cricket religiously.", "example_zh": "身為真正的崇英者，他每天下午喝茶、收集英國郵票，並虔誠地關注板球比賽。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "semantics", "ipa": "sɪˈmæntɪks", "pos": "n.", "definition": "the study of the meanings and psychological effects of words", "chinese": "語義學；語意學", "example": "The debate over the policy quickly devolved into an argument about semantics rather than the actual issues.", "example_zh": "這場政策辯論很快演變為一場關於語義的爭論，而非真正實質問題的討論。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "semantic", "ipa": "sɪˈmæntɪk", "pos": "adj.", "definition": "pertaining to semantics", "chinese": "語義的；語意上的", "example": "The two negotiators had a semantic disagreement over what the word \"immediately\" meant in the contract.", "example_zh": "兩位談判代表對合約中「立即」一詞的含義產生了語義上的分歧。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "sociology", "ipa": "ˌsosɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of how people live together in groups", "chinese": "社會學", "example": "Sociology has shown that poverty, education level, and neighborhood environment strongly influence a person's life outcomes.", "example_zh": "社會學已顯示，貧困、教育程度和社區環境對一個人的人生結果有強烈影響。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "sociological", "ipa": "ˌsosɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to sociology", "chinese": "社會學的", "example": "The sociological study examined how immigration patterns affected the cultural makeup of urban neighborhoods.", "example_zh": "這項社會學研究探討了移民模式如何影響城市社區的文化構成。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "asocial", "ipa": "eˈsoʃl", "pos": "adj.", "definition": "withdrawn and self-centered; indifferent to others", "chinese": "孤僻的；不合群的；漠視社交的", "example": "He was not unfriendly, but his asocial tendencies meant he preferred solitude over parties and gatherings.", "example_zh": "他並非不友善，但他不合群的傾向意味著他更喜歡獨處，而非參加派對和聚會。"}], "Session 14: Types of Liars": [{"session": "Session 14: Types of Liars", "word": "notorious", "ipa": "noˈtorɪəs", "pos": "adj.", "definition": "widely and unfavorably known for some bad quality", "chinese": "聲名狼藉的；惡名昭彰的", "example": "The notorious swindler had conned dozens of investors before he was finally arrested and brought to trial.", "example_zh": "這個聲名狼藉的騙子在最終被逮捕並受審之前，已欺騙了數十名投資者。"}, {"session": "Session 14: Types of Liars", "word": "consummate", "ipa": "ˈkɑnsəmɪt", "pos": "adj.", "definition": "perfect; highly skilled; at the highest point of artistry", "chinese": "完美的；技藝精湛的；爐火純青的", "example": "She was a consummate performer who captivated audiences with her flawless technique and emotional depth.", "example_zh": "她是一位技藝精湛的表演者，以無懈可擊的技巧和情感深度使觀眾著迷。"}, {"session": "Session 14: Types of Liars", "word": "incorrigible", "ipa": "ɪnˈkɔrɪdʒɪbl", "pos": "adj.", "definition": "beyond reform or correction", "chinese": "無可救藥的；屢教不改的", "example": "The judge declared him an incorrigible offender who had repeatedly broken his parole conditions.", "example_zh": "法官宣告他是一名屢教不改的罪犯，曾多次違反假釋條件。"}, {"session": "Session 14: Types of Liars", "word": "inveterate", "ipa": "ɪnˈvɛtərɪt", "pos": "adj.", "definition": "long-habituated to a habit; deeply accustomed", "chinese": "根深蒂固的；積習難改的；老資格的", "example": "An inveterate traveler, she had visited over ninety countries and showed no signs of slowing down.", "example_zh": "作為一個積習難改的旅行者，她已走訪了九十多個國家，而且沒有任何放慢腳步的跡象。"}, {"session": "Session 14: Types of Liars", "word": "congenital", "ipa": "kənˈdʒɛnɪtl", "pos": "adj.", "definition": "occurring at or during birth", "chinese": "先天的；天生的；與生俱來的", "example": "The baby was born with a congenital heart defect that required surgery within the first month of life.", "example_zh": "這名嬰兒出生時患有先天性心臟缺陷，需要在出生後第一個月內進行手術。"}, {"session": "Session 14: Types of Liars", "word": "chronic", "ipa": "ˈkrɑnɪk", "pos": "adj.", "definition": "occurring repeatedly over a long period of time", "chinese": "慢性的；長期的；積習難改的", "example": "Her chronic back pain had persisted for years despite numerous treatments and therapies.", "example_zh": "儘管接受了大量治療和療法，她的慢性背痛已持續多年。"}, {"session": "Session 14: Types of Liars", "word": "pathological", "ipa": "ˌpæθəˈlɑdʒɪkl", "pos": "adj.", "definition": "diseased; caused by or involving disease", "chinese": "病態的；病理的；由疾病引起的", "example": "His pathological fear of failure prevented him from attempting anything that carried even a small risk of defeat.", "example_zh": "他對失敗的病態恐懼使他無法嘗試任何帶有哪怕一點點失敗風險的事情。"}, {"session": "Session 14: Types of Liars", "word": "unconscionable", "ipa": "ʌnˈkɑnʃənəbl", "pos": "adj.", "definition": "without pangs of conscience; unscrupulous", "chinese": "無良心的；昧著良心的；不道德的", "example": "It was unconscionable for the pharmaceutical company to raise the price of a life-saving drug by five thousand percent.", "example_zh": "這家製藥公司將救命藥物的價格提高了五千倍，實屬昧著良心之舉。"}, {"session": "Session 14: Types of Liars", "word": "glib", "ipa": "ɡlɪb", "pos": "adj.", "definition": "smooth and suspiciously fluent in speech", "chinese": "油嘴滑舌的；巧言令色的；能言善辯的", "example": "The politician gave a glib answer that sounded convincing but failed to address the core of the question.", "example_zh": "這位政客給出了一個聽起來很有說服力的油嘴滑舌的回答，但卻未能觸及問題的核心。"}, {"session": "Session 14: Types of Liars", "word": "egregious", "ipa": "ɪˈɡridʒəs", "pos": "adj.", "definition": "outstandingly bad or vicious", "chinese": "極其惡劣的；駭人聽聞的；罪大惡極的", "example": "The referee made an egregious error that cost the home team the championship game.", "example_zh": "裁判犯下了一個極其嚴重的錯誤，使主隊痛失冠軍賽的勝利。"}], "Session 15: Word Origins (notorious, consummate, etc.)": [{"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "notoriety", "ipa": "ˌnotəˈraɪɪtɪ", "pos": "n.", "definition": "the state of being widely and unfavorably known", "chinese": "惡名；臭名昭著", "example": "The hacker achieved notoriety after breaching the security systems of three major banks in one week.", "example_zh": "這名駭客在一週內入侵了三家大型銀行的安全系統後，獲得了惡名。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "consummation", "ipa": "ˌkɑnsəˈmeʃən", "pos": "n.", "definition": "the act of completing or finishing something", "chinese": "完成；圓滿結束；（婚姻的）圓房", "example": "The signing of the peace treaty was the consummation of years of delicate and often frustrating negotiations.", "example_zh": "和平條約的簽署是多年艱難而常令人沮喪的談判的圓滿完成。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "consummacy", "ipa": "ˈkɑnsəməsɪ", "pos": "n.", "definition": "the state of being at the highest level of skill", "chinese": "精湛的技藝；爐火純青的境界", "example": "His consummacy as a violin soloist was evident to every audience member from the first few notes he played.", "example_zh": "從他演奏的最初幾個音符起，每位聽眾都能感受到他作為小提琴獨奏家精湛的技藝。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "incorrigibility", "ipa": "ɪnˌkɔrɪdʒɪˈbɪlɪtɪ", "pos": "n.", "definition": "the state of being beyond correction or reform", "chinese": "無可救藥的狀態；積習難改", "example": "The parole board cited the prisoner's incorrigibility as the main reason for denying his early release.", "example_zh": "假釋委員會將囚犯積習難改作為拒絕其提前釋放的主要理由。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "inveteracy", "ipa": "ɪnˈvɛtərəsɪ", "pos": "n.", "definition": "the quality of being long-habituated", "chinese": "根深蒂固；積習已久的狀態", "example": "The inveteracy of his gambling habit was so severe that even after losing his savings, he could not stop.", "example_zh": "他賭博習慣的根深蒂固是如此嚴重，即使在失去積蓄後，他仍無法停止。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "veteran", "ipa": "ˈvɛtərən", "pos": "n./adj.", "definition": "a person long experienced in a profession or activity", "chinese": "老手；資深人士；退伍軍人；經驗豐富的", "example": "As a veteran journalist, she had covered wars, elections, and natural disasters on six continents.", "example_zh": "作為一名資深記者，她曾在六大洲報導過戰爭、選舉和自然災害。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genetics", "ipa": "dʒɪˈnɛtɪks", "pos": "n.", "definition": "the science of hereditary transmission", "chinese": "遺傳學", "example": "Advances in genetics have made it possible to identify a person's risk for certain inherited diseases.", "example_zh": "遺傳學的進步使得識別一個人罹患某些遺傳性疾病的風險成為可能。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "geneticist", "ipa": "dʒɪˈnɛtɪsɪst", "pos": "n.", "definition": "a scientist who specializes in genetics", "chinese": "遺傳學家", "example": "The geneticist discovered a mutation in a specific gene that significantly increases the risk of early-onset Alzheimer's disease.", "example_zh": "這位遺傳學家發現了某個特定基因的突變，該突變大幅增加了早發性阿茲海默症的風險。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genetic", "ipa": "dʒɪˈnɛtɪk", "pos": "adj.", "definition": "pertaining to genetics or heredity", "chinese": "遺傳的；遺傳學的", "example": "Researchers found a genetic link between the father's traits and those exhibited by his children.", "example_zh": "研究人員發現了父親的特徵與其子女所表現出的特徵之間的遺傳聯繫。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "gene", "ipa": "dʒin", "pos": "n.", "definition": "a particle in a chromosome that transmits hereditary characteristics", "chinese": "基因", "example": "Scientists have identified the gene responsible for producing insulin and its role in managing blood sugar.", "example_zh": "科學家已確定了負責產生胰島素的基因及其在調節血糖中的作用。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogy", "ipa": "ˌdʒinɪˈælədʒɪ", "pos": "n.", "definition": "the study of family trees and ancestral origins", "chinese": "家譜學；族譜；世系", "example": "She used online genealogy records to trace her family history back eight generations to colonial times.", "example_zh": "她利用線上家譜記錄，將她的家族歷史追溯了八代，一直到殖民時代。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogist", "ipa": "ˌdʒinɪˈælədʒɪst", "pos": "n.", "definition": "a student or expert in family ancestry", "chinese": "家譜學家；族譜專家", "example": "The genealogist spent weeks in the church archives searching for birth and marriage records from the 1800s.", "example_zh": "這位家譜學家在教堂檔案館待了數週，尋找1800年代的出生和婚姻記錄。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogical", "ipa": "ˌdʒinɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to genealogy", "chinese": "家譜的；族譜的；世系的", "example": "The genealogical chart displayed on the wall traced the royal family's lineage back over five hundred years.", "example_zh": "牆上展示的家譜圖表將這個皇室的世系追溯了五百多年。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genital", "ipa": "ˈdʒɛnɪtl", "pos": "adj.", "definition": "pertaining to the reproductive or sexual organs", "chinese": "生殖的；性器官的", "example": "The medical textbook included detailed diagrams of both the male and female genital anatomy.", "example_zh": "這本醫學教科書包含了男性和女性生殖解剖的詳細圖解。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genesis", "ipa": "ˈdʒɛnɪsɪs", "pos": "n.", "definition": "the beginning, birth, or origin of something", "chinese": "起源；開端；創始", "example": "The genesis of the company can be traced to a casual conversation between two college roommates in a dormitory.", "example_zh": "這家公司的起源可以追溯到兩位大學室友在宿舍裡的一次隨意交談。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "hereditary", "ipa": "həˈrɛdɪˌtɛrɪ", "pos": "adj.", "definition": "referring to characteristics passed from parents to offspring", "chinese": "遺傳的；世襲的", "example": "The doctor explained that high blood pressure in his family was likely hereditary rather than caused by lifestyle alone.", "example_zh": "醫生解釋說，他家族中的高血壓很可能是遺傳性的，而不僅僅是由生活方式引起的。"}], "Session 16: Time and Feeling Words": [{"session": "Session 16: Time and Feeling Words", "word": "chronicity", "ipa": "krɑˈnɪsɪtɪ", "pos": "n.", "definition": "the condition of continual or repeated recurrence", "chinese": "慢性性質；長期反覆發作的狀態", "example": "The chronicity of her migraines meant she had to carefully manage her stress and sleep schedule.", "example_zh": "她偏頭痛的慢性反覆發作意味著她必須仔細管理自己的壓力和睡眠時間。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronism", "ipa": "əˈnækrəˌnɪzəm", "pos": "n.", "definition": "something or someone out of time or belonging to a different era", "chinese": "時代錯誤；不合時宜的事物", "example": "A knight in full armor walking through a modern city would be a striking anachronism.", "example_zh": "一個身穿全套盔甲走過現代城市的騎士將是一個引人注目的時代錯誤。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronous", "ipa": "əˈnækrənəs", "pos": "adj.", "definition": "out of time; belonging to a different era", "chinese": "不合時代的；時代錯置的", "example": "His anachronous views on gender roles made him seem completely out of step with the modern workplace.", "example_zh": "他對性別角色的不合時代觀念使他看起來與現代職場完全格格不入。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronistic", "ipa": "əˌnækrəˈnɪstɪk", "pos": "adj.", "definition": "pertaining to an anachronism", "chinese": "時代錯誤的；不合時宜的", "example": "Using a fax machine as your primary form of communication feels anachronistic in today's world of instant messaging.", "example_zh": "在當今即時通訊的世界裡，以傳真機作為主要通訊方式感覺是不合時宜的。"}, {"session": "Session 16: Time and Feeling Words", "word": "incongruous", "ipa": "ɪnˈkɑŋɡruəs", "pos": "adj.", "definition": "out of place; not fitting the context", "chinese": "不協調的；格格不入的；不相稱的", "example": "The shiny modern skyscraper looked incongruous standing next to the centuries-old stone cathedral.", "example_zh": "那棟閃亮的現代摩天大樓矗立在有幾百年歷史的石砌大教堂旁邊，顯得格格不入。"}, {"session": "Session 16: Time and Feeling Words", "word": "incongruity", "ipa": "ˌɪnkɑŋˈɡruɪtɪ", "pos": "n.", "definition": "the state of being out of place or inconsistent", "chinese": "不協調；不相稱；格格不入", "example": "There was an obvious incongruity between his polished speech and the rude way he treated the waitstaff.", "example_zh": "他精緻的談吐與他對待服務員的粗魯方式之間存在明顯的不協調。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronological", "ipa": "ˌkrɑnəˈlɑdʒɪkl", "pos": "adj.", "definition": "arranged in the order of time", "chinese": "按時間順序排列的；年代順序的", "example": "The biography presented events in strict chronological order, beginning with the subject's birth and ending with her death.", "example_zh": "這本傳記按嚴格的時間順序呈現事件，從傳主的出生開始，到她的去世結束。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronology", "ipa": "krəˈnɑlədʒɪ", "pos": "n.", "definition": "the science of time order and accurate dating of events", "chinese": "年代學；年表；時間順序", "example": "Historians depend on accurate chronology to understand the sequence of cause and effect in past events.", "example_zh": "歷史學家依賴準確的年代學來理解過去事件中因果關係的順序。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronologist", "ipa": "krəˈnɑlədʒɪst", "pos": "n.", "definition": "an expert in chronology", "chinese": "年代學家；年代考證專家", "example": "The chronologist used tree rings and carbon dating to establish when the ancient settlement was first occupied.", "example_zh": "這位年代學家利用樹木年輪和碳定年法來確定這個古代定居點最初被佔用的時間。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometer", "ipa": "krəˈnɑmɪtɚ", "pos": "n.", "definition": "a highly accurate timepiece", "chinese": "精密計時器；天文鐘", "example": "Before GPS, sailors relied on a chronometer to determine their exact longitude while at sea.", "example_zh": "在GPS出現之前，水手們依靠精密計時器來確定他們在海上的確切經度。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometry", "ipa": "krəˈnɑmɪtrɪ", "pos": "n.", "definition": "the measurement of time", "chinese": "計時學；時間測量", "example": "Modern chronometry can measure time intervals accurate to within a fraction of a nanosecond.", "example_zh": "現代計時學可以測量精確到奈秒的幾分之一的時間間隔。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometric", "ipa": "ˌkrɑnəˈmɛtrɪk", "pos": "adj.", "definition": "pertaining to time measurement", "chinese": "計時的；時間測量的", "example": "The atomic clock provides chronometric precision essential for GPS satellites to function correctly.", "example_zh": "原子鐘提供了計時精度，這對於GPS衛星的正常運作至關重要。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronize", "ipa": "ˈsɪŋkrəˌnaɪz", "pos": "v.", "definition": "to cause to occur at the same time or rate", "chinese": "使同步；使同時發生", "example": "The director instructed the two actors to synchronize their movements so they would reach the door at exactly the same moment.", "example_zh": "導演指示兩名演員同步他們的動作，這樣他們就能在完全相同的時刻到達門口。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronization", "ipa": "ˌsɪŋkrənɪˈzeʃən", "pos": "n.", "definition": "the act of synchronizing", "chinese": "同步化；同步", "example": "The synchronization of the orchestra's instruments required weeks of rehearsal before the concert.", "example_zh": "樂團樂器的同步化需要在音樂會前進行數週的排練。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronous", "ipa": "ˈsɪŋkrənəs", "pos": "adj.", "definition": "occurring at the same time or rate", "chinese": "同步的；同時發生的", "example": "The two satellites are in synchronous orbit, moving at the same speed as the Earth's rotation below them.", "example_zh": "這兩顆衛星在同步軌道上運行，移動速度與其下方地球的自轉速度相同。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathology", "ipa": "pəˈθɑlədʒɪ", "pos": "n.", "definition": "the science or study of disease", "chinese": "病理學；病理", "example": "The field of pathology is essential for understanding how diseases develop and how they affect the body.", "example_zh": "病理學領域對於理解疾病如何發展以及如何影響人體至關重要。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathologist", "ipa": "pəˈθɑlədʒɪst", "pos": "n.", "definition": "an expert who examines tissue to diagnose disease", "chinese": "病理學家；病理科醫師", "example": "The pathologist examined the biopsy under a microscope and confirmed that the cells were malignant.", "example_zh": "病理學家在顯微鏡下檢查了活體切片，並確認這些細胞是惡性的。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathy", "ipa": "ˈsɪmpəθɪ", "pos": "n.", "definition": "sharing of another's feelings", "chinese": "同情；憐憫；體諒", "example": "She expressed her deepest sympathy to the bereaved family after hearing about the tragic accident.", "example_zh": "聽說了這場悲慘的意外後，她向喪親的家庭表達了她最深切的同情。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathetic", "ipa": "ˌsɪmpəˈθɛtɪk", "pos": "adj.", "definition": "showing understanding of another's feelings", "chinese": "同情的；體諒的；有同情心的", "example": "The sympathetic teacher stayed after class to listen to the student's personal struggles and offer guidance.", "example_zh": "這位富有同情心的老師在課後留下來傾聽學生的個人困境並提供指導。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathize", "ipa": "ˈsɪmpəˌθaɪz", "pos": "v.", "definition": "to feel sympathy for", "chinese": "同情；表示同情；體諒", "example": "It is difficult to sympathize with someone who shows no remorse for the harm they have caused others.", "example_zh": "很難對一個對自己造成的傷害毫無悔意的人表示同情。"}, {"session": "Session 16: Time and Feeling Words", "word": "antipathy", "ipa": "ænˈtɪpəθɪ", "pos": "n.", "definition": "strong dislike or hostility", "chinese": "強烈反感；厭惡；敵意", "example": "She felt an immediate antipathy toward the new supervisor, who seemed dismissive and arrogant from the first meeting.", "example_zh": "她對新主管立刻產生了強烈的反感，此人從第一次會面起就顯得輕蔑而傲慢。"}, {"session": "Session 16: Time and Feeling Words", "word": "antipathetic", "ipa": "ˌæntɪpəˈθɛtɪk", "pos": "adj.", "definition": "pertaining to strong dislike or hostility", "chinese": "反感的；充滿敵意的；令人厭惡的", "example": "His antipathetic attitude toward change made it very difficult to implement new procedures in the department.", "example_zh": "他對改變的反感態度使得在部門內推行新程序變得非常困難。"}, {"session": "Session 16: Time and Feeling Words", "word": "apathy", "ipa": "ˈæpəθɪ", "pos": "n.", "definition": "lack of feeling; indifference", "chinese": "冷漠；漠不關心；無感", "example": "Voter apathy is a serious problem in many democracies, where large portions of the population do not bother to vote.", "example_zh": "選民冷漠是許多民主國家面臨的嚴重問題，大部分人口根本不去投票。"}, {"session": "Session 16: Time and Feeling Words", "word": "apathetic", "ipa": "ˌæpəˈθɛtɪk", "pos": "adj.", "definition": "showing indifference or lack of response", "chinese": "冷漠的；漠不關心的；無動於衷的", "example": "The students seemed apathetic about the class project, putting in minimal effort and showing little enthusiasm.", "example_zh": "學生們對班級專題似乎漠不關心，只付出了最少的努力，幾乎沒有表現出任何熱情。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathy", "ipa": "ˈɛmpəθɪ", "pos": "n.", "definition": "identification with and experience of another's feelings", "chinese": "同理心；感同身受", "example": "A good counselor needs empathy — the ability to truly understand and share the feelings of the people they are helping.", "example_zh": "一位好的輔導員需要同理心——真正理解並分享他們所幫助對象感受的能力。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathize", "ipa": "ˈɛmpəˌθaɪz", "pos": "v.", "definition": "to feel empathy", "chinese": "感同身受；產生共鳴；體會他人感受", "example": "Having experienced homelessness herself, she could empathize deeply with the struggles of people living on the streets.", "example_zh": "由於她自己曾經歷過無家可歸，她能深深地感受到街頭遊民的艱辛。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathetic", "ipa": "ˌɛmpəˈθɛtɪk", "pos": "adj.", "definition": "showing empathy", "chinese": "有同理心的；感同身受的", "example": "An empathetic response is more helpful than simply telling someone to \"look on the bright side.\"", "example_zh": "一個有同理心的回應比單純告訴別人「要往好的方向看」更有幫助。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathic", "ipa": "ɛmˈpæθɪk", "pos": "adj.", "definition": "alternate form of empathetic", "chinese": "有同理心的（empathetic的另一種形式）", "example": "Her empathic nature made her the person everyone turned to when they needed to talk through a problem.", "example_zh": "她富有同理心的天性使她成為每個人在需要傾訴問題時都會找的人。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathetic", "ipa": "pəˈθɛtɪk", "pos": "adj.", "definition": "arousing sorrow or pity; evoking sympathy", "chinese": "可悲的；令人憐憫的；悲哀的", "example": "The lost puppy wandering in the rain was such a pathetic sight that passersby immediately stopped to help.", "example_zh": "那隻在雨中流浪的迷途小狗看起來如此可憐，路人立刻停下來伸出援手。"}, {"session": "Session 16: Time and Feeling Words", "word": "telepathy", "ipa": "tɪˈlɛpəθɪ", "pos": "n.", "definition": "extrasensory communication; thought transference", "chinese": "心靈感應；傳心術", "example": "Some identical twins claim to experience a form of telepathy, sensing each other's emotions across great distances.", "example_zh": "一些同卵雙胞胎聲稱體驗過一種心靈感應，即使相隔遙遠也能感知彼此的情緒。"}, {"session": "Session 16: Time and Feeling Words", "word": "telepathic", "ipa": "ˌtɛlɪˈpæθɪk", "pos": "adj.", "definition": "relating to thought transference or ESP", "chinese": "心靈感應的；超感知覺的", "example": "The character in the novel had telepathic abilities that allowed her to read the thoughts of those around her.", "example_zh": "小說中的這個角色擁有心靈感應的能力，可以讀取周圍人的想法。"}], "Session 17: Conscience and Groups": [{"session": "Session 17: Conscience and Groups", "word": "unconscionability", "ipa": "ʌnˌkɑnʃənəˈbɪlɪtɪ", "pos": "n.", "definition": "the state of having no conscience", "chinese": "無良心；昧著良心的狀態", "example": "The judge cited the unconscionability of the contract, which took advantage of an elderly customer who couldn't read.", "example_zh": "法官引用了合約的無良心性，該合約利用了一位不識字的年長顧客。"}, {"session": "Session 17: Conscience and Groups", "word": "omniscient", "ipa": "ɑmˈnɪʃənt", "pos": "adj.", "definition": "all-knowing; possessing infinite knowledge", "chinese": "全知的；無所不知的", "example": "In many religions, God is described as omniscient, aware of every thought, action, and event across all time.", "example_zh": "在許多宗教中，上帝被描述為全知的，了解所有時間中的每一個想法、行動和事件。"}, {"session": "Session 17: Conscience and Groups", "word": "omniscience", "ipa": "ɑmˈnɪʃəns", "pos": "n.", "definition": "the state of being all-knowing", "chinese": "全知；無所不知", "example": "The idea of divine omniscience raises philosophical questions about free will and predestination.", "example_zh": "神聖全知的概念引發了關於自由意志與命定論的哲學問題。"}, {"session": "Session 17: Conscience and Groups", "word": "prescient", "ipa": "ˈprɛʃənt", "pos": "adj.", "definition": "knowing about events before they occur", "chinese": "有先見之明的；預知未來的", "example": "The analyst's prescient warning about the housing market bubble went unheeded until the crash occurred.", "example_zh": "這位分析師對房地產市場泡沫的先見之明警告在崩盤發生前一直未被理會。"}, {"session": "Session 17: Conscience and Groups", "word": "prescience", "ipa": "ˈprɛʃəns", "pos": "n.", "definition": "foreknowledge; ability to predict events", "chinese": "先見之明；預知能力", "example": "With remarkable prescience, she had predicted the company's decline two years before it actually happened.", "example_zh": "她以非凡的先見之明，在公司實際衰落的兩年前就預測到了這一點。"}, {"session": "Session 17: Conscience and Groups", "word": "nescient", "ipa": "ˈnɛʃənt", "pos": "adj.", "definition": "not knowing; ignorant", "chinese": "無知的；不知道的", "example": "He remained nescient of the policy changes because he had missed all the department meetings that month.", "example_zh": "由於他缺席了那個月所有的部門會議，他對政策變化一無所知。"}, {"session": "Session 17: Conscience and Groups", "word": "nescience", "ipa": "ˈnɛʃəns", "pos": "n.", "definition": "ignorance", "chinese": "無知；不知", "example": "Her nescience of local customs led to several embarrassing misunderstandings during her first week abroad.", "example_zh": "她對當地習俗的無知在她出國的第一週造成了幾次令人尷尬的誤會。"}, {"session": "Session 17: Conscience and Groups", "word": "glibness", "ipa": "ˈɡlɪbnəs", "pos": "n.", "definition": "the quality of being smooth and suspiciously fluent", "chinese": "油嘴滑舌；巧言善辯", "example": "The interviewer was put off by the candidate's glibness — his answers sounded rehearsed rather than genuine.", "example_zh": "面試官對這位應試者的油嘴滑舌感到不舒服——他的回答聽起來像是事先排練過的，而非真誠的。"}, {"session": "Session 17: Conscience and Groups", "word": "egregiousness", "ipa": "ɪˈɡridʒəsnəs", "pos": "n.", "definition": "the quality of being outstandingly bad", "chinese": "極度惡劣；駭人聽聞", "example": "The egregiousness of the fraud — which stole life savings from thousands of retirees — shocked the nation.", "example_zh": "這起詐騙案的極度惡劣——從數千名退休人員手中盜走了畢生積蓄——震驚了全國。"}, {"session": "Session 17: Conscience and Groups", "word": "gregarious", "ipa": "ɡrɪˈɡɛrɪəs", "pos": "adj.", "definition": "enjoying companionship and group activities", "chinese": "愛社交的；喜好群居的；合群的", "example": "Her gregarious personality made her the life of every party, always surrounded by friends and laughter.", "example_zh": "她愛社交的個性使她成為每場派對的靈魂人物，總是被朋友和笑聲包圍。"}, {"session": "Session 17: Conscience and Groups", "word": "gregariousness", "ipa": "ɡrɪˈɡɛrɪəsnəs", "pos": "n.", "definition": "the quality of being sociable and group-oriented", "chinese": "愛社交的特質；合群性", "example": "His gregariousness meant he struggled to work alone and thrived whenever he was part of a team.", "example_zh": "他愛社交的特質意味著他難以獨自工作，但只要成為團隊的一份子就能茁壯成長。"}, {"session": "Session 17: Conscience and Groups", "word": "congregate", "ipa": "ˈkɑŋɡrɪˌɡet", "pos": "v.", "definition": "to gather together as a group", "chinese": "聚集；集合；群集", "example": "Hundreds of protesters congregated in the town square to demand changes to the new education policy.", "example_zh": "數百名抗議者聚集在市政廣場，要求對新教育政策作出改變。"}, {"session": "Session 17: Conscience and Groups", "word": "congregation", "ipa": "ˌkɑŋɡrɪˈɡeʃən", "pos": "n.", "definition": "a group gathered together; a religious flock", "chinese": "集會；（宗教）會眾；教眾", "example": "The congregation listened attentively as the minister delivered his sermon on the importance of forgiveness.", "example_zh": "會眾專注地聆聽著牧師就寬恕之重要性所作的佈道。"}, {"session": "Session 17: Conscience and Groups", "word": "segregate", "ipa": "ˈsɛɡrɪˌɡet", "pos": "v.", "definition": "to set apart from the rest", "chinese": "隔離；使分離；種族隔離", "example": "The hospital decided to segregate patients with infectious diseases from the general wards to prevent the spread of illness.", "example_zh": "醫院決定將傳染病患者與普通病房隔離，以防止疾病擴散。"}, {"session": "Session 17: Conscience and Groups", "word": "segregation", "ipa": "ˌsɛɡrɪˈɡeʃən", "pos": "n.", "definition": "the act of setting apart or separating", "chinese": "隔離；種族隔離；分離", "example": "Racial segregation in American schools was declared unconstitutional by the Supreme Court in 1954.", "example_zh": "1954年，美國最高法院裁定美國學校中的種族隔離違憲。"}, {"session": "Session 17: Conscience and Groups", "word": "aggregate", "ipa": "ˈæɡrɪɡɪt", "pos": "v./n.", "definition": "to gather into a mass or whole; a total group or mass", "chinese": "聚集；總計；總體；集合體", "example": "When you aggregate all the survey responses, the overall satisfaction rate comes to seventy-eight percent.", "example_zh": "當你匯總所有調查回覆時，整體滿意度達到了百分之七十八。"}, {"session": "Session 17: Conscience and Groups", "word": "aggregation", "ipa": "ˌæɡrɪˈɡeʃən", "pos": "n.", "definition": "a collection of individuals into a whole", "chinese": "聚集；集合；集合體", "example": "The city's cultural richness is a product of the aggregation of immigrants from dozens of different countries.", "example_zh": "這座城市的文化豐富性是來自數十個不同國家的移民聚集的產物。"}], "Session 19: Verbs for Actions and Attitudes": [{"session": "Session 19: Verbs for Actions and Attitudes", "word": "disparage", "ipa": "dɪˈspærɪdʒ", "pos": "v.", "definition": "to belittle; to speak of as having little value or importance", "chinese": "貶低；輕視；看輕", "example": "She disparaged his efforts, claiming the project was not worth pursuing.", "example_zh": "她貶低他的努力，聲稱這個項目不值得追求。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "equivocate", "ipa": "ɪˈkwɪvəkeɪt", "pos": "v.", "definition": "to speak in deliberately vague or ambiguous language to mislead", "chinese": "說話含糊其詞；故意模稜兩可以誤導他人", "example": "When asked about the missing funds, the manager equivocated instead of giving a direct answer.", "example_zh": "當被問及失蹤的資金時，那位經理含糊其詞，不肯給出直接答案。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "titillate", "ipa": "ˈtɪtɪleɪt", "pos": "v.", "definition": "to excite pleasurably; to tickle or stimulate agreeably", "chinese": "使愉快地興奮；逗弄；令人愉悅地刺激", "example": "The trailer was designed to titillate audiences and build anticipation for the film.", "example_zh": "這段預告片旨在讓觀眾感到興奮，為電影營造期待感。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "adulate", "ipa": "ˈædʒʊleɪt", "pos": "v.", "definition": "to flatter or admire excessively and fulsomely", "chinese": "過度奉承；諂媚；盲目崇拜", "example": "The fans adulated the pop star, showering her with gifts and endless praise.", "example_zh": "粉絲們對那位流行歌手盲目崇拜，送上禮物和無盡的讚美。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "proscribe", "ipa": "proʊˈskraɪb", "pos": "v.", "definition": "to prohibit; to forbid as harmful or dangerous", "chinese": "禁止；明令禁止（某事物）為有害或危險的", "example": "The government proscribed the use of certain pesticides after they were found to harm wildlife.", "example_zh": "政府在發現某些殺蟲劑會危害野生動物後，明令禁止使用。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "obviate", "ipa": "ˈɒbvieɪt", "pos": "v.", "definition": "to make unnecessary; to prevent by taking effective advance steps", "chinese": "使不必要；事先預防；消除（困難或需求）", "example": "Installing a backup generator would obviate the need to shut down operations during power outages.", "example_zh": "安裝備用發電機可以消除停電時需要中斷運作的需要。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "militate", "ipa": "ˈmɪlɪteɪt", "pos": "v.", "definition": "to work against; to have force or influence against (always followed by \"against\")", "chinese": "起反作用；（對某事）產生不利影響（後接 against）", "example": "His lack of relevant experience militated against his chances of getting the promotion.", "example_zh": "他缺乏相關經驗，對他獲得晉升的機會產生了不利影響。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "malign", "ipa": "məˈlaɪn", "pos": "v.", "definition": "to slander; to speak evil of; to defame", "chinese": "誹謗；說壞話；中傷", "example": "He was wrongly maligned by his rivals, who spread false rumors about his conduct.", "example_zh": "他被對手惡意中傷，對方散布關於他行為的謊言。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "condone", "ipa": "kənˈdoʊn", "pos": "v.", "definition": "to overlook or forgive a transgression; to pardon implicitly", "chinese": "默許；寬恕；對過失視而不見", "example": "The principal refused to condone cheating, no matter how minor the offense.", "example_zh": "校長拒絕默許作弊行為，無論違規行為多麼輕微。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "placate", "ipa": "ˈpleɪkeɪt", "pos": "v.", "definition": "to soothe or pacify; to change hostility into friendliness", "chinese": "安撫；平息；化敵意為友善", "example": "The manager tried to placate the angry customer by offering a full refund.", "example_zh": "經理試圖透過提供全額退款來安撫那位憤怒的顧客。"}], "Session 20: Words about Equality and Vagueness": [{"session": "Session 20: Words about Equality and Vagueness", "word": "parity", "ipa": "ˈpærɪti", "pos": "n.", "definition": "equality", "chinese": "平等；同等；對等", "example": "Workers demanded pay parity with their counterparts in other departments.", "example_zh": "工人要求與其他部門的同仁享有同等薪酬。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparity", "ipa": "dɪˈspærɪti", "pos": "n.", "definition": "inequality; a difference or lack of equality", "chinese": "不平等；差距；不一致", "example": "There is a growing disparity in income between the wealthy and the poor.", "example_zh": "富人與窮人之間的收入差距正在日益擴大。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparate", "ipa": "ˈdɪspərɪt", "pos": "adj.", "definition": "essentially and completely different; wholly unlike", "chinese": "截然不同的；本質上完全相異的", "example": "The committee was made up of disparate groups who rarely agreed on anything.", "example_zh": "委員會由幾個截然不同的群體組成，他們很少在任何事情上達成共識。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparagement", "ipa": "dɪˈspærɪdʒmənt", "pos": "n.", "definition": "the act of belittling or speaking lowly of someone", "chinese": "貶低；輕視；蔑視的言語或行為", "example": "His constant disparagement of his colleagues created a toxic work environment.", "example_zh": "他不斷貶低同事，造成了有毒的工作環境。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "peer", "ipa": "pɪr", "pos": "n.", "definition": "one's equal in age, rank, or ability", "chinese": "同儕；同等地位的人；同齡人", "example": "She was respected and admired by her peers for her innovative research.", "example_zh": "她因其創新研究而受到同儕的尊重和欽佩。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "equivocal", "ipa": "ɪˈkwɪvəkəl", "pos": "adj.", "definition": "deliberately vague; open to contradictory interpretations", "chinese": "故意含糊的；模稜兩可的；可作多種解讀的", "example": "His equivocal response left everyone unsure of whether he supported the proposal.", "example_zh": "他模稜兩可的回應讓所有人都不確定他是否支持該提案。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "unequivocal", "ipa": "ˌʌnɪˈkwɪvəkəl", "pos": "adj.", "definition": "clear; direct; capable of only one interpretation", "chinese": "明確的；清晰的；毫無歧義的", "example": "The general gave an unequivocal order: retreat immediately.", "example_zh": "將軍下達了明確的命令：立即撤退。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "equivocation", "ipa": "ɪˌkwɪvəˈkeɪʃən", "pos": "n.", "definition": "deliberate use of vague or misleading language", "chinese": "含糊其詞；故意模稜兩可的表達", "example": "The politician's equivocation during the debate frustrated voters who wanted clear answers.", "example_zh": "政客在辯論中含糊其詞，令希望得到清晰答案的選民大感沮喪。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "ambiguous", "ipa": "æmˈbɪɡjuəs", "pos": "adj.", "definition": "accidentally or unintentionally vague; open to misinterpretation", "chinese": "（無意地）含糊不清的；可能引起誤解的", "example": "The instructions were so ambiguous that half the team interpreted them differently.", "example_zh": "說明寫得如此含糊，以至於一半的團隊成員作出了不同的理解。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "ambiguity", "ipa": "ˌæmbɪˈɡjuːɪti", "pos": "n.", "definition": "state of being open to more than one interpretation", "chinese": "歧義；含糊不清；可作多種解讀的狀態", "example": "The ambiguity of the contract clause led to a lengthy legal dispute.", "example_zh": "合約條款的歧義引發了漫長的法律糾紛。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "double entendre", "ipa": "ˌdʌbəl ɒnˈtɒndrə", "pos": "n.", "definition": "a word or phrase with two meanings, one of which is risqué", "chinese": "雙關語（其中一個含義較為曖昧或不雅）", "example": "The comedian's script was full of double entendres that made the adults laugh while the children remained oblivious.", "example_zh": "那位喜劇演員的劇本充滿了雙關語，讓大人們忍俊不禁，而孩子們卻毫無察覺。"}], "Session 21: More Equality Words and Voice Words": [{"session": "Session 21: More Equality Words and Voice Words", "word": "equity", "ipa": "ˈekwɪti", "pos": "n.", "definition": "fairness; justice; equal treatment", "chinese": "公平；公正；平等對待", "example": "The new policy was designed to promote equity in hiring practices across all departments.", "example_zh": "新政策旨在促進所有部門招聘實踐的公平性。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equitable", "ipa": "ˈekwɪtəbəl", "pos": "adj.", "definition": "fair; just", "chinese": "公平的；公正的", "example": "The judge sought an equitable solution that would satisfy both parties in the dispute.", "example_zh": "法官尋求一個能讓糾紛雙方都滿意的公正解決方案。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "inequity", "ipa": "ɪnˈekwɪti", "pos": "n.", "definition": "injustice; unfairness", "chinese": "不公平；不公正", "example": "Activists protested against the inequity of the tax system, which burdened the poor disproportionately.", "example_zh": "社運人士抗議稅制的不公平，認為它不成比例地加重了窮人的負擔。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "inequitable", "ipa": "ɪnˈekwɪtəbəl", "pos": "adj.", "definition": "unfair; unjust", "chinese": "不公平的；不公正的", "example": "The inequitable distribution of resources left rural communities at a significant disadvantage.", "example_zh": "資源的不公平分配使農村社區處於嚴重的不利地位。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "iniquity", "ipa": "ɪˈnɪkwɪti", "pos": "n.", "definition": "wickedness; sinfulness; a grossly immoral act", "chinese": "邪惡；不道德；罪惡行為", "example": "The preacher spoke passionately against the iniquity he witnessed in the city streets.", "example_zh": "那位牧師慷慨激昂地譴責他在城市街道上目睹的邪惡行徑。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "iniquitous", "ipa": "ɪˈnɪkwɪtəs", "pos": "adj.", "definition": "wicked; sinful; grossly immoral", "chinese": "邪惡的；不道德的；罪惡的", "example": "The iniquitous scheme defrauded thousands of elderly people of their savings.", "example_zh": "那個邪惡的騙局使數千名老人的積蓄化為烏有。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equinox", "ipa": "ˈiːkwɪnɒks", "pos": "n.", "definition": "the time when day and night are of equal length (twice yearly)", "chinese": "晝夜平分點；春分或秋分", "example": "Many cultures around the world celebrate the spring equinox as a symbol of renewal and balance.", "example_zh": "世界各地許多文化都以春分作為更新與平衡的象徵加以慶祝。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "nocturnal", "ipa": "nɒkˈtɜːrnəl", "pos": "adj.", "definition": "active or flourishing at night rather than during daylight", "chinese": "夜行性的；在夜間活動或繁盛的", "example": "Owls are nocturnal predators that hunt under the cover of darkness.", "example_zh": "貓頭鷹是夜行性掠食者，在黑暗的掩護下狩獵。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "nocturne", "ipa": "ˈnɒktɜːrn", "pos": "n.", "definition": "a musical composition of dreamy character; a night scene painting", "chinese": "夜曲；夜景畫", "example": "Chopin's nocturnes are celebrated for their lyrical melodies and intimate, reflective mood.", "example_zh": "蕭邦的夜曲以其抒情旋律和親密、沉思的情調而聞名。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equanimity", "ipa": "ˌiːkwəˈnɪmɪti", "pos": "n.", "definition": "evenness of temper; composure; calmness under stress", "chinese": "心平氣和；沉著；泰然自若", "example": "Despite the crisis unfolding around her, she handled every problem with remarkable equanimity.", "example_zh": "儘管危機在她周圍不斷發生，她仍以非凡的沉著應對每一個問題。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equability", "ipa": "ˌekwəˈbɪlɪti", "pos": "n.", "definition": "a close synonym of equanimity; calmness; even-temperedness", "chinese": "平和；穩定的心境；不易激動的性情", "example": "His equability in the face of criticism made him a natural leader.", "example_zh": "他面對批評時的平和心態使他成為天生的領導者。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equable", "ipa": "ˈekwəbəl", "pos": "adj.", "definition": "calm; serene; unflappable; even-tempered", "chinese": "平靜的；沉穩的；不易激動的", "example": "Her equable personality made her a joy to work with even during stressful deadlines.", "example_zh": "她沉穩的個性使她即使在壓力緊迫的截止日期前也令人愉快地共事。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilibrium", "ipa": "ˌiːkwɪˈlɪbriəm", "pos": "n.", "definition": "a state of physical balance, especially between opposing forces", "chinese": "平衡；均衡；（相對力量間的）平衡狀態", "example": "The ecosystem maintained its equilibrium until the introduction of an invasive species disrupted the balance.", "example_zh": "生態系統維持著其平衡狀態，直到一個入侵物種的引入破壞了這種平衡。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilibrist", "ipa": "ɪˈkwɪlɪbrɪst", "pos": "n.", "definition": "a professional tightrope walker", "chinese": "走鋼絲者；職業走繩表演者", "example": "The equilibrist crossed the wire suspended high above the crowd without a safety net.", "example_zh": "那位走繩表演者在高懸於人群之上的鋼絲上行走，沒有任何安全網。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilateral", "ipa": "ˌiːkwɪˈlætərəl", "pos": "adj.", "definition": "having equal sides", "chinese": "等邊的；各邊相等的", "example": "An equilateral triangle has three sides of identical length and three equal angles.", "example_zh": "等邊三角形有三條等長的邊和三個相等的角。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equestrian", "ipa": "ɪˈkwestriən", "pos": "n./adj.", "definition": "a person on horseback; pertaining to horseback riding", "chinese": "騎馬者；騎馬的；與馬術相關的", "example": "The equestrian statue in the town square depicted a general astride his warhorse.", "example_zh": "廣場上的騎馬雕像描繪了一位將軍騎著他的戰馬的英姿。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equestrienne", "ipa": "ɪˌkwestriˈen", "pos": "n.", "definition": "a woman on horseback", "chinese": "女騎士；女性騎馬者", "example": "The equestrienne guided her horse through the obstacle course with elegant precision.", "example_zh": "那位女騎士以優雅的精準度引導她的馬穿越障礙課程。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equine", "ipa": "ˈiːkwaɪn", "pos": "adj./n.", "definition": "like or pertaining to horses; a horse", "chinese": "馬的；與馬有關的；馬（名詞用法）", "example": "The veterinarian specialized in equine medicine and treated horses at several local farms.", "example_zh": "那位獸醫專攻馬科動物醫學，在幾個當地農場為馬匹看診。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vociferous", "ipa": "voʊˈsɪfərəs", "pos": "adj.", "definition": "loud; noisy; clamorous", "chinese": "吵鬧的；大聲叫嚷的；喧囂的", "example": "Vociferous protesters gathered outside the courthouse to demand justice.", "example_zh": "吵鬧的抗議者聚集在法院外要求伸張正義。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocal", "ipa": "ˈvoʊkəl", "pos": "adj.", "definition": "pertaining to the voice; freely expressive", "chinese": "聲音的；直言不諱的；積極表達意見的", "example": "She was vocal about her opposition to the proposed budget cuts.", "example_zh": "她對擬議的預算削減直言不諱地表示反對。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocalize", "ipa": "ˈvoʊkəlaɪz", "pos": "v.", "definition": "to give voice to; to sing", "chinese": "發聲；唱出；以聲音表達", "example": "The choir director encouraged the students to vocalize their feelings through song.", "example_zh": "合唱團指導老師鼓勵學生透過歌唱來發聲表達情感。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocalist", "ipa": "ˈvoʊkəlɪst", "pos": "n.", "definition": "a singer", "chinese": "歌手；聲樂家", "example": "The lead vocalist of the band captivated the audience with her powerful, soulful voice.", "example_zh": "樂隊的主唱以她強而有力、充滿靈魂的嗓音迷住了觀眾。"}], "Session 22: Flattery, Prohibition, and Related Words": [{"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "titillation", "ipa": "ˌtɪtɪˈleɪʃən", "pos": "n.", "definition": "pleasurable stimulation; light sexual excitement", "chinese": "愉快的刺激；輕微的性興奮；逗弄", "example": "The tabloid relied on titillation rather than substance to sell copies.", "example_zh": "那份小報靠挑逗讀者而非實質內容來促進銷售。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "adulation", "ipa": "ˌædjʊˈleɪʃən", "pos": "n.", "definition": "excessive flattery and worship", "chinese": "過度奉承；盲目崇拜；諂媚", "example": "The rock star grew tired of the adulation and longed for a private, ordinary life.", "example_zh": "那位搖滾明星厭倦了盲目的崇拜，渴望過上普通的私人生活。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "adulatory", "ipa": "ˈædjʊlətɔːri", "pos": "adj.", "definition": "worshipful; excessively flattering", "chinese": "過分奉承的；諂媚的；極盡讚美的", "example": "The adulatory review barely mentioned any flaws in the film.", "example_zh": "那篇極盡讚美的評論幾乎沒有提及這部電影的任何缺點。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "proscription", "ipa": "proʊˈskrɪpʃən", "pos": "n.", "definition": "a prohibition; a formal forbidding", "chinese": "禁令；正式的禁止", "example": "The proscription on open fires during drought season was strictly enforced.", "example_zh": "乾旱季節禁止野外用火的禁令被嚴格執行。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "proscriptive", "ipa": "proʊˈskrɪptɪv", "pos": "adj.", "definition": "relating to or of the nature of a prohibition", "chinese": "禁止性的；帶有禁令性質的", "example": "The proscriptive regulations limited what vendors could sell at the market.", "example_zh": "那些禁止性法規限制了商販在市場上可以出售的商品。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "obviation", "ipa": "ˌɒbvɪˈeɪʃən", "pos": "n.", "definition": "the act of making something unnecessary", "chinese": "消除（必要性）；預防；排除", "example": "The new software update achieved the obviation of several manual steps in the workflow.", "example_zh": "新的軟體更新消除了工作流程中幾個手動步驟的必要性。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivial", "ipa": "ˈtrɪviəl", "pos": "adj.", "definition": "of little importance or significance", "chinese": "瑣碎的；微不足道的；不重要的", "example": "Don't waste the meeting's time on trivial matters when there are major decisions to make.", "example_zh": "在需要做出重大決定時，不要把會議時間浪費在瑣碎的事情上。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivialities", "ipa": "ˌtrɪvɪˈælɪtiz", "pos": "n. (pl.)", "definition": "unimportant things; trifles", "chinese": "瑣事；微不足道的事物", "example": "She was so caught up in the trivialities of daily life that she lost sight of her long-term goals.", "example_zh": "她太沉浸於日常瑣事中，以至於忽略了她的長遠目標。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivia", "ipa": "ˈtrɪviə", "pos": "n. (pl.)", "definition": "insignificant matters", "chinese": "瑣事；無關緊要的事物；冷知識", "example": "He had an extraordinary memory for trivia, winning every pub quiz he entered.", "example_zh": "他對瑣碎知識有著驚人的記憶力，參加的每一場酒吧問答賽都能獲勝。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "militant", "ipa": "ˈmɪlɪtənt", "pos": "adj./n.", "definition": "aggressively fighting for a cause; a person doing so", "chinese": "好戰的；激進的；積極鬥爭者", "example": "Militant activists blockaded the factory entrance to protest environmental violations.", "example_zh": "激進的社運人士封鎖了工廠入口，抗議環境違規行為。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "militancy", "ipa": "ˈmɪlɪtənsi", "pos": "n.", "definition": "aggressiveness in fighting for a cause", "chinese": "好戰性；激進主義；鬥爭性", "example": "The increasing militancy of the labor movement forced the company to negotiate.", "example_zh": "勞工運動日益增強的激進性迫使公司進行談判。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malign (adj.)", "ipa": "məˈlaɪn", "pos": "adj.", "definition": "bad; harmful; evil; hateful", "chinese": "有害的；惡意的；邪惡的；令人憎恨的", "example": "The doctor warned of the malign effects of prolonged stress on the immune system.", "example_zh": "醫生警告長期壓力對免疫系統的有害影響。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignant", "ipa": "məˈlɪɡnənt", "pos": "adj.", "definition": "showing deep hatred; cancerous; harmful", "chinese": "惡意深重的；惡性的（如腫瘤）；有害的", "example": "The biopsy confirmed that the tumor was malignant and required immediate treatment.", "example_zh": "活組織檢查確認腫瘤為惡性，需要立即治療。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignancy", "ipa": "məˈlɪɡnənsi", "pos": "n.", "definition": "a cancerous growth; the state of being harmful or hateful", "chinese": "惡性腫瘤；惡意；有害的狀態", "example": "Early detection of malignancy significantly improves the patient's chances of survival.", "example_zh": "及早發現惡性腫瘤能顯著提高患者的存活率。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignity", "ipa": "məˈlɪɡnɪti", "pos": "n.", "definition": "the quality of being malign", "chinese": "惡意；深切的憎恨；有害性", "example": "The malignity behind his seemingly kind words only became apparent later.", "example_zh": "他看似友善的話語背後的惡意只是在後來才變得明顯。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malediction", "ipa": "ˌmælɪˈdɪkʃən", "pos": "n.", "definition": "a curse; an evil saying", "chinese": "詛咒；惡言咒罵", "example": "The old woman hurled maledictions at those who had wronged her family.", "example_zh": "那位老婦人對傷害她家人的人大聲詛咒。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malevolent", "ipa": "məˈlevələnt", "pos": "adj.", "definition": "wishing evil or harm; ill-willed", "chinese": "惡意的；懷有惡意的；心懷不軌的", "example": "A malevolent glare from the stranger made everyone in the room uneasy.", "example_zh": "陌生人惡意的怒視讓房間裡的每個人都感到不安。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malevolence", "ipa": "məˈlevələns", "pos": "n.", "definition": "the quality of wishing evil", "chinese": "惡意；惡毒；惡念", "example": "The villain's malevolence was so palpable it seemed to fill the room.", "example_zh": "那個惡棍的惡意如此明顯，似乎充斥了整個房間。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maleficent", "ipa": "məˈlefɪsənt", "pos": "adj.", "definition": "doing harm or evil", "chinese": "作惡的；造成傷害的；行惡的", "example": "The maleficent sorcerer cast a spell that brought drought and famine to the land.", "example_zh": "那個作惡的巫師施下咒語，使大地遭受旱災和饑荒。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maleficence", "ipa": "məˈlefɪsəns", "pos": "n.", "definition": "the act or quality of doing harm", "chinese": "作惡；造成傷害的行為或性質", "example": "The court condemned the corporation's maleficence in knowingly polluting the water supply.", "example_zh": "法院譴責該公司明知故犯地污染水源的惡行。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malefactor", "ipa": "ˈmælɪfæktər", "pos": "n.", "definition": "a wrongdoer; a criminal", "chinese": "作惡者；罪犯；違法者", "example": "The detective vowed to track down the malefactor responsible for the string of robberies.", "example_zh": "那位偵探發誓要追蹤一連串搶劫案的罪犯。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malefaction", "ipa": "ˌmælɪˈfækʃən", "pos": "n.", "definition": "a crime; an evil deed", "chinese": "罪行；惡行；犯罪行為", "example": "The judge declared that no malefaction, however small, would go unpunished.", "example_zh": "法官宣告任何罪行，無論多小，都不會逃脫懲罰。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maladroit", "ipa": "ˌmæləˈdrɔɪt", "pos": "adj.", "definition": "clumsy; bungling; awkward; unskillful", "chinese": "笨拙的；不靈巧的；處事不當的", "example": "His maladroit attempt at a compliment ended up offending the very person he was trying to flatter.", "example_zh": "他笨拙的讚美嘗試最終冒犯了他試圖奉承的那個人。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maladroitness", "ipa": "ˌmæləˈdrɔɪtnəs", "pos": "n.", "definition": "clumsiness; awkwardness", "chinese": "笨拙；不靈巧；處事不當", "example": "His maladroitness in social situations made networking events particularly painful for him.", "example_zh": "他在社交場合的笨拙使交流活動對他來說尤為痛苦。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malaise", "ipa": "məˈleɪz", "pos": "n.", "definition": "an indefinite feeling of bodily discomfort; vague unease", "chinese": "不適感；莫名的身體不舒適；隱隱的憂鬱", "example": "A general malaise settled over the office after the announcement of layoffs.", "example_zh": "裁員公告發出後，辦公室籠罩著一種普遍的憂鬱感。"}], "Session 23: The Good News — Bene- Words and Related Terms": [{"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benign", "ipa": "bɪˈnaɪn", "pos": "adj.", "definition": "kindly; good-natured; not harmful or cancerous", "chinese": "和善的；好脾氣的；良性的（如腫瘤）", "example": "The biopsy results were a relief — the tumor was benign and required no further treatment.", "example_zh": "活組織檢查結果令人放心——腫瘤是良性的，不需要進一步治療。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignant", "ipa": "bɪˈnɪɡnənt", "pos": "adj.", "definition": "kindly; good-natured", "chinese": "和藹的；仁慈的；善意的", "example": "The benignant professor was known for encouraging students who struggled with the material.", "example_zh": "那位和藹的教授以鼓勵在課業上有困難的學生而聞名。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignity", "ipa": "bɪˈnɪɡnɪti", "pos": "n.", "definition": "kindliness; gentleness", "chinese": "和善；仁慈；溫和", "example": "The benignity of her smile put even the most anxious patients at ease.", "example_zh": "她微笑的和善使即使最焦慮的病患也感到輕鬆。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignancy", "ipa": "bɪˈnɪɡnənsi", "pos": "n.", "definition": "the quality of being benignant", "chinese": "和藹的性質；仁慈的特質", "example": "His benignancy toward all newcomers made him a beloved figure in the community.", "example_zh": "他對所有新來者的和藹使他成為社區中受人愛戴的人物。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benediction", "ipa": "ˌbenɪˈdɪkʃən", "pos": "n.", "definition": "a blessing;
