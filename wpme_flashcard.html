<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Power Made Easy — Flashcards</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --line: #DDDBD5;
    --text: #111111;
    --text-2: #666660;
    --text-3: #999994;
    --accent: #1A1A1A;
    --blue: #2D5BE3;
    --green: #2A7A50;
    --gold: #8B6400;
    --border: #E5E3DD;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Persistent Site Header ── */
  .site-header {
    padding: 16px 20px 12px;
    border-bottom: 1.5px solid var(--line);
    flex-shrink: 0;
    background: var(--bg);
  }
  .site-title {
    font-size: 1.0rem; font-weight: 800; letter-spacing: 0.01em; color: var(--text);
  }
  .site-sub {
    font-size: 0.72rem; color: var(--text-3); margin-top: 2px; letter-spacing: 0.04em;
  }

  /* ── Screens ── */
  .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* ── Home ── */
  #home { overflow: hidden; }
  .home-scroll { flex: 1; overflow-y: auto; padding: 0 20px 32px; }

  /* ── Mode Tabs ── */
  .mode-tabs {
    display: flex;
    border-bottom: 1.5px solid var(--line);
    margin-bottom: 0;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .mode-tab {
    flex: 1;
    padding: 12px 0 10px;
    background: none;
    border: none;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-tab.active { color: var(--text); border-bottom-color: var(--text); }

  /* ── Random Button ── */
  .btn-random {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.97rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 18px;
    margin-bottom: 0;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-random:active { opacity: 0.8; }

  /* ── Session List ── */
  .session-list-wrap { margin-top: 6px; }
  .session-sep { height: 1px; background: var(--line); }
  .session-item {
    padding: 14px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .session-item:active { opacity: 0.6; }
  .session-item-name {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    line-height: 1.35;
  }
  .session-item-count {
    font-size: 0.78rem;
    color: var(--text-3);
    margin-left: 12px;
    white-space: nowrap;
  }
  .session-item-arrow {
    font-size: 0.85rem;
    color: var(--text-3);
    margin-left: 10px;
  }

  /* ── Card Screen ── */
  #card-screen { padding: 0; overflow: hidden; }

  .progress-bar-wrap { padding: 0; flex-shrink: 0; }
  .progress-bar { height: 2px; background: var(--line); }
  .progress-fill { height: 100%; background: var(--text); transition: width 0.3s ease; }

  .card-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .btn-back {
    background: none;
    border: none;
    color: var(--text-2);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.02em;
    -webkit-tap-highlight-color: transparent;
  }
  .session-title {
    font-size: 0.78rem;
    color: var(--text-3);
    flex: 1;
    line-height: 1.3;
    text-align: right;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-3);
    white-space: nowrap;
    margin-left: 8px;
  }

  /* ── Card Area ── */
  .card-area { flex: 1; overflow-y: auto; padding: 16px; min-height: 0; }
  .card-wrap { max-width: 480px; margin: 0 auto; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px 24px;
  }

  /* ── Vocab Card Content ── */
  .c-pos {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .c-word {
    font-size: clamp(2rem, 9vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 4px;
  }
  .c-ipa {
    font-size: 0.85rem;
    color: var(--text-2);
    font-style: italic;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .c-line { height: 1px; background: var(--line); margin: 16px 0; }
  .c-def { font-size: 0.92rem; line-height: 1.65; color: var(--text); }
  .c-zh {
    font-size: 1.0rem;
    font-weight: 600;
    color: var(--green);
    line-height: 1.5;
  }
  .c-label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .c-example {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text-2);
    margin-bottom: 10px;
  }
  .c-example-zh {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text-3);
  }
  .btn-speak {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-speak:active { border-color: var(--blue); color: var(--blue); }
  .btn-speak.speaking {
    border-color: var(--blue);
    color: var(--blue);
    animation: pulse 0.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* ── Root Card Content ── */
  .c-root-meta {
    font-size: 0.88rem;
    color: var(--text-2);
    margin-top: 6px;
    margin-bottom: 0;
  }
  .c-root-examples {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .c-root-ex {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    gap: 8px;
  }
  .c-root-ex:last-child { border-bottom: none; }
  .c-root-ex-left { display: flex; flex-direction: column; gap: 3px; }
  .c-root-word { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .c-root-ipa-row { display: flex; align-items: center; gap: 6px; }
  .c-root-ipa { font-size: 0.74rem; color: var(--text-3); font-style: italic; }
  .btn-speak-sm { background: none; border: 1px solid var(--line); color: var(--text-3); border-radius: 20px; padding: 1px 8px; font-size: 0.7rem; cursor: pointer; line-height: 1.6; -webkit-tap-highlight-color: transparent; }
  .c-root-zh { font-size: 0.85rem; color: var(--green); text-align: right; max-width: 50%; }

  /* ── Nav ── */
  .card-nav {
    display: flex;
    gap: 8px;
    padding: 12px 16px 28px;
    flex-shrink: 0;
    border-top: 1px solid var(--line);
  }
  .nav-btn {
    flex: 1;
    padding: 13px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 10px;
    font-size: 0.92rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { opacity: 0.7; }
  .nav-btn.primary {
    background: var(--text);
    border-color: var(--text);
    color: #fff;
    font-weight: 600;
  }
  .nav-btn:disabled { opacity: 0.25; pointer-events: none; }

  /* ── Done Screen ── */
  #done-screen {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .done-title {
    font-size: 2rem;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .done-line { height: 1px; background: var(--line); width: 60px; margin: 0 auto 16px; }
  .done-sub {
    font-size: 0.9rem;
    color: var(--text-3);
    margin-bottom: 36px;
    line-height: 1.5;
  }
  .done-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 320px;
  }
  .done-btn {
    padding: 14px;
    border-radius: 10px;
    font-size: 0.92rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .done-btn.primary { background: var(--text); border: 1px solid var(--text); color: #fff; }
  .done-btn.secondary { background: none; border: 1px solid var(--border); color: var(--text-2); }
  .done-btn:active { opacity: 0.75; }
</style>
</head>
<body>

<header class="site-header">
  <div class="site-title">Word Power Made Easy</div>
  <div class="site-sub">經典單字 · 張全吉彙整</div>
</header>

<div class="screen active" id="home">
  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-vocab" onclick="switchMode('vocab')">單字</button>
    <button class="mode-tab" id="tab-root" onclick="switchMode('root')">字根</button>
  </div>
  <div class="home-scroll">
    <div id="vocab-home">
      <button class="btn-random" onclick="startRandom()">🎲 隨機一個 Session</button>
      <div class="session-list-wrap">
        <div class="session-sep"></div>
        <div id="session-list"></div>
      </div>
    </div>
    <div id="root-home" style="display:none;">
      <button class="btn-random" onclick="startRootRandom()">🎲 隨機一個字根組</button>
      <div class="session-list-wrap">
        <div class="session-sep"></div>
        <div id="root-session-list"></div>
      </div>
    </div>
  </div>
</div>

<div class="screen" id="card-screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
  <div class="card-topbar">
    <button class="btn-back" onclick="goHome()">← 返回</button>
    <div class="session-title" id="session-title"></div>
    <div class="progress-label" id="progress-label"></div>
  </div>
  <div class="card-area" id="card-area">
    <div class="card-wrap">
      <div class="card" id="card-content"></div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevCard()">‹ 上一張</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextCard()">下一張 ›</button>
  </div>
</div>

<div class="screen" id="done-screen">
  <div class="done-title">完成</div>
  <div class="done-line"></div>
  <div class="done-sub" id="done-sub"></div>
  <div class="done-actions">
    <button class="done-btn primary" id="done-again-btn" onclick="doneAgain()">再來一個 Session</button>
    <button class="done-btn secondary" onclick="replaySession()">重播</button>
    <button class="done-btn secondary" onclick="goHome()">返回</button>
  </div>
</div>

<script>
const DATA = {"Session 1: Personality Types": [{"session": "Session 1: Personality Types", "word": "egoist", "ipa": "ˋigoist", "pos": "n.", "definition": "a person who puts their own interests first above all else", "chinese": "自我主義者；只顧自身利益的人", "example": "A true egoist rarely volunteers to help others unless there is something to gain personally.", "example_zh": "真正的自我主義者很少主動幫助他人，除非能從中獲取個人利益。"}, {"session": "Session 1: Personality Types", "word": "egotist", "ipa": "ˋigətɪst", "pos": "n.", "definition": "a boastful, conceited person who constantly talks about themselves", "chinese": "自負者；自吹自擂的人", "example": "The egotist spent the entire dinner conversation talking about his own accomplishments without asking anyone else a single question.", "example_zh": "那個自負的人在整頓晚餐對話中，一直談論自己的成就，卻沒有問過其他人任何一個問題。"}, {"session": "Session 1: Personality Types", "word": "altruist", "ipa": "ˋæltruɪst", "pos": "n.", "definition": "a person devoted to the welfare of others rather than themselves", "chinese": "利他主義者；無私奉獻他人的人", "example": "The retired doctor was a genuine altruist who spent his later years volunteering in underserved communities.", "example_zh": "那位退休醫生是個真正的利他主義者，晚年都在服務不足的社區做義工。"}, {"session": "Session 1: Personality Types", "word": "introvert", "ipa": "ˋɪntrəvɝt", "pos": "n.", "definition": "a person whose thoughts and interests are turned inward; prefers solitude", "chinese": "內向者；喜好獨處、思想向內的人", "example": "As an introvert, she found large social gatherings exhausting and preferred quiet evenings with a good book.", "example_zh": "身為內向者，她覺得大型社交聚會令人疲憊，更喜歡安靜地捧著好書度過夜晚。"}, {"session": "Session 1: Personality Types", "word": "extrovert", "ipa": "ˋɛkstrəvɝt", "pos": "n.", "definition": "a person whose thoughts and interests are turned outward; loves company", "chinese": "外向者；喜好社交、思想向外的人", "example": "The natural extrovert thrived at the networking event, effortlessly striking up conversations with strangers.", "example_zh": "那個天生的外向者在交流活動中如魚得水，毫不費力地與陌生人攀談。"}, {"session": "Session 1: Personality Types", "word": "ambivert", "ipa": "ˋæmbɪvɝt", "pos": "n.", "definition": "a person with both introverted and extroverted tendencies", "chinese": "兼向性格者；兼具內向與外向特質的人", "example": "As an ambivert, he enjoyed socializing at parties but also needed quiet time alone to recharge afterward.", "example_zh": "身為兼向性格者，他喜歡在派對上社交，但之後也需要獨處的安靜時光來恢復精力。"}, {"session": "Session 1: Personality Types", "word": "misanthrope", "ipa": "ˋmɪsənθrop", "pos": "n.", "definition": "a person who hates or distrusts humanity", "chinese": "厭世者；憎恨或不信任人類的人", "example": "After decades of disappointment, the old man had become a misanthrope who rarely left his house.", "example_zh": "在幾十年的失望之後，那位老人變成了一個厭世者，幾乎足不出戶。"}, {"session": "Session 1: Personality Types", "word": "misogynist", "ipa": "mɪˋsɑdʒɪnɪst", "pos": "n.", "definition": "a person who hates women", "chinese": "厭女者；憎恨女性的人", "example": "His dismissive attitude toward his female colleagues revealed him to be a misogynist in the workplace.", "example_zh": "他對女性同事的輕蔑態度，揭露了他是職場中的厭女者。"}, {"session": "Session 1: Personality Types", "word": "misogamist", "ipa": "mɪˋsɑgəmɪst", "pos": "n.", "definition": "a person who hates or opposes marriage", "chinese": "厭婚者；憎恨或反對婚姻的人", "example": "A confirmed misogamist, he had turned down two proposals and showed no interest in ever settling down.", "example_zh": "他是個堅定的厭婚者，已拒絕了兩次求婚，對安定下來毫無興趣。"}, {"session": "Session 1: Personality Types", "word": "ascetic", "ipa": "əˋsɛtɪk", "pos": "n. / adj.", "definition": "a person who practices strict self-denial and austerity; of or relating to such a lifestyle", "chinese": "苦行者；禁欲主義的（人）", "example": "The monk lived an ascetic life, owning nothing more than a robe, a bowl, and a pair of sandals.", "example_zh": "那位僧侶過著苦行的生活，除了一件袍子、一個缽和一雙涼鞋之外，別無所有。"}], "Session 2: Words from EGO and ALTER": [{"session": "Session 2: Words from EGO and ALTER", "word": "ego", "ipa": "ˋigo", "pos": "n.", "definition": "one's concept of oneself; the self", "chinese": "自我；自我意識", "example": "His fragile ego could not handle any criticism, no matter how constructive it was.", "example_zh": "他脆弱的自我無法承受任何批評，無論那批評多麼具有建設性。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egocentric", "ipa": "ˌigoˋsɛntrɪk", "pos": "n. / adj.", "definition": "a person who considers themselves the center of the universe; extremely self-centered", "chinese": "自我中心者；極度以自我為中心的（人）", "example": "Her egocentric behavior made it impossible for her to empathize with anyone else's problems.", "example_zh": "她以自我為中心的行為，使她完全無法對他人的問題感同身受。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egomaniac", "ipa": "ˌigoˋmenɪæk", "pos": "n.", "definition": "a person whose desire for self-importance has become a morbid obsession", "chinese": "自我狂熱者；病態地沉迷於自身重要性的人", "example": "The director was such an egomaniac that he put his own portrait in every office of the company.", "example_zh": "那位總監是個自我狂熱者，把自己的肖像掛在公司每間辦公室裡。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "egomaniacal", "ipa": "ˌigomə̩ˋnaɪəkəl", "pos": "adj.", "definition": "obsessively, morbidly wrapped up in oneself", "chinese": "病態自我中心的；極度自我迷戀的", "example": "His egomaniacal tendencies became obvious when he claimed sole credit for the entire team's work.", "example_zh": "當他聲稱整個團隊的工作都是他一個人的功勞時，他那病態自我中心的傾向便顯而易見了。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altruism", "ipa": "ˋæltruɪzəm", "pos": "n.", "definition": "the philosophy or practice of putting others' welfare above one's own", "chinese": "利他主義；無私奉獻他人的哲學或行為", "example": "True altruism means helping others without any expectation of reward or recognition.", "example_zh": "真正的利他主義意味著幫助他人時不期待任何回報或認可。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altruistic", "ipa": "ˌæltruˋɪstɪk", "pos": "adj.", "definition": "selflessly concerned with the welfare of others", "chinese": "利他的；無私關懷他人的", "example": "Her altruistic decision to donate a kidney to a stranger moved everyone who heard the story.", "example_zh": "她無私地決定將腎臟捐給一個陌生人，所有聽到這個故事的人都深受感動。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alternate", "ipa": "ˋɔltɚnɪt", "pos": "v. / adj. / n.", "definition": "to take turns; every other; a substitute person", "chinese": "輪流；交替的；替補者", "example": "The two coaches decided to alternate between offensive and defensive drills throughout the practice session.", "example_zh": "兩位教練決定在整個練習期間輪流進行進攻和防守訓練。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alternative", "ipa": "ɔlˋtɝnətɪv", "pos": "n.", "definition": "another possible choice", "chinese": "替代方案；另一種選擇", "example": "If the highway is congested, taking the coastal road is a scenic alternative.", "example_zh": "如果高速公路壅塞，走海岸公路是一個風景優美的替代方案。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alteration", "ipa": "ˌɔltəˋreʃən", "pos": "n.", "definition": "a change; the act of making something different", "chinese": "改變；更動；修改", "example": "The tailor made a small alteration to the sleeve length so the jacket fit perfectly.", "example_zh": "裁縫師對袖長做了小幅修改，讓這件西裝外套合身得恰到好處。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alter", "ipa": "ˋɔltɚ", "pos": "v.", "definition": "to change", "chinese": "改變；更改", "example": "Moving to a new city can alter your perspective on life in unexpected ways.", "example_zh": "搬到一個新城市，可能以意想不到的方式改變你對生活的看法。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "altercation", "ipa": "ˌɔltɚˋkeʃən", "pos": "n.", "definition": "a heated verbal dispute or argument", "chinese": "激烈爭吵；口角", "example": "The brief altercation between the two neighbors over parking quickly drew a crowd of onlookers.", "example_zh": "兩位鄰居因停車問題發生的短暫激烈口角，很快吸引了一群旁觀者。"}, {"session": "Session 2: Words from EGO and ALTER", "word": "alter ego", "ipa": "ˋɔltɚ ˋigo", "pos": "n.", "definition": "one's other self; a person so close they mirror you in temperament", "chinese": "另一個自我；性情上極其相似的至交", "example": "She described her closest friend as her alter ego — someone who finished her sentences and shared her every ambition.", "example_zh": "她把最好的朋友形容為自己的另一個自我——一個能替她說完句子、與她共享每一個抱負的人。"}], "Session 3: Words from VERTO, MISEIN, and Related Roots": [{"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "ambidextrous", "ipa": "ˌæmbɪˋdɛkstrəs", "pos": "adj.", "definition": "able to use both hands with equal skill", "chinese": "兩手同樣靈巧的；雙手萬能的", "example": "The ambidextrous pitcher could throw fastballs equally well with either arm, baffling opposing batters.", "example_zh": "那位雙手同樣靈巧的投手能用任何一隻手臂投出同樣好的快速球，令對方打者無所適從。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "ambidexterity", "ipa": "ˌæmbɪdɛkˋstɛrɪtɪ", "pos": "n.", "definition": "the ability to use both hands equally well", "chinese": "雙手靈巧；兩手都能靈活運用的能力", "example": "Her ambidexterity gave her a significant advantage in both surgery and musical performance.", "example_zh": "她雙手靈巧的能力，使她在外科手術和音樂演奏上都具有顯著的優勢。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "dexterous", "ipa": "ˋdɛkstrəs", "pos": "adj.", "definition": "skillful, adroit", "chinese": "靈巧的；熟練的", "example": "The dexterous jeweler crafted intricate rings with remarkable precision and speed.", "example_zh": "那位靈巧的珠寶匠以驚人的精準度和速度打造出精緻繁複的戒指。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "dexterity", "ipa": "dɛkˋstɛrɪtɪ", "pos": "n.", "definition": "skill, especially with the hands", "chinese": "靈巧；（尤指手部的）熟練技巧", "example": "Years of practice had given the pianist extraordinary dexterity in both hands.", "example_zh": "多年的練習賦予了那位鋼琴家雙手非凡的靈巧技術。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "sinister", "ipa": "ˋsɪnɪstɚ", "pos": "adj.", "definition": "threatening, evil, or dangerous", "chinese": "邪惡的；不祥的；危險的", "example": "There was something sinister about the way he smiled when he heard about his rival's misfortune.", "example_zh": "當他聽聞對手遭逢不幸時所露出的那種笑容，令人感到有些邪惡。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gauche", "ipa": "goʃ", "pos": "adj.", "definition": "socially clumsy, tactless, awkward", "chinese": "不圓滑的；社交上笨拙失禮的", "example": "It was gauche of him to ask about her salary within minutes of meeting her at the reception.", "example_zh": "他在招待會上認識她幾分鐘後就詢問她的薪資，實在是非常失禮。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gaucherie", "ipa": "ˋgoʃərɪ", "pos": "n.", "definition": "an awkward, tactless way of handling situations", "chinese": "社交笨拙；不得體的言行舉止", "example": "His gaucherie at the formal dinner — eating with the wrong fork and speaking with his mouth full — embarrassed the entire table.", "example_zh": "他在正式晚宴上的失禮行為——用錯叉子、滿嘴食物說話——令同桌所有人都尷尬不已。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "adroit", "ipa": "əˋdrɔɪt", "pos": "adj.", "definition": "clever and skillful, especially mentally", "chinese": "機敏的；（尤指思維上）靈活熟練的", "example": "The adroit negotiator managed to reach a compromise that satisfied both parties within a single afternoon.", "example_zh": "那位機敏的談判者在一個下午之內便達成了令雙方都滿意的妥協。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "adroitness", "ipa": "əˋdrɔɪtnɪs", "pos": "n.", "definition": "mental or physical cleverness and skill", "chinese": "機敏；（心智或體能上的）靈巧與技能", "example": "The chess champion's adroitness in spotting her opponent's weaknesses was what set her apart from the rest.", "example_zh": "那位西洋棋冠軍善於發現對手弱點的機敏才是她與眾不同之處。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "anthropology", "ipa": "ˌænθrəˋpɑlədʒɪ", "pos": "n.", "definition": "the study of the development of the human race", "chinese": "人類學；研究人類發展的學科", "example": "Her research in anthropology took her to remote villages in Papua New Guinea to document ancient rituals.", "example_zh": "她的人類學研究帶她前往巴布亞紐幾內亞的偏遠村落，記錄古老的儀式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "anthropologist", "ipa": "ˌænθrəˋpɑlədʒɪst", "pos": "n.", "definition": "a scholar who studies the development of the human race", "chinese": "人類學家；研究人類發展的學者", "example": "The anthropologist spent three years living with a remote tribe to understand their social customs firsthand.", "example_zh": "那位人類學家花了三年時間與一個偏遠部落共同生活，以第一手了解他們的社會習俗。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "philanthropist", "ipa": "fɪˋlænθrəpɪst", "pos": "n.", "definition": "a person who loves mankind and donates to charitable causes", "chinese": "慈善家；熱愛人類並捐助公益事業的人", "example": "The retired industrialist became a celebrated philanthropist, funding schools and hospitals across the region.", "example_zh": "那位退休實業家成為備受讚揚的慈善家，在整個地區資助學校和醫院的建設。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "philanthropy", "ipa": "fɪˋlænθrəpɪ", "pos": "n.", "definition": "love of mankind; charitable giving", "chinese": "博愛；慈善；慈善捐助", "example": "Corporate philanthropy has funded numerous art programs that would otherwise have gone without support.", "example_zh": "企業的慈善捐助資助了許多若無此支持便無以為繼的藝術計畫。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gynecologist", "ipa": "ˌgaɪnɪˋkɑlədʒɪst", "pos": "n.", "definition": "a medical specialist who treats female disorders", "chinese": "婦科醫師；治療女性疾病的醫療專科醫師", "example": "She scheduled her annual checkup with her gynecologist to ensure her reproductive health was in good order.", "example_zh": "她預約了婦科醫師的年度檢查，以確保自己的生殖健康狀況良好。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "gynecology", "ipa": "ˌgaɪnɪˋkɑlədʒɪ", "pos": "n.", "definition": "the medical science dealing with women's health", "chinese": "婦科學；研究女性健康的醫學分科", "example": "Advances in gynecology over the past century have dramatically improved women's reproductive health outcomes.", "example_zh": "過去一個世紀婦科學的進步，大幅改善了女性生殖健康的成果。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "monogamy", "ipa": "məˋnɑgəmɪ", "pos": "n.", "definition": "the custom or practice of being married to only one person at a time", "chinese": "一夫一妻制；一次只與一人結婚的習俗或做法", "example": "Monogamy is the legally recognized form of marriage in most countries around the world.", "example_zh": "一夫一妻制是世界上大多數國家法律認可的婚姻形式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "bigamy", "ipa": "ˋbɪgəmɪ", "pos": "n.", "definition": "the unlawful act of contracting a second marriage while still legally married", "chinese": "重婚；在法律婚姻關係仍存在時再度結婚的違法行為", "example": "He was charged with bigamy after authorities discovered he had married a second woman without divorcing his first wife.", "example_zh": "當局發現他在未與第一任妻子離婚的情況下又與另一名女性結婚後，他被控重婚罪。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polygamy", "ipa": "pəˋlɪgəmɪ", "pos": "n.", "definition": "the custom of having many spouses; plural marriage", "chinese": "多配偶制；擁有多名配偶的習俗", "example": "Polygamy is practiced in certain cultures and is often tied to religious or traditional beliefs.", "example_zh": "多配偶制在某些文化中仍被奉行，通常與宗教或傳統信仰有關。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polygyny", "ipa": "pəˋlɪdʒɪnɪ", "pos": "n.", "definition": "the custom of one man having many wives", "chinese": "一夫多妻制；一名男性擁有多名妻子的習俗", "example": "Polygyny was historically practiced in some societies as a way of forming political alliances between clans.", "example_zh": "一夫多妻制在歷史上曾在某些社會中被奉行，作為在部族之間建立政治聯盟的方式。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "polyandry", "ipa": "ˌpɑlɪˋændrɪ", "pos": "n.", "definition": "the custom of one woman having many husbands", "chinese": "一妻多夫制；一名女性擁有多名丈夫的習俗", "example": "Polyandry is rare globally but has been documented in certain Himalayan communities.", "example_zh": "一妻多夫制在全球範圍內極為罕見，但在某些喜馬拉雅山區社群中有記錄可查。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misanthropy", "ipa": "mɪˋsænθrəpɪ", "pos": "n.", "definition": "hatred of mankind", "chinese": "厭世；對人類的憎恨", "example": "His misanthropy deepened after years of witnessing corruption and cruelty, and he eventually retreated from society entirely.", "example_zh": "在多年目睹腐敗與殘酷之後，他對人類的憎恨日益加深，最終完全遠離了社會。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misogyny", "ipa": "mɪˋsɑdʒɪnɪ", "pos": "n.", "definition": "hatred of women", "chinese": "厭女；對女性的憎恨", "example": "The novel's protagonist confronts systemic misogyny in the workplace and refuses to be silenced.", "example_zh": "小說中的主人公面對職場中系統性的厭女現象，拒絕沉默以對。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "misogamy", "ipa": "mɪˋsɑgəmɪ", "pos": "n.", "definition": "hatred of marriage", "chinese": "厭婚；對婚姻的憎惡", "example": "His misogamy, rooted in a painful divorce, made him reluctant to consider any long-term relationship.", "example_zh": "他的厭婚情緒源於一段痛苦的離婚經歷，使他不願考慮任何長期的感情關係。"}, {"session": "Session 3: Words from VERTO, MISEIN, and Related Roots", "word": "asceticism", "ipa": "əˋsɛtɪˌsɪzəm", "pos": "n.", "definition": "the philosophy and practice of self-denial and austerity", "chinese": "苦行主義；禁欲主義的哲學與實踐", "example": "The philosopher advocated asceticism, arguing that freedom from desire was the path to true happiness.", "example_zh": "那位哲學家提倡苦行主義，主張從欲望中解脫才是通往真正幸福的道路。"}], "Session 4: Medical Specialists": [{"session": "Session 4: Medical Specialists", "word": "internist", "ipa": "ˋɪntɝnɪst", "pos": "n.", "definition": "a physician specializing in internal medicine and diagnosis", "chinese": "內科醫師；專攻內科醫學與診斷的醫師", "example": "The internist ordered a series of blood tests to investigate the cause of the patient's chronic fatigue.", "example_zh": "內科醫師開立了一系列血液檢查，以調查病人長期疲勞的原因。"}, {"session": "Session 4: Medical Specialists", "word": "gynecologist", "ipa": "ˌgaɪnɪˋkɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in female reproductive and sexual disorders", "chinese": "婦科醫師；專治女性生殖及性健康疾病的醫師", "example": "The gynecologist recommended regular screenings to detect any early signs of cervical abnormalities.", "example_zh": "婦科醫師建議定期進行篩查，以早期發現任何子宮頸異常的跡象。"}, {"session": "Session 4: Medical Specialists", "word": "obstetrician", "ipa": "ˌɑbstəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in pregnancy and delivery of babies", "chinese": "產科醫師；專門負責孕期照護及接生的醫師", "example": "The obstetrician monitored the mother's progress throughout the final trimester and delivered the twins safely.", "example_zh": "產科醫師在整個最後孕期追蹤母親的狀況，並安全地接生了這對雙胞胎。"}, {"session": "Session 4: Medical Specialists", "word": "pediatrician", "ipa": "ˌpidɪəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in the treatment of infants and children", "chinese": "小兒科醫師；專門診治嬰幼兒及兒童的醫師", "example": "The pediatrician reassured the worried parents that the child's fever was common and would pass within a day or two.", "example_zh": "小兒科醫師安慰了憂心忡忡的父母，說孩子的發燒是常見的，一兩天內就會退燒。"}, {"session": "Session 4: Medical Specialists", "word": "dermatologist", "ipa": "ˌdɝməˋtɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in skin diseases", "chinese": "皮膚科醫師；專門診治皮膚疾病的醫師", "example": "She visited the dermatologist to have an unusual mole examined before it could develop into anything serious.", "example_zh": "她去看皮膚科醫師，請醫師檢查一顆不尋常的痣，以免發展成嚴重的問題。"}, {"session": "Session 4: Medical Specialists", "word": "ophthalmologist", "ipa": "ˌɑfθælˋmɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in disorders of the eye", "chinese": "眼科醫師；專門診治眼睛疾病的醫師", "example": "The ophthalmologist diagnosed him with early-stage glaucoma and prescribed eye drops to control the pressure.", "example_zh": "眼科醫師診斷出他患有早期青光眼，並開立眼藥水來控制眼壓。"}, {"session": "Session 4: Medical Specialists", "word": "orthopedist", "ipa": "ˌɔrθəˋpidɪst", "pos": "n.", "definition": "a physician specializing in bones, joints, and skeletal deformities", "chinese": "骨科醫師；專門診治骨骼、關節及骨骼畸形的醫師", "example": "The orthopedist recommended physical therapy before considering surgery on the damaged knee joint.", "example_zh": "骨科醫師建議在考慮對受損膝關節進行手術之前，先接受物理治療。"}, {"session": "Session 4: Medical Specialists", "word": "cardiologist", "ipa": "ˌkɑrdɪˋɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in heart and circulatory diseases", "chinese": "心臟科醫師；專門診治心臟及循環系統疾病的醫師", "example": "After the stress test, the cardiologist determined that his arteries showed early signs of blockage.", "example_zh": "在壓力測試之後，心臟科醫師判斷他的動脈出現了早期阻塞的跡象。"}, {"session": "Session 4: Medical Specialists", "word": "neurologist", "ipa": "njʊˋrɑlədʒɪst", "pos": "n.", "definition": "a physician specializing in the brain, spinal cord, and nervous system", "chinese": "神經科醫師；專門診治腦部、脊髓及神經系統的醫師", "example": "The neurologist ordered an MRI scan to determine whether the patient's frequent migraines had a structural cause.", "example_zh": "神經科醫師開立了核磁共振掃描，以確定病人頻繁偏頭痛是否有結構性原因。"}, {"session": "Session 4: Medical Specialists", "word": "psychiatrist", "ipa": "saɪˋkaɪətrɪst", "pos": "n.", "definition": "a physician specializing in mental and emotional disturbances", "chinese": "精神科醫師；專門診治心理及情緒疾患的醫師", "example": "Her psychiatrist adjusted her medication after she reported that the side effects were affecting her daily routine.", "example_zh": "她的精神科醫師在她反映副作用影響日常生活後，調整了她的用藥。"}], "Session 5: Etymology of Medical Terms": [{"session": "Session 5: Etymology of Medical Terms", "word": "intern (interne)", "ipa": "ˋɪntɝn", "pos": "n.", "definition": "a medical graduate serving an apprenticeship inside a hospital", "chinese": "實習醫師；在醫院內服實習期的醫學院畢業生", "example": "The intern worked grueling 36-hour shifts as part of her training in the emergency department.", "example_zh": "那位實習醫師在急診部門的培訓中，要輪值折磨人的三十六小時班次。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "obstetrics", "ipa": "əbˋstɛtrɪks", "pos": "n.", "definition": "the medical specialty dealing with pregnancy and childbirth", "chinese": "產科學；處理妊娠與分娩的醫學專科", "example": "She chose to specialize in obstetrics because she found the experience of bringing new life into the world deeply rewarding.", "example_zh": "她選擇專攻產科學，因為她覺得將新生命帶到世界上的這份體驗令人深感充實。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pediatrics", "ipa": "ˌpidɪˋætrɪks", "pos": "n.", "definition": "the medical specialty dealing with the health of infants and children", "chinese": "小兒科學；處理嬰幼兒及兒童健康的醫學專科", "example": "Pediatrics requires not only medical expertise but also the patience to communicate with young patients and anxious parents.", "example_zh": "小兒科學不僅需要醫學專業知識，還需要有耐心與幼小病患及焦慮的家長溝通。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pedagogy", "ipa": "ˋpɛdəˌgɑdʒɪ", "pos": "n.", "definition": "the principles and methods of teaching", "chinese": "教育學；教學法；教學的原則與方法", "example": "The teacher's innovative pedagogy, which used games and storytelling, kept students engaged and motivated throughout the year.", "example_zh": "那位老師運用遊戲和說故事的創新教學法，使學生全年都保持專注與學習動力。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pedagogue", "ipa": "ˋpɛdəˌgɑg", "pos": "n.", "definition": "a narrow-minded, dogmatic, old-fashioned teacher (negative connotation)", "chinese": "迂腐的教師；思想守舊、教條主義的老師（帶貶義）", "example": "The professor was widely regarded as a stiff pedagogue who recited the same lectures from yellowed notes year after year.", "example_zh": "那位教授被廣泛視為一個古板的迂腐教師，年復一年地從發黃的講稿中背誦同樣的課文。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "demagogue", "ipa": "ˋdɛməˌgɑg", "pos": "n.", "definition": "a politician who stirs up the masses with wild oratory for personal gain", "chinese": "煽動家；以激情演說煽動群眾謀取私利的政客", "example": "The demagogue exploited economic anxiety, whipping up resentment against immigrants to secure votes.", "example_zh": "那個煽動家利用民眾的經濟焦慮，激起對移民的憤恨以換取選票。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "demagoguery", "ipa": "ˋdɛməˌgɑgərɪ", "pos": "n.", "definition": "the practice of arousing public discontent for selfish political purposes", "chinese": "煽動政治；為一己私利而煽動公眾不滿的行為", "example": "Political commentators warned that the campaign had crossed the line from debate into outright demagoguery.", "example_zh": "政治評論員警告說，這場競選活動已從辯論越界為赤裸裸的煽動政治。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "dermatology", "ipa": "ˌdɝməˋtɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with skin diseases", "chinese": "皮膚科學；處理皮膚疾病的醫學專科", "example": "Dermatology has advanced considerably, with new treatments offering relief for conditions like psoriasis and eczema.", "example_zh": "皮膚科學已有長足進步，新的治療方法為牛皮癬和濕疹等病症帶來了緩解的希望。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "hypodermic", "ipa": "ˌhaɪpəˋdɝmɪk", "pos": "adj.", "definition": "penetrating under the skin", "chinese": "皮下的；穿入皮膚下層的", "example": "The nurse administered the vaccine via a hypodermic injection in the patient's upper arm.", "example_zh": "護士在病人的上臂進行皮下注射，施打了疫苗。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "epidermis", "ipa": "ˌɛpɪˋdɝmɪs", "pos": "n.", "definition": "the outermost layer of the skin", "chinese": "表皮；皮膚的最外層", "example": "A sunburn damages the epidermis and, in severe cases, can destroy the deeper layers of skin tissue.", "example_zh": "曬傷會損傷表皮，嚴重時甚至會破壞更深層的皮膚組織。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "taxidermist", "ipa": "ˋtæksɪˌdɝmɪst", "pos": "n.", "definition": "one who prepares, stuffs, and mounts the skins of animals", "chinese": "動物標本剝製師；負責處理、填充和裝架動物皮毛的人", "example": "The natural history museum hired a skilled taxidermist to restore their aging collection of mounted animals.", "example_zh": "自然史博物館聘請了一位技藝高超的標本剝製師，修復他們那批日漸老化的動物標本館藏。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "pachyderm", "ipa": "ˋpækɪˌdɝm", "pos": "n.", "definition": "an animal with unusually thick skin, such as an elephant", "chinese": "厚皮動物；皮膚異常厚實的動物，如大象", "example": "The elephant, a classic pachyderm, relies on its thick skin as protection against insects and the harsh sun.", "example_zh": "大象是典型的厚皮動物，牠依賴厚實的皮膚抵禦蟲蟲叮咬和烈日曝曬。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "dermatitis", "ipa": "ˌdɝməˋtaɪtɪs", "pos": "n.", "definition": "inflammation, irritation, or infection of the skin", "chinese": "皮膚炎；皮膚的發炎、刺激或感染", "example": "She developed contact dermatitis after switching to a new brand of laundry detergent that contained harsh chemicals.", "example_zh": "她在改用一款含有刺激性化學物質的新品牌洗衣精後，出現了接觸性皮膚炎。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "ophthalmology", "ipa": "ˌɑfθælˋmɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with eye disorders", "chinese": "眼科學；處理眼睛疾病的醫學專科", "example": "Ophthalmology has benefited greatly from laser technology, making procedures like LASIK widely available.", "example_zh": "眼科學從雷射技術中受益匪淺，使LASIK等手術得以廣泛普及。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "oculist", "ipa": "ˋɑkjʊlɪst", "pos": "n.", "definition": "an earlier term for an eye doctor (ophthalmologist)", "chinese": "眼科醫師（舊稱）；眼科醫師的早期稱謂", "example": "In the early twentieth century, patients would visit an oculist for eye examinations, a title that has since been replaced by ophthalmologist.", "example_zh": "在二十世紀初，病人會去看「oculist」進行眼科檢查，這個稱謂後來被「ophthalmologist」所取代。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "ocular", "ipa": "ˋɑkjʊlɚ", "pos": "adj.", "definition": "relating to the eye", "chinese": "眼睛的；與眼睛相關的", "example": "The patient reported several ocular symptoms, including blurred vision and increased sensitivity to light.", "example_zh": "病人反映了幾項眼睛症狀，包括視力模糊和對光線的敏感度增加。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "monocle", "ipa": "ˋmɑnɪkl", "pos": "n.", "definition": "a lens worn over one eye", "chinese": "單片眼鏡；戴在單眼上的鏡片", "example": "The Victorian gentleman peered at the letter through his monocle, raising an eyebrow at its contents.", "example_zh": "那位維多利亞時代的紳士透過他的單片眼鏡審視那封信，對信中的內容揚起了一道眉毛。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "binoculars", "ipa": "bɪˋnɑkjʊlɚz", "pos": "n.", "definition": "field glasses that increase the range of vision for both eyes", "chinese": "雙筒望遠鏡；增大雙眼視野範圍的野外望遠鏡", "example": "She raised her binoculars and spotted the rare bird perched at the top of a distant pine tree.", "example_zh": "她舉起雙筒望遠鏡，看見那隻罕見的鳥棲息在遠處一棵松樹的頂端。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "inoculate", "ipa": "ɪˋnɑkjʊˌlet", "pos": "v.", "definition": "to introduce a serum through the skin to protect against disease", "chinese": "接種；將血清注入皮下以預防疾病", "example": "It is recommended that travelers inoculate themselves against typhoid and hepatitis A before visiting certain regions.", "example_zh": "建議旅行者在前往某些地區之前，接種傷寒和甲型肝炎疫苗。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optometrist", "ipa": "ɑpˋtɑmɪtrɪst", "pos": "n.", "definition": "a practitioner who measures vision and prescribes glasses (not a physician)", "chinese": "驗光師；測量視力並開具眼鏡處方的執業者（非醫師）", "example": "The optometrist discovered that her near-sightedness had worsened significantly since her last visit two years ago.", "example_zh": "驗光師發現，與兩年前上次就診相比，她的近視程度已明顯加深。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optician", "ipa": "ɑpˋtɪʃən", "pos": "n.", "definition": "a practitioner who grinds lenses and fills eyeglass prescriptions", "chinese": "配鏡師；研磨鏡片並配製眼鏡處方的執業者", "example": "She took the optometrist's prescription to the optician, who prepared her new glasses within the hour.", "example_zh": "她拿著驗光師開的處方前往配鏡師處，配鏡師在一小時之內就為她準備好了新眼鏡。"}, {"session": "Session 5: Etymology of Medical Terms", "word": "optometry", "ipa": "ɑpˋtɑmɪtrɪ", "pos": "n.", "definition": "the practice of measuring vision", "chinese": "驗光學；測量視力的執業學科", "example": "After completing his degree in optometry, he opened a private practice in his hometown.", "example_zh": "取得驗光學學位後，他在家鄉開設了私人診所。"}], "Session 6: More Medical Etymology": [{"session": "Session 6: More Medical Etymology", "word": "orthopedics", "ipa": "ˌɔrθəˋpidɪks", "pos": "n.", "definition": "the medical specialty dealing with deformities and diseases of bones and joints", "chinese": "骨科學；處理骨骼與關節畸形及疾病的醫學專科", "example": "Orthopedics has been transformed by advances in minimally invasive surgery, allowing patients to recover far more quickly.", "example_zh": "骨科學因微創手術的進步而大為改觀，使病人能更快速地康復。"}, {"session": "Session 6: More Medical Etymology", "word": "orthodontia", "ipa": "ˌɔrθəˋdɑnʃə", "pos": "n.", "definition": "the dental specialty of straightening teeth", "chinese": "矯正牙科學；將牙齒矯正排列整齊的牙科專科", "example": "Her orthodontia began at age twelve and concluded three years later when her braces were finally removed.", "example_zh": "她的牙齒矯正治療在十二歲開始，三年後終於拆除牙套，治療就此結束。"}, {"session": "Session 6: More Medical Etymology", "word": "orthodontist", "ipa": "ˌɔrθəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in straightening teeth", "chinese": "牙齒矯正專科醫師；專門矯正牙齒排列的牙醫", "example": "The orthodontist recommended clear aligners instead of traditional metal braces for a more discreet treatment.", "example_zh": "牙齒矯正專科醫師建議使用透明牙套而非傳統金屬牙套，以達到更隱形的治療效果。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiology", "ipa": "ˌkɑrdɪˋɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with the heart", "chinese": "心臟科學；處理心臟疾病的醫學專科", "example": "Cardiology has made remarkable strides with the development of stents and minimally invasive heart procedures.", "example_zh": "心臟科學隨著支架和微創心臟手術的發展，取得了顯著的進步。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiac", "ipa": "ˋkɑrdɪæk", "pos": "adj.", "definition": "relating to the heart", "chinese": "心臟的；與心臟相關的", "example": "The paramedics worked quickly to stabilize the patient who had suffered a cardiac arrest on the street.", "example_zh": "急救人員迅速採取行動，穩定了在街上心臟驟停的病人的狀況。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiogram", "ipa": "ˋkɑrdɪəˌgræm", "pos": "n.", "definition": "an electrically produced record of the heartbeat", "chinese": "心電圖；以電子方式記錄心跳的圖形", "example": "The doctor studied the cardiogram carefully, noting the irregular spikes that indicated an abnormal rhythm.", "example_zh": "醫師仔細研讀了心電圖，注意到顯示心律異常的不規則波峰。"}, {"session": "Session 6: More Medical Etymology", "word": "cardiograph", "ipa": "ˋkɑrdɪəˌgræf", "pos": "n.", "definition": "the instrument that produces a cardiogram", "chinese": "心電圖儀；產生心電圖的儀器", "example": "The cardiograph was attached to the patient's chest with adhesive electrodes to monitor his heart activity during surgery.", "example_zh": "心電圖儀透過黏性電極貼附在病人胸口，在手術期間監測他的心臟活動。"}, {"session": "Session 6: More Medical Etymology", "word": "neurology", "ipa": "njʊˋrɑlədʒɪ", "pos": "n.", "definition": "the medical specialty dealing with the nervous system", "chinese": "神經科學；處理神經系統疾病的醫學專科", "example": "Neurology encompasses a wide range of conditions, from migraines and epilepsy to Parkinson's disease and multiple sclerosis.", "example_zh": "神經科學涵蓋廣泛的疾病，從偏頭痛和癲癇到帕金森氏症和多發性硬化症。"}, {"session": "Session 6: More Medical Etymology", "word": "neuralgia", "ipa": "njʊˋrældʒɪə", "pos": "n.", "definition": "acute pain along the nerves and their branches", "chinese": "神經痛；沿神經及其分支產生的劇烈疼痛", "example": "The trigeminal neuralgia caused him such intense facial pain that even a gentle touch on the cheek triggered a stabbing sensation.", "example_zh": "三叉神經痛使他的臉部疼痛劇烈，甚至輕輕觸碰臉頰都會引發刺痛感。"}, {"session": "Session 6: More Medical Etymology", "word": "neuritis", "ipa": "njʊˋraɪtɪs", "pos": "n.", "definition": "inflammation of the nerves", "chinese": "神經炎；神經的發炎病症", "example": "The physician diagnosed her with peripheral neuritis after she reported numbness and tingling in both hands.", "example_zh": "在她反映雙手麻木及刺痛後，醫師診斷她患有周邊神經炎。"}, {"session": "Session 6: More Medical Etymology", "word": "neurosis", "ipa": "njʊˋrosɪs", "pos": "n.", "definition": "an emotional disturbance characterized by excessive use of energy for unproductive purposes", "chinese": "神經症；以過度消耗精力於無益事物為特徵的情緒障礙", "example": "His anxiety neurosis manifested in compulsive rituals that consumed hours of his day and left him exhausted.", "example_zh": "他的焦慮型神經症表現為強迫性的重複行為，每天耗費他數小時的時間，令他精疲力竭。"}, {"session": "Session 6: More Medical Etymology", "word": "neurotic", "ipa": "njʊˋrɑtɪk", "pos": "n. / adj.", "definition": "a person suffering from neurosis; relating to neurosis", "chinese": "神經症患者；患有神經症的（人）", "example": "She had always been somewhat neurotic about cleanliness, washing her hands far more than was necessary.", "example_zh": "她一向對清潔有些神經質，洗手的次數遠遠超過必要。"}, {"session": "Session 6: More Medical Etymology", "word": "psychosis", "ipa": "saɪˋkosɪs", "pos": "n.", "definition": "a severe mental disorder in which contact with reality is lost", "chinese": "精神病；喪失與現實接觸的嚴重心理疾患", "example": "The patient was admitted to the psychiatric ward after experiencing a sudden psychosis that included vivid hallucinations.", "example_zh": "病人在出現包括生動幻覺在內的突發性精神病後，被收入精神科病房。"}, {"session": "Session 6: More Medical Etymology", "word": "psychotic", "ipa": "saɪˋkɑtɪk", "pos": "n. / adj.", "definition": "a person suffering from psychosis; relating to psychosis", "chinese": "精神病患者；精神病的（人）", "example": "During the psychotic episode, the patient was unable to distinguish between what was real and what was imagined.", "example_zh": "在精神病發作期間，病人無法區分現實與想像之間的界限。"}, {"session": "Session 6: More Medical Etymology", "word": "psychiatry", "ipa": "saɪˋkaɪətrɪ", "pos": "n.", "definition": "the medical specialty dealing with mental and emotional disturbances", "chinese": "精神科學；處理心理及情緒疾患的醫學專科", "example": "The stigma surrounding psychiatry has decreased significantly as public awareness of mental health has grown.", "example_zh": "隨著公眾對心理健康認識的提升，圍繞精神科學的污名化現象已大為減少。"}, {"session": "Session 6: More Medical Etymology", "word": "geriatrics", "ipa": "ˌdʒɛrɪˋætrɪks", "pos": "n.", "definition": "the medical specialty dealing with the health needs of the elderly", "chinese": "老年科學；處理老年人健康需求的醫學專科", "example": "As the population ages, the demand for physicians trained in geriatrics continues to grow rapidly.", "example_zh": "隨著人口老齡化，對受過老年科學訓練的醫師需求持續快速增長。"}, {"session": "Session 6: More Medical Etymology", "word": "geriatrician", "ipa": "ˌdʒɛrɪəˋtrɪʃən", "pos": "n.", "definition": "a physician specializing in the medical care of elderly patients", "chinese": "老年科醫師；專門診治老年病患的醫師", "example": "The geriatrician coordinated care for the ninety-year-old patient, balancing multiple medications and chronic conditions.", "example_zh": "老年科醫師為這位九十歲的病人統籌照護，在多種藥物和慢性病之間取得平衡。"}], "Session 7: Various Practitioners": [{"session": "Session 7: Various Practitioners", "word": "psychologist", "ipa": "saɪˋkɑlədʒɪst", "pos": "n.", "definition": "a specialist who studies human behavior and mental processes", "chinese": "心理學家；研究人類行為與心理過程的專家", "example": "The school psychologist worked closely with teachers and parents to support students struggling with anxiety.", "example_zh": "學校心理學家與教師和家長密切合作，支持正在對抗焦慮的學生。"}, {"session": "Session 7: Various Practitioners", "word": "psychoanalyst", "ipa": "ˌsaɪkoˋænəlɪst", "pos": "n.", "definition": "a practitioner who uses Freudian techniques to probe the unconscious", "chinese": "精神分析師；運用佛洛伊德技術探索潛意識的執業者", "example": "The psychoanalyst encouraged her patient to describe his recurring dreams as a way of uncovering repressed memories.", "example_zh": "精神分析師鼓勵病人描述反覆出現的夢境，以此作為挖掘被壓抑記憶的方式。"}, {"session": "Session 7: Various Practitioners", "word": "orthodontist", "ipa": "ˌɔrθəˋdɑntɪst", "pos": "n.", "definition": "a dentist who specializes in straightening teeth", "chinese": "牙齒矯正專科醫師；專門矯正牙齒排列的牙醫", "example": "The orthodontist told the teenager that she would need to wear braces for at least eighteen months to correct her bite.", "example_zh": "牙齒矯正專科醫師告訴那位青少年，她需要佩戴牙套至少十八個月才能矯正咬合。"}, {"session": "Session 7: Various Practitioners", "word": "optometrist", "ipa": "ɑpˋtɑmɪtrɪst", "pos": "n.", "definition": "a practitioner who measures vision and prescribes glasses", "chinese": "驗光師；測量視力並開具眼鏡處方的執業者", "example": "The optometrist noticed that the child's vision had declined sharply and advised limiting screen time.", "example_zh": "驗光師注意到那個孩子的視力急劇下降，建議減少螢幕使用時間。"}, {"session": "Session 7: Various Practitioners", "word": "optician", "ipa": "ɑpˋtɪʃən", "pos": "n.", "definition": "one who grinds lenses and sells optical goods", "chinese": "配鏡師；研磨鏡片並銷售眼鏡產品的人", "example": "The optician carefully fitted the new frames to ensure they sat comfortably on the bridge of her nose.", "example_zh": "配鏡師仔細調整了新鏡架，確保它舒適地架在她的鼻樑上。"}, {"session": "Session 7: Various Practitioners", "word": "osteopath", "ipa": "ˋɑstɪəˌpæθ", "pos": "n.", "definition": "a practitioner who uses massage, manipulation, and standard medical procedures to treat illness", "chinese": "整骨師；運用按摩、徒手操作及標準醫療程序治療疾病的執業者", "example": "After weeks of lower back pain, she visited an osteopath who identified a misalignment in her lumbar spine.", "example_zh": "在腰背疼痛數週後，她去看了整骨師，醫師發現她的腰椎存在錯位問題。"}, {"session": "Session 7: Various Practitioners", "word": "chiropractor", "ipa": "ˋkaɪrəˌpræktɚ", "pos": "n.", "definition": "a practitioner who manipulates the articulations of the spine to relieve ailments", "chinese": "脊骨神經科醫師；透過操作脊椎關節來緩解病痛的執業者", "example": "The chiropractor performed a spinal adjustment that provided immediate relief from his chronic neck stiffness.", "example_zh": "脊骨神經科醫師進行了脊椎矯正，立即緩解了他長期的頸部僵硬。"}, {"session": "Session 7: Various Practitioners", "word": "podiatrist", "ipa": "poˋdaɪətrɪst", "pos": "n.", "definition": "a specialist in the care and treatment of minor foot ailments", "chinese": "足病醫師；專門照護和治療輕微足部疾病的專科醫師", "example": "The marathon runner saw a podiatrist about the painful blisters and calluses that had developed after months of training.", "example_zh": "那位馬拉松跑者因數月訓練後出現疼痛的水泡和繭，前去看了足病醫師。"}, {"session": "Session 7: Various Practitioners", "word": "graphologist", "ipa": "græˋfɑlədʒɪst", "pos": "n.", "definition": "one who analyzes handwriting to determine character or personality", "chinese": "筆跡學家；透過分析筆跡來判斷性格或個性的人", "example": "The graphologist examined the letters and concluded that the writer showed traits of perfectionism and emotional sensitivity.", "example_zh": "筆跡學家檢視了那些信件，得出結論認為筆者具有完美主義傾向和情感敏感的特質。"}, {"session": "Session 7: Various Practitioners", "word": "gerontologist", "ipa": "ˌdʒɛrənˋtɑlədʒɪst", "pos": "n.", "definition": "a social scientist who deals with the non-medical problems of the elderly", "chinese": "老年學家；處理老年人非醫療性問題的社會科學家", "example": "The gerontologist studied how retirement affected seniors' sense of purpose and social connection.", "example_zh": "那位老年學家研究退休如何影響老年人的使命感與社交連結。"}], "Session 8: Words Related to \"Psyche\"": [{"session": "Session 8: Words Related to \"Psyche\"", "word": "psychology", "ipa": "saɪˋkɑlədʒɪ", "pos": "n.", "definition": "the study of human behavior and mental processes", "chinese": "心理學；研究人類行為與心理過程的學科", "example": "Her undergraduate studies in psychology gave her valuable insight into the motivations behind human decision-making.", "example_zh": "她大學時期的心理學學習，使她對人類決策背後的動機有了寶貴的洞察。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychological", "ipa": "ˌsaɪkəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to the study of behavior and mental processes", "chinese": "心理學的；心理上的", "example": "The trauma had left deep psychological scars that required years of therapy to heal.", "example_zh": "那次創傷留下了深刻的心理創傷，需要多年的治療才能癒合。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psyche", "ipa": "ˋsaɪkɪ", "pos": "n.", "definition": "the mind; one's inner or mental life", "chinese": "心靈；心智；內在精神生活", "example": "The novel probes the psyche of a war veteran struggling to reconcile his experiences with civilian life.", "example_zh": "這部小說深入探索一位試圖將戰場經歷與平民生活調和的退伍軍人的內心世界。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychic", "ipa": "ˋsaɪkɪk", "pos": "adj.", "definition": "pertaining to phenomena that cannot be explained in physical terms; extrasensory", "chinese": "超自然的；超感官的；無法以物理方式解釋的現象", "example": "She claimed to have psychic abilities, insisting she could sense the emotional history of objects by touching them.", "example_zh": "她聲稱自己擁有超自然能力，堅持說她能透過觸碰物品來感知其情感歷史。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopathic", "ipa": "ˌsaɪkəˋpæθɪk", "pos": "adj.", "definition": "describing someone with a severe mental or emotional disorder", "chinese": "精神病態的；具有嚴重心理或情感障礙的", "example": "The forensic psychologist testified that the defendant displayed psychopathic tendencies, including a lack of remorse.", "example_zh": "法醫心理學家作證說，被告表現出精神病態傾向，包括缺乏悔意。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopathy", "ipa": "saɪˋkɑpəθɪ", "pos": "n.", "definition": "a severe mental disorder characterized by antisocial behavior", "chinese": "精神病態；以反社會行為為特徵的嚴重心理障礙", "example": "Researchers have identified certain neurological patterns that may be associated with the development of psychopathy.", "example_zh": "研究人員已發現某些可能與精神病態發展有關的神經學模式。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychopath", "ipa": "ˋsaɪkəˌpæθ", "pos": "n.", "definition": "a person lacking an inner moral censor; often commits antisocial acts", "chinese": "精神病態者；缺乏內在道德約束、常犯反社會行為的人", "example": "The documentary examined the question of whether a psychopath can genuinely change with the right treatment.", "example_zh": "這部紀錄片探討了一個問題：精神病態者是否能透過適當的治療真正改變。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "sociopath", "ipa": "ˋsoʃɪəˌpæθ", "pos": "n.", "definition": "a person with no social conscience; antisocial personality", "chinese": "反社會人格者；缺乏社會良知、具有反社會人格的人", "example": "A sociopath may appear charming on the surface but is fundamentally indifferent to the feelings and rights of others.", "example_zh": "反社會人格者表面上可能顯得迷人，但本質上對他人的感受和權利漠然置之。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychosomatic", "ipa": "ˌsaɪkosəˋmætɪk", "pos": "adj.", "definition": "describing the powerful influence of the mind on bodily disease", "chinese": "心身症的；描述心理對身體疾病強大影響的", "example": "The doctor suggested that her recurring headaches might be psychosomatic, triggered by stress rather than any physical cause.", "example_zh": "醫師建議，她反覆出現的頭痛可能是心身症，是由壓力而非任何生理原因所引發的。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychoanalysis", "ipa": "ˌsaɪkoəˋnæləsɪs", "pos": "n.", "definition": "a method of psychological therapy using Freudian techniques", "chinese": "精神分析；運用佛洛伊德技術的心理治療方法", "example": "Psychoanalysis involves exploring the unconscious mind through free association, dream interpretation, and discussion of past experiences.", "example_zh": "精神分析透過自由聯想、夢的詮釋及討論過往經歷，來探索潛意識的心靈世界。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychoanalytic", "ipa": "ˌsaɪkoˌænəˋlɪtɪk", "pos": "adj.", "definition": "pertaining to psychoanalysis", "chinese": "精神分析的；與精神分析相關的", "example": "The therapist used a psychoanalytic approach to help her client uncover the childhood experiences underlying her fear of abandonment.", "example_zh": "治療師採用精神分析方法，幫助當事人發現其遺棄恐懼背後的童年經歷。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychogenic", "ipa": "ˌsaɪkəˋdʒɛnɪk", "pos": "adj.", "definition": "originating in the mind or emotions", "chinese": "心因性的；起源於心理或情緒的", "example": "The physician concluded that the patient's paralysis was psychogenic, with no detectable neurological damage.", "example_zh": "醫師得出結論，病人的癱瘓是心因性的，沒有可檢測出的神經系統損傷。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapy", "ipa": "ˌsaɪkoˋθɛrəpɪ", "pos": "n.", "definition": "general term for psychological treatment of emotional disorders", "chinese": "心理治療；情緒疾患的心理治療之統稱", "example": "After the loss of her husband, she found psychotherapy invaluable in helping her process her grief and rebuild her life.", "example_zh": "在失去丈夫後，她發現心理治療對她處理悲傷、重建生活非常有幫助。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapist", "ipa": "ˌsaɪkoˋθɛrəpɪst", "pos": "n.", "definition": "a practitioner who provides psychological treatment", "chinese": "心理治療師；提供心理治療的執業者", "example": "The psychotherapist helped the couple identify destructive communication patterns and develop healthier ways of resolving conflict.", "example_zh": "心理治療師幫助這對夫婦找出破壞性的溝通模式，並培養更健康的解決衝突方式。"}, {"session": "Session 8: Words Related to \"Psyche\"", "word": "psychotherapeutic", "ipa": "ˌsaɪkoˌθɛrəˋpjutɪk", "pos": "adj.", "definition": "pertaining to the treatment of mental or emotional disorders", "chinese": "心理治療的；與治療心理或情緒疾患相關的", "example": "The hospital introduced new psychotherapeutic programs for veterans dealing with post-traumatic stress disorder.", "example_zh": "醫院為患有創傷後壓力症候群的退伍軍人引入了新的心理治療計畫。"}], "Session 9: Dental Specialists and Related Words": [{"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontist", "ipa": "ˌpidəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in children's teeth", "chinese": "兒童牙科醫師；專門診治兒童牙齒的牙科醫師", "example": "The pedodontist created a fun, colorful office environment to help young patients feel less anxious about dental visits.", "example_zh": "兒童牙科醫師打造了充滿活力、色彩繽紛的診所環境，幫助小病患對看牙感到較不緊張。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontia", "ipa": "ˌpidəˋdɑnʃə", "pos": "n.", "definition": "the specialty of child dentistry", "chinese": "兒童牙科學；兒童牙科的專科領域", "example": "Pedodontia emphasizes preventive care, teaching children proper brushing habits from an early age.", "example_zh": "兒童牙科學強調預防性照護，從小教導孩童正確的刷牙習慣。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "pedodontic", "ipa": "ˌpidəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to child dentistry", "chinese": "兒童牙科的；與兒童牙科相關的", "example": "The clinic opened a new pedodontic wing staffed entirely by specialists trained to work with young patients.", "example_zh": "診所新開設了一個兒童牙科專區，全部由受過訓練、專門服務幼小病患的專科醫師駐診。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontist", "ipa": "ˌpɛrɪəˋdɑntɪst", "pos": "n.", "definition": "a gum specialist", "chinese": "牙周科醫師；牙齦疾病的專科醫師", "example": "The periodontist performed a deep cleaning procedure to remove the buildup of tartar below the gum line.", "example_zh": "牙周科醫師進行了深層清潔手術，清除牙齦線以下積累的牙結石。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontia", "ipa": "ˌpɛrɪəˋdɑnʃə", "pos": "n.", "definition": "the specialty of treating gum diseases", "chinese": "牙周科學；治療牙齦疾病的專科領域", "example": "Advances in periodontia have made it possible to treat severe gum disease with minimal invasiveness.", "example_zh": "牙周科學的進步使得以最小侵入性治療嚴重牙齦疾病成為可能。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "periodontic", "ipa": "ˌpɛrɪəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to gum treatment", "chinese": "牙周的；與牙齦治療相關的", "example": "Her dentist referred her to a specialist for periodontic treatment after identifying early signs of gum recession.", "example_zh": "她的牙醫在發現早期牙齦萎縮跡象後，將她轉介給專科醫師進行牙周治療。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontist", "ipa": "ˌɛndəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in root-canal therapy and treatment of the tooth pulp", "chinese": "牙髓科醫師；專門進行根管治療和牙髓處置的牙科醫師", "example": "When the infection reached the pulp of the tooth, her dentist referred her to an endodontist for a root canal.", "example_zh": "當感染蔓延至牙髓時，她的牙醫將她轉介給牙髓科醫師進行根管治療。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontia", "ipa": "ˌɛndəˋdɑnʃə", "pos": "n.", "definition": "the dental specialty involving the pulp and root canal", "chinese": "牙髓科學；涉及牙髓和根管的牙科專科", "example": "Endodontia focuses on saving teeth that might otherwise need to be extracted due to deep decay or infection.", "example_zh": "牙髓科學致力於保留那些因深度蛀牙或感染而否則需要拔除的牙齒。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "endodontic", "ipa": "ˌɛndəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to root-canal treatment", "chinese": "根管治療的；與根管治療相關的", "example": "The endodontic procedure took less than an hour and relieved the severe toothache he had been suffering for days.", "example_zh": "根管治療手術不到一小時便完成，緩解了他多日來忍受的劇烈牙痛。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontist", "ipa": "ˌɛksəˋdɑntɪst", "pos": "n.", "definition": "a dentist specializing in tooth extraction", "chinese": "拔牙科醫師；專門從事牙齒拔除的牙科醫師", "example": "The oral surgeon, who also practiced as an exodontist, removed all four wisdom teeth under general anesthesia.", "example_zh": "那位同時擔任拔牙科醫師的口腔外科醫師在全身麻醉下拔除了所有四顆智齒。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontia", "ipa": "ˌɛksəˋdɑnʃə", "pos": "n.", "definition": "the specialty of tooth extraction", "chinese": "拔牙科學；牙齒拔除的牙科專科領域", "example": "Exodontia is one of the oldest dental procedures, practiced for centuries before modern anesthetics were developed.", "example_zh": "拔牙科學是最古老的牙科手術之一，早在現代麻醉藥發明之前就已實行了數百年。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "exodontic", "ipa": "ˌɛksəˋdɑntɪk", "pos": "adj.", "definition": "pertaining to tooth extraction", "chinese": "拔牙的；與牙齒拔除相關的", "example": "The student's oral surgery rotation covered several exodontic techniques for the removal of impacted teeth.", "example_zh": "那名學生的口腔外科輪訓涵蓋了數種拔除阻生齒的拔牙技術。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "thermometer", "ipa": "θɚˋmɑmɪtɚ", "pos": "n.", "definition": "an instrument that measures heat", "chinese": "溫度計；測量溫度的儀器", "example": "The nurse placed the thermometer under the child's tongue and confirmed he had a temperature of 38.5 degrees.", "example_zh": "護士將溫度計放在孩子的舌頭下，確認他的體溫為38.5度。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "barometer", "ipa": "bəˋrɑmɪtɚ", "pos": "n.", "definition": "an instrument that measures atmospheric pressure", "chinese": "氣壓計；測量大氣壓力的儀器", "example": "The falling reading on the barometer warned the sailors that a storm was likely to arrive within hours.", "example_zh": "氣壓計上下降的讀數警告水手們，暴風雨可能在數小時內到來。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "barometric", "ipa": "ˌbærəˋmɛtrɪk", "pos": "adj.", "definition": "pertaining to atmospheric pressure measurement", "chinese": "氣壓的；與大氣壓力測量相關的", "example": "Meteorologists noted a sharp drop in barometric pressure as the tropical storm approached the coast.", "example_zh": "氣象學家在熱帶風暴逼近海岸時，注意到氣壓急劇下降。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "sphygmomanometer", "ipa": "ˌsfɪgmoməˋnɑmɪtɚ", "pos": "n.", "definition": "a device for measuring blood pressure", "chinese": "血壓計；測量血壓的裝置", "example": "The nurse wrapped the cuff of the sphygmomanometer around the patient's arm and listened with a stethoscope.", "example_zh": "護士將血壓計的袖帶纏在病人的手臂上，並用聽診器聆聽。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "osteopathy", "ipa": "ˌɑstɪˋɑpəθɪ", "pos": "n.", "definition": "the practice and theory of osteopathic medicine", "chinese": "整骨療法；整骨醫學的理論與實踐", "example": "Osteopathy treats the body as an integrated whole, addressing structural and functional problems through manual techniques.", "example_zh": "整骨療法將身體視為一個整體，透過徒手技術處理結構性和功能性問題。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "osteopathic", "ipa": "ˌɑstɪəˋpæθɪk", "pos": "adj.", "definition": "pertaining to osteopathic medicine", "chinese": "整骨醫學的；與整骨療法相關的", "example": "The osteopathic physician combined spinal manipulation with conventional medical treatment to address the patient's chronic pain.", "example_zh": "整骨醫師結合脊椎矯正與傳統醫療來處理病人的慢性疼痛。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podiatry", "ipa": "poˋdaɪətrɪ", "pos": "n.", "definition": "the treatment of foot ailments", "chinese": "足病學；治療足部疾病的醫療專科", "example": "Podiatry has become increasingly important for diabetic patients, who are at higher risk of developing serious foot complications.", "example_zh": "足病學對糖尿病患者越來越重要，因為他們罹患嚴重足部併發症的風險較高。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podiatric", "ipa": "ˌpoˋdaɪætrɪk", "pos": "adj.", "definition": "pertaining to foot care", "chinese": "足部照護的；與足病學相關的", "example": "The athlete received regular podiatric care to manage the stress fractures and tendon injuries common in long-distance runners.", "example_zh": "那位運動員定期接受足部照護治療，以處理長跑運動員常見的應力性骨折和肌腱損傷。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "octopus", "ipa": "ˋɑktəpəs", "pos": "n.", "definition": "an eight-armed sea creature", "chinese": "章魚；有八條觸手的海洋生物", "example": "The octopus squeezed its boneless body through a tiny gap in the aquarium tank to reach the crabs in the neighboring tank.", "example_zh": "章魚把牠無骨的身體擠過水族箱隔板上的一個小縫隙，以抵達鄰近水槽中的螃蟹。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "platypus", "ipa": "ˋplætɪpəs", "pos": "n.", "definition": "an egg-laying mammal with webbed feet and a duck's bill", "chinese": "鴨嘴獸；一種有蹼足和鴨嘴、能產卵的哺乳動物", "example": "The platypus is one of the few venomous mammals in the world, capable of delivering a painful sting with its hind spur.", "example_zh": "鴨嘴獸是世界上少數有毒的哺乳動物之一，能用後腿上的毒刺給予痛苦的刺傷。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "podium", "ipa": "ˋpodiəm", "pos": "n.", "definition": "a speaker's platform", "chinese": "講台；演講者站立的台架", "example": "The award winner stepped up to the podium, took a deep breath, and began her acceptance speech.", "example_zh": "獲獎者走上講台，深吸一口氣，開始了她的得獎感言。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "tripod", "ipa": "ˋtraɪpɑd", "pos": "n.", "definition": "a three-legged stand", "chinese": "三腳架；三腳支撐架", "example": "The photographer set up her tripod on the cliff edge to capture the long-exposure shot of the night sky.", "example_zh": "攝影師在懸崖邊架起她的三腳架，拍攝夜空的長曝光照片。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropodist", "ipa": "kaɪˋrɑpədɪst", "pos": "n.", "definition": "an earlier title for podiatrist", "chinese": "足科醫師（舊稱）；足病醫師的早期稱謂", "example": "In older medical texts, the professional now called a podiatrist was commonly referred to as a chiropodist.", "example_zh": "在較早的醫學文獻中，現在稱為足病醫師的執業者通常被稱為「chiropodist」。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropody", "ipa": "kaɪˋrɑpədɪ", "pos": "n.", "definition": "the treatment of minor ailments of the foot and hand", "chinese": "足手科（舊稱）；治療足部和手部輕微疾病的醫療實踐", "example": "Chiropody, which once encompassed both hand and foot care, has largely been replaced in modern usage by the term podiatry.", "example_zh": "足手科曾涵蓋足部和手部的照護，如今在現代用語中大多已被「足病學」一詞所取代。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiropractic", "ipa": "ˌkaɪrəˋpræktɪk", "pos": "n.", "definition": "the practice of treating illness by manipulating the spinal column", "chinese": "脊骨神經醫學；透過操作脊椎柱治療疾病的醫療實踐", "example": "Many patients turn to chiropractic as an alternative to pain medication for managing back and neck discomfort.", "example_zh": "許多病患轉向脊骨神經醫學，以取代止痛藥來處理背部和頸部不適。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirography", "ipa": "kaɪˋrɑgrəfɪ", "pos": "n.", "definition": "the art of handwriting; penmanship", "chinese": "書法；手寫藝術；書寫技藝", "example": "The monk devoted decades to perfecting his chirography, producing manuscripts of extraordinary beauty and precision.", "example_zh": "那位僧侶花了幾十年時間磨練自己的書寫藝術，創作出極具美感與精準度的手抄本。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirographer", "ipa": "kaɪˋrɑgrəfɚ", "pos": "n.", "definition": "an expert in handwriting or penmanship", "chinese": "書法專家；手寫或書法的行家", "example": "The museum hired a chirographer to restore the faded ink of several centuries-old manuscripts in their collection.", "example_zh": "博物館聘請了一位書法專家，修復館藏中數份已褪色的百年手稿墨跡。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chirographic", "ipa": "ˌkaɪrəˋgræfɪk", "pos": "adj.", "definition": "pertaining to handwriting", "chinese": "書寫的；與手寫或書法相關的", "example": "The researcher studied chirographic traditions across cultures to trace the spread of early writing systems.", "example_zh": "那位研究員研究各文化的書寫傳統，以追蹤早期書寫系統的傳播。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromancy", "ipa": "ˋkaɪrəˌmænsɪ", "pos": "n.", "definition": "the practice of foretelling events by reading the palm", "chinese": "手相術；透過閱讀手掌紋路預測未來事件的占卜術", "example": "At the medieval fair, a fortune-teller offered chiromancy readings, tracing the lines of visitors' palms with theatrical flair.", "example_zh": "在中世紀市集上，一位算命師以戲劇性的風格提供手相占卜服務，描摩著遊客手掌上的紋路。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromancer", "ipa": "ˋkaɪrəˌmænsɚ", "pos": "n.", "definition": "one who practices palm reading", "chinese": "手相師；從事手相占卜的人", "example": "The chiromancer claimed she could reveal a person's fate, health, and love life simply by examining the lines of their hand.", "example_zh": "那位手相師聲稱，只需端詳一個人手上的紋路，便能揭示其命運、健康和感情生活。"}, {"session": "Session 9: Dental Specialists and Related Words", "word": "chiromantic", "ipa": "ˌkaɪrəˋmæntɪk", "pos": "adj.", "definition": "pertaining to palm reading", "chinese": "手相術的；與手相占卜相關的", "example": "The chiromantic tradition dates back thousands of years and has been practiced in cultures from India to ancient Greece.", "example_zh": "手相術的傳統可追溯至數千年前，從印度到古希臘的各種文化中都有其實踐蹤跡。"}], "Session 10: Writing and Writers (graphein)": [{"session": "Session 10: Writing and Writers (graphein)", "word": "graphology", "ipa": "græˋfɑlədʒɪ", "pos": "n.", "definition": "the analysis of handwriting to determine character", "chinese": "筆跡學；透過分析筆跡判斷性格的學科", "example": "Some companies once used graphology as part of their hiring process, though its scientific validity remains disputed.", "example_zh": "有些公司曾將筆跡學納入招聘流程，但其科學有效性至今仍有爭議。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "graphological", "ipa": "ˌgræfəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to handwriting analysis", "chinese": "筆跡學的；與筆跡分析相關的", "example": "The graphological report noted that the suspect's handwriting showed signs of impulsiveness and emotional instability.", "example_zh": "筆跡學報告指出，嫌疑人的筆跡顯示出衝動和情緒不穩定的跡象。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligraphy", "ipa": "kəˋlɪgrəfɪ", "pos": "n.", "definition": "beautiful handwriting; penmanship as an artistic expression", "chinese": "書法；美麗的手寫字；作為藝術表現的書寫技藝", "example": "The wedding invitations were handwritten in calligraphy by a local artist, giving them an elegant, timeless quality.", "example_zh": "婚禮請帖由當地藝術家以書法親手書寫，賦予它們一種優雅而雋永的氣質。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligrapher", "ipa": "kəˋlɪgrəfɚ", "pos": "n.", "definition": "an expert in artistic handwriting", "chinese": "書法家；精通藝術書寫的專家", "example": "The calligrapher spent years studying under a master in Kyoto before opening her own studio in New York.", "example_zh": "那位書法家在京都師從一位大師學習多年，才在紐約開設了自己的工作室。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "calligraphic", "ipa": "ˌkælɪˋgræfɪk", "pos": "adj.", "definition": "pertaining to artistic handwriting", "chinese": "書法的；與藝術書寫相關的", "example": "The ancient scroll bore calligraphic inscriptions of such beauty that scholars debated who among the great masters had written it.", "example_zh": "那卷古老的捲軸上有著極為優美的書法銘文，學者們爭論著究竟是哪位大師揮毫寫下的。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "callipygian", "ipa": "ˌkælɪˋpɪdʒɪən", "pos": "adj.", "definition": "having shapely or attractive buttocks", "chinese": "臀部曲線優美的；臀部形狀迷人的", "example": "The term callipygian originates from a famous ancient Greek statue celebrated for the beauty of its form.", "example_zh": "「callipygian」這個詞源於一座因形體之美而著名的古希臘雕像。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacography", "ipa": "kæˋkɑgrəfɪ", "pos": "n.", "definition": "ugly, bad, or illegible handwriting", "chinese": "劣書；醜陋、惡劣或難以辨認的筆跡", "example": "The professor's lecture notes were legendary for their cacography — students joked they needed a decoder ring to read them.", "example_zh": "那位教授的課堂筆記因其潦草的字跡而聲名狼藉——學生們開玩笑說需要解碼器才能看懂。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacographer", "ipa": "kæˋkɑgrəfɚ", "pos": "n.", "definition": "one who uses bad or illegible handwriting", "chinese": "劣書者；字跡拙劣或難以辨認的人", "example": "As a notorious cacographer, his letters always required a second reading before their meaning became clear.", "example_zh": "身為一個惡名昭彰的劣書者，他的信件總是需要讀第二遍才能看懂其中的意思。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "cacographic", "ipa": "ˌkækəˋgræfɪk", "pos": "adj.", "definition": "pertaining to bad handwriting", "chinese": "字跡拙劣的；與惡劣書寫相關的", "example": "The cacographic scrawl on the prescription nearly caused a medication error at the pharmacy.", "example_zh": "處方箋上那潦草的字跡差點在藥房造成了用藥錯誤。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "gerontology", "ipa": "ˌdʒɛrənˋtɑlədʒɪ", "pos": "n.", "definition": "the science of the social, economic, and other non-medical problems of old age", "chinese": "老年學；研究老齡化社會、經濟及其他非醫療性問題的學科", "example": "The university's department of gerontology publishes research on retirement planning, elder loneliness, and aging policy.", "example_zh": "大學的老年學系發表了有關退休規劃、老年孤獨感及老齡化政策的研究。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "gerontological", "ipa": "ˌdʒɛrɑntəˋlɑdʒɪkəl", "pos": "adj.", "definition": "pertaining to the study of aging problems", "chinese": "老年學的；與研究老齡化問題相關的", "example": "The conference brought together gerontological researchers from fifteen countries to discuss policies for aging populations.", "example_zh": "這次會議匯聚了來自十五個國家的老年學研究人員，共同討論老齡化人口的相關政策。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senile", "ipa": "ˋsinl", "pos": "adj.", "definition": "showing signs of physical and mental deterioration from old age", "chinese": "老衰的；顯示出因老齡化而產生身心退化跡象的", "example": "At ninety-four, he remained sharp and witty, showing none of the senile confusion his family had feared.", "example_zh": "在九十四歲時，他依然思維敏銳、幽默風趣，完全沒有家人所擔心的老衰性混亂。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senility", "ipa": "sɪˋnɪlɪtɪ", "pos": "n.", "definition": "mental and physical deterioration of old age", "chinese": "老衰；老年引起的身心退化", "example": "The family struggled to accept that their once-vibrant grandmother was showing increasing signs of senility.", "example_zh": "家人難以接受他們曾經充滿活力的祖母正出現日益明顯的老衰跡象。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senescent", "ipa": "sɪˋnɛsənt", "pos": "adj.", "definition": "aging; growing old", "chinese": "衰老中的；逐漸老去的", "example": "Scientists are studying the behavior of senescent cells to understand how they contribute to age-related diseases.", "example_zh": "科學家正在研究衰老細胞的行為，以了解它們如何導致與年齡相關的疾病。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senescence", "ipa": "sɪˋnɛsəns", "pos": "n.", "definition": "the process of growing old", "chinese": "老化過程；衰老的歷程", "example": "Biologists study senescence at the cellular level to identify the mechanisms that drive the aging process.", "example_zh": "生物學家在細胞層次研究老化過程，以找出驅動衰老歷程的機制。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senior", "ipa": "ˋsinjɚ", "pos": "adj.", "definition": "older", "chinese": "年長的；較年老的", "example": "The company offered a special discount to senior citizens over the age of sixty-five.", "example_zh": "這家公司為六十五歲以上的老年市民提供特別折扣。"}, {"session": "Session 10: Writing and Writers (graphein)", "word": "senate", "ipa": "ˋsɛnɪt", "pos": "n.", "definition": "originally a council of older citizens", "chinese": "參議院；（源義）由年長市民組成的議會", "example": "The bill passed narrowly in the senate after weeks of fierce debate between the two parties.", "example_zh": "在兩黨數週激烈辯論之後，該法案在參議院以些微差距獲得通過。"}], "Session 11: Scientists and Their Fields": [{"session": "Session 11: Scientists and Their Fields", "word": "anthropologist", "ipa": "ˌænθrəˈpɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies the development of the human race", "chinese": "人類學家", "example": "The anthropologist spent three years living with an isolated tribe to document their culture and customs.", "example_zh": "這位人類學家在一個與世隔絕的部落中住了三年，以記錄他們的文化與習俗。"}, {"session": "Session 11: Scientists and Their Fields", "word": "astronomer", "ipa": "əˈstrɑnəmɚ", "pos": "n.", "definition": "a scientist who studies celestial bodies", "chinese": "天文學家", "example": "The astronomer discovered a new comet while scanning the night sky with her telescope.", "example_zh": "這位天文學家在用望遠鏡掃描夜空時，發現了一顆新彗星。"}, {"session": "Session 11: Scientists and Their Fields", "word": "geologist", "ipa": "dʒɪˈɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies the physical composition of the earth", "chinese": "地質學家", "example": "The geologist examined rock samples from the canyon walls to estimate how old the formations were.", "example_zh": "這位地質學家檢查了峽谷壁上的岩石樣本，以估計地層的年齡。"}, {"session": "Session 11: Scientists and Their Fields", "word": "biologist", "ipa": "baɪˈɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies all living matter", "chinese": "生物學家", "example": "The marine biologist spent her career studying the behavior of dolphins in the open ocean.", "example_zh": "這位海洋生物學家將她的職業生涯用於研究大洋中海豚的行為。"}, {"session": "Session 11: Scientists and Their Fields", "word": "botanist", "ipa": "ˈbɑtənɪst", "pos": "n.", "definition": "a scientist who studies plant life", "chinese": "植物學家", "example": "The botanist identified five previously unknown species of orchid deep in the rainforest.", "example_zh": "這位植物學家在雨林深處發現了五種以前未知的蘭花品種。"}, {"session": "Session 11: Scientists and Their Fields", "word": "zoologist", "ipa": "zoˈɑlədʒɪst", "pos": "n.", "definition": "a scientist who studies animal life", "chinese": "動物學家", "example": "The zoologist tracked the migration patterns of African elephant
