ces of the Universe and Life", "word": "anthropological", "ipa": "ˌænθrəpəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to anthropology", "chinese": "人类学的", "example": "The museum displayed an anthropological exhibit showing tools and artifacts from ancient civilizations.", "example_zh": "博物馆展出了一个人类学展览，展示了古代文明的工具和文物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronomy", "ipa": "əˈstrɑnəmɪ", "pos": "n.", "definition": "the science of heavenly bodies", "chinese": "天文学", "example": "Astronomy has revealed that the universe contains billions of galaxies, each with billions of stars.", "example_zh": "天文学已经揭示，宇宙中包含数十亿个星系，每个星系又有数十亿颗恒星。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronomical", "ipa": "ˌæstrəˈnɑmɪkl", "pos": "adj.", "definition": "pertaining to astronomy; enormously large", "chinese": "天文学的；庞大的", "example": "The cost of building a new space telescope has reached astronomical proportions, running into billions of dollars.", "example_zh": "建造新太空望远镜的费用已达到天文数字，高达数十亿美元。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrology", "ipa": "əˈstrɑlədʒɪ", "pos": "n.", "definition": "the study of the influence of planets and stars on human events", "chinese": "占星术", "example": "She reads her horoscope every morning, putting great faith in astrology to guide her decisions.", "example_zh": "她每天早上阅读自己的星座运势，对占星术深信不疑，以此指导她的决定。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrological", "ipa": "ˌæstrəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to astrology", "chinese": "占星术的", "example": "The astrological chart she had prepared showed that Mercury was in retrograde that week.", "example_zh": "她所准备的占星图显示，那一周水星正在逆行。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrologer", "ipa": "əˈstrɑlədʒɚ", "pos": "n.", "definition": "one who practices astrology", "chinese": "占星师", "example": "The astrologer predicted that the couple would face challenges in communication during the coming year.", "example_zh": "这位占星师预测，这对夫妇在来年将面临沟通上的挑战。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astronaut", "ipa": "ˈæstrəˌnɔt", "pos": "n.", "definition": "a person who travels in space among the stars", "chinese": "太空人；宇航员", "example": "The astronaut described the breathtaking view of Earth from the International Space Station.", "example_zh": "这位太空人描述了从国际太空站俯瞰地球的令人叹为观止的景象。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "cosmonaut", "ipa": "ˈkɑzməˌnɔt", "pos": "n.", "definition": "a Russian term for a space traveler", "chinese": "（俄罗斯）宇航员", "example": "The Russian cosmonaut broke the record for the longest continuous stay aboard a space station.", "example_zh": "这位俄罗斯宇航员打破了在太空站连续停留时间最长的纪录。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "nautical", "ipa": "ˈnɔtɪkl", "pos": "adj.", "definition": "relating to sailors, ships, or navigation", "chinese": "航海的；船舶的", "example": "The old captain decorated his office with nautical charts, compasses, and model ships.", "example_zh": "那位老船长用航海图、罗盘和船模装饰了他的办公室。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "aster", "ipa": "ˈæstɚ", "pos": "n.", "definition": "a star-shaped flower", "chinese": "紫菀（一种星形花朵）", "example": "The garden was filled with purple and white asters that bloomed brilliantly in the autumn sun.", "example_zh": "花园里种满了紫色和白色的紫菀，在秋日阳光下盛开得绚烂夺目。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "asterisk", "ipa": "ˈæstərɪsk", "pos": "n.", "definition": "a star-shaped symbol (*) used in printing", "chinese": "星号（*）", "example": "The teacher placed an asterisk next to the most important items on the exam study guide.", "example_zh": "老师在考试复习指引中最重要的项目旁边加上了星号。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "astrophysics", "ipa": "ˌæstroˈfɪzɪks", "pos": "n.", "definition": "the branch of physics dealing with heavenly bodies", "chinese": "天体物理学", "example": "Astrophysics seeks to understand the physical properties of stars, galaxies, and black holes.", "example_zh": "天体物理学致力于理解恒星、星系和黑洞的物理性质。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "disaster", "ipa": "dɪˈzæstɚ", "pos": "n.", "definition": "a great misfortune or calamity", "chinese": "灾难；大祸", "example": "The earthquake was a disaster that destroyed thousands of homes and left many people homeless.", "example_zh": "这场地震是一场灾难，摧毁了数千户家庭，使许多人无家可归。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "disastrous", "ipa": "dɪˈzæstrəs", "pos": "adj.", "definition": "causing great harm or suffering", "chinese": "灾难性的；造成重大损害的", "example": "The company's decision to ignore customer complaints had disastrous consequences for its reputation.", "example_zh": "该公司无视顾客投诉的决定对其声誉造成了灾难性的后果。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autonomy", "ipa": "ɔˈtɑnəmɪ", "pos": "n.", "definition": "self-government; independence", "chinese": "自治；自主", "example": "The remote region fought for years to gain autonomy from the central government.", "example_zh": "这个偏远地区奋斗多年，争取从中央政府获得自治权。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autonomous", "ipa": "ɔˈtɑnəməs", "pos": "adj.", "definition": "self-governing", "chinese": "自治的；自主的", "example": "The university department operates as an autonomous unit, setting its own curriculum and budget.", "example_zh": "这个大学系所作为一个自治单位运作，自行制定课程和预算。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "metronome", "ipa": "ˈmɛtrəˌnom", "pos": "n.", "definition": "a device that measures musical time", "chinese": "节拍器", "example": "The piano teacher set the metronome to a slow tempo so the beginner could practice at a steady pace.", "example_zh": "钢琴老师将节拍器设定为慢速，让初学者能以稳定的节奏练习。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geology", "ipa": "dʒɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of the physical composition of the earth", "chinese": "地质学", "example": "Geology explains why earthquakes occur more frequently along tectonic plate boundaries.", "example_zh": "地质学解释了为何地震更频繁地发生在构造板块的边界附近。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geological", "ipa": "ˌdʒɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to geology", "chinese": "地质学的；地质上的", "example": "The geological survey revealed that the land beneath the city was unstable and prone to subsidence.", "example_zh": "地质调查显示，这座城市地下的土地不稳定，容易发生地层下陷。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometry", "ipa": "dʒɪˈɑmɪtrɪ", "pos": "n.", "definition": "the branch of mathematics dealing with measurement of figures", "chinese": "几何学", "example": "In geometry class, students learned how to calculate the area and perimeter of various shapes.", "example_zh": "在几何课上，学生们学习了如何计算各种图形的面积和周长。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometric", "ipa": "ˌdʒɪəˈmɛtrɪk", "pos": "adj.", "definition": "pertaining to geometry", "chinese": "几何的；几何学的", "example": "The architect used clean geometric shapes — squares, triangles, and circles — in the building's design.", "example_zh": "建筑师在建筑设计中采用了简洁的几何形状——正方形、三角形和圆形。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geometrician", "ipa": "dʒɪˌɑmɪˈtrɪʃən", "pos": "n.", "definition": "a mathematician who specializes in geometry", "chinese": "几何学家", "example": "As a skilled geometrician, she was able to solve complex problems involving three-dimensional shapes.", "example_zh": "作为一位技术精湛的几何学家，她能够解决涉及三维图形的复杂问题。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geography", "ipa": "dʒɪˈɑɡrəfɪ", "pos": "n.", "definition": "the science of mapping the earth", "chinese": "地理学", "example": "A good understanding of geography helps explain why certain countries have greater agricultural potential than others.", "example_zh": "对地理学的充分理解有助于解释为何某些国家比其他国家具有更大的农业潜力。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geographer", "ipa": "dʒɪˈɑɡrəfɚ", "pos": "n.", "definition": "a practitioner of geography", "chinese": "地理学家", "example": "The geographer created detailed maps of the Amazon basin, charting rivers and terrain few had explored.", "example_zh": "这位地理学家制作了亚马逊盆地的详细地图，标绘出少有人探索的河流和地形。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "geographic", "ipa": "ˌdʒɪəˈɡræfɪk", "pos": "adj.", "definition": "pertaining to geography", "chinese": "地理的；地理学的", "example": "The geographic isolation of the island allowed its wildlife to evolve in ways not seen anywhere else.", "example_zh": "这座岛屿的地理隔绝使其野生动植物以其他地方所见不到的方式演化。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biology", "ipa": "baɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of all living matter", "chinese": "生物学", "example": "Biology class covered topics ranging from the structure of cells to the ecosystems of tropical rainforests.", "example_zh": "生物学课涵盖了从细胞结构到热带雨林生态系统等各种主题。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biological", "ipa": "ˌbaɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to biology", "chinese": "生物学的；生物的", "example": "Scientists are concerned about the biological impact of microplastics on marine organisms.", "example_zh": "科学家们担忧微塑胶对海洋生物的生物学影响。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biography", "ipa": "baɪˈɑɡrəfɪ", "pos": "n.", "definition": "a written account of someone's life", "chinese": "传记", "example": "She read an engaging biography of Marie Curie and was inspired by the scientist's determination.", "example_zh": "她读了一本引人入胜的玛丽·居礼传记，并被这位科学家的坚定意志所激励。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autobiography", "ipa": "ˌɔtəbaɪˈɑɡrəfɪ", "pos": "n.", "definition": "the story of one's own life written by oneself", "chinese": "自传", "example": "The retired general wrote a candid autobiography recounting his experiences both on and off the battlefield.", "example_zh": "这位退休将军写了一部坦率的自传，讲述了他在战场上和战场下的经历。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autobiographical", "ipa": "ˌɔtəˌbaɪəˈɡræfɪkl", "pos": "adj.", "definition": "pertaining to autobiography", "chinese": "自传体的；自传性的", "example": "The novel was largely autobiographical, drawing on events from the author's own troubled childhood.", "example_zh": "这部小说大部分具有自传性质，取材于作者自身坎坷童年的经历。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "biopsy", "ipa": "ˈbaɪɑpsɪ", "pos": "n.", "definition": "a medical examination of living tissue, often to detect cancer", "chinese": "活体切片检查；切片检查", "example": "The doctor performed a biopsy on the suspicious mole to determine whether it was malignant.", "example_zh": "医生对那颗可疑的痣进行了切片检查，以确定它是否为恶性。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "autopsy", "ipa": "ˈɔtɑpsɪ", "pos": "n.", "definition": "a medical examination of a corpse to determine the cause of death", "chinese": "尸体解剖；验尸", "example": "The autopsy revealed that the victim had died from a previously undetected heart condition, not foul play.", "example_zh": "验尸结果显示，受害者死于之前未被发现的心脏病，而非谋杀。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "botany", "ipa": "ˈbɑtənɪ", "pos": "n.", "definition": "the science of plant life", "chinese": "植物学", "example": "Her knowledge of botany allowed her to identify every plant growing in the garden by its scientific name.", "example_zh": "她的植物学知识让她能够以学名辨识花园中生长的每一种植物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "botanical", "ipa": "bəˈtænɪkl", "pos": "adj.", "definition": "pertaining to botany", "chinese": "植物学的；植物的", "example": "The botanical garden housed over two thousand species of plants from five different continents.", "example_zh": "这座植物园收藏了来自五大洲的两千多种植物。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zoology", "ipa": "zoˈɑlədʒɪ", "pos": "n.", "definition": "the science of animal life", "chinese": "动物学", "example": "His passion for zoology led him to pursue a career studying the social behavior of primates.", "example_zh": "他对动物学的热情促使他走上了研究灵长类动物社会行为的职业道路。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zoological", "ipa": "ˌzoəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to zoology", "chinese": "动物学的；动物园的", "example": "The zoological park was redesigned to give animals more natural habitats and reduce stress.", "example_zh": "这座动物园被重新设计，以提供动物更自然的栖息环境并减少压力。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zodiac", "ipa": "ˈzodɪˌæk", "pos": "n.", "definition": "a diagram used in astrology showing the paths of sun, moon, and planets", "chinese": "黄道带；十二宫图", "example": "The ancient zodiac divides the sky into twelve sections, each associated with a constellation and a personality type.", "example_zh": "古老的黄道带将天空分成十二个部分，每个部分与一个星座和一种性格类型相关联。"}, {"session": "Session 12: Sciences of the Universe and Life", "word": "zodiacal", "ipa": "zoˈdaɪəkl", "pos": "adj.", "definition": "pertaining to the zodiac", "chinese": "黄道带的；黄道的", "example": "The zodiacal light, a faint glow along the ecliptic, can be seen on very clear nights far from city lights.", "example_zh": "黄道光是一种沿黄道的微弱光芒，在远离城市灯光的晴朗夜晚可以看见。"}], "Session 13: More Sciences (Cutting and Related Words)": [{"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "entomology", "ipa": "ˌɛntəˈmɑlədʒɪ", "pos": "n.", "definition": "the branch of zoology dealing with insects", "chinese": "昆虫学", "example": "Entomology has become increasingly important as scientists study how insect populations affect agriculture.", "example_zh": "随著科学家研究昆虫族群对农业的影响，昆虫学变得越来越重要。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "entomological", "ipa": "ˌɛntəməˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to entomology", "chinese": "昆虫学的", "example": "The entomological collection at the natural history museum contained thousands of pinned specimens from around the world.", "example_zh": "自然历史博物馆的昆虫学收藏品包含了来自世界各地的数千个针插标本。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "eccentric", "ipa": "ɪkˈsɛntrɪk", "pos": "adj.", "definition": "deviating from the normal; unconventional; odd", "chinese": "古怪的；偏离常规的；不寻常的", "example": "The eccentric professor wore mismatched socks every day and kept a pet turtle on his desk.", "example_zh": "这位古怪的教授每天穿著不成对的袜子，并在桌上养了一只宠物乌龟。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "eccentricity", "ipa": "ˌɛksɛnˈtrɪsɪtɪ", "pos": "n.", "definition": "the quality of being unconventional or odd", "chinese": "古怪；偏离常规的特质", "example": "Her eccentricity made her stand out at the office — she insisted on having all meetings while standing up.", "example_zh": "她的古怪使她在办公室里显得格外突出——她坚持所有会议都要站著开。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "atom", "ipa": "ˈætəm", "pos": "n.", "definition": "the smallest particle of an element", "chinese": "原子", "example": "A single atom is so incredibly small that billions of them could fit on the head of a pin.", "example_zh": "单个原子小得难以置信，数十亿个原子可以排列在一根大头针的针头上。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "atomic", "ipa": "əˈtɑmɪk", "pos": "adj.", "definition": "pertaining to atoms", "chinese": "原子的；原子能的", "example": "The development of atomic weapons forever changed the balance of military power in the world.", "example_zh": "原子武器的研发永远改变了世界军事力量的平衡。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "anatomy", "ipa": "əˈnætəmɪ", "pos": "n.", "definition": "the structure of a body; the cutting up of a body to study its structure", "chinese": "解剖学；（身体的）构造", "example": "Medical students spend many hours studying anatomy before they are allowed to perform surgery.", "example_zh": "医学生在被允许进行手术之前，需要花费许多时间学习解剖学。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "anatomical", "ipa": "ˌænəˈtɑmɪkl", "pos": "adj.", "definition": "pertaining to anatomy", "chinese": "解剖学的；解剖上的", "example": "The anatomical diagram clearly labeled each bone and muscle in the human arm.", "example_zh": "解剖学图表清楚地标示了人体手臂中的每一根骨骼和肌肉。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "tome", "ipa": "tom", "pos": "n.", "definition": "a large, heavy book", "chinese": "大部头书；厚重的书籍", "example": "He pulled a dusty tome from the shelf and began reading the centuries-old philosophical text.", "example_zh": "他从书架上取下一本积满灰尘的大部头书，开始阅读这部有几百年历史的哲学文本。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomy", "ipa": "daɪˈkɑtəmɪ", "pos": "n.", "definition": "a splitting in two", "chinese": "二分法；一分为二", "example": "There is a clear dichotomy in the team between those who prefer careful planning and those who favor quick action.", "example_zh": "团队中有明显的二分对立，一方倾向于谨慎规划，另一方偏好迅速行动。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomous", "ipa": "daɪˈkɑtəməs", "pos": "adj.", "definition": "divided into two parts", "chinese": "二分的；分成两部分的", "example": "The survey used a dichotomous scale, asking respondents simply to answer \"yes\" or \"no\" to each question.", "example_zh": "这项调查采用了二元量表，要求受访者对每个问题简单地回答「是」或「否」。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "dichotomize", "ipa": "daɪˈkɑtəˌmaɪz", "pos": "v.", "definition": "to split into two", "chinese": "使二分；将……一分为二", "example": "It is too simplistic to dichotomize human behavior into purely \"good\" or \"bad\" categories.", "example_zh": "将人类行为简单地二分为纯粹的「好」或「坏」两类，未免过于简化。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "epitome", "ipa": "ɪˈpɪtəmɪ", "pos": "n.", "definition": "a condensation or representative summary of the whole", "chinese": "典范；缩影；精华", "example": "With her grace, skill, and dedication, she was considered the epitome of a professional dancer.", "example_zh": "凭借她的优雅、技巧和敬业精神，她被认为是职业舞者的典范。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "epitomize", "ipa": "ɪˈpɪtəˌmaɪz", "pos": "v.", "definition": "to be representative of or to summarize", "chinese": "成为……的典范；概括；体现", "example": "His generous actions epitomize the spirit of community service that this award was created to honor.", "example_zh": "他慷慨的行动体现了这个奖项所要表彰的社区服务精神。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philology", "ipa": "fɪˈlɑlədʒɪ", "pos": "n.", "definition": "the science of language; linguistics", "chinese": "语文学；历史语言学", "example": "Through philology, scholars have reconstructed how ancient languages were spoken thousands of years ago.", "example_zh": "透过语文学，学者们已重建了数千年前古代语言的发音方式。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philological", "ipa": "ˌfɪləˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to philology", "chinese": "语文学的；历史语言学的", "example": "Her philological research traced the Sanskrit origins of dozens of common English words.", "example_zh": "她的语文学研究追溯了数十个常用英语单词的梵文起源。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "linguistics", "ipa": "lɪŋˈɡwɪstɪks", "pos": "n.", "definition": "the scientific study of language", "chinese": "语言学", "example": "Linguistics examines how languages are structured, how they change over time, and how people acquire them.", "example_zh": "语言学研究语言的结构方式、语言如何随时间演变，以及人们如何习得语言。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropy", "ipa": "fɪˈlænθrəpɪ", "pos": "n.", "definition": "love of mankind; charitable activities", "chinese": "慈善；博爱；慈善活动", "example": "The billionaire dedicated his later years to philanthropy, donating billions to education and healthcare.", "example_zh": "这位亿万富翁将晚年投入慈善事业，向教育和医疗保健捐出了数十亿美元。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropist", "ipa": "fɪˈlænθrəpɪst", "pos": "n.", "definition": "one who devotes oneself to charitable activities", "chinese": "慈善家；博爱主义者", "example": "The philanthropist funded the construction of twenty new schools in underprivileged communities across the country.", "example_zh": "这位慈善家资助在全国弱势社区建造了二十所新学校。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanthropic", "ipa": "ˌfɪlænˈθrɑpɪk", "pos": "adj.", "definition": "pertaining to charitable activities", "chinese": "慈善的；博爱的", "example": "The company launched a philanthropic initiative to provide clean drinking water to rural villages in developing countries.", "example_zh": "该公司发起了一项慈善计划，为发展中国家的农村村庄提供洁净饮用水。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philander", "ipa": "fɪˈlændɚ", "pos": "v.", "definition": "to engage in casual romantic or sexual affairs", "chinese": "搞风流；与人调情；拈花惹草", "example": "His habit of philandering destroyed his marriage and damaged his reputation in the community.", "example_zh": "他拈花惹草的习惯摧毁了他的婚姻，也损害了他在社区中的声誉。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philanderer", "ipa": "fɪˈlændərɚ", "pos": "n.", "definition": "one who philanders", "chinese": "拈花惹草的人；好色之徒", "example": "He had a reputation as a philanderer, and few people trusted him to be faithful in a relationship.", "example_zh": "他以拈花惹草闻名，很少有人相信他在感情上能够忠诚。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philosophy", "ipa": "fɪˈlɑsəfɪ", "pos": "n.", "definition": "the love of wisdom", "chinese": "哲学；人生哲学", "example": "His philosophy of life was simple: treat others with kindness and never stop seeking knowledge.", "example_zh": "他的人生哲学很简单：善待他人，永不停止追求知识。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "philter", "ipa": "ˈfɪltɚ", "pos": "n.", "definition": "a love potion", "chinese": "爱情魔药；媚药", "example": "In the folk tale, the witch brewed a philter and promised it would make anyone who drank it fall deeply in love.", "example_zh": "在民间故事中，女巫熬制了一种爱情魔药，并承诺喝下它的人将会深深坠入爱河。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "aphrodisiac", "ipa": "ˌæfrəˈdɪzɪˌæk", "pos": "n./adj.", "definition": "something that arouses sexual desire", "chinese": "春药；催情剂；催情的", "example": "Oysters have long been reputed to be an aphrodisiac, though scientific evidence for this claim is limited.", "example_zh": "牡蛎长期以来被认为是催情食物，尽管支持这一说法的科学证据有限。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "aphrodisiacal", "ipa": "ˌæfrədɪˈzaɪəkl", "pos": "adj.", "definition": "relating to sexual arousal", "chinese": "有催情作用的；春药性质的", "example": "The vendor claimed his herbal blend had aphrodisiacal properties, but no medical authority endorsed his product.", "example_zh": "这位摊贩声称他的草药配方具有催情效果，但没有任何医疗机构认可他的产品。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "bibliophile", "ipa": "ˈbɪblɪəˌfaɪl", "pos": "n.", "definition": "a lover and collector of books", "chinese": "爱书人；藏书家", "example": "As a devoted bibliophile, she had filled every room in her house with shelves overflowing with books.", "example_zh": "作为一位虔诚的爱书人，她将家中每个房间都摆满了书架，书架上的书多到溢出来。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "Anglophile", "ipa": "ˈæŋɡloˌfaɪl", "pos": "n.", "definition": "one who admires British people and customs", "chinese": "亲英者；崇英者", "example": "A true Anglophile, he drank tea every afternoon, collected British stamps, and followed cricket religiously.", "example_zh": "身为真正的崇英者，他每天下午喝茶、收集英国邮票，并虔诚地关注板球比赛。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "semantics", "ipa": "sɪˈmæntɪks", "pos": "n.", "definition": "the study of the meanings and psychological effects of words", "chinese": "语义学；语意学", "example": "The debate over the policy quickly devolved into an argument about semantics rather than the actual issues.", "example_zh": "这场政策辩论很快演变为一场关于语义的争论，而非真正实质问题的讨论。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "semantic", "ipa": "sɪˈmæntɪk", "pos": "adj.", "definition": "pertaining to semantics", "chinese": "语义的；语意上的", "example": "The two negotiators had a semantic disagreement over what the word \"immediately\" meant in the contract.", "example_zh": "两位谈判代表对合约中「立即」一词的含义产生了语义上的分歧。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "sociology", "ipa": "ˌsosɪˈɑlədʒɪ", "pos": "n.", "definition": "the science of how people live together in groups", "chinese": "社会学", "example": "Sociology has shown that poverty, education level, and neighborhood environment strongly influence a person's life outcomes.", "example_zh": "社会学已显示，贫困、教育程度和社区环境对一个人的人生结果有强烈影响。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "sociological", "ipa": "ˌsosɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to sociology", "chinese": "社会学的", "example": "The sociological study examined how immigration patterns affected the cultural makeup of urban neighborhoods.", "example_zh": "这项社会学研究探讨了移民模式如何影响城市社区的文化构成。"}, {"session": "Session 13: More Sciences (Cutting and Related Words)", "word": "asocial", "ipa": "eˈsoʃl", "pos": "adj.", "definition": "withdrawn and self-centered; indifferent to others", "chinese": "孤僻的；不合群的；漠视社交的", "example": "He was not unfriendly, but his asocial tendencies meant he preferred solitude over parties and gatherings.", "example_zh": "他并非不友善，但他不合群的倾向意味著他更喜欢独处，而非参加派对和聚会。"}], "Session 14: Types of Liars": [{"session": "Session 14: Types of Liars", "word": "notorious", "ipa": "noˈtorɪəs", "pos": "adj.", "definition": "widely and unfavorably known for some bad quality", "chinese": "声名狼藉的；恶名昭彰的", "example": "The notorious swindler had conned dozens of investors before he was finally arrested and brought to trial.", "example_zh": "这个声名狼藉的骗子在最终被逮捕并受审之前，已欺骗了数十名投资者。"}, {"session": "Session 14: Types of Liars", "word": "consummate", "ipa": "ˈkɑnsəmɪt", "pos": "adj.", "definition": "perfect; highly skilled; at the highest point of artistry", "chinese": "完美的；技艺精湛的；炉火纯青的", "example": "She was a consummate performer who captivated audiences with her flawless technique and emotional depth.", "example_zh": "她是一位技艺精湛的表演者，以无懈可击的技巧和情感深度使观众著迷。"}, {"session": "Session 14: Types of Liars", "word": "incorrigible", "ipa": "ɪnˈkɔrɪdʒɪbl", "pos": "adj.", "definition": "beyond reform or correction", "chinese": "无可救药的；屡教不改的", "example": "The judge declared him an incorrigible offender who had repeatedly broken his parole conditions.", "example_zh": "法官宣告他是一名屡教不改的罪犯，曾多次违反假释条件。"}, {"session": "Session 14: Types of Liars", "word": "inveterate", "ipa": "ɪnˈvɛtərɪt", "pos": "adj.", "definition": "long-habituated to a habit; deeply accustomed", "chinese": "根深蒂固的；积习难改的；老资格的", "example": "An inveterate traveler, she had visited over ninety countries and showed no signs of slowing down.", "example_zh": "作为一个积习难改的旅行者，她已走访了九十多个国家，而且没有任何放慢脚步的迹象。"}, {"session": "Session 14: Types of Liars", "word": "congenital", "ipa": "kənˈdʒɛnɪtl", "pos": "adj.", "definition": "occurring at or during birth", "chinese": "先天的；天生的；与生俱来的", "example": "The baby was born with a congenital heart defect that required surgery within the first month of life.", "example_zh": "这名婴儿出生时患有先天性心脏缺陷，需要在出生后第一个月内进行手术。"}, {"session": "Session 14: Types of Liars", "word": "chronic", "ipa": "ˈkrɑnɪk", "pos": "adj.", "definition": "occurring repeatedly over a long period of time", "chinese": "慢性的；长期的；积习难改的", "example": "Her chronic back pain had persisted for years despite numerous treatments and therapies.", "example_zh": "尽管接受了大量治疗和疗法，她的慢性背痛已持续多年。"}, {"session": "Session 14: Types of Liars", "word": "pathological", "ipa": "ˌpæθəˈlɑdʒɪkl", "pos": "adj.", "definition": "diseased; caused by or involving disease", "chinese": "病态的；病理的；由疾病引起的", "example": "His pathological fear of failure prevented him from attempting anything that carried even a small risk of defeat.", "example_zh": "他对失败的病态恐惧使他无法尝试任何带有哪怕一点点失败风险的事情。"}, {"session": "Session 14: Types of Liars", "word": "unconscionable", "ipa": "ʌnˈkɑnʃənəbl", "pos": "adj.", "definition": "without pangs of conscience; unscrupulous", "chinese": "无良心的；昧著良心的；不道德的", "example": "It was unconscionable for the pharmaceutical company to raise the price of a life-saving drug by five thousand percent.", "example_zh": "这家制药公司将救命药物的价格提高了五千倍，实属昧著良心之举。"}, {"session": "Session 14: Types of Liars", "word": "glib", "ipa": "ɡlɪb", "pos": "adj.", "definition": "smooth and suspiciously fluent in speech", "chinese": "油嘴滑舌的；巧言令色的；能言善辩的", "example": "The politician gave a glib answer that sounded convincing but failed to address the core of the question.", "example_zh": "这位政客给出了一个听起来很有说服力的油嘴滑舌的回答，但却未能触及问题的核心。"}, {"session": "Session 14: Types of Liars", "word": "egregious", "ipa": "ɪˈɡridʒəs", "pos": "adj.", "definition": "outstandingly bad or vicious", "chinese": "极其恶劣的；骇人听闻的；罪大恶极的", "example": "The referee made an egregious error that cost the home team the championship game.", "example_zh": "裁判犯下了一个极其严重的错误，使主队痛失冠军赛的胜利。"}], "Session 15: Word Origins (notorious, consummate, etc.)": [{"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "notoriety", "ipa": "ˌnotəˈraɪɪtɪ", "pos": "n.", "definition": "the state of being widely and unfavorably known", "chinese": "恶名；臭名昭著", "example": "The hacker achieved notoriety after breaching the security systems of three major banks in one week.", "example_zh": "这名骇客在一周内入侵了三家大型银行的安全系统后，获得了恶名。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "consummation", "ipa": "ˌkɑnsəˈmeʃən", "pos": "n.", "definition": "the act of completing or finishing something", "chinese": "完成；圆满结束；（婚姻的）圆房", "example": "The signing of the peace treaty was the consummation of years of delicate and often frustrating negotiations.", "example_zh": "和平条约的签署是多年艰难而常令人沮丧的谈判的圆满完成。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "consummacy", "ipa": "ˈkɑnsəməsɪ", "pos": "n.", "definition": "the state of being at the highest level of skill", "chinese": "精湛的技艺；炉火纯青的境界", "example": "His consummacy as a violin soloist was evident to every audience member from the first few notes he played.", "example_zh": "从他演奏的最初几个音符起，每位听众都能感受到他作为小提琴独奏家精湛的技艺。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "incorrigibility", "ipa": "ɪnˌkɔrɪdʒɪˈbɪlɪtɪ", "pos": "n.", "definition": "the state of being beyond correction or reform", "chinese": "无可救药的状态；积习难改", "example": "The parole board cited the prisoner's incorrigibility as the main reason for denying his early release.", "example_zh": "假释委员会将囚犯积习难改作为拒绝其提前释放的主要理由。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "inveteracy", "ipa": "ɪnˈvɛtərəsɪ", "pos": "n.", "definition": "the quality of being long-habituated", "chinese": "根深蒂固；积习已久的状态", "example": "The inveteracy of his gambling habit was so severe that even after losing his savings, he could not stop.", "example_zh": "他赌博习惯的根深蒂固是如此严重，即使在失去积蓄后，他仍无法停止。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "veteran", "ipa": "ˈvɛtərən", "pos": "n./adj.", "definition": "a person long experienced in a profession or activity", "chinese": "老手；资深人士；退伍军人；经验丰富的", "example": "As a veteran journalist, she had covered wars, elections, and natural disasters on six continents.", "example_zh": "作为一名资深记者，她曾在六大洲报导过战争、选举和自然灾害。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genetics", "ipa": "dʒɪˈnɛtɪks", "pos": "n.", "definition": "the science of hereditary transmission", "chinese": "遗传学", "example": "Advances in genetics have made it possible to identify a person's risk for certain inherited diseases.", "example_zh": "遗传学的进步使得识别一个人罹患某些遗传性疾病的风险成为可能。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "geneticist", "ipa": "dʒɪˈnɛtɪsɪst", "pos": "n.", "definition": "a scientist who specializes in genetics", "chinese": "遗传学家", "example": "The geneticist discovered a mutation in a specific gene that significantly increases the risk of early-onset Alzheimer's disease.", "example_zh": "这位遗传学家发现了某个特定基因的突变，该突变大幅增加了早发性阿兹海默症的风险。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genetic", "ipa": "dʒɪˈnɛtɪk", "pos": "adj.", "definition": "pertaining to genetics or heredity", "chinese": "遗传的；遗传学的", "example": "Researchers found a genetic link between the father's traits and those exhibited by his children.", "example_zh": "研究人员发现了父亲的特征与其子女所表现出的特征之间的遗传联系。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "gene", "ipa": "dʒin", "pos": "n.", "definition": "a particle in a chromosome that transmits hereditary characteristics", "chinese": "基因", "example": "Scientists have identified the gene responsible for producing insulin and its role in managing blood sugar.", "example_zh": "科学家已确定了负责产生胰岛素的基因及其在调节血糖中的作用。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogy", "ipa": "ˌdʒinɪˈælədʒɪ", "pos": "n.", "definition": "the study of family trees and ancestral origins", "chinese": "家谱学；族谱；世系", "example": "She used online genealogy records to trace her family history back eight generations to colonial times.", "example_zh": "她利用线上家谱记录，将她的家族历史追溯了八代，一直到殖民时代。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogist", "ipa": "ˌdʒinɪˈælədʒɪst", "pos": "n.", "definition": "a student or expert in family ancestry", "chinese": "家谱学家；族谱专家", "example": "The genealogist spent weeks in the church archives searching for birth and marriage records from the 1800s.", "example_zh": "这位家谱学家在教堂档案馆待了数周，寻找1800年代的出生和婚姻记录。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genealogical", "ipa": "ˌdʒinɪəˈlɑdʒɪkl", "pos": "adj.", "definition": "pertaining to genealogy", "chinese": "家谱的；族谱的；世系的", "example": "The genealogical chart displayed on the wall traced the royal family's lineage back over five hundred years.", "example_zh": "墙上展示的家谱图表将这个皇室的世系追溯了五百多年。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genital", "ipa": "ˈdʒɛnɪtl", "pos": "adj.", "definition": "pertaining to the reproductive or sexual organs", "chinese": "生殖的；性器官的", "example": "The medical textbook included detailed diagrams of both the male and female genital anatomy.", "example_zh": "这本医学教科书包含了男性和女性生殖解剖的详细图解。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "genesis", "ipa": "ˈdʒɛnɪsɪs", "pos": "n.", "definition": "the beginning, birth, or origin of something", "chinese": "起源；开端；创始", "example": "The genesis of the company can be traced to a casual conversation between two college roommates in a dormitory.", "example_zh": "这家公司的起源可以追溯到两位大学室友在宿舍里的一次随意交谈。"}, {"session": "Session 15: Word Origins (notorious, consummate, etc.)", "word": "hereditary", "ipa": "həˈrɛdɪˌtɛrɪ", "pos": "adj.", "definition": "referring to characteristics passed from parents to offspring", "chinese": "遗传的；世袭的", "example": "The doctor explained that high blood pressure in his family was likely hereditary rather than caused by lifestyle alone.", "example_zh": "医生解释说，他家族中的高血压很可能是遗传性的，而不仅仅是由生活方式引起的。"}], "Session 16: Time and Feeling Words": [{"session": "Session 16: Time and Feeling Words", "word": "chronicity", "ipa": "krɑˈnɪsɪtɪ", "pos": "n.", "definition": "the condition of continual or repeated recurrence", "chinese": "慢性性质；长期反复发作的状态", "example": "The chronicity of her migraines meant she had to carefully manage her stress and sleep schedule.", "example_zh": "她偏头痛的慢性反复发作意味著她必须仔细管理自己的压力和睡眠时间。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronism", "ipa": "əˈnækrəˌnɪzəm", "pos": "n.", "definition": "something or someone out of time or belonging to a different era", "chinese": "时代错误；不合时宜的事物", "example": "A knight in full armor walking through a modern city would be a striking anachronism.", "example_zh": "一个身穿全套盔甲走过现代城市的骑士将是一个引人注目的时代错误。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronous", "ipa": "əˈnækrənəs", "pos": "adj.", "definition": "out of time; belonging to a different era", "chinese": "不合时代的；时代错置的", "example": "His anachronous views on gender roles made him seem completely out of step with the modern workplace.", "example_zh": "他对性别角色的不合时代观念使他看起来与现代职场完全格格不入。"}, {"session": "Session 16: Time and Feeling Words", "word": "anachronistic", "ipa": "əˌnækrəˈnɪstɪk", "pos": "adj.", "definition": "pertaining to an anachronism", "chinese": "时代错误的；不合时宜的", "example": "Using a fax machine as your primary form of communication feels anachronistic in today's world of instant messaging.", "example_zh": "在当今即时通讯的世界里，以传真机作为主要通讯方式感觉是不合时宜的。"}, {"session": "Session 16: Time and Feeling Words", "word": "incongruous", "ipa": "ɪnˈkɑŋɡruəs", "pos": "adj.", "definition": "out of place; not fitting the context", "chinese": "不协调的；格格不入的；不相称的", "example": "The shiny modern skyscraper looked incongruous standing next to the centuries-old stone cathedral.", "example_zh": "那栋闪亮的现代摩天大楼矗立在有几百年历史的石砌大教堂旁边，显得格格不入。"}, {"session": "Session 16: Time and Feeling Words", "word": "incongruity", "ipa": "ˌɪnkɑŋˈɡruɪtɪ", "pos": "n.", "definition": "the state of being out of place or inconsistent", "chinese": "不协调；不相称；格格不入", "example": "There was an obvious incongruity between his polished speech and the rude way he treated the waitstaff.", "example_zh": "他精致的谈吐与他对待服务员的粗鲁方式之间存在明显的不协调。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronological", "ipa": "ˌkrɑnəˈlɑdʒɪkl", "pos": "adj.", "definition": "arranged in the order of time", "chinese": "按时间顺序排列的；年代顺序的", "example": "The biography presented events in strict chronological order, beginning with the subject's birth and ending with her death.", "example_zh": "这本传记按严格的时间顺序呈现事件，从传主的出生开始，到她的去世结束。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronology", "ipa": "krəˈnɑlədʒɪ", "pos": "n.", "definition": "the science of time order and accurate dating of events", "chinese": "年代学；年表；时间顺序", "example": "Historians depend on accurate chronology to understand the sequence of cause and effect in past events.", "example_zh": "历史学家依赖准确的年代学来理解过去事件中因果关系的顺序。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronologist", "ipa": "krəˈnɑlədʒɪst", "pos": "n.", "definition": "an expert in chronology", "chinese": "年代学家；年代考证专家", "example": "The chronologist used tree rings and carbon dating to establish when the ancient settlement was first occupied.", "example_zh": "这位年代学家利用树木年轮和碳定年法来确定这个古代定居点最初被占用的时间。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometer", "ipa": "krəˈnɑmɪtɚ", "pos": "n.", "definition": "a highly accurate timepiece", "chinese": "精密计时器；天文钟", "example": "Before GPS, sailors relied on a chronometer to determine their exact longitude while at sea.", "example_zh": "在GPS出现之前，水手们依靠精密计时器来确定他们在海上的确切经度。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometry", "ipa": "krəˈnɑmɪtrɪ", "pos": "n.", "definition": "the measurement of time", "chinese": "计时学；时间测量", "example": "Modern chronometry can measure time intervals accurate to within a fraction of a nanosecond.", "example_zh": "现代计时学可以测量精确到奈秒的几分之一的时间间隔。"}, {"session": "Session 16: Time and Feeling Words", "word": "chronometric", "ipa": "ˌkrɑnəˈmɛtrɪk", "pos": "adj.", "definition": "pertaining to time measurement", "chinese": "计时的；时间测量的", "example": "The atomic clock provides chronometric precision essential for GPS satellites to function correctly.", "example_zh": "原子钟提供了计时精度，这对于GPS卫星的正常运作至关重要。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronize", "ipa": "ˈsɪŋkrəˌnaɪz", "pos": "v.", "definition": "to cause to occur at the same time or rate", "chinese": "使同步；使同时发生", "example": "The director instructed the two actors to synchronize their movements so they would reach the door at exactly the same moment.", "example_zh": "导演指示两名演员同步他们的动作，这样他们就能在完全相同的时刻到达门口。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronization", "ipa": "ˌsɪŋkrənɪˈzeʃən", "pos": "n.", "definition": "the act of synchronizing", "chinese": "同步化；同步", "example": "The synchronization of the orchestra's instruments required weeks of rehearsal before the concert.", "example_zh": "乐团乐器的同步化需要在音乐会前进行数周的排练。"}, {"session": "Session 16: Time and Feeling Words", "word": "synchronous", "ipa": "ˈsɪŋkrənəs", "pos": "adj.", "definition": "occurring at the same time or rate", "chinese": "同步的；同时发生的", "example": "The two satellites are in synchronous orbit, moving at the same speed as the Earth's rotation below them.", "example_zh": "这两颗卫星在同步轨道上运行，移动速度与其下方地球的自转速度相同。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathology", "ipa": "pəˈθɑlədʒɪ", "pos": "n.", "definition": "the science or study of disease", "chinese": "病理学；病理", "example": "The field of pathology is essential for understanding how diseases develop and how they affect the body.", "example_zh": "病理学领域对于理解疾病如何发展以及如何影响人体至关重要。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathologist", "ipa": "pəˈθɑlədʒɪst", "pos": "n.", "definition": "an expert who examines tissue to diagnose disease", "chinese": "病理学家；病理科医师", "example": "The pathologist examined the biopsy under a microscope and confirmed that the cells were malignant.", "example_zh": "病理学家在显微镜下检查了活体切片，并确认这些细胞是恶性的。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathy", "ipa": "ˈsɪmpəθɪ", "pos": "n.", "definition": "sharing of another's feelings", "chinese": "同情；怜悯；体谅", "example": "She expressed her deepest sympathy to the bereaved family after hearing about the tragic accident.", "example_zh": "听说了这场悲惨的意外后，她向丧亲的家庭表达了她最深切的同情。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathetic", "ipa": "ˌsɪmpəˈθɛtɪk", "pos": "adj.", "definition": "showing understanding of another's feelings", "chinese": "同情的；体谅的；有同情心的", "example": "The sympathetic teacher stayed after class to listen to the student's personal struggles and offer guidance.", "example_zh": "这位富有同情心的老师在课后留下来倾听学生的个人困境并提供指导。"}, {"session": "Session 16: Time and Feeling Words", "word": "sympathize", "ipa": "ˈsɪmpəˌθaɪz", "pos": "v.", "definition": "to feel sympathy for", "chinese": "同情；表示同情；体谅", "example": "It is difficult to sympathize with someone who shows no remorse for the harm they have caused others.", "example_zh": "很难对一个对自己造成的伤害毫无悔意的人表示同情。"}, {"session": "Session 16: Time and Feeling Words", "word": "antipathy", "ipa": "ænˈtɪpəθɪ", "pos": "n.", "definition": "strong dislike or hostility", "chinese": "强烈反感；厌恶；敌意", "example": "She felt an immediate antipathy toward the new supervisor, who seemed dismissive and arrogant from the first meeting.", "example_zh": "她对新主管立刻产生了强烈的反感，此人从第一次会面起就显得轻蔑而傲慢。"}, {"session": "Session 16: Time and Feeling Words", "word": "antipathetic", "ipa": "ˌæntɪpəˈθɛtɪk", "pos": "adj.", "definition": "pertaining to strong dislike or hostility", "chinese": "反感的；充满敌意的；令人厌恶的", "example": "His antipathetic attitude toward change made it very difficult to implement new procedures in the department.", "example_zh": "他对改变的反感态度使得在部门内推行新程序变得非常困难。"}, {"session": "Session 16: Time and Feeling Words", "word": "apathy", "ipa": "ˈæpəθɪ", "pos": "n.", "definition": "lack of feeling; indifference", "chinese": "冷漠；漠不关心；无感", "example": "Voter apathy is a serious problem in many democracies, where large portions of the population do not bother to vote.", "example_zh": "选民冷漠是许多民主国家面临的严重问题，大部分人口根本不去投票。"}, {"session": "Session 16: Time and Feeling Words", "word": "apathetic", "ipa": "ˌæpəˈθɛtɪk", "pos": "adj.", "definition": "showing indifference or lack of response", "chinese": "冷漠的；漠不关心的；无动于衷的", "example": "The students seemed apathetic about the class project, putting in minimal effort and showing little enthusiasm.", "example_zh": "学生们对班级专题似乎漠不关心，只付出了最少的努力，几乎没有表现出任何热情。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathy", "ipa": "ˈɛmpəθɪ", "pos": "n.", "definition": "identification with and experience of another's feelings", "chinese": "同理心；感同身受", "example": "A good counselor needs empathy — the ability to truly understand and share the feelings of the people they are helping.", "example_zh": "一位好的辅导员需要同理心——真正理解并分享他们所帮助对象感受的能力。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathize", "ipa": "ˈɛmpəˌθaɪz", "pos": "v.", "definition": "to feel empathy", "chinese": "感同身受；产生共鸣；体会他人感受", "example": "Having experienced homelessness herself, she could empathize deeply with the struggles of people living on the streets.", "example_zh": "由于她自己曾经历过无家可归，她能深深地感受到街头游民的艰辛。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathetic", "ipa": "ˌɛmpəˈθɛtɪk", "pos": "adj.", "definition": "showing empathy", "chinese": "有同理心的；感同身受的", "example": "An empathetic response is more helpful than simply telling someone to \"look on the bright side.\"", "example_zh": "一个有同理心的回应比单纯告诉别人「要往好的方向看」更有帮助。"}, {"session": "Session 16: Time and Feeling Words", "word": "empathic", "ipa": "ɛmˈpæθɪk", "pos": "adj.", "definition": "alternate form of empathetic", "chinese": "有同理心的（empathetic的另一种形式）", "example": "Her empathic nature made her the person everyone turned to when they needed to talk through a problem.", "example_zh": "她富有同理心的天性使她成为每个人在需要倾诉问题时都会找的人。"}, {"session": "Session 16: Time and Feeling Words", "word": "pathetic", "ipa": "pəˈθɛtɪk", "pos": "adj.", "definition": "arousing sorrow or pity; evoking sympathy", "chinese": "可悲的；令人怜悯的；悲哀的", "example": "The lost puppy wandering in the rain was such a pathetic sight that passersby immediately stopped to help.", "example_zh": "那只在雨中流浪的迷途小狗看起来如此可怜，路人立刻停下来伸出援手。"}, {"session": "Session 16: Time and Feeling Words", "word": "telepathy", "ipa": "tɪˈlɛpəθɪ", "pos": "n.", "definition": "extrasensory communication; thought transference", "chinese": "心灵感应；传心术", "example": "Some identical twins claim to experience a form of telepathy, sensing each other's emotions across great distances.", "example_zh": "一些同卵双胞胎声称体验过一种心灵感应，即使相隔遥远也能感知彼此的情绪。"}, {"session": "Session 16: Time and Feeling Words", "word": "telepathic", "ipa": "ˌtɛlɪˈpæθɪk", "pos": "adj.", "definition": "relating to thought transference or ESP", "chinese": "心灵感应的；超感知觉的", "example": "The character in the novel had telepathic abilities that allowed her to read the thoughts of those around her.", "example_zh": "小说中的这个角色拥有心灵感应的能力，可以读取周围人的想法。"}], "Session 17: Conscience and Groups": [{"session": "Session 17: Conscience and Groups", "word": "unconscionability", "ipa": "ʌnˌkɑnʃənəˈbɪlɪtɪ", "pos": "n.", "definition": "the state of having no conscience", "chinese": "无良心；昧著良心的状态", "example": "The judge cited the unconscionability of the contract, which took advantage of an elderly customer who couldn't read.", "example_zh": "法官引用了合约的无良心性，该合约利用了一位不识字的年长顾客。"}, {"session": "Session 17: Conscience and Groups", "word": "omniscient", "ipa": "ɑmˈnɪʃənt", "pos": "adj.", "definition": "all-knowing; possessing infinite knowledge", "chinese": "全知的；无所不知的", "example": "In many religions, God is described as omniscient, aware of every thought, action, and event across all time.", "example_zh": "在许多宗教中，上帝被描述为全知的，了解所有时间中的每一个想法、行动和事件。"}, {"session": "Session 17: Conscience and Groups", "word": "omniscience", "ipa": "ɑmˈnɪʃəns", "pos": "n.", "definition": "the state of being all-knowing", "chinese": "全知；无所不知", "example": "The idea of divine omniscience raises philosophical questions about free will and predestination.", "example_zh": "神圣全知的概念引发了关于自由意志与命定论的哲学问题。"}, {"session": "Session 17: Conscience and Groups", "word": "prescient", "ipa": "ˈprɛʃənt", "pos": "adj.", "definition": "knowing about events before they occur", "chinese": "有先见之明的；预知未来的", "example": "The analyst's prescient warning about the housing market bubble went unheeded until the crash occurred.", "example_zh": "这位分析师对房地产市场泡沫的先见之明警告在崩盘发生前一直未被理会。"}, {"session": "Session 17: Conscience and Groups", "word": "prescience", "ipa": "ˈprɛʃəns", "pos": "n.", "definition": "foreknowledge; ability to predict events", "chinese": "先见之明；预知能力", "example": "With remarkable prescience, she had predicted the company's decline two years before it actually happened.", "example_zh": "她以非凡的先见之明，在公司实际衰落的两年前就预测到了这一点。"}, {"session": "Session 17: Conscience and Groups", "word": "nescient", "ipa": "ˈnɛʃənt", "pos": "adj.", "definition": "not knowing; ignorant", "chinese": "无知的；不知道的", "example": "He remained nescient of the policy changes because he had missed all the department meetings that month.", "example_zh": "由于他缺席了那个月所有的部门会议，他对政策变化一无所知。"}, {"session": "Session 17: Conscience and Groups", "word": "nescience", "ipa": "ˈnɛʃəns", "pos": "n.", "definition": "ignorance", "chinese": "无知；不知", "example": "Her nescience of local customs led to several embarrassing misunderstandings during her first week abroad.", "example_zh": "她对当地习俗的无知在她出国的第一周造成了几次令人尴尬的误会。"}, {"session": "Session 17: Conscience and Groups", "word": "glibness", "ipa": "ˈɡlɪbnəs", "pos": "n.", "definition": "the quality of being smooth and suspiciously fluent", "chinese": "油嘴滑舌；巧言善辩", "example": "The interviewer was put off by the candidate's glibness — his answers sounded rehearsed rather than genuine.", "example_zh": "面试官对这位应试者的油嘴滑舌感到不舒服——他的回答听起来像是事先排练过的，而非真诚的。"}, {"session": "Session 17: Conscience and Groups", "word": "egregiousness", "ipa": "ɪˈɡridʒəsnəs", "pos": "n.", "definition": "the quality of being outstandingly bad", "chinese": "极度恶劣；骇人听闻", "example": "The egregiousness of the fraud — which stole life savings from thousands of retirees — shocked the nation.", "example_zh": "这起诈骗案的极度恶劣——从数千名退休人员手中盗走了毕生积蓄——震惊了全国。"}, {"session": "Session 17: Conscience and Groups", "word": "gregarious", "ipa": "ɡrɪˈɡɛrɪəs", "pos": "adj.", "definition": "enjoying companionship and group activities", "chinese": "爱社交的；喜好群居的；合群的", "example": "Her gregarious personality made her the life of every party, always surrounded by friends and laughter.", "example_zh": "她爱社交的个性使她成为每场派对的灵魂人物，总是被朋友和笑声包围。"}, {"session": "Session 17: Conscience and Groups", "word": "gregariousness", "ipa": "ɡrɪˈɡɛrɪəsnəs", "pos": "n.", "definition": "the quality of being sociable and group-oriented", "chinese": "爱社交的特质；合群性", "example": "His gregariousness meant he struggled to work alone and thrived whenever he was part of a team.", "example_zh": "他爱社交的特质意味著他难以独自工作，但只要成为团队的一份子就能茁壮成长。"}, {"session": "Session 17: Conscience and Groups", "word": "congregate", "ipa": "ˈkɑŋɡrɪˌɡet", "pos": "v.", "definition": "to gather together as a group", "chinese": "聚集；集合；群集", "example": "Hundreds of protesters congregated in the town square to demand changes to the new education policy.", "example_zh": "数百名抗议者聚集在市政广场，要求对新教育政策作出改变。"}, {"session": "Session 17: Conscience and Groups", "word": "congregation", "ipa": "ˌkɑŋɡrɪˈɡeʃən", "pos": "n.", "definition": "a group gathered together; a religious flock", "chinese": "集会；（宗教）会众；教众", "example": "The congregation listened attentively as the minister delivered his sermon on the importance of forgiveness.", "example_zh": "会众专注地聆听著牧师就宽恕之重要性所作的布道。"}, {"session": "Session 17: Conscience and Groups", "word": "segregate", "ipa": "ˈsɛɡrɪˌɡet", "pos": "v.", "definition": "to set apart from the rest", "chinese": "隔离；使分离；种族隔离", "example": "The hospital decided to segregate patients with infectious diseases from the general wards to prevent the spread of illness.", "example_zh": "医院决定将传染病患者与普通病房隔离，以防止疾病扩散。"}, {"session": "Session 17: Conscience and Groups", "word": "segregation", "ipa": "ˌsɛɡrɪˈɡeʃən", "pos": "n.", "definition": "the act of setting apart or separating", "chinese": "隔离；种族隔离；分离", "example": "Racial segregation in American schools was declared unconstitutional by the Supreme Court in 1954.", "example_zh": "1954年，美国最高法院裁定美国学校中的种族隔离违宪。"}, {"session": "Session 17: Conscience and Groups", "word": "aggregate", "ipa": "ˈæɡrɪɡɪt", "pos": "v./n.", "definition": "to gather into a mass or whole; a total group or mass", "chinese": "聚集；总计；总体；集合体", "example": "When you aggregate all the survey responses, the overall satisfaction rate comes to seventy-eight percent.", "example_zh": "当你汇总所有调查回复时，整体满意度达到了百分之七十八。"}, {"session": "Session 17: Conscience and Groups", "word": "aggregation", "ipa": "ˌæɡrɪˈɡeʃən", "pos": "n.", "definition": "a collection of individuals into a whole", "chinese": "聚集；集合；集合体", "example": "The city's cultural richness is a product of the aggregation of immigrants from dozens of different countries.", "example_zh": "这座城市的文化丰富性是来自数十个不同国家的移民聚集的产物。"}], "Session 19: Verbs for Actions and Attitudes": [{"session": "Session 19: Verbs for Actions and Attitudes", "word": "disparage", "ipa": "dɪˈspærɪdʒ", "pos": "v.", "definition": "to belittle; to speak of as having little value or importance", "chinese": "贬低；轻视；看轻", "example": "She disparaged his efforts, claiming the project was not worth pursuing.", "example_zh": "她贬低他的努力，声称这个项目不值得追求。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "equivocate", "ipa": "ɪˈkwɪvəkeɪt", "pos": "v.", "definition": "to speak in deliberately vague or ambiguous language to mislead", "chinese": "说话含糊其词；故意模棱两可以误导他人", "example": "When asked about the missing funds, the manager equivocated instead of giving a direct answer.", "example_zh": "当被问及失踪的资金时，那位经理含糊其词，不肯给出直接答案。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "titillate", "ipa": "ˈtɪtɪleɪt", "pos": "v.", "definition": "to excite pleasurably; to tickle or stimulate agreeably", "chinese": "使愉快地兴奋；逗弄；令人愉悦地刺激", "example": "The trailer was designed to titillate audiences and build anticipation for the film.", "example_zh": "这段预告片旨在让观众感到兴奋，为电影营造期待感。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "adulate", "ipa": "ˈædʒʊleɪt", "pos": "v.", "definition": "to flatter or admire excessively and fulsomely", "chinese": "过度奉承；谄媚；盲目崇拜", "example": "The fans adulated the pop star, showering her with gifts and endless praise.", "example_zh": "粉丝们对那位流行歌手盲目崇拜，送上礼物和无尽的赞美。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "proscribe", "ipa": "proʊˈskraɪb", "pos": "v.", "definition": "to prohibit; to forbid as harmful or dangerous", "chinese": "禁止；明令禁止（某事物）为有害或危险的", "example": "The government proscribed the use of certain pesticides after they were found to harm wildlife.", "example_zh": "政府在发现某些杀虫剂会危害野生动物后，明令禁止使用。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "obviate", "ipa": "ˈɒbvieɪt", "pos": "v.", "definition": "to make unnecessary; to prevent by taking effective advance steps", "chinese": "使不必要；事先预防；消除（困难或需求）", "example": "Installing a backup generator would obviate the need to shut down operations during power outages.", "example_zh": "安装备用发电机可以消除停电时需要中断运作的需要。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "militate", "ipa": "ˈmɪlɪteɪt", "pos": "v.", "definition": "to work against; to have force or influence against (always followed by \"against\")", "chinese": "起反作用；（对某事）产生不利影响（后接 against）", "example": "His lack of relevant experience militated against his chances of getting the promotion.", "example_zh": "他缺乏相关经验，对他获得晋升的机会产生了不利影响。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "malign", "ipa": "məˈlaɪn", "pos": "v.", "definition": "to slander; to speak evil of; to defame", "chinese": "诽谤；说坏话；中伤", "example": "He was wrongly maligned by his rivals, who spread false rumors about his conduct.", "example_zh": "他被对手恶意中伤，对方散布关于他行为的谎言。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "condone", "ipa": "kənˈdoʊn", "pos": "v.", "definition": "to overlook or forgive a transgression; to pardon implicitly", "chinese": "默许；宽恕；对过失视而不见", "example": "The principal refused to condone cheating, no matter how minor the offense.", "example_zh": "校长拒绝默许作弊行为，无论违规行为多么轻微。"}, {"session": "Session 19: Verbs for Actions and Attitudes", "word": "placate", "ipa": "ˈpleɪkeɪt", "pos": "v.", "definition": "to soothe or pacify; to change hostility into friendliness", "chinese": "安抚；平息；化敌意为友善", "example": "The manager tried to placate the angry customer by offering a full refund.", "example_zh": "经理试图透过提供全额退款来安抚那位愤怒的顾客。"}], "Session 20: Words about Equality and Vagueness": [{"session": "Session 20: Words about Equality and Vagueness", "word": "parity", "ipa": "ˈpærɪti", "pos": "n.", "definition": "equality", "chinese": "平等；同等；对等", "example": "Workers demanded pay parity with their counterparts in other departments.", "example_zh": "工人要求与其他部门的同仁享有同等薪酬。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparity", "ipa": "dɪˈspærɪti", "pos": "n.", "definition": "inequality; a difference or lack of equality", "chinese": "不平等；差距；不一致", "example": "There is a growing disparity in income between the wealthy and the poor.", "example_zh": "富人与穷人之间的收入差距正在日益扩大。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparate", "ipa": "ˈdɪspərɪt", "pos": "adj.", "definition": "essentially and completely different; wholly unlike", "chinese": "截然不同的；本质上完全相异的", "example": "The committee was made up of disparate groups who rarely agreed on anything.", "example_zh": "委员会由几个截然不同的群体组成，他们很少在任何事情上达成共识。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "disparagement", "ipa": "dɪˈspærɪdʒmənt", "pos": "n.", "definition": "the act of belittling or speaking lowly of someone", "chinese": "贬低；轻视；蔑视的言语或行为", "example": "His constant disparagement of his colleagues created a toxic work environment.", "example_zh": "他不断贬低同事，造成了有毒的工作环境。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "peer", "ipa": "pɪr", "pos": "n.", "definition": "one's equal in age, rank, or ability", "chinese": "同侪；同等地位的人；同龄人", "example": "She was respected and admired by her peers for her innovative research.", "example_zh": "她因其创新研究而受到同侪的尊重和钦佩。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "equivocal", "ipa": "ɪˈkwɪvəkəl", "pos": "adj.", "definition": "deliberately vague; open to contradictory interpretations", "chinese": "故意含糊的；模棱两可的；可作多种解读的", "example": "His equivocal response left everyone unsure of whether he supported the proposal.", "example_zh": "他模棱两可的回应让所有人都不确定他是否支持该提案。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "unequivocal", "ipa": "ˌʌnɪˈkwɪvəkəl", "pos": "adj.", "definition": "clear; direct; capable of only one interpretation", "chinese": "明确的；清晰的；毫无歧义的", "example": "The general gave an unequivocal order: retreat immediately.", "example_zh": "将军下达了明确的命令：立即撤退。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "equivocation", "ipa": "ɪˌkwɪvəˈkeɪʃən", "pos": "n.", "definition": "deliberate use of vague or misleading language", "chinese": "含糊其词；故意模棱两可的表达", "example": "The politician's equivocation during the debate frustrated voters who wanted clear answers.", "example_zh": "政客在辩论中含糊其词，令希望得到清晰答案的选民大感沮丧。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "ambiguous", "ipa": "æmˈbɪɡjuəs", "pos": "adj.", "definition": "accidentally or unintentionally vague; open to misinterpretation", "chinese": "（无意地）含糊不清的；可能引起误解的", "example": "The instructions were so ambiguous that half the team interpreted them differently.", "example_zh": "说明写得如此含糊，以至于一半的团队成员作出了不同的理解。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "ambiguity", "ipa": "ˌæmbɪˈɡjuːɪti", "pos": "n.", "definition": "state of being open to more than one interpretation", "chinese": "歧义；含糊不清；可作多种解读的状态", "example": "The ambiguity of the contract clause led to a lengthy legal dispute.", "example_zh": "合约条款的歧义引发了漫长的法律纠纷。"}, {"session": "Session 20: Words about Equality and Vagueness", "word": "double entendre", "ipa": "ˌdʌbəl ɒnˈtɒndrə", "pos": "n.", "definition": "a word or phrase with two meanings, one of which is risqué", "chinese": "双关语（其中一个含义较为暧昧或不雅）", "example": "The comedian's script was full of double entendres that made the adults laugh while the children remained oblivious.", "example_zh": "那位喜剧演员的剧本充满了双关语，让大人们忍俊不禁，而孩子们却毫无察觉。"}], "Session 21: More Equality Words and Voice Words": [{"session": "Session 21: More Equality Words and Voice Words", "word": "equity", "ipa": "ˈekwɪti", "pos": "n.", "definition": "fairness; justice; equal treatment", "chinese": "公平；公正；平等对待", "example": "The new policy was designed to promote equity in hiring practices across all departments.", "example_zh": "新政策旨在促进所有部门招聘实践的公平性。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equitable", "ipa": "ˈekwɪtəbəl", "pos": "adj.", "definition": "fair; just", "chinese": "公平的；公正的", "example": "The judge sought an equitable solution that would satisfy both parties in the dispute.", "example_zh": "法官寻求一个能让纠纷双方都满意的公正解决方案。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "inequity", "ipa": "ɪnˈekwɪti", "pos": "n.", "definition": "injustice; unfairness", "chinese": "不公平；不公正", "example": "Activists protested against the inequity of the tax system, which burdened the poor disproportionately.", "example_zh": "社运人士抗议税制的不公平，认为它不成比例地加重了穷人的负担。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "inequitable", "ipa": "ɪnˈekwɪtəbəl", "pos": "adj.", "definition": "unfair; unjust", "chinese": "不公平的；不公正的", "example": "The inequitable distribution of resources left rural communities at a significant disadvantage.", "example_zh": "资源的不公平分配使农村社区处于严重的不利地位。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "iniquity", "ipa": "ɪˈnɪkwɪti", "pos": "n.", "definition": "wickedness; sinfulness; a grossly immoral act", "chinese": "邪恶；不道德；罪恶行为", "example": "The preacher spoke passionately against the iniquity he witnessed in the city streets.", "example_zh": "那位牧师慷慨激昂地谴责他在城市街道上目睹的邪恶行径。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "iniquitous", "ipa": "ɪˈnɪkwɪtəs", "pos": "adj.", "definition": "wicked; sinful; grossly immoral", "chinese": "邪恶的；不道德的；罪恶的", "example": "The iniquitous scheme defrauded thousands of elderly people of their savings.", "example_zh": "那个邪恶的骗局使数千名老人的积蓄化为乌有。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equinox", "ipa": "ˈiːkwɪnɒks", "pos": "n.", "definition": "the time when day and night are of equal length (twice yearly)", "chinese": "昼夜平分点；春分或秋分", "example": "Many cultures around the world celebrate the spring equinox as a symbol of renewal and balance.", "example_zh": "世界各地许多文化都以春分作为更新与平衡的象征加以庆祝。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "nocturnal", "ipa": "nɒkˈtɜːrnəl", "pos": "adj.", "definition": "active or flourishing at night rather than during daylight", "chinese": "夜行性的；在夜间活动或繁盛的", "example": "Owls are nocturnal predators that hunt under the cover of darkness.", "example_zh": "猫头鹰是夜行性掠食者，在黑暗的掩护下狩猎。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "nocturne", "ipa": "ˈnɒktɜːrn", "pos": "n.", "definition": "a musical composition of dreamy character; a night scene painting", "chinese": "夜曲；夜景画", "example": "Chopin's nocturnes are celebrated for their lyrical melodies and intimate, reflective mood.", "example_zh": "萧邦的夜曲以其抒情旋律和亲密、沉思的情调而闻名。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equanimity", "ipa": "ˌiːkwəˈnɪmɪti", "pos": "n.", "definition": "evenness of temper; composure; calmness under stress", "chinese": "心平气和；沉著；泰然自若", "example": "Despite the crisis unfolding around her, she handled every problem with remarkable equanimity.", "example_zh": "尽管危机在她周围不断发生，她仍以非凡的沉著应对每一个问题。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equability", "ipa": "ˌekwəˈbɪlɪti", "pos": "n.", "definition": "a close synonym of equanimity; calmness; even-temperedness", "chinese": "平和；稳定的心境；不易激动的性情", "example": "His equability in the face of criticism made him a natural leader.", "example_zh": "他面对批评时的平和心态使他成为天生的领导者。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equable", "ipa": "ˈekwəbəl", "pos": "adj.", "definition": "calm; serene; unflappable; even-tempered", "chinese": "平静的；沉稳的；不易激动的", "example": "Her equable personality made her a joy to work with even during stressful deadlines.", "example_zh": "她沉稳的个性使她即使在压力紧迫的截止日期前也令人愉快地共事。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilibrium", "ipa": "ˌiːkwɪˈlɪbriəm", "pos": "n.", "definition": "a state of physical balance, especially between opposing forces", "chinese": "平衡；均衡；（相对力量间的）平衡状态", "example": "The ecosystem maintained its equilibrium until the introduction of an invasive species disrupted the balance.", "example_zh": "生态系统维持著其平衡状态，直到一个入侵物种的引入破坏了这种平衡。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilibrist", "ipa": "ɪˈkwɪlɪbrɪst", "pos": "n.", "definition": "a professional tightrope walker", "chinese": "走钢丝者；职业走绳表演者", "example": "The equilibrist crossed the wire suspended high above the crowd without a safety net.", "example_zh": "那位走绳表演者在高悬于人群之上的钢丝上行走，没有任何安全网。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equilateral", "ipa": "ˌiːkwɪˈlætərəl", "pos": "adj.", "definition": "having equal sides", "chinese": "等边的；各边相等的", "example": "An equilateral triangle has three sides of identical length and three equal angles.", "example_zh": "等边三角形有三条等长的边和三个相等的角。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equestrian", "ipa": "ɪˈkwestriən", "pos": "n./adj.", "definition": "a person on horseback; pertaining to horseback riding", "chinese": "骑马者；骑马的；与马术相关的", "example": "The equestrian statue in the town square depicted a general astride his warhorse.", "example_zh": "广场上的骑马雕像描绘了一位将军骑著他的战马的英姿。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equestrienne", "ipa": "ɪˌkwestriˈen", "pos": "n.", "definition": "a woman on horseback", "chinese": "女骑士；女性骑马者", "example": "The equestrienne guided her horse through the obstacle course with elegant precision.", "example_zh": "那位女骑士以优雅的精准度引导她的马穿越障碍课程。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "equine", "ipa": "ˈiːkwaɪn", "pos": "adj./n.", "definition": "like or pertaining to horses; a horse", "chinese": "马的；与马有关的；马（名词用法）", "example": "The veterinarian specialized in equine medicine and treated horses at several local farms.", "example_zh": "那位兽医专攻马科动物医学，在几个当地农场为马匹看诊。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vociferous", "ipa": "voʊˈsɪfərəs", "pos": "adj.", "definition": "loud; noisy; clamorous", "chinese": "吵闹的；大声叫嚷的；喧嚣的", "example": "Vociferous protesters gathered outside the courthouse to demand justice.", "example_zh": "吵闹的抗议者聚集在法院外要求伸张正义。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocal", "ipa": "ˈvoʊkəl", "pos": "adj.", "definition": "pertaining to the voice; freely expressive", "chinese": "声音的；直言不讳的；积极表达意见的", "example": "She was vocal about her opposition to the proposed budget cuts.", "example_zh": "她对拟议的预算削减直言不讳地表示反对。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocalize", "ipa": "ˈvoʊkəlaɪz", "pos": "v.", "definition": "to give voice to; to sing", "chinese": "发声；唱出；以声音表达", "example": "The choir director encouraged the students to vocalize their feelings through song.", "example_zh": "合唱团指导老师鼓励学生透过歌唱来发声表达情感。"}, {"session": "Session 21: More Equality Words and Voice Words", "word": "vocalist", "ipa": "ˈvoʊkəlɪst", "pos": "n.", "definition": "a singer", "chinese": "歌手；声乐家", "example": "The lead vocalist of the band captivated the audience with her powerful, soulful voice.", "example_zh": "乐队的主唱以她强而有力、充满灵魂的嗓音迷住了观众。"}], "Session 22: Flattery, Prohibition, and Related Words": [{"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "titillation", "ipa": "ˌtɪtɪˈleɪʃən", "pos": "n.", "definition": "pleasurable stimulation; light sexual excitement", "chinese": "愉快的刺激；轻微的性兴奋；逗弄", "example": "The tabloid relied on titillation rather than substance to sell copies.", "example_zh": "那份小报靠挑逗读者而非实质内容来促进销售。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "adulation", "ipa": "ˌædjʊˈleɪʃən", "pos": "n.", "definition": "excessive flattery and worship", "chinese": "过度奉承；盲目崇拜；谄媚", "example": "The rock star grew tired of the adulation and longed for a private, ordinary life.", "example_zh": "那位摇滚明星厌倦了盲目的崇拜，渴望过上普通的私人生活。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "adulatory", "ipa": "ˈædjʊlətɔːri", "pos": "adj.", "definition": "worshipful; excessively flattering", "chinese": "过分奉承的；谄媚的；极尽赞美的", "example": "The adulatory review barely mentioned any flaws in the film.", "example_zh": "那篇极尽赞美的评论几乎没有提及这部电影的任何缺点。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "proscription", "ipa": "proʊˈskrɪpʃən", "pos": "n.", "definition": "a prohibition; a formal forbidding", "chinese": "禁令；正式的禁止", "example": "The proscription on open fires during drought season was strictly enforced.", "example_zh": "干旱季节禁止野外用火的禁令被严格执行。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "proscriptive", "ipa": "proʊˈskrɪptɪv", "pos": "adj.", "definition": "relating to or of the nature of a prohibition", "chinese": "禁止性的；带有禁令性质的", "example": "The proscriptive regulations limited what vendors could sell at the market.", "example_zh": "那些禁止性法规限制了商贩在市场上可以出售的商品。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "obviation", "ipa": "ˌɒbvɪˈeɪʃən", "pos": "n.", "definition": "the act of making something unnecessary", "chinese": "消除（必要性）；预防；排除", "example": "The new software update achieved the obviation of several manual steps in the workflow.", "example_zh": "新的软体更新消除了工作流程中几个手动步骤的必要性。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivial", "ipa": "ˈtrɪviəl", "pos": "adj.", "definition": "of little importance or significance", "chinese": "琐碎的；微不足道的；不重要的", "example": "Don't waste the meeting's time on trivial matters when there are major decisions to make.", "example_zh": "在需要做出重大决定时，不要把会议时间浪费在琐碎的事情上。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivialities", "ipa": "ˌtrɪvɪˈælɪtiz", "pos": "n. (pl.)", "definition": "unimportant things; trifles", "chinese": "琐事；微不足道的事物", "example": "She was so caught up in the trivialities of daily life that she lost sight of her long-term goals.", "example_zh": "她太沉浸于日常琐事中，以至于忽略了她的长远目标。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "trivia", "ipa": "ˈtrɪviə", "pos": "n. (pl.)", "definition": "insignificant matters", "chinese": "琐事；无关紧要的事物；冷知识", "example": "He had an extraordinary memory for trivia, winning every pub quiz he entered.", "example_zh": "他对琐碎知识有著惊人的记忆力，参加的每一场酒吧问答赛都能获胜。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "militant", "ipa": "ˈmɪlɪtənt", "pos": "adj./n.", "definition": "aggressively fighting for a cause; a person doing so", "chinese": "好战的；激进的；积极斗争者", "example": "Militant activists blockaded the factory entrance to protest environmental violations.", "example_zh": "激进的社运人士封锁了工厂入口，抗议环境违规行为。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "militancy", "ipa": "ˈmɪlɪtənsi", "pos": "n.", "definition": "aggressiveness in fighting for a cause", "chinese": "好战性；激进主义；斗争性", "example": "The increasing militancy of the labor movement forced the company to negotiate.", "example_zh": "劳工运动日益增强的激进性迫使公司进行谈判。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malign (adj.)", "ipa": "məˈlaɪn", "pos": "adj.", "definition": "bad; harmful; evil; hateful", "chinese": "有害的；恶意的；邪恶的；令人憎恨的", "example": "The doctor warned of the malign effects of prolonged stress on the immune system.", "example_zh": "医生警告长期压力对免疫系统的有害影响。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignant", "ipa": "məˈlɪɡnənt", "pos": "adj.", "definition": "showing deep hatred; cancerous; harmful", "chinese": "恶意深重的；恶性的（如肿瘤）；有害的", "example": "The biopsy confirmed that the tumor was malignant and required immediate treatment.", "example_zh": "活组织检查确认肿瘤为恶性，需要立即治疗。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignancy", "ipa": "məˈlɪɡnənsi", "pos": "n.", "definition": "a cancerous growth; the state of being harmful or hateful", "chinese": "恶性肿瘤；恶意；有害的状态", "example": "Early detection of malignancy significantly improves the patient's chances of survival.", "example_zh": "及早发现恶性肿瘤能显著提高患者的存活率。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malignity", "ipa": "məˈlɪɡnɪti", "pos": "n.", "definition": "the quality of being malign", "chinese": "恶意；深切的憎恨；有害性", "example": "The malignity behind his seemingly kind words only became apparent later.", "example_zh": "他看似友善的话语背后的恶意只是在后来才变得明显。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malediction", "ipa": "ˌmælɪˈdɪkʃən", "pos": "n.", "definition": "a curse; an evil saying", "chinese": "诅咒；恶言咒骂", "example": "The old woman hurled maledictions at those who had wronged her family.", "example_zh": "那位老妇人对伤害她家人的人大声诅咒。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malevolent", "ipa": "məˈlevələnt", "pos": "adj.", "definition": "wishing evil or harm; ill-willed", "chinese": "恶意的；怀有恶意的；心怀不轨的", "example": "A malevolent glare from the stranger made everyone in the room uneasy.", "example_zh": "陌生人恶意的怒视让房间里的每个人都感到不安。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malevolence", "ipa": "məˈlevələns", "pos": "n.", "definition": "the quality of wishing evil", "chinese": "恶意；恶毒；恶念", "example": "The villain's malevolence was so palpable it seemed to fill the room.", "example_zh": "那个恶棍的恶意如此明显，似乎充斥了整个房间。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maleficent", "ipa": "məˈlefɪsənt", "pos": "adj.", "definition": "doing harm or evil", "chinese": "作恶的；造成伤害的；行恶的", "example": "The maleficent sorcerer cast a spell that brought drought and famine to the land.", "example_zh": "那个作恶的巫师施下咒语，使大地遭受旱灾和饥荒。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maleficence", "ipa": "məˈlefɪsəns", "pos": "n.", "definition": "the act or quality of doing harm", "chinese": "作恶；造成伤害的行为或性质", "example": "The court condemned the corporation's maleficence in knowingly polluting the water supply.", "example_zh": "法院谴责该公司明知故犯地污染水源的恶行。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malefactor", "ipa": "ˈmælɪfæktər", "pos": "n.", "definition": "a wrongdoer; a criminal", "chinese": "作恶者；罪犯；违法者", "example": "The detective vowed to track down the malefactor responsible for the string of robberies.", "example_zh": "那位侦探发誓要追踪一连串抢劫案的罪犯。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malefaction", "ipa": "ˌmælɪˈfækʃən", "pos": "n.", "definition": "a crime; an evil deed", "chinese": "罪行；恶行；犯罪行为", "example": "The judge declared that no malefaction, however small, would go unpunished.", "example_zh": "法官宣告任何罪行，无论多小，都不会逃脱惩罚。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maladroit", "ipa": "ˌmæləˈdrɔɪt", "pos": "adj.", "definition": "clumsy; bungling; awkward; unskillful", "chinese": "笨拙的；不灵巧的；处事不当的", "example": "His maladroit attempt at a compliment ended up offending the very person he was trying to flatter.", "example_zh": "他笨拙的赞美尝试最终冒犯了他试图奉承的那个人。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "maladroitness", "ipa": "ˌmæləˈdrɔɪtnəs", "pos": "n.", "definition": "clumsiness; awkwardness", "chinese": "笨拙；不灵巧；处事不当", "example": "His maladroitness in social situations made networking events particularly painful for him.", "example_zh": "他在社交场合的笨拙使交流活动对他来说尤为痛苦。"}, {"session": "Session 22: Flattery, Prohibition, and Related Words", "word": "malaise", "ipa": "məˈleɪz", "pos": "n.", "definition": "an indefinite feeling of bodily discomfort; vague unease", "chinese": "不适感；莫名的身体不舒适；隐隐的忧郁", "example": "A general malaise settled over the office after the announcement of layoffs.", "example_zh": "裁员公告发出后，办公室笼罩著一种普遍的忧郁感。"}], "Session 23: The Good News — Bene- Words and Related Terms": [{"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benign", "ipa": "bɪˈnaɪn", "pos": "adj.", "definition": "kindly; good-natured; not harmful or cancerous", "chinese": "和善的；好脾气的；良性的（如肿瘤）", "example": "The biopsy results were a relief — the tumor was benign and required no further treatment.", "example_zh": "活组织检查结果令人放心——肿瘤是良性的，不需要进一步治疗。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignant", "ipa": "bɪˈnɪɡnənt", "pos": "adj.", "definition": "kindly; good-natured", "chinese": "和蔼的；仁慈的；善意的", "example": "The benignant professor was known for encouraging students who struggled with the material.", "example_zh": "那位和蔼的教授以鼓励在课业上有困难的学生而闻名。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignity", "ipa": "bɪˈnɪɡnɪti", "pos": "n.", "definition": "kindliness; gentleness", "chinese": "和善；仁慈；温和", "example": "The benignity of her smile put even the most anxious patients at ease.", "example_zh": "她微笑的和善使即使最焦虑的病患也感到轻松。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benignancy", "ipa": "bɪˈnɪɡnənsi", "pos": "n.", "definition": "the quality of being benignant", "chinese": "和蔼的性质；仁慈的特质", "example": "His benignancy toward all newcomers made him a beloved figure in the community.", "example_zh": "他对所有新来者的和蔼使他成为社区中受人爱戴的人物。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benediction", "ipa": "ˌbenɪˈdɪkʃən", "pos": "n.", "definition": "a blessing; a \"saying good\"", "chinese": "祝福；祈祷；赐福", "example": "The priest offered a final benediction before the congregation departed.", "example_zh": "牧师在会众离去前给予最后的祝福。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benedictory", "ipa": "ˌbenɪˈdɪktəri", "pos": "adj.", "definition": "of or relating to a blessing", "chinese": "祝福的；赐福的；关于祝祷的", "example": "The ceremony concluded with benedictory words from the elder.", "example_zh": "典礼以长者的祝福话语作结。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficent", "ipa": "bɪˈnefɪsənt", "pos": "adj.", "definition": "doing good; performing acts of kindness", "chinese": "行善的；做好事的；慈善的", "example": "The beneficent donor funded a new wing of the hospital at no cost to the public.", "example_zh": "那位行善的捐助者资助了医院新翼的建设，费用由他自行承担。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "beneficence", "ipa": "bɪˈnefɪsəns", "pos": "n.", "definition": "the quality of doing good", "chinese": "行善；善行；慈善", "example": "Her beneficence toward the local shelter was recognized with a community award.", "example_zh": "她对当地收容所的慈善行为获得了社区奖项的表彰。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefactor", "ipa": "ˈbenɪfæktər", "pos": "n.", "definition": "one who does good for another; a patron", "chinese": "恩人；捐助者；赞助人", "example": "An anonymous benefactor donated enough money to keep the arts center open for another decade.", "example_zh": "一位匿名恩人捐款足够的金额，让艺术中心再运营十年。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefactress", "ipa": "ˈbenɪfæktrɪs", "pos": "n.", "definition": "a female benefactor", "chinese": "女恩人；女性捐助者；女赞助人", "example": "The school's library was named after the benefactress who had funded its construction.", "example_zh": "学校图书馆以出资建设的女恩人命名。"}, {"session": "Session 23: The Good News — Bene- Words and Related Terms", "word": "benefaction", "ipa": "ˌbenɪˈfækʃən", "pos":
