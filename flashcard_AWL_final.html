"objectivity","fairness","neutrality"],"grammar":"动词 bias，形容词 biased，搭配 bias toward/against，sampling bias"},{"word":"construction","pos":"n.","phonetic":"/kənˈstrʌkʃən/","cefr":"B2","meaning_zh":"建设；建筑；构建","meaning_en":"the process of building or creating something","example":"The social construction of identity is a key theme in cultural studies.","example_zh":"身份的社会建构是文化研究的一个关键主题。","synonyms":["building","creation","development"],"antonyms":["destruction","demolition"],"grammar":"动词 construct，形容词 constructive，搭配 under construction，social construction"},{"word":"ignored","pos":"v.","phonetic":"/ɪɡˈnɔːrd/","cefr":"B1","meaning_zh":"忽视的；被忽略的（ignore的过去式）","meaning_en":"paid no attention to something","example":"Critical warning signs were ignored in the early stages of the economic crisis.","example_zh":"在经济危机初期，关键预警信号被忽视了。","synonyms":["overlooked","disregarded","neglected"],"antonyms":["noticed","acknowledged","addressed"],"grammar":"动词 ignore，名词 ignorance，搭配 ignore sth，cannot be ignored"},{"word":"norms","pos":"n.","phonetic":"/nɔːrmz/","cefr":"B2","meaning_zh":"规范；准则；标准","meaning_en":"standards of behavior expected within a society","example":"Social norms vary significantly across cultures and historical periods.","example_zh":"社会规范在不同文化和历史时期之间存在显著差异。","synonyms":["standards","conventions","rules"],"antonyms":[],"grammar":"单数 norm，搭配 social/cultural norms，conform to norms，norm-setting"},{"word":"conceived","pos":"v.","phonetic":"/kənˈsiːvd/","cefr":"C1","meaning_zh":"构想的；设想的（conceive的过去式）","meaning_en":"formed or devised in the mind","example":"The original theory was conceived in the early twentieth century by a group of economists.","example_zh":"这一原始理论是由一群经济学家在二十世纪初构想出来的。","synonyms":["imagined","devised","formulated"],"antonyms":[],"grammar":"动词 conceive，名词 concept/conception，搭配 conceived as，broadly conceived"},{"word":"rational","pos":"adj.","phonetic":"/ˈræʃənl/","cefr":"B2","meaning_zh":"理性的；合理的；有理由的","meaning_en":"based on logic and reason rather than emo  philosophically"},{"word":"transport","pos":"n./v.","phonetic":"/ˈtrænspɔːrt/","cefr":"B1","meaning_zh":"运输；交通；运送","meaning_en":"the movement of people or goods from one place to another","example":"Efficient public transport systems reduce congestion and lower carbon emissions.","example_zh":"高效的公共交通系统可以减少拥堵并降低碳排放。","synonyms":["transportation","conveyance","transit"],"antonyms":[],"grammar":"名词重音在前，动词重音可在后，搭配 public transport，transport system"},{"word":"exposure","pos":"n.","phonetic":"/ɪkˈspoʊʒər/","cefr":"B2","meaning_zh":"暴露；接触；曝光","meaning_en":"the state of being in contact with something","example":"Prolonged exposure to pollutants increases the risk of respiratory disease.","example_zh":"长期接触污染物会增加患呼吸道疾病的风险。","synonyms":["contact","experience","disclosure"],"antonyms":["protection","shielding","concealment"],"grammar":"动词 expose，搭配 exposure to，media exposure，overexposure"},{"word":"contrast","pos":"n./v.","phonetic":"/ˈkɒntrɑːst/","cefr":"B2","meaning_zh":"对比；对照；差异","meaning_en":"a difference between two or more things","example":"In contrast to developed nations, many developing countries lack basic healthcare infrastructure.","example_zh":"与发达国家不同，许多发展中国家缺乏基本的医疗基础设施。","synonyms":["difference","comparison","distinction"],"antonyms":["similarity","resemblance"],"grammar":"名词重音在前，动词重音可在后，搭配 in contrast to/with，by contrast"},{"word":"benefit","pos":"n./v.","phonetic":"/ˈbenɪfɪt/","cefr":"B1","meaning_zh":"利益；好处；受益","meaning_en":"an advantage or profit gained from something","example":"The benefits of bilingual education extend beyond language acquisition to cognitive development.","example_zh":"双语教育的好处超出了语言习得，延伸至认知发展。","synonyms":["advantage","gain","profit"],"antonyms":["disadvantage","harm","loss"],"grammar":"搭配 benefit from，for the benefit of，benefit of the doubt"},{"word":"available","pos":"adj.","phonetic":"/əˈveɪləbl/","cefr":"B1","meaning_zh":"可用的；可获得的；有空的","meaning_en":"able to be used or obtained","example":"Limited funding makes it difficult to access all available research resources.","example_zh":"有限的资金使得获取所有可用研究资源变得困难。","synonyms":["accessible","obtainable","free"],"antonyms":["unavailable","inaccessible","occupied"],"grammar":"名词 availability，搭配 readily available，available to/for"},{"word":"facilitate","pos":"v.","phonetic":"/fəˈsɪlɪteɪt/","cefr":"B2","meaning_zh":"促进；便利；使容易","meaning_en":"to make an action or process easier","example":"Technology can facilitate collaborative learning across geographic boundaries.","example_zh":"技术可以促进跨越地理界限的协作学习。","synonyms":["enable","assist","promote"],"antonyms":["hinder","obstruct","impede"],"grammar":"名词 facilitator/facilitation，搭配 facilitate learning/communication"},{"word":"unique","pos":"adj.","phonetic":"/juːˈniːk/","cefr":"B2","meaning_zh":"独特的；独一无二的；唯一的","meaning_en":"being the only one of its kind","example":"Each culture has a unique set of values that shapes social behavior and identity.","example_zh":"每种文化都有一套独特的价值观，塑造社会行为和身份认同。","synonyms":["distinctive","singular","exceptional"],"antonyms":["common","ordinary","typical"],"grammar":"副词 uniquely，搭配 unique to，unique opportunity/feature"},{"word":"symbolic","pos":"adj.","phonetic":"/sɪmˈbɒlɪk/","cefr":"B2","meaning_zh":"象征性的；符号的","meaning_en":"representing or expressing something through symbols","example":"The ceremony had great symbolic significance for national identity and unity.","example_zh":"该仪式对国家认同和团结具有重要的象征意义。","synonyms":["representative","figurative","emblematic"],"antonyms":["literal","concrete","actual"],"grammar":"副词 symbolically，动词 symbolize，名词 symbol/symbolism"},{"word":"transformation","pos":"n.","phonetic":"/ˌtrænsfərˈmeɪʃən/","cefr":"B2","meaning_zh":"转变；改革；变革","meaning_en":"a thorough or dramatic change in form or appearance","example":"Digital transformation has fundamentally altered the structure of modern economies.","example_zh":"数字化转型从根本上改变了现代经济结构。","synonyms":["change","conversion","revolution"],"antonyms":["stagnation","preservation","continuity"],"grammar":"动词 transform，形容词 transformative，搭配 undergo transformation"},{"word":"crucial","pos":"adj.","phonetic":"/ˈkruːʃl/","cefr":"B2","meaning_zh":"关键的；至关重要的","meaning_en":"extremely important; decisive","example":"Accurate data collection is crucial to the validity of any scientific study.","example_zh":"准确的数据收集对任何科学研究的有效性至关重要。","synonyms":["vital","essential","critical"],"antonyms":["unimportant","trivial","minor"],"grammar":"副词 crucially，搭配 crucial to/for，play a crucial role"},{"word":"insert","pos":"v./n.","phonetic":"/ɪnˈsɜːrt/","cefr":"B2","meaning_zh":"插入；嵌入；插页","meaning_en":"to put something into a space or document","example":"Tables and figures should be inserted at relevant points within the text.","example_zh":"表格和图形应插入文本中的相关位置。","synonyms":["include","embed","add"],"antonyms":["remove","extract","delete"],"grammar":"名词重音在前，动词重音可在后，搭配 insert into，insertion（名词）"},{"word":"labour","pos":"n.","phonetic":"/ˈleɪbər/","cefr":"B2","meaning_zh":"劳动；劳工；工作","meaning_en":"work, especially physical work; the workforce","example":"The shift from manual labour to automated processes has transformed manufacturing sectors.","example_zh":"从体力劳动到自动化流程的转变改变了制造业部门。","synonyms":["work","workforce","toil"],"antonyms":["leisure","capital","management"],"grammar":"英式拼写，美式为 labor，搭配 labour market/force/relations"},{"word":"comments","pos":"n.","phonetic":"/ˈkɒments/","cefr":"B1","meaning_zh":"评论；意见；备注","meaning_en":"remarks or observations about something","example":"Peer comments on draft papers help students improve their academic writing skills.","example_zh":"对论文草稿的同伴评论有助于学生提高学术写作技能。","synonyms":["remarks","observations","feedback"],"antonyms":[],"grammar":"动词 comment，搭配 make a comment on，comment on/about"},{"word":"institute","pos":"n./v.","phonetic":"/ˈɪnstɪtjuːt/","cefr":"B2","meaning_zh":"研究所；机构；建立","meaning_en":"an organization for a particular purpose; to establish something","example":"The research institute published findings on climate change and policy development.","example_zh":"该研究所发布了关于气候变化和政策发展的研究成果。","synonyms":["organization","establish","found"],"antonyms":["abolish","dissolve"],"grammar":"搭配 institute a policy/procedure，research institute，mental health institute"},{"word":"minimum","pos":"n./adj.","phonetic":"/ˈmɪnɪməm/","cefr":"B1","meaning_zh":"最低限度；最小值；最低的","meaning_en":"the least possible amount or degree","example":"A minimum of three peer-reviewed sources is required for the research paper.","example_zh":"研究论文要求至少引用三个经同行评审的资料来源。","synonyms":["least","lowest","smallest"],"antonyms":["maximum","most","highest"],"grammar":"复数 minima 或 minimums，搭配 minimum wage，at a minimum，bare minimum"},{"word":"complex","pos":"adj./n.","phonetic":"/ˈkɒmpleks/","cefr":"B2","meaning_zh":"复杂的；综合的；建筑群","meaning_en":"consisting of many interconnected parts; not simple","example":"The complex relationship between poverty and health outcomes requires multifaceted solutions.","example_zh":"贫困与健康结果之间的复杂关系需要多方面的解决方案。","synonyms":["complicated","intricate","elaborate"],"antonyms":["simple","straightforward","basic"],"grammar":"名词 complexity，副词 complexly，搭配 complex system/issue"},{"word":"nevertheless","pos":"adv.","phonetic":"/ˌnevəðəˈles/","cefr":"B2","meaning_zh":"尽管如此；然而；仍然","meaning_en":"in spite of that; however","example":"The sample size was small; nevertheless, the findings were statistically significant.","example_zh":"样本量较小；尽管如此，研究结果在统计上仍具有显著性。","synonyms":["however","nonetheless","yet"],"antonyms":["therefore","consequently","thus"],"grammar":"副词，通常置于句首或分号后，用于让步转折，学术写作常见"},{"word":"sphere","pos":"n.","phonetic":"/sfɪər/","cefr":"B2","meaning_zh":"领域；范围；球体","meaning_en":"an area of activity or influence","example":"The political sphere and the economic sphere are closely interconnected in modern states.","example_zh":"在现代国家中，政治领域和经济领域密切相连。","synonyms":["domain","field","realm"],"antonyms":[],"grammar":"搭配 sphere of influence/activity，in the public sphere"},{"word":"identical","pos":"adj.","phonetic":"/aɪˈdentɪkl/","cefr":"B2","meaning_zh":"完全相同的；一模一样的","meaning_en":"exactly alike in every way","example":"The two samples produced identical results under controlled experimental conditions.","example_zh":"在受控实验条件下，两个样本产生了完全相同的结果。","synonyms":["same","equal","uniform"],"antonyms":["different","distinct","unlike"],"grammar":"副词 identically，搭配 identical to，identical twins"},{"word":"prohibited","pos":"adj./v.","phonetic":"/prəˈhɪbɪtɪd/","cefr":"B2","meaning_zh":"被禁止的；违禁的","meaning_en":"officially forbidden","example":"The use of plagiarized material is strictly prohibited in academic submissions.","example_zh":"在学术提交中严格禁止使用抄袭材料。","synonyms":["forbidden","banned","outlawed"],"antonyms":["permitted","allowed","authorized"],"grammar":"动词 prohibit，名词 prohibition，搭配 prohibited from doing sth"},{"word":"adaptation","pos":"n.","phonetic":"/ˌædæpˈteɪʃən/","cefr":"B2","meaning_zh":"适应；改编；调整","meaning_en":"the process of adjusting to new conditions","example":"Cultural adaptation is a key challenge faced by international students.","example_zh":"文化适应是留学生面临的主要挑战之一。","synonyms":["adjustment","modification","acclimatization"],"antonyms":["rigidity","resistance","inflexibility"],"grammar":"动词 adapt，形容词 adaptive，搭配 adaptation to，film adaptation"},{"word":"assistance","pos":"n.","phonetic":"/əˈsɪstəns/","cefr":"B1","meaning_zh":"帮助；援助；协助","meaning_en":"the action of helping someone","example":"Financial assistance is available to students from low-income backgrounds.","example_zh":"经济援助面向低收入背景学生开放。","synonyms":["help","support","aid"],"antonyms":["hindrance","obstruction"],"grammar":"动词 assist，名词 assistant，搭配 in assistance，provide assistance，with the assistance of"},{"word":"persistent","pos":"adj.","phonetic":"/pərˈsɪstənt/","cefr":"B2","meaning_zh":"持续的；坚持不懈的；顽固的","meaning_en":"continuing firmly despite obstacles","example":"Persistent inequality in educational access remains a major global challenge.","example_zh":"教育机会获取方面持续存在的不平等仍是主要的全球挑战。","synonyms":["continuous","enduring","determined"],"antonyms":["intermittent","brief","yielding"],"grammar":"副词 persistently，动词 persist，名词 persistence，搭配 persistent problem/effort"},{"word":"sum","pos":"n./v.","phonetic":"/sʌm/","cefr":"B1","meaning_zh":"总和；金额；总计","meaning_en":"the total amount resulting from addition","example":"In sum, the evidence supports the conclusion that early intervention is effective.","example_zh":"总而言之，证据支持早期干预有效的结论。","synonyms":["total","amount","aggregate"],"antonyms":[],"grammar":"搭配 in sum（总之），lump sum（一次性付款），sum up（总结）"},{"word":"schedule","pos":"n./v.","phonetic":"/ˈʃedjuːl/","cefr":"B1","meaning_zh":"时间表；计划；安排","meaning_en":"a plan of activities and times","example":"The research schedule was carefully designed to meet the grant deadline.","example_zh":"研究时间表经过精心设计，以满足项目截止日期。","synonyms":["timetable","plan","agenda"],"antonyms":[],"grammar":"搭配 on schedule，ahead of schedule，schedule sth for"},{"word":"qualitative","pos":"adj.","phonetic":"/ˈkwɒlɪtətɪv/","cefr":"B2","meaning_zh":"定性的；质性的","meaning_en":"relating to the quality rather than quantity of something","example":"Qualitative research methods provide rich, in-depth insights into social phenomena.","example_zh":"定性研究方法为社会现象提供丰富、深入的见解。","synonyms":["descriptive","subjective","interpretive"],"antonyms":["quantitative","numerical","measurable"],"grammar":"副词 qualitatively，与 quantitative 对应，搭配 qualitative data/research"},{"word":"rigid","pos":"adj.","phonetic":"/ˈrɪdʒɪd/","cefr":"B2","meaning_zh":"严格的；僵化的；坚硬的","meaning_en":"unable to be changed or adapted; stiff","example":"A rigid curriculum may fail to accommodate the diverse needs of learners.","example_zh":"僵化的课程可能无法满足学习者的多样化需求。","synonyms":["inflexible","strict","stiff"],"antonyms":["flexible","adaptable","supple"],"grammar":"副词 rigidly，名词 rigidity，搭配 rigid structure/rules/approach"},{"word":"individual","pos":"adj./n.","phonetic":"/ˌɪndɪˈvɪdʒuəl/","cefr":"B1","meaning_zh":"个人的；单独的；个体","meaning_en":"single and separate; a single person","example":"Individual differences in learning styles must be considered in curriculum design.","example_zh":"课程设计中必须考虑学习风格的个体差异。","synonyms":["personal","single","person"],"antonyms":["collective","group","general"],"grammar":"副词 individually，名词 individuality，搭配 at the individual level"},{"word":"obvious","pos":"adj.","phonetic":"/ˈɒbviəs/","cefr":"B1","meaning_zh":"明显的；显而易见的","meaning_en":"easily perceived or understood; clear","example":"It is obvious from the data that urban areas have higher pollution levels.","example_zh":"从数据中可以明显看出，城市地区的污染水平更高。","synonyms":["clear","evident","apparent"],"antonyms":["obscure","hidden","unclear"],"grammar":"副词 obviously，搭配 it is obvious that，for obvious reasons"},{"word":"virtually","pos":"adv.","phonetic":"/ˈvɜːrtʃuəli/","cefr":"B2","meaning_zh":"几乎；事实上；实际上","meaning_en":"almost or nearly; in effect","example":"Virtually all participants agreed that the training program was beneficial.","example_zh":"几乎所有参与者都同意培训计划是有益的。","synonyms":["almost","nearly","practically"],"antonyms":["completely","entirely","actually"],"grammar":"副词，修饰形容词或动词，搭配 virtually impossible/identical/all"},{"word":"ceases","pos":"v.","phonetic":"/ˈsiːsɪz/","cefr":"C1","meaning_zh":"停止；终止（cease的第三人称单数）","meaning_en":"stops happening or existing","example":"Economic growth ceases when investment falls below the rate of capital depreciation.","example_zh":"当投资低于资本折旧率时，经济增长停止。","synonyms":["stops","ends","terminates"],"antonyms":["begins","continues","persists"],"grammar":"动词 cease，搭配 cease to exist/function，without ceasing，cease-fire"},{"word":"refine","pos":"v.","phonetic":"/rɪˈfaɪn/","cefr":"B2","meaning_zh":"改进；精炼；提纯","meaning_en":"to improve by making small changes","example":"The methodology was refined after the pilot study revealed several inconsistencies.","example_zh":"在试点研究发现几处不一致之后，对研究方法进行了改进。","synonyms":["improve","polish","perfect"],"antonyms":["coarsen","worsen","degrade"],"grammar":"名词 refinement，形容词 refined，搭配 refine a method/theory/process"},{"word":"attitudes","pos":"n.","phonetic":"/ˈætɪtjuːdz/","cefr":"B1","meaning_zh":"态度；看法；姿 ":"/kənˈvenʃən/","cefr":"B2","meaning_zh":"惯例；公约；大会","meaning_en":"a way of behaving that is widely accepted; a formal agreement","example":"Academic writing follows established conventions regarding citation and referencing.","example_zh":"学术写作遵循有关引用和参考文献的既定惯例。","synonyms":["tradition","norm","agreement"],"antonyms":["innovation","departure","violation"],"grammar":"形容词 conventional，搭配 by convention，Geneva Convention"},{"word":"licence","pos":"n.","phonetic":"/ˈlaɪsəns/","cefr":"B2","meaning_zh":"许可证；执照；授权","meaning_en":"an official document granting permission to do something","example":"Researchers must obtain the appropriate licence before conducting experiments on animals.","example_zh":"研究人员在对动物进行实验之前必须获得适当的许可证。","synonyms":["permit","authorization","certificate"],"antonyms":["ban","prohibition","restriction"],"grammar":"英式拼写（名词），动词为 license，搭配 driving licence，under licence"},{"word":"definition","pos":"n.","phonetic":"/ˌdefɪˈnɪʃən/","cefr":"B1","meaning_zh":"定义；释义；界定","meaning_en":"a statement of the exact meaning of a word or concept","example":"A clear definition of key terms is essential in any academic research paper.","example_zh":"在任何学术研究论文中，对关键术语的清晰定义都是必不可少的。","synonyms":["explanation","description","meaning"],"antonyms":[],"grammar":"动词 define，形容词 definitive，搭配 by definition，operational definition"},{"word":"coordination","pos":"n.","phonetic":"/koʊˌɔːrdɪˈneɪʃən/","cefr":"B2","meaning_zh":"协调；配合；统筹","meaning_en":"the organization of different elements to work together effectively","example":"Effective coordination between departments is crucial for successful project implementation.","example_zh":"部门间的有效协调对于项目成功实施至关重要。","synonyms":["cooperation","collaboration","organization"],"antonyms":["disorder","conflict","disarray"],"grammar":"动词 coordinate，名词 coordinator，搭配 coordination between/of"},{"word":"area","pos":"n.","phonetic":"/ˈeəriə/","cefr":"B1","meaning_zh":"区域；面积；领域","meaning_en":"a region or part of a place, or a subject of activity","example":"Research in this area has grown significantly over the past two decades.","example_zh":"过去二十年，该领域的研究显著增长。","synonyms":["region","field","domain"],"antonyms":[],"grammar":"搭配 area of study/expertise，in the area of，surface area"},{"word":"contemporary","pos":"adj./n.","phonetic":"/kənˈtempəreri/","cefr":"B2","meaning_zh":"当代的；现代的；同时代的人","meaning_en":"existing or occurring at the same time; modern","example":"Contemporary research methods increasingly rely on digital tools and big data analysis.","example_zh":"当代研究方法越来越依赖数字工具和大数据分析。","synonyms":["modern","current","present-day"],"antonyms":["historical","ancient","outdated"],"grammar":"可作名词（同时代的人），搭配 contemporary society/art/issues"},{"word":"equation","pos":"n.","phonetic":"/ɪˈkweɪʒən/","cefr":"B2","meaning_zh":"等式；方程式；均衡","meaning_en":"a mathematical statement showing equality; a complex situation","example":"The equation balancing economic growth with environmental protection remains unsolved.","example_zh":"平衡经济增长与环境保护的方程式仍未解决。","synonyms":["formula","expression","balance"],"antonyms":[],"grammar":"搭配 enter the equation（成为影响因素），solve an equation，linear equation"},{"word":"entities","pos":"n.","phonetic":"/ˈentɪtɪz/","cefr":"C1","meaning_zh":"实体；存在物；机构","meaning_en":"things with distinct and independent existence","example":"Legal entities such as corporations have rights and responsibilities under the law.","example_zh":"企业等法律实体在法律下具有权利和责任。","synonyms":["bodies","organizations","units"],"antonyms":[],"grammar":"单数 entity，搭配 legal/business/corporate entity"},{"word":"site","pos":"n.","phonetic":"/saɪt/","cefr":"B1","meaning_zh":"地点；场所；网站","meaning_en":"a place where something is located or occurs","example":"The archaeological site provided valuable evidence about ancient civilizations.","example_zh":"该考古遗址为了解古代文明提供了宝贵证据。","synonyms":["location","place","venue"],"antonyms":[],"grammar":"搭配 construction/research site，website，site visit，on site"},{"word":"computer","pos":"n.","phonetic":"/kəmˈpjuːtər/","cefr":"B1","meaning_zh":"计算机；电脑","meaning_en":"an electronic device for processing data","example":"Computer-based assessments are increasingly replacing traditional paper examinations.","example_zh":"基于计算机的评估正越来越多地取代传统纸质考试。","synonyms":["machine","processor","system"],"antonyms":[],"grammar":"搭配 computer science/program/system，desktop vs laptop computer"},{"word":"principle","pos":"n.","phonetic":"/ˈprɪnsɪpl/","cefr":"B2","meaning_zh":"原则；原理；准则","meaning_en":"a fundamental truth or rule governing behavior or thought","example":"The principle of informed consent is central to ethical research practice.","example_zh":"知情同意原则是道德研究实践的核心。","synonyms":["rule","standard","law"],"antonyms":[],"grammar":"注意区分 principle（原则）vs principal（主要的/校长），搭配 in principle"},{"word":"capable","pos":"adj.","phonetic":"/ˈkeɪpəbl/","cefr":"B1","meaning_zh":"有能力的；能干的；可以的","meaning_en":"having the ability or quality to do something","example":"A capable researcher must be able to critically evaluate sources and evidence.","example_zh":"有能力的研究人员必须能够批判性地评估来源和证据。","synonyms":["able","competent","skilled"],"antonyms":["incapable","incompetent","unable"],"grammar":"名词 capability，搭配 capable of doing sth，highly capable"},{"word":"appreciation","pos":"n.","phonetic":"/əˌpriːʃiˈeɪʃən/","cefr":"B2","meaning_zh":"欣赏；感谢；升值；理解","meaning_en":"recognition of the value or significance of something","example":"A critical appreciation of the literature is expected in doctoral-level research.","example_zh":"博士级别的研究中需要对文献进行批判性的欣赏与理解。","synonyms":["recognition","gratitude","understanding"],"antonyms":["ignorance","depreciation","ingratitude"],"grammar":"动词 appreciate，搭配 in appreciation of，appreciation for"},{"word":"colleagues","pos":"n.","phonetic":"/ˈkɒliːɡz/","cefr":"B1","meaning_zh":"同事；同僚","meaning_en":"people you work with in the same organization","example":"The researcher shared preliminary findings with colleagues before formal publication.","example_zh":"研究人员在正式发表前与同事分享了初步研究结果。","synonyms":["coworkers","peers","associates"],"antonyms":[],"grammar":"单数 colleague，搭配 work with colleagues，fellow colleagues（略冗余）"},{"word":"statistics","pos":"n.","phonetic":"/stəˈtɪstɪks/","cefr":"B2","meaning_zh":"统计学；统计数据","meaning_en":"the science of collecting and analyzing data; numerical data","example":"The statistics revealed a significant correlation between income levels and health outcomes.","example_zh":"统计数据揭示了收入水平与健康结果之间的显著相关性。","synonyms":["data","figures","numbers"],"antonyms":[],"grammar":"作学科名时不可数，作数据时可数，搭配 according to statistics"},{"word":"channel","pos":"n./v.","phonetic":"/ˈtʃænl/","cefr":"B2","meaning_zh":"渠道；频道；通道；引导","meaning_en":"a means of communication or passage","example":"Social media has become an important channel for disseminating research findings.","example_zh":"社交媒体已成为传播研究成果的重要渠道。","synonyms":["medium","route","pathway"],"antonyms":[],"grammar":"搭配 communication channel，channel resources into，through official channels"},{"word":"adjacent","pos":"adj.","phonetic":"/əˈdʒeɪsənt/","cefr":"C1","meaning_zh":"相邻的；邻近的；毗连的","meaning_en":"next to or adjoining something else","example":"The two research departments are adjacent and frequently collaborate on joint projects.","example_zh":"这两个研究部门相邻，经常合作开展联合项目。","synonyms":["neighboring","adjoining","nearby"],"antonyms":["distant","remote","far"],"grammar":"搭配 adjacent to，adjacent countries/buildings/fields"},{"word":"successive","pos":"adj.","phonetic":"/səkˈsesɪv/","cefr":"C1","meaning_zh":"连续的；接连的；相继的","meaning_en":"following one after another without interruption","example":"Three successive governments failed to implement effective immigration reform.","example_zh":"连续三届政府未能实施有效的移民改革。","synonyms":["consecutive","sequential","continuous"],"antonyms":["alternating","intermittent","isolated"],"grammar":"副词 successively，搭配 successive years/generations/attempts"},{"word":"text","pos":"n.","phonetic":"/tekst/","cefr":"B1","meaning_zh":"文本；正文；课文","meaning_en":"written or printed words; a book used in education","example":"Critical reading of academic text requires active engagement with the author's argument.","example_zh":"批判性阅读学术文本需要积极参与作者的论点。","synonyms":["writing","document","content"],"antonyms":[],"grammar":"搭配 set text，textbook，text message，analyze a text"},{"word":"validity","pos":"n.","phonetic":"/vəˈlɪdɪti/","cefr":"B2","meaning_zh":"有效性；合法性；正确性","meaning_en":"the quality of being logically sound or legally acceptable","example":"The validity of the research instrument was established through pilot testing.","example_zh":"研究工具的有效性通过试点测试得以确立。","synonyms":["soundness","legitimacy","accuracy"],"antonyms":["invalidity","inaccuracy","falsehood"],"grammar":"形容词 valid，搭配 establish validity，internal/external validity"},{"word":"couple","pos":"n./v.","phonetic":"/ˈkʌpl/","cefr":"B1","meaning_zh":"一对；两个；结合","meaning_en":"two of something; to link or combine","example":"A couple of studies have challenged the dominant theoretical framework in this field.","example_zh":"有几项研究对该领域的主导理论框架提出了挑战。","synonyms":["pair","two","link"],"antonyms":[],"grammar":"搭配 a couple of（几个），couple with（与...结合），coupled with"},{"word":"civil","pos":"adj.","phonetic":"/ˈsɪvl/","cefr":"B2","meaning_zh":"公民的；民事的；文明的","meaning_en":"relating to citizens or civil law; courteous","example":"Civil society organizations play a vital role in promoting democratic governance.","example_zh":"公民社会组织在促进民主治理方面发挥着重要作用。","synonyms":["civic","public","polite"],"antonyms":["military","criminal","rude"],"grammar":"搭配 civil rights/law/society/war，civilian（平民）"},{"word":"encountered","pos":"v.","phonetic":"/ɪnˈkaʊntərd/","cefr":"B2","meaning_zh":"遇到；碰到（encounter的过去式）","meaning_en":"came across or experienced something","example":"Researchers encountered significant resistance from institutions when requesting data access.","example_zh":"研究人员在请求数据访问时遇到了机构的重大阻力。","synonyms":["met","faced","experienced"],"antonyms":["avoided","missed","bypassed"],"grammar":"动词 encounter，名词 encounter，搭配 encounter difficulties/problems"},{"word":"adequate","pos":"adj.","phonetic":"/ˈædɪkwət/","cefr":"B2","meaning_zh":"足够的；适当的；充分的","meaning_en":"sufficient or satisfactory for a particular purpose","example":"Adequate funding is essential to sustain long-term scientific research programs.","example_zh":"充足的资金对于维持长期科学研究计划至关重要。","synonyms":["sufficient","satisfactory","enough"],"antonyms":["inadequate","insufficient","lacking"],"grammar":"副词 adequately，名词 adequacy，搭配 adequate for/to do sth"},{"word":"nonetheless","pos":"adv.","phonetic":"/ˌnʌnðəˈles/","cefr":"B2","meaning_zh":"尽管如此；然而；仍然","meaning_en":"despite what has just been said","example":"The methodology had limitations; nonetheless, the study provided valuable insights.","example_zh":"该研究方法有其局限性；尽管如此，这项研究还是提供了宝贵的见解。","synonyms":["nevertheless","however","still"],"antonyms":["therefore","consequently"],"grammar":"副词，与 nevertheless 相近，常置于句首，用于学术让步转折"},{"word":"aware","pos":"adj.","phonetic":"/əˈweər/","cefr":"B1","meaning_zh":"意识到的；知道的；有意识的","meaning_en":"having knowledge or perception of something","example":"Researchers must be aware of potential biases that could affect their findings.","example_zh":"研究人员必须意识到可能影响其研究结果的潜在偏见。","synonyms":["conscious","informed","mindful"],"antonyms":["unaware","ignorant","oblivious"],"grammar":"名词 awareness，搭配 aware of，become aware，raise awareness"},{"word":"thereby","pos":"adv.","phonetic":"/ˌðeərˈbaɪ/","cefr":"C1","meaning_zh":"因此；从而；由此","meaning_en":"as a result of that action","example":"The policy reduced emissions, thereby contributing to improvements in air quality.","example_zh":"该政策减少了排放，从而有助于改善空气质量。","synonyms":["thus","consequently","as a result"],"antonyms":[],"grammar":"正式副词，置于动词前或后，常用于学术写作表示因果"},{"word":"hence","pos":"adv.","phonetic":"/hens/","cefr":"B2","meaning_zh":"因此；所以；从此","meaning_en":"as a consequence; for this reason","example":"The data were incomplete; hence, the conclusions must be treated with caution.","example_zh":"数据不完整；因此，必须谨慎对待这些结论。","synonyms":["therefore","thus","consequently"],"antonyms":[],"grammar":"正式副词，用于推断结论，常置于句首，学术写作常见"},{"word":"adjustment","pos":"n.","phonetic":"/əˈdʒʌstmənt/","cefr":"B2","meaning_zh":"调整；适应；调节","meaning_en":"a small change made to achieve a better result","example":"Minor adjustments to the research design improved the reliability of the results.","example_zh":"对研究设计进行细微调整提高了结果的可靠性。","synonyms":["modification","adaptation","change"],"antonyms":["preservation","fixity"],"grammar":"动词 adjust，搭配 make adjustments，adjustment to/of，seasonal adjustment"},{"word":"nuclear","pos":"adj.","phonetic":"/ˈnjuːkliər/","cefr":"B2","meaning_zh":"核的；核能的；核心的","meaning_en":"relating to the nucleus of an atom or nuclear energy","example":"The debate over nuclear energy continues to divide environmentalists and policymakers.","example_zh":"关于核能的争论继续使环保主义者和政策制定者产生分歧。","synonyms":["atomic","central"],"antonyms":[],"grammar":"搭配 nuclear energy/power/family/weapons"},{"word":"media","pos":"n.","phonetic":"/ˈmiːdiə/","cefr":"B1","meaning_zh":"媒体；媒介；传播媒介","meaning_en":"the main means of mass communication","example":"Social media has transformed the way research findings are communicated to the public.","example_zh":"社交媒体改变了研究成果向公众传播的方式。","synonyms":["press","broadcast","communications"],"antonyms":[],"grammar":"medium的复数，搭配 mass media，social media，media coverage"},{"word":"offset","pos":"v./n.","phonetic":"/ˈɒfset/","cefr":"C1","meaning_zh":"抵消；补偿；偏移","meaning_en":"to counterbalance or compensate for something","example":"Increased efficiency in production helped offset the rising cost of raw materials.","example_zh":"生产效率的提高有助于抵消原材料成本上涨的影响。","synonyms":["counterbalance","compensate","neutralize"],"antonyms":["worsen","intensify","add to"],"grammar":"名词重音在前，动词重音可在后，搭配 offset by，carbon offset"},{"word":"federal","pos":"adj.","phonetic":"/ˈfedərəl/","cefr":"B2","meaning_zh":"联邦的；联邦制的","meaning_en":"relating to a system of government with central and regional units","example":"Federal funding for scientific research increased significantly in the last fiscal year.","example_zh":"上一财年，联邦对科学研究的资助显著增加。","synonyms":["national","central","constitutional"],"antonyms":["state","local","regional"],"grammar":"搭配 federal government/law/funding，federation（名词）"},{"word":"granted","pos":"v./adj.","phonetic":"/ˈɡrɑːntɪd/","cefr":"B2","meaning_zh":"批准的；给予的（grant的过去式）","meaning_en":"officially given or agreed to","example":"Ethical approval was granted by the university committee before the study commenced.","example_zh":"研究开始之前，大学委员会批准了伦理申请。","synonyms":["awarded","given","approved"],"antonyms":["denied","refused","rejected"],"grammar":"搭配 take for granted（视为理所当然），granted that（假设），grant a request"},{"word":"distortion","pos":"n.","phonetic":"/dɪˈstɔːrʃən/","cefr":"C1","meaning_zh":"扭曲；失真；歪曲","meaning_en":"the action of changing something from its true form","example":"Media distortion of scientific findings can mislead the public on important health issues.","example_zh":"媒体对科学研究结果的歪曲可能会在重要健康问题上误导公众。","synonyms":["misrepresentation","corruption","warping"],"antonyms":["accuracy","truth","clarity"],"grammar":"动词 distort，形容词 distorted，搭配 distortion of facts/reality"},{"word":"response","pos":"n.","phonetic":"/rɪˈspɒns/","cefr":"B1","meaning_zh":"回应；反应；答复","meaning_en":"a reaction or reply to something","example":"The government's response to the economic crisis was widely criticized as inadequate.","example_zh":"政府对经济危机的回应被普遍批评为不够充分。","synonyms":["reaction","reply","answer"],"antonyms":[],"grammar":"动词 respond，搭配 in response to，response rate，emergency response"},{"word":"estate","pos":"n.","phonetic":"/ɪˈsteɪt/","cefr":"B2","meaning_zh":"遗产；房产；庄园","meaning_en":"property and possessions; a large area of land","example":"The government introduced a new estate tax targeting inherited wealth above a set threshold.","example_zh":"政府引入了一项新的遗产税，针对超过一定门槛的继承财富。","synonyms":["property","land","assets"],"antonyms":[],"grammar":"搭配 real estate（房地产），housing estate，estate agent"},{"word":"components","pos":"n.","phonetic":"/kəmˈpoʊnənts/","cefr":"B2","mea rprising","unforeseen"],"grammar":"动词 anticipate，名词 anticipation，搭配 as anticipated，anticipate that"},{"word":"sufficient","pos":"adj.","phonetic":"/səˈfɪʃənt/","cefr":"B2","meaning_zh":"足够的；充分的","meaning_en":"enough for a particular purpose","example":"Sufficient evidence must be gathered before drawing definitive conclusions.","example_zh":"在得出确定性结论之前，必须收集足够的证据。","synonyms":["enough","adequate","ample"],"antonyms":["insufficient","inadequate","lacking"],"grammar":"副词 sufficiently，名词 sufficiency，搭配 sufficient for/to do sth"},{"word":"explicit","pos":"adj.","phonetic":"/ɪkˈsplɪsɪt/","cefr":"B2","meaning_zh":"明确的；清楚的；露骨的","meaning_en":"stated clearly and in detail","example":"The research objectives should be stated in explicit terms to avoid misinterpretation.","example_zh":"研究目标应以明确的措辞陈述，以避免误解。","synonyms":["clear","direct","specific"],"antonyms":["implicit","vague","ambiguous"],"grammar":"副词 explicitly，搭配 be explicit about，make explicit，explicit content"},{"word":"convinced","pos":"adj./v.","phonetic":"/kənˈvɪnst/","cefr":"B2","meaning_zh":"确信的；被说服的（convince的过去式）","meaning_en":"completely sure that something is true","example":"The committee was not convinced by the evidence presented in the initial report.","example_zh":"委员会对初始报告中呈现的证据并不信服。","synonyms":["persuaded","certain","sure"],"antonyms":["doubtful","skeptical","uncertain"],"grammar":"动词 convince，搭配 convince sb of/that，be convinced that"},{"word":"overlap","pos":"n./v.","phonetic":"/ˌoʊvərˈlæp/","cefr":"B2","meaning_zh":"重叠；交叉；重合","meaning_en":"to partly cover or coincide with something else","example":"There is considerable overlap between the findings of these two independent studies.","example_zh":"这两项独立研究的发现之间存在相当大的重叠。","synonyms":["coincide","intersect","share"],"antonyms":["diverge","separate","differ"],"grammar":"名词重音在前，动词重音可在后，搭配 overlap with/between"},{"word":"research","pos":"n./v.","phonetic":"/rɪˈsɜːrtʃ/","cefr":"B1","meaning_zh":"研究；调查；研究工作","meaning_en":"systematic investigation to discover facts or information","example":"Peer-reviewed research forms the foundation of evidence-based policy making.","example_zh":"经同行评审的研究构成了循证决策的基础。","synonyms":["investigation","study","inquiry"],"antonyms":[],"grammar":"不可数名词（a research 错误），搭配 conduct/carry out research，research into"},{"word":"structure","pos":"n./v.","phonetic":"/ˈstrʌktʃər/","cefr":"B2","meaning_zh":"结构；构造；组织","meaning_en":"the arrangement of parts that make up a whole","example":"The hierarchical structure of organizations affects communication and decision-making.","example_zh":"组织的层级结构影响沟通和决策。","synonyms":["framework","arrangement","organization"],"antonyms":["chaos","disorder","randomness"],"grammar":"形容词 structural，副词 structurally，搭配 organizational structure，structured approach"},{"word":"highlighted","pos":"v./adj.","phonetic":"/ˈhaɪlaɪtɪd/","cefr":"B2","meaning_zh":"突出的；强调的（highlight的过去式）","meaning_en":"made more noticeable or emphasized","example":"The review highlighted several significant gaps in the existing body of research.","example_zh":"该综述突出了现有研究体系中的几个重大空白。","synonyms":["emphasized","underlined","pointed out"],"antonyms":["downplayed","ignored","minimized"],"grammar":"动词 highlight，搭配 highlight the importance of，highlight a problem"},{"word":"mediation","pos":"n.","phonetic":"/ˌmiːdiˈeɪʃən/","cefr":"C1","meaning_zh":"调解；斡旋；中介作用","meaning_en":"intervention to resolve a dispute or serve as an intermediary","example":"Mediation is widely used in labor disputes as an alternative to legal proceedings.","example_zh":"调解被广泛用于劳资纠纷，作为法律诉讼的替代方式。","synonyms":["arbitration","negotiation","intervention"],"antonyms":["confrontation","conflict","litigation"],"grammar":"动词 mediate，名词 mediator，搭配 through mediation，mediation process"},{"word":"dramatic","pos":"adj.","phonetic":"/drəˈmætɪk/","cefr":"B2","meaning_zh":"戏剧性的；显著的；引人注目的","meaning_en":"sudden and striking; relating to drama","example":"There has been a dramatic increase in the use of renewable energy over the last decade.","example_zh":"在过去十年中， ntal health/illness/capacity"},{"word":"purchase","pos":"n./v.","phonetic":"/ˈpɜːrtʃɪs/","cefr":"B1","meaning_zh":"购买；采购；购买品","meaning_en":"to buy something","example":"Consumer decisions to purchase environmentally friendly products reflect changing values.","example_zh":"消费者购买环保产品的决策反映了价值观的变化。","synonyms":["buy","acquire","obtain"],"antonyms":["sell","dispose of"],"grammar":"名词 purchaser，搭配 make a purchase，purchase price，purchasing power"},{"word":"intrinsic","pos":"adj.","phonetic":"/ɪnˈtrɪnzɪk/","cefr":"C1","meaning_zh":"内在的；固有的；本质的","meaning_en":"belonging naturally to something; essential","example":"Intrinsic motivation leads to deeper and more sustained engagement with learning.","example_zh":"内在动机导致对学习更深入和更持久的参与。","synonyms":["inherent","innate","fundamental"],"antonyms":["extrinsic","external","superficial"],"grammar":"副词 intrinsically，搭配 intrinsic value/motivation，intrinsic to"},{"word":"ethnic","pos":"adj.","phonetic":"/ˈeθnɪk/","cefr":"B2","meaning_zh":"种族的；民族的；民族风情的","meaning_en":"relating to a group sharing a cultural tradition","example":"Ethnic diversity in academic institutions enriches intellectual discourse and perspectives.","example_zh":"学术机构中的种族多样性丰富了知识讨论和视角。","synonyms":["racial","cultural","national"],"antonyms":[],"grammar":"名词 ethnicity，搭配 ethnic group/minority/diversity/identity"},{"word":"subsidiary","pos":"adj./n.","phonetic":"/səbˈsɪdiəri/","cefr":"C1","meaning_zh":"附属的；子公司；补充性的","meaning_en":"secondary in importance; a company controlled by another","example":"The subsidiary objectives of the research supported the primary aim of the study.","example_zh":"研究的附属目标支持了研究的主要目的。","synonyms":["secondary","supplementary","branch"],"antonyms":["primary","main","parent"],"grammar":"搭配 subsidiary company，subsidiary to，wholly-owned subsidiary"},{"word":"generated","pos":"v./adj.","phonetic":"/ˈdʒenəreɪtɪd/","cefr":"B2","meaning_zh":"产生的；生成的（generate的过去式）","meaning_en":"produced or created something","example":"The study generated a large dataset gned a unique research topic to avoid duplication.","example_zh":"每个学生被分配了一个独特的研究主题以避免重复。","synonyms":["allocated","designated","given"],"antonyms":["unassigned","withheld"],"grammar":"动词 assign，搭配 assign to，assigned reading，task assignment"},{"word":"vision","pos":"n.","phonetic":"/ˈvɪʒən/","cefr":"B2","meaning_zh":"视野；愿景；视力","meaning_en":"the ability to think about the future with imagination","example":"A shared vision for sustainable development guided the international cooperation effort.","example_zh":"共同的可持续发展愿景指导了国际合作努力。","synonyms":["goal","foresight","perspective"],"antonyms":["shortsightedness","myopia"],"grammar":"搭配 vision for，have a vision，mission and vision"},{"word":"capacity","pos":"n.","phonetic":"/kəˈpæsɪti/","cefr":"B2","meaning_zh":"能力；容量；身份","meaning_en":"the ability to do something; the maximum amount something can hold","example":"Building institutional capacity is essential for sustainable development in emerging economies.","example_zh":"建立机构能力对于新兴经济体的可持续发展至关重要。","synonyms":["ability","capability","volume"],"antonyms":["incapacity","inability"],"grammar":"搭配 in the capacity of，capacity for，at full capacity"},{"word":"chapter","pos":"n.","phonetic":"/ˈtʃæptər/","cefr":"B1","meaning_zh":"章节；章；分支","meaning_en":"a main division of a book","example":"Chapter three outlines the theoretical framework underpinning the research.","example_zh":"第三章概述了支撑研究的理论框架。","synonyms":["section","part","division"],"antonyms":[],"grammar":"搭配 chapter on，open a new chapter（开启新篇章）"},{"word":"subsequent","pos":"adj.","phonetic":"/ˈsʌbsɪkwənt/","cefr":"B2","meaning_zh":"随后的；后来的；接下来的","meaning_en":"coming after or following something","example":"Subsequent analysis confirmed the initial findings of the pilot study.","example_zh":"随后的分析证实了试点研究的初步发现。","synonyms":["following","later","succeeding"],"antonyms":["prior","preceding","previous"],"grammar":"副词 subsequently，搭配 in subsequent years，subsequent to（在…之后）"},{"word":"underlying","pos":"adj.","phonetic":"/ˌʌndərˈlaɪɪŋ/ nction","position","part"],"antonyms":[],"grammar":"搭配 play a role in，role of，key/central role，role model"},{"word":"neutral","pos":"adj.","phonetic":"/ˈnjuːtrəl/","cefr":"B2","meaning_zh":"中立的；中性的；中立者","meaning_en":"not supporting either side in a conflict or disagreement","example":"Researchers should adopt a neutral stance to avoid introducing bias into their analysis.","example_zh":"研究人员应采取中立立场，以避免将偏见引入分析中。","synonyms":["impartial","unbiased","objective"],"antonyms":["biased","partisan","opinionated"],"grammar":"名词 neutrality，副词 neutrally，搭配 remain neutral，neutral ground"},{"word":"logic","pos":"n.","phonetic":"/ˈlɒdʒɪk/","cefr":"B2","meaning_zh":"逻辑；推理；逻辑学","meaning_en":"a system of reasoning; sensible thinking","example":"The logic of the argument must be clear and consistent for the paper to be convincing.","example_zh":"论文中论点的逻辑必须清晰一致，才能具有说服力。","synonyms":["reasoning","rationale","sense"],"antonyms":["illogic","fallacy","irrationality"],"grammar":"形容词 logical，副词 logically，搭配 the logic of，follow the logic"},{"word":"context","pos":"n.","phonetic":"/ˈkɒntekst/","cefr":"B2","meaning_zh":"背景；语境；情境","meaning_en":"the circumstances surrounding an event or statement","example":"Research findings must always be interpreted within the appropriate social and historical context.","example_zh":"研究结果必须始终在适当的社会和历史背景下进行解读。","synonyms":["setting","background","environment"],"antonyms":[],"grammar":"搭配 in the context of，out of context，contextual（形容词）"},{"word":"deviation","pos":"n.","phonetic":"/ˌdiːviˈeɪʃən/","cefr":"C1","meaning_zh":"偏差；偏离；标准差","meaning_en":"departure from a standard or normal behavior","example":"Standard deviation measures the spread of data points around the mean.","example_zh":"标准差衡量数据点围绕均值的分布情况。","synonyms":["divergence","variation","departure"],"antonyms":["conformity","adherence","compliance"],"grammar":"动词 deviate，搭配 standard deviation，deviation from the norm"},{"word":"team","pos":"n.","phonetic":"/tiːm/","cefr":"B1","meaning_zh":"团队；小组；队伍","meani istered to 500 participants across five countries.","example_zh":"对来自五个国家的500名参与者进行了在线调查。","synonyms":["questionnaire","study","assessment"],"antonyms":[],"grammar":"名词重音在前，动词重音可在后，搭配 conduct a survey，survey respondents"},{"word":"specific","pos":"adj.","phonetic":"/spəˈsɪfɪk/","cefr":"B1","meaning_zh":"具体的；特定的；明确的","meaning_en":"clearly defined or identified","example":"The research questions must be specific enough to allow for empirical investigation.","example_zh":"研究问题必须足够具体，以允许进行实证调查。","synonyms":["particular","precise","definite"],"antonyms":["general","vague","broad"],"grammar":"副词 specifically，名词 specification，搭配 specific to，be specific about"},{"word":"investigation","pos":"n.","phonetic":"/ɪnˌvestɪˈɡeɪʃən/","cefr":"B2","meaning_zh":"调查；研究；侦查","meaning_en":"a formal inquiry or systematic examination","example":"A thorough investigation of the data revealed several unexpected patterns.","example_zh":"对数据的彻底调查揭示了几个意想不到的规律。","synonyms":["inquiry","examination","study"],"antonyms":[],"grammar":"动词 investigate，搭配 under investigation，carry out an investigation"},{"word":"proportion","pos":"n.","phonetic":"/prəˈpɔːrʃən/","cefr":"B2","meaning_zh":"比例；部分；均衡","meaning_en":"a part or share of a whole in relation to the rest","example":"A large proportion of students reported difficulty accessing digital learning resources.","example_zh":"很大比例的学生报告说难以获取数字学习资源。","synonyms":["ratio","share","fraction"],"antonyms":[],"grammar":"搭配 in proportion to，out of proportion，a large proportion of"},{"word":"project","pos":"n./v.","phonetic":"/ˈprɒdʒekt/","cefr":"B1","meaning_zh":"项目；工程；预测","meaning_en":"a planned piece of work with a specific goal","example":"The collaborative research project involved institutions from six different countries.","example_zh":"合作研究项目涉及来自六个不同国家的机构。","synonyms":["scheme","plan","forecast"],"antonyms":[],"grammar":"名词重音在前，动词重音可在后，搭配 research project，project onto"},{"word":"technology","pos":"n.","phonetic":"/tekˈnɒlədʒi/","cefr":"B1","meaning_zh":"技术；科技；工艺","meaning_en":"the application of scientific knowledge for practical purposes","example":"Advances in technology have greatly expanded the scope of educational research methods.","example_zh":"技术进步大大扩展了教育研究方法的范围。","synonyms":["innovation","science","engineering"],"antonyms":[],"grammar":"形容词 technological，副词 technologically，搭配 digital technology，adopt technology"},{"word":"inclination","pos":"n.","phonetic":"/ˌɪnklɪˈneɪʃən/","cefr":"C1","meaning_zh":"倾向；意向；斜度","meaning_en":"a tendency or preference for something","example":"There is a natural inclination among researchers to confirm rather than challenge existing theories.","example_zh":"研究人员天然倾向于确认而非挑战现有理论。","synonyms":["tendency","preference","disposition"],"antonyms":["disinclination","aversion","reluctance"],"grammar":"动词 incline，搭配 inclination to/toward，have an inclination for"},{"word":"straightforward","pos":"adj.","phonetic":"/ˌstreɪtˈfɔːrwərd/","cefr":"B2","meaning_zh":"直接的；简单的；坦率的","meaning_en":"easy to understand; not complicated","example":"The methodology was relatively straightforward, involving only basic statistical procedures.","example_zh":"研究方法相对简单，只涉及基本的统计程序。","synonyms":["simple","clear","uncomplicated"],"antonyms":["complex","complicated","ambiguous"],"grammar":"副词 straightforwardly，搭配 a straightforward approach/question/process"},{"word":"arbitrary","pos":"adj.","phonetic":"/ˈɑːrbɪtreri/","cefr":"C1","meaning_zh":"任意的；武断的；专制的","meaning_en":"based on random choice rather than reason","example":"The arbitrary assignment of participants to groups eliminates selection bias in experiments.","example_zh":"将参与者随机分配到各组可以消除实验中的选择偏差。","synonyms":["random","capricious","unreasoned"],"antonyms":["deliberate","systematic","reasoned"],"grammar":"副词 arbitrarily，名词 arbitrariness，搭配 arbitrary decision/choice"},{"word":"aspects","pos":"n.","phonetic":"/ˈæspekts/","cefr":"B2","meaning_zh":"方面；层面；角度","meaning_en":"particular features or parts of something","example":"The study examined multiple aspects of the relationship between poverty and health.","example_zh":"该研究考察了贫困与健康关系的多个方面。","synonyms":["dimensions","elements","features"],"antonyms":[],"grammar":"单数 aspect，搭配 aspect of，in all aspects，key aspects"},{"word":"injury","pos":"n.","phonetic":"/ˈɪndʒəri/","cefr":"B1","meaning_zh":"伤害；损伤；损害","meaning_en":"physical harm or damage caused to a person","example":"Occupational injury rates were significantly reduced following the implementation of new safety protocols.","example_zh":"实施新安全规程后，职业伤害率显著降低。","synonyms":["harm","damage","wound"],"antonyms":["recovery","health","protection"],"grammar":"动词 injure，搭配 sustain an injury，injury prevention，personal injury"},{"word":"interval","pos":"n.","phonetic":"/ˈɪntəvl/","cefr":"B2","meaning_zh":"间隔；区间；中场休息","meaning_en":"a pause between parts of an activity; a space between things","example":"Data were collected at six-month intervals over a period of three years.","example_zh":"数据以六个月为间隔收集，历时三年。","synonyms":["gap","period","pause"],"antonyms":[],"grammar":"搭配 at regular intervals，confidence interval（置信区间），interval training"},{"word":"source","pos":"n.","phonetic":"/sɔːrs/","cefr":"B1","meaning_zh":"来源；出处；根源","meaning_en":"the place or person from which something comes","example":"Primary sources such as original documents provide the most reliable historical evidence.","example_zh":"原始文件等一手来源提供了最可靠的历史证据。","synonyms":["origin","reference","foundation"],"antonyms":[],"grammar":"搭配 primary/secondary source，source of information，cite a source"},{"word":"finite","pos":"adj.","phonetic":"/ˈfaɪnaɪt/","cefr":"C1","meaning_zh":"有限的；有限制的","meaning_en":"having limits or bounds; not infinite","example":"Natural resources are finite, which makes sustainable management increasingly important.","example_zh":"自然资源是有限的，这使得可持续管理变得越来越重要。","synonyms":["limited","bounded","restricted"],"antonyms":["infinite","unlimited","endless"],"grammar":"反义词 infinite，搭配 finite resources/number/capacity"},{"word":"stability","pos":"n.","phonetic":"/stəˈbɪlɪti/","cefr":"B2","meaning_zh":"稳定性；稳定；安定","meaning_en":"the quality of being unlikely to change or fail","example":"Political stability is an essential precondition for sustained economic development.","example_zh":"政治稳定是实现可持续经济发展的基本前提条件。","synonyms":["steadiness","security","firmness"],"antonyms":["instability","volatility","chaos"],"grammar":"形容词 stable，动词 stabilize，搭配 political/economic stability"},{"word":"partnership","pos":"n.","phonetic":"/ˈpɑːrtnərʃɪp/","cefr":"B2","meaning_zh":"伙伴关系；合作；合伙","meaning_en":"a relationship between people or organizations working together","example":"The research was carried out in partnership with three international universities.","example_zh":"该研究与三所国际大学合作开展。","synonyms":["collaboration","alliance","cooperation"],"antonyms":["competition","rivalry","independence"],"grammar":"搭配 in partnership with，public-private partnership，form a partnership"},{"word":"rejected","pos":"v./adj.","phonetic":"/rɪˈdʒektɪd/","cefr":"B2","meaning_zh":"被拒绝的；驳回的（reject的过去式）","meaning_en":"dismissed or refused to accept something","example":"The null hypothesis was rejected based on the statistically significant results obtained.","example_zh":"根据所获得的统计显著结果，零假设被拒绝。","synonyms":["refused","dismissed","discarded"],"antonyms":["accepted","approved","confirmed"],"grammar":"动词 reject，名词 rejection，搭配 rejected by，reject a hypothesis/proposal"},{"word":"retained","pos":"v./adj.","phonetic":"/rɪˈteɪnd/","cefr":"B2","meaning_zh":"保留的；保持的（retain的过去式）","meaning_en":"kept in place or continued to hold","example":"Data collected in the first phase were retained for comparison in the final analysis.","example_zh":"第一阶段收集的数据被保留用于最终分析中的比较。","synonyms":["kept","maintained","preserved"],"antonyms":["discarded","released","removed"],"grammar":"动词 retain，名词 retention，搭配 retain information/staff/data"},{"word":"section","pos":"n.","phonetic":"/ˈsekʃən/","cefr":"B1","meaning_zh":"部分；章节；区段","meaning_en":"a distinct part of something larger","example":"The methodology section describes the data collection instruments and analytical procedures.","example_zh":"方法论部分描述了数据收集工具和分析程序。","synonyms":["part","division","segment"],"antonyms":[],"grammar":"搭配 in this section，cross-section，section of the report"},{"word":"disposal","pos":"n.","phonetic":"/dɪˈspoʊzl/","cefr":"C1","meaning_zh":"处置；处理；支配","meaning_en":"the action of getting rid of something","example":"Proper disposal of hazardous materials is regulated by national environmental law.","example_zh":"危险材料的适当处置受国家环境法律监管。","synonyms":["removal","elimination","discarding"],"antonyms":["retention","accumulation","preservation"],"grammar":"动词 dispose，搭配 at one's disposal（可供使用），waste disposal"},{"word":"complement","pos":"n./v.","phonetic":"/ˈkɒmplɪment/","cefr":"B2","meaning_zh":"补充；互补；完整","meaning_en":"something that completes or enhances another thing","example":"Qualitative methods can complement quantitative approaches to provide a fuller picture.","example_zh":"定性方法可以补充定量方法以提供更全面的图景。","synonyms":["supplement","complete","enhance"],"antonyms":["conflict","undermine","detract"],"grammar":"注意区分 complement（补充）vs compliment（称赞），搭配 complement each other"},{"word":"link","pos":"n./v.","phonetic":"/lɪŋk/","cefr":"B1","meaning_zh":"联系；链接；环节","meaning_en":"a connection between two things","example":"The study established a clear link between air quality and respiratory health outcomes.","example_zh":"该研究确立了空气质量与呼吸健康结果之间的明确联系。","synonyms":["connection","relationship","bond"],"antonyms":["separation","disconnection"],"grammar":"搭配 link between，link to/with，hyperlink，missing link"},{"word":"conformity","pos":"n.","phonetic":"/kənˈfɔːrmɪti/","cefr":"C1","meaning_zh":"遵从；一致；顺从","meaning_en":"compliance with rules or standards","example":"Social conformity can inhibit individual creativity and critical thinking.","example_zh":"社会顺从可能会抑制个人创造力和批判性思维。","synonyms":["compliance","obedience","agreement"],"antonyms":["nonconformity","rebellion","deviation"],"grammar":"动词 conform，搭配 in conformity with，social conformity"},{"word":"transmission","pos":"n.","phonetic":"/trænzˈmɪʃən/","cefr":"B2","meaning_zh":"传输；传播；传染","meaning_en":"the passing of something from one place or person to another","example":"The transmission of knowledge across generations is a fundamental function of education.","example_zh":"知识跨代传承是教育的一项基本功能。","synonyms":["transfer","spread","communication"],"antonyms":["reception","containment"],"grammar":"动词 transmit，搭配 transmission of disease/information/data"},{"word":"overall","pos":"adj./adv.","phonetic":"/ˌoʊvərˈɔːl/","cefr":"B2","meaning_zh":"总体的；全面的；总体上","meaning_en":"taking everything into account; in general","example":"The overall findings of the study support the need for policy reform in this area.","example_zh":"该研究的总体发现支持了在这一领域进行政策改革的必要性。","synonyms":["general","total","comprehensive"],"antonyms":["specific","partial","individual"],"grammar":"搭配 overall performance/result，on the whole，in overall terms"},{"word":"resolution","pos":"n.","phonetic":"/ˌrezəˈluːʃən/","cefr":"B2","meaning_zh":"解决；决议；分辨率","meaning_en":"a firm decision or the solving of a problem","example":"Peaceful resolution of the conflict required compromise from all parties involved.","example_zh":"和平解决冲突需要各方的妥协。","synonyms":["solution","decision","determination"],"antonyms":["problem","deadlock","conflict"],"grammar":"动词 resolve，搭配 conflict resolution，pass a resolution，image resolution"},{"word":"supplementary","pos":"adj.","phonetic":"/ˌsʌplɪˈmentri/","cefr":"C1","meaning_zh":"补充的；附加的；辅助的","meaning_en":"provided in addition to the main thing","example":"Supplementary materials were provided online for students who wished to explore the topic further.","example_zh":"在线提供了补充材料，供希望进一步探索该主题的学生使用。","synonyms":["additional","extra","supporting"],"antonyms":["primary","main","essential"],"grammar":"动词 supplement，名词 supplement，搭配 supplementary information/evidence"},{"word":"commission","pos":"n./v.","phonetic":"/kəˈmɪʃən/","cefr":"B2","meaning_zh":"委员会；委托；佣金","meaning_en":"a group with authority; to formally request something","example":"An independent commission was established to investigate the causes of the financial crisis.","example_zh":"成立了一个独立委员会来调查金融危机的原因。","synonyms":["committee","authorize","task force"],"antonyms":[],"grammar":"搭配 commission a report，European Commission，on commission（按佣金）"},{"word":"output","pos":"n.","phonetic":"/ˈaʊtpʊt/","cefr":"B2","meaning_zh":"产出；输出；产量","meaning_en":"the amount of something produced or the result of a process","example":"Research output from the institution has increased significantly over the past five years.","example_zh":"该机构过去五年的研究产出显著增加。","synonyms":["production","yield","result"],"antonyms":["input","consumption"],"grammar":"搭配 research output，economic output，output of information"},{"word":"external","pos":"adj.","phonetic":"/ɪkˈstɜːrnl/","cefr":"B2","meaning_zh":"外部的；外在的；境外的","meaning_en":"coming from outside an organization or system","example":"External factors such as economic conditions can significantly affect research outcomes.","example_zh":"经济条件等外部因素会显著影响研究结果。","synonyms":["outside","foreign","extrinsic"],"antonyms":["internal","intrinsic","domestic"],"grammar":"副词 externally，搭配 external factors/review/funding"},{"word":"legislation","pos":"n.","phonetic":"/ˌledʒɪˈsleɪʃən/","cefr":"B2","meaning_zh":"立法；法规；法律","meaning_en":"laws made by a governing body","example":"New environmental legislation was passed to reduce industrial pollution levels.","example_zh":"通过了新的环境立法以减少工业污染水平。","synonyms":["law","regulation","statute"],"antonyms":[],"grammar":"动词 legislate，名词 legislature，搭配 introduce/pass legislation，under legislation"},{"word":"principal","pos":"adj./n.","phonetic":"/ˈprɪnsɪpəl/","cefr":"B2","meaning_zh":"主要的；校长；委托人","meaning_en":"first in importance; a person in a leading position","example":"The principal objective of the policy was to improve access to primary healthcare.","example_zh":"该政策的主要目标是改善初级医疗保健的可及性。","synonyms":["main","primary","chief"],"antonyms":["secondary","minor"],"grammar":"注意区分 principal（主要的）vs principle（原则），搭配 principal investigator"},{"word":"revolution","pos":"n.","phonetic":"/ˌrevəˈluːʃən/","cefr":"B2","meaning_zh":"革命；变革；旋转","meaning_en":"a dramatic and wide-reaching change in conditions","example":"The digital revolution has transformed how societies access and share information.","example_zh":"数字革命改变了社会获取和共享信息的方式。","synonyms":["transformation","upheaval","rotation"],"antonyms":["stagnation","conservation","continuity"],"grammar":"形容词 revolutionary，搭配 industrial revolution，revolution in thinking"},{"word":"route","pos":"n.","phonetic":"/ruːt/","cefr":"B1","meaning_zh":"路线；途径；方式","meaning_en":"a way taken to reach a destination","example":"Higher education is considered a primary route to social mobility in most countries.","example_zh":"在大多数国家，高等教育被认为是实现社会流动的主要途径。","synonyms":["path","way","means"],"antonyms":[],"grammar":"搭配 trade route，route to success，en route（在途中）"},{"word":"established","pos":"adj./v.","phonetic":"/ɪˈstæblɪʃt/","cefr":"B1","meaning_zh":"已建立的；既定的（establish的过去式）","meaning_en":"set up on a firm basis; widely recognized","example":"The study confirmed findings from established theories in developmental psychology.","example_zh":"该研究证实了发展心理学既定理论的发现。","synonyms":["founded","recognized","accepted"],"antonyms":["new","untested","emerging"],"grammar":"动词 establish，名词 establishment，搭配 well-established，established practice"},{"word":"insights","pos":"n.","phonetic":"/ˈɪnsaɪts/","cefr":"B2","meaning_zh":"洞见；见解；深刻理解","meaning_en":"deep understandings of a person or situation","example":"The qualitative interviews provided valuable insights into participants' lived experiences.","example_zh":"定性访谈为参与者的生活经历提供了宝贵的洞见。","synonyms":["understanding","perception","revelation"],"antonyms":["ignorance","confusion","misunderstanding"],"grammar":"单数 insight，搭配 gain/provide insights，insight into"},{"word":"energy","pos":"n.","phonetic":"/ˈenədʒi/","cefr":"B1","meaning_zh":"能量；精力；能源","meaning_en":"the power used to do work; enthusiasm and vitality","example":"Renewable energy technologies are central to addressing the global climate crisis.","example_zh":"可再生能源技术是应对全球气候危机的核心。","synonyms":["power","force","vitality"],"antonyms":["weakness","lethargy","inertia"],"grammar":"形容词 energetic，搭配 renewable energy，energy efficiency，energy policy"},{"word":"participation","pos":"n.","phonetic":"/pɑːˌtɪsɪˈpeɪʃən/","cefr":"B2","meaning_zh":"参与；参加；参与度","meaning_en":"the action of taking part in something","example":"Active participation in class discussions enhances critical thinking and communication skills.","example_zh":"积极参与课堂讨论可以增强批判性思维和沟通技能。","synonyms":["involvement","engagement","contribution"],"antonyms":["absence","exclusion","withdrawal"],"grammar":"动词 participate，搭配 participation in，encourage participation"},{"word":"grade","pos":"n./v.","phonetic":"/ɡreɪd/","cefr":"B1","meaning_zh":"等级；成绩；评分","meaning_en":"a level of quality or rank; a score in education","example":"Final grades were determined by a combination of coursework and examination scores.","example_zh":"最终成绩由课程作业和考试成绩综合决定。","synonyms":["level","score","rank"],"antonyms":[],"grammar":"搭配 grade point average（GPA），pass/fail grade，grade school（小学）"},{"word":"contract","pos":"n./v.","phonetic":"/ˈkɒntrækt/","cefr":"B2","meaning_zh":"合同；合约；缩减","meaning_en":"a legal agreement between parties; to become smaller","example":"Research contracts with private companies must be transparent to avoid conflicts of interest.","example_zh":"与私营公司签订的研究合同必须透明，以避免利益冲突。","synonyms":["agreement","deal","shrink"],"antonyms":["expand","grow"],"grammar":"名词重音在前，动词重音可在后，搭配 sign a contract，contract out"},{"word":"image","pos":"n.","phonetic":"/ˈɪmɪdʒ/","cefr":"B1","meaning_zh":"形象；图像；印象","meaning_en":"a visual representation or the impression given to others","example":"The public image of science has been influenced by media coverage of research controversies.","example_zh":"科学的公众形象受到媒体对研究争议报道的影响。","synonyms":["picture","representation","impression"],"antonyms":[],"grammar":"搭配 brand image，public image，self-image，image of"},{"word":"reinforced","pos":"v./adj.","phonetic":"/ˌriːɪnˈfɔːrst/","cefr":"B2","meaning_zh":"强化的；加固的（reinforce的过去式）","meaning_en":"strengthened or supported more firmly","example":"The findings reinforced the importance of early childhood education for long-term outcomes.","example_zh":"研究结果强化了幼儿教育对长期成果重要性的认识。","synonyms":["strengthened","confirmed","supported"],"antonyms":["weakened","undermined","contradicted"],"grammar":"动词 reinforce，名词 reinforcement，搭配 reinforce a message/theory/behavior"},{"word":"ratio","pos":"n.","phonetic":"/ˈreɪʃiəʊ/","cefr":"B2","meaning_zh":"比率；比例；比值","meaning_en":"the relationship between two numbers showing how many times one is contained in the other","example":"The student-to-teacher ratio significantly affects the quality of classroom instruction.","example_zh":"师生比显著影响课堂教学质量。","synonyms":["proportion","rate","fraction"],"antonyms":[],"grammar":"搭配 ratio of A to B，odds ratio，cost-benefit ratio"},{"word":"behalf","pos":"n.","phonetic":"/bɪˈhɑːf/","cefr":"B2","meaning_zh":"代表；代为；利益","meaning_en":"in the interest of or as a representative of someone","example":"The attorney submitted the appeal on behalf of the research institution.","example_zh":"律师代表研究机构提交了上诉。","synonyms":["interest","sake","representation"],"antonyms":[],"grammar":"搭配 on behalf of，in someone's behalf，speak on behalf of"},{"word":"definite","pos":"adj.","phonetic":"/ˈdefɪnɪt/","cefr":"B2","meaning_zh":"明确的；确定的；肯定的","meaning_en":"clearly decided or certain","example":"No definite conclusions can be drawn from a sample size of fewer than thirty participants.","example_zh":"从少于三十名参与者的样本量中不能得出明确的结论。","synonyms":["certain","clear","fixed"],"antonyms":["indefinite","uncertain","vague"],"grammar":"副词 definitely，搭配 definite answer/plan，the definite article（定冠词）"},{"word":"ongoing","pos":"adj.","phonetic":"/ˈɒnɡoʊɪŋ/","cefr":"B2","meaning_zh":"持续的；进行中的","meaning_en":"continuing or still in progress","example":"Ongoing research into the long-term effects of the intervention is currently being conducted.","example_zh":"目前正在进行关于干预长期效果的持续研究。","synonyms":["continuing","current","unfinished"],"antonyms":["finished","concluded","past"],"grammar":"通常作前置定语，搭配 ongoing research/debate/process"},{"word":"achieve","pos":"v.","phonetic":"/əˈtʃiːv/","cefr":"B1","meaning_zh":"实现；达到；取得","meaning_en":"to successfully reach a goal through effort","example":"Long-term social change can only be achieved through sustained collective action.","example_zh":"长期社会变革只有通过持续的集体行动才能实现。","synonyms":["accomplish","attain","reach"],"antonyms":["fail","miss","abandon"],"grammar":"名词 achievement，搭配 achieve a goal/result，high-achieving"},{"word":"code","pos":"n./v.","phonetic":"/koʊd/","cefr":"B1","meaning_zh":"代码；准则；编码","meaning_en":"a system of rules or a set of instructions for computers","example":"Qualitative data were coded thematically to identify recurring patterns across interviews.","example_zh":"定性数据按主题编码，以识别访谈中反复出现的规律。","synonyms":["system","program","classify"],"antonyms":[],"grammar":"搭配 coding scheme，moral code，code of conduct，source code"},{"word":"uniform","pos":"adj./n.","phonetic":"/ˈjuːnɪfɔːrm/","cefr":"B2","meaning_zh":"统一的；制服；一致的","meaning_en":"not changing; the same in all cases","example":"A uniform approach to data collection ensures comparability across different study sites.","example_zh":"统一的数据收集方法确保了不同研究地点之间的可比性。","synonyms":["consistent","standardized","regular"],"antonyms":["varied","inconsistent","diverse"],"grammar":"副词 uniformly，名词 uniformity，搭配 uniform standards/distribution"},{"word":"consultation","pos":"n.","phonetic":"/ˌkɒnsəlˈteɪʃən/","cefr":"B2","meaning_zh":"咨询；协商；诊疗","meaning_en":"a meeting for discussion or the seeking of advice","example":"Policy changes were implemented only after extensive public consultation with stakeholders.","example_zh":"政策变化仅在与利益相关者进行广泛公众协商后才得以实施。","synonyms":["discussion","advice","conference"],"antonyms":[],"grammar":"动词 consult，搭配 in consultation with，consultation process，public consultation"},{"word":"domain","pos":"n.","phonetic":"/dəˈmeɪn/","cefr":"B2","meaning_zh":"领域；域名；范畴","meaning_en":"an area of knowledge or activity","example":"The domain of cognitive science draws on psychology, neuroscience, and computer science.","example_zh":"认知科学领域借鉴了心理学、神经科学和计算机科学的知识。","synonyms":["field","area","sphere"],"antonyms":[],"grammar":"搭配 domain of knowledge，public domain（公共领域），domain name"},{"word":"trend","pos":"n.","phonetic":"/trend/","cefr":"B2","meaning_zh":"趋势；倾向；潮流","meaning_en":"a general direction in which something is developing","example":"Current trends in educational research emphasize the use of mixed methods approaches.","example_zh":"教育研究的当前趋势强调使用混合方法。","synonyms":["tendency","pattern","movement"],"antonyms":[],"grammar":"搭配 upward/downward trend，set a trend，trend toward/in"},{"word":"author","pos":"n./v.","phonetic":"/ˈɔːθər/","cefr":"B1","meaning_zh":"作者；著者；撰写","meaning_en":"a person who writes a book or article","example":"The author of the study acknowledged several limitations in the research design.","example_zh":"该研究的作者承认了研究设计中的几个局限性。","synonyms":["writer","researcher","scholar"],"antonyms":[],"grammar":"搭配 lead author，co-author，author of，authored by"},{"word":"traditional","pos":"adj.","phonetic":"/trəˈdɪʃənl/","cefr":"B1","meaning_zh":"传统的；惯例的；保守的","meaning_en":"following established customs or methods","example":"Traditional teaching methods are increasingly being supplemented by technology-based approaches.","example_zh":"传统教学方法越来越多地被基于技术的方法所补充。","synonyms":["conventional","customary","orthodox"],"antonyms":["innovative","modern","contemporary"],"grammar":"副词 traditionally，名词 tradition，搭配 traditional values/approach/method"},{"word":"evaluation","pos":"n.","phonetic":"/ɪˌvæljuˈeɪʃən/","cefr":"B2","meaning_zh":"评估；评价；估算","meaning_en":"the systematic assessment of something","example":"Program evaluation is essential for identifying the effectiveness of educational interventions.","example_zh":"项目评估对于确定教育干预的有效性至关重要。","synonyms":["assessment","appraisal","review"],"antonyms":[],"grammar":"动词 evaluate，搭配 program evaluation，formative/summative evaluation"},{"word":"commodity","pos":"n.","phonetic":"/kəˈmɒdɪti/","cefr":"C1","meaning_zh":"商品；原料；大宗货物","meaning_en":"a raw material or product that can be bought and sold","example":"In a knowledge economy, information itself becomes a valuable commodity.","example_zh":"在知识经济中，信息本身成为一种有价值的商品。","synonyms":["product","good","resource"],"antonyms":[],"grammar":"搭配 commodity market/price，agricultural commodity，commodity exchange"},{"word":"diminished","pos":"v./adj.","phonetic":"/dɪˈmɪnɪʃt/","cefr":"B2","meaning_zh":"减少的；缩小的（diminish的过去式）","meaning_en":"made or became smaller or less important","example":"Public confidence in the institution was significantly diminished by the scandal.","example_zh":"公众对该机构的信心因丑闻而大幅减弱。","synonyms":["reduced","decreased","weakened"],"antonyms":["increased","enhanced","strengthened"],"grammar":"动词 diminish，搭配 diminished responsibility，diminishing returns"},{"word":"depression","pos":"n.","phonetic":"/dɪˈpreʃən/","cefr":"B2","meaning_zh":"抑郁症；经济萧条；低气压","meaning_en":"a mental health condition; a period of economic decline","example":"The Great Depression of the 1930s caused widespread unemployment and economic hardship.","example_zh":"1930年代的大萧条造成了广泛的失业和经济困难。","synonyms":["recession","decline","melancholy"],"antonyms":["prosperity","boom","elation"],"grammar":"搭配 economic depression，clinical depression，suffer from depression"},{"word":"reverse","pos":"v./adj./n.","phonetic":"/rɪˈvɜːrs/","cefr":"B2","meaning_zh":"颠倒；逆转；相反","meaning_en":"to change to the opposite; the opposite","example":"The study found that the expected relationship between variables was reversed under certain conditions.","example_zh":"研究发现，在某些条件下，变量之间的预期关系发生了颠倒。","synonyms":["opposite","invert","overturn"],"antonyms":["maintain","confirm","continue"],"grammar":"搭配 in reverse，reverse a trend/decision，reverse engineering"},{"word":"enhanced","pos":"v./adj.","phonetic":"/ɪnˈhɑːnst/","cefr":"B2","meaning_zh":"增强的；提升的（enhance的过去式）","meaning_en":"intensified or improved in quality","example":"Technology-enhanced learning environments have been shown to improve student engagement.","example_zh":"技术增强的学习环境已被证明可以提高学生的参与度。","synonyms":["improved","strengthened","boosted"],"antonyms":["diminished","reduced","weakened"],"grammar":"动词 enhance，名词 enhancement，搭配 enhanced by，significantly enhanced"},{"word":"interaction","pos":"n.","phonetic":"/ˌɪntərˈækʃən/","cefr":"B2","meaning_zh":"互动；相互作用；交流","meaning_en":"communication or action between people or things","example":"Social interaction is a key factor in language acquisition and cognitive development.","example_zh":"社会互动是语言习得和认知发展的关键因素。","synonyms":["communication","exchange","relationship"],"antonyms":["isolation","separation","independence"],"grammar":"动词 interact，形容词 interactive，搭配 interaction between/with，social interaction"},{"word":"protocol","pos":"n.","phonetic":"/ˈproʊtəkɒl/","cefr":"B2","meaning_zh":"协议；规程；外交礼仪","meaning_en":"an accepted set of rules or procedures","example":"All researchers were required to follow a strict data collection protocol.","example_zh":"所有研究人员都必须遵循严格的数据收集协议。","synonyms":["procedure","agreement","convention"],"antonyms":[],"grammar":"搭配 follow a protocol，research protocol，network protocol（网络协议）"},{"word":"termination","pos":"n.","phonetic":"/ˌtɜːrmɪˈneɪʃən/","cefr":"C1","meaning_zh":"终止；结束；终结","meaning_en":"the act of ending or concluding something","example":"Early termination of the clinical trial raised concerns about participant safety.","example_zh":"临床试验的提前终止引发了对参与者安全的担忧。","synonyms":["ending","conclusion","cessation"],"antonyms":["beginning","initiation","continuation"],"grammar":"动词 terminate，搭配 termination of employment/contract/trial"},{"word":"negative","pos":"adj./n.","phonetic":"/ˈneɡətɪv/","cefr":"B1","meaning_zh":"负面的；消极的；阴性的","meaning_en":"expressing denial or refusal; harmful or bad","example":"Negative results are equally important in science as they help rule out incorrect hypotheses.","example_zh":"阴性结果在科学中同样重要，因为它们有助于排除不正确的假设。","synonyms":["adverse","harmful","unfavorable"],"antonyms":["positive","beneficial","favorable"],"grammar":"副词 negatively，名词 negativity，搭配 negative impact/effect，false negative"},{"word":"expansion","pos":"n.","phonetic":"/ɪkˈspænʃən/","cefr":"B2","meaning_zh":"扩张；扩展；膨胀","meaning_en":"the action of becoming larger or more extensive","example":"The rapid expansion of the internet has transformed how academic knowledge is disseminated.","example_zh":"互联网的快速扩张改变了学术知识的传播方式。","synonyms":["growth","extension","enlargement"],"antonyms":["contraction","reduction","decline"],"grammar":"动词 expand，搭配 expansion of trade/knowledge/services，economic expansion"},{"word":"sex","pos":"n.","phonetic":"/seks/","cefr":"B1","meaning_zh":"性别；性行为；性","meaning_en":"either of the two categories (male and female) into which humans are divided","example":"Researchers must consider both sex and gender when designing studies on health outcomes.","example_zh":"研究人员在设计健康结果研究时必须同时考虑生理性别和社会性别。","synonyms":["gender","sexuality"],"antonyms":[],"grammar":"sex指生理性别，gender指社会性别，搭配 sex differences，safe sex"},{"word":"so-called","pos":"adj.","phonetic":"/ˌsoʊˈkɔːld/","cefr":"B2","meaning_zh":"所谓的；号称的","meaning_en":"used to express doubt about a name or description","example":"The so-called gig economy has transformed traditional employment relationships.","example_zh":"所谓的零工经济改变了传统的就业关系。","synonyms":["alleged","supposed","purported"],"antonyms":[],"grammar":"通常带有怀疑或批评语气，置于名词前作定语"},{"word":"tapes","pos":"n.","phonetic":"/teɪps/","cefr":"B1","meaning_zh":"磁带；录音带；胶带","meaning_en":"narrow strips of material used for recording or fastening","example":"The interview recordings were transferred from tapes to digital format for analysis.","example_zh":"访谈录音从磁带转换为数字格式进行分析。","synonyms":["recordings","cassettes","strips"],"antonyms":[],"grammar":"单数 tape，搭配 audio/video tape，tape recorder，red tape（繁文缛节）"},{"word":"ultimately","pos":"adv.","phonetic":"/ˈʌltɪmətli/","cefr":"B2","meaning_zh":"最终；根本上；终究","meaning_en":"in the end, after everything has been considered","example":"Ultimately, the success of any policy depends on its effective implementation.","example_zh":"最终，任何政策的成功都取决于其有效实施。","synonyms":["finally","in the end","at last"],"antonyms":["initially","originally"],"grammar":"副词，常置于句首，形容词 ultimate"},{"word":"file","pos":"n./v.","phonetic":"/faɪl/","cefr":"B1","meaning_zh":"文件；档案；提交","meaning_en":"a collection of documents or to submit officially","example":"All research data must be stored in a secure file and backed up regularly.","example_zh":"所有研究数据必须存储在安全文件中并定期备份。","synonyms":["document","record","submit"],"antonyms":[],"grammar":"搭配 on file，file a report，file format，filing system"},{"word":"appendix","pos":"n.","phonetic":"/əˈpendɪks/","cefr":"B2","meaning_zh":"附录；阑尾；附件","meaning_en":"a section at the end of a book containing additional information","example":"Raw data tables were included in the appendix to support the statistical analysis.","example_zh":"原始数据表格包含在附录中以支持统计分析。","synonyms":["supplement","addition","attachment"],"antonyms":[],"grammar":"复数 appendices 或 appendixes，搭配 in the appendix，append（动词）"},{"word":"plus","pos":"prep./conj./adj.","phonetic":"/plʌs/","cefr":"B1","meaning_zh":"加上；另外；正数的","meaning_en":"with the addition of; also; having a positive quality","example":"The study had several strengths plus a few notable limitations that should be acknowledged.","example_zh":"该研究有几个优势，加上一些值得注意的局限性，应该予以承认。","synonyms":["and","additionally","positive"],"antonyms":["minus","negative"],"grammar":"搭配 plus sign，a plus（优点），grade A plus"},{"word":"summary","pos":"n.","phonetic":"/ˈsʌməri/","cefr":"B1","meaning_zh":"摘要；总结；概述","meaning_en":"a brief statement of the main points","example":"The executive summary provides a concise overview of the report's key findings.","example_zh":"执行摘要简明概述了报告的主要发现。","synonyms":["overview","synopsis","abstract"],"antonyms":["elaboration","expansion"],"grammar":"搭配 in summary，executive summary，summary of"}];

let session = [], idx = 0, flipped = false;

function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function startSession(){
  session = shuffle(DB).slice(0,30);
  idx = 0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('done-screen').style.display='none';
  document.getElementById('card-area').style.display='flex';
  renderCard();
}

function renderCard(){
  const d = session[idx];
  // reset flip
  flipped = false;
  document.getElementById('flip-wrap').classList.remove('flipped');
  // update progress
  const n = idx+1;
  document.getElementById('prog-text').textContent = n+' / 30';
  document.getElementById('prog-bar').style.width = (n/30*100)+'%';
  document.getElementById('card-hint').textContent = '第 '+n+' 张 · 点击卡片翻面';
  // front
  document.getElementById('word-display').textContent = d.word;
  document.getElementById('phonetic-display').textContent = d.phonetic || '—';
  document.getElementById('pos-badge').textContent = d.pos || '—';
  document.getElementById('meaning-zh').textContent = d.meaning_zh || '—';
  document.getElementById('meaning-en').textContent = d.meaning_en || '';
  // cefr badge
  const cb = document.getElementById('cefr-badge');
  cb.className = 'cefr-badge';
  cb.textContent = d.cefr || '—';
  if(d.cefr==='B1') cb.classList.add('cefr-b1');
  else if(d.cefr==='B2') cb.classList.add('cefr-b2');
  else if(d.cefr==='C1') cb.classList.add('cefr-c1');
  else if(d.cefr==='C2') cb.classList.add('cefr-c2');
  // back
  document.getElementById('example-sentence').textContent = d.example || '—';
  document.getElementById('example-trans').textContent = d.example_zh || '—';
  document.getElementById('grammar-note').textContent = d.grammar || '—';
  const synRow = document.getElementById('syn-row');
  const antRow = document.getElementById('ant-row');
  synRow.innerHTML = '';
  antRow.innerHTML = '';
  (d.synonyms||[]).forEach(s=>{const t=document.createElement('span');t.className='tag syn';t.textContent=s;synRow.appendChild(t);});
  (d.antonyms||[]).forEach(s=>{const t=document.createElement('span');t.className='tag ant';t.textContent=s;antRow.appendChild(t);});
  document.getElementById('syn-section').style.display=(d.synonyms&&d.synonyms.length)?'':'none';
  document.getElementById('ant-section').style.display=(d.antonyms&&d.antonyms.length)?'':'none';
}

function flipCard(){
  flipped=!flipped;
  document.getElementById('flip-wrap').classList.toggle('flipped',flipped);
}

function prevCard(){if(idx>0){idx--;renderCard();}}
function nextCard(){if(idx<29){idx++;renderCard();}else{document.getElementById('card-area').style.display='none';document.getElementById('done-screen').style.display='flex';document.getElementById('prog-text').textContent='30 / 30';document.getElementById('prog-bar').style.width='100%';}}

function speakWord(e){
  e.stopPropagation();
  const w=document.getElementById('word-display').textContent;
  if('speechSynthesis' in window){
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(w);
    u.lang='en-US';u.rate=0.85;
    speechSynthesis.speak(u);
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft') prevCard();
  if(e.key==='ArrowRight') nextCard();
  if(e.key===' '){e.preventDefault();flipCard();}
});
</script>
