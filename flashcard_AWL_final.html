<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学术词卡 AWL</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#EFEFEB;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column;background:#F7F6F2}

.topbar{background:#1C1C1E;padding:14px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{color:#F5F5F0;font-size:15px;font-weight:500;letter-spacing:.02em}
.progress-row{display:flex;align-items:center;gap:8px}
.progress-text{color:#888;font-size:12px;white-space:nowrap}
.progress-bar-wrap{width:70px;height:3px;background:#3A3A3C;border-radius:2px}
.progress-bar-fill{height:100%;background:#A8E6CF;border-radius:2px;transition:width .3s}

.card-area{flex:1;padding:16px;display:flex;flex-direction:column;align-items:center;gap:14px}
.card-hint{font-size:11px;color:#AAA;letter-spacing:.04em;align-self:flex-start}

.flip-wrap{width:100%;perspective:1400px;cursor:pointer}
.flip-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);min-height:370px}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg)}
.face{position:absolute;width:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;background:#fff;border-radius:20px;border:.5px solid #E0DED8;padding:24px 22px 20px;display:flex;flex-direction:column;min-height:370px}
.face-back{transform:rotateY(180deg)}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.pos-badge{font-size:11px;font-weight:500;background:#F0EEE8;color:#666;padding:4px 10px;border-radius:20px}
.cefr-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.04em}
.cefr-b1{background:#EAF6F0;color:#1E8449}
.cefr-b2{background:#1C1C1E;color:#A8E6CF}
.cefr-c1{background:#2C1654;color:#D4AAFF}
.cefr-c2{background:#4A0E0E;color:#FFB3B3}

.word-main{font-size:34px;font-weight:500;color:#1C1C1E;letter-spacing:-.02em;margin-bottom:4px;line-height:1.1}
.phonetic{font-size:14px;color:#999;margin-bottom:13px}
.sound-btn{display:inline-flex;align-items:center;gap:6px;background:#F7F6F2;border:.5px solid #E0DED8;border-radius:20px;padding:7px 14px;font-size:12px;color:#555;cursor:pointer;margin-bottom:18px;font-family:inherit;transition:background .15s;width:fit-content}
.sound-btn:active{background:#ECEAE4}
.sound-btn i{font-size:15px;color:#1C1C1E}
.divider{height:.5px;background:#ECEAE4;margin-bottom:14px}
.meaning-label{font-size:10px;color:#BBB;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.meaning-zh{font-size:19px;color:#1C1C1E;font-weight:500;margin-bottom:4px}
.meaning-en{font-size:13px;color:#888;line-height:1.55}
.flip-hint{margin-top:auto;padding-top:12px;display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:#CCC}
.flip-hint i{font-size:13px}

.back-section{margin-bottom:13px}
.back-label{font-size:10px;color:#BBB;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.example-sentence{font-size:14px;color:#1C1C1E;line-height:1.7;margin-bottom:3px}
.example-trans{font-size:12px;color:#999;line-height:1.5}
.syn-ant-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;background:#F0EEE8;color:#555}
.tag.syn{background:#EAF6F0;color:#1E6B40}
.tag.ant{background:#FDECEA;color:#A93226}
.grammar-note{font-size:12px;color:#888;line-height:1.55;background:#F7F6F2;border-radius:10px;padding:10px 12px;border-left:2px solid #D0CEC8}

.nav-row{width:100%;display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.nav-btn{background:#fff;border:.5px solid #DDD;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#555;transition:background .15s;font-family:inherit}
.nav-btn:active{background:#ECEAE4}
.nav-btn i{font-size:19px}
.nav-label{font-size:12px;color:#AAA}

.start-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:18px;text-align:center}
.start-icon{font-size:52px;color:#1C1C1E}
.start-title{font-size:22px;font-weight:500;color:#1C1C1E}
.start-sub{font-size:14px;color:#888;line-height:1.7}
.start-btn{background:#1C1C1E;color:#F5F5F0;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;max-width:260px;transition:opacity .15s}
.start-btn:active{opacity:.8}
.count-badge{display:inline-flex;align-items:center;gap:6px;background:#F0EEE8;border-radius:20px;padding:6px 14px;font-size:12px;color:#888}

.done-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:16px;text-align:center}
.done-icon{font-size:56px;color:#1E8449}
.done-title{font-size:22px;font-weight:500;color:#1C1C1E}
.done-sub{font-size:14px;color:#888;line-height:1.7}
.restart-btn{background:#1C1C1E;color:#A8E6CF;border:none;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;max-width:260px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-title">学术词卡 AWL</span>
    <div class="progress-row">
      <span class="progress-text" id="prog-text">0 / 30</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div id="start-screen" class="start-screen">
    <i class="ti ti-cards start-icon"></i>
    <div class="start-title">学术词汇练习</div>
    <div class="start-sub">共 570 个学术词汇<br>每次随机抽取 30 张词卡<br>点击卡片翻面查看例句与同反义词</div>
    <button class="start-btn" onclick="startSession()">开始练习</button>
    <div class="count-badge"><i class="ti ti-school" style="font-size:14px"></i>AWL 学术词汇表</div>
  </div>

  <div id="card-area" class="card-area" style="display:none">
    <div class="card-hint" id="card-hint">第 1 张 &middot; 点击卡片翻面</div>

    <div class="flip-wrap" id="flip-wrap" onclick="flipCard()">
      <div class="flip-inner" id="flip-inner">
        <div class="face face-front">
          <div class="card-header">
            <span class="pos-badge" id="pos-badge">n.</span>
            <span class="cefr-badge cefr-b2" id="cefr-badge">B2</span>
          </div>
          <div class="word-main" id="word-display">—</div>
          <div class="phonetic" id="phonetic-display">/—/</div>
          <button class="sound-btn" onclick="speakWord(event)">
            <i class="ti ti-volume"></i>美式发音
          </button>
          <div class="divider"></div>
          <div class="meaning-label">中文释义</div>
          <div class="meaning-zh" id="meaning-zh">—</div>
          <div class="meaning-en" id="meaning-en"></div>
          <div class="flip-hint"><i class="ti ti-rotate-clockwise"></i>点击查看例句</div>
        </div>

        <div class="face face-back">
          <div class="back-section">
            <div class="back-label">例句</div>
            <div class="example-sentence" id="example-sentence">—</div>
            <div class="example-trans" id="example-trans">—</div>
          </div>
          <div class="divider"></div>
          <div class="back-section" id="syn-section">
            <div class="back-label">同义词</div>
            <div class="syn-ant-row" id="syn-row"></div>
          </div>
          <div class="back-section" id="ant-section">
            <div class="back-label">反义词</div>
            <div class="syn-ant-row" id="ant-row"></div>
          </div>
          <div class="back-section">
            <div class="back-label">语法要点</div>
            <div class="grammar-note" id="grammar-note">—</div>
          </div>
          <div class="flip-hint" style="margin-top:auto"><i class="ti ti-rotate-clockwise"></i>点击返回</div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()"><i class="ti ti-arrow-left"></i></button>
      <span class="nav-label">← 上一张 &nbsp;·&nbsp; 下一张 →</span>
      <button class="nav-btn" onclick="nextCard()"><i class="ti ti-arrow-right"></i></button>
    </div>
  </div>

  <div id="done-screen" class="done-screen" style="display:none">
    <i class="ti ti-trophy done-icon"></i>
    <div class="done-title">本轮练习完成！</div>
    <div class="done-sub">你已完成本次 30 张词卡练习<br>再来一轮，随机抽取新词汇？</div>
    <button class="restart-btn" onclick="startSession()">再练一轮</button>
  </div>
</div>

<script>
const DB = [{"word":"error","pos":"n.","phonetic":"/ˈerər/","cefr":"B1","meaning_zh":"错误；误差","meaning_en":"a mistake or inaccuracy","example":"The researcher identified a critical error in the data collection process.","example_zh":"研究人员发现数据收集过程中存在一个严重错误。","synonyms":["mistake","fault","inaccuracy"],"antonyms":["accuracy","correctness"],"grammar":"常见搭配：make an error, human error, margin of error"},{"word":"acquisition","pos":"n.","phonetic":"/ˌækwɪˈzɪʃən/","cefr":"B2","meaning_zh":"获得；习得；收购","meaning_en":"the process of gaining or obtaining something","example":"Language acquisition in children occurs naturally through exposure and interaction.","example_zh":"儿童的语言习得通过接触和互动自然发生。","synonyms":["attainment","procurement","purchase"],"antonyms":["loss","disposal","relinquishment"],"grammar":"常见搭配：language acquisition, acquisition of skills, corporate acquisition"},{"word":"fundamental","pos":"adj.","phonetic":"/ˌfʌndəˈmentl/","cefr":"B2","meaning_zh":"基本的；根本的；基础的","meaning_en":"forming the most essential or important part of something","example":"Critical thinking is a fundamental skill required in academic research.","example_zh":"批判性思维是学术研究所需的基本技能。","synonyms":["basic","essential","core"],"antonyms":["secondary","peripheral","minor"],"grammar":"可作形容词或名词（fundamentals），搭配 fundamental to sth"},{"word":"similar","pos":"adj.","phonetic":"/ˈsɪmɪlər/","cefr":"B1","meaning_zh":"相似的；类似的","meaning_en":"having features in common with something else","example":"The two studies produced similar results despite using different methodologies.","example_zh":"尽管使用了不同的研究方法，两项研究产生了相似的结果。","synonyms":["alike","comparable","analogous"],"antonyms":["different","dissimilar","distinct"],"grammar":"搭配 similar to，注意不用 similar with"},{"word":"dominant","pos":"adj.","phonetic":"/ˈdɒmɪnənt/","cefr":"B2","meaning_zh":"主导的；占优势的；支配性的","meaning_en":"having power or influence over others","example":"English has become the dominant language in international academic publishing.","example_zh":"英语已成为国际学术出版中的主导语言。","synonyms":["prevailing","leading","predominant"],"antonyms":["subordinate","minor","secondary"],"grammar":"搭配 dominant in/over，名词形式为 dominance"},{"word":"professional","pos":"adj./n.","phonetic":"/prəˈfeʃənl/","cefr":"B1","meaning_zh":"专业的；职业的；专业人士","meaning_en":"relating to or belonging to a profession","example":"Professional development is essential for maintaining competence in any field.","example_zh":"职业发展对于维持任何领域的能力都至关重要。","synonyms":["expert","specialist","qualified"],"antonyms":["amateur","unprofessional","novice"],"grammar":"名词 professional 指专业人士，副词 professionally"},{"word":"discrimination","pos":"n.","phonetic":"/dɪˌskrɪmɪˈneɪʃən/","cefr":"B2","meaning_zh":"歧视；区别对待；辨别力","meaning_en":"unjust treatment of people based on their identity or characteristics","example":"The policy was criticized for perpetuating racial discrimination in hiring practices.","example_zh":"该政策因在招聘中延续种族歧视而受到批评。","synonyms":["bias","prejudice","inequality"],"antonyms":["equality","fairness","impartiality"],"grammar":"搭配 discrimination against，动词形式 discriminate"},{"word":"circumstances","pos":"n.","phonetic":"/ˈsɜːrkəmstænsɪz/","cefr":"B2","meaning_zh":"情况；环境；境况","meaning_en":"the conditions or facts surrounding an event or situation","example":"Under normal circumstances, the experiment would take three months to complete.","example_zh":"在正常情况下，实验需要三个月才能完成。","synonyms":["conditions","situation","context"],"antonyms":[],"grammar":"通常用复数，搭配 under the circumstances, in certain circumstances"},{"word":"identified","pos":"v.","phonetic":"/aɪˈdentɪfaɪd/","cefr":"B1","meaning_zh":"识别；确认；找出（identify的过去式）","meaning_en":"recognized or established the identity of something","example":"The study identified three key factors contributing to student underperformance.","example_zh":"该研究确定了导致学生表现不佳的三个关键因素。","synonyms":["recognized","detected","pinpointed"],"antonyms":["overlooked","missed","ignored"],"grammar":"identify sth as sth，搭配 identify with（认同）"},{"word":"categories","pos":"n.","phonetic":"/ˈkætəɡɔːrɪz/","cefr":"B1","meaning_zh":"类别；范畴","meaning_en":"groups or divisions of things that share common characteristics","example":"The data was divided into three distinct categories for analysis.","example_zh":"数据被分为三个不同类别进行分析。","synonyms":["groups","classes","types"],"antonyms":[],"grammar":"单数 category，动词形式 categorize，搭配 fall into a category"},{"word":"evolution","pos":"n.","phonetic":"/ˌiːvəˈluːʃən/","cefr":"B2","meaning_zh":"演化；进化；发展","meaning_en":"the gradual development or change of something over time","example":"The evolution of digital technology has transformed modern communication.","example_zh":"数字技术的演变改变了现代通信方式。","synonyms":["development","progression","transformation"],"antonyms":["stagnation","regression","decline"],"grammar":"搭配 the evolution of，形容词 evolutionary"},{"word":"temporary","pos":"adj.","phonetic":"/ˈtempəreri/","cefr":"B1","meaning_zh":"临时的；暂时的","meaning_en":"lasting for only a limited period of time","example":"The organization provided temporary accommodation for displaced families.","example_zh":"该组织为流离失所的家庭提供了临时住所。","synonyms":["short-term","provisional","interim"],"antonyms":["permanent","lasting","indefinite"],"grammar":"副词 temporarily，反义词 permanent"},{"word":"scenario","pos":"n.","phonetic":"/səˈnɑːrioʊ/","cefr":"B2","meaning_zh":"情景；方案；剧情","meaning_en":"a description of a possible sequence of events","example":"The report outlined three economic scenarios for the next fiscal year.","example_zh":"报告概述了下一财年的三种经济情景。","synonyms":["situation","case","outline"],"antonyms":[],"grammar":"复数 scenarios，搭配 worst-case scenario, in this scenario"},{"word":"criteria","pos":"n.","phonetic":"/kraɪˈtɪərɪə/","cefr":"B2","meaning_zh":"标准；准则","meaning_en":"the standards used for judging or deciding something","example":"The selection criteria for the scholarship included academic merit and financial need.","example_zh":"奖学金的评选标准包括学业成绩和经济需求。","synonyms":["standards","requirements","measures"],"antonyms":[],"grammar":"criteria是criterion的复数，不可说 a criteria"},{"word":"guidelines","pos":"n.","phonetic":"/ˈɡaɪdlaɪnz/","cefr":"B2","meaning_zh":"指导方针；准则","meaning_en":"general rules or principles for action","example":"The government issued new guidelines for environmental impact assessments.","example_zh":"政府发布了新的环境影响评估指导方针。","synonyms":["instructions","directives","recommendations"],"antonyms":[],"grammar":"通常用复数，搭配 follow guidelines, issue guidelines"},{"word":"ideology","pos":"n.","phonetic":"/ˌaɪdiˈɒlədʒi/","cefr":"C1","meaning_zh":"意识形态；思想体系","meaning_en":"a system of ideas forming the basis of political or economic theory","example":"The party's ideology was rooted in principles of social equality and justice.","example_zh":"该党的意识形态根植于社会平等与正义的原则。","synonyms":["doctrine","belief system","worldview"],"antonyms":[],"grammar":"形容词 ideological，副词 ideologically"},{"word":"cycle","pos":"n.","phonetic":"/ˈsaɪkl/","cefr":"B1","meaning_zh":"周期；循环；周转","meaning_en":"a series of events that are regularly repeated in the same order","example":"The economic cycle of boom and recession affects employment rates significantly.","example_zh":"经济繁荣与衰退的周期对就业率有显著影响。","synonyms":["circle","rotation","sequence"],"antonyms":[],"grammar":"可作名词或动词，搭配 life cycle, business cycle"},{"word":"option","pos":"n.","phonetic":"/ˈɒpʃən/","cefr":"B1","meaning_zh":"选项；选择；期权","meaning_en":"a choice or possibility available in a particular situation","example":"Students have the option of completing the assessment online or in person.","example_zh":"学生可以选择在线或现场完成评估。","synonyms":["choice","alternative","possibility"],"antonyms":[],"grammar":"搭配 have the option of, keep one's options open"},{"word":"involved","pos":"adj.","phonetic":"/ɪnˈvɒlvd/","cefr":"B1","meaning_zh":"参与的；复杂的；有关联的","meaning_en":"connected with or included in something","example":"All parties involved in the negotiation agreed to the final terms.","example_zh":"参与谈判的所有各方都同意了最终条款。","synonyms":["engaged","participating","implicated"],"antonyms":["uninvolved","excluded","detached"],"grammar":"搭配 involved in sth，作形容词时也可表示复杂的"},{"word":"impact","pos":"n./v.","phonetic":"/ˈɪmpækt/","cefr":"B2","meaning_zh":"影响；冲击；撞击","meaning_en":"a strong effect or influence on something","example":"Climate change has a significant impact on global food security.","example_zh":"气候变化对全球粮食安全有重大影响。","synonyms":["effect","influence","consequence"],"antonyms":[],"grammar":"名词搭配 have an impact on，动词 impact on/upon"},{"word":"via","pos":"prep.","phonetic":"/ˈvaɪə/","cefr":"B2","meaning_zh":"通过；经由；借助","meaning_en":"by way of or through","example":"The data was collected via online surveys and structured interviews.","example_zh":"数据通过在线调查和结构化访谈收集。","synonyms":["through","by means of","using"],"antonyms":[],"grammar":"介词，不可单独作动词使用，正式书面语常用"},{"word":"converted","pos":"v./adj.","phonetic":"/kənˈvɜːrtɪd/","cefr":"B2","meaning_zh":"转换的；改变的（convert的过去式）","meaning_en":"changed in form, character, or function","example":"The industrial building was converted into a modern research facility.","example_zh":"该工业建筑被改建成现代化研究设施。","synonyms":["transformed","changed","adapted"],"antonyms":["maintained","preserved","retained"],"grammar":"convert sth into sth，名词 conversion"},{"word":"panel","pos":"n.","phonetic":"/ˈpænl/","cefr":"B2","meaning_zh":"专家小组；面板；嵌板","meaning_en":"a small group of experts who discuss or decide something","example":"A panel of independent reviewers evaluated the research proposals.","example_zh":"一个独立评审专家小组对研究提案进行了评估。","synonyms":["committee","board","group"],"antonyms":[],"grammar":"搭配 panel discussion, panel of experts, solar panel"},{"word":"revenue","pos":"n.","phonetic":"/ˈrevənjuː/","cefr":"B2","meaning_zh":"收入；税收；营业额","meaning_en":"income generated from business activities or taxation","example":"The company's annual revenue increased by 15% following the product launch.","example_zh":"产品发布后，公司年收入增加了15%。","synonyms":["income","earnings","turnover"],"antonyms":["expenditure","costs","expenses"],"grammar":"不可数名词，搭配 generate revenue, revenue stream"},{"word":"shift","pos":"n./v.","phonetic":"/ʃɪft/","cefr":"B2","meaning_zh":"转变；转移；班次","meaning_en":"a change in position, direction, or attitude","example":"There has been a significant shift in public attitudes towards renewable energy.","example_zh":"公众对可再生能源的态度发生了显著转变。","synonyms":["change","transition","move"],"antonyms":["stability","stagnation","fixity"],"grammar":"搭配 shift in, paradigm shift，也可指工作班次"},{"word":"medium","pos":"n./adj.","phonetic":"/ˈmiːdiəm/","cefr":"B1","meaning_zh":"媒介；手段；中等的","meaning_en":"a means of communication or expression; of middle size","example":"Television remains an important medium for mass communication worldwide.","example_zh":"电视仍然是全球大众传播的重要媒介。","synonyms":["channel","means","vehicle"],"antonyms":[],"grammar":"复数 media（媒体）或 mediums（灵媒），注意区分"},{"word":"parallel","pos":"adj./n.","phonetic":"/ˈpærəlel/","cefr":"B2","meaning_zh":"平行的；类似的；对应物","meaning_en":"occurring at the same time or having similar features","example":"The two societies showed parallel developments in their economic structures.","example_zh":"这两个社会在经济结构上呈现出平行发展。","synonyms":["comparable","corresponding","analogous"],"antonyms":["divergent","different","contrasting"],"grammar":"搭配 parallel to/with，draw a parallel between"},{"word":"access","pos":"n./v.","phonetic":"/ˈækses/","cefr":"B1","meaning_zh":"获取；访问；通道","meaning_en":"the means or opportunity to approach or enter a place or resource","example":"All students should have equal access to educational resources and facilities.","example_zh":"所有学生应平等获得教育资源和设施。","synonyms":["entry","admission","availability"],"antonyms":["restriction","denial","exclusion"],"grammar":"搭配 access to，动词 access sth（不用 access to as verb）"},{"word":"foundation","pos":"n.","phonetic":"/faʊnˈdeɪʃən/","cefr":"B2","meaning_zh":"基础；根基；基金会","meaning_en":"the basis on which something is built or established","example":"A solid foundation in mathematics is essential for studying economics.","example_zh":"扎实的数学基础对于学习经济学至关重要。","synonyms":["basis","groundwork","base"],"antonyms":["superstructure","conclusion","result"],"grammar":"搭配 lay the foundation for，也指慈善机构（Foundation）"},{"word":"items","pos":"n.","phonetic":"/ˈaɪtəmz/","cefr":"B1","meaning_zh":"项目；条目；物品","meaning_en":"individual things or units in a list or collection","example":"The questionnaire contained 20 items measuring student satisfaction.","example_zh":"问卷包含20个衡量学生满意度的条目。","synonyms":["elements","entries","units"],"antonyms":[],"grammar":"单数 item，搭配 item on the agenda, line item"},{"word":"fluctuations","pos":"n.","phonetic":"/ˌflʌktʃuˈeɪʃənz/","cefr":"C1","meaning_zh":"波动；起伏；变动","meaning_en":"irregular changes in the level or value of something","example":"Currency fluctuations can significantly affect international trade agreements.","example_zh":"汇率波动会对国际贸易协议产生重大影响。","synonyms":["variations","changes","oscillations"],"antonyms":["stability","constancy","steadiness"],"grammar":"动词 fluctuate，搭配 fluctuations in price/temperature"},{"word":"process","pos":"n./v.","phonetic":"/ˈprɒses/","cefr":"B1","meaning_zh":"过程；流程；处理","meaning_en":"a series of actions taken to achieve a result","example":"The peer review process ensures the quality of academic publications.","example_zh":"同行评审过程确保了学术出版物的质量。","synonyms":["procedure","method","system"],"antonyms":[],"grammar":"名词搭配 in the process of，动词 process data/information"},{"word":"clarity","pos":"n.","phonetic":"/ˈklærɪti/","cefr":"B2","meaning_zh":"清晰；明确；透明度","meaning_en":"the quality of being clear and easy to understand","example":"Academic writing requires both precision and clarity to convey complex ideas.","example_zh":"学术写作需要精确性和清晰度来传达复杂思想。","synonyms":["clearness","precision","transparency"],"antonyms":["vagueness","ambiguity","obscurity"],"grammar":"不可数名词，形容词 clear，搭配 for clarity, with clarity"},{"word":"psychology","pos":"n.","phonetic":"/saɪˈkɒlədʒi/","cefr":"B2","meaning_zh":"心理学；心理","meaning_en":"the scientific study of the human mind and behavior","example":"Cognitive psychology examines how people process and store information.","example_zh":"认知心理学研究人们如何处理和存储信息。","synonyms":["mental science","behavioral science"],"antonyms":[],"grammar":"形容词 psychological，名词 psychologist，副词 psychologically"},{"word":"contact","pos":"n./v.","phonetic":"/ˈkɒntækt/","cefr":"B1","meaning_zh":"联系；接触；联络","meaning_en":"communication or connection with someone","example":"Researchers made contact with participants through email prior to the study.","example_zh":"研究人员在研究前通过电子邮件与参与者取得联系。","synonyms":["communication","connection","liaison"],"antonyms":["separation","isolation","disconnection"],"grammar":"搭配 in contact with, make contact, contact sb（动词直接接宾语）"},{"word":"conversely","pos":"adv.","phonetic":"/ˈkɒnvɜːrsli/","cefr":"C1","meaning_zh":"相反地；反过来说","meaning_en":"introducing a statement that contrasts with what has just been said","example":"High investment leads to growth; conversely, reduced spending may cause stagnation.","example_zh":"高投资带来增长；相反，减少支出可能导致停滞。","synonyms":["on the contrary","on the other hand","in contrast"],"antonyms":["similarly","likewise","correspondingly"],"grammar":"副词，用于句首或句中，后跟逗号，常用于学术写作"},{"word":"intervention","pos":"n.","phonetic":"/ˌɪntəˈvenʃən/","cefr":"B2","meaning_zh":"干预；介入；干涉","meaning_en":"action taken to improve a situation or prevent harm","example":"Early educational intervention can significantly improve outcomes for at-risk children.","example_zh":"早期教育干预可以显著改善高风险儿童的成果。","synonyms":["involvement","interference","mediation"],"antonyms":["non-intervention","abstention","indifference"],"grammar":"动词 intervene，搭配 intervention in, military/educational intervention"},{"word":"restricted","pos":"adj.","phonetic":"/rɪˈstrɪktɪd/","cefr":"B2","meaning_zh":"受限制的；限制级的","meaning_en":"limited or controlled in some way","example":"Access to the archive is restricted to registered academic researchers.","example_zh":"档案馆的访问仅限于注册学术研究人员。","synonyms":["limited","controlled","confined"],"antonyms":["unrestricted","open","unlimited"],"grammar":"动词 restrict，名词 restriction，搭配 restricted to"},{"word":"emphasis","pos":"n.","phonetic":"/ˈemfəsɪs/","cefr":"B2","meaning_zh":"重点；强调；重要性","meaning_en":"special importance or attention given to something","example":"The curriculum places great emphasis on developing critical thinking skills.","example_zh":"课程非常强调培养批判性思维技能。","synonyms":["stress","focus","priority"],"antonyms":["de-emphasis","neglect"],"grammar":"复数 emphases，搭配 place/put emphasis on，动词 emphasize"},{"word":"likewise","pos":"adv.","phonetic":"/ˈlaɪkwaɪz/","cefr":"B2","meaning_zh":"同样地；类似地","meaning_en":"in the same way; also","example":"The first group improved significantly; likewise, the second group showed progress.","example_zh":"第一组有了显著进步；同样，第二组也显示出进展。","synonyms":["similarly","also","in the same way"],"antonyms":["conversely","differently","on the contrary"],"grammar":"副词，用于连接并列信息，常置于句首"},{"word":"distinction","pos":"n.","phonetic":"/dɪˈstɪŋkʃən/","cefr":"B2","meaning_zh":"区别；差异；卓越","meaning_en":"a difference between two things","example":"The study draws a clear distinction between correlation and causation.","example_zh":"该研究明确区分了相关性与因果关系。","synonyms":["difference","differentiation","contrast"],"antonyms":["similarity","likeness","uniformity"],"grammar":"搭配 make a distinction between, distinction between A and B"},{"word":"confined","pos":"adj.","phonetic":"/kənˈfaɪnd/","cefr":"B2","meaning_zh":"受限的；局限的；被关禁的","meaning_en":"kept within limits or a small space","example":"The study's findings are confined to the specific population surveyed.","example_zh":"该研究的发现仅限于所调查的特定群体。","synonyms":["limited","restricted","bounded"],"antonyms":["unlimited","expansive","free"],"grammar":"动词 confine，搭配 confined to，be confined to bed"},{"word":"focus","pos":"n./v.","phonetic":"/ˈfoʊkəs/","cefr":"B1","meaning_zh":"焦点；重点；关注","meaning_en":"the center of interest or attention","example":"This chapter focuses on the economic implications of globalization.","example_zh":"本章重点讨论全球化的经济影响。","synonyms":["emphasis","concentration","attention"],"antonyms":["distraction","inattention"],"grammar":"搭配 focus on，名词搭配 the focus of, bring into focus"},{"word":"evidence","pos":"n.","phonetic":"/ˈevɪdəns/","cefr":"B1","meaning_zh":"证据；迹象；证明","meaning_en":"facts or information indicating whether something is true","example":"There is strong empirical evidence to support the proposed theory.","example_zh":"有强有力的实证支持所提出的理论。","synonyms":["proof","data","support"],"antonyms":[],"grammar":"不可数名词，搭配 evidence for/of/that，provide/gather evidence"},{"word":"relaxed","pos":"adj.","phonetic":"/rɪˈlækst/","cefr":"B1","meaning_zh":"放松的；宽松的；不严格的","meaning_en":"free from tension; not strict or severe","example":"A more relaxed approach to testing may reduce student anxiety levels.","example_zh":"更宽松的测试方式可能降低学生的焦虑水平。","synonyms":["informal","lenient","easygoing"],"antonyms":["strict","tense","rigid"],"grammar":"动词 relax，名词 relaxation，搭配 relaxed about/regarding"},{"word":"guarantee","pos":"n./v.","phonetic":"/ˌɡærənˈtiː/","cefr":"B2","meaning_zh":"保证；担保；保障","meaning_en":"a formal promise that something will happen or is true","example":"Access to education does not guarantee economic success for all individuals.","example_zh":"获得教育并不保证所有人都能取得经济上的成功。","synonyms":["assurance","promise","warranty"],"antonyms":[],"grammar":"搭配 guarantee that/to do sth，guarantee sth to sb"},{"word":"accompanied","pos":"v.","phonetic":"/əˈkʌmpənid/","cefr":"B2","meaning_zh":"伴随；陪同（accompany的过去式）","meaning_en":"went somewhere with someone or happened along with","example":"The policy change was accompanied by significant public debate.","example_zh":"这一政策变化伴随着重大的公众辩论。","synonyms":["followed","attended","supplemented"],"antonyms":["excluded","separated","isolated"],"grammar":"搭配 accompanied by，be accompanied by sth/sb"},{"word":"consumer","pos":"n.","phonetic":"/kənˈsjuːmər/","cefr":"B1","meaning_zh":"消费者；用户","meaning_en":"a person who purchases goods or services for personal use","example":"Consumer behavior has shifted significantly with the ":"a system that measures changes in value or level","example":"The consumer price index is used to measure inflation over time.","example_zh":"消费价格指数用于衡量通货膨胀随时间的变化。","synonyms":["indicator","measure","gauge"],"antonyms":[],"grammar":"复数 indexes 或 indices，搭配 index of, stock market index"},{"word":"promote","pos":"v.","phonetic":"/prəˈmoʊt/","cefr":"B1","meaning_zh":"促进；推广；晋升；宣传","meaning_en":"to support or encourage the development of something","example":"The initiative aims to promote sustainable practices in the manufacturing sector.","example_zh":"该倡议旨在促进制造业的可持续做法。","synonyms":["encourage","advance","support"],"antonyms":["hinder","discourage","demote"],"grammar":"名词 promotion，搭配 promote growth/awareness，也指晋升"},{"word":"investment","pos":"n.","phonetic":"/ɪnˈvestmənt/","cefr":"B2","meaning_zh":"投资；投入；投资额","meaning_en":"the act of putting money or resources into something for future benefit","example":"Foreign direct investment plays a critical role in developing economies.","example_zh":"外国直接投资在发展中国家经济中起着关键作用。","synonyms":["expenditure","funding","capital"],"antonyms":[],"grammar":"动词 invest，搭配 investment in，return on investment（ROI）"},{"word":"trigger","pos":"v./n.","phonetic":"/ˈtrɪɡər/","cefr":"B2","meaning_zh":"触发；引起；扳机","meaning_en":"to cause something to begin or happen","example":"Economic instability can trigger social unrest in vulnerable communities.","example_zh":"经济不稳定可能引发脆弱社区的社会动荡。","synonyms":["cause","initiate","provoke"],"antonyms":["prevent","suppress","inhibit"],"grammar":"动词搭配 trigger sth，名词搭配 a trigger for"},{"word":"interpretation","pos":"n.","phonetic":"/ɪnˌtɜːrprɪˈteɪʃən/","cefr":"B2","meaning_zh":"解释；诠释；口译","meaning_en":"an explanation or way of understanding something","example":"The interpretation of statistical data requires careful methodological consideration.","example_zh":"统计数据的解读需要仔细的方法论考量。","synonyms":["explanation","analysis","reading"],"antonyms":[],"grammar":"动词 interpret，搭配 open to interpretation，different interpretations"},{"word":"implementation","pos":"n.","phonetic":"/ˌɪmplɪmenˈteɪʃən/","cefr":"B2","meaning_zh":"实施；执行；落实","meaning_en":"the process of putting a plan or policy into effect","example":"Successful implementation of the strategy requires coordinated efforts across departments.","example_zh":"成功实施该战略需要各部门的协调努力。","synonyms":["execution","application","enactment"],"antonyms":["planning","design","abolition"],"grammar":"动词 implement，搭配 implementation of a policy/plan"},{"word":"function","pos":"n./v.","phonetic":"/ˈfʌŋkʃən/","cefr":"B1","meaning_zh":"功能；作用；运作","meaning_en":"the purpose or activity of something","example":"The primary function of the immune system is to protect the body from disease.","example_zh":"免疫系统的主要功能是保护身体免受疾病侵害。","synonyms":["purpose","role","operation"],"antonyms":[],"grammar":"搭配 function as（作为…发挥作用），functional（形容词）"},{"word":"community","pos":"n.","phonetic":"/kəˈmjuːnɪti/","cefr":"B1","meaning_zh":"社区；群体；社会","meaning_en":"a group of people living in the same area or sharing common interests","example":"The research examined how community bonds affect mental health outcomes.","example_zh":"该研究考察了社区纽带如何影响心理健康结果。","synonyms":["society","group","collective"],"antonyms":[],"grammar":"搭配 local/academic/global community，community-based"},{"word":"format","pos":"n./v.","phonetic":"/ˈfɔːrmæt/","cefr":"B2","meaning_zh":"格式；形式；版式","meaning_en":"the way in which something is arranged or presented","example":"The report should follow the standard academic format with clearly defined sections.","example_zh":"报告应遵循标准学术格式，各部分明确划分。","synonyms":["structure","layout","arrangement"],"antonyms":[],"grammar":"动词 format（格式化），搭配 in a ... format, file format"},{"word":"integration","pos":"n.","phonetic":"/ˌɪntɪˈɡreɪʃən/","cefr":"B2","meaning_zh":"整合；融合；一体化","meaning_en":"the process of combining parts into a whole","example":"Social integration of immigrant populations remains a key challenge for governments.","example_zh":"移民群体的社会融合仍是政府面临的主要挑战。","synonyms":["incorporation","unification","merging"],"antonyms":["segregation","separation","exclusion"],"grammar":"动词 integrate，搭配 integration of/into，social/economic integration"},{"word":"mechanism","pos":"n.","phonetic":"/ˈmekənɪzəm/","cefr":"B2","meaning_zh":"机制；机构；机械装置","meaning_en":"a system of parts that work together to produce a result","example":"Market mechanisms help determine the price of goods and services.","example_zh":"市场机制有助于确定商品和服务的价格。","synonyms":["system","process","procedure"],"antonyms":[],"grammar":"搭配 defence mechanism, coping mechanism，形容词 mechanical"},{"word":"somewhat","pos":"adv.","phonetic":"/ˈsʌmwɒt/","cefr":"B2","meaning_zh":"有点；稍微；在某种程度上","meaning_en":"to a moderate extent or degree","example":"The results were somewhat surprising given the existing theoretical framework.","example_zh":"考虑到现有的理论框架，这些结果有些令人惊讶。","synonyms":["rather","fairly","slightly"],"antonyms":["completely","entirely","absolutely"],"grammar":"副词，修饰形容词或副词，语气比 very 弱，比 slightly 强"},{"word":"paragraph","pos":"n.","phonetic":"/ˈpærəɡrɑːf/","cefr":"B1","meaning_zh":"段落；自然段","meaning_en":"a distinct section of writing dealing with one theme","example":"Each paragraph should contain one main idea supported by relevant evidence.","example_zh":"每个段落应包含一个主要观点，并有相关证据支撑。","synonyms":["section","passage","segment"],"antonyms":[],"grammar":"搭配 opening/closing paragraph，topic sentence 通常位于段落开头"},{"word":"whereas","pos":"conj.","phonetic":"/ˌwerˈæz/","cefr":"B2","meaning_zh":"而；然而；鉴于","meaning_en":"in contrast or comparison with the fact that","example":"Qualitative research focuses on meaning, whereas quantitative research emphasizes measurement.","example_zh":"定性研究关注意义，而定量研究强调测量。","synonyms":["while","although","but"],"antonyms":[],"grammar":"连词，用于对比两个相反或不同的事实，常用于学术写作"},{"word":"ambiguous","pos":"adj.","phonetic":"/æmˈbɪɡjuəs/","cefr":"C1","meaning_zh":"模糊的；含糊的；歧义的","meaning_en":"open to more than one interpretation","example":"The ambiguous wording of the contract led to a lengthy legal dispute.","example_zh":"合同中含糊的措辞导致了漫长的法律纠纷。","synonyms":["unclear","vague","equivocal"],"antonyms":["clear","unambiguous","explicit"],"grammar":"名词 ambiguity，副词 ambiguously，搭配 remain ambiguous"},{"word":"whereby","pos":"conj.","phonetic":"/ˌwerˈbaɪ/","cefr":"C1","meaning_zh":"借此；通过…方式；据此","meaning_en":"by which; according to which","example":"The agreement established a mechanism whereby disputes could be resolved peacefully.","example_zh":"该协议建立了一套可通过和平方式解决争端的机制。","synonyms":["through which","by means of which","via which"],"antonyms":[],"grammar":"正式连词，引导定语从句，常见于法律和学术文本"},{"word":"equipment","pos":"n.","phonetic":"/ɪˈkwɪpmənt/","cefr":"B1","meaning_zh":"设备；装备；器材","meaning_en":"tools or devices needed for a particular purpose","example":"The laboratory was furnished with state-of-the-art equipment for genomic research.","example_zh":"实验室配备了用于基因组研究的最先进设备。","synonyms":["apparatus","tools","instruments"],"antonyms":[],"grammar":"不可数名词，不可说 an equipment，搭配 medical/office equipment"},{"word":"physical","pos":"adj.","phonetic":"/ˈfɪzɪkl/","cefr":"B1","meaning_zh":"物理的；身体的；有形的","meaning_en":"relating to the body or to material things","example":"Physical activity has been shown to improve both mental and physical health outcomes.","example_zh":"体育活动已被证明可以改善心理和身体健康结果。","synonyms":["bodily","material","tangible"],"antonyms":["mental","psychological","abstract"],"grammar":"副词 physically，搭配 physical health/evidence/environment"},{"word":"inspection","pos":"n.","phonetic":"/ɪnˈspekʃən/","cefr":"B2","meaning_zh":"检查；视察；审查","meaning_en":"the official examination of something","example":"Regular inspection of facilities ensures compliance with safety regulations.","example_zh":"定期检查设施确保符合安全法规。","synonyms":["examination","review","audit"],"antonyms":[],"grammar":"动词 inspect，搭配 under inspection, on inspection（经检查）"},{"word":"resources","pos":"n.","phonetic":"/rɪˈzɔːrsɪz/","cefr":"B1","meaning_zh":"资源；资金；资料","meaning_en":"stocks or supplies of materials, staff, or other assets","example":"Developing countries often lack the resources necessary for infrastructure development.","example_zh":"发展中国家往往缺乏基础设施发展所需的资源。","synonyms":["assets","supplies","means"],"antonyms":[],"grammar":"常用复数，搭配 natural/human/financial resources，resource（单数）指具体资源"},{"word":"sustainable","pos":"adj.","phonetic":"/səˈsteɪnəbl/","cefr":"B2","meaning_zh":"可持续的；可维持的","meaning_en":"able to continue without causing permanent damage to the environment","example":"Sustainable development requires balancing economic growth with environmental protection.","example_zh":"可持续发展需要在经济增长与环境保护之间取得平衡。","synonyms":["maintainable","viable","eco-friendly"],"antonyms":["unsustainable","destructive","short-term"],"grammar":"名词 sustainability，副词 sustainably，搭配 sustainable development/energy"},{"word":"justification","pos":"n.","phonetic":"/ˌdʒʌstɪfɪˈkeɪʃən/","cefr":"C1","meaning_zh":"理由；正当化；依据","meaning_en":"a reason or explanation for an action or decision","example":"The researcher provided clear justification for the chosen methodology.","example_zh":"研究人员为所选方法论提供了充分的理由。","synonyms":["reason","rationale","grounds"],"antonyms":[],"grammar":"动词 justify，搭配 justification for，in justification of"},{"word":"enable","pos":"v.","phonetic":"/ɪˈneɪbl/","cefr":"B2","meaning_zh":"使能够；使可能；启用","meaning_en":"to make it possible for someone to do something","example":"Technology enables researchers to process large datasets more efficiently.","example_zh":"技术使研究人员能够更有效地处理大型数据集。","synonyms":["allow","permit","facilitate"],"antonyms":["prevent","disable","hinder"],"grammar":"搭配 enable sb to do sth，不可说 enable sb do sth"},{"word":"design","pos":"n./v.","phonetic":"/dɪˈzaɪn/","cefr":"B1","meaning_zh":"设计；构思；方案","meaning_en":"a plan or drawing produced to show how something is to be made","example":"The experimental design must ensure that variables are properly controlled.","example_zh":"实验设计必须确保对变量进行适当控制。","synonyms":["plan","blueprint","structure"],"antonyms":[],"grammar":"搭配 design of/for，by design（有意地），research design"},{"word":"priority","pos":"n.","phonetic":"/praɪˈɒrɪti/","cefr":"B2","meaning_zh":"优先；重点；优先权","meaning_en":"something given special attention over others","example":"Environmental protection should be a top priority in national policy agendas.","example_zh":"环境保护应成为国家政策议程的首要任务。","synonyms":["precedence","preference","importance"],"antonyms":[],"grammar":"搭配 give priority to, top priority，形容词 prior"},{"word":"controversy","pos":"n.","phonetic":"/ˈkɒntrəvɜːrsi/","cefr":"B2","meaning_zh":"争议；争论；论战","meaning_en":"prolonged public disagreement or debate","example":"The study generated considerable controversy within the scientific community.","example_zh":"该研究在科学界引发了相当大的争议。","synonyms":["debate","dispute","disagreement"],"antonyms":["agreement","consensus","harmony"],"grammar":"形容词 controversial，搭配 stir up/spark controversy"},{"word":"ensure","pos":"v.","phonetic":"/ɪnˈʃʊər/","cefr":"B2","meaning_zh":"确保；保证","meaning_en":"to make certain that something happens or is the case","example":"Researchers must ensure that ethical guidelines are followed throughout the study.","example_zh":"研究人员必须确保在整个研究过程中遵循伦理准则。","synonyms":["guarantee","secure","make certain"],"antonyms":[],"grammar":"搭配 ensure that/sth，注意与 insure（投保）区别"},{"word":"induced","pos":"v./adj.","phonetic":"/ɪnˈdjuːst/","cefr":"C1","meaning_zh":"诱导的；引起的（induce的过去式）","meaning_en":"brought about or caused by something","example":"Stress-induced illnesses are increasingly common in modern workplaces.","example_zh":"压力引起的疾病在现代工作场所越来越普遍。","synonyms":["caused","triggered","stimulated"],"antonyms":["prevented","inhibited","suppressed"],"grammar":"动词 induce，搭配 induce sb to do，drug-induced, stress-induced"},{"word":"adults","pos":"n.","phonetic":"/ˈædʌlts/","cefr":"B1","meaning_zh":"成人；成年人","meaning_en":"people who are fully grown or developed","example":"The program focuses on literacy development among working adults.","example_zh":"该项目侧重于在职成年人的识字能力发展。","synonyms":["grown-ups","mature individuals"],"antonyms":["children","minors","adolescents"],"grammar":"单数 adult，可作名词或形容词，搭配 adult education/learning"},{"word":"concept","pos":"n.","phonetic":"/ˈkɒnsept/","cefr":"B2","meaning_zh":"概念；观念；构思","meaning_en":"an abstract idea or general principle","example":"The concept of social capital is central to understanding community development.","example_zh":"社会资本的概念是理解社区发展的核心。","synonyms":["idea","notion","principle"],"antonyms":[],"grammar":"搭配 the concept of，形容词 conceptual，动词 conceptualize"},{"word":"unified","pos":"adj.","phonetic":"/ˈjuːnɪfaɪd/","cefr":"B2","meaning_zh":"统一的；一体化的","meaning_en":"joined together into a single unit","example":"A unified theory must account for all observable phenomena consistently.","example_zh":"一个统一的理论必须一致地解释所有可观察到的现象。","synonyms":["united","integrated","consolidated"],"antonyms":["divided","fragmented","separate"],"grammar":"动词 unify，名词 unification，搭配 unified approach/system"},{"word":"imposed","pos":"v.","phonetic":"/ɪmˈpoʊzd/","cefr":"B2","meaning_zh":"强加的；施加的（impose的过去式）","meaning_en":"forced something to be accepted or followed","example":"Strict regulations were imposed on the industry following the environmental disaster.","example_zh":"环境灾难发生后，对该行业实施了严格法规。","synonyms":["enforced","implemented","established"],"antonyms":["removed","lifted","abolished"],"grammar":"搭配 impose sth on sb/sth，impose restrictions/taxes/sanctions"},{"word":"select","pos":"v./adj.","phonetic":"/sɪˈlekt/","cefr":"B1","meaning_zh":"选择；挑选；精选的","meaning_en":"to carefully choose from a range of options","example":"Participants were randomly selected from a pool of eligible volunteers.","example_zh":"参与者从合格志愿者中随机选取。","synonyms":["choose","pick","designate"],"antonyms":["reject","exclude","dismiss"],"grammar":"名词 selection，形容词 selective，搭配 select from"},{"word":"flexibility","pos":"n.","phonetic":"/ˌfleksɪˈbɪlɪti/","cefr":"B2","meaning_zh":"灵活性；弹性；适应性","meaning_en":"the ability to adapt to different conditions","example":"The new policy allows greater flexibility in how employees manage their working hours.","example_zh":"新政策允许员工在管理工作时间方面有更大的灵活性。","synonyms":["adaptability","versatility","pliability"],"antonyms":["rigidity","inflexibility","strictness"],"grammar":"形容词 flexible，搭配 flexibility in/of，build in flexibility"},{"word":"communication","pos":"n.","phonetic":"/kəˌmjuːnɪˈkeɪʃən/","cefr":"B1","meaning_zh":"沟通；通信；传播","meaning_en":"the exchange of information or ideas","example":"Effective communication between team members is essential for project success.","example_zh":"团队成员之间的有效沟通对于项目成功至关重要。","synonyms":["interaction","correspondence","dialogue"],"antonyms":[],"grammar":"动词 communicate，搭配 means of communication，mass communication"},{"word":"incorporated","pos":"v./adj.","phonetic":"/ɪnˈkɔːrpəreɪtɪd/","cefr":"C1","meaning_zh":"合并的；纳入的；注册成立的","meaning_en":"included as part of a larger whole","example":"Feedback from stakeholders was incorporated into the final version of the report.","example_zh":"利益相关者的反馈被纳入报告的最终版本。","synonyms":["integrated","included","merged"],"antonyms":["excluded","separated","omitted"],"grammar":"动词 incorporate，搭配 incorporate sth into sth，Inc.是 Incorporated 缩写"},{"word":"notwithstanding","pos":"prep./adv.","phonetic":"/ˌnɒtwɪθˈstændɪŋ/","cefr":"C1","meaning_zh":"尽管；虽然；然而","meaning_en":"despite; in spite of","example":"Notwithstanding the limitations, the study provides valuable insights into the topic.","example_zh":"尽管存在局限性，该研究仍对该主题提供了宝贵的见解。","synonyms":["despite","although","nevertheless"],"antonyms":[],"grammar":"正式用词，可置于名词前或句末，常见于法律和学术文本"},{"word":"transfer","pos":"n./v.","phonetic":"/ˈtrænsfɜːr/","cefr":"B1","meaning_zh":"转移；迁移；转让","meaning_en":"the movement of something from one place to another","example":"The transfer of technology from developed to developing nations requires careful management.","example_zh":"技术从发达国家向发展中国家转让需要谨慎管理。","synonyms":["movement","shift","relocation"],"antonyms":[],"grammar":"名词重音在前，动词重音在后（ˈtrænsfɜːr / trænsˈfɜːr），搭配 transfer to"},{"word":"commenced","pos":"v.","phonetic":"/kəˈmenst/","cefr":"C1","meaning_zh":"开始；着手（commence的过去式）","meaning_en":"began or started","example":"Data collection commenced after ethical approval was granted by the committee.","example_zh":"在委员会批准伦理申请后，数据收集工作开始进行。","synonyms":["began","started","initiated"],"antonyms":["concluded","finished","ended"],"grammar":"动词 commence，正式用法，名词 commencement，搭配 commence with"},{"word":"derived","pos":"v./adj.","phonetic":"/dɪˈraɪvd/","cefr":"B2","meaning_zh":"源自的；得到的（derive的过去式）","meaning_en":"obtained or developed from something else","example":"The data derived from the survey were analyzed using statistical software.","example_zh":"从调查中获得的数据使用统计软件进行了分析。","synonyms":["obtained","drawn","sourced"],"antonyms":[],"grammar":"搭配 derived from，动词 derive，名词 derivation"},{"word":"required","pos":"adj./v.","phonetic":"/rɪˈkwaɪərd/","cefr":"B1","meaning_zh":"必需的；要求的","meaning_en":"needed or necessary for a particular purpose","example":"All required documentation must be submitted before the application deadline.","example_zh":"所有必需文件必须在申请截止日期前提交。","synonyms":["necessary","mandatory","essential"],"antonyms":["optional","voluntary","unnecessary"],"grammar":"动词 require，搭配 require sb to do，be required to do"},{"word":"chart","pos":"n./v.","phonetic":"/tʃɑːrt/","cefr":"B1","meaning_zh":"图表；图解；绘制","meaning_en":"a visual representation of data or information","example":"The bar chart illustrates the changes in unemployment rates over the past decade.","example_zh":"柱状图说明了过去十年失业率的变化。","synonyms":["graph","diagram","table"],"antonyms":[],"grammar":"搭配 flow chart, pie chart, bar chart，动词 chart progress（记录进展）"},{"word":"create","pos":"v.","phonetic":"/kriˈeɪt/","cefr":"B1","meaning_zh":"创造；创建；引起","meaning_en":"to bring something into existence","example":"The new framework aims to create equal opportunities for all students.","example_zh":"新框架旨在为所有学生创造平等机会。","synonyms":["produce","generate","establish"],"antonyms":["destroy","eliminate","abolish"],"grammar":"名词 creation，形容词 creative，搭配 create opportunities/problems"},{"word":"consistent","pos":"adj.","phonetic":"/kənˈsɪstənt/","cefr":"B2","meaning_zh":"一致的；始终如一的；符合的","meaning_en":"acting in the same way over time or in agreement with something","example":"The findings are consistent with previous research on this subject.","example_zh":"这些发现与以前关于该主题的研究一致。","synonyms":["uniform","coherent","compatible"],"antonyms":["inconsistent","contradictory","variable"],"grammar":"搭配 consistent with，名词 consistency，副词 consistently"},{"word":"internal","pos":"adj.","phonetic":"/ɪnˈtɜːrnl/","cefr":"B2","meaning_zh":"内部的；国内的；内在的","meaning_en":"relating to the inside of something","example":"Internal factors such as motivation significantly affect learning outcomes.","example_zh":"内部因素如学习动机显著影响学习结果。","synonyms":["inner","interior","domestic"],"antonyms":["external","outside","foreign"],"grammar":"副词 internally，搭配 internal affairs/audit/review"},{"word":"visible","pos":"adj.","phonetic":"/ˈvɪzɪbl/","cefr":"B2","meaning_zh":"可见的；显而易见的","meaning_en":"able to be seen or noticed","example":"The effects of climate change are now visible in nearly every region of the world.","example_zh":"气候变化的影响现在在世界几乎每个地区都显而易见。","synonyms":["observable","apparent","evident"],"antonyms":["invisible","hidden","concealed"],"grammar":"副词 visibly，名词 visibility，搭配 clearly visible"},{"word":"global","pos":"adj.","phonetic":"/ˈɡloʊbl/","cefr":"B1","meaning_zh":"全球的；全局的","meaning_en":"relating to or encompassing the whole world","example":"Global cooperation is essential to address climate change effectively.","example_zh":"全球合作对于有效应对气候变化至关重要。","synonyms":["worldwide","international","universal"],"antonyms":["local","regional","national"],"grammar":"副词 globally，搭配 global economy/warming/scale"},{"word":"transition","pos":"n./v.","phonetic":"/trænˈzɪʃən/","cefr":"B2","meaning_zh":"过渡；转变；转换","meaning_en":"the process of changing from one state to another","example":"The transition from fossil fuels to renewable energy requires significant investment.","example_zh":"从化石燃料向可再生能源的过渡需要大量投资。","synonyms":["change","shift","transformation"],"antonyms":["stagnation","continuity","stability"],"grammar":"搭配 in transition，transition from A to B，形容词 transitional"},{"word":"constraints","pos":"n.","phonetic":"/kənˈstreɪnts/","cefr":"B2","meaning_zh":"限制；约束；制约因素","meaning_en":"limitations or restrictions on what can be done","example":"Budget constraints forced the team to reduce the scope of their research project.","example_zh":"预算限制迫使团队缩小了研究项目的范围。","synonyms":["restrictions","limitations","boundaries"],"antonyms":["freedoms","permissions","opportunities"],"grammar":"单数 constraint，动词 constrain，搭配 under constraints, financial/time constraints"},{"word":"restraints","pos":"n.","phonetic":"/rɪˈstreɪnts/","cefr":"C1","meaning_zh":"限制；抑制；管束","meaning_en":"measures that limit or control something","example":"The new legislation placed restraints on the power of corporate monopolies.","example_zh":"新法规对企业垄断权力施加了限制。","synonyms":["controls","restrictions","curbs"],"antonyms":["freedoms","liberties","permissions"],"grammar":"单数 restraint，动词 restrain，搭配 place restraints on，trade restraints"},{"word":"prime","pos":"adj./n./v.","phonetic":"/praɪm/","cefr":"B2","meaning_zh":"首要的；最重要的；质数","meaning_en":"of the greatest importance or quality","example":"Access to clean water is a prime concern in many developing regions.","example_zh":"获得清洁水是许多发展中地区的首要问题。","synonyms":["main","primary","chief"],"antonyms":["secondary","minor","subordinate"],"grammar":"搭配 prime example/minister/concern，in one's prime（全盛期）"},{"word":"migration","pos":"n.","phonetic":"/maɪˈɡreɪʃən/","cefr":"B2","meaning_zh":"迁移；移民；迁徙","meaning_en":"movement from one region or country to another","example":"Rural-to-urban migration has accelerated the growth of cities in developing countries.","example_zh":"农村向城市的移民加速了发展中国家城市的增长。","synonyms":["movement","relocation","emigration"],"antonyms":["settlement","immigration","staying"],"grammar":"动词 migrate，名词 migrant，搭配 mass migration, seasonal migration"},{"word":"mature","pos":"adj./v.","phonetic":"/məˈtʃʊər/","cefr":"B2","meaning_zh":"成熟的；成年的；发展完全的","meaning_en":"fully developed physically or mentally","example":"A mature democracy requires strong institutions and an informed citizenry.","example_zh":"成熟的民主制度需要强有力的机构和知情的公民。","synonyms":["developed","grown","seasoned"],"antonyms":["immature","undeveloped","juvenile"],"grammar":"动词 mature（成熟），名词 maturity，搭配 mature market/economy"},{"word":"differentiation","pos":"n.","phonetic":"/ˌdɪfərənʃiˈeɪʃən/","cefr":"C1","meaning_zh":"区分；差异化；分化","meaning_en":"the process of distinguishing between things","example":"Product differentiation is a key strategy in competitive market environments.","example_zh":"产品差异化是竞争性市场环境中的关键策略。","synonyms":["distinction","variation","diversity"],"antonyms":["uniformity","standardization","sameness"],"grammar":"动词 differentiate，搭配 differentiation between/of，market differentiation"},{"word":"preliminary","pos":"adj./n.","phonetic":"/prɪˈlɪmɪneri/","cefr":"B2","meaning_zh":"初步的；预备的；初赛","meaning_en":"preceding or preparing for the main part","example":"Preliminary findings suggest a strong correlation between diet and cognitive performance.","example_zh":"初步研究结果表明饮食与认知表现之间存在强相关性。","synonyms":["initial","preparatory","introductory"],"antonyms":["final","conclusive","definitive"],"grammar":"搭配 preliminary results/investigation/stage，复数名词 preliminaries"},{"word":"instance","pos":"n.","phonetic":"/ˈɪnstəns/","cefr":"B2","meaning_zh":"例子；实例；情况","meaning_en":"a particular case or example of something","example":"In this instance, the data supports the hypothesis proposed by the researchers.","example_zh":"在这种情况下，数据支持研究人员提出的假设。","synonyms":["example","case","occurrence"],"antonyms":[],"grammar":"搭配 for instance（例如），in this instance，in the first instance（首先）"},{"word":"policy","pos":"n.","phonetic":"/ˈpɒlɪsi/","cefr":"B1","meaning_zh":"政策；方针；保险单","meaning_en":"a course of action adopted by a government or organization","example":"The government introduced a new policy to reduce carbon emissions by 2030.","example_zh":"政府推出了一项新政策，以在2030年前减少碳排放。","synonyms":["strategy","plan","guideline"],"antonyms":[],"grammar":"搭配 public/government/foreign policy，implement a policy"},{"word":"ethical","pos":"adj.","phonetic":"/ˈeθɪkl/","cefr":"B2","meaning_zh":"道德的；伦理的","meaning_en":"relating to moral principles or standards of conduct","example":"All research involving human subjects must meet strict ethical requirements.","example_zh":"所有涉及人类受试者的研究必须满足严格的伦理要求。","synonyms":["moral","principled","righteous"],"antonyms":["unethical","immoral","corrupt"],"grammar":"副词 ethically，名词 ethics，搭配 ethical issues/standards/committee"},{"word":"isolated","pos":"adj.","phonetic":"/ˈaɪsəleɪtɪd/","cefr":"B2","meaning_zh":"孤立的；隔离的；偏远的","meaning_en":"separated from others or remote","example":"This is not an isolated case; many similar incidents have been documented.","example_zh":"这不是孤立案例；已记录了许多类似事件。","synonyms":["remote","detached","secluded"],"antonyms":["connected","integrated","central"],"grammar":"动词 isolate，名词 isolation，搭配 isolated incident/community"},{"word":"deny","pos":"v.","phonetic":"/dɪˈnaɪ/","cefr":"B2","meaning_zh":"否认；拒绝；剥夺","meaning_en":"to say that something is not true or refuse to give something","example":"The government denied any involvement in the controversial financial transaction.","example_zh":"政府否认参与了这笔有争议的金融交易。","synonyms":["refute","reject","contradict"],"antonyms":["admit","acknowledge","confirm"],"grammar":"搭配 deny doing sth（不接不定式），deny sb sth（剥夺某人某物）"},{"word":"incentive","pos":"n.","phonetic":"/ɪnˈsentɪv/","cefr":"B2","meaning_zh":"激励；动机；奖励","meaning_en":"something that motivates or encourages action","example":"Tax incentives were introduced to encourage businesses to adopt green technologies.","example_zh":"引入税收激励措施以鼓励企业采用绿色技术。","synonyms":["motivation","encouragement","reward"],"antonyms":["disincentive","deterrent","discouragement"],"grammar":"搭配 incentive to do sth，provide/offer incentives，financial incentive"},{"word":"constant","pos":"adj./n.","phonetic":"/ˈkɒnstənt/","cefr":"B2","meaning_zh":"持续的；不变的；常数","meaning_en":"occurring continuously without change","example":"Constant monitoring of environmental data is essential for climate research.","example_zh":"对环境数据的持续监测对于气候研究至关重要。","synonyms":["continuous","steady","persistent"],"antonyms":["variable","intermittent","changing"],"grammar":"副词 constantly，名词（数学）constant，搭配 constant change/pressure"},{"word":"positive","pos":"adj.","phonetic":"/ˈpɒzɪtɪv/","cefr":"B1","meaning_zh":"积极的；肯定的；正面的","meaning_en":"good, constructive, or showing agreement","example":"The intervention had a positive impact on students' academic performance.","example_zh":"该干预对学生的学业表现产生了积极影响。","synonyms":["constructive","favorable","beneficial"],"antonyms":["negative","adverse","harmful"],"grammar":"副词 positively，名词 positivity，搭配 positive outcome/attitude/effect"},{"word":"indicate","pos":"v.","phonetic":"/ˈɪndɪkeɪt/","cefr":"B2","meaning_zh":"表明；指出；显示","meaning_en":"to show or suggest that something exists or is true","example":"The data indicate a significant rise in global temperatures over the past century.","example_zh":"数据表明过去一个世纪全球气温显著上升。","synonyms":["show","suggest","demonstrate"],"antonyms":["conceal","hide","obscure"],"grammar":"名词 indication，形容词 indicative，搭配 indicate that/indicate sth"},{"word":"duration","pos":"n.","phonetic":"/djʊˈreɪʃən/","cefr":"B2","meaning_zh":"持续时间；期间","meaning_en":"the length of time something lasts","example":"The duration of the experiment was six months, involving 200 participants.","example_zh":"实验持续时间为六个月，涉及200名参与者。","synonyms":["length","period","span"],"antonyms":[],"grammar":"搭配 for the duration of，of short/long duration，duration of treatment"},{"word":"inherent","pos":"adj.","phonetic":"/ɪnˈhɪərənt/","cefr":"C1","meaning_zh":"固有的；内在的；天生的","meaning_en":"existing as a natural or permanent part of something","example":"There are inherent risks in any large-scale scientific experiment.","example_zh":"任何大规模科学实验都存在固有风险。","synonyms":["intrinsic","fundamental","built-in"],"antonyms":["external","acquired","incidental"],"grammar":"副词 inherently，搭配 inherent in sth，inherent risk/value"},{"word":"inhibition","pos":"n.","phonetic":"/ˌɪnhɪˈbɪʃən/","cefr":"C1","meaning_zh":"抑制；压抑；障碍","meaning_en":"a feeling that prevents one from acting naturally","example":"Social inhibition can prevent individuals from participating in group discussions.","example_zh":"社交抑制可能阻止个人参与小组讨论。","synonyms":["restraint","suppression","barrier"],"antonyms":["freedom","expression","spontaneity"],"grammar":"动词 inhibit，形容词 inhibited，搭配 inhibition of，without inhibition"},{"word":"domestic","pos":"adj.","phonetic":"/dəˈmestɪk/","cefr":"B2","meaning_zh":"国内的；家庭的；驯养的","meaning_en":"relating to the home, family, or a particular country","example":"Domestic policies must be balanced with international obligations and agreements.","example_zh":"国内政策必须与国际义务和协议保持平衡。","synonyms":["internal","national","household"],"antonyms":["foreign","international","external"],"grammar":"副词 domestically，搭配 domestic policy/violence/market"},{"word":"minorities","pos":"n.","phonetic":"/maɪˈnɒrɪtɪz/","cefr":"B2","meaning_zh":"少数群体；少数民族","meaning_en":"groups that are smaller in number than the main group","example":"The policy aims to protect the rights of ethnic and linguistic minorities.","example_zh":"该政策旨在保护少数民族和语言少数群体的权利。","synonyms":["minority groups","marginalized groups"],"antonyms":["majority","dominant group"],"grammar":"单数 minority，搭配 ethnic minorities，minority rights/group"},{"word":"prior","pos":"adj./adv.","phonetic":"/ˈpraɪər/","cefr":"B2","meaning_zh":"先前的；优先的；在前","meaning_en":"existing or coming before in time or order","example":"Prior research on this topic has established several key theoretical frameworks.","example_zh":"此前关于该主题的研究已建立了几个关键理论框架。","synonyms":["previous","earlier","preceding"],"antonyms":["subsequent","following","later"],"grammar":"搭配 prior to（在…之前），prior knowledge/experience，no prior"},{"word": pproach","procedure","technique"],"antonyms":[],"grammar":"形容词 methodical，搭配 research method，scientific method，by this method"},{"word":"pursue","pos":"v.","phonetic":"/pərˈsjuː/","cefr":"B2","meaning_zh":"追求；从事；继续","meaning_en":"to follow or engage in something over time","example":"Students are encouraged to pursue independent research projects in their final year.","example_zh":"鼓励学生在最后一年从事独立研究项目。","synonyms":["seek","follow","undertake"],"antonyms":["abandon","give up","neglect"],"grammar":"名词 pursuit，搭配 pursue a goal/career/policy"},{"word":"display","pos":"n./v.","phonetic":"/dɪˈspleɪ/","cefr":"B1","meaning_zh":"展示；显示；陈列","meaning_en":"to show or exhibit something clearly","example":"The graph displays the relationship between variables over a ten-year period.","example_zh":"该图表显示了十年期间变量之间的关系。","synonyms":["show","present","exhibit"],"antonyms":["conceal","hide"],"grammar":"搭配 on display，display data/information，visual display"},{"word":"theory","pos":"n.","phonetic":"/ˈθɪəri/","cefr":"B2","meaning_zh":"理论；学说；见解","meaning_en":"a system of ideas intended to explain something","example":"Darwin's theory of evolution remains one of the most influential in modern science.","example_zh":"达尔文的进化论仍然是现代科学中最具影响力的理论之一。","synonyms":["hypothesis","framework","model"],"antonyms":["practice","fact","reality"],"grammar":"搭配 in theory（理论上），theoretical，theorize，learning theory"},{"word":"network","pos":"n./v.","phonetic":"/ˈnetwɜːrk/","cefr":"B1","meaning_zh":"网络；关系网；联系","meaning_en":"a system of connected people, things, or organizations","example":"A strong professional network is essential for career advancement in academia.","example_zh":"强大的专业网络对于学术界的职业发展至关重要。","synonyms":["system","web","grid"],"antonyms":[],"grammar":"动词 network（建立人脉），搭配 social/professional/computer network"},{"word":"undertaken","pos":"v.","phonetic":"/ˌʌndərˈteɪkən/","cefr":"B2","meaning_zh":"承担的；从事的（undertake的过去分词）","meaning_en":"taken on or carried out as a task","example":"Several longitudinal studies have been undertaken to examine population health trends.","example_zh":"已开展了多项纵向研究以检视人口健康趋势。","synonyms":["carried out","conducted","performed"],"antonyms":["abandoned","neglected","avoided"],"grammar":"动词原形 undertake，搭配 undertake a study/task/responsibility"},{"word":"undergo","pos":"v.","phonetic":"/ˌʌndərˈɡoʊ/","cefr":"B2","meaning_zh":"经历；经受；接受","meaning_en":"to experience or be subjected to something","example":"The education system must undergo fundamental reform to meet 21st-century demands.","example_zh":"教育系统必须进行根本性改革以满足21世纪的需求。","synonyms":["experience","endure","sustain"],"antonyms":[],"grammar":"过去式 underwent，过去分词 undergone，搭配 undergo change/surgery/training"},{"word":"welfare","pos":"n.","phonetic":"/ˈwelfeər/","cefr":"B2","meaning_zh":"福利；幸福；福祉","meaning_en":"the health, happiness, and prosperity of a person or group","example":"The government has a responsibility to protect the welfare of its most vulnerable citizens.","example_zh":"政府有责任保护其最脆弱公民的福利。","synonyms":["wellbeing","benefit","prosperity"],"antonyms":["harm","neglect","deprivation"],"grammar":"搭配 social welfare，child welfare，welfare state（福利国家）"},{"word":"clause","pos":"n.","phonetic":"/klɔːz/","cefr":"B2","meaning_zh":"条款；从句；子句","meaning_en":"a section in a legal document or a grammatical unit","example":"The contract contained a clause requiring arbitration in case of disputes.","example_zh":"合同包含一项条款，要求在发生争议时进行仲裁。","synonyms":["provision","section","term"],"antonyms":[],"grammar":"法律文件中的条款，或语法中的从句（main clause/subordinate clause）"},{"word":"revealed","pos":"v.","phonetic":"/rɪˈviːld/","cefr":"B2","meaning_zh":"揭示；显示；透露（reveal的过去式）","meaning_en":"made known something that was hidden or unknown","example":"The investigation revealed serious flaws in the company's financial reporting.","example_zh":"调查揭示了该公司财务报告中的严重缺陷。","synonyms":["disclosed","uncovered","exposed"],"antonyms":["concealed","hidden","suppressed"],"grammar":"动词 reveal，搭配 reveal that，reveal sth to sb"},{"word":"resident","po s to complete the degree program.","example_zh":"学生必须获得至少120个学分才能完成学位课程。","synonyms":["recognition","acknowledgment","praise"],"antonyms":["blame","discredit","debit"],"grammar":"搭配 give credit to，credit for，take credit for，credit card"},{"word":"concentration","pos":"n.","phonetic":"/ˌkɒnsənˈtreɪʃən/","cefr":"B2","meaning_zh":"浓度；集中；专注","meaning_en":"the amount of a substance in a solution, or focused attention","example":"High concentrations of pollutants were detected in the river water samples.","example_zh":"在河水样本中检测到高浓度的污染物。","synonyms":["density","focus","intensity"],"antonyms":["distraction","dilution","dispersion"],"grammar":"动词 concentrate，搭配 concentration of，concentration on（专注于）"},{"word":"amendment","pos":"n.","phonetic":"/əˈmendmənt/","cefr":"B2","meaning_zh":"修正案；修订；改正","meaning_en":"a change or addition made to a law or document","example":"The constitutional amendment extended voting rights to a broader segment of the population.","example_zh":"宪法修正案将投票权扩大到更广泛的人群。","synonyms":["revision","modification","alteration"],"antonyms":[],"grammar":"动词 amend，搭配 constitutional amendment，make an amendment to"},{"word":"scheme","pos":"n./v.","phonetic":"/skiːm/","cefr":"B2","meaning_zh":"计划；方案；阴谋","meaning_en":"a plan or system for achieving something","example":"The government launched a new scheme to support small business development.","example_zh":"政府推出了一项新方案来支持小企业发展。","synonyms":["plan","program","project"],"antonyms":[],"grammar":"动词 scheme 含贬义（密谋），名词中性，搭配 pension scheme, color scheme"},{"word":"aggregate","pos":"adj./n./v.","phonetic":"/ˈæɡrɪɡət/","cefr":"C1","meaning_zh":"总计的；集合体；汇总","meaning_en":"formed by combining several elements into a whole","example":"The aggregate data from multiple studies revealed a consistent pattern.","example_zh":"来自多项研究的汇总数据揭示了一致的规律。","synonyms":["total","combined","collective"],"antonyms":["individual","separate","partial"],"grammar":"名词/形容词重音在前，动词重音在后，搭配 in the aggregate（总体上）"},{"word":"intelligence","pos":"n.","phonetic":"/ɪnˈtelɪdʒəns/","cefr":"B2","meaning_zh":"智力；情报；智慧","meaning_en":"the ability to acquire and use knowledge and skills","example":"Artificial intelligence is transforming the way data is analyzed in research.","example_zh":"人工智能正在改变研究中数据分析的方式。","synonyms":["intellect","reasoning","cognition"],"antonyms":["ignorance","stupidity"],"grammar":"形容词 intelligent，搭配 artificial intelligence, emotional intelligence"},{"word":"marginal","pos":"adj.","phonetic":"/ˈmɑːrdʒɪnl/","cefr":"C1","meaning_zh":"边缘的；微小的；边际的","meaning_en":"relating to a margin; minor or not central","example":"The improvement in test scores was marginal and not statistically significant.","example_zh":"测试分数的提高是微小的，在统计上并不显著。","synonyms":["minor","slight","peripheral"],"antonyms":["significant","central","major"],"grammar":"副词 marginally，名词 margin，搭配 marginal cost/benefit/group"},{"word":"levy","pos":"n./v.","phonetic":"/ˈlevi/","cefr":"C1","meaning_zh":"征税；征收；税款","meaning_en":"to impose a tax or charge","example":"The government imposed a carbon levy on industries with high emissions.","example_zh":"政府对高排放行业征收碳税。","synonyms":["tax","charge","impose"],"antonyms":["exempt","waive","refund"],"grammar":"搭配 levy a tax on，capital levy，training levy"},{"word":"income","pos":"n.","phonetic":"/ˈɪnkʌm/","cefr":"B1","meaning_zh":"收入；所得；收益","meaning_en":"money received regularly from work or investments","example":"The study examined the relationship between household income and educational attainment.","example_zh":"该研究考察了家庭收入与教育程度之间的关系。","synonyms":["earnings","revenue","salary"],"antonyms":["expenditure","spending","outgoings"],"grammar":"搭配 disposable income，income tax，low/high-income"},{"word":"considerable","pos":"adj.","phonetic":"/kənˈsɪdərəbl/","cefr":"B2","meaning_zh":"相当大的；相当多的；可观的","meaning_en":"notably large in size, amount, or degree","example":"Considerable resources are required to implement large-scale educational reforms.","example_zh":"实施大规模教育改革需要相当多的资源。","synonyms":["substantial","significant","no cades due to human activity.","example_zh":"由于人类活动，近几十年来全球气温持续上升。","synonyms":["periods","years","eras"],"antonyms":[],"grammar":"单数 decade，搭配 over the past decades，for decades，in recent decades"},{"word":"publication","pos":"n.","phonetic":"/ˌpʌblɪˈkeɪʃən/","cefr":"B2","meaning_zh":"出版；发表；出版物","meaning_en":"the act of making something available to the public","example":"The publication of the study generated widespread interest in the scientific community.","example_zh":"该研究的发表在科学界引发了广泛兴趣。","synonyms":["release","issuance","printing"],"antonyms":[],"grammar":"动词 publish，搭配 academic publication，publication date"},{"word":"compiled","pos":"v.","phonetic":"/kəmˈpaɪld/","cefr":"B2","meaning_zh":"编辑的；汇编的（compile的过去式）","meaning_en":"collected and assembled information from different sources","example":"The report was compiled from data gathered across twelve research institutions.","example_zh":"该报告由来自十二个研究机构收集的数据汇编而成。","synonyms":["assembled","collected","gathered"],"antonyms":["scattered","dispersed","distributed"],"grammar":"动词 compile，名词 compilation，搭配 compile a report/list/database"},{"word":"task","pos":"n.","phonetic":"/tɑːsk/","cefr":"B1","meaning_zh":"任务；工作；作业","meaning_en":"a piece of work to be done","example":"Students were assigned a research task requiring them to analyze primary sources.","example_zh":"学生被分配了一项研究任务，要求他们分析原始资料。","synonyms":["assignment","job","duty"],"antonyms":[],"grammar":"搭配 carry out/complete a task，task force（专责小组），multitask"},{"word":"hypothesis","pos":"n.","phonetic":"/haɪˈpɒθəsɪs/","cefr":"B2","meaning_zh":"假设；假说；猜测","meaning_en":"a proposed explanation used as a starting point for investigation","example":"The hypothesis was tested through a series of controlled laboratory experiments.","example_zh":"该假设通过一系列受控实验室实验进行了验证。","synonyms":["theory","assumption","proposition"],"antonyms":["conclusion","fact","proof"],"grammar":"复数 hypotheses，动词 hypothesize，搭配 test/support/reject a hypothesis"},{"word":"posed","pos":"v.","phonetic":"/poʊzd/","cefr":"B2","meaning_zh":"提出；造成；摆姿势（pose的过去式）","meaning_en":"presented or created a problem or question","example":"Rapid urbanization has posed significant challenges for city planners worldwide.","example_zh":"快速城市化给世界各地的城市规划者带来了重大挑战。","synonyms":["presented","created","raised"],"antonyms":["solved","resolved","answered"],"grammar":"搭配 pose a threat/challenge/question/risk"},{"word":"concurrent","pos":"adj.","phonetic":"/kənˈkɜːrənt/","cefr":"C1","meaning_zh":"同时发生的；并发的","meaning_en":"happening at the same time","example":"The two concurrent studies reached similar conclusions independently.","example_zh":"这两项同时进行的研究独立地得出了相似的结论。","synonyms":["simultaneous","parallel","coinciding"],"antonyms":["sequential","consecutive","successive"],"grammar":"副词 concurrently，搭配 concurrent with，run concurrently"},{"word":"illustrated","pos":"v./adj.","phonetic":"/ˈɪləstreɪtɪd/","cefr":"B1","meaning_zh":"说明的；有插图的（illustrate的过去式）","meaning_en":"made clear by using examples or pictures","example":"The data illustrated in Figure 3 clearly shows the upward trend in literacy rates.","example_zh":"图3所示的数据清楚地显示了识字率的上升趋势。","synonyms":["demonstrated","depicted","shown"],"antonyms":[],"grammar":"动词 illustrate，名词 illustration，搭配 illustrate a point/concept"},{"word":"estimate","pos":"n./v.","phonetic":"/ˈestɪmət/","cefr":"B2","meaning_zh":"估计；估算；评估","meaning_en":"an approximate calculation or judgment","example":"Researchers estimate that the global population will reach ten billion by 2050.","example_zh":"研究人员估计，到2050年全球人口将达到100亿。","synonyms":["calculate","approximate","assess"],"antonyms":[],"grammar":"名词重音在前，动词重音可在后，搭配 rough estimate，estimate that"},{"word":"advocate","pos":"n./v.","phonetic":"/ˈædvəkət/","cefr":"B2","meaning_zh":"倡导者；支持者；倡导","meaning_en":"to publicly support or recommend a cause","example":"Many researchers advocate for greater transparency in the peer review process.","example_zh":"许多研究人员倡导同行评审过程中更大的透明度。","synonyms":["support","promote","champion"],"antonyms":["oppose signments must be submitted through the online portal before the deadline.","example_zh":"所有作业必须在截止日期前通过在线门户提交。","synonyms":["presented","filed","handed in"],"antonyms":["withheld","retained","refused"],"grammar":"动词 submit，名词 submission，搭配 submit to，submit for review"},{"word":"financial","pos":"adj.","phonetic":"/faɪˈnænʃl/","cefr":"B2","meaning_zh":"金融的；财务的；财政的","meaning_en":"relating to money and the management of funds","example":"The financial crisis of 2008 had lasting effects on global economic systems.","example_zh":"2008年金融危机对全球经济体系产生了持久影响。","synonyms":["monetary","fiscal","economic"],"antonyms":[],"grammar":"副词 financially，搭配 financial aid/crisis/support/institution"},{"word":"corresponding","pos":"adj.","phonetic":"/ˌkɒrɪˈspɒndɪŋ/","cefr":"B2","meaning_zh":"相应的；对应的；通信的","meaning_en":"related or matching to something else","example":"Each variable was paired with a corresponding control to ensure experimental validity.","example_zh":"每个变量都与相应的对照组配对，以确保实验有效性。","synonyms":["matching","equivalent","related"],"antonyms":["unrelated","different","contrasting"],"grammar":"副词 correspondingly，动词 correspond，搭配 corresponding to/with"},{"word":"reliance","pos":"n.","phonetic":"/rɪˈlaɪəns/","cefr":"C1","meaning_zh":"依赖；依靠；信任","meaning_en":"dependence on or trust in someone or something","example":"Over-reliance on a single data source can compromise the validity of research findings.","example_zh":"过度依赖单一数据来源可能会影响研究结果的有效性。","synonyms":["dependence","trust","confidence"],"antonyms":["independence","self-sufficiency","autonomy"],"grammar":"动词 rely，形容词 reliant，搭配 reliance on，heavy reliance"},{"word":"attached","pos":"adj./v.","phonetic":"/əˈtætʃt/","cefr":"B1","meaning_zh":"附带的；依附的；喜爱的","meaning_en":"joined or connected to something","example":"Please review the attached document for the full list of research references.","example_zh":"请查阅附件文件以获取完整的研究参考文献列表。","synonyms":["connected","appended","enclosed"],"antonyms":["detached","separated","removed"],"grammar":"动词 attach，名词 attachment，搭配 attached to，become attached to"},{"word":"initial","pos":"adj.","phonetic":"/ɪˈnɪʃl/","cefr":"B2","meaning_zh":"初始的；最初的；首字母","meaning_en":"existing or occurring at the beginning","example":"Initial results were promising, though further testing was required for confirmation.","example_zh":"初步结果令人鼓舞，但需要进一步测试以确认。","synonyms":["first","early","preliminary"],"antonyms":["final","last","subsequent"],"grammar":"副词 initially，搭配 initial stage/response/findings"},{"word":"recovery","pos":"n.","phonetic":"/rɪˈkʌvəri/","cefr":"B2","meaning_zh":"恢复；复苏；康复","meaning_en":"the process of returning to a normal state","example":"Economic recovery following the pandemic was uneven across different sectors.","example_zh":"疫情后的经济复苏在不同部门之间不均衡。","synonyms":["recuperation","restoration","revival"],"antonyms":["decline","deterioration","collapse"],"grammar":"动词 recover，搭配 economic recovery，recovery from，on the road to recovery"},{"word":"region","pos":"n.","phonetic":"/ˈriːdʒən/","cefr":"B1","meaning_zh":"地区；区域；部位","meaning_en":"a large area of land with specific characteristics","example":"The northern region of the country experiences significantly colder winters.","example_zh":"该国北部地区冬季明显更寒冷。","synonyms":["area","zone","district"],"antonyms":[],"grammar":"形容词 regional，副词 regionally，搭配 in the region of（大约）"},{"word":"currency","pos":"n.","phonetic":"/ˈkɜːrənsi/","cefr":"B2","meaning_zh":"货币；通货；流行","meaning_en":"a system of money used in a particular country","example":"Exchange rate fluctuations in currency markets affect international trade volumes.","example_zh":"货币市场汇率波动影响国际贸易量。","synonyms":["money","tender","coinage"],"antonyms":[],"grammar":"搭配 foreign currency，currency exchange，gain currency（流行起来）"},{"word":"strategies","pos":"n.","phonetic":"/ˈstrætɪdʒɪz/","cefr":"B2","meaning_zh":"策略；战略；方法","meaning_en":"plans designed to achieve long-term goals","example":"Effective coping strategies are essential for managing academic stress.","example_zh":"有效的应对策略对于管理学业压力至关重要 B2","meaning_zh":"放弃；遗弃；抛弃","meaning_en":"to leave or give up something completely","example":"Scientists rarely abandon a theory without sufficient contradictory evidence.","example_zh":"科学家们很少在没有足够相反证据的情况下放弃一种理论。","synonyms":["desert","relinquish","discard"],"antonyms":["maintain","keep","pursue"],"grammar":"名词 abandonment，搭配 abandon a plan/hope/idea，abandon ship"},{"word":"primary","pos":"adj.","phonetic":"/ˈpraɪmeri/","cefr":"B1","meaning_zh":"主要的；初级的；首要的","meaning_en":"of chief importance; first in order","example":"The primary aim of the research was to identify risk factors for cardiovascular disease.","example_zh":"该研究的主要目的是识别心血管疾病的风险因素。","synonyms":["main","chief","principal"],"antonyms":["secondary","minor","supplementary"],"grammar":"副词 primarily，搭配 primary source/goal/concern，primary school"},{"word":"analogous","pos":"adj.","phonetic":"/əˈnæləɡəs/","cefr":"C1","meaning_zh":"类似的；相似的；可比较的","meaning_en":"similar in some ways to another thing","example":"The structure of DNA is analogous to a twisted ladder with rungs made of base pairs.","example_zh":"DNA的结构类似于一个扭曲的梯子，横档由碱基对组成。","synonyms":["similar","comparable","parallel"],"antonyms":["different","dissimilar","contrasting"],"grammar":"搭配 analogous to，正式用语，名词 analogy"},{"word":"contradiction","pos":"n.","phonetic":"/ˌkɒntrəˈdɪkʃən/","cefr":"B2","meaning_zh":"矛盾；自相矛盾；反驳","meaning_en":"a combination of statements that are opposed to one another","example":"There is an apparent contradiction between the two datasets that requires further analysis.","example_zh":"两个数据集之间存在明显矛盾，需要进一步分析。","synonyms":["inconsistency","conflict","paradox"],"antonyms":["agreement","consistency","harmony"],"grammar":"动词 contradict，形容词 contradictory，搭配 contradiction between/in"},{"word":"consent","pos":"n./v.","phonetic":"/kənˈsent/","cefr":"B2","meaning_zh":"同意；准许；知情同意","meaning_en":"agreement or permission for something to happen","example":"All participants must provide informed consent before taking part in the study.","example_zh":"所有参与者在参与研究前必须提供知情同意。","synonyms":["agreement","approval","permission"],"antonyms":["refusal","denial","objection"],"grammar":"搭配 give/obtain consent，informed consent，consent to sth"},{"word":"chemical","pos":"adj./n.","phonetic":"/ˈkemɪkl/","cefr":"B1","meaning_zh":"化学的；化学品；化学物质","meaning_en":"relating to chemistry or chemicals","example":"Chemical pollutants in groundwater pose serious risks to public health.","example_zh":"地下水中的化学污染物对公众健康构成严重风险。","synonyms":["synthetic","compound","substance"],"antonyms":["natural","organic"],"grammar":"副词 chemically，名词 chemistry，搭配 chemical reaction/compound/waste"},{"word":"range","pos":"n./v.","phonetic":"/reɪndʒ/","cefr":"B1","meaning_zh":"范围；系列；幅度","meaning_en":"the area between two limits; a variety of things","example":"The study covered a wide range of topics related to urban development.","example_zh":"该研究涵盖了与城市发展相关的广泛议题。","synonyms":["scope","variety","spectrum"],"antonyms":[],"grammar":"搭配 a range of，range from A to B，within range，price range"},{"word":"volume","pos":"n.","phonetic":"/ˈvɒljuːm/","cefr":"B2","meaning_zh":"体积；容量；音量；卷","meaning_en":"the amount of space something takes up, or a large quantity","example":"The volume of data generated by modern research requires sophisticated analytical tools.","example_zh":"现代研究产生的数据量需要复杂的分析工具。","synonyms":["quantity","amount","bulk"],"antonyms":[],"grammar":"搭配 volume of trade/data，high volume，volume control"},{"word":"odd","pos":"adj.","phonetic":"/ɒd/","cefr":"B1","meaning_zh":"奇怪的；单数的；零散的","meaning_en":"unusual or different from what is expected","example":"It is odd that the control group showed greater improvement than the experimental group.","example_zh":"奇怪的是，对照组的改善程度大于实验组。","synonyms":["strange","unusual","peculiar"],"antonyms":["normal","typical","even"],"grammar":"搭配 odd numbers（奇数），odds（概率），at odds with（与…相矛盾）"},{"word":"gender","pos":"n.","phonetic":"/ˈdʒendər/","cefr":"B2","meaning_zh":"性别；社会性别","meaning_en":"the social and cultural roles associated with
