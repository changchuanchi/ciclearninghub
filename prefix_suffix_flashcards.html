<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>字首・字根・字尾 卡片</title>
<style>
:root{
  --prefix:#1d4ed8; --root:#0a7d52; --suffix:#6d28d9; --em:#e00000;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:#fff;color:#000;overscroll-behavior:none;
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",system-ui,sans-serif;line-height:1.55;font-size:16px}
.app{max-width:560px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;background:#fff}

/* top bar */
.top{flex:0 0 auto;background:#fff;color:#000;padding:10px 12px 8px;border-bottom:2px solid #000}
.top .r1{display:flex;align-items:center;gap:8px}
.top h1{margin:0;font-size:16px;font-weight:700;flex:1;color:#000}
.prog{font-size:14px;color:#000;font-weight:700;font-variant-numeric:tabular-nums}
.chips{display:flex;gap:6px;margin-top:8px}
.chip{flex:1;text-align:center;padding:8px 0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
  background:#fff;color:#000;border:2px solid #000;transition:.12s}
.chip.on{background:var(--em);border-color:var(--em);color:#fff}
.srch{margin-top:8px;display:none}
.srch.show{display:block}
#q{width:100%;padding:10px 12px;border-radius:8px;border:2px solid #000;background:#fff;color:#000;font-size:15px;outline:none}
.tools{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:13px;color:#000;font-weight:600}
.tools label{display:flex;align-items:center;gap:5px;cursor:pointer}
.iconbtn{margin-left:auto;background:#fff;border:2px solid #000;color:#000;border-radius:8px;
  padding:6px 11px;font-size:13px;font-weight:600;cursor:pointer}

/* card area */
.stage{flex:1 1 auto;position:relative;overflow:hidden;display:flex;padding:12px}
.card{background:#fff;border:2px solid #000;border-radius:16px;width:100%;
  padding:16px 16px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:in .2s ease}
@keyframes in{from{opacity:0;transform:translateX(var(--dir,24px))}to{opacity:1;transform:none}}
.chead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:12px;font-weight:700;padding:3px 10px;border-radius:6px;color:#fff}
.p-prefix{background:var(--prefix)} .p-root{background:var(--root)} .p-suffix{background:var(--suffix)}
.num{font-size:13px;color:#000;font-weight:700;font-variant-numeric:tabular-nums}
.badge{font-size:11px;padding:2px 9px;border-radius:999px;font-weight:700;margin-left:auto;border:2px solid #000;color:#000;background:#fff}
.b-warn{margin-left:6px;border-color:var(--em);color:var(--em)}
.affix{margin:12px 0 2px;font-size:38px;font-family:"Cambria","Georgia",serif;color:#000;font-weight:700;letter-spacing:.5px;line-height:1.1}
.mean{font-size:16px;color:#000;margin-bottom:12px;font-weight:600}
.mean b{color:var(--em)}
.sec{font-size:13px;color:var(--em);font-weight:800;letter-spacing:.5px;margin:16px 0 8px;border-top:2px solid #000;padding-top:10px}
.origin{font-size:14px;color:#000;line-height:1.65}
.origin .star,.origin .warn{color:var(--em);font-weight:700}
.ex{margin:10px 0;padding:11px 12px;background:#fff;border:2px solid #000;border-radius:10px}
.ex .top{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;background:none;padding:0;border:none}
.ex .w{font-size:17px;font-weight:700;color:#000}
.ex .w b{color:var(--em);font-weight:800}
.ex .kk{font-family:"Consolas","Courier New",monospace;color:#000;font-size:13px;font-weight:600}
.ex .cn{font-size:14px;color:#000;font-weight:700;margin-left:auto}
.ex .se{font-size:14px;color:#000;margin-top:6px}
.ex .se em{color:var(--em);font-style:normal;font-weight:800}
.ex .tr{font-size:14px;color:#000;margin-top:3px;font-weight:600}
.empty{margin:auto;color:#000;font-size:16px;font-weight:600}

/* bottom nav */
.nav{flex:0 0 auto;display:flex;gap:10px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));background:#fff;border-top:2px solid #000}
.nav button{flex:1;border:2px solid #000;border-radius:12px;padding:15px 0;font-size:17px;font-weight:700;cursor:pointer;transition:.12s}
.prev{background:#fff;color:#000}
.next{background:var(--em);color:#fff;border-color:var(--em);flex:2}
.nav button:disabled{opacity:.3;cursor:default}
.nav button:active{transform:scale(.98)}
</style>
</head>

<div class="app">

    </div>
  </div>

  <div class="stage" id="stage">
    <div class="card" id="card"></div>
  </div>

  <div class="nav">
    <button class="prev" id="prev">‹ 上一张</button>
    <button class="next" id="next">下一张 ›</button>
  </div>
</div>

var stage=document.getElementById('stage'), card=document.getElementById('card'),
    prog=document.getElementById('prog'), prevB=document.getElementById('prev'),
    nextB=document.getElementById('next'), q=document.getElementById('q'),
    staronly=document.getElementById('staronly');
var cat='all', star=false, term='', list=[], pos=0, dir=1;

function build(){
  list=[];
  for(var i=0;i<DATA.length;i++){
    var d=DATA[i];
    if(cat!=='all' && d.cat!==cat) continue;
    if(star && !d.star) continue;
    if(term && d.search.indexOf(term)<0) continue;
    list.push(i);
  }
  if(pos>=list.length) pos=0;
  render();
}
function esc(){}
function render(){
  if(!list.length){ card.innerHTML='<div class="empty">没有符合的卡片 🔎</div>'; prog.textContent='0 / 0';
    prevB.disabled=nextB.disabled=true; return; }
  var d=DATA[list[pos]];
  var h='<div class="chead"><span class="pill p-'+d.cat+'">'+d.clab+'</span><span class="num">'+d.num+'</span>';
  if(d.star) h+='<span class="badge b-star">⭐ 有故事</span>';
  if(d.warn) h+='<span class="badge b-warn">⚠️ 陷阱</span>';
  h+='</div>';
  h+='<div class="affix">'+d.affix+'</div>';
  h+='<div class="mean"><b>'+d.men+'</b>'+(d.mcn?'　'+d.mcn:'')+'</div>';
  h+='<div class="sec">语源 · 故事</div><div class="origin">'+d.origin+(d.story?'　·　'+d.story:'')+'</div>';
  h+='<div class="sec">例字 · '+d.ex.length+'</div>';
  for(var j=0;j<d.ex.length;j++){var x=d.ex[j];
    h+='<div class="ex"><div class="top"><span class="w">'+x.w+'</span><span class="kk">'+x.kk+'</span><span class="cn">'+x.cn+'</span></div>'
      +'<div class="se">'+x.se+'</div><div class="tr">'+x.tr+'</div></div>';
  }
  card.style.setProperty('--dir',(dir>0?'28px':'-28px'));
  card.innerHTML=h; card.scrollTop=0;
  // restart animation
  card.style.animation='none'; void card.offsetWidth; card.style.animation='';
  prog.textContent=(pos+1)+' / '+list.length;
  prevB.disabled=(pos===0); nextB.disabled=(pos===list.length-1);
}
function go(n){ if(n<0||n>=list.length) return; dir=(n>pos)?1:-1; pos=n; render(); }
nextB.onclick=function(){go(pos+1)};
prevB.onclick=function(){go(pos-1)};

document.getElementById('chips').onclick=function(e){
  var t=e.target.closest('.chip'); if(!t)return;
  var cs=this.querySelectorAll('.chip'); for(var i=0;i<cs.length;i++)cs[i].classList.remove('on');
  t.classList.add('on'); cat=t.dataset.cat; pos=0; build();
};
staronly.onchange=function(){star=this.checked; pos=0; build();};
q.addEventListener('input',function(){term=this.value.trim().toLowerCase(); pos=0; build();});
document.getElementById('searchToggle').onclick=function(){
  document.getElementById('srchWrap').classList.toggle('show');
  if(document.getElementById('srchWrap').classList.contains('show')) q.focus();
};
document.getElementById('shuffle').onclick=function(){
  if(!list.length)return; pos=Math.floor(Math.random()*list.length); dir=1; render();
};

/* keyboard */
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' ') go(pos+1);
  else if(e.key==='ArrowLeft') go(pos-1);
});
/* swipe */
var sx=0,sy=0,sw=false;
stage.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;sw=true;},{passive:true});
stage.addEventListener('touchend',function(e){
  if(!sw)return; sw=false;
  var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ if(dx<0) go(pos+1); else go(pos-1); }
},{passive:true});

build();
</script>
