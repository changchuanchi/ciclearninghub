<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雅思 IELTS 托福 TOEFL 必背单词闪卡</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --card-bg: #211f35;
    --card-front: #252340;
    --accent: #e8c547;
    --accent2: #7b6cf6;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --pos-n: #5bc8af;
    --pos-v: #f06595;
    --pos-adj: #74b9ff;
    --pos-adv: #fd79a8;
    --pos-phr: #a29bfe;
    --pos-other: #81ecec;
    --radius: 20px;
    --shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(123,108,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(232,197,71,0.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container { width:100%; max-width:680px; position:relative; z-index:1; }
  header { text-align:center; padding:24px 0 20px; }
  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px,4vw,30px);
    color: var(--accent); margin-bottom:4px;
  }
  .app-subtitle { font-size:13px; color:var(--text-muted); font-weight:300; }

  .progress-wrap {
    margin:16px 0 24px; display:flex; align-items:center; gap:12px;
  }
  .progress-bar {
    flex:1; height:4px; background:rgba(255,255,255,0.08);
    border-radius:2px; overflow:hidden;
  }
  .progress-fill {
    height:100%;
    background:linear-gradient(90deg,var(--accent2),var(--accent));
    border-radius:2px; transition:width 0.4s ease;
  }
  .progress-label {
    font-family:'DM Mono',monospace; font-size:12px;
    color:var(--text-muted); white-space:nowrap; min-width:55px; text-align:right;
  }

  .scene {
    width:100%; margin-bottom:28px;
    -webkit-perspective:1200px;
    perspective:1200px;
  }
  .card {
    width:100%; position:relative;
    -webkit-transform-style:preserve-3d;
    transform-style:preserve-3d;
    -webkit-transition:-webkit-transform 0.55s cubic-bezier(0.645,0.045,0.355,1.000);
    transition:transform 0.55s cubic-bezier(0.645,0.045,0.355,1.000);
    cursor:pointer; user-select:none;
    display:grid;
  }
  .card.flipped {
    -webkit-transform:rotateY(180deg);
    transform:rotateY(180deg);
  }
  .card-face {
    grid-area:1/1;
    width:100%; min-height:320px;
    -webkit-backface-visibility:hidden;
    backface-visibility:hidden;
    border-radius:var(--radius);
    padding:36px 40px;
    display:flex; flex-direction:column;
    -webkit-transform:translateZ(0.01px);
    transform:translateZ(0.01px);
  }
  .card-back {
    -webkit-transform:rotateY(180deg) translateZ(0.01px);
    transform:rotateY(180deg) translateZ(0.01px);
  }
  .card-front {
    background:var(--card-front);
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:var(--shadow);
    justify-content:center; align-items:center; text-align:center;
    position:relative;
  }
  .card-front::before {
    content:''; position:absolute; inset:0;
    border-radius:var(--radius);
    background:radial-gradient(ellipse at 50% 0%,rgba(123,108,246,0.12) 0%,transparent 60%);
  }
  .flip-hint {
    position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
    font-size:11px; color:rgba(167,169,190,0.45); letter-spacing:0.08em;
  }
  .pos-badge {
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:11px; font-weight:500; letter-spacing:0.06em;
    margin-bottom:18px; text-transform:uppercase;
  }
  .word-text {
    font-family:'Playfair Display',serif;
    font-size:clamp(36px,8vw,56px);
    color:var(--text); line-height:1.1; margin-bottom:12px;
    position:relative; z-index:1;
  }
  .phonetic-text {
    font-family:'DM Mono',monospace; font-size:15px;
    color:var(--accent); margin-bottom:20px;
    position:relative; z-index:1;
  }
  .sound-btn {
    background:rgba(232,197,71,0.12);
    border:1px solid rgba(232,197,71,0.25);
    color:var(--accent); width:42px; height:42px;
    border-radius:50%; cursor:pointer; font-size:18px;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; position:relative; z-index:2;
  }
  .sound-btn:hover { background:rgba(232,197,71,0.22); transform:scale(1.08); }

  .card-back {
    background:var(--card-bg);
    border:1px solid rgba(255,255,255,0.07);
    box-shadow:var(--shadow);
    justify-content:flex-start; gap:18px;
  }
  .back-top { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
  .back-word { font-family:'Playfair Display',serif; font-size:26px; color:var(--text); }
  .back-phonetic { font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); }
  .zh-translation { font-size:22px; font-weight:500; color:var(--text); line-height:1.3; }
  .divider { height:1px; background:rgba(255,255,255,0.07); }
  .section-label {
    font-size:10px; font-weight:500; letter-spacing:0.1em;
    color:var(--text-muted); text-transform:uppercase; margin-bottom:6px;
  }
  .tags { display:flex; flex-wrap:wrap; gap:7px; }
  .tag {
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
    padding:4px 10px; border-radius:20px; font-size:13px; color:var(--text-muted);
  }
  .antonym-tag { background:rgba(240,101,149,0.1); border-color:rgba(240,101,149,0.2); color:#f06595; }
  .example-text {
    font-size:14px; line-height:1.65; color:var(--text-muted);
    font-style:italic; border-left:2px solid var(--accent2); padding-left:12px;
  }

  .controls { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
  .btn {
    padding:11px 24px; border-radius:50px; border:none;
    cursor:pointer; font-family:'DM Sans',sans-serif;
    font-size:14px; font-weight:500; transition:all 0.2s;
    display:flex; align-items:center; gap:7px;
  }
  .btn-prev {
    background:rgba(255,255,255,0.07); color:var(--text-muted);
    border:1px solid rgba(255,255,255,0.1);
  }
  .btn-prev:hover { background:rgba(255,255,255,0.12); color:var(--text); }
  .btn-next {
    background:linear-gradient(135deg,var(--accent2),#9b8df8);
    color:white; box-shadow:0 4px 20px rgba(123,108,246,0.35);
  }
  .btn-next:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(123,108,246,0.45); }
  .btn-shuffle {
    background:rgba(232,197,71,0.1); color:var(--accent);
    border:1px solid rgba(232,197,71,0.2);
  }
  .btn-shuffle:hover { background:rgba(232,197,71,0.18); }
  .btn-flip {
    background:rgba(255,255,255,0.05); color:var(--text-muted);
    border:1px solid rgba(255,255,255,0.1);
  }
  .btn-flip:hover { background:rgba(255,255,255,0.1); color:var(--text); }

  .stats { text-align:center; font-size:12px; color:rgba(167,169,190,0.5); padding-bottom:24px; }
  .key-hints {
    display:flex; gap:16px; justify-content:center; margin-bottom:20px; flex-wrap:wrap;
  }
  .key-hint { font-size:11px; color:rgba(167,169,190,0.4); display:flex; align-items:center; gap:5px; }
  .key {
    background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
    padding:2px 7px; border-radius:5px;
    font-family:'DM Mono',monospace; font-size:10px;
  }

  .pos-n   { background:rgba(91,200,175,0.15); color:var(--pos-n); }
  .pos-v   { background:rgba(240,101,149,0.15); color:var(--pos-v); }
  .pos-adj { background:rgba(116,185,255,0.15); color:var(--pos-adj); }
  .pos-adv { background:rgba(253,121,168,0.15); color:var(--pos-adv); }
  .pos-phr { background:rgba(162,155,254,0.15); color:var(--pos-phr); }
  .pos-other{ background:rgba(129,236,236,0.15); color:var(--pos-other); }

  .scene.changing { opacity:0; transform:translateY(8px); }
  .scene { transition:opacity 0.2s,transform 0.2s; }

  @media(max-width:480px){
    body{padding:12px;}
    .card-face{padding:28px 24px;}
    .controls{gap:8px;}
    .btn{padding:10px 18px;font-size:13px;}
    .key-hints{display:none;}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="app-title">雅思 IELTS 托福 TOEFL 必背单词闪卡</div>
    <div class="app-subtitle">张全吉汇整</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">1 / 250</div>
  </div>

  <div class="scene" id="scene">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <div class="pos-badge" id="posBadge">n</div>
        <div class="word-text" id="wordText">...</div>
        <div class="phonetic-text" id="phoneticText"></div>
        <button class="sound-btn" onclick="speakWord(event)" title="Speak">🔊</button>
        <div class="flip-hint">↓ tap to reveal ↓</div>
      </div>
      <div class="card-face card-back">
        <div class="back-top">
          <span class="back-word" id="backWord"></span>
          <span class="back-phonetic" id="backPhonetic"></span>
        </div>
        <div class="zh-translation" id="zhText"></div>
        <div class="divider"></div>
        <div id="synonymSection">
          <div class="section-label">Synonyms</div>
          <div class="tags" id="synonymTags"></div>
        </div>
        <div id="antonymSection">
          <div class="section-label">Antonyms</div>
          <div class="tags" id="antonymTags"></div>
        </div>
        <div id="exampleSection">
          <div class="section-label">Example</div>
          <div class="example-text" id="exampleText"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-prev" onclick="prevCard()">← Prev</button>
    <button class="btn btn-flip" onclick="flipCard()">Flip</button>
    <button class="btn btn-next" onclick="nextCard()">Next →</button>
  </div>
  <div class="controls">
    <button class="btn btn-shuffle" id="shuffleBtn" onclick="shuffleCards()">🔀 Shuffle</button>
  </div>
  <div class="key-hints">
    <div class="key-hint"><span class="key">←</span> Prev</div>
    <div class="key-hint"><span class="key">→</span> Next</div>
    <div class="key-hint"><span class="key">Space</span> Flip</div>
    <div class="key-hint"><span class="key">S</span> Speak</div>
  </div>
  <div class="stats" id="statsText">Card 1 of 250</div>
</div>

<script>
var VOCAB = [{"word":"20 or so","phonetic":"20 ər soʊ","pos":"adv","zh":"大約","synonyms":["20 roughly"],"antonyms":[],"example":""},{"word":"a matter of speculation","phonetic":"ə ˈmætər əv ˌspɛkjəˈleɪʃən","pos":"n","zh":"推斷","synonyms":["supposition"],"antonyms":["certainty","fact"],"example":"Whether life exists on Mars remains a matter of speculation."},{"word":"a solicitation of","phonetic":"ə səˌlɪsɪˈteɪʃən əv","pos":"n","zh":"懇求","synonyms":["an invitation of"],"antonyms":[],"example":""},{"word":"ally with","phonetic":"ˈælaɪ wɪθ","pos":"v","zh":"結盟","synonyms":["link to"],"antonyms":["oppose","conflict with"],"example":"The small nation chose to ally with its powerful neighbor."},{"word":"bustling","phonetic":"ˈbəsəlɪŋ","pos":"adj","zh":"忙亂的","synonyms":["busy","lively"],"antonyms":["quiet","calm","deserted"],"example":"The bustling marketplace was filled with merchants and buyers."},{"word":"abandon","phonetic":"əˈbændən","pos":"vt","zh":"放棄","synonyms":["give up","quit"],"antonyms":["keep","maintain","retain"],"example":"The crew had to abandon the sinking ship immediately."},{"word":"abandoned","phonetic":"əˈbændənd","pos":"adj","zh":"被遺棄的","synonyms":["left"],"antonyms":["occupied","inhabited"],"example":"The abandoned building became a shelter for stray animals."},{"word":"aberrant","phonetic":"æˈbɛrənt","pos":"adj","zh":"脫離常軌的","synonyms":["abnormal"],"antonyms":["normal","typical","standard"],"example":"The scientist noted aberrant behavior in the test subjects."},{"word":"abort","phonetic":"əˈbɔrt","pos":"v","zh":"中止","synonyms":["quit","stop"],"antonyms":["continue","proceed","complete"],"example":"The mission was aborted due to severe weather conditions."},{"word":"abrupt","phonetic":"əˈbrəpt","pos":"adj","zh":"突然的","synonyms":["sudden"],"antonyms":["gradual","smooth","expected"],"example":"The abrupt end of the meeting surprised everyone present."},{"word":"abruptly","phonetic":"əˈbrəptli","pos":"adv","zh":"突然地","synonyms":["suddenly"],"antonyms":["gradually","slowly"],"example":"She abruptly left the room without explaining why."},{"word":"absorb","phonetic":"əbˈsɔrb","pos":"v","zh":"吸收","synonyms":["take in","learn"],"antonyms":["release","emit","discharge"],"example":"The sponge can absorb large amounts of water quickly."},{"word":"abstract","phonetic":"ˈæbstrækt","pos":"adj","zh":"抽象的","synonyms":["theoretical"],"antonyms":["concrete","tangible","specific"],"example":"The abstract concept was difficult to explain concretely."},{"word":"absurd","phonetic":"əbˈsɜrd","pos":"adj","zh":"荒謬的","synonyms":["ridiculous","irrational"],"antonyms":["reasonable","sensible","logical"],"example":"It seemed absurd to walk ten miles when a car was available."},{"word":"abundance","phonetic":"əˈbəndəns","pos":"n","zh":"大量","synonyms":["plenty","wealth"],"antonyms":["scarcity","lack","shortage"],"example":"The region is known for its abundance of natural resources."},{"word":"abundant","phonetic":"əˈbəndənt","pos":"adj","zh":"大量的","synonyms":["ample","plentiful"],"antonyms":["scarce","rare","insufficient"],"example":"Rainfall is abundant in tropical rainforests throughout the year."},{"word":"abundantly","phonetic":"əˈbəndəntli","pos":"adv","zh":"豐富地","synonyms":["plentifully"],"antonyms":["scarcely","barely"],"example":"The garden grows abundantly during the summer months."},{"word":"accelerate","phonetic":"ækˈsɛlərˌeɪt","pos":"v","zh":"加速","synonyms":["speed up","quicken"],"antonyms":["decelerate","slow down","hinder"],"example":"The new policy will accelerate economic growth significantly."},{"word":"access","phonetic":"ˈæksɛs","pos":"v","zh":"接近","synonyms":["reach","obtain"],"antonyms":["block","deny","restrict"],"example":"Students can access the library database from home."},{"word":"accessible","phonetic":"ækˈsɛsəbəl","pos":"adj","zh":"易接近的","synonyms":["reachable","available"],"antonyms":["inaccessible","unreachable","remote"],"example":"The museum is accessible to visitors with disabilities."},{"word":"accidental","phonetic":"ˌæksɪˈdɛntəl","pos":"adj","zh":"意外的","synonyms":["unintentional","chance"],"antonyms":["deliberate","intentional","planned"],"example":"The discovery of penicillin was largely accidental."},{"word":"acclaimed","phonetic":"əˈkleɪmd","pos":"adj","zh":"值得讚揚的","synonyms":["celebrated","praised"],"antonyms":["criticized","condemned","obscure"],"example":"The acclaimed novel won numerous literary awards."},{"word":"accommodate","phonetic":"əˈkɒmədeɪt","pos":"v","zh":"提供","synonyms":["house","hold"],"antonyms":["exclude","reject","refuse"],"example":"The hotel can accommodate up to five hundred guests."},{"word":"accomplished","phonetic":"əˈkɒmplɪʃt","pos":"adj","zh":"完成的","synonyms":["skilled","talented"],"antonyms":["unskilled","amateur","inexperienced"],"example":"She is an accomplished musician who performs internationally."},{"word":"account for","phonetic":"əˈkaʊnt fɔr","pos":"v","zh":"說明","synonyms":["explain","justify"],"antonyms":[],"example":"Can you account for your whereabouts last night?"},{"word":"account","phonetic":"əˈkaʊnt","pos":"n","zh":"說明","synonyms":["explanation","report"],"antonyms":[],"example":"She gave a detailed account of what had happened."},{"word":"accumulate","phonetic":"əˈkjumjəleɪt","pos":"v","zh":"積累","synonyms":["gather","amass"],"antonyms":["disperse","scatter","distribute"],"example":"Snow began to accumulate on the mountain peaks."},{"word":"accurate","phonetic":"ˈækjərɪt","pos":"adj","zh":"正確的","synonyms":["precise","correct"],"antonyms":["inaccurate","wrong","imprecise"],"example":"Scientists need accurate measurements to conduct valid experiments."},{"word":"accurately","phonetic":"ˈækjərɪtli","pos":"adv","zh":"正確地","synonyms":["precisely","correctly"],"antonyms":["inaccurately","incorrectly"],"example":"The instrument measures temperature accurately to one decimal."},{"word":"acknowledge","phonetic":"əkˈnɒlɪdʒ","pos":"v","zh":"承認","synonyms":["admit","recognize"],"antonyms":["deny","reject","ignore"],"example":"The sc ,"example":"A considerable amount of time was spent analyzing the data."},{"word":"considerably","phonetic":"kənˈsɪdərəbli","pos":"adv","zh":"相當大地","synonyms":["significantly","substantially"],"antonyms":["slightly","marginally"],"example":"The temperature dropped considerably overnight."},{"word":"consist of","phonetic":"kənˈsɪst əv","pos":"v","zh":"由…組成","synonyms":["be made up of","comprise"],"antonyms":[],"example":"The committee consists of twelve elected members."},{"word":"consistent","phonetic":"kənˈsɪstənt","pos":"adj","zh":"一致的","synonyms":["uniform","steady"],"antonyms":["inconsistent","variable","erratic"],"example":"The results were consistent across all three experiments."},{"word":"consistently","phonetic":"kənˈsɪstəntli","pos":"adv","zh":"一致地","synonyms":["uniformly","steadily"],"antonyms":["inconsistently","erratically"],"example":"The instrument consistently produced accurate measurements."},{"word":"conspicuous","phonetic":"kənˈspɪkjuəs","pos":"adj","zh":"明顯的","synonyms":["obvious","noticeable"],"antonyms":["hidden","inconspicuous","subtle"],"example":"The bird's bright colors make it conspicuous in the forest."},{"word":"constant","phonetic":"ˈkɒnstənt","pos":"adj","zh":"固定的；不變的","synonyms":["steady","unchanging"],"antonyms":["variable","changing","fluctuating"],"example":"Maintaining a constant temperature is critical for the experiment."},{"word":"constantly","phonetic":"ˈkɒnstəntli","pos":"adv","zh":"經常；不斷地","synonyms":["continuously","always"],"antonyms":["occasionally","rarely","seldom"],"example":"Technology is constantly evolving at an unprecedented pace."},{"word":"constellation","phonetic":"ˌkɒnstəˈleɪʃən","pos":"n","zh":"一系列；一群","synonyms":["array","group"],"antonyms":[],"example":"A constellation of factors contributed to the economic crisis."},{"word":"constitute","phonetic":"ˈkɒnstɪtut","pos":"v","zh":"組成；構成","synonyms":["make up","form"],"antonyms":["exclude","omit"],"example":"Women constitute more than half of the university's student body."}];
var order = Array.from({length: VOCAB.length}, function(_, i){ return i; });
var currentIndex = 0;
var isFlipped = false;

function getPosClass(pos) {
  if(!pos) return 'pos-other';
  var p = pos.toLowerCase();
  if(p==='n'||p==='noun') return 'pos-n';
  if(p.startsWith('v')) return 'pos-v';
  if(p==='adj'||p==='a') return 'pos-adj';
  if(p==='adv'||p==='ad') return 'pos-adv';
  if(p==='phr'||p==='phrv'||p==='part'||p==='prep'||p==='conj'||p==='pron') return 'pos-phr';
  return 'pos-other';
}
function getPosLabel(pos) {
  if(!pos) return 'phr';
  var p = pos.toLowerCase();
  if(p==='a') return 'adj';
  if(p==='ad') return 'adv';
  if(p==='vt') return 'v';
  if(p==='phrv') return 'phr';
  return p;
}

function loadCard() {
  var v = VOCAB[order[currentIndex]];
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');

  var badge = document.getElementById('posBadge');
  badge.textContent = getPosLabel(v.pos);
  badge.className = 'pos-badge ' + getPosClass(v.pos);
  document.getElementById('wordText').textContent = v.word;
  document.getElementById('phoneticText').textContent = v.phonetic ? '/'+v.phonetic+'/' : '';
  document.getElementById('backWord').textContent = v.word;
  document.getElementById('backPhonetic').textContent = v.phonetic ? '/'+v.phonetic+'/' : '';
  document.getElementById('zhText').textContent = v.zh || '';

  var synSec = document.getElementById('synonymSection');
  var synTags = document.getElementById('synonymTags');
  if(v.synonyms && v.synonyms.length > 0){
    synTags.innerHTML = v.synonyms.map(function(s){ return '<span class="tag">'+s+'</span>'; }).join('');
    synSec.style.display = '';
  } else { synSec.style.display = 'none'; }

  var antSec = document.getElementById('antonymSection');
  var antTags = document.getElementById('antonymTags');
  if(v.antonyms && v.antonyms.length > 0){
    antTags.innerHTML = v.antonyms.map(function(a){ return '<span class="tag antonym-tag">'+a+'</span>'; }).join('');
    antSec.style.display = '';
  } else { antSec.style.display = 'none'; }

  var exSec = document.getElementById('exampleSection');
  if(v.example && v.example.trim()){
    document.getElementById('exampleText').textContent = v.example;
    exSec.style.display = '';
  } else { exSec.style.display = 'none'; }

  var pct = ((currentIndex+1)/VOCAB.length*100).toFixed(1);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = (currentIndex+1)+' / '+VOCAB.length;
  document.getElementById('statsText').textContent = 'Card '+(currentIndex+1)+' of '+VOCAB.length;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped');
}
function nextCard() {
  var s = document.getElementById('scene');
  s.classList.add('changing');
  setTimeout(function(){
    currentIndex = (currentIndex+1) % VOCAB.length;
    loadCard();
    s.classList.remove('changing');
  }, 180);
}
function prevCard() {
  var s = document.getElementById('scene');
  s.classList.add('changing');
  setTimeout(function(){
    currentIndex = (currentIndex-1+VOCAB.length) % VOCAB.length;
    loadCard();
    s.classList.remove('changing');
  }, 180);
}
function shuffleCards() {
  for(var i=order.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=order[i]; order[i]=order[j]; order[j]=t;
  }
  currentIndex = 0;
  loadCard();
  var btn = document.getElementById('shuffleBtn');
  btn.textContent = '✅ Shuffled!';
  setTimeout(function(){ btn.textContent = '🔀 Shuffle'; }, 1500);
}
function speakWord(e) {
  e.stopPropagation();
  var v = VOCAB[order[currentIndex]];
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(v.word);
    u.lang = 'en-US'; u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
}
document.addEventListener('keydown', function(e){
  if(e.target.tagName==='INPUT') return;
  if(e.key==='ArrowRight') nextCard();
  if(e.key==='ArrowLeft') prevCard();
  if(e.key===' '){ e.preventDefault(); flipCard(); }
  if(e.key==='s'||e.key==='S') speakWord({stopPropagation:function(){}});
});
var tx = 0;
document.getElementById('scene').addEventListener('touchstart',function(e){ tx=e.touches[0].clientX; });
document.getElementById('scene').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ if(dx<0) nextCard(); else prevCard(); }
});

loadCard();
</script>
